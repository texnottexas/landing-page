<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https://raw.githubusercontent.com; frame-ancestors 'none'">
<title>Great Offers Preview — S2864</title>
<style>
  :root{--bg:#0d1117;--surface:#161b22;--card:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#79c0ff;--army:#3fb950;--gold:#d29922;--red:#f85149;--navy:#388bfd;}
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
  .header{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.25rem;display:flex;align-items:center;gap:.75rem;position:sticky;top:0;z-index:100;}
  .home-btn{color:var(--muted);text-decoration:none;font-size:1.25rem;line-height:1;transition:color .2s;}
  .home-btn:hover{color:var(--text);}
  .header-title{font-size:1.05rem;font-weight:600;}
  .header-title span{color:var(--gold);}
  .header-sub{font-size:.72rem;color:var(--muted);margin-left:auto;}
  .main{max-width:900px;margin:0 auto;padding:1.25rem 1rem;}
  .meta-banner{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.75rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
  .meta-badge{font-size:.7rem;padding:.2rem .55rem;border-radius:12px;font-weight:600;}
  .meta-badge.act{background:rgba(121,192,255,.12);color:var(--accent);border:1px solid rgba(121,192,255,.25);}
  .meta-badge.cur{background:rgba(210,153,34,.12);color:var(--gold);border:1px solid rgba(210,153,34,.25);}
  .meta-title{font-size:.88rem;font-weight:700;}
  .meta-note{font-size:.72rem;color:var(--muted);margin-left:auto;}
  .day-tabs{display:flex;gap:4px;margin-bottom:1.25rem;flex-wrap:wrap;}
  .day-tab{padding:.35rem .9rem;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:600;transition:all .15s;font-family:inherit;}
  .day-tab.active{background:var(--gold);color:#0d1117;border-color:var(--gold);}
  .day-tab:hover:not(.active){background:var(--border);color:var(--text);}
  .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.75rem;}
  .item-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem;display:flex;gap:.75rem;align-items:flex-start;transition:border-color .15s;}
  .item-card:hover{border-color:rgba(210,153,34,.5);}
  .item-icon{width:68px;height:68px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--surface);display:flex;align-items:center;justify-content:center;border:1px solid var(--border);}
  .item-icon img{width:100%;height:100%;object-fit:contain;}
  .item-info{flex:1;min-width:0;}
  .item-name{font-size:.82rem;font-weight:700;margin-bottom:.25rem;line-height:1.3;}
  .item-id{font-size:.63rem;color:var(--muted);font-family:monospace;margin-bottom:.35rem;}
  .price-row{display:flex;align-items:baseline;gap:.35rem;flex-wrap:wrap;margin-bottom:.25rem;}
  .price-sale{font-size:.9rem;font-weight:700;color:var(--gold);}
  .price-orig{font-size:.72rem;color:var(--muted);text-decoration:line-through;}
  .price-note{font-size:.63rem;color:var(--muted);margin-bottom:.25rem;}
  .badges{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.3rem;}
  .badge{font-size:.62rem;padding:.15rem .4rem;border-radius:6px;font-weight:600;}
  .badge-limit{background:rgba(56,139,253,.12);color:var(--navy);border:1px solid rgba(56,139,253,.2);}
  .badge-disc{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.2);}
  .badge-active{background:rgba(63,185,80,.12);color:var(--army);border:1px solid rgba(63,185,80,.2);}
  .day-header{font-size:.75rem;color:var(--muted);margin-bottom:.75rem;}
  .site-footer{text-align:center;padding:1.5rem 1rem;font-size:.75rem;color:var(--muted);border-top:1px solid var(--border);margin-top:2rem;}
  .site-footer a{color:var(--muted);text-decoration:none;}
  .site-footer a:hover{color:var(--accent);}
  @media(max-width:480px){.item-grid{grid-template-columns:1fr;}.header-sub{display:none;}}
</style>

function pct(o,s){return s?Math.round((1-s/o)*100):0;}
function renderDay(day){
