<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TW Server 2864</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d1117;
      --bg2: #161b22;
      --card: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #79c0ff;
      --tag: #21262d;
      --shadow: rgba(0,0,0,0.4);
      --army: #3fb950;
      --navy: #388bfd;
      --air: #d29922;
      --glow: rgba(121,192,255,0.15);
    }
    :root[data-theme="light"] {
      --bg: #f6f8fa;
      --bg2: #ffffff;
      --card: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #656d76;
      --accent: #1f75d4;
      --tag: #eaeef2;
      --shadow: rgba(0,0,0,0.1);
      --army: #1a7f37;
      --navy: #0550ae;
      --air: #9a6700;
      --glow: rgba(31,117,212,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background 0.3s, color 0.3s;
    }

    /* Header */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: .85rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: 0 1px 0 var(--border);
      width: 100%;
    }
    .header-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -.01em;
    }
    .header-sub {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .header-actions {
      display: flex;
      gap: .6rem;
      align-items: center;
    }
    .hdr-btn {
      background: var(--tag);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: .38rem .9rem;
      cursor: pointer;
      font-size: .8rem;
      display: flex;
      align-items: center;
      gap: .4rem;
      transition: all .15s;
      white-space: nowrap;
      text-decoration: none;
    }
    .hdr-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Main content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 2rem 1.5rem;
    }

    /* Banner image */
    .banner {
      width: 100%;
      max-width: 480px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 8px 32px var(--shadow);
      margin-bottom: 2.5rem;
      max-height: 200px;
    }
    .banner img {
      width: 100%;
      display: block;
      object-fit: cover;
      object-position: center;
      height: 200px;
    }

    /* Radial wheel */
    .wheel-wrap {
      position: relative;
      width: 380px;
      height: 380px;
      margin: 0 auto 2rem;
    }

    .wheel-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .75rem;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
      line-height: 1.2;
      box-shadow: 0 0 24px var(--glow);
      z-index: 2;
    }

    .wheel-item {
      position: absolute;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--card);
      border: 2px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: var(--text);
      font-size: .7rem;
      font-weight: 600;
      gap: .2rem;
      transition: transform 0.25s, box-shadow 0.25s, border-color 0.2s;
      box-shadow: 0 2px 8px var(--shadow);
      cursor: pointer;
      z-index: 1;
    }
    .wheel-item:hover {
      transform: scale(1.15);
      border-color: var(--accent);
      box-shadow: 0 4px 20px var(--glow);
      z-index: 3;
    }
    .wheel-item .w-icon {
      font-size: 1.6rem;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .wheel-item .w-icon svg {
      width: 28px;
      height: 28px;
    }
    .wheel-item .w-label {
      text-align: center;
      line-height: 1.15;
      max-width: 80px;
    }

    /* Connector lines */
    .wheel-wrap::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 260px;
      height: 260px;
      transform: translate(-50%, -50%);
      border: 1px dashed var(--border);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.5;
    }

    /* Position 6 items around the circle (60deg apart) */
    .wheel-item:nth-child(1) { top: 0;    left: 50%;  transform: translate(-50%, 0); }
    .wheel-item:nth-child(2) { top: 12%;  right: 0;   transform: translate(0, 0); }
    .wheel-item:nth-child(3) { bottom: 12%; right: 0;  transform: translate(0, 0); }
    .wheel-item:nth-child(4) { bottom: 0; left: 50%;  transform: translate(-50%, 0); }
    .wheel-item:nth-child(5) { bottom: 12%; left: 0;   transform: translate(0, 0); }
    .wheel-item:nth-child(6) { top: 12%;  left: 0;    transform: translate(0, 0); }

    /* Hover overrides for positioned items */
    .wheel-item:nth-child(1):hover { transform: translate(-50%, 0) scale(1.15); }
    .wheel-item:nth-child(2):hover { transform: translate(0, 0) scale(1.15); }
    .wheel-item:nth-child(3):hover { transform: translate(0, 0) scale(1.15); }
    .wheel-item:nth-child(4):hover { transform: translate(-50%, 0) scale(1.15); }
    .wheel-item:nth-child(5):hover { transform: translate(0, 0) scale(1.15); }
    .wheel-item:nth-child(6):hover { transform: translate(0, 0) scale(1.15); }

    /* Image modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      cursor: pointer;
    }
    .modal-overlay.active { display: flex; }
    .modal-overlay img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    /* Unit selection modal */
    .unit-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 300;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .unit-modal.active { display: flex; }
    .unit-modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      text-align: center;
    }
    .unit-modal-content h2 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: .35rem;
    }
    .unit-modal-content .modal-sub {
      color: var(--muted);
      font-size: .85rem;
      margin-bottom: 1.5rem;
    }
    .unit-options {
      display: flex;
      gap: .75rem;
    }
    .unit-option {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      padding: 1.25rem .75rem;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      font-size: .9rem;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .unit-option:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px var(--shadow);
      transform: translateY(-3px);
    }
    .unit-option .unit-icon {
      font-size: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .unit-option .unit-icon svg {
      width: 32px;
      height: 32px;
    }
    .unit-option.army { border-color: var(--army); color: var(--army); }
    .unit-option.army:hover { box-shadow: 0 4px 16px rgba(63,185,80,0.3); }
    .unit-option.navy { border-color: var(--navy); color: var(--navy); }
    .unit-option.navy:hover { box-shadow: 0 4px 16px rgba(56,139,253,0.3); }
    .unit-option.air { border-color: var(--air); color: var(--air); }
    .unit-option.air:hover { box-shadow: 0 4px 16px rgba(210,153,34,0.3); }
    .unit-modal-close {
      margin-top: 1.25rem;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: .4rem 1.25rem;
      cursor: pointer;
      font-size: .8rem;
      transition: all .15s;
    }
    .unit-modal-close:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Footer with shimmer */
    @keyframes footer-shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    .site-footer {
      text-align: center;
      padding: 1.5rem 2rem;
      font-size: .75rem;
      border-top: 1px solid var(--border);
      width: 100%;
    }
    .site-footer .footer-text {
      display: inline-block;
      background: linear-gradient(90deg, var(--muted) 0%, var(--accent) 25%,
                  var(--muted) 50%, var(--accent) 75%, var(--muted) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: footer-shimmer 6s linear infinite;
    }
    .site-footer a {
      color: var(--accent);
      text-decoration: none;
      -webkit-text-fill-color: var(--accent);
    }
    .site-footer a:hover { text-decoration: underline; }

    /* Mobile: fall back to vertical list */
    @media (max-width: 500px) {
      header { padding: .75rem 1rem; }
      .header-title { font-size: .95rem; }
      .banner {
        margin-bottom: 1.5rem;
        max-height: 120px;
      }
      .banner img {
        height: 120px;
      }

      .wheel-wrap {
        position: static;
        width: 100%;
        height: auto;
        display: flex;
        flex-direction: column;
        gap: .75rem;
        max-width: 400px;
      }
      .wheel-wrap::before { display: none; }
      .wheel-center {
        position: static;
        transform: none;
        width: 100%;
        height: auto;
        border-radius: 12px;
        padding: .75rem;
        font-size: .85rem;
        margin-bottom: .25rem;
      }
      .wheel-item {
        position: static;
        transform: none !important;
        width: 100%;
        height: auto;
        border-radius: 12px;
        flex-direction: row;
        padding: .75rem 1rem;
        gap: .75rem;
        font-size: .9rem;
      }
      .wheel-item:hover { transform: translateY(-2px) !important; }
      .wheel-item .w-icon { font-size: 1.3rem; }
    }
  </style>
</head>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);

    function updateIcons() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.querySelectorAll('.icon-dark').forEach(el => el.style.display = isDark ? '' : 'none');
      document.querySelectorAll('.icon-light').forEach(el => el.style.display = isDark ? 'none' : '');
    }
    updateIcons();
    const observer = new MutationObserver(updateIcons);
    observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        document.getElementById('img-modal').classList.remove('active');
        document.getElementById('rockfield-modal').classList.remove('active');
        document.getElementById('unit-modal').classList.remove('active');
      }
    });
  </script>
