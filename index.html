<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Titan Canyon</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d1117;
      --bg2: #161b22;
      --card: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #79c0ff;
      --accent-hover: #a5d4ff;
      --shadow: rgba(0,0,0,0.4);
    }
    :root[data-theme="light"] {
      --bg: #f6f8fa;
      --bg2: #ffffff;
      --card: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #656d76;
      --accent: #1f75d4;
      --accent-hover: #0550ae;
      --shadow: rgba(0,0,0,0.1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.3s, color 0.3s;
    }

    .theme-toggle {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.25rem;
      color: var(--text);
      transition: background 0.3s, border-color 0.3s, transform 0.2s;
      box-shadow: 0 2px 8px var(--shadow);
      z-index: 10;
    }
    .theme-toggle:hover { transform: scale(1.1); }
    [data-theme="dark"] .theme-toggle .icon-light { display: none; }
    [data-theme="light"] .theme-toggle .icon-dark { display: none; }

    .container {
      width: 100%;
      max-width: 480px;
      padding: 2rem 1.5rem;
      text-align: center;
    }

    .logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--border);
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 16px var(--shadow);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 0.25rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 0.875rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 0.875rem 1.25rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .link-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px var(--shadow);
      transform: translateY(-2px);
    }
    .link-card .icon {
      font-size: 1.35rem;
      flex-shrink: 0;
      width: 2rem;
      text-align: center;
    }
    .link-card .label {
      flex: 1;
      text-align: left;
    }
    .link-card .arrow {
      color: var(--muted);
      font-size: 0.85rem;
      transition: color 0.2s;
    }
    .link-card:hover .arrow { color: var(--accent); }

    /* Image modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      cursor: pointer;
    }
    .modal-overlay.active { display: flex; }
    .modal-overlay img {
      max-width: 100%;
      max-height: 90vh;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }

    footer {
      position: fixed;
      bottom: 1rem;
      color: var(--muted);
      font-size: 0.8rem;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span class="icon-dark">&#9790;</span>
    <span class="icon-light">&#9728;&#65039;</span>
  </button>

  <div class="container">
    <img src="https://i.ibb.co/nstngp1T/6a3f661d-de19-405b-8327-87d26732ab62-2.jpg" alt="Titan Canyon" class="logo">
    <h1>Titan Canyon</h1>
    <p class="subtitle">Server 2864</p>

    <div class="links">
      <a href="https://forms.gle/2UaSmMxZEfVfhh617" target="_blank" rel="noopener" class="link-card">
        <span class="icon">&#128221;</span>
        <span class="label">Titan Canyon Signups</span>
        <span class="arrow">&#8594;</span>
      </a>

      <a href="https://titan.2864tw.com" target="_blank" rel="noopener" class="link-card">
        <span class="icon">&#128202;</span>
        <span class="label">Titan Canyon Rosters</span>
        <span class="arrow">&#8594;</span>
      </a>

      <a href="#" class="link-card" onclick="event.preventDefault(); document.getElementById('img-modal').classList.add('active');">
        <span class="icon">&#128247;</span>
        <span class="label">View Canyon Image</span>
        <span class="arrow">&#8594;</span>
      </a>
    </div>
  </div>

  <div id="img-modal" class="modal-overlay" onclick="this.classList.remove('active')">
    <img src="https://i.ibb.co/nstngp1T/6a3f661d-de19-405b-8327-87d26732ab62-2.jpg" alt="Titan Canyon">
  </div>

  <footer>
    <a href="https://github.com/texnottexas" target="_blank">texnottexas</a>
  </footer>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    }
    // Restore saved theme
    const saved = localStorage.getItem('theme');
    if (saved) document.documentElement.setAttribute('data-theme', saved);
  </script>
</body>
</html>
