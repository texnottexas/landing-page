<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Replay — Server 2864</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--card:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#79c0ff;--green:#3fb950;--red:#f85149;--gold:#d29922;--navy:#388bfd;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:1rem;}
header h1{font-size:1.1rem;font-weight:700;}
header h1 span{color:var(--accent);}
.home-btn{display:flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .6rem;text-decoration:none;transition:all .15s;}
.home-btn:hover{border-color:var(--accent);color:var(--accent);}
.bnp-wrap{position:relative;display:inline-flex;}
#bnpBtn{background:none;border:1px solid var(--border);border-radius:8px;padding:.3rem .45rem;color:var(--muted);cursor:pointer;display:flex;align-items:center;}
#bnpBtn:hover{border-color:var(--accent);color:var(--accent);}
#bnpPop{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.4rem;z-index:500;min-width:168px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
#bnpPop.open{display:block;}
.bnp-link{display:block;padding:.35rem .6rem;font-size:.78rem;color:var(--muted);text-decoration:none;border-radius:6px;white-space:nowrap;}
.bnp-link:hover{background:rgba(121,192,255,.08);color:var(--text);}
.bnp-link.bnp-cur{color:var(--accent);font-weight:600;pointer-events:none;}
.main{flex:1;display:flex;flex-direction:column;padding:1rem;gap:1rem;max-width:1100px;margin:0 auto;width:100%;}
.search-row{display:flex;gap:.5rem;}
.search-row input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.5rem .75rem;font-size:.9rem;font-family:inherit;}
.search-row input:focus{outline:none;border-color:var(--accent);}
.search-row button{background:var(--accent);color:var(--bg);border:none;border-radius:8px;padding:.5rem 1.1rem;font-size:.85rem;font-weight:600;cursor:pointer;}
.search-row button:hover{opacity:.85;}
#status{font-size:.85rem;color:var(--muted);min-height:1.2em;}
#report-ui{display:none;flex-direction:column;gap:1rem;}
.vs-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.75rem 1.25rem;display:flex;align-items:center;gap:1rem;}
.vs-side{flex:1;}
.vs-name{font-size:1rem;font-weight:700;margin-bottom:.2rem;}
.vs-cp{font-size:.78rem;color:var(--muted);}
.vs-result{font-size:.7rem;font-weight:700;padding:.15rem .5rem;border-radius:4px;display:inline-block;margin-top:.25rem;}
.vs-result.win{background:rgba(63,185,80,.15);color:var(--green);}
.vs-result.loss{background:rgba(248,81,73,.15);color:var(--red);}
.vs-center{text-align:center;font-size:1.5rem;font-weight:800;color:var(--muted);}
.vs-troops{font-size:.72rem;color:var(--muted);margin-top:.1rem;}
.battle-area{display:flex;gap:1rem;align-items:flex-start;}
#battle-canvas{background:var(--card);border:1px solid var(--border);border-radius:12px;display:block;flex-shrink:0;}
.side-panel{flex:1;display:flex;flex-direction:column;gap:.75rem;min-width:0;}
.round-info{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem;}
.round-info h3{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;}
.event-list{display:flex;flex-direction:column;gap:.25rem;max-height:200px;overflow-y:auto;}
.event-item{font-size:.75rem;padding:.25rem .5rem;border-radius:5px;border-left:3px solid;}
.event-item.attack{border-color:var(--red);background:rgba(248,81,73,.07);}
.event-item.skill{border-color:var(--accent);background:rgba(121,192,255,.07);}
.event-item.buff{border-color:var(--gold);background:rgba(210,153,34,.07);}
.event-item.death{border-color:var(--muted);background:rgba(139,148,158,.07);}
.event-item.formation{border-color:var(--green);background:rgba(63,185,80,.07);}
.heroes-panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem;}
.heroes-panel h3{font-size:.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem;}
.hero-row{display:flex;gap:.4rem;flex-wrap:wrap;}
.hero-chip{display:flex;align-items:center;gap:.3rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.2rem .4rem;font-size:.72rem;}
.hero-chip img{width:24px;height:24px;border-radius:3px;object-fit:cover;}
.controls{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
.ctrl-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.3rem .6rem;font-size:.8rem;cursor:pointer;transition:all .15s;}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent);}
.ctrl-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.ctrl-sep{width:1px;height:1.5rem;background:var(--border);}
.round-display{font-size:.85rem;color:var(--text);font-weight:600;margin-left:auto;}
.round-display span{color:var(--muted);font-weight:400;}
.speed-group{display:flex;gap:.25rem;}
.progress-row{display:flex;align-items:center;gap:.75rem;padding:0 .25rem;}
.progress-bar{flex:1;height:6px;background:var(--surface);border-radius:3px;cursor:pointer;position:relative;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;}
.footer{background:var(--surface);border-top:1px solid var(--border);padding:.6rem;text-align:center;font-size:.72rem;color:var(--muted);}
.footer a{color:var(--accent);text-decoration:none;}
</style>
</head>

<script>
'use strict';
// ─── Constants ────────────────────────────────────────────────────────────────
var CDN_BASE = 'https://fight-report-va.oss-accelerate.aliyuncs.com/prod/';
var HERO_IMG = 'https://h5.topwargame.com/DynRes/images/headpic/hero_icon{id}_global.png?t=22.jpg';

// process[] event types decoded from game source analysis
var EVT = {
  UNIT_REGISTER:   1,  // source=unitUUID, val=gridPosition
  UNIT_ATTACK:     2,  // source=uuid, target=uuid, val=newHP, eValue=dmgDealt
  SKILL_SELF_BUFF: 3,  // source=uuid, hero=heroId, skill=skillId (passive self-buff)
  BATTLE_INIT:     4,  // val=teamCount (always 1 event)
  HERO_SKILL_ACT:  5,  // source=uuid, hero=heroId, skill=skillId (active activation)
  HERO_REGISTER:   6,  // hero=heroId, source=0 (roster registration)
  HERO_SKILL_HIT:  7,  // source=uuid, target=uuid, hero=heroId, val=damage
  UNIT_INIT_STATS: 9,  // source=uuid, val=HP, selfVal=shield
  EQUIP_SKILL:    11,  // source=teamId, target=uuid, skill=runeSkillId
  BUFF_DAMAGE:    14,  // source=uuid, target=uuid, buffId=id, val=damage
  UNIT_DEATH:     19,  // source=uuid (unit fully eliminated)
  FORMATION_SKILL:25,  // source=uuid, skill=formationSkillId, val=buffId
  MECHA_ACTION:   27,  // source=mechaUUID, val=actionValue
  TEAM_SETUP:     30,  // source=attTeamId, target=defTeamId
  STAGE_REGISTER: 31,  // val=stageIndex
  BUFF_APPLY_MULTI:32, // source=uuid, targets=csv(uuids), buffId=id
  UNIT_TURN_START:33,  // source=uuid (unit takes turn)
  STAGE_CHANGE:   35,  // val=stageNum, selfVal=totalStages
  RUNE_ACTIVATE:  37   // source=uuid, hero=heroId, skill=runeSkillId
};

// Grid position index -> {row, col}
// Positions: 1,2,3=row0; 11,12,13=row1; 21,22,23=row2
function posToGrid(pos) {
  var p = parseInt(pos, 10);
  return { row: Math.floor((p - 1) / 10), col: (p - 1) % 10 };
}

// ─── State ────────────────────────────────────────────────────────────────────
var reportData = null;
var combatRounds = [];   // sorted tl values >= 1800 (real fight ticks)
var currentRoundIdx = 0;
var isPlaying = false;
var speed = 1;
var units = {};          // uuid -> unit object
var floatTexts = [];     // damage numbers floating up
var animFrame = null;
var lastAdvTime = 0;
var AUTO_MS = 1600;      // ms per round at 1x

// ─── Load ─────────────────────────────────────────────────────────────────────
function loadReport() {
  var rawId = document.getElementById('report-id').value.trim();
  var id = rawId.replace(/[^0-9]/g, '');
  if (!id) return;
  setStatus('Loading\u2026');
  var url = CDN_BASE + id.substring(0, 4) + '/' + id + '.json';
  fetch(url)
    .then(function(r) {
      if (!r.ok) throw new Error('Report not found (HTTP ' + r.status + ')');
      return r.json();
    })
    .then(function(data) {
      if (!data.battle) throw new Error('Invalid report format');
      setStatus('');
      parseReport(data);
      history.replaceState(null, '', '?id=' + id);
    })
    .catch(function(err) { setStatus('\u2717 ' + err.message); });
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

// ─── Parse ────────────────────────────────────────────────────────────────────
function parseReport(data) {
  reportData = data;
  units = {};
  floatTexts = [];
  currentRoundIdx = 0;
  isPlaying = false;

  var battle = data.battle;
  var proc = battle.process;

  // Register formation units from units[] arrays (known UUIDs and armyIds)
  function regUnit(u, side) {
    units[String(u.uuid)] = {
      uuid: String(u.uuid), side: side, armyId: u.armyId,
      pos: null, hp: 0, maxHp: 0, shield: 0, maxShield: 0,
      dead: false, x: 0, y: 0
    };
  }
  (battle.attacker.units || []).forEach(function(u) { regUnit(u, 'att'); });
  (battle.defender.units || []).forEach(function(u) { regUnit(u, 'def'); });

  // Process setup events (tl=0)
  var i, e;
  for (i = 0; i < proc.length; i++) {
    e = proc[i];
    var src = String(e.source || '');
    if (e.t === EVT.UNIT_REGISTER) {
      if (!units[src]) {
        units[src] = { uuid: src, side: null, armyId: null, pos: null, hp: 0, maxHp: 0, shield: 0, maxShield: 0, dead: false, x: 0, y: 0 };
      }
      units[src].pos = parseInt(e.val, 10);
    } else if (e.t === EVT.UNIT_INIT_STATS) {
      if (!units[src]) {
        units[src] = { uuid: src, side: null, armyId: null, pos: null, hp: 0, maxHp: 0, shield: 0, maxShield: 0, dead: false, x: 0, y: 0 };
      }
      units[src].hp = e.val;
      units[src].maxHp = e.val;
      units[src].shield = e.selfVal;
      units[src].maxShield = e.selfVal;
    }
  }

  // Infer side for any units without it from position pairing
  var posBySide = {};
  Object.keys(units).forEach(function(uuid) {
    var u = units[uuid];
    if (u.pos && u.side) {
      if (!posBySide[u.pos]) posBySide[u.pos] = {};
      posBySide[u.pos][u.side] = true;
    }
  });
  Object.keys(units).forEach(function(uuid) {
    var u = units[uuid];
    if (u.pos && !u.side) {
      var occ = posBySide[u.pos] || {};
      u.side = occ.att ? 'def' : 'att';
    }
  });

  // Build timeline
  var tlSet = Object.create(null);
  proc.forEach(function(ev) { tlSet[ev.tl || 0] = true; });
  var allTLs = Object.keys(tlSet).map(Number).sort(function(a, b) { return a - b; });
  combatRounds = allTLs.filter(function(tl) { return tl >= 1800; });

  // Compute canvas positions
  computeUnitPositions();

  // Render UI
  renderVSBar(battle);
  renderHeroes(battle);
  document.getElementById('report-ui').style.display = 'flex';
  document.getElementById('report-ui').style.flexDirection = 'column';

  // Init canvas
  canvas = document.getElementById('battle-canvas');
  ctx = canvas.getContext('2d');

  // Snapshot initial HP (used for reset)
  Object.keys(units).forEach(function(uuid) {
    var u = units[uuid];
    u._initHp = u.hp;
    u._initShield = u.shield;
  });

  applyEventsUpTo(-1);
  drawBattle();
  updateRoundDisplay();
  updateEventList(-1);
  startRenderLoop();
}

function computeUnitPositions() {
  var W = 600, H = 400;
  var MARGIN = 60;
  var CW = (W - MARGIN * 2) / 3;
  var RH = (H - MARGIN * 2) / 3;
  var OFF = 28;

  Object.keys(units).forEach(function(uuid) {
    var u = units[uuid];
    if (!u.pos) return;
    var g = posToGrid(u.pos);
    var cx = MARGIN + g.col * CW + CW / 2;
    var cy = MARGIN + g.row * RH + RH / 2;
    u.x = u.side === 'att' ? cx - OFF : cx + OFF;
    u.y = u.side === 'att' ? cy + OFF : cy - OFF;
  });
}

// Apply all events up through the given combat round index
function applyEventsUpTo(roundIdx) {
  // Reset to initial
  Object.keys(units).forEach(function(uuid) {
    var u = units[uuid];
    u.hp = u._initHp || u.maxHp;
    u.shield = u._initShield || u.maxShield;
    u.dead = false;
  });

  if (roundIdx < 0 || combatRounds.length === 0) return;
  var maxTL = combatRounds[Math.min(roundIdx, combatRounds.length - 1)];
  var proc = reportData.battle.process;

  for (var i = 0; i < proc.length; i++) {
    var e = proc[i];
    var tl = e.tl || 0;
    if (tl === 0 || tl > maxTL) continue;

    if (e.t === EVT.UNIT_ATTACK && e.target) {
      var tgt = units[String(e.target)];
      if (tgt) tgt.hp = e.val;
    } else if (e.t === EVT.UNIT_DEATH && e.source) {
      var dying = units[String(e.source)];
      if (dying) { dying.dead = true; dying.hp = 0; }
    }
  }
}

// ─── Canvas ───────────────────────────────────────────────────────────────────
var canvas, ctx;
var UNIT_R = 26;
var C = {
  bg: '#0d1117', border: '#30363d', muted: '#8b949e', gold: '#d29922',
  att: '#388bfd', attB: '#79c0ff', def: '#f85149', defB: '#ff7b72', dead: '#30363d'
};

function drawBattle() {
  var W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  // Background
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  var MARGIN = 60, CW = (W - MARGIN * 2) / 3, RH = (H - MARGIN * 2) / 3;
  ctx.strokeStyle = C.border;
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3, 8]);
  for (var c = 1; c < 3; c++) {
    ctx.beginPath();
    ctx.moveTo(MARGIN + c * CW, MARGIN);
    ctx.lineTo(MARGIN + c * CW, H - MARGIN);
    ctx.stroke();
  }
  for (var r = 1; r < 3; r++) {
    ctx.beginPath();
    ctx.moveTo(MARGIN, MARGIN + r * RH);
    ctx.lineTo(W - MARGIN, MARGIN + r * RH);
    ctx.stroke();
  }
  ctx.setLineDash([]);

  // Diagonal separator
  ctx.strokeStyle = 'rgba(48,54,61,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(W * 0.08, 0);
  ctx.lineTo(W, H * 0.88);
  ctx.stroke();

  // Side labels
  ctx.font = 'bold 10px system-ui';
  ctx.fillStyle = C.att;
  ctx.fillText('ATTACKER', 10, 16);
  ctx.fillStyle = C.def;
  ctx.textAlign = 'right';
  ctx.fillText('DEFENDER', W - 10, H - 6);
  ctx.textAlign = 'left';

  // Units
  Object.keys(units).forEach(function(uuid) { drawUnit(units[uuid]); });

  // Float texts
  for (var fi = floatTexts.length - 1; fi >= 0; fi--) {
    var ft = floatTexts[fi];
    ctx.globalAlpha = ft.a;
    ctx.font = 'bold 12px system-ui';
    ctx.fillStyle = ft.color;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.globalAlpha = 1;
    ft.y -= ft.dy;
    ft.a -= 0.016;
    if (ft.a <= 0) floatTexts.splice(fi, 1);
  }
  ctx.textAlign = 'left';
}

function drawUnit(u) {
  if (!u.pos || !u.x) return;
  var x = u.x, y = u.y, r = UNIT_R;
  var isAtt = u.side === 'att';
  var color = u.dead ? C.dead : (isAtt ? C.att : C.def);
  var bright = isAtt ? C.attB : C.defB;

  ctx.globalAlpha = u.dead ? 0.22 : 1;
  if (!u.dead) { ctx.shadowColor = color; ctx.shadowBlur = 6; }

  // Fill
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = u.dead ? '#1c2128' : (isAtt ? 'rgba(56,139,253,0.12)' : 'rgba(248,81,73,0.12)');
  ctx.fill();

  // Border
  ctx.strokeStyle = color;
  ctx.lineWidth = u.dead ? 1 : 2;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // HP arc
  if (!u.dead && u.maxHp > 0) {
    var pct = Math.max(0, Math.min(1, u.hp / u.maxHp));
    var s = -Math.PI * 0.75, sweep = Math.PI * 1.5;
    ctx.beginPath();
    ctx.arc(x, y, r + 5, s, s + sweep);
    ctx.strokeStyle = '#30363d';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x, y, r + 5, s, s + sweep * pct);
    ctx.strokeStyle = pct > 0.5 ? bright : (pct > 0.25 ? C.gold : C.def);
    ctx.lineWidth = 3;
    ctx.stroke();
  }

  // Label
  ctx.font = '9px system-ui';
  ctx.fillStyle = C.muted;
  ctx.textAlign = 'center';
  ctx.fillText('P' + u.pos, x, y - r - 8);

  ctx.font = 'bold 9px system-ui';
  ctx.fillStyle = u.dead ? '#30363d' : bright;
  ctx.fillText(armyAbbr(u.armyId), x, y + 4);

  if (u.dead) {
    ctx.font = 'bold 14px system-ui';
    ctx.fillStyle = '#f85149';
    ctx.fillText('X', x, y + 5);
  }

  ctx.textAlign = 'left';
  ctx.globalAlpha = 1;
}

function armyAbbr(id) {
  if (!id) return '?';
  var n = parseInt(id, 10);
  if (n === 901103 || n === 905103 || n === 906103) return 'VLH';
  if (n >= 500000 && n < 700000) return 'MCH';
  if (n >= 100000 && n < 200000) return 'LND';
  if (n >= 200000 && n < 300000) return 'SEA';
  if (n >= 300000 && n < 400000) return 'AIR';
  return String(id).slice(-3);
}

function addFloat(x, y, text, color) {
  floatTexts.push({
    x: x + (Math.random() - 0.5) * 18,
    y: y - 15,
    text: text, color: color,
    a: 1.0, dy: 0.7 + Math.random() * 0.4
  });
}

// ─── Render Loop ──────────────────────────────────────────────────────────────
function startRenderLoop() {
  if (animFrame) cancelAnimationFrame(animFrame);
  function tick(ts) {
    if (isPlaying) {
      if (ts - lastAdvTime > AUTO_MS / speed) {
        lastAdvTime = ts;
        if (currentRoundIdx < combatRounds.length - 1) {
          stepRound(1);
        } else {
          togglePlay();
        }
      }
    }
    drawBattle();
    animFrame = requestAnimationFrame(tick);
  }
  animFrame = requestAnimationFrame(tick);
}

// ─── Round Navigation ─────────────────────────────────────────────────────────
function gotoRound(idx) {
  currentRoundIdx = Math.max(0, Math.min(combatRounds.length - 1, idx));
  applyEventsUpTo(currentRoundIdx);
  spawnFloats(currentRoundIdx);
  updateRoundDisplay();
  updateEventList(currentRoundIdx);
}

function stepRound(dir) { gotoRound(currentRoundIdx + dir); }

function spawnFloats(roundIdx) {
  if (!reportData || roundIdx < 0 || roundIdx >= combatRounds.length) return;
  var tl = combatRounds[roundIdx];
  var proc = reportData.battle.process;
  var seenDmg = Object.create(null);

  for (var i = 0; i < proc.length; i++) {
    var e = proc[i];
    if ((e.tl || 0) !== tl) continue;
    if (e.t === EVT.UNIT_ATTACK && e.target && e.eValue && !seenDmg[e.target]) {
      var u = units[String(e.target)];
      if (u) { addFloat(u.x, u.y, '-' + fmtNum(e.eValue), u.side === 'att' ? '#ff7b72' : C.def); }
      seenDmg[e.target] = true;
    } else if (e.t === EVT.HERO_SKILL_HIT && e.target && e.val) {
      var tu = units[String(e.target)];
      if (tu) addFloat(tu.x, tu.y - 18, fmtNum(e.val), C.gold);
    } else if (e.t === EVT.UNIT_DEATH && e.source) {
      var du = units[String(e.source)];
      if (du) addFloat(du.x, du.y, 'KO', C.muted);
    }
  }
}

function updateRoundDisplay() {
  var el = document.getElementById('round-display');
  if (!combatRounds.length) { el.textContent = 'Round — / —'; return; }
  var rNum = currentRoundIdx + 1, rTotal = combatRounds.length;
  el.textContent = '';
  el.appendChild(document.createTextNode('Round ' + rNum + ' '));
  var span = document.createElement('span');
  span.textContent = '/ ' + rTotal;
  el.appendChild(span);

  var pct = rTotal > 1 ? (currentRoundIdx / (rTotal - 1)) * 100 : 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function updateEventList(roundIdx) {
  var header = document.getElementById('round-header');
  var list = document.getElementById('event-list');
  list.textContent = '';

  if (!reportData || roundIdx < 0 || roundIdx >= combatRounds.length) {
    header.textContent = 'Round Events';
    return;
  }

  var tl = combatRounds[roundIdx];
  header.textContent = 'Round ' + (roundIdx + 1) + ' Events';

  var proc = reportData.battle.process;
  var attackDmg = 0, attackCount = 0;
  var skillDmg = Object.create(null);
  var buffDmg = 0, buffCount = 0;
  var deaths = 0;
  var formations = [];

  for (var i = 0; i < proc.length; i++) {
    var e = proc[i];
    if ((e.tl || 0) !== tl) continue;
    if (e.t === EVT.UNIT_ATTACK && e.eValue) { attackDmg += e.eValue; attackCount++; }
    else if (e.t === EVT.HERO_SKILL_HIT && e.hero && e.val) { skillDmg[e.hero] = (skillDmg[e.hero] || 0) + e.val; }
    else if (e.t === EVT.BUFF_DAMAGE && e.val) { buffDmg += e.val; buffCount++; }
    else if (e.t === EVT.UNIT_DEATH) { deaths++; }
    else if (e.t === EVT.FORMATION_SKILL && e.skill) { formations.push(e.skill); }
  }

  function addItem(cls, text) {
    var div = document.createElement('div');
    div.className = 'event-item ' + cls;
    div.textContent = text;
    list.appendChild(div);
  }

  if (attackCount > 0) addItem('attack', '\u2694 ' + attackCount + ' attacks \u2014 ' + fmtNum(attackDmg) + ' total dmg');
  Object.keys(skillDmg).forEach(function(hero) { addItem('skill', '\u2736 Hero ' + hero + ' \u2014 ' + fmtNum(skillDmg[hero]) + ' dmg'); });
  if (buffCount > 0) addItem('buff', '\u26a1 ' + buffCount + ' buff ticks \u2014 ' + fmtNum(buffDmg) + ' dmg');
  formations.forEach(function(sk) {
    addItem('formation', '\u25c8 ' + (sk === 941215 ? 'Counterblow' : 'Formation skill ' + sk));
  });
  if (deaths > 0) addItem('death', '\u2715 ' + deaths + ' unit' + (deaths > 1 ? 's' : '') + ' eliminated');

  if (!list.childNodes.length) {
    var empty = document.createElement('div');
    empty.style.cssText = 'font-size:.75rem;color:var(--muted)';
    empty.textContent = 'No combat events';
    list.appendChild(empty);
  }
}

// ─── VS Bar (DOM-built, no innerHTML) ────────────────────────────────────────
function renderVSBar(battle) {
  var fm = battle.fightMarches[0] || {};
  var bar = document.getElementById('vs-bar');
  bar.textContent = '';

  function sideDiv(name, cp, troops, won, color) {
    var col = document.createElement('div'); col.className = 'vs-side';
    var nameEl = document.createElement('div'); nameEl.className = 'vs-name'; nameEl.style.color = color; nameEl.textContent = name; col.appendChild(nameEl);
    var cpEl = document.createElement('div'); cpEl.className = 'vs-cp'; cpEl.textContent = 'CP ' + fmtNum(cp); col.appendChild(cpEl);
    var trEl = document.createElement('div'); trEl.className = 'vs-troops'; trEl.textContent = troops + ' troops'; col.appendChild(trEl);
    var res = document.createElement('div'); res.className = 'vs-result ' + (won ? 'win' : 'loss'); res.textContent = won ? 'VICTORY' : 'DEFEAT'; col.appendChild(res);
    return col;
  }

  var attWon = battle.result === 1;
  bar.appendChild(sideDiv(getPlayerName(battle.attacker), fm.attBattlePowerVal || 0, fm.attArmyNum || 0, attWon, '#388bfd'));
  var vsEl = document.createElement('div'); vsEl.className = 'vs-center'; vsEl.textContent = 'VS'; bar.appendChild(vsEl);
  bar.appendChild(sideDiv(getPlayerName(battle.defender), fm.defBattlePowerVal || 0, fm.defArmyNum || 0, !attWon, '#f85149'));

  var meta = document.createElement('div');
  meta.style.cssText = 'font-size:.72rem;color:var(--muted);margin-left:auto;align-self:flex-start;text-align:right;';
  meta.textContent = 'fightType ' + battle.fightType + ' \u2014 ' + new Date(reportData.logtime * 1000).toLocaleDateString();
  bar.appendChild(meta);
}

function getPlayerName(side) {
  try {
    var players = side.players || [];
    if (players.length) {
      var info = JSON.parse(players[0].playerInfo || '{}');
      return info.username || info.nickname || 'Unknown';
    }
  } catch (ignored) {}
  return 'Unknown';
}

// ─── Heroes (DOM-built, no innerHTML) ────────────────────────────────────────
function renderHeroes(battle) {
  function buildChips(players, containerId) {
    var container = document.getElementById(containerId);
    container.textContent = '';
    if (!players || !players[0]) return;
    (players[0].heroList || []).forEach(function(h) {
      var chip = document.createElement('div'); chip.className = 'hero-chip';
      var img = document.createElement('img');
      img.src = HERO_IMG.replace('{id}', h.id);
      img.alt = 'Hero ' + h.id;
      img.style.cssText = 'width:24px;height:24px;border-radius:3px;object-fit:cover;';
      img.addEventListener('error', function() { this.style.display = 'none'; });
      var lv = document.createElement('span'); lv.textContent = 'Lv.' + h.level;
      chip.appendChild(img); chip.appendChild(lv);
      container.appendChild(chip);
    });
  }
  buildChips(battle.attacker.players, 'att-heroes');
  buildChips(battle.defender.players, 'def-heroes');
}

// ─── Controls ─────────────────────────────────────────────────────────────────
function togglePlay() {
  isPlaying = !isPlaying;
  document.getElementById('btn-play').textContent = isPlaying ? '\u23F8' : '\u25B6';
  if (isPlaying) {
    if (currentRoundIdx >= combatRounds.length - 1) gotoRound(0);
    lastAdvTime = performance.now();
  }
}

function setSpeed(s, btn) {
  speed = s;
  document.querySelectorAll('.speed-group .ctrl-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
}

function seekProgress(evt) {
  var bar = document.getElementById('progress-bar');
  var rect = bar.getBoundingClientRect();
  var pct = Math.max(0, Math.min(1, (evt.clientX - rect.left) / rect.width));
  gotoRound(Math.round(pct * (combatRounds.length - 1)));
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function fmtNum(n) {
  if (!n && n !== 0) return '0';
  n = Math.abs(n);
  var tiers = [[1e33,'gg'],[1e30,'ff'],[1e27,'ee'],[1e24,'dd'],[1e21,'cc'],[1e18,'bb'],[1e15,'aa'],[1e12,'T'],[1e9,'B'],[1e6,'M'],[1e3,'K']];
  for (var i = 0; i < tiers.length; i++) {
    if (n >= tiers[i][0]) return (n / tiers[i][0]).toFixed(1).replace(/\.0$/, '') + tiers[i][1];
  }
  return Math.round(n).toLocaleString();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('click', function(e) {
  var pop = document.getElementById('bnpPop');
  if (pop && !pop.contains(e.target) && e.target.id !== 'bnpBtn' && !e.target.closest('#bnpBtn')) {
    pop.classList.remove('open');
  }
});

document.getElementById('report-id').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadReport();
});

(function() {
  var id = new URLSearchParams(window.location.search).get('id');
  if (id) { document.getElementById('report-id').value = id; loadReport(); }
})();
</script>
