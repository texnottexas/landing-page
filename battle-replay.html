<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battle Replay — Server 2864</title>
<style>
:root{--bg:#0d1117;--surface:#161b22;--card:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#79c0ff;--green:#3fb950;--red:#f85149;--gold:#d29922;--navy:#388bfd;--attColor:#388bfd;--defColor:#f85149;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
a{color:var(--accent);text-decoration:none;}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:.75rem 1.5rem;display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;}
header h1{font-size:1.1rem;font-weight:700;}header h1 span{color:var(--accent);}
.home-btn{display:flex;align-items:center;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .6rem;transition:all .15s;}
.home-btn:hover{border-color:var(--accent);color:var(--accent);}
.bnp-wrap{position:relative;display:inline-flex;}
#bnpBtn{background:none;border:1px solid var(--border);border-radius:8px;padding:.3rem .45rem;color:var(--muted);cursor:pointer;display:flex;align-items:center;}
#bnpBtn:hover{border-color:var(--accent);color:var(--accent);}
#bnpPop{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.4rem;z-index:500;min-width:168px;box-shadow:0 8px 24px rgba(0,0,0,.5);}
#bnpPop.open{display:block;}
.bnp-link{display:block;padding:.35rem .6rem;font-size:.78rem;color:var(--muted);border-radius:6px;white-space:nowrap;}
.bnp-link:hover{background:rgba(121,192,255,.08);color:var(--text);}
.bnp-link.bnp-cur{color:var(--accent);font-weight:600;pointer-events:none;}

/* Main */
.main{flex:1;padding:1rem;max-width:1300px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:.75rem;}
.search-row{display:flex;gap:.5rem;}
.search-row input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.5rem .75rem;font-size:.9rem;font-family:inherit;}
.search-row input:focus{outline:none;border-color:var(--accent);}
.search-row button{background:var(--accent);color:var(--bg);border:none;border-radius:8px;padding:.5rem 1.1rem;font-size:.85rem;font-weight:600;cursor:pointer;}
.search-row button:hover{opacity:.85;}
#status{font-size:.82rem;color:var(--muted);min-height:1.1em;}
#report-ui{display:none;flex-direction:column;gap:.75rem;}

/* VS Bar */
.vs-bar{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.65rem 1.1rem;display:flex;align-items:center;gap:.75rem;}
.vs-side{flex:1;}
.vs-name{font-size:.95rem;font-weight:700;}
.vs-sub{font-size:.72rem;color:var(--muted);margin-top:.1rem;}
.vs-badge{display:inline-block;font-size:.65rem;font-weight:700;padding:.1rem .4rem;border-radius:3px;margin-top:.2rem;}
.vs-badge.win{background:rgba(63,185,80,.15);color:var(--green);}
.vs-badge.loss{background:rgba(248,81,73,.15);color:var(--red);}
.vs-center{font-size:1.3rem;font-weight:800;color:var(--muted);padding:0 .5rem;}
.vs-meta{font-size:.68rem;color:var(--muted);text-align:right;white-space:nowrap;}

/* Battle Field */
.battle-field{display:flex;gap:.5rem;align-items:stretch;position:relative;}
.formation-panel{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.6rem;display:flex;flex-direction:column;gap:.4rem;}
.formation-panel.att{border-color:rgba(56,139,253,.3);}
.formation-panel.def{border-color:rgba(248,81,73,.3);}
.formation-header{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.2rem;text-align:center;}
.formation-header.att{color:var(--attColor);}
.formation-header.def{color:var(--defColor);}
.formation-row{display:flex;gap:.4rem;justify-content:center;}
/* Each unit cell */
.unit-cell{flex:1;max-width:120px;display:flex;flex-direction:column;align-items:center;gap:.15rem;padding:.35rem .2rem;border-radius:8px;border:1px solid var(--border);background:var(--surface);transition:background .15s,border-color .15s;cursor:default;min-width:0;}
.unit-cell:hover{background:var(--card);}
.unit-cell.active-att{border-color:var(--attColor);box-shadow:0 0 8px rgba(56,139,253,.3);}
.unit-cell.active-def{border-color:var(--defColor);box-shadow:0 0 8px rgba(248,81,73,.3);}
.unit-cell.dead{opacity:.25;filter:grayscale(1);}
.unit-pos-label{font-size:.58rem;color:var(--muted);line-height:1;}
.unit-icon-wrap{position:relative;width:52px;height:52px;}
.unit-icon-wrap img{width:52px;height:52px;object-fit:contain;border-radius:6px;}
.unit-hero-mini{position:absolute;bottom:-4px;right:-4px;width:22px;height:22px;border-radius:50%;border:2px solid var(--bg);object-fit:cover;}
.unit-hp-bar{width:100%;height:4px;background:#21262d;border-radius:2px;overflow:hidden;}
.unit-hp-fill{height:100%;border-radius:2px;transition:width .3s;}
.unit-hp-fill.high{background:var(--green);}
.unit-hp-fill.mid{background:var(--gold);}
.unit-hp-fill.low{background:var(--red);}
.unit-hero-name{font-size:.6rem;color:var(--text);font-weight:600;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%;}
.unit-type-label{font-size:.58rem;color:var(--muted);text-align:center;}
.unit-count{font-size:.58rem;color:var(--muted);}

/* VS divider */
.vs-divider{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.5rem;padding:0 .3rem;min-width:44px;}
.vs-divider-line{flex:1;width:1px;background:var(--border);}
.vs-divider-label{font-size:.85rem;font-weight:800;color:var(--muted);}

/* Heroes row */
.heroes-row{display:flex;gap:.5rem;}
.heroes-panel{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.5rem .75rem;}
.heroes-panel h3{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem;}
.hero-chips{display:flex;gap:.4rem;flex-wrap:wrap;}
.hero-chip{display:flex;align-items:center;gap:.3rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.2rem .5rem;font-size:.72rem;}
.hero-chip img{width:24px;height:24px;border-radius:50%;object-fit:cover;}
.hero-chip .hero-chip-skill{color:var(--muted);font-size:.66rem;}

/* Controls */
.controls-row{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.55rem .85rem;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.ctrl-btn{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:.28rem .55rem;font-size:.78rem;cursor:pointer;transition:all .15s;line-height:1;white-space:nowrap;}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent);}
.ctrl-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent);}
.ctrl-sep{width:1px;height:1.4rem;background:var(--border);}
.ctrl-label{font-size:.68rem;color:var(--muted);white-space:nowrap;padding:0 .1rem;}
.speed-group{display:flex;gap:.2rem;}
.round-display{font-size:.82rem;font-weight:600;margin-left:auto;white-space:nowrap;}
.round-display span{color:var(--muted);font-weight:400;}
.progress-bar-wrap{height:5px;background:var(--surface);border-radius:3px;cursor:pointer;overflow:visible;position:relative;}
.progress-fill{height:5px;background:var(--accent);border-radius:3px;pointer-events:none;}

/* Event panel */
.event-panel{display:flex;gap:.5rem;min-height:160px;}
.round-list-panel{width:200px;flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;flex-direction:column;}
.round-list-panel h3{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:.45rem .65rem;border-bottom:1px solid var(--border);}
.round-list{overflow-y:auto;flex:1;}
.round-list-item{padding:.28rem .65rem;font-size:.73rem;cursor:pointer;border-left:3px solid transparent;color:var(--muted);}
.round-list-item:hover{background:var(--surface);color:var(--text);}
.round-list-item.current{border-left-color:var(--accent);color:var(--text);background:rgba(121,192,255,.06);}
.event-log-panel{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;overflow:hidden;}
.event-log-header{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:.45rem .75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem;}
.event-log-header .step-btns{display:flex;gap:.25rem;margin-left:auto;}
.event-log-header button{background:var(--surface);border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:.15rem .4rem;font-size:.68rem;cursor:pointer;}
.event-log-header button:hover{color:var(--accent);border-color:var(--accent);}
.event-log{overflow-y:auto;flex:1;padding:.35rem .5rem;display:flex;flex-direction:column;gap:.2rem;}
.ev{display:flex;align-items:flex-start;gap:.4rem;padding:.25rem .4rem;border-radius:5px;font-size:.72rem;border-left:3px solid;}
.ev.attack{border-color:var(--red);background:rgba(248,81,73,.05);}
.ev.skill{border-color:var(--accent);background:rgba(121,192,255,.05);}
.ev.buff{border-color:var(--gold);background:rgba(210,153,34,.05);}
.ev.death{border-color:var(--muted);background:rgba(139,148,158,.05);}
.ev.formation{border-color:var(--green);background:rgba(63,185,80,.05);}
.ev.mecha{border-color:#d2a8ff;background:rgba(210,168,255,.05);}
.ev.init{border-color:var(--border);color:var(--muted);}
.ev-icon{flex-shrink:0;width:14px;text-align:center;margin-top:.05rem;}
.ev-body{flex:1;min-width:0;}
.ev-main{font-weight:600;color:var(--text);}
.ev-sub{color:var(--muted);font-size:.67rem;margin-top:.05rem;}
.ev-val{color:var(--red);font-weight:700;white-space:nowrap;}
.ev.current{outline:1px solid var(--accent);}

/* Highlight pulse */
@keyframes unit-flash{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}
.unit-cell.flash{animation:unit-flash .25s ease-out;}

footer{background:var(--surface);border-top:1px solid var(--border);padding:.55rem;text-align:center;font-size:.7rem;color:var(--muted);}
</style>
</head>

<header>
  <a href="https://2864tw.com" class="home-btn" title="Home"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></a>

  <h1>Battle <span>Replay</span></h1>
</header>

<div class="main">
  <div class="search-row">
    <input type="text" id="report-id" placeholder="Enter battle report ID…" autocomplete="off" spellcheck="false">
    <button onclick="loadReport()">Load</button>
  </div>
  <div id="status"></div>

  <div id="report-ui">
    <!-- VS Bar -->
    <div class="vs-bar" id="vs-bar"></div>

    <!-- Battle Field: Attacker | VS | Defender -->
    <div class="battle-field">
      <div class="formation-panel att" id="formation-att">
        <div class="formation-header att" id="att-header">ATTACKER</div>
        <!-- Rows injected by JS -->
      </div>
      <div class="vs-divider">
        <div class="vs-divider-line"></div>
        <div class="vs-divider-label">VS</div>
        <div class="vs-divider-line"></div>
      </div>
      <div class="formation-panel def" id="formation-def">
        <div class="formation-header def" id="def-header">DEFENDER</div>
      </div>
    </div>

    <!-- Heroes -->
    <div class="heroes-row">
      <div class="heroes-panel" id="heroes-att">
        <h3>Attacker Heroes</h3>
        <div class="hero-chips" id="att-hero-chips"></div>
      </div>
      <div class="heroes-panel" id="heroes-def">
        <h3>Defender Heroes</h3>
        <div class="hero-chips" id="def-hero-chips"></div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls-row">
      <span class="ctrl-label">Round</span>
      <button class="ctrl-btn" title="Jump to first round" onclick="gotoRound(0)">&#8676;</button>
      <button class="ctrl-btn" title="Previous round" onclick="stepRound(-1)">&#9668; Prev</button>
      <button class="ctrl-btn" id="btn-play" onclick="togglePlay()">&#9654; Play</button>
      <button class="ctrl-btn" title="Next round" onclick="stepRound(1)">Next &#9658;</button>
      <button class="ctrl-btn" title="Jump to last round" onclick="gotoRound(99999)">&#8677;</button>
      <div class="ctrl-sep"></div>
      <span class="ctrl-label">Speed</span>
      <div class="speed-group">
        <button class="ctrl-btn active" onclick="setSpeed(1,this)">1x</button>
        <button class="ctrl-btn" onclick="setSpeed(2,this)">2x</button>
        <button class="ctrl-btn" onclick="setSpeed(4,this)">4x</button>
      </div>
      <div class="ctrl-sep"></div>
      <span class="ctrl-label">Event</span>
      <div class="speed-group">
        <button class="ctrl-btn" onclick="stepEvent(-1)" title="Step to previous event">&#9650; Prev</button>
        <button class="ctrl-btn" onclick="stepEvent(1)" title="Step to next event">Next &#9660;</button>
      </div>
      <div class="round-display" id="round-display">Round <span>— / —</span></div>
    </div>
    <div class="progress-bar-wrap" id="progress-bar" onclick="seekProgress(event)">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>

    <!-- Event Panel -->
    <div class="event-panel">
      <div class="round-list-panel">
        <h3>Rounds</h3>
        <div class="round-list" id="round-list"></div>
      </div>
      <div class="event-log-panel">
        <div class="event-log-header">
          <span id="event-log-title">Select a round</span>
        </div>
        <div class="event-log" id="event-log"></div>
      </div>
    </div>
  </div>
</div>

<script>
'use strict';

// ─── Constants ────────────────────────────────────────────────────────────────
var CDN = 'https://fight-report-va.oss-accelerate.aliyuncs.com/prod/';
var HERO_IMG = 'https://h5.topwargame.com/DynRes/images/headpic/hero_icon{id}_global.png?t=22.jpg';
var ASSET = 'https://raw.githubusercontent.com/texnottexas/landing-page/main/';

// armyId → icon path (from game's army TABLE: type 101=Army, 301=AF, plus mecha_id)
var ARMY_ICON = {
  901103: 'assets/unit-icons/ultra_valhalla_army_offense.png',
  905103: 'assets/unit-icons/ultra_valhalla_airforce_offense.png',
  906103: 'assets/unit-icons/ultra_valhalla_airforce_defense.png',
  505111: 'assets/mecha-icons/mecha_1005.png',
  506371: 'assets/mecha-icons/mecha_1006.png',
  // Fallbacks by type prefix
  _army_off: 'assets/unit-icons/ultra_valhalla_army_offense.png',
  _army_def: 'assets/unit-icons/ultra_valhalla_army_defense.png',
  _navy_off: 'assets/unit-icons/ultra_valhalla_navy_offense.png',
  _navy_def: 'assets/unit-icons/ultra_valhalla_nary_defense.png',
  _af_off:   'assets/unit-icons/ultra_valhalla_airforce_offense.png',
  _af_def:   'assets/unit-icons/ultra_valhalla_airforce_defense.png',
};
function armyIcon(id) {
  var rel;
  if (ARMY_ICON[id]) rel = ARMY_ICON[id];
  else {
    var n = parseInt(id, 10);
    if (n >= 500000 && n < 600000) rel = 'assets/mecha-icons/mecha_1005.png';
    else if (n >= 900000) rel = ARMY_ICON._army_off;
    else if (n >= 100000 && n < 200000) rel = ARMY_ICON._army_off;
    else if (n >= 200000 && n < 300000) rel = ARMY_ICON._navy_off;
    else if (n >= 300000 && n < 400000) rel = ARMY_ICON._af_off;
    else rel = ARMY_ICON._army_off;
  }
  return ASSET + rel;
}

// Fight type names
var FIGHT_TYPE = {
  1:'Alliance vs Alliance', 2:'Wasteland Battle', 3:'City Battle',
  4:'Resource Gathering', 5:'Counter-Attack', 6:'City Defense',
  21:'Time Clash / SVS Warzone', 86:'Loot Quest', 126:'Warzone Guardian'
};

// Army type name from armyId
function armyTypeName(u) {
  if (!u || !u.armyId) return '';
  var id = parseInt(u.armyId, 10);
  if (id >= 500000 && id < 600000) return 'Mecha';
  if (id >= 900000) return 'Valhalla';
  if (id >= 300000 && id < 400000) return 'Air Force';
  if (id >= 200000 && id < 300000) return 'Navy';
  if (id >= 100000 && id < 200000) return 'Army';
  return '';
}

// Buff ID → human name (decoded from process[] analysis)
var BUFF_NAMES = {
  100008: 'Counterblow', 100026: 'Counterblow', 100027: 'Counterblow',
  400218: 'Ignition DoT (Rune)', 400226: 'Flammable (Ignition Amp)', 400230: 'Rune Damage',
  935201: 'Titan Gear Effect', 935302: 'Titan Gear Damage', 935402: 'Titan Gear Damage',
  936004: 'Ignition Mark (Gear)', 936005: 'Ignition Tick', 936006: 'Ignition Tick',
  992232: 'Magnetic Pulse', 992318: 'Magnetic Pulse', 992323: 'Magnetic Pulse',
  992341: 'Skill Damage', 992364: 'Magnetic Pulse', 992367: 'Magnetic Pulse', 992459: 'Magnetic Pulse',
};
function buffName(id) { return BUFF_NAMES[id] || 'Buff #' + id; }

// Skill ID → name (hero skills from hero-skills.json; others hardcoded)
var SKILL_NAMES = {};
var RUNE_SKILL_PREFIXES = { 400: 'Rune Skill', 3001: 'Titan Gear Skill', 941: 'Formation Skill' };
function skillName(id) {
  if (SKILL_NAMES[id]) return SKILL_NAMES[id];
  var s = String(id);
  if (s.startsWith('4001')) return 'Rune Skill';
  if (s.startsWith('3001')) return 'Titan Gear Skill';
  if (s.startsWith('941')) return id === 941215 ? 'Counterblow' : 'Formation Skill';
  return 'Skill #' + id;
}

// Event type → display info
var EVT_INFO = {
  2:  { cls: 'attack',    icon: '\u2694', label: 'Attack' },
  3:  { cls: 'buff',      icon: '\u25a3', label: 'Self-Buff' },
  5:  { cls: 'skill',     icon: '\u2736', label: 'Skill' },
  7:  { cls: 'skill',     icon: '\u26a1', label: 'Skill Hit' },
  11: { cls: 'skill',     icon: '\u2605', label: 'Equip Skill' },
  14: { cls: 'buff',      icon: '\u1f525', label: 'Buff Dmg' },
  19: { cls: 'death',     icon: '\u2717', label: 'Eliminated' },
  25: { cls: 'formation', icon: '\u25c8', label: 'Formation' },
  27: { cls: 'mecha',     icon: '\u26b2', label: 'Mecha' },
  32: { cls: 'buff',      icon: '\u25d1', label: 'Buff Apply' },
  37: { cls: 'skill',     icon: '\u2744', label: 'Rune' },
};

// ─── State ────────────────────────────────────────────────────────────────────
var heroNameMap  = {};  // heroId → { name, skillName, skillId, iconUrl }
var unitMap      = {};  // uuid → { side, pos, armyId, hp, maxHp, shield, maxShield, dead, heroId, troopCount }
var combatRounds = [];  // sorted tl values >= 1800
var currentRoundIdx  = 0;
var currentEventIdx  = -1; // -1 = show all events for round
var isPlaying    = false;
var speed        = 1;
var lastAdvTime  = 0;
var AUTO_MS      = 1600;
var reportData   = null;
var playTimer    = null;

// ─── Load Data ────────────────────────────────────────────────────────────────
function loadReport() {
  var rawId = document.getElementById('report-id').value.trim();
  var id = rawId.replace(/[^0-9]/g, '');
  if (!id) return;
  setStatus('Loading\u2026');

  // Load hero data + report in parallel
  Promise.all([
    fetch(CDN + id.substring(0,4) + '/' + id + '.json').then(function(r) {
      if (!r.ok) throw new Error('Report not found (HTTP ' + r.status + ')');
      return r.json();
    }),
    fetch('data/all-heroes.json').then(function(r) { return r.json(); }).catch(function() { return []; }),
    fetch('data/hero-skills.json').then(function(r) { return r.json(); }).catch(function() { return []; }),
  ]).then(function(results) {
    var reportJSON = results[0];
    var heroesJSON = results[1];
    var skillsJSON = results[2];
    if (!reportJSON.battle) throw new Error('Invalid report format');

    // Build hero name map
    heroesJSON.forEach(function(h) {
      heroNameMap[h.heroId] = { name: h.displayName || ('Hero ' + h.heroId), iconUrl: h.iconSmall || HERO_IMG.replace('{id}', h.heroId), skillId: null, skillName: null };
    });

    // Build skill name map
    skillsJSON.forEach(function(s) {
      SKILL_NAMES[s.skillId] = s.skillName;
      if (heroNameMap[s.heroId]) {
        heroNameMap[s.heroId].skillId = s.skillId;
        heroNameMap[s.heroId].skillName = s.skillName;
      }
    });

    setStatus('');
    parseReport(reportJSON);
    history.replaceState(null, '', '?id=' + id);
  }).catch(function(err) { setStatus('\u2717 ' + err.message); });
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

// ─── Parse Report ─────────────────────────────────────────────────────────────
function parseReport(data) {
  reportData = data;
  unitMap = {};
  combatRounds = [];
  currentRoundIdx = 0;
  currentEventIdx = -1;
  isPlaying = false;

  var battle = data.battle;
  var proc = battle.process;

  // Register formation units
  function regUnit(u, side) {
    unitMap[String(u.uuid)] = { uuid: String(u.uuid), side: side, armyId: u.armyId, pos: null, hp: 0, maxHp: 0, shield: 0, maxShield: 0, dead: false, heroId: null, troopCount: 0 };
  }
  (battle.attacker.units || []).forEach(function(u) { regUnit(u, 'att'); });
  (battle.defender.units || []).forEach(function(u) { regUnit(u, 'def'); });

  // Process tl=0 setup events
  var i, e, src;
  for (i = 0; i < proc.length; i++) {
    e = proc[i]; src = String(e.source || '');
    if (e.t === 1) { // UNIT_REGISTER — position
      if (!unitMap[src]) unitMap[src] = { uuid: src, side: null, armyId: null, pos: null, hp: 0, maxHp: 0, shield: 0, maxShield: 0, dead: false, heroId: null, troopCount: 0 };
      unitMap[src].pos = parseInt(e.val, 10);
    } else if (e.t === 9) { // UNIT_INIT_STATS
      if (!unitMap[src]) unitMap[src] = { uuid: src, side: null, armyId: null, pos: null, hp: 0, maxHp: 0, shield: 0, maxShield: 0, dead: false, heroId: null, troopCount: 0 };
      unitMap[src].hp = e.val; unitMap[src].maxHp = e.val;
      unitMap[src].shield = e.selfVal; unitMap[src].maxShield = e.selfVal;
    }
  }

  // Infer side for units lacking it (defender UUIDs not in units[] initially)
  var posBySide = {};
  Object.keys(unitMap).forEach(function(uuid) {
    var u = unitMap[uuid];
    if (u.pos && u.side) { if (!posBySide[u.pos]) posBySide[u.pos] = {}; posBySide[u.pos][u.side] = true; }
  });
  Object.keys(unitMap).forEach(function(uuid) {
    var u = unitMap[uuid];
    if (u.pos && !u.side) u.side = (posBySide[u.pos] || {}).att ? 'def' : 'att';
  });

  // Troop counts from attPutArmyV2/defPutArmyV2
  var fm = battle.fightMarches[0] || {};
  var attPut = fm.attPutArmyV2 || [];
  var defPut = fm.defPutArmyV2 || [];
  // Build armyId → total count map per side
  function buildCountMap(putArr) {
    var m = {};
    putArr.forEach(function(e) { m[e.armyId] = (m[e.armyId] || 0) + (e.s0 || 0) + (e.s1 || 0); });
    return m;
  }
  var attCounts = buildCountMap(attPut);
  var defCounts = buildCountMap(defPut);
  var attSlots = (battle.attacker.units || []).length || 1;
  var defSlots = (battle.defender.units || []).length || 1;

  // Assign per-slot troop count (approximate)
  Object.keys(unitMap).forEach(function(uuid) {
    var u = unitMap[uuid];
    if (!u.armyId) return;
    var total = u.side === 'att' ? (attCounts[u.armyId] || 0) : (defCounts[u.armyId] || 0);
    var slots = u.side === 'att' ? attSlots : defSlots;
    u.troopCount = Math.round(total / slots);
  });

  // Hero→unit mapping: each hero's prep buffs (t=3) apply to ALL units on their side,
  // making per-slot assignment unreliable. Only mecha units (armyId 5xxxxx) have a
  // 1:1 hero relationship — identify via t=5 events filtered by side's heroList.
  var attHeroSet = Object.create(null), defHeroSet = Object.create(null);
  (battle.attacker.players || []).forEach(function(p) {
    (p.heroList || []).forEach(function(h) { attHeroSet[h.id] = true; });
  });
  (battle.defender.players || []).forEach(function(p) {
    (p.heroList || []).forEach(function(h) { defHeroSet[h.id] = true; });
  });
  for (var hi = 0; hi < proc.length; hi++) {
    var he = proc[hi];
    if (he.t !== 5 || !he.hero) continue;
    var hu = unitMap[String(he.source || '')];
    if (!hu || hu.heroId) continue;
    var hset = hu.side === 'att' ? attHeroSet : defHeroSet;
    if (!hset[he.hero]) continue;
    var hArmyId = parseInt(hu.armyId || 0, 10);
    if (hArmyId >= 500000 && hArmyId < 600000) hu.heroId = he.hero;
  }

  // Save initial stats for reset
  Object.keys(unitMap).forEach(function(uuid) {
    var u = unitMap[uuid];
    u._initHp = u.hp; u._initShield = u.shield;
  });

  // Build combat round timeline
  var tlSet = Object.create(null);
  proc.forEach(function(ev) { tlSet[ev.tl || 0] = true; });
  combatRounds = Object.keys(tlSet).map(Number).sort(function(a,b){return a-b;}).filter(function(tl){return tl>=1800;});

  // Build DOM
  showReportUI(battle, fm);

  // Start at round 0
  applyEventsUpTo(0);
  renderFormations();
  renderRoundList();
  updateRoundDisplay();
  updateEventLog(0);
  startLoop();
}

// ─── Formation Rendering ─────────────────────────────────────────────────────
function buildFormationGrid(side, panel) {
  panel.querySelectorAll('.formation-row').forEach(function(el){el.remove();});
  // 3 rows: row0=positions 1,2,3; row1=11,12,13; row2=21,22,23
  var ROWS = [[1,2,3],[11,12,13],[21,22,23]];
  ROWS.forEach(function(rowPositions) {
    var rowEl = document.createElement('div');
    rowEl.className = 'formation-row';
    // Defender columns are mirrored (3,2,1) so front faces center
    var cols = side === 'def' ? rowPositions.slice().reverse() : rowPositions;
    cols.forEach(function(pos) {
      var uuid = findUnitByPos(side, pos);
      var cell = buildUnitCell(uuid, pos, side);
      rowEl.appendChild(cell);
    });
    panel.appendChild(rowEl);
  });
}

function findUnitByPos(side, pos) {
  var found = null;
  Object.keys(unitMap).forEach(function(uuid) {
    var u = unitMap[uuid];
    if (u.side === side && u.pos === pos) found = uuid;
  });
  return found;
}

function buildUnitCell(uuid, pos, side) {
  var cell = document.createElement('div');
  cell.className = 'unit-cell';
  if (uuid) cell.setAttribute('data-uuid', uuid);
  cell.setAttribute('data-pos', pos);

  // Position label
  var posLbl = document.createElement('div');
  posLbl.className = 'unit-pos-label';
  posLbl.textContent = 'P' + pos;
  cell.appendChild(posLbl);

  // Icon wrap
  var wrap = document.createElement('div');
  wrap.className = 'unit-icon-wrap';
  var img = document.createElement('img');
  img.alt = 'Unit';
  if (uuid && unitMap[uuid] && unitMap[uuid].armyId) {
    img.src = armyIcon(unitMap[uuid].armyId);
  } else {
    img.src = armyIcon(0);
  }
  img.addEventListener('error', function() { this.style.opacity = '.3'; });
  wrap.appendChild(img);

  // Hero mini-portrait overlay
  if (uuid && unitMap[uuid] && unitMap[uuid].heroId) {
    var heroId = unitMap[uuid].heroId;
    var hInfo = heroNameMap[heroId];
    if (hInfo) {
      var heroImg = document.createElement('img');
      heroImg.className = 'unit-hero-mini';
      heroImg.src = hInfo.iconUrl;
      heroImg.alt = hInfo.name;
      heroImg.title = hInfo.name;
      heroImg.addEventListener('error', function() { this.style.display = 'none'; });
      wrap.appendChild(heroImg);
    }
  }
  cell.appendChild(wrap);

  // HP bar
  var hpBarWrap = document.createElement('div');
  hpBarWrap.className = 'unit-hp-bar';
  var hpFill = document.createElement('div');
  hpFill.className = 'unit-hp-fill high';
  hpFill.style.width = '100%';
  hpBarWrap.appendChild(hpFill);
  cell.appendChild(hpBarWrap);

  // Army type label
  var aType = uuid && unitMap[uuid] ? armyTypeName(unitMap[uuid]) : '';
  if (aType) {
    var typeLbl = document.createElement('div');
    typeLbl.className = 'unit-type-label';
    typeLbl.textContent = aType;
    cell.appendChild(typeLbl);
  }

  // Hero name (only for mecha heroes which have reliable 1:1 mapping)
  var heroName = document.createElement('div');
  heroName.className = 'unit-hero-name';
  if (uuid && unitMap[uuid] && unitMap[uuid].heroId && heroNameMap[unitMap[uuid].heroId]) {
    heroName.textContent = heroNameMap[unitMap[uuid].heroId].name;
  } else {
    heroName.textContent = '\u2014';
    heroName.style.color = 'var(--border)';
  }
  cell.appendChild(heroName);

  return cell;
}

function renderFormations() {
  var attPanel = document.getElementById('formation-att');
  var defPanel = document.getElementById('formation-def');
  buildFormationGrid('att', attPanel);
  buildFormationGrid('def', defPanel);
  updateUnitCells();
}

function updateUnitCells() {
  // Update all unit cells with current HP/dead state
  document.querySelectorAll('.unit-cell[data-uuid]').forEach(function(cell) {
    var uuid = cell.getAttribute('data-uuid');
    var u = unitMap[uuid];
    if (!u) return;

    cell.classList.toggle('dead', u.dead);

    // HP bar
    var fill = cell.querySelector('.unit-hp-fill');
    if (fill && u.maxHp > 0) {
      var pct = Math.max(0, Math.min(100, (u.hp / u.maxHp) * 100));
      fill.style.width = pct + '%';
      fill.className = 'unit-hp-fill ' + (pct > 50 ? 'high' : pct > 25 ? 'mid' : 'low');
    }
  });
}

function flashUnit(uuid) {
  var cell = document.querySelector('.unit-cell[data-uuid="' + uuid + '"]');
  if (!cell) return;
  cell.classList.remove('flash');
  void cell.offsetWidth; // reflow
  cell.classList.add('flash');
  setTimeout(function() { cell.classList.remove('flash'); }, 300);
}

// ─── Apply Events ─────────────────────────────────────────────────────────────
function applyEventsUpTo(roundIdx) {
  // Reset
  Object.keys(unitMap).forEach(function(uuid) {
    var u = unitMap[uuid];
    u.hp = u._initHp || u.maxHp;
    u.shield = u._initShield || u.maxShield;
    u.dead = false;
  });
  if (roundIdx < 0 || !combatRounds.length) return;
  var maxTL = combatRounds[Math.min(roundIdx, combatRounds.length-1)];
  var proc = reportData.battle.process;
  for (var i = 0; i < proc.length; i++) {
    var e = proc[i];
    var tl = e.tl || 0;
    if (tl === 0 || tl > maxTL) continue;
    if (e.t === 2 && e.target) {
      var t = unitMap[String(e.target)];
      if (t) t.hp = e.val;
    } else if (e.t === 19 && e.source) {
      var d = unitMap[String(e.source)];
      if (d) { d.dead = true; d.hp = 0; }
    }
  }
}

// ─── Heroes ───────────────────────────────────────────────────────────────────
function renderHeroes(battle) {
  function fill(players, containerId) {
    var el = document.getElementById(containerId);
    el.textContent = '';
    if (!players || !players[0]) return;
    (players[0].heroList || []).forEach(function(h) {
      var chip = document.createElement('div'); chip.className = 'hero-chip';
      var img = document.createElement('img');
      var hInfo = heroNameMap[h.id] || {};
      img.src = hInfo.iconUrl || HERO_IMG.replace('{id}', h.id);
      img.alt = ''; img.addEventListener('error', function() { this.style.display='none'; });
      var nameEl = document.createElement('span');
      nameEl.textContent = hInfo.name || ('Hero ' + h.id);
      chip.appendChild(img); chip.appendChild(nameEl);
      if (hInfo.skillName) {
        var sk = document.createElement('span'); sk.className = 'hero-chip-skill';
        sk.textContent = hInfo.skillName;
        chip.appendChild(sk);
      }
      el.appendChild(chip);
    });
  }
  fill(battle.attacker.players, 'att-hero-chips');
  fill(battle.defender.players, 'def-hero-chips');
}

// ─── VS Bar ───────────────────────────────────────────────────────────────────
function showReportUI(battle, fm) {
  var bar = document.getElementById('vs-bar');
  bar.textContent = '';

  function sideEl(name, cp, troops, won, color) {
    var d = document.createElement('div'); d.className = 'vs-side';
    var n = document.createElement('div'); n.className = 'vs-name'; n.style.color = color; n.textContent = name; d.appendChild(n);
    var s = document.createElement('div'); s.className = 'vs-sub'; s.textContent = 'CP ' + fmtNum(cp) + ' \u00b7 ' + troops + ' troops'; d.appendChild(s);
    var b = document.createElement('div'); b.className = 'vs-badge ' + (won ? 'win' : 'loss'); b.textContent = won ? 'VICTORY' : 'DEFEAT'; d.appendChild(b);
    return d;
  }
  var attWon = battle.result === 1;
  bar.appendChild(sideEl(getPlayerName(battle.attacker), fm.attBattlePowerVal||0, fm.attArmyNum||0, attWon, 'var(--attColor)'));
  var vs = document.createElement('div'); vs.className = 'vs-center'; vs.textContent = 'VS'; bar.appendChild(vs);
  bar.appendChild(sideEl(getPlayerName(battle.defender), fm.defBattlePowerVal||0, fm.defArmyNum||0, !attWon, 'var(--defColor)'));
  var meta = document.createElement('div'); meta.className = 'vs-meta';
  var ftLabel = FIGHT_TYPE[battle.fightType] || ('Type ' + battle.fightType);
  meta.textContent = ftLabel + '\n' + new Date(reportData.logtime*1000).toLocaleDateString();
  meta.style.cssText = 'white-space:pre-line;font-size:.68rem;color:var(--muted);text-align:right;';
  bar.appendChild(meta);

  // Header labels with player names
  document.getElementById('att-header').textContent = 'ATTACKER — ' + getPlayerName(battle.attacker);
  document.getElementById('def-header').textContent = 'DEFENDER — ' + getPlayerName(battle.defender);

  document.getElementById('report-ui').style.display = 'flex';
  document.getElementById('report-ui').style.flexDirection = 'column';
  renderHeroes(battle);
}

function getPlayerName(side) {
  try { return JSON.parse(side.players[0].playerInfo || '{}').username || 'Unknown'; } catch(e) { return 'Unknown'; }
}

// ─── Round List ───────────────────────────────────────────────────────────────
function renderRoundList() {
  var list = document.getElementById('round-list');
  list.textContent = '';
  combatRounds.forEach(function(tl, idx) {
    var item = document.createElement('div');
    item.className = 'round-list-item' + (idx === currentRoundIdx ? ' current' : '');
    item.setAttribute('data-idx', idx);
    // Count key events for this round
    var proc = reportData.battle.process;
    var attacks = 0, deaths = 0;
    for (var i = 0; i < proc.length; i++) {
      if ((proc[i].tl || 0) !== tl) continue;
      if (proc[i].t === 2) attacks++;
      if (proc[i].t === 19) deaths++;
    }
    item.textContent = 'R' + (idx+1) + ' \u2014 ' + attacks + ' atk' + (deaths ? ' \u00b7 ' + deaths + ' \u2717' : '');
    item.addEventListener('click', function() { gotoRound(parseInt(this.getAttribute('data-idx'), 10)); });
    list.appendChild(item);
  });
}

function updateRoundListActive() {
  document.querySelectorAll('.round-list-item').forEach(function(el) {
    el.classList.toggle('current', parseInt(el.getAttribute('data-idx'), 10) === currentRoundIdx);
  });
  // Scroll into view
  var cur = document.querySelector('.round-list-item.current');
  if (cur) cur.scrollIntoView({ block: 'nearest' });
}

// ─── Event Log ────────────────────────────────────────────────────────────────
var currentRoundEvents = []; // parsed events for current round

function updateEventLog(roundIdx) {
  var el = document.getElementById('event-log');
  var title = document.getElementById('event-log-title');
  el.textContent = '';
  currentRoundEvents = [];
  currentEventIdx = -1;

  if (roundIdx < 0 || roundIdx >= combatRounds.length) {
    title.textContent = 'Select a round';
    return;
  }

  var tl = combatRounds[roundIdx];

  var proc = reportData.battle.process;
  for (var i = 0; i < proc.length; i++) {
    var e = proc[i];
    if ((e.tl || 0) !== tl) continue;
    // Filter to displayable event types
    if ([2,5,7,11,14,19,25,27,32,37].indexOf(e.t) < 0) continue;
    currentRoundEvents.push(e);
  }

  currentRoundEvents.forEach(function(e, idx) {
    var item = buildEventItem(e, idx);
    el.appendChild(item);
  });

  title.textContent = 'Round ' + (roundIdx+1) + ' — ' + currentRoundEvents.length + ' events';
}

function buildEventItem(e, idx) {
  var info = EVT_INFO[e.t] || { cls: 'init', icon: '\u25aa', label: 'Event' };
  var div = document.createElement('div');
  div.className = 'ev ' + info.cls;
  div.setAttribute('data-eidx', idx);

  var iconEl = document.createElement('div'); iconEl.className = 'ev-icon'; iconEl.textContent = info.icon; div.appendChild(iconEl);
  var body = document.createElement('div'); body.className = 'ev-body';

  var srcName = uuidLabel(e.source);
  var tgtName = e.target ? uuidLabel(e.target) : null;

  var main = document.createElement('div'); main.className = 'ev-main';
  var sub = document.createElement('div'); sub.className = 'ev-sub';
  var val = e.t === 2 ? (e.eValue || 0) : (e.val || 0);

  if (e.t === 2) { // UNIT_ATTACK
    main.textContent = srcName + ' \u2192 ' + (tgtName || '?');
    var srcTypeName = e.source ? armyTypeName(unitMap[String(e.source)]) : '';
    sub.textContent = 'Standard attack' + (srcTypeName ? ' \u00b7 ' + srcTypeName : '');
    if (val) { var vEl = document.createElement('span'); vEl.className = 'ev-val'; vEl.textContent = ' \u2212' + fmtNum(val); main.appendChild(vEl); }
  } else if (e.t === 7) { // HERO_SKILL_HIT
    var hName = e.hero && heroNameMap[e.hero] ? heroNameMap[e.hero].name : ('Hero ' + e.hero);
    var skName = e.skill ? skillName(e.skill) : '';
    main.textContent = hName + ' \u2192 ' + (tgtName || '?');
    sub.textContent = skName || 'Hero Skill';
    if (val) { var vEl2 = document.createElement('span'); vEl2.className = 'ev-val'; vEl2.textContent = ' \u2212' + fmtNum(val); main.appendChild(vEl2); }
  } else if (e.t === 14) { // BUFF_DAMAGE
    var bName = e.buffId ? buffName(e.buffId) : 'Buff';
    main.textContent = bName + ' \u2192 ' + (tgtName || '?');
    sub.textContent = 'Source: ' + srcName;
    if (val) { var vEl3 = document.createElement('span'); vEl3.className = 'ev-val'; vEl3.textContent = ' \u2212' + fmtNum(val); main.appendChild(vEl3); }
  } else if (e.t === 19) { // UNIT_DEATH
    main.textContent = srcName + ' eliminated';
    div.className = 'ev death';
  } else if (e.t === 25) { // FORMATION_SKILL
    main.textContent = (e.skill === 941215 ? 'Counterblow' : 'Formation Skill') + ' \u2192 ' + srcName;
    sub.textContent = 'Formation effect';
  } else if (e.t === 27) { // MECHA_ACTION
    main.textContent = srcName + ' mecha action';
    sub.textContent = 'Value: ' + (e.val || 0);
  } else if (e.t === 5) { // HERO_SKILL_ACT
    var hn = e.hero && heroNameMap[e.hero] ? heroNameMap[e.hero].name : ('Hero ' + e.hero);
    main.textContent = hn + ' activates ' + skillName(e.skill);
    sub.textContent = 'on ' + srcName;
  } else if (e.t === 32) { // BUFF_APPLY_MULTI
    var targets = String(e.targets || '').split(',').length;
    main.textContent = buffName(e.buffId || 0) + ' \u2192 ' + targets + ' targets';
    sub.textContent = 'From ' + srcName;
  } else if (e.t === 37) { // RUNE_ACTIVATE
    var rhn = e.hero && heroNameMap[e.hero] ? heroNameMap[e.hero].name : '';
    main.textContent = 'Rune activated' + (rhn ? ' (' + rhn + ')' : '') + ' on ' + srcName;
    sub.textContent = skillName(e.skill);
  } else if (e.t === 11) { // EQUIP_SKILL_BUFF
    main.textContent = skillName(e.skill) + ' \u2192 ' + (tgtName || '?');
    sub.textContent = 'Equipment skill';
  } else {
    main.textContent = info.label + ': ' + srcName + (tgtName ? ' \u2192 ' + tgtName : '');
  }

  body.appendChild(main);
  if (sub.textContent) body.appendChild(sub);
  div.appendChild(body);

  div.addEventListener('click', function() {
    currentEventIdx = idx;
    highlightEvent(idx);
    flashUnit(e.source);
    if (e.target) flashUnit(e.target);
  });

  return div;
}

function highlightEvent(idx) {
  document.querySelectorAll('.ev.current').forEach(function(el) { el.classList.remove('current'); });
  var el = document.querySelector('.ev[data-eidx="' + idx + '"]');
  if (el) {
    el.classList.add('current');
    // Scroll only within the event-log container, never the page
    var log = document.getElementById('event-log');
    var rect = el.getBoundingClientRect();
    var lRect = log.getBoundingClientRect();
    if (rect.top < lRect.top) log.scrollTop -= (lRect.top - rect.top) + 4;
    else if (rect.bottom > lRect.bottom) log.scrollTop += (rect.bottom - lRect.bottom) + 4;
  }
}

function stepEvent(dir) {
  if (!currentRoundEvents.length) return;
  currentEventIdx = Math.max(0, Math.min(currentRoundEvents.length-1, (currentEventIdx < 0 ? 0 : currentEventIdx) + dir));
  highlightEvent(currentEventIdx);
  var e = currentRoundEvents[currentEventIdx];
  if (e) { flashUnit(e.source); if (e.target) flashUnit(e.target); }
}

function uuidLabel(uuid) {
  if (!uuid) return '?';
  var u = unitMap[String(uuid)];
  if (!u) return String(uuid).slice(-4);
  var side = u.side === 'att' ? 'Att' : 'Def';
  if (u.heroId && heroNameMap[u.heroId]) return heroNameMap[u.heroId].name + "'s unit";
  return side + ' P' + (u.pos || '?');
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function gotoRound(idx) {
  if (!combatRounds.length) return;
  currentRoundIdx = Math.max(0, Math.min(combatRounds.length-1, idx));
  applyEventsUpTo(currentRoundIdx);
  updateUnitCells();
  updateRoundDisplay();
  updateRoundListActive();
  updateEventLog(currentRoundIdx);
}

function stepRound(dir) { gotoRound(currentRoundIdx + dir); }

function updateRoundDisplay() {
  var el = document.getElementById('round-display');
  if (!combatRounds.length) { el.textContent = 'Round — / —'; return; }
  var total = combatRounds.length;
  el.textContent = '';
  el.appendChild(document.createTextNode('Round ' + (currentRoundIdx+1) + ' '));
  var sp = document.createElement('span'); sp.textContent = '/ ' + total; el.appendChild(sp);
  var pct = total > 1 ? (currentRoundIdx / (total-1)) * 100 : 100;
  document.getElementById('progress-fill').style.width = pct + '%';
}

function seekProgress(evt) {
  var rect = document.getElementById('progress-bar').getBoundingClientRect();
  var pct = Math.max(0, Math.min(1, (evt.clientX - rect.left) / rect.width));
  gotoRound(Math.round(pct * (combatRounds.length-1)));
}

// ─── Playback ─────────────────────────────────────────────────────────────────
function startLoop() {
  if (playTimer) cancelAnimationFrame(playTimer);
  function tick(ts) {
    if (isPlaying && ts - lastAdvTime > AUTO_MS / speed) {
      lastAdvTime = ts;
      if (currentRoundIdx < combatRounds.length-1) {
        stepRound(1);
      } else {
        togglePlay();
      }
    }
    playTimer = requestAnimationFrame(tick);
  }
  playTimer = requestAnimationFrame(tick);
}

function togglePlay() {
  isPlaying = !isPlaying;
  document.getElementById('btn-play').textContent = isPlaying ? '\u23F8 Pause' : '\u25B6 Play';
  if (isPlaying) {
    if (currentRoundIdx >= combatRounds.length-1) gotoRound(0);
    lastAdvTime = performance.now();
  }
}

function setSpeed(s, btn) {
  speed = s;
  document.querySelectorAll('.speed-group .ctrl-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function fmtNum(n) {
  if (!n && n!==0) return '0';
  n = Math.abs(n);
  var tiers=[[1e33,'gg'],[1e30,'ff'],[1e27,'ee'],[1e24,'dd'],[1e21,'cc'],[1e18,'bb'],[1e15,'aa'],[1e12,'T'],[1e9,'B'],[1e6,'M'],[1e3,'K']];
  for (var i=0;i<tiers.length;i++){if(n>=tiers[i][0])return(n/tiers[i][0]).toFixed(1).replace(/\.0$/,'')+tiers[i][1];}
  return Math.round(n).toLocaleString();
}
