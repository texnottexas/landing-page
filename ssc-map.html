<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
  <title>SSC Map — S2864</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --card: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #79c0ff;
      --army: #3fb950;
      --navy: #388bfd;
      --air: #d29922;
      --red: #f85149;
      --gold: #d29922;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: .75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 200;
      flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: .75rem; }
    .home-btn {
      color: var(--muted);
      text-decoration: none;
      font-size: 1.25rem;
      line-height: 1;
      transition: color .2s;
    }
    .home-btn:hover { color: var(--text); }
    .header-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }
    .header-title span { color: var(--army); }

    .page-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .sidebar-section h3 {
      font-size: .8rem;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
      margin-bottom: .5rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .5rem;
    }
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: .5rem .65rem;
    }
    .stat-label { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; }
    .stat-value { font-size: 1.15rem; font-weight: 700; color: var(--text); }
    .stat-value.rank { color: var(--gold); }
    .stat-value.owned { color: var(--army); }
    .stat-value.wars { color: var(--red); }
    .stat-value.defense { color: var(--navy); }

    .filter-group { display: flex; flex-direction: column; gap: .35rem; }
    .filter-row { display: flex; align-items: center; gap: .5rem; }
    .filter-row label {
      font-size: .78rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .filter-row input[type="checkbox"] {
      accent-color: var(--accent);
      cursor: pointer;
    }
    .cat-filters { display: flex; flex-wrap: wrap; gap: .35rem; margin-top: .25rem; }
    .cat-btn {
      font-size: .7rem;
      padding: .2rem .5rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
    }
    .cat-btn.active { border-color: currentColor; }
    .cat-btn[data-cat="combat"] { color: var(--red); }
    .cat-btn[data-cat="combat"].active { background: rgba(248,81,73,.15); }
    .cat-btn[data-cat="economy"] { color: var(--army); }
    .cat-btn[data-cat="economy"].active { background: rgba(63,185,80,.15); }
    .cat-btn[data-cat="utility"] { color: var(--navy); }
    .cat-btn[data-cat="utility"].active { background: rgba(56,139,253,.15); }
    .cat-btn[data-cat="special"] { color: var(--gold); }
    .cat-btn[data-cat="special"].active { background: rgba(210,153,34,.15); }

    .server-summary {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .15rem;
      max-height: 300px;
      overflow-y: auto;
    }
    .server-row {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .75rem;
      padding: .2rem .35rem;
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      transition: background .15s;
    }
    .server-row:hover { background: var(--card); }
    .server-row.highlight {
      background: rgba(63,185,80,.12);
      color: var(--army);
      font-weight: 600;
    }
    .server-row.active { background: var(--card); color: var(--text); }
    .server-bar-wrap {
      flex: 1;
      height: 6px;
      background: var(--card);
      border-radius: 3px;
      overflow: hidden;
    }
    .server-bar {
      height: 100%;
      border-radius: 3px;
      transition: width .3s;
    }
    .server-cnt { min-width: 22px; text-align: right; font-weight: 600; color: var(--text); font-size: .72rem; }

    .legend-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: .3rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .75rem;
      color: var(--muted);
    }
    .legend-swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .map-container {
      flex: 1;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 1rem;
      position: relative;
    }

    .grid-wrap {
      display: inline-block;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--card);
      line-height: 0;
    }
    .grid {
      display: grid;
      gap: 1px;
      background: var(--border);
    }

    .cell {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: .6rem;
      font-weight: 600;
      position: relative;
      cursor: pointer;
      transition: filter .15s, transform .1s;
      overflow: hidden;
      line-height: 1.1;
      text-align: center;
      border: 2px solid transparent;
    }
    .cell:hover {
      filter: brightness(1.3);
      z-index: 10;
      transform: scale(1.08);
    }
    .cell.dimmed { opacity: .25; }

    .cell.type-1 {
      border: 2px solid var(--gold);
      box-shadow: inset 0 0 6px rgba(210,153,34,.3);
      font-size: .65rem;
    }
    .cell.type-2 {
      border: 2px dashed var(--accent);
    }

    .cell-overlay {
      position: absolute;
      top: 1px;
      right: 1px;
      font-size: .65rem;
      line-height: 1;
      z-index: 5;
      filter: drop-shadow(0 0 2px rgba(0,0,0,.8));
    }
    .cell-overlay.attack {
      color: var(--red);
      animation: pulse-attack 1.2s ease-in-out infinite;
    }
    .cell-overlay.defend {
      color: var(--navy);
      animation: pulse-defend 1.5s ease-in-out infinite;
    }
    @keyframes pulse-attack {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: .6; transform: scale(1.15); }
    }
    @keyframes pulse-defend {
      0%, 100% { opacity: 1; }
      50% { opacity: .5; }
    }

    .cat-dot {
      position: absolute;
      bottom: 2px;
      left: 2px;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      z-index: 4;
    }

    .tooltip {
      display: none;
      position: fixed;
      z-index: 500;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem 1rem;
      max-width: 280px;
      box-shadow: 0 8px 24px rgba(0,0,0,.5);
      pointer-events: none;
    }
    .tooltip.show { display: block; }

    .site-footer {
      text-align: center;
      padding: 1.5rem 1rem;
      font-size: .75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .site-footer a {
      color: var(--muted);
      text-decoration: none;
      transition: color .2s;
    }
    .site-footer a:hover { color: var(--accent); }
    .shimmer-text {
      background: linear-gradient(90deg, var(--muted), var(--accent), var(--muted));
      background-size: 200% 100%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      flex: 1;
      color: var(--muted);
      font-size: .9rem;
    }
    .loading-spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-right: .75rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sidebar-toggle {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: .4rem .7rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: .8rem;
    }

    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: -300px;
        top: 0;
        bottom: 0;
        z-index: 300;
        transition: left .25s;
        padding-top: 60px;
      }
      .sidebar.open { left: 0; }
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,.5);
        z-index: 299;
      }
      .sidebar-overlay.show { display: block; }
      .sidebar-toggle { display: inline-flex; }
      .cell { width: 30px; height: 30px; font-size: .5rem; }
      .cell.type-1 { font-size: .5rem; }
      .map-container { padding: .5rem; }
    }
    @media (max-width: 480px) {
      .cell { width: 22px; height: 22px; font-size: .4rem; }
      .cell-overlay { font-size: .5rem; }
      .cat-dot { width: 4px; height: 4px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <a href="https://2864tw.com/index.html" class="home-btn" title="Home">&#8962;</a>
      <button class="sidebar-toggle" id="sidebarToggle">&#9776; Info</button>
      <span class="header-title">Sector <span id="sectorNum">--</span> &mdash; Seal Stone Chaos</span>
    </div>
  </header>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="page-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-section">
        <h3>S2864 Stats</h3>
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Rank</div>
            <div class="stat-value rank" id="statRank">--</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Score</div>
            <div class="stat-value" id="statScore">--</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Owned</div>
            <div class="stat-value owned" id="statOwned">--</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Attacking</div>
            <div class="stat-value wars" id="statWars">--</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Defending</div>
            <div class="stat-value defense" id="statDefense">--</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Extracted</div>
            <div class="stat-value" id="statExtracted" style="font-size:.7rem;color:var(--muted)">--</div>
          </div>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>Display</h3>
        <div class="filter-group">
          <div class="filter-row">
            <input type="checkbox" id="showLabels" checked>
            <label for="showLabels">Show cell labels</label>
          </div>
          <div class="filter-row">
            <input type="checkbox" id="showOverlays" checked>
            <label for="showOverlays">Show war overlays</label>
          </div>
          <div class="filter-row">
            <input type="checkbox" id="highlightS2864">
            <label for="highlightS2864">Highlight S2864 only</label>
          </div>
        </div>
        <h3 style="margin-top:.5rem">Wasteland Buffs</h3>
        <div class="cat-filters">
          <button class="cat-btn active" data-cat="all">All</button>
          <button class="cat-btn" data-cat="combat">Combat</button>
          <button class="cat-btn" data-cat="economy">Economy</button>
          <button class="cat-btn" data-cat="utility">Utility</button>
          <button class="cat-btn" data-cat="special">Special</button>
        </div>
      </div>

      <div class="sidebar-section">
        <h3>Territory Rankings</h3>
        <ul class="server-summary" id="serverSummary"></ul>
      </div>

      <div class="sidebar-section">
        <h3>Cell Types</h3>
        <ul class="legend-list" id="legendList"></ul>
      </div>
    </aside>

    <div class="map-container" id="mapContainer">
      <div class="loading" id="loadingMsg">
        <div class="loading-spinner"></div>
        Loading map data...
      </div>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <footer class="site-footer">
    <a href="https://github.com/texnottexas/titan-canyon-rosters" target="_blank" rel="noopener noreferrer">
      <span class="shimmer-text">Brought to you by supporters of the fk boats movement</span>
    </a>
  </footer>

<script>
(function() {
  'use strict';

  /* --- Sanitize text for safe DOM insertion --- */
  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  /* --- Helper: create element with text --- */
  function el(tag, className, text) {
    var e = document.createElement(tag);
    if (className) e.className = className;
    if (text !== undefined) e.textContent = text;
    return e;
  }

  /* --- Server color palette --- */
  var SERVER_COLORS = [
    '#8b5cf6','#06b6d4','#f97316','#ec4899','#14b8a6',
    '#a855f7','#0ea5e9','#eab308','#ef4444','#22c55e',
    '#6366f1','#f59e0b','#10b981','#e879f9','#3b82f6',
    '#84cc16','#f43f5e','#0891b2','#d946ef','#fbbf24',
    '#059669','#7c3aed','#fb923c','#2dd4bf','#c084fc',
    '#38bdf8','#facc15','#f472b6','#34d399','#a78bfa',
    '#818cf8','#fb7185','#4ade80','#fcd34d'
  ];

  var S2864_COLOR = '#3fb950';
  var UNCLAIMED_COLOR = '#21262d';
  var CAT_COLORS = { combat:'#f85149', economy:'#3fb950', utility:'#388bfd', special:'#d29922' };
  var EXP_MAX = { 1: 10000, 2: 30000, 3: 80000 };

  function serverColor(sid) {
    if (sid === 2864) return S2864_COLOR;
    if (sid === 0) return UNCLAIMED_COLOR;
    var h = (sid * 2654435761) >>> 0;
    return SERVER_COLORS[h % SERVER_COLORS.length];
  }

  function extractSeq(name) {
    var m = name && name.match(/#(\d+)/);
    return m ? parseInt(m[1]) : null;
  }

  function extractLevel(name) {
    var m = name && name.match(/Lv\.\s*(\d+)/);
    return m ? m[1] : '?';
  }

  var mapData = null;
  var warSeqSet = new Set();
  var defSeqSet = new Set();
  var warSeqMap = {};
  var defSeqMap = {};
  var cellElements = [];
  var activeServer = null;
  var activeCat = 'all';

  var tooltip = document.getElementById('tooltip');
  var mapContainer = document.getElementById('mapContainer');
  var loadingMsg = document.getElementById('loadingMsg');

  fetch('https://raw.githubusercontent.com/texnottexas/landing-page/main/data/ssc-map.json')
    .then(function(r) { if (!r.ok) throw new Error('Failed to load'); return r.json(); })
    .then(function(data) {
      mapData = data;
      warSeqSet = new Set(data.warTargets.map(function(w){ return w.seq; }));
      defSeqSet = new Set(data.defenseTargets.map(function(d){ return d.seq; }));
      data.warTargets.forEach(function(w){ warSeqMap[w.seq] = w; });
      data.defenseTargets.forEach(function(d){ defSeqMap[d.seq] = d; });
      init();
    })
    .catch(function(err) {
      loadingMsg.textContent = 'Failed to load map data: ' + err.message;
      loadingMsg.style.color = '#f85149';
    });

  function init() {
    loadingMsg.style.display = 'none';
    document.getElementById('sectorNum').textContent = mapData.sector;
    fillStats();
    fillServerSummary();
    buildLegend();
    renderGrid();
    setupFilters();
    setupSidebar();
  }

  function fillStats() {
    var s = mapData.s2864;
    document.getElementById('statRank').textContent = '#' + s.rank;
    document.getElementById('statScore').textContent = s.score.toLocaleString();
    document.getElementById('statOwned').textContent = s.ownedCount;
    document.getElementById('statWars').textContent = s.warDeclarations;
    document.getElementById('statDefense').textContent = s.defensiveDeclarations;
    if (mapData.extractedAt) {
      var d = new Date(mapData.extractedAt);
      document.getElementById('statExtracted').textContent = d.toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' });
    }
  }

  function buildLegend() {
    var list = document.getElementById('legendList');
    var items = [
      { border: '2px solid #d29922', bg: 'transparent', label: 'Warzone (server home)' },
      { border: '2px dashed #79c0ff', bg: 'transparent', label: 'Neutral City' },
      { border: 'none', bg: '#30363d', label: 'Wasteland' },
      { icon: '\u2694\uFE0F', color: '#f85149', label: 'S2864 attacking' },
      { icon: '\uD83D\uDEE1\uFE0F', color: '#388bfd', label: 'S2864 defending' }
    ];
    items.forEach(function(item) {
      var li = el('li', 'legend-item');
      if (item.icon) {
        var sp = el('span', '', item.icon);
        sp.style.fontSize = '.85rem';
        sp.style.color = item.color;
        sp.style.minWidth = '14px';
        sp.style.textAlign = 'center';
        li.appendChild(sp);
      } else {
        var sw = el('span', 'legend-swatch');
        sw.style.border = item.border;
        sw.style.background = item.bg;
        li.appendChild(sw);
      }
      li.appendChild(document.createTextNode(item.label));
      list.appendChild(li);
    });
  }

  function fillServerSummary() {
    var counts = {};
    mapData.cells.forEach(function(c) {
      if (c.sid === 0) return;
      counts[c.sid] = (counts[c.sid] || 0) + 1;
    });
    var sorted = Object.entries(counts).sort(function(a,b){ return b[1] - a[1]; });
    var maxCount = sorted.length ? sorted[0][1] : 1;
    var ul = document.getElementById('serverSummary');

    sorted.forEach(function(entry) {
      var sid = parseInt(entry[0]);
      var cnt = entry[1];
      var color = serverColor(sid);
      var li = el('li', 'server-row' + (sid === 2864 ? ' highlight' : ''));

      var nameSpan = el('span', '', 'S' + sid);
      nameSpan.style.minWidth = '42px';
      li.appendChild(nameSpan);

      var barWrap = el('div', 'server-bar-wrap');
      var bar = el('div', 'server-bar');
      bar.style.width = (cnt / maxCount * 100) + '%';
      bar.style.background = color;
      barWrap.appendChild(bar);
      li.appendChild(barWrap);

      var cntSpan = el('span', 'server-cnt', String(cnt));
      li.appendChild(cntSpan);

      li.addEventListener('click', function() {
        activeServer = activeServer === sid ? null : sid;
        applyFilters();
        ul.querySelectorAll('.server-row').forEach(function(r){ r.classList.remove('active'); });
        if (activeServer === sid) li.classList.add('active');
      });
      ul.appendChild(li);
    });
  }

  function renderGrid() {
    var side = mapData.side;
    var wrap = el('div', 'grid-wrap');
    var grid = el('div', 'grid');
    grid.style.gridTemplateColumns = 'repeat(' + side + ', auto)';
    wrap.appendChild(grid);

    cellElements = [];
    mapData.cells.forEach(function(cell) {
      var d = el('div', 'cell type-' + cell.type);
      d.style.background = serverColor(cell.sid);
      d.dataset.r = cell.r;
      d.dataset.c = cell.c;
      d.dataset.sid = cell.sid;
      d.dataset.type = cell.type;

      var seq = extractSeq(cell.name);
      if (seq !== null) d.dataset.seq = seq;

      // Label
      var label = el('span', 'cell-label');
      if (cell.type === 1) {
        label.textContent = 'S' + cell.sid;
        label.style.color = '#fff';
        label.style.textShadow = '0 0 3px rgba(0,0,0,.8)';
      } else if (cell.type === 2) {
        label.textContent = extractLevel(cell.name);
        label.style.color = '#fff';
        label.style.textShadow = '0 0 3px rgba(0,0,0,.8)';
      } else if (cell.type === 3 && seq !== null) {
        label.textContent = seq;
        label.style.color = 'rgba(255,255,255,.7)';
        label.style.fontSize = '.5rem';
      }
      d.appendChild(label);

      // War/defense overlays
      if (seq !== null) {
        if (warSeqSet.has(seq)) {
          var ov = el('span', 'cell-overlay attack', '\u2694');
          d.appendChild(ov);
        }
        if (defSeqSet.has(seq)) {
          var ov2 = el('span', 'cell-overlay defend', '\uD83D\uDEE1');
          d.appendChild(ov2);
        }

        // Category dot for owned wastelands
        var ow = mapData.ownedWastelands[String(seq)];
        if (ow) {
          var dot = el('span', 'cat-dot');
          dot.style.background = CAT_COLORS[ow.category] || '#8b949e';
          d.dataset.cat = ow.category;
          d.appendChild(dot);
        }
      }

      // Tooltip events
      d.addEventListener('mouseenter', function(e){ showTooltip(e, cell); });
      d.addEventListener('mousemove', positionTooltip);
      d.addEventListener('mouseleave', hideTooltip);
      d.addEventListener('click', function(e){ showTooltip(e, cell); });

      grid.appendChild(d);
      cellElements.push({ el: d, cell: cell, seq: seq });
    });

    mapContainer.appendChild(wrap);
  }

  function buildTooltipDOM(cell) {
    // Build tooltip content using safe DOM methods
    var frag = document.createDocumentFragment();
    var seq = extractSeq(cell.name);

    if (cell.type === 0) {
      frag.appendChild(el('div', 'tooltip-title', 'Empty'));
      return frag;
    }

    if (cell.type === 1) {
      frag.appendChild(el('div', 'tooltip-title', 'Warzone: S' + cell.sid));
      if (cell.owner) frag.appendChild(el('div', 'tooltip-owner', cell.owner));
      return frag;
    }

    if (cell.type === 2) {
      frag.appendChild(el('div', 'tooltip-title', cell.name));
      frag.appendChild(el('div', 'tooltip-owner', cell.owner || 'Unclaimed'));
      return frag;
    }

    // type 3 - wasteland
    frag.appendChild(el('div', 'tooltip-title', cell.name));
    frag.appendChild(el('div', 'tooltip-owner', cell.owner || 'Unclaimed'));

    var ow = seq !== null && mapData.ownedWastelands[String(seq)];
    if (ow) {
      // Category badge
      var badgeWrap = el('div');
      badgeWrap.style.marginTop = '.35rem';
      var badge = el('span', 'tooltip-badge badge-' + ow.category, ow.category);
      badgeWrap.appendChild(badge);
      frag.appendChild(badgeWrap);

      // Spec name + level
      var buffTitle = el('div', '', ow.specName + ' (Lv.' + ow.level + ')');
      buffTitle.style.cssText = 'font-size:.75rem;color:#79c0ff;margin-top:.25rem';
      frag.appendChild(buffTitle);

      // Buff list
      if (ow.buffs && ow.buffs.length) {
        var buffList = el('div');
        buffList.style.cssText = 'margin-top:.3rem;display:flex;flex-direction:column;gap:.15rem';
        ow.buffs.forEach(function(b, i) {
          var isCurrent = (i < ow.level);
          var line = el('div', '', (isCurrent ? '\u2713 ' : '\u25CB ') + b);
          line.style.cssText = 'font-size:.7rem;color:' + (isCurrent ? '#3fb950;font-weight:600' : '#8b949e');
          buffList.appendChild(line);
        });
        frag.appendChild(buffList);
      }

      // EXP bar
      var maxExp = EXP_MAX[ow.level] || 50000;
      var pct = Math.min(100, (ow.exp / maxExp) * 100);
      var expWrap = el('div', '', 'EXP: ' + ow.exp.toLocaleString() + ' / ' + maxExp.toLocaleString());
      expWrap.style.cssText = 'margin-top:.35rem;font-size:.7rem;color:#8b949e';
      var barOuter = el('div');
      barOuter.style.cssText = 'height:4px;background:#30363d;border-radius:2px;margin-top:.2rem;overflow:hidden';
      var barInner = el('div');
      barInner.style.cssText = 'height:100%;background:#79c0ff;border-radius:2px;width:' + pct + '%';
      barOuter.appendChild(barInner);
      expWrap.appendChild(barOuter);
      frag.appendChild(expWrap);
    }

    // War/defense info
    if (seq !== null && warSeqMap[seq]) {
      var w = warSeqMap[seq];
      var warLine = el('div', '', '\u2694 S2864 attacking (from S' + w.currentOwner + ')');
      warLine.style.cssText = 'margin-top:.35rem;font-size:.72rem;font-weight:600;color:#f85149';
      frag.appendChild(warLine);
      var warDetail = el('div', '', w.specName + ' Lv.' + w.level);
      warDetail.style.cssText = 'font-size:.7rem;color:#8b949e';
      frag.appendChild(warDetail);
    }
    if (seq !== null && defSeqMap[seq]) {
      var dd = defSeqMap[seq];
      var defLine = el('div', '', '\uD83D\uDEE1 S2864 defending');
      defLine.style.cssText = 'margin-top:.35rem;font-size:.72rem;font-weight:600;color:#388bfd';
      frag.appendChild(defLine);
      var defDetail = el('div', '', dd.specName + ' Lv.' + dd.level);
      defDetail.style.cssText = 'font-size:.7rem;color:#8b949e';
      frag.appendChild(defDetail);
    }

    return frag;
  }

  function showTooltip(e, cell) {
    tooltip.textContent = '';
    tooltip.appendChild(buildTooltipDOM(cell));
    tooltip.classList.add('show');
    positionTooltip(e);
  }

  function positionTooltip(e) {
    var pad = 12;
    var x = e.clientX + pad;
    var y = e.clientY + pad;
    // Force layout to get dimensions
    var w = tooltip.offsetWidth;
    var h = tooltip.offsetHeight;
    if (x + w > window.innerWidth - pad) x = e.clientX - w - pad;
    if (y + h > window.innerHeight - pad) y = e.clientY - h - pad;
    tooltip.style.left = x + 'px';
    tooltip.style.top = y + 'px';
  }

  function hideTooltip() {
    tooltip.classList.remove('show');
  }

  function setupFilters() {
    document.getElementById('showLabels').addEventListener('change', applyFilters);
    document.getElementById('showOverlays').addEventListener('change', applyFilters);
    document.getElementById('highlightS2864').addEventListener('change', function() {
      if (this.checked) activeServer = null;
      applyFilters();
    });

    document.querySelectorAll('.cat-btn').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('active'); });
        btn.classList.add('active');
        activeCat = btn.dataset.cat;
        applyFilters();
      });
    });
  }

  function applyFilters() {
    var showLabels = document.getElementById('showLabels').checked;
    var showOverlays = document.getElementById('showOverlays').checked;
    var highlight2864 = document.getElementById('highlightS2864').checked;

    cellElements.forEach(function(item) {
      var cellEl = item.el;
      var cell = item.cell;
      var seq = item.seq;

      var label = cellEl.querySelector('.cell-label');
      if (label) label.style.display = showLabels ? '' : 'none';

      cellEl.querySelectorAll('.cell-overlay').forEach(function(o) {
        o.style.display = showOverlays ? '' : 'none';
      });

      var dimmed = false;
      if (highlight2864 && cell.sid !== 2864) dimmed = true;
      if (activeServer !== null && cell.sid !== activeServer) dimmed = true;

      if (activeCat !== 'all' && cell.type === 3 && seq !== null) {
        var ow = mapData.ownedWastelands[String(seq)];
        if (ow && ow.category !== activeCat) dimmed = true;
      }

      cellEl.classList.toggle('dimmed', dimmed);
    });
  }

  function setupSidebar() {
    var toggle = document.getElementById('sidebarToggle');
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('sidebarOverlay');

    toggle.addEventListener('click', function() {
      sidebar.classList.toggle('open');
      overlay.classList.toggle('show');
    });
    overlay.addEventListener('click', function() {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    });
  }

  mapContainer.addEventListener('scroll', hideTooltip);
})();
</script>
</body>
</html>
