<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src https://push-worker.27tb8s6fct.workers.dev; form-action 'none'; base-uri 'self';">
  <title>Push Admin — 2864</title>
  <style>
    :root {
      --bg: #0d1117; --bg2: #161b22; --card: #1c2128; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff; --green: #3fb950;
      --red: #f85149;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: .85rem; padding: 2rem 1rem; min-height: 100vh; }
    .container { max-width: 520px; margin: 0 auto; }
    h1 { font-size: 1.1rem; font-weight: 700; margin-bottom: 1.5rem; color: var(--accent); }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
    .card h2 { font-size: .85rem; font-weight: 600; color: var(--muted); margin-bottom: 1rem; text-transform: uppercase; letter-spacing: .05em; }
    .stat { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: .7rem; color: var(--muted); margin-top: .25rem; }
    label { display: block; font-size: .75rem; color: var(--muted); margin-bottom: .25rem; margin-top: .75rem; }
    label:first-of-type { margin-top: 0; }
    input, textarea, select {
      width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text);
      border-radius: 6px; padding: .4rem .6rem; font-size: .8rem; outline: none; font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { min-height: 80px; resize: vertical; }
    .secret-row { display: flex; gap: .5rem; }
    .secret-row input { flex: 1; }
    button {
      background: var(--accent); border: none; color: #0d1117; font-weight: 600;
      border-radius: 8px; padding: .5rem 1.25rem; font-size: .85rem; cursor: pointer;
      margin-top: .75rem;
    }
    button:hover { opacity: .9; }
    button.secondary { background: var(--card); border: 1px solid var(--border); color: var(--muted); }
    button.secondary:hover { border-color: var(--accent); color: var(--accent); }
    .result { margin-top: .75rem; padding: .5rem .75rem; border-radius: 6px; font-size: .75rem; display: none; }
    .result.ok  { background: rgba(63,185,80,.15); border: 1px solid var(--green); color: var(--green); }
    .result.err { background: rgba(248,81,73,.15); border: 1px solid var(--red); color: var(--red); }
    .result.visible { display: block; }
    .sub-row { display: flex; align-items: center; justify-content: space-between; padding: .35rem .5rem; border-bottom: 1px solid var(--border); font-size: .75rem; }
    .sub-row:last-child { border-bottom: none; }
    .sub-row .sub-info { flex: 1; min-width: 0; }
    .sub-row .sub-name { color: var(--text); }
    .sub-row .sub-alliance { color: var(--muted); margin-left: .35rem; }
    .sub-row .sub-remove { background: none; border: 1px solid var(--border); color: var(--red); border-radius: 4px; padding: .15rem .4rem; font-size: .7rem; cursor: pointer; margin: 0; flex-shrink: 0; }
    .sub-row .sub-remove:hover { border-color: var(--red); background: rgba(248,81,73,.1); }
    .sub-list { max-height: 260px; overflow-y: auto; }
    .log-entry { padding: .5rem; border-bottom: 1px solid var(--border); font-size: .75rem; }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: var(--muted); font-size: .65rem; }
    .log-title { color: var(--accent); font-weight: 600; }
    .log-body { color: var(--text); margin-top: .15rem; }
    .log-meta { color: var(--muted); font-size: .65rem; margin-top: .15rem; }
    .log-list { max-height: 320px; overflow-y: auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>&#128276; Push Admin — 2864tw.com</h1>

    <div class="card" id="status-card">
      <h2>Status</h2>
      <div class="stat" id="sub-count">—</div>
      <div class="stat-label">Active subscribers</div>
      <div style="margin-top:.75rem;font-size:.7rem;color:var(--muted)">Last cron run: <span id="last-cron">—</span></div>
      <button class="secondary" id="refresh-btn" style="margin-top:.75rem;padding:.35rem .75rem;font-size:.75rem">Refresh</button>
    </div>

    <div class="card" id="subs-card">
      <h2>Subscribers</h2>
      <div class="sub-list" id="subs-list"></div>
      <div style="display:flex;gap:.5rem;margin-top:.5rem">
        <button class="secondary" id="subs-refresh-btn" style="padding:.35rem .75rem;font-size:.75rem;margin-top:0">Refresh</button>
      </div>
    </div>

    <div class="card">
      <h2>Send Notification</h2>
      <div class="secret-row">
        <div style="flex:1">
          <label for="secret">Admin password</label>
          <input type="password" id="secret" placeholder="Admin password" autocomplete="off">
        </div>
      </div>
      <label for="notif-title">Title</label>
      <input type="text" id="notif-title" value="TW Server 2864" maxlength="100">
      <label for="notif-body">Body</label>
      <textarea id="notif-body" placeholder="Notification message..." maxlength="300"></textarea>
      <label>Recipients</label>
      <div id="target-section" style="margin-top:.25rem">
        <div style="display:flex;gap:.75rem;margin-bottom:.5rem">
          <label style="display:inline;margin:0"><input type="radio" name="target-mode" value="all" checked> All</label>
          <label style="display:inline;margin:0"><input type="radio" name="target-mode" value="player"> By player</label>
          <label style="display:inline;margin:0"><input type="radio" name="target-mode" value="alliance"> By alliance</label>
        </div>
        <div id="target-player" style="display:none">
          <input type="text" id="player-search" placeholder="Search players..." autocomplete="off">
          <div id="player-list" style="max-height:120px;overflow-y:auto;margin-top:.25rem"></div>
        </div>
        <div id="target-alliance" style="display:none">
          <label style="display:inline;margin:0"><input type="checkbox" value="DOG*" class="alliance-cb"> DOG*</label>
          <label style="display:inline;margin:0;margin-left:.5rem"><input type="checkbox" value="MSS" class="alliance-cb"> MSS</label>
        </div>
        <div id="target-preview" style="font-size:.7rem;color:var(--muted);margin-top:.5rem"></div>
      </div>
      <button id="send-btn">Send &#128312;</button>
      <div class="result" id="send-result"></div>
    </div>

    <div class="card" id="log-card">
      <h2>Recent Notifications</h2>
      <div class="log-list" id="log-list"></div>
      <button class="secondary" id="log-refresh-btn" style="padding:.35rem .75rem;font-size:.75rem">Refresh</button>
    </div>
  </div>

  <script>
    'use strict';
    var PUSH_WORKER = 'https://push-worker.27tb8s6fct.workers.dev';

    var secretEl = document.getElementById('secret');
    var stored = sessionStorage.getItem('adminPassword');
    if (stored) secretEl.value = stored;
    secretEl.addEventListener('input', function() {
      sessionStorage.setItem('adminPassword', this.value);
    });

    function loadStatus() {
      fetch(PUSH_WORKER + '/status')
        .then(function(r) { return r.json(); })
        .then(function(d) {
          document.getElementById('sub-count').textContent = d.count || 0;
          document.getElementById('last-cron').textContent = d.lastCron
            ? new Date(d.lastCron).toLocaleString()
            : 'Never';
        })
        .catch(function() {
          document.getElementById('sub-count').textContent = '—';
        });
    }

    document.getElementById('refresh-btn').addEventListener('click', loadStatus);

    var subscribers = [];
    var selectedPlayers = [];

    function loadSubscribers() {
      var pw = document.getElementById('secret').value.trim();
      if (!pw) return;
      fetch(PUSH_WORKER + '/subscribers', {
        headers: { 'X-Admin-Password': pw },
      })
        .then(function(r) { return r.json(); })
        .then(function(list) {
          subscribers = list;
          updatePreview();
          renderSubsList(list);
        })
        .catch(function() {});
    }

    function renderSubsList(list) {
      var container = document.getElementById('subs-list');
      while (container.firstChild) container.removeChild(container.firstChild);
      if (!Array.isArray(list) || list.length === 0) {
        var empty = document.createElement('div');
        empty.style.cssText = 'font-size:.75rem;color:var(--muted);padding:.5rem';
        empty.textContent = 'No subscribers';
        container.appendChild(empty);
        return;
      }
      list.forEach(function(sub) {
        var row = document.createElement('div');
        row.className = 'sub-row';
        var info = document.createElement('span');
        info.className = 'sub-info';
        var nameSpan = document.createElement('span');
        nameSpan.className = 'sub-name';
        nameSpan.textContent = sub.name || 'Anonymous';
        info.appendChild(nameSpan);
        if (sub.alliance) {
          var allianceSpan = document.createElement('span');
          allianceSpan.className = 'sub-alliance';
          allianceSpan.textContent = '(' + sub.alliance + ')';
          info.appendChild(allianceSpan);
        }
        row.appendChild(info);
        var removeBtn = document.createElement('button');
        removeBtn.className = 'sub-remove';
        removeBtn.textContent = '\u2715';
        removeBtn.title = 'Remove subscriber';
        removeBtn.addEventListener('click', function() {
          removeSubscriber(sub.id);
        });
        row.appendChild(removeBtn);
        container.appendChild(row);
      });
    }

    function removeSubscriber(id) {
      var pw = document.getElementById('secret').value.trim();
      if (!pw) return;
      fetch(PUSH_WORKER + '/subscribers', {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': pw },
        body: JSON.stringify({ id: id }),
      })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          if (d.ok) {
            loadSubscribers();
            loadStatus();
          }
        })
        .catch(function() {});
    }

    document.getElementById('subs-refresh-btn').addEventListener('click', loadSubscribers);

    function loadNotifyLog() {
      var pw = document.getElementById('secret').value.trim();
      if (!pw) return;
      fetch(PUSH_WORKER + '/notify-log', {
        headers: { 'X-Admin-Password': pw },
      })
        .then(function(r) { return r.json(); })
        .then(function(entries) { renderNotifyLog(entries); })
        .catch(function() {});
    }

    function renderNotifyLog(entries) {
      var container = document.getElementById('log-list');
      while (container.firstChild) container.removeChild(container.firstChild);
      if (!Array.isArray(entries) || entries.length === 0) {
        var empty = document.createElement('div');
        empty.style.cssText = 'font-size:.75rem;color:var(--muted);padding:.5rem';
        empty.textContent = 'No recent notifications';
        container.appendChild(empty);
        return;
      }
      entries.forEach(function(entry) {
        var el = document.createElement('div');
        el.className = 'log-entry';
        var timeEl = document.createElement('div');
        timeEl.className = 'log-time';
        timeEl.textContent = new Date(entry.timestamp).toLocaleString();
        el.appendChild(timeEl);
        var titleEl = document.createElement('div');
        titleEl.className = 'log-title';
        titleEl.textContent = entry.title;
        el.appendChild(titleEl);
        if (entry.body) {
          var bodyEl = document.createElement('div');
          bodyEl.className = 'log-body';
          bodyEl.textContent = entry.body.length > 80 ? entry.body.substring(0, 80) + '...' : entry.body;
          el.appendChild(bodyEl);
        }
        var metaEl = document.createElement('div');
        metaEl.className = 'log-meta';
        var metaParts = [];
        metaParts.push('Sent: ' + entry.sent + ' / Failed: ' + entry.failed + ' / Total: ' + entry.total);
        if (entry.target) {
          if (entry.target.players) {
            metaParts.push('Players: ' + entry.target.players.join(', '));
          } else if (entry.target.alliances) {
            metaParts.push('Alliances: ' + entry.target.alliances.join(', '));
          }
        } else {
          metaParts.push('All subscribers');
        }
        metaEl.textContent = metaParts.join(' | ');
        el.appendChild(metaEl);
        container.appendChild(el);
      });
    }

    document.getElementById('log-refresh-btn').addEventListener('click', loadNotifyLog);

    document.querySelectorAll('input[name="target-mode"]').forEach(function(r) {
      r.addEventListener('change', function() {
        document.getElementById('target-player').style.display = this.value === 'player' ? '' : 'none';
        document.getElementById('target-alliance').style.display = this.value === 'alliance' ? '' : 'none';
        if (this.value !== 'all' && subscribers.length === 0) loadSubscribers();
        updatePreview();
      });
    });

    document.getElementById('player-search').addEventListener('input', function() {
      var q = this.value.toLowerCase();
      var list = document.getElementById('player-list');
      while (list.firstChild) list.removeChild(list.firstChild);
      var named = subscribers.filter(function(s) { return s.name; });
      var filtered = named.filter(function(s) { return !q || s.name.toLowerCase().indexOf(q) !== -1; });
      filtered.slice(0, 50).forEach(function(s) {
        var el = document.createElement('div');
        el.style.cssText = 'padding:.2rem .4rem;font-size:.75rem;cursor:pointer;color:var(--text)';
        var isSelected = selectedPlayers.indexOf(s.name) !== -1;
        el.textContent = (isSelected ? '\u2713 ' : '') + s.name + ' (' + s.alliance + ')';
        if (isSelected) el.style.color = 'var(--accent)';
        el.addEventListener('click', function() {
          var idx = selectedPlayers.indexOf(s.name);
          if (idx === -1) selectedPlayers.push(s.name); else selectedPlayers.splice(idx, 1);
          document.getElementById('player-search').dispatchEvent(new Event('input'));
          updatePreview();
        });
        list.appendChild(el);
      });
    });

    document.querySelectorAll('.alliance-cb').forEach(function(cb) {
      cb.addEventListener('change', function() { updatePreview(); });
    });

    function getTarget() {
      var mode = document.querySelector('input[name="target-mode"]:checked').value;
      if (mode === 'all') return null;
      if (mode === 'player') return { players: selectedPlayers.slice() };
      if (mode === 'alliance') {
        var alliances = [];
        document.querySelectorAll('.alliance-cb:checked').forEach(function(cb) { alliances.push(cb.value); });
        return { alliances: alliances };
      }
      return null;
    }

    function updatePreview() {
      var target = getTarget();
      var el = document.getElementById('target-preview');
      if (!target) { el.textContent = 'Sending to all ' + subscribers.length + ' subscribers'; return; }
      var count = 0;
      subscribers.forEach(function(s) {
        if (!s.name) return;
        if (target.players && target.players.indexOf(s.name) !== -1) count++;
        else if (target.alliances && target.alliances.indexOf(s.alliance) !== -1) count++;
      });
      el.textContent = 'Sending to ' + count + ' of ' + subscribers.length + ' subscribers';
    }

    document.getElementById('send-btn').addEventListener('click', function() {
      var secret  = document.getElementById('secret').value.trim();
      var title   = document.getElementById('notif-title').value.trim();
      var body    = document.getElementById('notif-body').value.trim();
      var result  = document.getElementById('send-result');

      if (!secret) { showResult('Enter the admin password', false); return; }
      if (!title)  { showResult('Enter a title', false); return; }

      this.disabled = true;
      var btn = this;
      fetch(PUSH_WORKER + '/notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Password': secret },
        body: JSON.stringify({ title: title, body: body, target: getTarget() }),
      })
        .then(function(r) { return r.json(); })
        .then(function(d) {
          showResult('Sent: ' + d.sent + ' | Failed: ' + d.failed + ' | Total: ' + (d.total || d.sent + d.failed), true);
          loadStatus();
          loadNotifyLog();
        })
        .catch(function(e) {
          showResult('Request failed: ' + e.message, false);
        })
        .finally(function() { btn.disabled = false; });

      function showResult(msg, ok) {
        result.textContent = msg;
        result.className = 'result visible ' + (ok ? 'ok' : 'err');
      }
    });

    loadStatus();

    // Auto-load admin data when password is available
    secretEl.addEventListener('change', function() {
      if (this.value.trim()) {
        loadSubscribers();
        loadNotifyLog();
      }
    });
    if (secretEl.value.trim()) {
      loadSubscribers();
      loadNotifyLog();
    }
  </script>
</body>
</html>
