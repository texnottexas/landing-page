<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easter Egg Wishing — Server 2864</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; img-src 'self' https://raw.githubusercontent.com https://h5.topwargame.com data:; connect-src 'self' https://raw.githubusercontent.com;">
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --card: #1c2128;
    --border: #30363d; --text: #e6edf3; --muted: #8b949e;
    --accent: #79c0ff; --green: #56d364; --yellow: #e3b341;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: .75rem 1rem; display: flex; align-items: center; gap: .75rem; flex-wrap: wrap; }
  header a { color: var(--muted); text-decoration: none; font-size: .85rem; }
  header a:hover { color: var(--text); }
  .sep { color: var(--border); }
  .page-title { font-size: 1.05rem; font-weight: 700; }
  .subtitle { font-size: .75rem; color: var(--muted); }
  .main { max-width: 920px; margin: 0 auto; padding: 1.5rem 1rem; }
  .note { background: rgba(121,192,255,.08); border: 1px solid rgba(121,192,255,.2); border-radius: 6px; padding: .65rem .9rem; font-size: .78rem; color: var(--accent); margin-bottom: 1.25rem; }
  .note strong { color: var(--text); }

  .tab-row { display: flex; gap: .5rem; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .tab-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: .4rem 1rem; font-size: .82rem; color: var(--muted); cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: .35rem; }
  .tab-btn:hover { border-color: var(--accent); color: var(--text); }
  .tab-btn.active { background: rgba(121,192,255,.12); border-color: var(--accent); color: var(--accent); font-weight: 600; }
  .lock-badge { font-size: .65rem; background: rgba(139,148,158,.15); border-radius: 10px; padding: 1px 6px; color: var(--muted); }

  .tier { margin-bottom: 1.5rem; }
  .tier-label { font-size: .8rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: .75rem; padding-bottom: .4rem; border-bottom: 1px solid var(--border); }
  .tier-label .hl { color: var(--yellow); }
  .tier-desc { font-size: .72rem; color: var(--muted); margin-left: .5rem; }

  .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: .6rem; }
  .item-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .5rem; text-align: center; transition: border-color .15s; }
  .item-card:hover { border-color: var(--accent); }
  .item-card.q5 { border-color: rgba(227,179,65,.4); }
  .item-card.q4 { border-color: rgba(121,192,255,.3); }
  .item-card.q3 { border-color: rgba(86,211,100,.3); }
  .item-icon { width: 52px; height: 52px; object-fit: contain; display: block; margin: 0 auto .35rem; border-radius: 4px; }
  .item-ph { width: 52px; height: 52px; background: var(--surface); border-radius: 4px; margin: 0 auto .35rem; display: flex; align-items: center; justify-content: center; font-size: .6rem; color: var(--muted); }
  .item-name { font-size: .62rem; color: var(--text); line-height: 1.3; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .item-qty { font-size: .65rem; color: var(--accent); font-weight: 600; margin-top: .2rem; }

  @media (max-width: 500px) {
    .item-grid { grid-template-columns: repeat(auto-fill, minmax(68px, 1fr)); }
    .item-icon, .item-ph { width: 44px; height: 44px; }
  }
</style>
</head>
<body>
<header>
  <a href="index.html" title="Home" style="color:var(--muted);display:flex;align-items:center;">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8.354 1.146a.5.5 0 0 0-.708 0l-6 6A.5.5 0 0 0 1.5 7.5v7a.5.5 0 0 0 .5.5h4.5a.5.5 0 0 0 .5-.5v-4h2v4a.5.5 0 0 0 .5.5H14a.5.5 0 0 0 .5-.5v-7a.5.5 0 0 0-.146-.354L8.354 1.146z"/></svg>
  </a>
  <span class="sep">/</span>
  <span class="page-title">Easter Egg Wishing</span>
  <span class="subtitle">Festival Celebration &middot; Server 2864 &middot; 13d remaining</span>
</header>

<div class="main">
  <div class="tab-row" id="tabRow"></div>
  <div id="content"></div>
</div>

<script>
(function() {
  var ASSET = 'https://raw.githubusercontent.com/texnottexas/landing-page/main/';
  var DYNRES = 'https://h5.topwargame.com/DynRes/images/items/';

  function getIconUrl(icon) {
    if (!icon) return '';
    if (icon.startsWith('res:items/')) return DYNRES + icon.replace('res:items/', '');
    if (icon.startsWith('image/hero/')) return ASSET + 'assets/easter-wishing-icons/' + icon.replace('image/hero/', '') + '.png';
    if (icon.startsWith('image/item/')) return ASSET + 'assets/easter-wishing-icons/' + icon.replace('image/item/', '') + '.png';
    return '';
  }

  function qCls(q) { return q >= 5 ? 'q5' : q === 4 ? 'q4' : q === 3 ? 'q3' : ''; }

  function el(tag, cls) { var e = document.createElement(tag); if (cls) e.className = cls; return e; }

  function makeItemCard(item) {
    var card = el('div', 'item-card ' + qCls(item.quality));
    var url = getIconUrl(item.icon);
    if (url) {
      var img = el('img', 'item-icon');
      img.src = url;
      img.alt = '';
      img.onerror = function() {
        var ph = el('div', 'item-ph');
        ph.textContent = '?';
        card.replaceChild(ph, img);
      };
      card.appendChild(img);
    } else {
      var ph = el('div', 'item-ph');
      ph.textContent = '?';
      card.appendChild(ph);
    }
    var nm = el('div', 'item-name');
    nm.textContent = item.name;
    card.appendChild(nm);
    if (item.count > 1) {
      var qty = el('div', 'item-qty');
      qty.textContent = '\u00d7' + item.count;
      card.appendChild(qty);
    }
    return card;
  }

  function makeTier(label, desc, items) {
    var tier = el('div', 'tier');
    var lbl = el('div', 'tier-label');
    var hl = el('span', 'hl');
    hl.textContent = label;
    lbl.appendChild(hl);
    var d = el('span', 'tier-desc');
    d.textContent = desc;
    lbl.appendChild(d);
    tier.appendChild(lbl);
    var grid = el('div', 'item-grid');
    items.forEach(function(item) { grid.appendChild(makeItemCard(item)); });
    tier.appendChild(grid);
    return tier;
  }

  function renderTab(tab, container) {
    container.textContent = '';
    container.appendChild(makeTier(
      'Advanced Reward',
      '\u2014 ' + tab.advanced.length + ' decorations (get 1 per wish)',
      tab.advanced
    ));
    container.appendChild(makeTier(
      'Common Reward',
      '\u2014 ' + tab.common.length + ' items (random from pool)',
      tab.common
    ));
  }

  fetch('https://raw.githubusercontent.com/texnottexas/landing-page/main/data/easter-wishing.json')
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var tabRow = document.getElementById('tabRow');
      var content = document.getElementById('content');
      var tabs = data.tabs;
      var btns = [];

      tabs.forEach(function(tab, i) {
        var btn = el('button', 'tab-btn' + (i === 0 ? ' active' : ''));
        var nameSpan = el('span');
        nameSpan.textContent = tab.name;
        btn.appendChild(nameSpan);
        if (tab.unlockHours > 0) {
          var badge = el('span', 'lock-badge');
          badge.textContent = '+' + tab.unlockHours + 'h';
          btn.appendChild(badge);
        }
        btn.addEventListener('click', function() {
          btns.forEach(function(b) { b.classList.remove('active'); });
          btn.classList.add('active');
          renderTab(tab, content);
        });
        btns.push(btn);
        tabRow.appendChild(btn);
      });

      renderTab(tabs[0], content);
    });
}());
</script>
</body>
</html>
