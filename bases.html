<style>

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */

  .header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
  .home-btn { display: flex; align-items: center; justify-content: center; background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: .4rem .6rem; text-decoration: none; transition: all .15s; }
  .home-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Search bar */
  .search-bar { max-width: 700px; margin: 1.5rem auto .75rem; padding: 0 1rem; width: 100%; }
  .search-row { display: flex; gap: .5rem; flex-wrap: wrap; }
  .search-row input { flex: 1; min-width: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .6rem .75rem; color: var(--text); font-size: .95rem; outline: none; }

  .search-row button { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: .6rem 1.2rem; font-weight: 600; cursor: pointer; font-size: .9rem; white-space: nowrap; flex-shrink: 0; }
  .search-row button:hover { opacity: .9; }
  .search-row button:disabled { opacity: .5; cursor: not-allowed; }
  .search-hint { font-size: .75rem; color: var(--muted); margin-top: .4rem; }
  .status { text-align: center; padding: .5rem 1rem; color: var(--muted); font-size: .9rem; }
  .status.error { color: var(--red); }
  .status.success { color: var(--green); }

  /* Player banner */
  .player-banner { max-width: 860px; margin: 0 auto .75rem; padding: 0 1rem; width: 100%; display: none; }
  .player-banner-inner { background: var(--surface); border: 1px solid var(--green); border-radius: 8px; padding: .6rem 1rem; display: flex; align-items: center; gap: .75rem; }
  .player-banner-info { flex: 1; }
  .player-banner-name { font-weight: 600; font-size: .9rem; }
  .player-banner-detail { font-size: .75rem; color: var(--muted); }
  .player-banner-clear { background: none; border: 1px solid var(--border); border-radius: 6px; padding: .3rem .7rem; color: var(--muted); font-size: .75rem; cursor: pointer; }
  .player-banner-clear:hover { border-color: var(--red); color: var(--red); }

  /* Filter bar */
  .filter-bar { max-width: 860px; margin: 0 auto .75rem; padding: 0 1rem; width: 100%; display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; }
  .filter-search { flex: 1; min-width: 160px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .5rem .7rem; color: var(--text); font-size: .85rem; outline: none; }
  .filter-search:focus { border-color: var(--accent); }
  .filter-search::placeholder { color: var(--muted); }
  .filter-pills { display: flex; gap: .3rem; flex-wrap: wrap; }
  .fpill { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: .25rem .65rem; font-size: .75rem; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all .15s; user-select: none; }
  .fpill:hover { border-color: var(--accent); color: var(--accent); }
  .fpill.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
  .filter-sep { width: 1px; height: 20px; background: var(--border); margin: 0 .15rem; }
  .filter-count { font-size: .75rem; color: var(--muted); margin-left: auto; white-space: nowrap; }

  /* Sort */
  .sort-bar { max-width: 860px; margin: 0 auto .5rem; padding: 0 1rem; width: 100%; display: flex; gap: .4rem; align-items: center; }
  .sort-bar label { font-size: .75rem; color: var(--muted); margin-right: .1rem; }
  .spill { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: .25rem .6rem; font-size: .73rem; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all .15s; user-select: none; display: inline-flex; align-items: center; gap: .25rem; }
  .spill:hover { border-color: var(--accent); color: var(--accent); }
  .spill.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
  .spill .arrow { font-size: .6rem; }

  /* Content */
  #content { max-width: 860px; margin: 0 auto 2rem; padding: 0 1rem; width: 100%; }
  .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .6rem; }

  /* Skin card */
  .scard { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .6rem; display: flex; flex-direction: column; align-items: center; text-align: center; cursor: pointer; transition: all .15s; position: relative; min-height: 140px; }
  .scard:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,.3); }
  .scard.owned { border-color: var(--green); }
  .scard.owned::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 8px; background: rgba(63,185,80,.04); pointer-events: none; }
  .scard.equipped { border-color: var(--yellow); border-width: 2px; }
  .scard.unowned { opacity: .5; }
  .scard-icon { width: 52px; height: 52px; border-radius: 6px; object-fit: cover; background: var(--surface); margin-bottom: .35rem; }
  .scard-name { font-size: .75rem; font-weight: 600; line-height: 1.2; margin-bottom: .2rem; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; min-height: 1.8em; }
  .scard-buff { font-size: .65rem; color: var(--muted); line-height: 1.3; margin-bottom: .1rem; }
  .scard-buff.own { color: var(--green); opacity: .7; }
  .scard-type { position: absolute; top: .35rem; left: .35rem; font-size: .55rem; font-weight: 700; padding: .08rem .3rem; border-radius: 3px; }
  .scard-type.event { background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid rgba(210,153,34,.3); }
  .scard-type.unreleased { background: rgba(139,148,158,.15); color: var(--muted); border: 1px solid rgba(139,148,158,.3); }
  .section-header { font-size: .8rem; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; padding: .75rem 0 .5rem; border-bottom: 1px solid var(--border); margin: 1.5rem 0 .75rem; }
  .section-header.muted { color: var(--muted); }
  .scard-levels { position: absolute; top: .35rem; right: .35rem; background: var(--navy); color: #fff; font-size: .55rem; font-weight: 700; padding: .1rem .35rem; border-radius: 4px; }
  .scard-skill { display: inline-flex; align-items: center; gap: .2rem; background: rgba(121,192,255,.1); border: 1px solid rgba(121,192,255,.25); border-radius: 4px; padding: .1rem .35rem; font-size: .6rem; color: var(--accent); cursor: pointer; margin-top: auto; }
  .scard-skill:hover { background: rgba(121,192,255,.2); }
  .scard-power { font-size: .6rem; color: var(--muted); margin-top: .1rem; }

  /* Detail modal */
  .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; max-width: 600px; width: 100%; max-height: 85vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; border-radius: 12px 12px 0 0; }
  .modal-header h2 { font-size: 1rem; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 1.5rem; cursor: pointer; padding: .2rem .5rem; line-height: 1; }

  var BN = {"930001":"Army HP","930002":"Navy HP","930003":"AF HP","930100":"All ATK","930101":"Army ATK","930102":"Navy ATK","930103":"AF ATK","930000":"All HP","960012":"March Size","980101":"Army DMG+","980102":"Navy DMG+","980103":"AF DMG+","980201":"Army DMG\u2212","980202":"Navy DMG\u2212","980203":"AF DMG\u2212","1001001":"All DMG+","980204":"All DMG\u2212","930107":"Navy\u2192Army","930108":"AF\u2192Navy","930109":"Army\u2192AF","930201":"Army Crit%","930202":"Navy Crit%","930203":"AF Crit%","980301":"Army CritDMG","980302":"Navy CritDMG","980303":"AF CritDMG","930301":"Army Dodge","930302":"Navy Dodge","930303":"AF Dodge","930401":"Army AtkSpd","930402":"Navy AtkSpd","930403":"AF AtkSpd","960002":"Gathering Speed+","930504":"Navy DEF\u2190Army","930505":"AF DEF\u2190Navy","930506":"Army DEF\u2190AF","980501":"Army Hit","980502":"Navy Hit","980503":"AF Hit","1010001":"Army Shield","1010002":"Navy Shield","1010003":"AF Shield","1131009":"All Shield","1101064":"Morale","1130010":"Heroes War","1201003":"Rounds+1","1131006":"Capacity","990001":"ATK vs Boss","970003":"ATK vs Dark","970005":"ATK vs Dark","990100":"All ATK","990202":"All DEF","9301160":"All ATK","9301170":"All HP","9301161":"Army ATK","9301162":"Navy ATK","9301163":"AF ATK","9301171":"Army HP","9301172":"Navy HP","9301173":"AF HP","1002001":"Fort ATK","1002002":"Fort HP","990208":"DEF(atk)","990209":"DEF(def)","990890":"Front 2 Rows DMG+","910300":"Gathering Speed+","990592":"AF DMG\u2212 Back 2 Rows","990762":"Front Row DMG\u2212","38001002":"Front 2 Rows ATK","1131002":"All DMG\u2212","990888":"Front Row DMG+","93001301":"First 2 Rows HP","920900":"Gold Production+","990889":"Front 2 Rows DMG\u2212","1131001":"All DMG+","990723":"Navy DMG+ Front Row","990799":"Army DMG+ Front Row","93001201":"Back 2 Rows ATK","920800":"Training Speed+","990818":"Navy DMG\u2212 Back 2 Rows","990510":"DMG\u2212 Cross-Warzone","980205":"DMG\u2212 Base Defense","980104":"DMG+ Base Defense","1001002":"All CritDMG","990176":"DMG+ Cross-Warzone","990632":"First 2 Rows HP","990686":"Back 2 Rows ATK","990684":"AF DMG\u2212 First 2 Rows","990836":"AF DMG+ Front Row","920801":"Army Training Speed+","970002":"Gathering Load+","970008":"Gold Quick Collect","930200":"All Crit Rate","930300":"All Dodge","981063":"Repair Factory Cap","992288":"Max Merge Lv","992289":"Max Merge Lv"};

  // Skill type labels
  var SKILL_TYPES = {0:'Visual',1:'Reward',2:'Interaction',3:'Buff',4:'Status Buff'};

  /** Parse buff string "buffId,val|buffId,val" into readable text */
  function parseBuff(str) {
    if (!str) return '';
    return str.split('|').map(function(pair) {
      var p = pair.split(',');
      if (p.length < 2) return '';
      var id = p[0], val = parseInt(p[1]);
      var name = BN[id] || ('Buff#' + id);
      // March Size (960012) and other raw buffs are raw integers
      var RAW = {'960012':1,'1131006':1,'1130010':1,'1201003':1,'1101064':1,'981063':1,'992288':1,'992289':1};
      if (RAW[id]) return name + ' +' + val;
      return name + ' +' + (val/100).toFixed(1) + '%';
    }).filter(Boolean).join(', ');
  }

  /** Parse buff string into array of individual buff lines */
  function parseBuffLines(str) {
    if (!str) return [];
    return str.split('|').map(function(pair) {
      var p = pair.split(',');
      if (p.length < 2) return '';
      var id = p[0], val = parseInt(p[1]);
      var name = BN[id] || ('Buff#' + id);
      var RAW = {'960012':1,'1131006':1,'1130010':1,'1201003':1,'1101064':1,'981063':1,'992288':1,'992289':1};
      if (RAW[id]) return name + ' +' + val;
      return name + ' +' + (val/100).toFixed(1) + '%';
    }).filter(Boolean);
  }

  /** Icon URL for a skin ID */
  function iconUrl(sid) {
    var fn = IL[String(sid)];
    if (!fn) return null;
    return ASSET_BASE + 'assets/base-icons/' + fn;
  }

  /** Create element helper */
  function el(tag, attrs, children) {
    var e = document.createElement(tag);
    if (attrs) for (var k in attrs) {
      if (k === 'className') e.className = attrs[k];
      else if (k === 'onclick') e.onclick = attrs[k];
      else if (k === 'style') e.style.cssText = attrs[k];
      else e.setAttribute(k, attrs[k]);
    }
    if (children != null) {
      if (typeof children === 'string') e.textContent = children;
      else if (Array.isArray(children)) children.forEach(function(c) { if (c) e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c); });
      else e.appendChild(children);
    }
    return e;
  }

  // Build card data: group-based entries
  var cards = []; // { id, ids[], name, icon, equipBuff, ownBuff, type, levels, hasSkill, skillName, order, power, searchText }

  // Group non-zero groups
  var groupedDone = {};
  for (var sid in SI) {
    var s = SI[sid];
    var sg = s[GRP];
    if (sg !== 0 && !groupedDone[sg]) {
      groupedDone[sg] = true;
      var members = SG[sg] || [parseInt(sid)];
      var topSkin = SI[String(members[members.length - 1])]; // highest level
      var first = SI[String(members[0])];
      var hasSkill = members.some(function(m) { return SI[String(m)][SKID] !== 0; });
      var skillName = '';
      for (var mi = 0; mi < members.length; mi++) {
        var ms = SI[String(members[mi])];
        if (ms[SKID]) { skillName = ms[SKN]; break; }
      }
      cards.push({
        id: members[0], ids: members, name: topSkin[N], icon: iconUrl(members[members.length-1]) || iconUrl(members[0]),
        equipBuff: topSkin[EB], ownBuff: topSkin[OB], type: topSkin[STYPE], levels: members.length,
        hasSkill: hasSkill, skillName: skillName, order: first[ORD], power: topSkin[POW],
        searchText: (members.map(function(m) { var x = SI[String(m)]; return x[N] + ' ' + x[SKN]; }).join(' ') + ' ' + parseBuff(topSkin[EB]) + ' ' + parseBuff(topSkin[OB])).toLowerCase()
      });
    } else if (sg === 0) {
      cards.push({
        id: parseInt(sid), ids: [parseInt(sid)], name: s[N], icon: iconUrl(sid),
        equipBuff: s[EB], ownBuff: s[OB], type: s[STYPE], levels: 1,
        hasSkill: s[SKID] !== 0, skillName: s[SKN], order: s[ORD], power: s[POW],
        searchText: (s[N] + ' ' + s[SKN] + ' ' + parseBuff(s[EB]) + ' ' + parseBuff(s[OB])).toLowerCase()
      });
    }
  }

  // Report state
  var reportData = null;
  var ownedSkins = {};
  var equippedSkin = 0;

  // Sort state: key + ascending
  var sortKey = 'name';
  var sortAsc = true;

  function toggleSort(key) {
    if (sortKey === key) { sortAsc = !sortAsc; }
    else { sortKey = key; sortAsc = key === 'name'; } // name defaults asc, others desc
    // Update pill styles
    ['name','levels','power'].forEach(function(k) {
      var pill = document.getElementById('sort' + k.charAt(0).toUpperCase() + k.slice(1));
      var arrow = document.getElementById('sort' + k.charAt(0).toUpperCase() + k.slice(1) + 'Arrow');
      if (k === sortKey) {
        pill.classList.add('active');
        arrow.textContent = sortAsc ? '\u2191' : '\u2193';
      } else {
        pill.classList.remove('active');
      }
    });
    applyFilters();
  }

  // Filter state
  var activeFilter = 'all';
  var activeBuffFilters = []; // array of category keys

  // Buff filter categories — each maps a display label to a test function on buff name
  var BUFF_CATS = [
    { key: 'dmg_inc', label: 'Damage Increase', test: function(n) { return n.indexOf('DMG+') >= 0 || n.indexOf('DMG Increase') >= 0; } },
    { key: 'dmg_dec', label: 'Damage Decrease', test: function(n) { return n.indexOf('DMG\u2212') >= 0 || n.indexOf('DMG Dec') >= 0 || n.indexOf('DMG Reduction') >= 0 || n === 'All DEF' || n.indexOf('DEF(') >= 0; } },
    { key: 'attack', label: 'Attack', test: function(n) { return (n.indexOf('ATK') >= 0 || n.indexOf('Rows ATK') >= 0) && n.indexOf('AtkSpd') < 0; } },
    { key: 'hp', label: 'HP', test: function(n) { return n.indexOf('HP') >= 0; } },
    { key: 'march', label: 'March Size', test: function(n) { return n === 'March Size'; } },
    { key: 'crit', label: 'Crit', test: function(n) { return n.indexOf('Crit') >= 0; } },
    { key: 'speed', label: 'Speed / Gathering', test: function(n) { return n.indexOf('Speed') >= 0 || n.indexOf('Gathering') >= 0; } },
    { key: 'other', label: 'Other', test: function(n) { return true; } } // catch-all
  ];

  /** Categorize a buff name into the first matching category */
  function buffCategory(buffName) {
    for (var i = 0; i < BUFF_CATS.length - 1; i++) {
      if (BUFF_CATS[i].test(buffName)) return BUFF_CATS[i].key;
    }
    return 'other';
  }

  /** Check if a card has any buff matching active buff filters */
  function cardMatchesBuffFilter(c) {
    if (activeBuffFilters.length === 0) return true;
    var matched = false;
    [c.equipBuff, c.ownBuff].forEach(function(str) {
      if (!str || matched) return;
      str.split('|').forEach(function(pair) {
        if (matched) return;
        var p = pair.split(',');
        if (p.length < 2) return;
        var name = BN[p[0]];
        if (!name) return;
        var cat = buffCategory(name);
        if (activeBuffFilters.indexOf(cat) >= 0) matched = true;
      });
    });
    return matched;
  }

  /** Open buff filter modal */
  function openBuffFilterModal() {
    var overlay = el('div', { className: 'modal-overlay', onclick: function(e) { if (e.target === overlay) document.body.removeChild(overlay); } });
    var modal = el('div', { className: 'modal', style: 'max-width:520px;' });

    var header = el('div', { className: 'modal-header' });
    header.appendChild(el('h2', null, 'Filter by Buff Type'));
    header.appendChild(el('button', { className: 'modal-close', onclick: function() { document.body.removeChild(overlay); } }, '\u00D7'));
    modal.appendChild(header);

    var body = el('div', { className: 'modal-body' });

    // Build category grid with checkboxes
    var grid = el('div', { className: 'bf-grid' });
    var checkboxes = {};

    BUFF_CATS.forEach(function(cat) {
      // Count skins in this category (from main cards only, not junk/unreleased)
      var count = 0;
      cards.forEach(function(c) {
        if (isUnreleased(c) || c.type === 1) return;
        var found = false;
        [c.equipBuff, c.ownBuff].forEach(function(str) {
          if (!str || found) return;
          str.split('|').forEach(function(pair) {
            if (found) return;
            var p = pair.split(',');
            if (p.length < 2) return;
            var name = BN[p[0]];
            if (name && cat.test(name)) found = true;
          });
        });
        if (found) count++;
      });

      if (count === 0 && cat.key !== 'other') return; // skip empty categories

      var item = el('div', { className: 'bf-cat' });
      var cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.id = 'bf_' + cat.key;
      cb.checked = activeBuffFilters.indexOf(cat.key) >= 0;
      checkboxes[cat.key] = cb;

      var lbl = el('label', { 'for': 'bf_' + cat.key, style: 'cursor:pointer;display:flex;align-items:center;gap:.4rem;' });
      lbl.appendChild(cb);
      lbl.appendChild(document.createTextNode(cat.label));
      lbl.appendChild(el('span', { className: 'bf-count' }, '(' + count + ')'));

      var title = el('div', { className: 'bf-item' });
      title.appendChild(lbl);
      item.appendChild(title);
      grid.appendChild(item);
    });

    body.appendChild(grid);

    // Actions
    var actions = el('div', { className: 'bf-actions' });
    actions.appendChild(el('button', { className: 'bf-clear', onclick: function() {
      activeBuffFilters = [];
      document.body.removeChild(overlay);
      document.getElementById('buffFilterBtn').classList.remove('bf-active');

    } }, 'Clear'));
    actions.appendChild(el('button', { className: 'bf-apply', onclick: function() {
      activeBuffFilters = [];

        if (checkboxes[k].checked) activeBuffFilters.push(k);
      }
      document.body.removeChild(overlay);
      document.getElementById('buffFilterBtn').classList.toggle('bf-active', activeBuffFilters.length > 0);
      applyFilters();
    } }, 'Apply'));
    body.appendChild(actions);

    modal.appendChild(body);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
  }

  /** Build filter pills */
  function buildFilterPills() {
    var cont = document.getElementById('filterPills');
    cont.innerHTML = '';
    var pills = [
      { key: 'all', label: 'All' },
      { key: 'skill', label: 'Has Skill' },
      { key: 'grouped', label: 'Grouped' }
    ];
    if (reportData) pills.push({ key: 'owned', label: 'Owned' });
    pills.forEach(function(p) {
      var pill = el('span', { className: 'fpill' + (activeFilter === p.key ? ' active' : ''), onclick: function() {
        activeFilter = p.key;
        buildFilterPills();
        applyFilters();
      } }, p.label);
      cont.appendChild(pill);
    });
  }

  /** Check if a card has unresolved buff names */
  function hasUnresolvedBuffs(c) {
    var txt = parseBuff(c.equipBuff) + ' ' + parseBuff(c.ownBuff);
    return txt.indexOf('Buff#') >= 0;
  }

  /** Check if a card is unreleased (unresolved name) */
  function isUnreleased(c) {
    return c.name && c.name.indexOf('skin_name_') === 0;
  }

  /** Build a single card element */
  function buildCard(c) {
    var card = el('div', { className: 'scard' + (ownedSkins[c.id] ? ' owned' : (reportData ? ' unowned' : '')) + (equippedSkin && c.ids.indexOf(equippedSkin) >= 0 ? ' equipped' : '') });
    card.onclick = function() { openDetailModal(c); };

    if (c.icon) {
      var img = el('img', { className: 'scard-icon', src: c.icon, alt: c.name || '', loading: 'lazy' });
      img.onerror = function() { this.style.display = 'none'; };
      card.appendChild(img);
    } else {
      card.appendChild(el('div', { className: 'scard-icon', style: 'display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--muted);' }, '\uD83C\uDFF0'));
    }

    card.appendChild(el('div', { className: 'scard-name' }, c.name || ''));

    var equipLines = parseBuffLines(c.equipBuff);
    equipLines.forEach(function(line) { card.appendChild(el('div', { className: 'scard-buff' }, '\u2694 ' + line)); });
    var ownLines = parseBuffLines(c.ownBuff);
    ownLines.forEach(function(line) { card.appendChild(el('div', { className: 'scard-buff own' }, line)); });

    if (c.type === 1) card.appendChild(el('span', { className: 'scard-type event' }, 'Event Only'));
    if (isUnreleased(c)) card.appendChild(el('span', { className: 'scard-type unreleased' }, 'Unreleased'));
    if (c.levels > 1) card.appendChild(el('span', { className: 'scard-levels' }, c.levels + ' Lv'));

    if (c.hasSkill) {
      var skillBadge = el('span', { className: 'scard-skill' }, ['\u26A1 ', c.skillName || 'Skill']);
      skillBadge.onclick = function(e) {
        e.stopPropagation();
        for (var i = 0; i < c.ids.length; i++) {
          var ms = SI[String(c.ids[i])];
          if (ms[SKID]) { openSkillModal(c.ids[i]); return; }
        }
      };
      card.appendChild(skillBadge);
    }

    if (c.power > 0) card.appendChild(el('div', { className: 'scard-power' }, '\uD83E\uDEC3 ' + c.power.toLocaleString() + ' Combat Power'));

    return card;
  }

  /** Render cards in sections */
  function renderCards(list) {
    var content = document.getElementById('content');
    while (content.firstChild) content.removeChild(content.firstChild);

    // Junk skin IDs (not real skins)
    var JUNK_IDS = {1910000:1,1911000:1,1600100:1,1600200:1,1600300:1,1600400:1,1600500:1,1600600:1,1600700:1,1600800:1,1600900:1,1710200:1,1710400:1,1717000:1};

    // Split into sections
    var main = [], eventOnly = [], unresolvedBuff = [], unreleased = [], junk = [];
    list.forEach(function(c) {
      if (isUnreleased(c)) unreleased.push(c);
      else if (JUNK_IDS[c.id]) junk.push(c);
      else if (c.type === 1) eventOnly.push(c);
      else if (hasUnresolvedBuffs(c)) unresolvedBuff.push(c);
      else main.push(c);
    });

    // Main grid
    if (main.length > 0) {
      var grid = el('div', { className: 'card-grid' });
      main.forEach(function(c) { grid.appendChild(buildCard(c)); });
      content.appendChild(grid);
    }

    // Event Only section
    if (eventOnly.length > 0) {
      content.appendChild(el('div', { className: 'section-header' }, 'Event Only (' + eventOnly.length + ')'));
      var evGrid = el('div', { className: 'card-grid' });
      eventOnly.forEach(function(c) { evGrid.appendChild(buildCard(c)); });
      content.appendChild(evGrid);
    }

    // Unresolved buffs section
    if (unresolvedBuff.length > 0) {
      content.appendChild(el('div', { className: 'section-header muted' }, 'Unresolved Buff Names (' + unresolvedBuff.length + ')'));
      var ubNote = el('div', { style: 'font-size:.75rem;color:var(--muted);margin-bottom:.75rem;line-height:1.5;' },
        'Some buff names haven\u2019t been mapped yet. Want to help? Submit a bug report with the Buff# ID and its in-game display name, and this section will shrink over time.');
      if (hasIdentity()) {
        var ubBtn = el('button', { style: 'margin-left:.5rem;background:var(--accent);color:var(--bg);border:none;border-radius:5px;padding:.25rem .6rem;font-size:.7rem;font-weight:600;cursor:pointer;vertical-align:middle;', onclick: function() { openFeedbackModal(); } }, 'Submit Buff Name');
        ubNote.appendChild(ubBtn);
      }
      content.appendChild(ubNote);
      var ubGrid = el('div', { className: 'card-grid' });
      unresolvedBuff.forEach(function(c) { ubGrid.appendChild(buildCard(c)); });
      content.appendChild(ubGrid);
    }

    // Unreleased section
    if (unreleased.length > 0) {
      content.appendChild(el('div', { className: 'section-header muted' }, 'Unreleased (' + unreleased.length + ')'));
      var urGrid = el('div', { className: 'card-grid' });
      unreleased.forEach(function(c) { urGrid.appendChild(buildCard(c)); });
      content.appendChild(urGrid);
    }

    // Junk section
    if (junk.length > 0) {
      content.appendChild(el('div', { className: 'section-header muted' }, 'Junk (' + junk.length + ')'));
      var jkGrid = el('div', { className: 'card-grid' });
      junk.forEach(function(c) { jkGrid.appendChild(buildCard(c)); });
      content.appendChild(jkGrid);
    }

    var total = main.length + eventOnly.length + unresolvedBuff.length + unreleased.length + junk.length;
    document.getElementById('filterCount').textContent = total + ' / ' + cards.length + ' skins';
  }

  /** Apply search, filter, sort */
  function applyFilters() {
    var query = document.getElementById('filterSearch').value.toLowerCase().trim();

    var filtered = cards.filter(function(c) {
      if (query && c.searchText.indexOf(query) < 0) return false;
      if (activeFilter === 'skill' && !c.hasSkill) return false;
      if (activeFilter === 'grouped' && c.levels <= 1) return false;
      if (activeFilter === 'owned' && !ownedSkins[c.id]) return false;
      if (!cardMatchesBuffFilter(c)) return false;
      return true;
    });

    // Sort
    var dir = sortAsc ? 1 : -1;
    filtered.sort(function(a, b) {
      if (reportData) {
        var aOwn = ownedSkins[a.id] ? 0 : 1;
        var bOwn = ownedSkins[b.id] ? 0 : 1;
        if (aOwn !== bOwn) return aOwn - bOwn;
      }
      switch (sortKey) {
        case 'name': return dir * (a.name||'').localeCompare(b.name||'');
        case 'power': return dir * ((a.power||0) - (b.power||0));
        case 'levels': return dir * (a.levels - b.levels) || (a.name||'').localeCompare(b.name||'');
        default: return 0;
      }
    });

    renderCards(filtered);
  }

  /** Open detail modal for a skin group */
  function openDetailModal(card) {
    var overlay = el('div', { className: 'modal-overlay', onclick: function(e) { if (e.target === overlay) document.body.removeChild(overlay); } });
    var modal = el('div', { className: 'modal' });

    var header = el('div', { className: 'modal-header' });
    header.appendChild(el('h2', null, card.name));
    header.appendChild(el('button', { className: 'modal-close', onclick: function() { document.body.removeChild(overlay); } }, '\u00D7'));
    modal.appendChild(header);

    var body = el('div', { className: 'modal-body' });

    // Summary
    if (card.type === 1) body.appendChild(el('div', { style: 'margin-bottom:.5rem;' }, el('span', { className: 'scard-type special', style: 'position:static;' }, 'Special Skin')));
    if (card.power > 0) body.appendChild(el('div', { style: 'font-size:.8rem;color:var(--muted);margin-bottom:.5rem;' }, 'Power: ' + card.power.toLocaleString()));

    // Equip buffs
    var ebLines = parseBuffLines(card.equipBuff);
    if (ebLines.length > 0) {
      body.appendChild(el('div', { style: 'font-size:.75rem;color:var(--accent);font-weight:600;margin-bottom:.2rem;' }, 'Equip Buff'));
      ebLines.forEach(function(line) { body.appendChild(el('div', { style: 'font-size:.8rem;margin-bottom:.1rem;' }, '\u2694 ' + line)); });
    }
    var obLines = parseBuffLines(card.ownBuff);
    if (obLines.length > 0) {
      body.appendChild(el('div', { style: 'font-size:.75rem;color:var(--green);font-weight:600;margin:.4rem 0 .2rem;' }, 'Own Buff'));
      obLines.forEach(function(line) { body.appendChild(el('div', { style: 'font-size:.8rem;color:var(--green);opacity:.8;margin-bottom:.1rem;' }, line)); });
    }

    // Level progression table
    if (card.ids.length > 1) {
      body.appendChild(el('div', { style: 'font-size:.8rem;font-weight:600;margin:.75rem 0 .3rem;color:var(--accent);' }, 'Level Progression'));
      var table = el('table', { className: 'level-table' });
      var thead = el('tr');
      ['', 'Name', 'Equip Buff', 'Own Buff', 'Skill'].forEach(function(h) { thead.appendChild(el('th', null, h)); });
      table.appendChild(thead);

      card.ids.forEach(function(mid) {
        var ms = SI[String(mid)];
        var tr = el('tr');
        // Icon
        var td1 = el('td');
        var iurl = iconUrl(mid);
        if (iurl) { var img = el('img', { className: 'lv-icon', src: iurl, loading: 'lazy' }); img.onerror = function() { this.style.display = 'none'; }; td1.appendChild(img); }
        tr.appendChild(td1);
        // Name + level
        var nameCell = el('td');
        nameCell.appendChild(el('div', { className: 'lv-name' }, ms[N]));
        if (ms[LVL] > 0) nameCell.appendChild(el('div', { style: 'font-size:.65rem;color:var(--muted);' }, 'Lv.' + ms[LVL]));
        tr.appendChild(nameCell);
        // Equip buff
        var ebCell = el('td', { className: 'lv-buff' });
        var ebL = parseBuffLines(ms[EB]);
        if (ebL.length) ebL.forEach(function(l) { ebCell.appendChild(el('div', null, l)); });
        else ebCell.textContent = '\u2014';
        tr.appendChild(ebCell);
        // Own buff
        var obCell = el('td', { className: 'lv-buff', style: 'color:var(--green);opacity:.8;' });
        var obL = parseBuffLines(ms[OB]);
        if (obL.length) obL.forEach(function(l) { obCell.appendChild(el('div', null, l)); });
        else obCell.textContent = '\u2014';
        tr.appendChild(obCell);
        // Skill
        var skillCell = el('td');
        if (ms[SKID]) {
          var badge = el('span', { className: 'lv-skill-badge' }, '\u26A1 ' + ms[SKN]);
          badge.onclick = function() { openSkillModal(mid); };
          skillCell.appendChild(badge);
        } else {
          skillCell.textContent = '\u2014';
        }
        tr.appendChild(skillCell);

        table.appendChild(tr);
      });
      body.appendChild(table);
    } else {
      // Single skin — show icon larger
      var singleId = card.ids[0];
      var iurl = iconUrl(singleId);
      if (iurl) {
        var bigIcon = el('img', { src: iurl, style: 'width:80px;height:80px;border-radius:8px;object-fit:cover;background:var(--card);display:block;margin:.5rem auto;' });
        body.appendChild(bigIcon);
      }
      // Skill section
      var ss = SI[String(singleId)];
      if (ss[SKID]) {
        body.appendChild(el('div', { style: 'margin-top:.75rem;' }, ''));
        var badge = el('span', { className: 'scard-skill', style: 'font-size:.8rem;padding:.3rem .6rem;' }, '\u26A1 ' + ss[SKN]);
        badge.onclick = function() { openSkillModal(singleId); };
        body.appendChild(badge);
      }
    }

    modal.appendChild(body);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
  }

  /** Open skill modal */
  function openSkillModal(skinId) {
    var s = SI[String(skinId)];
    if (!s || !s[SKID]) return;

    var overlay = el('div', { className: 'modal-overlay', onclick: function(e) { if (e.target === overlay) document.body.removeChild(overlay); } });
    var modal = el('div', { className: 'modal', style: 'max-width:500px;' });

    var header = el('div', { className: 'modal-header' });
    header.appendChild(el('h2', null, 'City Skill'));
    header.appendChild(el('button', { className: 'modal-close', onclick: function() { document.body.removeChild(overlay); } }, '\u00D7'));
    modal.appendChild(header);

    var body = el('div', { className: 'modal-body' });

    // Skill header
    var sh = el('div', { className: 'skill-header' });
    sh.appendChild(el('span', { className: 'skill-icon' }, '\u26A1'));
    sh.appendChild(el('span', { className: 'skill-name' }, s[SKN]));
    var typeLabel = SKILL_TYPES[s[SKTYPE]] || ('Type ' + s[SKTYPE]);
    sh.appendChild(el('span', { className: 'skill-type' }, typeLabel));
    body.appendChild(sh);

    // From skin name
    body.appendChild(el('div', { style: 'font-size:.8rem;color:var(--muted);margin-bottom:.75rem;' }, 'From: ' + s[N]));

    // Description
    if (s[SKDESC]) {
      body.appendChild(el('div', { style: 'font-size:.75rem;color:var(--accent);font-weight:600;margin-bottom:.25rem;' }, 'Description'));
      body.appendChild(el('div', { className: 'skill-desc' }, s[SKDESC]));
    }

    // Usage details
    if (s[SKUSE]) {
      body.appendChild(el('div', { style: 'font-size:.75rem;color:var(--accent);font-weight:600;margin-bottom:.25rem;' }, 'How to Use'));
      body.appendChild(el('div', { className: 'skill-usage' }, s[SKUSE]));
    }

    modal.appendChild(body);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
  }

  /** Load battle report */
  function loadReport() {
    var input = document.getElementById('reportInput').value.trim();
    var id = input.replace(/[^0-9]/g, '');
    if (!id || id.length < 10) { setStatus('Enter a valid report ID', 'error'); return; }
    var btn = document.getElementById('loadBtn');
    btn.disabled = true;
    setStatus('Loading report\u2026');

    var prefix = id.substring(0, 4);
    var url = 'https://fight-report-va.oss-accelerate.aliyuncs.com/prod/' + prefix + '/' + id + '.json';

    fetch(url).then(function(r) {
      if (!r.ok) throw new Error('Report not found (HTTP ' + r.status + ')');
      return r.json();
    }).then(function(data) {
      var att = data.battle && data.battle.attacker;
      var p = att && att.players && att.players[0];
      if (!p || !p.effectSkins) throw new Error('No effectSkins data in report');

      reportData = data;
      ownedSkins = {};
      equippedSkin = 0;

      var es = p.effectSkins;
      (es.effectIds || []).forEach(function(eid) { ownedSkins[eid] = true; });
      if (es.useIds && es.useIds.length > 0) equippedSkin = es.useIds[0];

      // Update banner
      var pi = p.playerInfo || {};
      document.getElementById('bannerName').textContent = pi.username || 'Attacker';
      var ownCount = Object.keys(ownedSkins).length;
      document.getElementById('bannerDetail').textContent = ownCount + ' skins owned' + (equippedSkin ? ', equipped: ' + (SI[String(equippedSkin)] ? SI[String(equippedSkin)][N] : '#' + equippedSkin) : '');
      document.getElementById('playerBanner').style.display = 'block';

      // Mark cards as owned
      cards.forEach(function(c) {
        c.ids.forEach(function(mid) { if (ownedSkins[mid]) ownedSkins[c.id] = true; });
      });

      setStatus('Loaded! ' + ownCount + ' skins found.', 'success');
      buildFilterPills();
      applyFilters();
    }).catch(function(err) {
      setStatus(err.message, 'error');
    }).finally(function() { btn.disabled = false; });
  }

  function clearReport() {
    reportData = null;
    ownedSkins = {};
    equippedSkin = 0;
    document.getElementById('playerBanner').style.display = 'none';
    document.getElementById('reportInput').value = '';
    activeFilter = 'all';
    setStatus('');
    buildFilterPills();
    applyFilters();
  }

  function setStatus(msg, cls) {
    var el = document.getElementById('statusEl');
    el.textContent = msg;
    el.className = 'status' + (cls ? ' ' + cls : '');
  }

  // Identity + Feedback
  var PUSH_WORKER = 'https://push-worker.27tb8s6fct.workers.dev';

  function hasIdentity() {
    try {
      var v = localStorage.getItem('playerIdentity');
      return v && v !== 'anonymous' && JSON.parse(v).name;
    } catch(e) { return false; }
  }

  function getIdentityName() {
    try { return JSON.parse(localStorage.getItem('playerIdentity')).name || 'Anonymous'; }
    catch(e) { return 'Anonymous'; }
  }

  function openFeedbackModal() {
    var overlay = el('div', { className: 'modal-overlay', onclick: function(e) { if (e.target === overlay) document.body.removeChild(overlay); } });
    var modal = el('div', { className: 'modal', style: 'max-width:440px;' });

    var header = el('div', { className: 'modal-header' });
    header.appendChild(el('h2', null, 'Submit Buff Name'));
    header.appendChild(el('button', { className: 'modal-close', onclick: function() { document.body.removeChild(overlay); } }, '\u00D7'));
    modal.appendChild(header);

    var body = el('div', { className: 'modal-body' });
    body.appendChild(el('div', { style: 'font-size:.8rem;color:var(--muted);margin-bottom:.75rem;' },
      'Submitting as: ' + getIdentityName()));

    var titleInput = el('input', { type: 'text', placeholder: 'Buff ID (e.g. 990871)', style: 'width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.5rem .7rem;color:var(--text);font-size:.85rem;margin-bottom:.5rem;outline:none;' });
    body.appendChild(titleInput);

    var descInput = el('textarea', { placeholder: 'In-game display name for this buff...', style: 'width:100%;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:.5rem .7rem;color:var(--text);font-size:.85rem;min-height:80px;resize:vertical;outline:none;font-family:inherit;' });
    body.appendChild(descInput);

    var resultDiv = el('div', { style: 'display:none;text-align:center;padding:1rem;' });

    var sendBtn = el('button', { className: 'bf-apply', style: 'margin-top:.75rem;width:100%;', onclick: function() {
      if (!titleInput.value.trim() || !descInput.value.trim()) return;
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending\u2026';

      fetch(PUSH_WORKER + '/feedback/bug', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          title: '[Base Skin Buff] ' + titleInput.value.trim(),
          description: 'Buff ID: ' + titleInput.value.trim() + '\nDisplay name: ' + descInput.value.trim() + '\nPage: bases.html',
          submitter: getIdentityName()
        })
      }).then(function(r) { return r.json(); }).then(function(d) {
        if (d.ok) {
          resultDiv.style.display = '';
          resultDiv.textContent = '\u2705 Submitted! Thank you.';
          titleInput.style.display = 'none';
          descInput.style.display = 'none';
          sendBtn.style.display = 'none';
        } else {
          sendBtn.textContent = 'Error \u2014 try again';
          sendBtn.disabled = false;
        }
      }).catch(function() {
        sendBtn.textContent = 'Error \u2014 try again';
        sendBtn.disabled = false;
      });
    } }, 'Submit');
    body.appendChild(sendBtn);
    body.appendChild(resultDiv);

    modal.appendChild(body);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
  }

  // Init
  buildFilterPills();
  applyFilters();
</script>
</body>
</html>
