<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --card: #1c2128; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --navy: #388bfd;

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: .75rem 1rem; display: flex; align-items: center; gap: .75rem; }
  .header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
  .home-btn { display: flex; align-items: center; justify-content: center; background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: .4rem .6rem; text-decoration: none; transition: all .15s; }
  .home-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Beta nav */
  .bnp-wrap { position:relative; display:inline-flex; }
  #bnpBtn { background:none; border:1px solid var(--border,#30363d); border-radius:8px; padding:.3rem .45rem; color:var(--muted,#8b949e); cursor:pointer; display:flex; align-items:center; }
  #bnpBtn:hover { border-color:var(--accent,#79c0ff); color:var(--accent,#79c0ff); }
  #bnpPop { display:none; position:absolute; top:calc(100% + 6px); left:0; background:var(--surface,#161b22); border:1px solid var(--border,#30363d); border-radius:10px; padding:.4rem; z-index:500; min-width:168px; box-shadow:0 8px 24px rgba(0,0,0,.5); }
  #bnpPop.open { display:block; }
  .bnp-link { display:block; padding:.35rem .6rem; font-size:.78rem; color:var(--muted,#8b949e); text-decoration:none; border-radius:6px; white-space:nowrap; }
  .bnp-link:hover { background:rgba(121,192,255,.08); color:var(--text,#e6edf3); }
  .bnp-link.bnp-cur { color:var(--accent,#79c0ff); font-weight:600; pointer-events:none; }

  /* Search */
  .search-bar { max-width: 700px; margin: 2rem auto; padding: 0 1rem; width: 100%; }
  .search-row { display: flex; gap: .5rem; }
  .search-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .6rem .75rem; color: var(--text); font-size: .95rem; outline: none; }
  .search-row input:focus { border-color: var(--accent); }
  .search-row input::placeholder { color: var(--muted); }
  .search-row button { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: .6rem 1.2rem; font-weight: 600; cursor: pointer; font-size: .9rem; white-space: nowrap; }
  .search-row button:hover { opacity: .9; }
  .search-row button:disabled { opacity: .5; cursor: not-allowed; }
  .search-hint { font-size: .75rem; color: var(--muted); margin-top: .4rem; }

  /* Status */
  .status { text-align: center; padding: 1rem; color: var(--muted); font-size: .9rem; }
  .status.error { color: var(--red); }
  .status.success { color: var(--green); }

  /* Player selection modal */
  .select-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .select-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; max-width: 500px; width: 100%; padding: 1.25rem; }
  .select-title { text-align: center; font-size: 1rem; font-weight: 700; margin-bottom: 1rem; }
  .select-cards { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .select-card { background: var(--card); border: 2px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; cursor: pointer; transition: all .15s; }
  .select-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.3); }
  .select-card img { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: var(--surface); margin: 0 auto .5rem; display: block; }
  .select-card-name { font-weight: 600; font-size: .9rem; word-break: break-all; }
  .select-card-alliance { font-size: .75rem; color: var(--accent); margin-top: .15rem; }
  .select-card-flag { font-size: 1.2rem; margin-top: .25rem; }
  .select-card-role { font-size: .7rem; color: var(--muted); text-transform: uppercase; margin-top: .3rem; }

  /* Player banner */
  .player-banner { max-width: 860px; margin: 0 auto .75rem; padding: 0 1rem; width: 100%; }
  .player-banner-inner { background: var(--surface); border: 1px solid var(--green); border-radius: 8px; padding: .6rem 1rem; display: flex; align-items: center; gap: .75rem; }
  .player-banner-inner img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: var(--card); }
  .player-banner-info { flex: 1; }
  .player-banner-name { font-weight: 600; font-size: .9rem; }
  .player-banner-detail { font-size: .75rem; color: var(--muted); }
  .player-banner-clear { background: none; border: 1px solid var(--border); border-radius: 6px; padding: .3rem .7rem; color: var(--muted); font-size: .75rem; cursor: pointer; }
  .player-banner-clear:hover { border-color: var(--red); color: var(--red); }

  /* Content area */
  #content { max-width: 860px; margin: 0 auto 2rem; padding: 0 1rem; width: 100%; }

  /* Army type card */
  .army-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 1.25rem; overflow: hidden; }
  .army-card-header { display: flex; align-items: center; gap: .75rem; padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); }
  .army-icon-placeholder { width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1rem; flex-shrink: 0; }
  .army-name { font-weight: 700; font-size: 1.05rem; }
  .army-mecha { font-size: .8rem; color: var(--muted); margin-top: .1rem; }

  /* Chip hex layout */
  .chip-layout { padding: 1.25rem; display: flex; flex-direction: column; align-items: center; gap: .75rem; }
  .chip-row { display: flex; gap: .75rem; justify-content: center; align-items: center; }
  .chip-slot { width: 64px; height: 64px; border-radius: 50%; border: 2px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .15s; position: relative; }
  .chip-slot:hover { border-color: var(--accent); transform: scale(1.08); }
  .chip-slot.empty { opacity: .35; cursor: default; }
  .chip-slot.empty:hover { border-color: var(--border); transform: none; }
  .chip-slot.core { width: 76px; height: 76px; border-width: 3px; }
  .chip-slot img { width: 80%; height: 80%; object-fit: contain; border-radius: 50%; }
  .chip-slot .slot-label { position: absolute; bottom: -18px; font-size: .6rem; color: var(--muted); white-space: nowrap; }
  .chip-slot.core .slot-label { bottom: -20px; font-size: .65rem; font-weight: 600; color: var(--accent); }

  /* Set bonus */
  .set-info { padding: 0 1.25rem 1.25rem; }
  .set-header { font-size: .85rem; font-weight: 600; margin-bottom: .5rem; display: flex; align-items: center; gap: .5rem; }
  .set-header img { width: 24px; height: 24px; border-radius: 4px; object-fit: contain; }
  .set-count { font-size: .75rem; color: var(--muted); font-weight: 400; }
  .set-bonuses { list-style: none; padding: 0; }
  .set-bonus { display: flex; align-items: center; gap: .5rem; padding: .3rem .5rem; font-size: .8rem; border-radius: 4px; margin-bottom: .2rem; }
  .set-bonus.active { background: rgba(63,185,80,.08); }
  .set-bonus.inactive { opacity: .45; }
  .set-bonus-check { font-size: .85rem; flex-shrink: 0; width: 18px; text-align: center; }
  .set-bonus-check.on { color: var(--green); }
  .set-bonus-check.off { color: var(--muted); }
  .set-bonus-tier { font-weight: 600; color: var(--accent); min-width: 28px; }
  .set-bonus-desc { color: var(--text); flex: 1; }
  .set-bonus-need { font-size: .7rem; color: var(--muted); margin-left: auto; white-space: nowrap; }

  /* Cumulative summary */
  .cumul-summary { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .6rem .75rem; margin-top: .6rem; }
  .cumul-title { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; margin-bottom: .35rem; }
  .cumul-row { display: flex; justify-content: space-between; font-size: .8rem; padding: .15rem 0; }
  .cumul-label { color: var(--text); }
  .cumul-value { font-weight: 600; color: var(--green); }

  /* No data */
  .no-data { text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: .9rem; }

  /* Footer */
  .footer { text-align: center; padding: 2rem 1rem; font-size: .7rem; color: var(--muted); margin-top: auto; }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* Light theme */
  :root[data-theme="light"] {
    --bg: #f6f8fa; --surface: #ffffff; --card: #ffffff;

  .theme-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-light { display: none; }

  .lang-modal-close:hover { color: var(--text); }
  .lang-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
  .lang-option { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid transparent; background: var(--surface); cursor: pointer; font-size: 13px; color: var(--text); font-family: inherit; transition: border-color .15s; }
  .lang-option:hover { border-color: var(--accent); }
  .lang-option.active { border-color: var(--accent); background: rgba(121,192,255,.08); }
  .lang-option .lang-flag { font-size: 1.1rem; }
  @media (max-width: 480px) { .lang-grid { grid-template-columns: 1fr; } }

  /* Mobile */
  @media (max-width: 600px) {

    .chip-slot { width: 52px; height: 52px; }
    .chip-slot.core { width: 64px; height: 64px; }
    .chip-slot img { width: 75%; height: 75%; }
    .chip-row { gap: .5rem; }
    .army-card-header { padding: .75rem 1rem; }
    .chip-layout { padding: 1rem .75rem; }
    .set-info { padding: 0 1rem 1rem; }
  }
</style>

    if (!nf || nf < 1 || nf > ISO_CODES.length) return '';
    var code = ISO_CODES[nf - 1];
    return String.fromCodePoint(0x1F1E6 + code.charCodeAt(0) - 65) + String.fromCodePoint(0x1F1E6 + code.charCodeAt(1) - 65);
  }

  function resolveAvatar(url) {
    if (!url) return null;
    if (url.indexOf('http') === 0) {
      if (url.indexOf('https://knight-cdn.akamaized.net/') === 0 || url.indexOf('https://h5.topwargame.com/') === 0) return url;
      return null;
    }
    return 'https://h5.topwargame.com/DynRes/images/headpic/' + url + '.png?t=21.jpg';
  }

  function extractPlayerInfo(side) {
    if (!side || !side.players || !side.players[0]) return null;
    var raw = side.players[0].playerInfo;
    if (!raw) return null;
    var pi;
    try { pi = typeof raw === 'string' ? JSON.parse(raw) : raw; } catch(e) { return null; }
    return {
      name: pi.username || 'Unknown',
      alliance: side.alTag || pi.alTag || '',
      flag: pi.nationalflag || 0,
      avatar: resolveAvatar(pi.headimgurl_custom) || resolveAvatar(pi.avatarurl) || ''
    };
  }

  function buildAvatarPlaceholder(name, size) {
    var s = size || 36;
    var initial = (name || '?').charAt(0).toUpperCase();
    return el('div', { style: 'width:'+s+'px;height:'+s+'px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:var(--accent);background:var(--surface);border:1px solid var(--border);flex-shrink:0;' }, initial);
  }

  // --- Data Extraction ---
  function extractChipData(player) {
    var result = {}; // keyed by armyDigit (1, 2, 3)

    // Old format: armyEquips — gives us itemId per slot
    var ae = player.armyEquips || [];
    for (var i = 0; i < ae.length; i++) {
      var item = ae[i];
      var armyDigit = Math.floor(item.armyType / 100); // 101->1, 201->2, 301->3
      if (!result[armyDigit]) result[armyDigit] = { slots: {}, sets: {} };
      result[armyDigit].slots[item.pos] = { itemId: item.itemId, pos: item.pos };
    }

    // New format: newArmyEquips — gives us suit (set) info
    var nae = (player.newArmyEquips || {}).equips || [];
    for (var j = 0; j < nae.length; j++) {
      var nItem = nae[j];
      var posStr = String(nItem.pos);
      var aDigit = parseInt(posStr[0], 10);
      var slot = parseInt(posStr.slice(-2), 10); // last 2 digits = slot number
      if (!result[aDigit]) result[aDigit] = { slots: {}, sets: {} };
      var existing = result[aDigit].slots[slot] || {};
      existing.eid = nItem.eid;
      existing.suit = nItem.suit;
      existing.instanceId = nItem.id;
      existing.pos = slot;
      result[aDigit].slots[slot] = existing;
      // Count sets
      if (nItem.suit > 0) {
        result[aDigit].sets[nItem.suit] = (result[aDigit].sets[nItem.suit] || 0) + 1;
      }
    }

    return result;
  }

  function countEquippedChips(slots) {
    var count = 0;
    for (var k in slots) {
      if (!slots.hasOwnProperty(k)) continue;
      var s = slots[k];
      if ((s.itemId && s.itemId !== 0) || s.eid) count++;
    }
    return count;
  }

  function isSlotFilled(slot) {
    if (!slot) return false;
    return (slot.itemId && slot.itemId !== 0) || !!slot.eid;
  }

  // --- Rendering ---
  function renderChipView(player, pi, sideLabel) {
    var content = document.getElementById('content');
    while (content.firstChild) content.removeChild(content.firstChild);

    // Show player banner
    var banner = document.getElementById('player-banner');
    banner.style.display = '';
    while (banner.firstChild) banner.removeChild(banner.firstChild);
    var inner = el('div', { className: 'player-banner-inner' });
    if (pi.avatar) {
      var avImg = el('img');
      avImg.src = pi.avatar;
      avImg.onerror = function() { this.style.display = 'none'; };
      inner.appendChild(avImg);
    } else {
      inner.appendChild(buildAvatarPlaceholder(pi.name));
    }
    var info = el('div', { className: 'player-banner-info' });
    info.appendChild(el('div', { className: 'player-banner-name' }, (pi.flag ? flagEmoji(pi.flag) + ' ' : '') + pi.name));
    var detail = sideLabel;
    if (pi.alliance) detail += ' \u00B7 [' + pi.alliance + ']';
    info.appendChild(el('div', { className: 'player-banner-detail' }, detail));
    inner.appendChild(info);
    var clearBtn = el('button', { className: 'player-banner-clear' }, 'Change');
    clearBtn.onclick = function() {
      if (lastBattle) showPlayerSelection(lastBattle);
    };
    inner.appendChild(clearBtn);
    banner.appendChild(inner);

    // Extract data
    var chipData = extractChipData(player);

    // Check if any army type has chips
    var hasAny = false;
    for (var ad in chipData) {
      if (!chipData.hasOwnProperty(ad)) continue;
      if (countEquippedChips(chipData[ad].slots) > 0) { hasAny = true; break; }
    }

    if (!hasAny) {
      content.appendChild(el('div', { className: 'no-data' }, 'No HT chips found for this player in this report.'));
      return;
    }

    // Render each army type
    var armyOrder = [1, 2, 3];
    for (var idx = 0; idx < armyOrder.length; idx++) {
      var aDigit = armyOrder[idx];
      var data = chipData[aDigit];
      if (!data || countEquippedChips(data.slots) === 0) continue;

      var at = ARMY_TYPES[aDigit];
      var card = el('div', { className: 'army-card' });
      card.style.borderColor = at.color;

      // Card header
      var header = el('div', { className: 'army-card-header' });
      var iconPh = el('div', { className: 'army-icon-placeholder' });
      iconPh.style.background = at.color + '22';
      iconPh.style.color = at.color;
      iconPh.style.border = '2px solid ' + at.color;
      iconPh.textContent = at.name.charAt(0);
      header.appendChild(iconPh);
      var nameDiv = el('div');
      var nameSpan = el('div', { className: 'army-name' });
      nameSpan.style.color = at.color;
      nameSpan.textContent = at.name;
      nameDiv.appendChild(nameSpan);
      var equipCount = countEquippedChips(data.slots);
      nameDiv.appendChild(el('div', { className: 'army-mecha' }, equipCount + '/7 chips equipped'));
      header.appendChild(nameDiv);
      card.appendChild(header);

      // Chip layout - hexagonal arrangement
      var layout = el('div', { className: 'chip-layout' });

      // Row 1: slots 1, 2
      var row1 = el('div', { className: 'chip-row' });
      row1.appendChild(buildChipSlot(data.slots[1], 1, data));
      row1.appendChild(buildChipSlot(data.slots[2], 2, data));
      layout.appendChild(row1);

      // Row 2: slot 6, CORE (0), slot 3
      var row2 = el('div', { className: 'chip-row' });
      row2.appendChild(buildChipSlot(data.slots[6], 6, data));
      row2.appendChild(buildChipSlot(data.slots[0], 0, data, true));
      row2.appendChild(buildChipSlot(data.slots[3], 3, data));
      layout.appendChild(row2);

      // Row 3: slots 5, 4
      var row3 = el('div', { className: 'chip-row' });
      row3.appendChild(buildChipSlot(data.slots[5], 5, data));
      row3.appendChild(buildChipSlot(data.slots[4], 4, data));
      layout.appendChild(row3);

      card.appendChild(layout);

      // Set bonuses
      var setInfo = el('div', { className: 'set-info' });
      var hasSetInfo = false;

      for (var setId in data.sets) {
        if (!data.sets.hasOwnProperty(setId)) continue;
        var setDef = CHIP_SETS[setId];
        if (!setDef) continue;
        hasSetInfo = true;
        var setCount = data.sets[setId];

        var setHeader = el('div', { className: 'set-header' });
        var setIcon = el('img');
        setIcon.src = ICON_BASE + setDef.icon;
        setIcon.onerror = function() { this.style.display = 'none'; };
        setHeader.appendChild(setIcon);
        setHeader.appendChild(document.createTextNode(setDef.name));
        var countSpan = el('span', { className: 'set-count' }, ' (' + setCount + '/7)');
        setHeader.appendChild(countSpan);
        setInfo.appendChild(setHeader);

        var bonusList = el('ul', { className: 'set-bonuses' });
        for (var b = 0; b < setDef.bonuses.length; b++) {
          var bonus = setDef.bonuses[b];
          var isActive = setCount >= bonus.count;
          var li = el('li', { className: 'set-bonus ' + (isActive ? 'active' : 'inactive') });

          var check = el('span', { className: 'set-bonus-check ' + (isActive ? 'on' : 'off') });
          check.textContent = isActive ? '\u2713' : '\u25CB';
          li.appendChild(check);

          li.appendChild(el('span', { className: 'set-bonus-tier' }, bonus.count + 'pc'));
          li.appendChild(el('span', { className: 'set-bonus-desc' }, bonus.desc));

          if (!isActive) {
            var need = bonus.count - setCount;
            li.appendChild(el('span', { className: 'set-bonus-need' }, 'need ' + need + ' more'));
          }

          bonusList.appendChild(li);
        }
        setInfo.appendChild(bonusList);

        // Cumulative bonus summary (only if at least 2pc active)
        if (setCount >= 2) {
          var cumul = buildCumulativeSummary(setDef, setCount);
          if (cumul) setInfo.appendChild(cumul);
        }
      }

      if (!hasSetInfo) {
        setInfo.appendChild(el('div', { style: 'font-size:.8rem;color:var(--muted);padding:.25rem 0;' }, 'No set info available \u2014 report may use older format.'));
      }

      card.appendChild(setInfo);
      content.appendChild(card);
    }
  }

  function buildChipSlot(slotData, slotNum, armyData, isCore) {
    var filled = isSlotFilled(slotData);
    var slotEl = el('div', { className: 'chip-slot' + (isCore ? ' core' : '') + (filled ? '' : ' empty') });

    if (filled && slotData && slotData.suit && CHIP_SETS[slotData.suit]) {
      var setDef = CHIP_SETS[slotData.suit];
      // Set-colored border
      if (setDef.type === 'atk') {
        slotEl.style.borderColor = '#f85149';
      } else if (setDef.type === 'hp') {
        slotEl.style.borderColor = '#3fb950';
      } else {
        slotEl.style.borderColor = '#d29922';
      }
      var img = el('img');
      img.src = ICON_BASE + setDef.icon;
      img.alt = setDef.name;
      img.onerror = function() { this.style.display = 'none'; };
      slotEl.appendChild(img);
    } else if (filled) {
      // Has a chip but no set info - show generic filled indicator
      slotEl.style.borderColor = 'var(--accent)';
      slotEl.appendChild(el('div', { style: 'width:60%;height:60%;border-radius:50%;background:var(--accent);opacity:.3;' }));
    } else {
      // Empty slot
      slotEl.appendChild(el('div', { style: 'width:8px;height:8px;border-radius:50%;background:var(--border);' }));
    }

    // Slot label
    slotEl.appendChild(el('span', { className: 'slot-label' }, SLOT_LABELS[slotNum] || String(slotNum)));

    // Click handler (stub for future detail modal)
    if (filled) {
      slotEl.onclick = function() {
        // Future: open chip detail modal
      };
    }

    return slotEl;
  }

  /** Build cumulative set bonus summary
   * Set bonuses are CUMULATIVE. Each lower tier bonus carries forward:
   * At 2pc active: 2pc bonus x 1
   * At 4pc active: 2pc bonus x 2, 4pc bonus x 1
   * At 6pc active: 2pc bonus x 3, 4pc bonus x 2, 6pc bonus x 1
   */
  function buildCumulativeSummary(setDef, count) {
    var activeTiers = [];
    for (var i = 0; i < setDef.bonuses.length; i++) {
      if (count >= setDef.bonuses[i].count) activeTiers.push(i);
    }
    if (activeTiers.length === 0) return null;

    // Each tier multiplier = (number of active tiers at or above this tier)
    var summaryMap = {}; // desc -> total base value

    for (var t = 0; t < activeTiers.length; t++) {
      var tierIdx = activeTiers[t];
      var multiplier = activeTiers.length - t;
      var bonus = setDef.bonuses[tierIdx];
      var key = bonus.desc;
      if (!summaryMap[key]) summaryMap[key] = 0;
      summaryMap[key] += bonus.base * multiplier;
    }

    var wrap = el('div', { className: 'cumul-summary' });
    wrap.appendChild(el('div', { className: 'cumul-title' }, 'Cumulative Set Bonuses (base tier)'));

    for (var desc in summaryMap) {
      if (!summaryMap.hasOwnProperty(desc)) continue;
      var row = el('div', { className: 'cumul-row' });
      row.appendChild(el('span', { className: 'cumul-label' }, desc));
      var pct = (summaryMap[desc] / 100).toFixed(0);
      row.appendChild(el('span', { className: 'cumul-value' }, '+' + pct + '%'));
      wrap.appendChild(row);
    }

    return wrap;
  }

  // --- Player Selection ---
  function showPlayerSelection(battle) {
    var attPI = extractPlayerInfo(battle.attacker);
    var defPI = extractPlayerInfo(battle.defender);
    if (!attPI && !defPI) {
      document.getElementById('status').className = 'status error';
      document.getElementById('status').textContent = 'No player data found in report';
      return;
    }

    var overlay = el('div', { className: 'select-overlay' });
    overlay.onclick = function(e) { if (e.target === overlay) document.body.removeChild(overlay); };
    var modal = el('div', { className: 'select-modal' });
    modal.appendChild(el('div', { className: 'select-title' }, 'Select a Player'));

    var cards = el('div', { className: 'select-cards' });

    function makeCard(pi, side, sideLabel) {
      if (!pi) return null;
      var card = el('div', { className: 'select-card' });
      if (pi.avatar) {
        var img = el('img');
        img.src = pi.avatar;
        img.onerror = function() { this.style.display = 'none'; };
        card.appendChild(img);
      }
      card.appendChild(el('div', { className: 'select-card-name' }, pi.name));
      if (pi.alliance) card.appendChild(el('div', { className: 'select-card-alliance' }, '[' + pi.alliance + ']'));
      if (pi.flag) card.appendChild(el('div', { className: 'select-card-flag' }, flagEmoji(pi.flag)));
      card.appendChild(el('div', { className: 'select-card-role' }, sideLabel));
      card.onclick = function() {
        document.body.removeChild(overlay);
        var player = side.players[0];
        renderChipView(player, pi, sideLabel);
      };
      return card;
    }

    var attCard = makeCard(attPI, battle.attacker, 'Attacker');
    var defCard = makeCard(defPI, battle.defender, 'Defender');
    if (attCard) cards.appendChild(attCard);
    if (defCard) cards.appendChild(defCard);
    modal.appendChild(cards);
    overlay.appendChild(modal);
    document.body.appendChild(overlay);
  }

  // --- Report Loading ---
  function loadReport() {
    var input = document.getElementById('report-id');
    var btn = document.getElementById('load-btn');
    var status = document.getElementById('status');
    var id = input.value.trim();
    if (!id) { status.className = 'status error'; status.textContent = 'Enter a report ID'; return; }
    if (!/^\d{10,25}$/.test(id)) { status.className = 'status error'; status.textContent = 'Invalid report ID format'; return; }

    btn.disabled = true;
    status.className = 'status';
    status.textContent = 'Loading report...';

    // Clear previous content
    var contentEl = document.getElementById('content');
    while (contentEl.firstChild) contentEl.removeChild(contentEl.firstChild);
    document.getElementById('player-banner').style.display = 'none';

    var prefix = id.substring(0, 4);
    var url = CDN_BASE + prefix + '/' + id + '.json';

    fetch(url)
      .then(function(r) {
        if (!r.ok) throw new Error('Report not found (HTTP ' + r.status + ')');
        return r.json();
      })
      .then(function(data) {
        btn.disabled = false;
        if (!data || !data.battle) throw new Error('Invalid report format');
        lastBattle = data.battle;
        status.className = 'status success';
        status.textContent = 'Report loaded. Select a player:';
        // Update URL
        var params = new URLSearchParams(window.location.search);
        params.set('id', id);
        history.replaceState(null, '', '?' + params.toString());
        showPlayerSelection(data.battle);
      })
      .catch(function(err) {
        btn.disabled = false;
        status.className = 'status error';
        status.textContent = err.message || 'Failed to load report';
      });
  }

  // --- Init ---
  document.getElementById('load-btn').onclick = loadReport;
  document.getElementById('report-id').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadReport();
  });

  // Auto-load from URL param
  var params = new URLSearchParams(window.location.search);
  var idParam = params.get('id');
  if (idParam) {
    document.getElementById('report-id').value = idParam;
    loadReport();
  }
})();
</script>

<script>
  // Google Translate + language modal
  var esc=function(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');};
  var LANGUAGES=[
    {code:'en',flag:'\uD83C\uDDFA\uD83C\uDDF8',name:'English'},{code:'es',flag:'\uD83C\uDDEA\uD83C\uDDF8',name:'Espa\u00F1ol'},

    {code:'pt',flag:'\uD83C\uDDE7\uD83C\uDDF7',name:'Portugu\u00EAs'},{code:'it',flag:'\uD83C\uDDEE\uD83C\uDDF9',name:'Italiano'},

    {code:'vi',flag:'\uD83C\uDDFB\uD83C\uDDF3',name:'Ti\u1EBFng Vi\u1EC7t'},{code:'th',flag:'\uD83C\uDDF9\uD83C\uDDED',name:'\u0E44\u0E17\u0E22'},
    {code:'hi',flag:'\uD83C\uDDEE\uD83C\uDDF3',name:'\u0939\u093F\u0928\u094D\u0926\u0940'},{code:'pl',flag:'\uD83C\uDDF5\uD83C\uDDF1',name:'Polski'},
    {code:'uk',flag:'\uD83C\uDDFA\uD83C\uDDE6',name:'\u0423\u043A\u0440\u0430\u0457\u043D\u0441\u044C\u043A\u0430'},{code:'id',flag:'\uD83C\uDDEE\uD83C\uDDE9',name:'Indonesia'}
  ];
  function getLangData(c){var b=c.split('-')[0];return LANGUAGES.find(function(l){return l.code===c||l.code===b;})||null;}
  function detectCurrentLang(){var m=document.cookie.match(/googtrans=\/en\/([a-zA-Z-]{2,10})/);return m&&m[1]?m[1]:'en';}
  function updateLangBtn(code){var d=getLangData(code);var f=document.getElementById('langFlag');var c=document.getElementById('langCode');if(d&&f){f.textContent=d.flag;c.textContent='/'+d.code;}else if(f){f.textContent='\uD83C\uDF10';c.textContent='/'+code;}document.querySelectorAll('.lang-option').forEach(function(o){o.classList.toggle('active',o.dataset.lang===code);});}
  function applyLangToCombo(code,delay){var a=0;var p=setInterval(function(){var c=document.querySelector('.goog-te-combo');if(c){c.value=code;c.dispatchEvent(new Event('change'));clearInterval(p);updateLangBtn(code);}if(++a>30)clearInterval(p);},delay||200);}
  function selectLanguage(code){if(code==='en'){sessionStorage.removeItem('pendingLang');document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax; Secure';document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.2864tw.com; SameSite=Lax; Secure';closeLangModal();location.reload();return;}sessionStorage.setItem('pendingLang',code);applyLangToCombo(code,200);closeLangModal();}
  var langModalEl=document.getElementById('langModal');
  function openLangModal(){if(langModalEl)langModalEl.classList.add('active');}
  function closeLangModal(){if(langModalEl)langModalEl.classList.remove('active');}
  (function(){var g=document.getElementById('langGrid');if(!g)return;var det=detectCurrentLang();LANGUAGES.forEach(function(l){var b=document.createElement('button');b.className='lang-option'+(l.code===det?' active':'');b.dataset.lang=l.code;var flagSpan=document.createElement('span');flagSpan.className='lang-flag';flagSpan.textContent=l.flag;var nameSpan=document.createElement('span');nameSpan.className='lang-name';nameSpan.textContent=l.name;b.appendChild(flagSpan);b.appendChild(nameSpan);b.addEventListener('click',function(){selectLanguage(l.code);});g.appendChild(b);});updateLangBtn(det);})();
  var lb=document.getElementById('langBtn');if(lb)lb.addEventListener('click',openLangModal);
  var lmc=document.getElementById('langModalClose');if(lmc)lmc.addEventListener('click',closeLangModal);
  if(langModalEl)langModalEl.addEventListener('click',function(e){if(e.target===langModalEl)closeLangModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&langModalEl&&langModalEl.classList.contains('active')){closeLangModal();e.stopPropagation();}});
  setTimeout(function(){if(!window._gtLoaded){var b=document.getElementById('langBtn');if(b){b.style.opacity='0.5';b.title='Translation unavailable';}}},15000);
  function googleTranslateElementInit(){window._gtLoaded=true;new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:false},'google_translate_element');var p=sessionStorage.getItem('pendingLang');if(p){sessionStorage.removeItem('pendingLang');applyLangToCombo(p,250);}else{var lo=localStorage.getItem('langOverride');if(lo&&lo!=='en')applyLangToCombo(lo,250);var d=detectCurrentLang();if(d!=='en')updateLangBtn(d);}}
</script>
<script src="https://translate.googleapis.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
