  .player-banner-inner { background: var(--surface); border: 1px solid var(--green); border-radius: 8px; padding: .6rem 1rem; display: flex; align-items: center; gap: .75rem; }

  var DECOR_ICON_FIX = {"5377":"5377_Coffee_Dates.png","5431":"5431_Pipe_Smoke.png","5471":"5471_Mr_Mrs_Ice.png","5640":"5640_Lucky_Joyful.png"};

  function decorIconUrl(group) {
    var g = String(group);

    if (DECOR_ICON_FIX[g]) return ASSET_BASE + 'assets/decor-icons/' + DECOR_ICON_FIX[g];

  /** Format buff value */
  function formatVal(value, valueType) {

  /** Get real buff values at a specific level from PL data, falling back to linear approx */

    var d = DI[group];
    if (!d) return [];
    var el = d[5]; // extractedLevel
    return d[6].map(function(b) {
      var scaled = (el > 0 && targetLevel) ? Math.round(b[1] / el * targetLevel) : b[1];
      return [b[0], scaled, b[2]];

  /** Build buff description string at a given level (defaults to level 1, uses real data) */
  function buffDesc(group, targetLevel) {

  /** Check if a decoration passes current filters */
  function passesFilter(group) {

  /** Get player's level for a decoration group (0 if not owned) */
  function getPlayerLevel(group) {
    if (!selectedPlayer || !playerGroups[group]) return 0;

    if (meExpanded && meExpanded[group]) {
      return decorLevel(meExpanded[group].src, meExpanded[group].pid) || 0;

  /** Sort filtered groups by active sort mode */
  function applySortOrder(groups) {
    if (activeSort === 0 || !selectedPlayer) return groups; // A-Z (default order from groupsByCategory)

    sorted.sort(function(a, b) {

    return sorted;

  function render() {

      var filtered = [];
      for (var i = 0; i < groups.length; i++) {
        if (passesFilter(groups[i])) filtered.push(groups[i]);

      filtered = applySortOrder(filtered);

      if (filtered.length === 0) continue;

      var section = el('div', { className: 'cat-section' });

        // Category header (top-level)
        var header = el('div', { className: 'cat-header' });
        header.appendChild(el('span', { className: 'toggle' }, '\u25BC'));
        header.appendChild(document.createTextNode(CAT_NAMES[catIdx] + ' (' + filtered.length + ')'));
        section.appendChild(header);

        var catBody = el('div', { className: 'cat-body' });

        // Group filtered items by sub-category
        var subGroups = {};
        for (var fi = 0; fi < filtered.length; fi++) {
          var sc = getSubCat(filtered[fi]) || 'other';
          if (!subGroups[sc]) subGroups[sc] = [];
          subGroups[sc].push(filtered[fi]);
        }

        // Render sub-categories in order
        for (var si = 0; si < subOrder.length; si++) {
          var scKey = subOrder[si];
          var scItems = subGroups[scKey];
          if (!scItems || scItems.length === 0) continue;
          var subTitle = SUB_CAT_NAMES[scKey] + ' (' + scItems.length + ')';
          catBody.appendChild(buildGridSection(subTitle, scItems, 'sub-section', false));
        }

        section.appendChild(catBody);
        totalShown += filtered.length;

        // Collapse/expand entire category
        (function(hdr, body) {
          hdr.onclick = function() { hdr.classList.toggle('collapsed'); body.classList.toggle('collapsed'); };
        })(header, catBody);
      } else {
        section = buildGridSection(CAT_NAMES[catIdx] + ' (' + filtered.length + ')', filtered, 'cat-section', false);
        totalShown += filtered.length;
      }

      content.appendChild(section);
    }

    document.getElementById('filter-count').textContent = totalShown + ' / ' + Object.keys(DI).length + ' decorations';
  }

  /** Load battle report and show player selection */
  function loadReport() {
    var input = document.getElementById('report-id');
    var btn = document.getElementById('load-btn');
    var status = document.getElementById('status');
    var id = input.value.trim();
    if (!id) { status.className = 'status error'; status.textContent = 'Enter a report ID'; return; }
    if (!/^\d{10,25}$/.test(id)) { status.className = 'status error'; status.textContent = 'Invalid report ID format'; return; }

    btn.disabled = true;
    status.className = 'status';
    status.textContent = 'Loading report...';

    var prefix = id.substring(0, 4);
    var url = CDN_BASE + prefix + '/' + id + '.json';

    fetch(url)
      .then(function(r) {
        if (!r.ok) throw new Error('Report not found (HTTP ' + r.status + ')');
        return r.json();
      })
      .then(function(data) {
        btn.disabled = false;
        if (!data || !data.battle) throw new Error('Invalid report format');
        status.className = 'status success';
        status.textContent = 'Report loaded. Select your player:';
        showPlayerSelection(data.battle);
      })
      .catch(function(err) {
        btn.disabled = false;
        status.className = 'status error';
        status.textContent = err.message || 'Failed to load report';
      });
  }

  /** Resolve avatar URL (same logic as battle-report) */
  function resolveAvatar(url) {
    if (!url) return null;
    if (url.indexOf('http') === 0) {
      if (url.indexOf('https://knight-cdn.akamaized.net/') === 0 || url.indexOf('https://h5.topwargame.com/') === 0) return url;
      return null;
    }
    return 'https://h5.topwargame.com/DynRes/images/headpic/' + url + '.png?t=21.jpg';
  }

  function buildAvatarPlaceholder(name, size) {
    var s = size || 36;
    var initial = (name || '?').charAt(0).toUpperCase();
    return el('div', { style: 'width:'+s+'px;height:'+s+'px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-weight:700;color:var(--accent);background:var(--surface);border:1px solid var(--border);flex-shrink:0;' }, initial);
  }

  /** Extract player info from battle side */
  function extractPlayerInfo(side) {
    if (!side || !side.players || !side.players[0]) return null;
    var raw = side.players[0].playerInfo;
    if (!raw) return null;
    var pi;
    try { pi = typeof raw === 'string' ? JSON.parse(raw) : raw; } catch(e) { return null; }
    return {
      name: pi.username || 'Unknown',
      alliance: side.alTag || pi.alTag || '',
      flag: pi.nationalflag || 0,
      avatar: resolveAvatar(pi.headimgurl_custom) || resolveAvatar(pi.avatarurl) || ''
    };
  }

  /** Show player selection overlay */
  function showPlayerSelection(battle) {
    var attPI = extractPlayerInfo(battle.attacker);
    var defPI = extractPlayerInfo(battle.defender);
    if (!attPI && !defPI) {
      document.getElementById('status').className = 'status error';
      document.getElementById('status').textContent = 'No player data found in report';
      return;
    }

    var overlay = el('div', { className: 'select-overlay' });
    var modal = el('div', { className: 'select-modal' });
    modal.appendChild(el('div', { className: 'select-title' }, 'Select Your Player'));

    var cards = el('div', { className: 'select-cards' });

    function makeCard(pi, side, sideLabel) {
      if (!pi) return null;
      var card = el('div', { className: 'select-card' });
      if (pi.avatar) {
        var img = el('img');
        img.src = pi.avatar;
        img.onerror = function() { this.style.display = 'none'; };
        card.appendChild(img);
      }
      card.appendChild(el('div', { className: 'select-card-name' }, pi.name));
      if (pi.alliance) card.appendChild(el('div', { className: 'select-card-alliance' }, '[' + pi.alliance + ']'));
      if (pi.flag) card.appendChild(el('div', { className: 'select-card-flag' }, flagEmoji(pi.flag)));
      card.appendChild(el('div', { className: 'select-card-role' }, sideLabel));
      card.onclick = function() {
        document.body.removeChild(overlay);
        selectPlayer(side, pi, sideLabel);
      };
      return card;
    }

    var attCard = makeCard(attPI, battle.attacker, 'Attacker');
    var defCard = makeCard(defPI, battle.defender, 'Defender');
    if (attCard) cards.appendChild(attCard);
    if (defCard) cards.appendChild(defCard);
    modal.appendChild(cards);

    var skip = el('div', { className: 'select-skip' });
    var skipBtn = el('button', null, 'Skip — just browse the index');
    skipBtn.onclick = function() { document.body.removeChild(overlay); };
    skip.appendChild(skipBtn);
    modal.appendChild(skip);

    overlay.appendChild(modal);
    document.body.appendChild(overlay);
  }

  /** Apply selected player's decoration data */
  function selectPlayer(side, pi, sideLabel) {
    var decos = (side.players && side.players[0] && side.players[0].effectDecorations) || null;
    if (!decos) {
      document.getElementById('status').className = 'status error';
      document.getElementById('status').textContent = 'No decoration data found for this player';
      return;
    }

    selectedPlayer = { decos: decos, playerInfo: pi, side: sideLabel };
    playerGroups = {};

    // Build group -> placedId mapping
    if (decos.ids) {
      for (var i = 0; i < decos.ids.length; i++) {
        var grp = decorIdToGroup(decos.ids[i]);
        if (grp && (!playerGroups[grp] || decos.ids[i] > playerGroups[grp])) {
          playerGroups[grp] = decos.ids[i];
        }
      }
    }
    // Expand ME clusters: if player owns one variant, mark all equivalents as owned
    // Store source group so level can be computed from the correct base
    var meExpanded = {}; // group -> { sourceGroup, placedId }
    var pgSnapshot = {};
    for (var pk in playerGroups) pgSnapshot[pk] = playerGroups[pk];
    for (var pg in pgSnapshot) {
      var meVars = getMEVariants(parseInt(pg));
      if (meVars) {
        for (var mi = 0; mi < meVars.length; mi++) {
          if (!playerGroups[meVars[mi]]) {
            playerGroups[meVars[mi]] = pgSnapshot[pg];
            meExpanded[meVars[mi]] = { src: parseInt(pg), pid: pgSnapshot[pg] };
          }
        }
      }
    }

    document.getElementById('star-pills').style.display = 'flex';
    document.getElementById('sort-pills').style.display = 'flex';

    // Show player banner (battle-report style card)
    var banner = document.getElementById('player-banner');
    banner.style.display = 'block';
    while (banner.firstChild) banner.removeChild(banner.firstChild);
    var inner = el('div', { className: 'player-banner-inner' });
    if (pi.avatar) {
      var img = el('img');
      img.src = pi.avatar;
      img.onerror = function() { this.replaceWith(buildAvatarPlaceholder(pi.name)); };
      inner.appendChild(img);
    } else {
      inner.appendChild(buildAvatarPlaceholder(pi.name));
    }
    var infoDiv = el('div', { className: 'player-banner-info' });
    var flag = pi.flag ? flagEmoji(pi.flag) + ' ' : '';
    infoDiv.appendChild(el('div', { className: 'player-banner-name' }, flag + pi.name));
    if (pi.alliance) infoDiv.appendChild(el('div', { style: 'font-size:.75rem;color:var(--accent);' }, '[' + pi.alliance + ']'));
    var totalPlaced = Object.keys(playerGroups).length;
    var inIndex = 0;
    for (var pg in playerGroups) { if (DI[pg]) inIndex++; }
    var indexCount = Object.keys(DI).length;
    infoDiv.appendChild(el('div', { className: 'player-banner-detail' }, totalPlaced + ' placed — ' + inIndex + '/' + indexCount + ' index decorations (' + Math.round(inIndex/indexCount*100) + '%)'));
    inner.appendChild(infoDiv);
    var clearBtn = el('button', { className: 'player-banner-clear' }, 'Clear');
    clearBtn.onclick = clearPlayer;
    inner.appendChild(clearBtn);
    banner.appendChild(inner);

    // Show raw JSON
    showRawJSON();

    document.getElementById('status').className = 'status success';
    document.getElementById('status').textContent = '';

    render();
  }

  /** Clear player selection */
  function clearPlayer() {
    selectedPlayer = null;
    playerGroups = {};
    meExpanded = {};
    activeLevel = 0;
    document.getElementById('player-banner').style.display = 'none';
    document.getElementById('star-pills').style.display = 'none';
    document.getElementById('sort-pills').style.display = 'none';
    activeSort = 0;
    var sPills = document.getElementById('sort-pills').children;
    for (var si = 0; si < sPills.length; si++) sPills[si].className = 'fpill' + (si === 0 ? ' active' : '');
    var rawSection = document.getElementById('raw-section');
    while (rawSection.firstChild) rawSection.removeChild(rawSection.firstChild);
    var lpills = document.getElementById('star-pills').children;
    for (var j = 0; j < lpills.length; j++) lpills[j].className = 'fpill' + (j === 0 ? ' active' : '');
    render();
  }

  function showRawJSON() {
    if (!selectedPlayer) return;
    var rawSection = document.getElementById('raw-section');
    while (rawSection.firstChild) rawSection.removeChild(rawSection.firstChild);
    var details = el('details', { className: 'raw-json' });
    details.appendChild(el('summary', null, 'Raw effectDecorations JSON'));
    details.appendChild(el('pre', null, JSON.stringify(selectedPlayer.decos, null, 2)));
    rawSection.appendChild(details);
  }

  // --- URL params ---
  function getParam(name) {
    return new URLSearchParams(location.search).get(name);
  }

  // --- Init ---
  buildFilters();
  render();

  document.getElementById('load-btn').onclick = loadReport;
  document.getElementById('report-id').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadReport();
  });

  // Auto-load from URL param
  var paramId = getParam('id');
  if (paramId) {
    document.getElementById('report-id').value = paramId;
    loadReport();
  }
})();
</script>
