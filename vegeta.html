<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com; style-src 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; img-src https://h5.topwargame.com https://raw.githubusercontent.com data: https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://www.google.com; connect-src https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com; object-src 'none'; frame-src https://translate.google.com; frame-ancestors 'none';">
<title>Vegeta's Armory — Server 2864</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d1117; --surface: #161b22; --card: #1c2128; --border: #30363d;
  --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
  --army: #56d364; --navy: #6cb6ff; --air: #e3b341;
  --good: #56d364; --warn: #e3b341; --danger: #f97583; --purple: #6e40c9;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; line-height: 1.5; min-height: 100vh; }
a { color: var(--accent); text-decoration: none; }

/* Header */
.header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px 12px; }
.header-inner { max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.header-title-row { display: flex; align-items: center; justify-content: space-between; gap: 24px; }
.header h1 { font-size: 24px; font-weight: 700; color: var(--text); }
.header h1 span { color: var(--accent); }
.header-sub { color: var(--muted); font-size: 14px; }
.header-badges { display: flex; gap: 8px; flex-wrap: wrap; }
.badge { display: inline-flex; align-items: center; gap: 4px; padding: 5px 12px; border-radius: 12px; font-size: 14px; font-weight: 600; background: var(--card); border: 1px solid var(--border); color: var(--muted); }
.badge .num { color: var(--text); font-size: 16px; }
.header .refine-mode-toggle { margin-top: 4px; background: transparent; border: none; padding: 0; }
.header .impact-analysis-btn { display: none; padding: 5px 12px; border-radius: 16px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--accent); background: transparent; color: var(--accent); transition: all 0.2s; margin-left: 8px; }
.header .impact-analysis-btn:hover { background: rgba(121,192,255,0.12); }
.header .impact-analysis-btn.visible { display: inline-flex; }

/* Main container */
.container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }

/* Dashboard */
.dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
.dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
.dash-card .label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.dash-card .value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
.dash-card .sub { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
.progress-bar { height: 6px; background: var(--card); border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

/* Tabs */
.tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 2px solid var(--border); }
.tab { padding: 10px 24px; font-size: 15px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; user-select: none; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Filter bar */
.filter-bar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 20px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.search-input { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; color: var(--text); font-size: 14px; outline: none; min-width: 200px; }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--muted); }
.pill-group { display: flex; gap: 4px; }
.pill { padding: 5px 12px; border-radius: 16px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--card); color: var(--muted); transition: all 0.2s; user-select: none; }
.pill:hover { border-color: var(--muted); color: var(--text); }
.pill.active { color: #fff; }
.pill.army.active { background: var(--army); border-color: var(--army); color: #0d1117; }
.pill.navy.active { background: var(--navy); border-color: var(--navy); color: #0d1117; }
.pill.air.active { background: var(--air); border-color: var(--air); color: #0d1117; }
.filter-select { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 13px; outline: none; cursor: pointer; }
.filter-select:focus { border-color: var(--accent); }
.filter-label { font-size: 12px; color: var(--muted); margin-right: 4px; }
.sort-btns { display: flex; gap: 4px; }
.sort-btn { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; color: var(--muted); font-size: 12px; cursor: pointer; font-family: inherit; }
.sort-btn:hover { border-color: var(--accent); color: var(--text); }
.sort-btn.active { background: rgba(121,192,255,.15); border-color: var(--accent); color: var(--accent); }

/* Hero Cards */
.hero-grid { display: flex; flex-direction: column; gap: 8px; }
.hero-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
.hero-card:hover { border-color: var(--muted); }
.hero-header { display: flex; align-items: center; gap: 16px; padding: 14px 18px; cursor: pointer; user-select: none; }
.hero-icon { width: 52px; height: 52px; border-radius: 50%; border: 3px solid var(--army); object-fit: cover; flex-shrink: 0; background: var(--card); }
.hero-icon.navy-border { border-color: var(--navy); }
.hero-icon.air-border { border-color: var(--air); }
.hero-info { flex: 1; min-width: 0; }
.hero-name { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.excl-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; background: rgba(121,192,255,0.12); color: var(--accent); border: 1px solid rgba(121,192,255,0.25); white-space: nowrap; }
.hero-meta { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--muted); flex-wrap: wrap; }
.branch-badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; }
.branch-badge.army { background: rgba(86,211,100,0.15); color: var(--army); }
.branch-badge.navy { background: rgba(108,182,255,0.15); color: var(--navy); }
.branch-badge.air { background: rgba(227,179,65,0.15); color: var(--air); }
.hero-refine-summary { font-size: 14px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
.mini-bar { display: flex; gap: 3px; flex-shrink: 0; }
.mini-seg { width: 18px; height: 10px; border-radius: 2px; }
.expand-icon { color: var(--muted); font-size: 18px; transition: transform 0.3s; flex-shrink: 0; }
.hero-card.expanded .expand-icon { transform: rotate(180deg); }

/* Gear grid inside expanded card */
.gear-panel { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
.hero-card.expanded .gear-panel { max-height: 2000px; }
.gear-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 18px 18px; }
.gear-card { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 14px; display: flex; flex-direction: column; }
.gear-card .refine-section { margin-top: auto; }
.gear-card .gear-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.gear-card .rune-name { font-size: 11px; color: var(--accent); margin-bottom: 8px; }
.gear-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
.rune-display { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.rune-icon { width: 28px; height: 28px; border-radius: 4px; }
.rune-stars { display: flex; gap: 1px; align-items: center; }
.rune-icon-wrap { position: relative; cursor: help; }
.rune-tooltip { display: none; position: absolute; right: 0; top: 100%; margin-top: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 10px; font-size: 11px; color: var(--text); line-height: 1.4; width: 220px; z-index: 10; box-shadow: 0 4px 12px rgba(0,0,0,.4); pointer-events: none; }
.rune-icon-wrap:hover .rune-tooltip { display: block; }
.filter-selects { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.refine-mode-toggle { display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; }
.refine-mode-label { font-size: 13px; color: var(--muted); }
.refine-mode-btn { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 7px 14px; color: var(--muted); font-size: 13px; cursor: pointer; transition: all 0.2s; }
.refine-mode-btn.active { background: rgba(121,192,255,.15); border-color: var(--accent); color: var(--accent); }
.gear-card .base-stat { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.gear-card .base-stat .enhance { color: var(--good); }
.stat-row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; padding: 3px 0; border-bottom: 1px solid rgba(48,54,61,0.5); }
.stat-row:last-child { border-bottom: none; }
.stat-name { color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stat-val { font-weight: 600; margin: 0 8px; white-space: nowrap; }
.stat-pct { font-size: 11px; font-weight: 700; min-width: 36px; text-align: right; }
.refine-section { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
.refine-label { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.refine-label .pct { font-weight: 700; font-size: 13px; }
.refine-bar { height: 5px; background: rgba(48,54,61,0.7); border-radius: 3px; overflow: hidden; }
.refine-fill { height: 100%; border-radius: 3px; }
.icon-pass { color: var(--good); }
.icon-fail { color: var(--danger); }

/* Beast tab */
.field-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
.field-pill { padding: 6px 14px; border-radius: 16px; font-size: 13px; font-weight: 600; cursor: pointer; border: 2px solid var(--border); background: var(--surface); color: var(--muted); transition: all 0.2s; user-select: none; }
.field-pill:hover { border-color: var(--muted); color: var(--text); }
.field-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(121,192,255,0.08); }
.field-pill .count { font-size: 11px; color: var(--muted); }

.attr-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; overflow: hidden; }
.attr-toggle { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; user-select: none; }
.attr-toggle h3 { font-size: 14px; font-weight: 600; color: var(--muted); }
.attr-toggle .chevron { color: var(--muted); transition: transform 0.3s; }
.attr-panel.open .attr-toggle .chevron { transform: rotate(180deg); }
.attr-body { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
.attr-panel.open .attr-body { max-height: 2000px; }
.attr-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; padding: 0 16px 16px; }
.attr-slot { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
.attr-slot .slot-num { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
.attr-slot .attr-buff { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.attr-slot .attr-val { font-size: 14px; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
.attr-slot .attr-condition { font-size: 11px; color: var(--muted); }
.attr-slot .attr-status { font-size: 12px; font-weight: 600; margin-top: 4px; }
.attr-slot .attr-status.active { color: var(--good); }
.attr-slot .attr-status.needs-refine { color: var(--warn); }
.refine-heroes { margin-top: 6px; font-size: 11px; line-height: 1.6; }
.refine-heroes .hero-pass { color: var(--good); font-weight: 600; }
.refine-heroes .hero-fail { color: var(--danger); font-weight: 600; }
.hgm-slot-btns { display: flex; gap: 4px; margin-bottom: 12px; flex-wrap: wrap; }
.hgm-slot-btn { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; color: var(--muted); font-size: 12px; cursor: pointer; transition: all 0.2s; }
.hgm-slot-btn.active { background: rgba(121,192,255,.15); border-color: var(--accent); color: var(--accent); }

.beast-filter-bar { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 16px; padding: 10px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.beast-slot-badge { display: inline-block; background: rgba(121,192,255,.15); color: var(--accent); font-size: 11px; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 6px; }
.beast-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.beast-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; transition: border-color 0.2s; }
.beast-card:hover { border-color: var(--muted); }
.beast-card.purple-quality { border-color: var(--purple); }
.beast-card.purple-quality:hover { border-color: #8b5cf6; }
.beast-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.beast-emoji { display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; flex-shrink: 0; }
.beast-info { flex: 1; }
.beast-name { font-size: 15px; font-weight: 700; }
.beast-meta-row { font-size: 12px; color: var(--muted); display: flex; gap: 8px; align-items: center; }
.beast-stars { color: var(--air); letter-spacing: 1px; }
.beast-level { font-weight: 600; }
.main-buff { margin-bottom: 10px; padding: 10px 12px; border-left: 3px solid var(--accent); background: rgba(121,192,255,0.06); border-radius: 0 6px 6px 0; }
.main-buff .buff-label { font-size: 10px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; }
.main-buff .buff-name { font-size: 13px; font-weight: 600; }
.main-buff .buff-val { font-size: 16px; font-weight: 700; color: var(--accent); }
.base-buff { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; font-size: 12px; border-bottom: 1px solid rgba(48,54,61,0.4); }
.base-buff:last-of-type { border-bottom: none; }
.base-buff .b-name { color: var(--muted); flex: 1; }
.base-buff .b-val { font-weight: 600; }
.potential-section { margin-top: 10px; }
.potential-label { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 4px; }
.potential-bar { height: 5px; background: var(--card); border-radius: 3px; overflow: hidden; }
.potential-fill { height: 100%; border-radius: 3px; }

/* Responsive */
@media (max-width: 1100px) { .gear-grid { grid-template-columns: repeat(2, 1fr); } .beast-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 768px) {
  .dashboard { grid-template-columns: 1fr; gap: 8px; margin-bottom: 16px; }
  .dash-card { padding: 12px 14px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .dash-card .label { margin-bottom: 0; font-size: 12px; flex: 1; min-width: 120px; }
  .dash-card .value { font-size: 20px; margin-bottom: 0; }
  .dash-card .sub { display: none; }
  .dash-card .progress-bar { flex-basis: 100%; }
  .gear-grid { grid-template-columns: 1fr; gap: 8px; padding: 0 12px 12px; }
  .beast-grid { grid-template-columns: 1fr; }
  .container { padding: 12px; }
  .header { padding: 12px 16px; }
  .header-inner { flex-direction: column; align-items: flex-start; gap: 8px; }
  .header-title-row { width: 100%; }
  .header-title-row .lang-btn { padding: 4px 8px; font-size: 16px; }
  .header h1 { font-size: 20px; }
  .header-badges { gap: 4px; }
  .badge { font-size: 11px; padding: 3px 8px; }
  .tabs { margin-bottom: 16px; }
  .tab { padding: 8px 16px; font-size: 14px; }
  /* Hero card: wrap header to 2 rows */
  .hero-header { flex-wrap: wrap; gap: 10px; padding: 12px; }
  .hero-icon { width: 40px; height: 40px; border-width: 2px; }
  .hero-info { min-width: 0; flex: 1 1 calc(100% - 60px); }
  .hero-name { font-size: 14px; gap: 6px; }
  .excl-tag { font-size: 9px; padding: 1px 6px; }
  .hero-meta { font-size: 11px; gap: 6px; }
  .hero-refine-summary { font-size: 12px; order: 10; }
  .mini-bar { order: 11; flex: 1; }
  .mini-seg { flex: 1; height: 8px; width: auto; }
  .expand-icon { order: 12; }
  /* Filter bar */
  .filter-bar { gap: 8px; padding: 10px 12px; }
  .search-input { min-width: 100%; }
  .pill-group { flex-wrap: wrap; gap: 6px; }
  .pill-group .march-btn { font-size: 11px; padding: 5px 10px; }
  .filter-selects { width: 100%; gap: 6px; }
  .filter-selects .filter-label { display: none; }
  .filter-selects #refine-filter { display: none; }
  .filter-selects .filter-select { flex: 1; min-width: 0; font-size: 12px; padding: 6px 8px; }
  .sort-btn { font-size: 11px; padding: 5px 10px; }
  .refine-mode-toggle { padding: 0; flex-wrap: wrap; gap: 6px; }
  .refine-mode-label { font-size: 11px; }
  .refine-mode-btn { font-size: 11px; padding: 4px 10px; }
  .impact-analysis-btn { font-size: 11px !important; padding: 4px 10px !important; margin-left: 0 !important; }
  .lang-btn #langCode { display: none; }
  .lang-grid { grid-template-columns: 1fr; }
  /* Beast tab */
  .field-pills { gap: 4px; }
  .field-pill { padding: 5px 10px; font-size: 12px; }
  .beast-card { padding: 12px; }
  .beast-emoji { width: 22px; height: 22px; }
  .beast-emoji svg { width: 22px; height: 22px; }
  .beast-name { font-size: 14px; }
  .main-buff { padding: 8px 10px; }
  .main-buff .buff-name { font-size: 12px; }
  .main-buff .buff-val { font-size: 14px; }
  .base-buff { font-size: 11px; }
  .base-buff .b-name { min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  /* Attr panel */
  .attr-grid { grid-template-columns: 1fr; }
  .attr-slot { padding: 10px; }
  .attr-slot .attr-buff { font-size: 12px; }
  .refine-heroes { font-size: 10px; }
  /* Gear card */
  .gear-card { padding: 10px; }
  .stat-row { font-size: 11px; }
  .stat-name { font-size: 11px; }
  .stat-val { margin: 0 4px; }
  .stat-pct { min-width: 30px; font-size: 10px; }
  .gear-card .gear-name { font-size: 12px; }
  .gear-card .base-stat { font-size: 11px; }
  /* Beast filter */
  .beast-filter-bar { flex-direction: column; gap: 8px; padding: 8px 12px; }
  /* March modal + hero gear modal */
  .modal { width: 95%; max-width: 95%; padding: 16px; }
  .modal h2 { font-size: 16px; }
  .march-form select { font-size: 12px; }
  .march-row { flex-wrap: wrap; gap: 6px; }
}
@media (max-width: 400px) {
  .container { padding: 8px; }
  .header { padding: 10px 12px; }
  .hero-header { padding: 10px; }
  .dash-card .value { font-size: 18px; }
  .hero-icon { width: 36px; height: 36px; }
  .hero-name { font-size: 13px; }
  .gear-grid { padding: 0 10px 10px; }
}

/* Google Translate overrides */
body { top: 0 !important; }
body > .skiptranslate { display: none !important; }
#google_translate_element { position: absolute; left: -9999px; opacity: 0; pointer-events: none; }

.lang-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 18px; display: flex; align-items: center; gap: 4px; font-family: inherit; font-weight: 600; white-space: nowrap; transition: border-color .2s; }
.lang-btn:hover { border-color: var(--accent); color: var(--text); }

.lang-modal-overlay { display: none; position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 1rem; }
.lang-modal-overlay.active { display: flex; }
.lang-modal { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto; }
.lang-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
.lang-modal-title { font-size: 15px; font-weight: 700; color: var(--text); }
.lang-modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; padding: .2rem; }
.lang-modal-close:hover { color: var(--text); }
.lang-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }
.lang-option { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid transparent; background: var(--surface); cursor: pointer; font-size: 13px; color: var(--text); font-family: inherit; transition: border-color .15s; }
.lang-option:hover { border-color: var(--accent); }
.lang-option.active { border-color: var(--accent); background: rgba(121,192,255,.08); }
.lang-option .lang-flag { font-size: 1.1rem; }

/* No results */
.no-results { text-align: center; padding: 48px; color: var(--muted); font-size: 15px; }

/* March modal */
.march-btn { padding: 5px 14px; border-radius: 16px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--accent); background: transparent; color: var(--accent); transition: all 0.2s; }
.march-btn:hover { background: rgba(121,192,255,0.12); }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 560px; max-height: 80vh; overflow-y: auto; padding: 24px; position: relative; }
.modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; color: var(--text); }
.modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; padding: 4px; }
.modal-close:hover { color: var(--text); }
.march-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.march-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
.march-row .march-name { font-size: 14px; font-weight: 600; min-width: 100px; }
.march-row .march-heroes { font-size: 12px; color: var(--muted); flex: 1; }
.march-row .march-delete { background: none; border: none; color: var(--danger); font-size: 16px; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
.march-row .march-delete:hover { background: rgba(249,117,131,0.12); }
.march-form { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
.march-form h3 { font-size: 14px; font-weight: 600; color: var(--muted); margin-bottom: 10px; }
.march-form-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px; }
.march-form-row input, .march-form-row select { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 7px 10px; color: var(--text); font-size: 13px; outline: none; }
.march-form-row input:focus, .march-form-row select:focus { border-color: var(--accent); }
.march-form-row input { min-width: 140px; flex: 1; }
.march-form-row select { min-width: 130px; flex: 1; }
.march-add-btn { padding: 6px 16px; border-radius: 16px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid var(--accent); background: var(--accent); color: #0d1117; transition: all 0.2s; }
.march-add-btn:hover { opacity: 0.85; }
.march-add-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.march-form-error { font-size: 12px; color: var(--danger); margin-top: 4px; display: none; }

/* Impact Analysis Modal */
#impact-modal .modal { max-width: 800px; }
.impact-section { margin-bottom: 24px; }
.impact-section h3 { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }
.impact-summary-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
.impact-stat { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: 12px; }
.impact-stat .is-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
.impact-stat .is-value { font-size: 20px; font-weight: 700; }
.impact-stat .is-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.impact-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.impact-table th { text-align: left; padding: 8px 10px; background: var(--card); border-bottom: 1px solid var(--border); color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.impact-table td { padding: 8px 10px; border-bottom: 1px solid rgba(48,54,61,0.4); }
.impact-table .delta-cell { color: var(--danger); font-weight: 600; }
.impact-table .lost-slots { font-size: 11px; color: var(--muted); }
.impact-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-size: 12px; }
.impact-bar { height: 18px; border-radius: 3px; min-width: 2px; transition: width 0.3s; }
.impact-chart { display: flex; flex-direction: column; }
.impact-bar.game-desc { background: #56d364; }
.impact-bar.tw-dev { background: #f97583; }
.impact-hero-name { width: 75px; flex-shrink: 0; color: var(--text); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.impact-bar-val { min-width: 24px; font-size: 11px; color: var(--muted); }
.impact-bar-icon { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; }
.impact-bar-divider { width: 1px; background: var(--border); opacity: 0.5; align-self: stretch; flex-shrink: 0; margin: 0 4px; }
.impact-bar-area { flex: 1; display: flex; flex-direction: column; gap: 2px; }
.impact-bar-sep { height: 1px; background: var(--border); opacity: 0.3; margin: 4px 0; }
.impact-hero-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-bottom: 10px; }
.impact-hero-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.impact-hero-icon { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); }
.impact-hero-info { display: flex; flex-direction: column; gap: 2px; }
.impact-hero-label { font-size: 14px; font-weight: 700; color: var(--text); }
.impact-hero-delta { font-size: 13px; }
.impact-hero-sub { font-size: 11px; color: var(--muted); }
.impact-detail-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }
.impact-failing-gear { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 4px; padding: 4px 0; }
.ifg-name { font-size: 12px; font-weight: 600; color: var(--text); min-width: 120px; }
.ifg-stat { font-size: 11px; color: #f97583; background: rgba(249,117,131,.1); padding: 2px 8px; border-radius: 4px; }
.impact-chart-legend { display: flex; gap: 16px; margin-bottom: 12px; font-size: 12px; color: var(--muted); }
.impact-chart-legend span { display: flex; align-items: center; gap: 4px; }
.impact-chart-legend .swatch { display: inline-block; width: 12px; height: 12px; border-radius: 2px; }
.impact-findings p { font-size: 13px; color: var(--text); line-height: 1.7; margin-bottom: 8px; }

.impact-recs { list-style: none; padding: 0; }
.impact-recs li { font-size: 13px; color: var(--text); line-height: 1.7; margin-bottom: 6px; padding-left: 16px; position: relative; }

  document.querySelectorAll('#' + containerId + ' .sort-btn').forEach(btn => {

}

    4: ['Stealth Hologram'], 6: ['Stealth Hologram']
  };
  const maxStars = (threeStarRunes[slot.slot] || []).includes(slot.effectName) ? 3 : 1;
  const starLevel = slot.starLevel || 0;
  let stars = '';
  for (let i = 0; i < maxStars; i++) {
    const remaining = starLevel - i;
    if (remaining >= 1) stars += starSVG(1);
    else if (remaining >= 0.5) stars += starSVG(0.5);
    else stars += starSVG(0);
  }
  return stars;
}

// Refine mode
let refineMode = 'average';

function getSlotRefined(slot) {
  if (!slot.refinement || slot.equipped === false) return false;
  if (refineMode === 'average') return slot.refinement.meetsThreshold;
  return slot.randomStats && slot.randomStats.every(rs => rs.rollPercent >= 70);
}

function getHeroRefinedCount(hero) {
  return Object.values(hero.slots).filter(s => s.equipped !== false && s.refinement && getSlotRefined(s)).length;
}

function slotMiniColor(slot) {
  if (!slot.refinement || slot.equipped === false) return '#30363d';
  if (refineMode === 'average') return thresholdColor(slot.refinement.percent);
  const passing = slot.randomStats.filter(rs => rs.rollPercent >= 70).length;
  if (passing === 0) return '#f97583';
  if (passing >= slot.randomStats.length) return '#56d364';
  return '#e3b341';
}

// Dashboard
function buildDashboard() {
  let totalGear = 0, refinedGear = 0, totalRandomSlots = 0, refinedRandomSlots = 0;
  GEAR_DATA.forEach(h => {
    Object.values(h.slots).forEach(s => {
      if (s.equipped === false || !s.refinement) return;
      totalGear++;
      if (getSlotRefined(s)) refinedGear++;
      if (s.randomStats) {
        s.randomStats.forEach(rs => {
          totalRandomSlots++;
          if (rs.rollPercent >= 70) refinedRandomSlots++;
        });
      }
    });
  });

  let gearLabel, gearNum, gearDenom, gearPct;
  if (refineMode === 'per-slot') {
    gearLabel = 'Gear Random Slots at 70% Refinement';
    gearNum = refinedRandomSlots;
    gearDenom = totalRandomSlots;
    gearPct = totalRandomSlots ? Math.round(refinedRandomSlots / totalRandomSlots * 100) : 0;
  } else {
    gearLabel = 'Gears at 70%+ Refinement';
    gearNum = refinedGear;
    gearDenom = totalGear;
    gearPct = totalGear ? Math.round(refinedGear / totalGear * 100) : 0;
  }

  let totalSlots = 0, deployedSlots = 0;
  BEAST_DATA.fields.forEach(f => { totalSlots += f.holeCount; deployedSlots += f.beasts.filter(b => !b.empty).length; });

  const allBeasts = BEAST_DATA.fields.flatMap(f => f.beasts.filter(b => !b.empty));
  const totalPot = allBeasts.reduce((sum, b) => sum + (b.potential || 0), 0);
  const avgPot = allBeasts.length ? Math.round(totalPot / allBeasts.length) : 0;
  const avgPotPct = Math.round(avgPot / 16000 * 100);
  const gearColor = thresholdColor(gearPct);
  const deployPct = Math.round(deployedSlots / totalSlots * 100);
  let avgPotColor = 'var(--danger)';
  if (avgPotPct >= 80) avgPotColor = 'var(--accent)';
  else if (avgPotPct >= 60) avgPotColor = 'var(--warn)';

  document.getElementById('dashboard').innerHTML = `
    <div class="dash-card">
      <div class="label">${gearLabel}</div>
      <div class="value" style="color:${gearColor}">${gearNum} / ${gearDenom}</div>
      <div class="sub">${gearPct}% meeting threshold</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${gearPct}%;background:${gearColor}"></div></div>
    </div>
    <div class="dash-card">
      <div class="label">Beast Fields</div>
      <div class="value" style="color:var(--accent)">${deployedSlots} / ${totalSlots}</div>
      <div class="sub">${BEAST_DATA.fields.length} fields, ${deployedSlots} beasts deployed</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${deployPct}%;background:var(--accent)"></div></div>
    </div>
    <div class="dash-card">
      <div class="label">Avg Beast Potential</div>
      <div class="value" style="color:${avgPotColor}">${avgPot.toLocaleString()} / 16,000</div>
      <div class="sub">${avgPotPct}% of maximum</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${avgPotPct}%;background:${avgPotColor}"></div></div>
    </div>`;
}

function buildGearSlotHTML(slot) {
  if (slot.equipped === false || !slot.refinement) return `<div class="gear-card" style="opacity:0.3;text-align:center;padding:2rem"><div class="gear-name" style="color:var(--muted)">Empty Slot ${slot.slot || ''}</div></div>`;
  const baseHTML = (slot.buffNames || []).slice(0, (slot.enhanceValues || []).length)
    .map((name, i) => `<div class="base-stat notranslate" translate="no">${esc(name)} ${esc(slot.buffValues[i])} <span class="enhance">${esc(slot.enhanceValues[i])}</span></div>`)
    .join('');

  const statsHTML = slot.randomStats
    .map(rs => `<div class="stat-row notranslate" translate="no"><span class="stat-name">${esc(rs.stat)}</span><span class="stat-val">${esc(rs.value)}</span><span class="stat-pct" style="color:${thresholdColor(rs.rollPercent)}">${rs.rollPercent}%</span></div>`)
    .join('');

  const ref = slot.refinement;
  const refPct = ref.percent;
  const barWidth = Math.min(refPct / 70 * 100, 100);
  const color = thresholdColor(refPct);
  const meets = getSlotRefined(slot);

  const iconUrl = RUNE_ICONS[slot.effectName] || '';
  const cleanDesc = (slot.effectDesc || '').replace(/\s+/g, ' ').trim();
  const runeIconHTML = iconUrl ?
    `<div class="rune-icon-wrap"><img class="rune-icon" src="${iconUrl}" alt="${esc(slot.effectName)}" loading="lazy"><div class="rune-tooltip"><strong>${esc(slot.effectName)}</strong><br>${esc(cleanDesc)}</div></div>` : '';
  const starsHTML = runeStarsHTML(slot);
  const runeSection = (runeIconHTML || starsHTML) ?
    `<div class="rune-display">${runeIconHTML}<div class="rune-stars">${starsHTML}</div></div>` : '';

  return `<div class="gear-card"><div class="gear-header"><div><div class="gear-name notranslate" translate="no">${esc(slot.name)}</div>` +
    (slot.effectName ? `<div class="rune-name notranslate" translate="no">${esc(slot.effectName)}</div>` : '') +
    `</div>${runeSection}</div>` +
    baseHTML + statsHTML +
    `<div class="refine-section"><div class="refine-label"><span>Refinement</span><span class="pct" style="color:${color}">${refPct.toFixed(1)}% ${refIcon(meets)}</span></div><div class="refine-bar"><div class="refine-fill" style="width:${barWidth}%;background:${color}"></div></div></div></div>`;
}

function renderGearTab() {
  const search = document.getElementById('gear-search').value.toLowerCase();
  const activeBranches = new Set();
  document.querySelectorAll('#branch-pills .pill.active').forEach(p => activeBranches.add(p.dataset.branch));
  const refFilter = document.getElementById('refine-filter').value;
  const activeSort = document.querySelector('.sort-btn.active');
  const sortBy = activeSort ? activeSort.dataset.sort : 'power';
  const marchVal = document.getElementById('march-filter').value;

  let marchHeroIds = null;
  if (marchVal !== 'all') {
    const marches = loadMarches();
    const idx = parseInt(marchVal);
    if (marches[idx]) {
      marchHeroIds = new Set(marches[idx].heroIds);
    }
  }

  let heroes = GEAR_DATA.filter(h => {
    const meta = HERO_META[h.heroId] || {};
    if (search && !h.heroName.toLowerCase().includes(search)) return false;
    if (!activeBranches.has(meta.typeName || 'Army')) return false;
    const rc = getHeroRefinedCount(h);
    if (refFilter === 'refined' && rc === 0) return false;
    if (refFilter === 'needs-work' && rc === h.refinementSummary.totalGearSlots) return false;
    if (marchHeroIds && !marchHeroIds.has(h.heroId)) return false;
    return true;
  });

  heroes.sort((a, b) => {
    const ma = HERO_META[a.heroId] || {}, mb = HERO_META[b.heroId] || {};
    if (sortBy === 'power') return (mb.power||0) - (ma.power||0);
    if (sortBy === 'name') return a.heroName.localeCompare(b.heroName);
    if (sortBy === 'refined') return getHeroRefinedCount(b) - getHeroRefinedCount(a) || (mb.power||0) - (ma.power||0);
    return 0;
  });

  const grid = document.getElementById('hero-grid');
  if (heroes.length === 0) { grid.innerHTML = '<div class="no-results">No heroes match filters</div>'; return; }
  grid.innerHTML = heroes.map(h => buildHeroCard(h)).join('');
  if (typeof nudgeTranslate === 'function') setTimeout(nudgeTranslate, 200);
}

const GEAR_NAME_TO_SLOT = { 'Assault Pistol': 1, 'Tactical Backarmor': 2, 'Optical Add-on': 3, 'Raysor Headset': 4, 'Portable GPS': 5, 'Power Boots': 6 };
const GEAR_SEARCH_TERMS = [
  ['Raysor', 'Raysor Headset'],
  ['Power Boots', 'Power Boots'],
  ['Tactical Backarmor', 'Tactical Backarmor'],
  ['Assault Pistol', 'Assault Pistol'],
  ['Optical Add-on', 'Optical Add-on'],
  ['Portable GPS', 'Portable GPS']
];

function findGearInBuff(buffText) {
  for (const [keyword, gearName] of GEAR_SEARCH_TERMS) {
    if (buffText.includes(keyword)) return gearName;
  }
  return null;
}

function getRefineStatus(attr) {
  const buff = attr.buff || '';
  if (buff.includes('70%') || buff.includes('Refining Progress')) return 'refine';
  return 'active';
}

function buildRefineHeroList(gearName) {
  const slotPos = GEAR_NAME_TO_SLOT[gearName];
  if (!slotPos) return '';
  let greenHeroes = [], yellowHeroes = [], redHeroes = [];
  GEAR_DATA.forEach(h => {
    const s = h.slots[slotPos];
    if (!s || s.equipped === false || !s.refinement) return;
    if (refineMode === 'per-slot' && s.randomStats) {
      const passCount = s.randomStats.filter(rs => rs.rollPercent >= 70).length;
      if (passCount === s.randomStats.length) greenHeroes.push({ name: h.heroName, id: h.heroId });
      else if (passCount > 0) yellowHeroes.push({ name: h.heroName, id: h.heroId });
      else redHeroes.push({ name: h.heroName, id: h.heroId });
    } else {
      if (getSlotRefined(s)) greenHeroes.push({ name: h.heroName, id: h.heroId });
      else redHeroes.push({ name: h.heroName, id: h.heroId });
    }
  });
  if (greenHeroes.length === 0 && yellowHeroes.length === 0 && redHeroes.length === 0) return '';
  const heroSpan = (hero, color) => `<span class="refine-hero" style="color:${color};font-weight:600;cursor:pointer" onclick="openHeroGearModal(${hero.id}, ${slotPos})">${esc(hero.name)}</span>`;
  const parts = [
    [greenHeroes, 'var(--good)'],
    [yellowHeroes, 'var(--warn)'],
    [redHeroes, 'var(--danger)']
  ].filter(([list]) => list.length > 0)
   .map(([list, color]) => list.map(h => heroSpan(h, color)).join(', '));
  return '<div class="refine-heroes">' + parts.join(' &mdash; ') + '</div>';
}

function renderAttrPanel() {
  const container = document.getElementById('attr-panel-container');
  if (currentField === 'all') { container.innerHTML = ''; return; }
  const field = BEAST_DATA.fields.find(f => f.fid === +currentField);
  if (!field || !field.attributes || field.attributes.length <= 1 || (field.attributes.length === 1 && field.attributes[0].value === 'see rawAttrs')) {
    container.innerHTML = '';
    return;
  }

  let slotsHTML = '';
  field.attributes.forEach(attr => {
    if (attr.value === 'see rawAttrs') return;
    const gearName = findGearInBuff(attr.buff);
    const status = getRefineStatus(attr);
    const isRefine = status === 'refine';

    let statusHTML = '';
    if (isRefine) {
      statusHTML = '<div class="attr-status needs-refine">\u26A0 Needs 70% Refine</div>';
      if (gearName) statusHTML += buildRefineHeroList(gearName);
    } else {
      statusHTML = '<div class="attr-status active">\u2713 Active</div>';
    }

    slotsHTML += `<div class="attr-slot"><div class="slot-num">Slot ${attr.slot}</div><div class="attr-buff">${esc(attr.buff)}</div><div class="attr-val">${esc(attr.value)}</div><div class="attr-condition">${esc(attr.condition)}</div>${statusHTML}</div>`;
  });

  container.innerHTML = `<div class="attr-panel open"><div class="attr-toggle" onclick="this.parentElement.classList.toggle('open')"><h3>Field Attributes &mdash; ${esc(field.displayName)}</h3><span class="chevron">&#9660;</span></div><div class="attr-body"><div class="attr-grid">${slotsHTML}</div></div></div>`;
}

function potentialColor(pct) {
  if (pct >= 85) return 'var(--accent)';
  if (pct >= 65) return 'var(--warn)';
  return 'var(--danger)';
}

function buildBeastCard(beast, fieldName, showSlot) {
  const emoji = elementIcon(beast.element);
  const stars = starStr(beast.star);
  const potPct = Math.round(beast.potential / 16000 * 100);
  const potColor = potentialColor(potPct);

  const baseHTML = (beast.baseBuffsResolved || [])
    .map(b => `<div class="base-buff notranslate" translate="no"><span class="b-name">${esc(b.name)}</span><span class="b-val">${esc(b.value)}</span></div>`)
    .join('');

  const mb = beast.mainBuffResolved || {};
  const qualityClass = beast.quality === 4 ? ' purple-quality' : '';
  const fieldSpan = fieldName ? `<span style="color:var(--muted)">${esc(fieldName)}</span>` : '';
  const slotBadge = showSlot && beast.hole ? `<span class="beast-slot-badge">#${beast.hole}</span>` : '';

  return `<div class="beast-card${qualityClass}" data-element="${esc(beast.element)}" data-level="${beast.level}" data-star="${beast.star}" data-potential="${beast.potential}" data-name="${esc(beast.name)}">` +
    `<div class="beast-head"><span class="beast-emoji">${emoji}</span><div class="beast-info"><div class="beast-name notranslate" translate="no">${slotBadge}${esc(beast.name)}</div><div class="beast-meta-row"><span class="beast-stars">${stars}</span><span class="beast-level">Lv.${beast.level}</span><span>${esc(beast.element)}</span>${fieldSpan}</div></div></div>` +
    `<div class="main-buff notranslate" translate="no"><div class="buff-label">Main Buff</div><div class="buff-name">${esc(mb.name)}</div><div class="buff-val">${esc(mb.value)}</div></div>` +
    baseHTML +
    `<div class="potential-section"><div class="potential-label"><span>Potential</span><span style="color:${potColor}">${beast.potential.toLocaleString()} / 16,000</span></div><div class="potential-bar"><div class="potential-fill" style="width:${potPct}%;background:${potColor}"></div></div></div></div>`;
}

function getBeastSortBy() {
  const active = document.querySelector('#beast-sort-btns .sort-btn.active');
  return active ? active.dataset.sort : 'slot';
}

function renderBeastGrid() {
  const activeElements = new Set();
  document.querySelectorAll('#element-pills .pill.active').forEach(p => activeElements.add(p.dataset.element));
  const sortBy = getBeastSortBy();

  let beasts;
  if (currentField === 'all') {
    beasts = BEAST_DATA.fields.flatMap(f => f.beasts.filter(b => !b.empty).map(b => ({ ...b, fieldName: f.displayName })));
  } else {
    const field = BEAST_DATA.fields.find(f => f.fid === +currentField);
    beasts = field ? field.beasts.filter(b => !b.empty).map(b => ({ ...b, fieldName: field.displayName })) : [];
  }

  if (!activeElements.has('all')) {
    beasts = beasts.filter(b => activeElements.has(b.element));
  }

  beasts.sort((a, b) => {
    if (sortBy === 'slot') return (a.hole || 0) - (b.hole || 0);
    if (sortBy === 'level') return b.level - a.level || b.star - a.star;
    if (sortBy === 'potential') return b.potential - a.potential;
    if (sortBy === 'name') return a.name.localeCompare(b.name);
    return 0;
  });

  const grid = document.getElementById('beast-grid');
  if (beasts.length === 0) { grid.innerHTML = '<div class="no-results">No beasts match filters</div>'; return; }
  const showSlot = currentField !== 'all';
  grid.innerHTML = beasts.map(b => buildBeastCard(b, currentField === 'all' ? b.fieldName : null, showSlot)).join('');
  if (typeof nudgeTranslate === 'function') setTimeout(nudgeTranslate, 200);
}

// Element pills
const ELEMENT_COLORS = { Fire: '#f97583', Wind: '#56d364', Water: '#6cb6ff', Ground: '#e3b341' };

function styleElementPill(pill, active) {
  if (active) {
    pill.classList.add('active');
    const color = pill.dataset.element === 'all' ? 'var(--accent)' : ELEMENT_COLORS[pill.dataset.element];
    pill.style.borderColor = color;
    pill.style.color = color;
  } else {
    pill.classList.remove('active');
    pill.style.borderColor = '';
    pill.style.color = '';
  }
}

document.querySelectorAll('#element-pills .pill').forEach(p => {
  p.addEventListener('click', () => {
    const allPill = document.querySelector('#element-pills .pill[data-element="all"]');
    if (p.dataset.element === 'all') {
      document.querySelectorAll('#element-pills .pill').forEach(x => styleElementPill(x, false));
      styleElementPill(p, true);
    } else {
      styleElementPill(allPill, false);
      const wasActive = p.classList.contains('active');
      styleElementPill(p, !wasActive);
      if (document.querySelectorAll('#element-pills .pill.active').length === 0) {
        styleElementPill(allPill, true);
      }
    }
    renderBeastGrid();
  });
});
initSortBtns('beast-sort-btns', renderBeastGrid);

// Init
buildDashboard();
renderGearTab();
buildFieldPills();
renderBeastGrid();

// =================== GOOGLE TRANSLATE ===================
const LANGUAGES = [
  { code: 'en', flag: '\u{1F1FA}\u{1F1F8}', name: 'English' },
  { code: 'es', flag: '\u{1F1EA}\u{1F1F8}', name: 'Espa\u00f1ol' },
  { code: 'fr', flag: '\u{1F1EB}\u{1F1F7}', name: 'Fran\u00e7ais' },
  { code: 'de', flag: '\u{1F1E9}\u{1F1EA}', name: 'Deutsch' },
  { code: 'pt', flag: '\u{1F1E7}\u{1F1F7}', name: 'Portugu\u00eas' },
  { code: 'it', flag: '\u{1F1EE}\u{1F1F9}', name: 'Italiano' },
  { code: 'ru', flag: '\u{1F1F7}\u{1F1FA}', name: '\u0420\u0443\u0441\u0441\u043a\u0438\u0439' },
  { code: 'ja', flag: '\u{1F1EF}\u{1F1F5}', name: '\u65E5\u672C\u8A9E' },
  { code: 'ko', flag: '\u{1F1F0}\u{1F1F7}', name: '\uD55C\uAD6D\uC5B4' },
  { code: 'zh-CN', flag: '\u{1F1E8}\u{1F1F3}', name: '\u4E2D\u6587' },
  { code: 'ar', flag: '\u{1F1F8}\u{1F1E6}', name: '\u0627\u0644\u0639\u0631\u0628\u064A\u0629' },
  { code: 'tr', flag: '\u{1F1F9}\u{1F1F7}', name: 'T\u00fcrk\u00e7e' },
  { code: 'vi', flag: '\u{1F1FB}\u{1F1F3}', name: 'Ti\u1EBFng Vi\u1EC7t' },
  { code: 'th', flag: '\u{1F1F9}\u{1F1ED}', name: '\u0E44\u0E17\u0E22' },
  { code: 'hi', flag: '\u{1F1EE}\u{1F1F3}', name: '\u0939\u093F\u0928\u094D\u0926\u0940' },
  { code: 'pl', flag: '\u{1F1F5}\u{1F1F1}', name: 'Polski' },
  { code: 'uk', flag: '\u{1F1FA}\u{1F1E6}', name: '\u0423\u043a\u0440\u0430\u0457\u043d\u0441\u044c\u043a\u0430' },
  { code: 'id', flag: '\u{1F1EE}\u{1F1E9}', name: 'Indonesia' }
];

function getLangData(code) {
  const base = code.split('-')[0];
  return LANGUAGES.find(l => l.code === code || l.code === base) || null;
}

function detectCurrentLang() {
  const match = document.cookie.match(/googtrans=\/en\/([a-zA-Z-]{2,10})/);
  if (match && match[1]) return match[1];
  return 'en';
}

function updateLangBtn(code) {
  const data = getLangData(code);
  const flagEl = document.getElementById('langFlag');
  const codeEl = document.getElementById('langCode');
  if (data && flagEl) { flagEl.textContent = data.flag; codeEl.textContent = '/' + data.code; }
  else if (flagEl) { flagEl.textContent = '\u{1F310}'; codeEl.textContent = '/' + code; }
  document.querySelectorAll('.lang-option').forEach(o => o.classList.toggle('active', o.dataset.lang === code));
}

function applyLangToCombo(code, delay) {
  let attempts = 0;
  const poll = setInterval(() => {
    const combo = document.querySelector('.goog-te-combo');
    if (combo) { combo.value = code; combo.dispatchEvent(new Event('change')); clearInterval(poll); updateLangBtn(code); }
    if (++attempts > 30) clearInterval(poll);
  }, delay || 200);
}

function nudgeTranslate() {
  const combo = document.querySelector('.goog-te-combo');
  if (combo && combo.value && combo.value !== 'en') combo.dispatchEvent(new Event('change'));
}

function selectLanguage(code) {
  if (code === 'en') {
    sessionStorage.removeItem('pendingLang');
    document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax; Secure';
    document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.2864tw.com; SameSite=Lax; Secure';
    closeLangModal();
    location.reload();
    return;
  }
  sessionStorage.setItem('pendingLang', code);
  applyLangToCombo(code, 200);
  closeLangModal();
}

const langModalEl = document.getElementById('langModal');
function openLangModal() { if (langModalEl) langModalEl.classList.add('active'); }
function closeLangModal() { if (langModalEl) langModalEl.classList.remove('active'); }

// Build language grid
(function() {
  const grid = document.getElementById('langGrid');
  if (!grid) return;
  const detected = detectCurrentLang();
  LANGUAGES.forEach(l => {
    const btn = document.createElement('button');
    btn.className = 'lang-option' + (l.code === detected ? ' active' : '');
    btn.dataset.lang = l.code;
    btn.innerHTML = `<span class="lang-flag">${l.flag}</span><span class="lang-name">${esc(l.name)}</span>`;
    btn.addEventListener('click', () => selectLanguage(l.code));
    grid.appendChild(btn);
  });
  updateLangBtn(detected);
})();

// Wire up events
document.getElementById('langBtn').addEventListener('click', openLangModal);
document.getElementById('langModalClose').addEventListener('click', closeLangModal);
langModalEl.addEventListener('click', e => { if (e.target === langModalEl) closeLangModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape' && langModalEl.classList.contains('active')) { closeLangModal(); e.stopPropagation(); } });

// Fallback if GT never loads
setTimeout(() => {
  if (!window._gtLoaded) {
    const btn = document.getElementById('langBtn');
    if (btn) { btn.style.opacity = '0.5'; btn.style.cursor = 'default'; btn.title = 'Translation unavailable'; }
  }
}, 15000);

// GT init
function googleTranslateElementInit() {
  window._gtLoaded = true;
  new google.translate.TranslateElement({ pageLanguage: 'en', autoDisplay: false }, 'google_translate_element');
  const pending = sessionStorage.getItem('pendingLang');
  if (pending) { sessionStorage.removeItem('pendingLang'); applyLangToCombo(pending, 250); }
  else {
    const langOverride = localStorage.getItem('langOverride');
    if (langOverride && langOverride !== 'en') applyLangToCombo(langOverride, 250);
    const detected = detectCurrentLang();
    if (detected !== 'en') updateLangBtn(detected);
  }
}
</script>
<script src="https://translate.googleapis.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
