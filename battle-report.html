  /** Build a unit icon img with onerror fallback */
  function unitIconImg(src, alt) {
    var img = el('img', { src: src, className: 'unit-icon', alt: alt, width: '40', height: '40' });
    img.onerror = function() { this.style.display = 'none'; };
    return img;
  }

  /** Build one side of the army composition row */
  function buildArmySide(army, mechas, side, playerName, totalArmyNum) {
    var isAtt = (side === 'att');
    var sideEl = buildDetailSide('Unit Composition', !isAtt, playerName);

    // Show total army count if available
    if (totalArmyNum) {
      var totalEl = el('div', { style: 'font-size:.75rem;color:var(--accent);font-weight:600;margin-bottom:.25rem;' });
      totalEl.textContent = formatPower(totalArmyNum) + ' total units';
      sideEl.appendChild(totalEl);
    }

    var list = el('ul', { className: 'army-list ' + (isAtt ? 'left' : 'right') });

    army.forEach(function(a) {
      var resolved = resolveUnitIcon(a.armyId, mechas);
      var survived = a.s0 || 0;
      var died = a.s1 || 0;
      var hasBreakdown = survived > 0 || died > 0;

      function makeLi(count, color, label, icon) {
        var li = el('li');
        if (color) li.style.color = 'var(--' + color + ')';
        var numSpan = el('span');
        numSpan.textContent = 'x' + formatPower(count);
        var unitInfo = el('span', { className: 'unit-info' });
        var labelSpan = el('span');
        labelSpan.textContent = label;
        if (isAtt) {
          unitInfo.appendChild(labelSpan);
          if (icon) unitInfo.appendChild(unitIconImg(icon, label));
          li.appendChild(numSpan);
          li.appendChild(unitInfo);
        } else {
          if (icon) unitInfo.appendChild(unitIconImg(icon, label));
          unitInfo.appendChild(labelSpan);
          li.appendChild(unitInfo);
          li.appendChild(numSpan);
        }
        return li;
      }

      if (hasBreakdown) {
        if (survived > 0) list.appendChild(makeLi(survived, 'green', resolved.label, resolved.icon));
        if (died > 0) list.appendChild(makeLi(died, 'red', resolved.label, resolved.icon));
      } else {
        list.appendChild(makeLi(a.num || a.armyNum || 0, null, resolved.label, resolved.icon));
      }
    });

    sideEl.appendChild(list);
    return sideEl;
  }

  function buildReportHeader(data, battle) {
    var fightType = FIGHT_TYPES[battle.fightType] || ('Type ' + battle.fightType);
    var children = [
      el('div', { className: 'report-type' }, fightType),
      el('div', { className: 'report-id' }, 'Report ID: ' + data.reportId)
    ];
    if (data.logtime) {
      children.push(el('div', { className: 'report-time' }, formatDate(data.logtime)));
    }
    return el('div', { className: 'report-header' }, children);
  }

  function buildPlayerCard(side, pi, isWinner) {
    var card = el('div', { className: 'player-card ' + (isWinner ? 'winner' : 'loser') });

    // Avatar
    var avatarUrl = getAvatar(pi);
    if (avatarUrl && avatarUrl.indexOf('http') === 0) {
      var img = el('img', { className: 'player-avatar', src: avatarUrl, alt: '' });
      img.onerror = function() { this.style.display = 'none'; };
      card.appendChild(img);
    } else {
      // Fallback: first character of name as avatar
      var initial = (pi.username || '?').charAt(0).toUpperCase();
      var placeholder = el('div', {
        className: 'player-avatar',
        style: 'display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:var(--accent);background:var(--surface);border:1px solid var(--border);'
      }, initial);
      card.appendChild(placeholder);
    }

    // Name
    var nameEl = el('div', { className: 'player-name' });
    nameEl.textContent = pi.username || 'Unknown';
    card.appendChild(nameEl);

    // Alliance tag (always render to keep card heights equal)
    var alTag = side.alTag || (pi.alTag || '');
    var tagEl = el('div', { className: 'player-alliance' });
    tagEl.textContent = alTag ? '[' + alTag + ']' : 'No Alliance';
    if (!alTag) tagEl.style.color = 'var(--muted)';
    card.appendChild(tagEl);

    // National flag
    var flag = flagEmoji(pi.nationalflag || 0);
    if (flag) {
      var flagEl = el('div', { className: 'player-flag' });
      flagEl.textContent = flag;
      card.appendChild(flagEl);
    }

    // Result label
    var resultEl = el('div', { className: 'player-result ' + (isWinner ? 'victory' : 'defeat') });
    resultEl.textContent = isWinner ? 'VICTORY' : 'DEFEAT';
    card.appendChild(resultEl);

    return card;
  }

  function buildVSSection(att, def, attPI, defPI, attWins) {
    var vs = el('div', { className: 'vs-section' });
    var attCard = buildPlayerCard(att, attPI, attWins);
    var attPlayers = att.players || [];
    if (attPlayers.length > 1 && getUniquePlayerCount(att) > 1) {
      attCard.appendChild(el('div', { className: 'rally-indicator' }, 'Rally (' + attPlayers.length + ' players)'));
    }
    vs.appendChild(attCard);
    var badge = el('div', { className: 'vs-badge' });
    badge.textContent = 'VS';
    vs.appendChild(badge);
    var defCard = buildPlayerCard(def, defPI, !attWins);
    var defPlayers = def.players || [];
    if (defPlayers.length > 1 && getUniquePlayerCount(def) > 1) {
      defCard.appendChild(el('div', { className: 'rally-indicator' }, 'Rally (' + defPlayers.length + ' players)'));
    }
    vs.appendChild(defCard);
    return vs;
  }

  function buildDetailsPanel(fm, att, def, attPI, defPI, attHeroes, defHeroes) {
    var panel = el('div', { className: 'details-panel' });
    var title = el('div', { className: 'section-title' });
    title.textContent = 'Details';
    panel.appendChild(title);

    // Row 1: Names + Battle Power
    var row1 = el('div', { className: 'details-row' });
    var left1 = buildDetailSide('Attacker', false);
    var val1a = el('div', { className: 'detail-value green' });
    val1a.textContent = (attPI.username || 'Unknown') + (fm.attBattlePower ? '  —  CP:' + fm.attBattlePower : '');
    left1.appendChild(val1a);
    row1.appendChild(left1);

    var right1 = buildDetailSide('Defender', true);
    var val1b = el('div', { className: 'detail-value red' });
    val1b.textContent = (defPI.username || 'Unknown') + (fm.defBattlePower ? '  —  CP:' + fm.defBattlePower : '');
    right1.appendChild(val1b);
    row1.appendChild(right1);
    panel.appendChild(row1);

    // Row 1.5: Hero Portraits (rally-aware: collapsible per-player sections)
    if ((attHeroes && attHeroes.length > 0) || (defHeroes && defHeroes.length > 0)) {
      var attPlayerCount = (att.players || []).length;
      var defPlayerCount = (def.players || []).length;
      var isRally = attPlayerCount > 1 || defPlayerCount > 1;

      if (isRally) {
        // Rally mode: render per-player collapsible hero sections
        var heroRow = el('div', { className: 'details-row' });

        var leftHero = buildDetailSide('Heroes', false, attPI.username || 'Attacker');
        var attUniqueCount = getUniquePlayerCount(att);
        if (attPlayerCount > 1 && attUniqueCount > 1) {
          for (var ai = 0; ai < attPlayerCount; ai++) {
            var api = getPlayerInfo(att, ai);
            var aHeroes = getHeroList(att, ai);
            var aFlag = flagEmoji(api.nationalflag || 0);
            var aHeaderChildren = [
              el('span', { className: 'rally-toggle' }, '\u25BC'),
              aFlag ? el('span', null, aFlag + ' ') : null,
              el('span', null, api.username || 'Unknown')
            ];
            if (ai === 0) aHeaderChildren.push(el('span', { className: 'rally-leader-badge' }, 'LEADER'));
            var aHeader = el('div', { className: 'rally-player-header' + (ai > 0 ? ' collapsed' : '') }, aHeaderChildren);
            var aContent = el('div', { className: 'rally-player-content' + (ai > 0 ? ' collapsed' : '') });
            var ap = buildHeroPortraits(aHeroes, 'att');
            if (ap) aContent.appendChild(ap);
            (function(hdr, cnt) {
              hdr.addEventListener('click', function() {
                hdr.classList.toggle('collapsed');
                cnt.classList.toggle('collapsed');
              });
            })(aHeader, aContent);
            leftHero.appendChild(aHeader);
            leftHero.appendChild(aContent);
          }
        } else if (attPlayerCount > 1 && attUniqueCount === 1) {
          var allAttHeroesCombined = getAllHeroLists(att);
          var attPortraits = buildHeroPortraits(allAttHeroesCombined, 'att');
          if (attPortraits) leftHero.appendChild(attPortraits);
        } else {
          var attPortraits = buildHeroPortraits(attHeroes, 'att');
          if (attPortraits) leftHero.appendChild(attPortraits);
        }
        heroRow.appendChild(leftHero);

        var rightHero = buildDetailSide('Heroes', true, defPI.username || 'Defender');
        var defUniqueCount = getUniquePlayerCount(def);
        if (defPlayerCount > 1 && defUniqueCount > 1) {
          for (var di = 0; di < defPlayerCount; di++) {
            var dpi = getPlayerInfo(def, di);
            var dHeroes = getHeroList(def, di);
            var dFlag = flagEmoji(dpi.nationalflag || 0);
            var dHeaderChildren = [
              el('span', { className: 'rally-toggle' }, '\u25BC'),
              dFlag ? el('span', null, dFlag + ' ') : null,
              el('span', null, dpi.username || 'Unknown')
            ];
            if (di === 0) dHeaderChildren.push(el('span', { className: 'rally-leader-badge' }, 'LEADER'));
            var dHeader = el('div', { className: 'rally-player-header' + (di > 0 ? ' collapsed' : '') }, dHeaderChildren);
            var dContent = el('div', { className: 'rally-player-content' + (di > 0 ? ' collapsed' : '') });
            var dp = buildHeroPortraits(dHeroes, 'def');
            if (dp) dContent.appendChild(dp);
            (function(hdr, cnt) {
              hdr.addEventListener('click', function() {
                hdr.classList.toggle('collapsed');
                cnt.classList.toggle('collapsed');
              });
            })(dHeader, dContent);
            rightHero.appendChild(dHeader);
            rightHero.appendChild(dContent);
          }
        } else if (defPlayerCount > 1 && defUniqueCount === 1) {
          /* Same player across multiple rounds — show per-round collapsible */
          for (var dri = 0; dri < defPlayerCount; dri++) {
            var drHeroes = getHeroList(def, dri);
            var drHeader = el('div', { className: 'rally-player-header' + (dri > 0 ? ' collapsed' : '') }, [
              el('span', { className: 'rally-toggle' }, '\u25BC'),
              el('span', null, 'Round ' + (dri + 1))
            ]);
            var drContent = el('div', { className: 'rally-player-content' + (dri > 0 ? ' collapsed' : '') });
            var drp = buildHeroPortraits(drHeroes, 'def');
            if (drp) drContent.appendChild(drp);
            (function(hdr, cnt) {
              hdr.addEventListener('click', function() { hdr.classList.toggle('collapsed'); cnt.classList.toggle('collapsed'); });
            })(drHeader, drContent);
            rightHero.appendChild(drHeader);
            rightHero.appendChild(drContent);
          }
        } else {
          var defPortraits = buildHeroPortraits(defHeroes, 'def');
          if (defPortraits) rightHero.appendChild(defPortraits);
        }
        heroRow.appendChild(rightHero);

        panel.appendChild(heroRow);
      } else {
        // Standard 1v1 hero row
        var heroRow = el('div', { className: 'details-row' });

        var leftHero = buildDetailSide('Heroes', false, attPI.username || 'Attacker');
        var attPortraits = buildHeroPortraits(attHeroes, 'att');
        if (attPortraits) leftHero.appendChild(attPortraits);
        heroRow.appendChild(leftHero);

        var rightHero = buildDetailSide('Heroes', true, defPI.username || 'Defender');
        var defPortraits = buildHeroPortraits(defHeroes, 'def');
        if (defPortraits) rightHero.appendChild(defPortraits);
        heroRow.appendChild(rightHero);

        panel.appendChild(heroRow);
      }
    }

    // Row 2: Unit Composition
    var attArmy = fm.attPutArmyV2 || [];
    var defArmy = fm.defPutArmyV2 || [];
    // Gather mecha data for icon resolution
    var attMechas = att.mechas || [];
    var defMechas = def.mechas || [];
    if (attArmy.length > 0 || defArmy.length > 0) {
      var row2 = el('div', { className: 'details-row' });
      row2.appendChild(buildArmySide(attArmy, attMechas, 'att', attPI.username || 'Attacker', fm.attArmyNum));
      row2.appendChild(buildArmySide(defArmy, defMechas, 'def', defPI.username || 'Defender', fm.defArmyNum));
      panel.appendChild(row2);
    }

    // Row 3: Survival Bar
    var attUnits = att.units || [];
    var defUnits = def.units || [];
    if (attUnits.length > 0 || defUnits.length > 0) {
      var attSurv = calcSurvival(attUnits);
      var defSurv = calcSurvival(defUnits);

      var row3 = el('div', { className: 'details-row' });
      row3.appendChild(buildSurvivalSide(attSurv, 'att', attPI.username || 'Attacker'));
      row3.appendChild(buildSurvivalSide(defSurv, 'def', defPI.username || 'Defender'));
      panel.appendChild(row3);
    }

    return panel;
  }

  function buildSkillTable(skillHurts, side, skillToHeroMap, mechas) {
    if (!skillHurts) return null;

    var commonHurt = parseFloat(skillHurts.common_hurt) || 0;
    var commonCount = parseInt(skillHurts.common_count) || 0;
    var hurts = skillHurts.skill_hurts || {};
    var counts = skillHurts.skill_hurt_count || {};
    var heroMap = skillToHeroMap || {};

    var isLeft = (side === 'att');

    var rows = [];
    // Skill rows
    var skillIds = Object.keys(hurts).sort(function(a, b) {
      return (parseFloat(hurts[b]) || 0) - (parseFloat(hurts[a]) || 0);
    });
    skillIds.forEach(function(id) {
      rows.push({
        skill: id,
        triggers: parseInt(counts[id]) || 0,
        damage: parseFloat(hurts[id]) || 0
      });
    });
    // Common attack row
    if (commonCount > 0 || commonHurt > 0) {
      rows.push({ skill: 'Common', triggers: commonCount, damage: commonHurt, isCommon: true });
    }

    var table = el('table', { className: 'skill-table ' + (isLeft ? 'left' : 'right') });

    // Header
    var thead = el('thead');
    var headerRow = el('tr');
    if (isLeft) {
      headerRow.appendChild(el('th', null, 'Skill'));
      headerRow.appendChild(el('th', null, 'Triggers'));
      headerRow.appendChild(el('th', null, 'Damage'));
    } else {
      headerRow.appendChild(el('th', null, 'Damage'));
      headerRow.appendChild(el('th', null, 'Triggers'));
      headerRow.appendChild(el('th', null, 'Skill'));
    }
    thead.appendChild(headerRow);
    table.appendChild(thead);

    // Body
    var tbody = el('tbody');
    rows.forEach(function(r) {
      var tr = el('tr');
      var skillTd = el('td');
      if (r.isCommon) {
        var commonSpan = el('span', { className: 'common-label' });
        commonSpan.textContent = 'Common';
        skillTd.appendChild(commonSpan);
      } else {
        var mapped = heroMap[r.skill];
        if (mapped) {
          // Show skill icon + hero name
          var cellWrap = el('span', { className: 'skill-cell-wrap' });
          var sIcon = skillIconImg(mapped.skillId, 32);
          cellWrap.appendChild(sIcon);
          var nameSpan = el('span', { className: 'skill-id' });
          nameSpan.textContent = HERO_NAMES[String(mapped.heroId)] || ('#' + mapped.heroId);
          cellWrap.appendChild(nameSpan);
          skillTd.appendChild(cellWrap);
        } else if (parseInt(r.skill) > 900000) {
          // Mecha skill — show mecha icon + label
          var mechaCellWrap = el('span', { className: 'skill-cell-wrap' });
          var mechaIconId = mechas && mechas.length > 0 && mechas[0].mechaId ? mechas[0].mechaId : null;
          if (mechaIconId) {
            var mechaImg = el('img', { src: ASSET_BASE + 'assets/mecha-icons/mecha_' + mechaIconId + '.png', className: 'skill-icon', alt: 'HT', width: '32', height: '32' });
            mechaImg.onerror = function() { this.style.display = 'none'; };
            mechaCellWrap.appendChild(mechaImg);
          }
          var mechaSpan = el('span', { className: 'skill-id' });
          mechaSpan.textContent = 'HT';
          mechaSpan.style.color = 'var(--yellow)';
          mechaCellWrap.appendChild(mechaSpan);
          skillTd.appendChild(mechaCellWrap);
        } else {
          var idSpan = el('span', { className: 'skill-id' });
          idSpan.textContent = '#' + r.skill;
          skillTd.appendChild(idSpan);
        }
      }

      var trigTd = el('td');
      trigTd.textContent = String(r.triggers);

      var dmgTd = el('td');
      dmgTd.textContent = formatPower(r.damage);

      if (isLeft) {
        tr.appendChild(skillTd);
        tr.appendChild(trigTd);
        tr.appendChild(dmgTd);
      } else {
        tr.appendChild(dmgTd);
        tr.appendChild(trigTd);
        tr.appendChild(skillTd);
      }
      tbody.appendChild(tr);
    });

    // If no rows, show empty state
    if (rows.length === 0) {
      var emptyTr = el('tr');
      var emptyTd = el('td', { colspan: '3', style: 'color:var(--muted);text-align:center;' });
      emptyTd.textContent = 'No skill data';
      emptyTr.appendChild(emptyTd);
      tbody.appendChild(emptyTr);
    }

    table.appendChild(tbody);
    return table;
  }

  function buildSkillSection(fm, skillToHeroMap, attMechas, defMechas, attName, defName) {
    var attSkill = fm.attSkillHurts;
    var defSkill = fm.defSkillHurts;
    if (!attSkill && !defSkill) return null;

    var section = el('div', { className: 'skill-table-section' });
    var title = el('div', { className: 'section-title' });
    title.textContent = 'Skill Damage';
    section.appendChild(title);

    var wrap = el('div', { className: 'skill-tables-wrap' });

    var attWrap = el('div');
    var attBadge = el('div', { className: 'mobile-badge att' });
    attBadge.textContent = attName || 'Attacker';
    attWrap.appendChild(attBadge);
    var attTable = buildSkillTable(attSkill, 'att', skillToHeroMap, attMechas);
    attWrap.appendChild(attTable || el('div'));
    wrap.appendChild(attWrap);

    wrap.appendChild(el('div', { className: 'skill-divider' }));

    var defWrap = el('div');
    var defBadge = el('div', { className: 'mobile-badge def' });
    defBadge.textContent = defName || 'Defender';
    defWrap.appendChild(defBadge);
    var defTable = buildSkillTable(defSkill, 'def', skillToHeroMap, defMechas);
    defWrap.appendChild(defTable || el('div'));
    wrap.appendChild(defWrap);

    section.appendChild(wrap);
    return section;
  }

  /** Build one damage card (attacker or defender) */
  function buildDamageCard(side, total, pct) {
    var isAtt = (side === 'att');
    var color = isAtt ? 'green' : 'red';
    var card = el('div', { className: 'damage-card ' + side });

    var label = el('div', { className: 'damage-card-label' });
    label.textContent = (isAtt ? 'Attacker' : 'Defender') + ' Total Damage';
    card.appendChild(label);

    var val = el('div', { className: 'damage-card-value ' + color });
    val.textContent = formatPower(total);
    card.appendChild(val);

    var barWrap = el('div', { className: 'survival-bar-wrap' });
    var bar = el('div', { className: 'survival-bar' });
    bar.appendChild(el('div', { className: 'fill ' + color, style: 'width:' + pct + '%' }));
    barWrap.appendChild(bar);
    card.appendChild(barWrap);

    var pctEl = el('div', { className: 'survival-pct', style: 'text-align:center' });
    pctEl.textContent = pct + '%';
    card.appendChild(pctEl);

    return card;
  }

  function buildDamageSummary(fm) {
    var attSkill = fm.attSkillHurts;
    var defSkill = fm.defSkillHurts;
    var attTotal = attSkill ? parseFloat(attSkill.total_hurt) || 0 : 0;
    var defTotal = defSkill ? parseFloat(defSkill.total_hurt) || 0 : 0;

    if (attTotal === 0 && defTotal === 0) return null;

    var grandTotal = attTotal + defTotal || 1;
    var attPct = ((attTotal / grandTotal) * 100).toFixed(1);
    var defPct = ((defTotal / grandTotal) * 100).toFixed(1);

    var wrap = el('div', { className: 'damage-summary' });
    wrap.appendChild(buildDamageCard('att', attTotal, attPct));
    wrap.appendChild(buildDamageCard('def', defTotal, defPct));
    return wrap;
  }

  function buildRawJSON(data) {
    var stripped = stripUIDs(data);
    var jsonStr = JSON.stringify(stripped, null, 2);
    var sizeKB = (jsonStr.length / 1024).toFixed(0);

    var summary = el('summary', null, 'Raw JSON (' + sizeKB + ' KB) — UIDs stripped');
    var pre = el('pre');
    pre.textContent = jsonStr;
    return el('details', { className: 'raw-json' }, [summary, pre]);
  }

  // ---- Multi-march rendering ----

  function renderMarchContent(container, fm, att, def, attPI, defPI) {
    // Extract heroLists from both sides (all players for skill map, per-player for portraits)
    var attHeroes = getAllHeroLists(att);
    var defHeroes = getAllHeroLists(def);
    var skillToHeroMap = buildSkillToHeroMap(attHeroes, defHeroes);

    // Details panel (with hero portraits — rally-aware)
    container.appendChild(buildDetailsPanel(fm, att, def, attPI, defPI, attHeroes, defHeroes));

    // Hero Equipment + Stats Comparison buttons — side by side in one row
    var attHasGear = att.players && att.players.some(function(p){ return (p.heroList||[]).some(function(h){ return h.heroEquips && h.heroEquips.length > 0; }); });
    var defHasGear = def.players && def.players.some(function(p){ return (p.heroList||[]).some(function(h){ return h.heroEquips && h.heroEquips.length > 0; }); });
    var attHasBuffs = att.players && att.players.some(function(p) { return p.effectBuffs; });
    var defHasBuffs = def.players && def.players.some(function(p) { return p.effectBuffs; });

    if (attHasGear || defHasGear || attHasBuffs || defHasBuffs) {
      var btnRow = el('div', {className: 'stats-btn-wrap'});

      if (attHasGear || defHasGear) {
        var attrBtn = el('button', {className: 'stats-btn', onclick: function(){
          document.body.appendChild(buildAttributesModal(att, def, attPI, defPI));
        }});
        attrBtn.appendChild(el('span', {style:'display:inline-flex;vertical-align:middle;margin-right:.35rem;'}, (function(){
          var s = document.createElementNS('http://www.w3.org/2000/svg','svg');
          s.setAttribute('width','16'); s.setAttribute('height','16'); s.setAttribute('viewBox','0 0 24 24'); s.setAttribute('fill','none'); s.setAttribute('stroke','currentColor'); s.setAttribute('stroke-width','2');
          var p1 = document.createElementNS('http://www.w3.org/2000/svg','rect'); p1.setAttribute('x','2'); p1.setAttribute('y','3'); p1.setAttribute('width','20'); p1.setAttribute('height','14'); p1.setAttribute('rx','2');
          var p2 = document.createElementNS('http://www.w3.org/2000/svg','path'); p2.setAttribute('d','M8 21h8M12 17v4');
          s.appendChild(p1); s.appendChild(p2); return s;
        })()));
        attrBtn.appendChild(document.createTextNode('Hero Equipment'));
        btnRow.appendChild(attrBtn);
      }

      if (attHasBuffs || defHasBuffs) {
        var statsBtn = el('button', { className: 'stats-btn', onclick: function() {
          document.body.appendChild(buildStatsModal(att, def, attPI, defPI));
        }});
        statsBtn.appendChild(el('span', { style: 'display:inline-flex;vertical-align:middle;margin-right:.35rem;' }, [
          (function() { var s = document.createElementNS('http://www.w3.org/2000/svg','svg'); s.setAttribute('width','16'); s.setAttribute('height','16'); s.setAttribute('viewBox','55 50 400 400'); s.setAttribute('fill','currentColor'); var p = document.createElementNS('http://www.w3.org/2000/svg','path'); p.setAttribute('d','M438,411.3l-37.6-37.6c0.1-0.2,0.1-0.2,0.1-0.4c9.7-20.8,6.2-46.3-11-63.5L363,336.3l-80.5-80.5l96.6-96.6c24-24,37.5-56.6,37.5-90.5L256,229.3L95.4,68.7c0,34,13.5,66.5,37.5,90.5l96.6,96.6L149,336.3l-26.5-26.5c-17.2,17.2-20.7,42.7-11,63.5c0.1,0.2,0.1,0.2,0.1,0.4L74,411.3c-7.3,7.3-7.3,19.2,0,26.5c7.3,7.3,19.2,7.3,26.5,0l37.6-37.6c0.2,0.1,0.2,0.1,0.4,0.1c20.8,9.7,46.3,6.2,63.5-11l-26.5-26.5l80.5-80.5l80.5,80.5L310,389.4c17.2,17.2,42.7,20.7,63.5,11c0.1-0.1,0.2-0.1,0.4-0.1l37.6,37.6c7.3,7.3,19.2,7.3,26.5,0C445.3,430.5,445.3,418.6,438,411.3z'); s.appendChild(p); return s; })()
        ]));
        statsBtn.appendChild(document.createTextNode('Stats Comparison'));
        btnRow.appendChild(statsBtn);
      }

      container.appendChild(btnRow);
    }

    // Skill damage tables (with hero icons + mecha icons)
    var skillSection = buildSkillSection(fm, skillToHeroMap, att.mechas || [], def.mechas || [], attPI.username || 'Attacker', defPI.username || 'Defender');
    if (skillSection) container.appendChild(skillSection);

    // Total damage summary
    var dmgSummary = buildDamageSummary(fm);
    if (dmgSummary) container.appendChild(dmgSummary);
  }

  // ---- Main render ----

  function renderReport(data) {
    var container = document.getElementById('report');
    while (container.firstChild) container.removeChild(container.firstChild);

    var battle = data.battle;
    var att = battle.attacker;
    var def = battle.defender;
    var attPI = getPlayerInfo(att);
    var defPI = getPlayerInfo(def);
    var attWins = battle.result === 1;
    var marches = battle.fightMarches || [];
    var fm = marches[0] || {};

    // 1. Report header
    container.appendChild(buildReportHeader(data, battle));

    // 2. VS section
    container.appendChild(buildVSSection(att, def, attPI, defPI, attWins));

    // 3. March content (with tabs if multiple marches)
    if (marches.length > 1) {
      var tabsWrap = el('div', { className: 'march-tabs' });
      var marchContainer = el('div');

      marches.forEach(function(m, idx) {
        var tab = el('div', {
          className: 'march-tab' + (idx === 0 ? ' active' : ''),
          onclick: (function(i) {
            return function() {
              // Update tabs
              var allTabs = tabsWrap.querySelectorAll('.march-tab');
              for (var t = 0; t < allTabs.length; t++) {
                allTabs[t].className = 'march-tab' + (t === i ? ' active' : '');
              }
              // Render march
              while (marchContainer.firstChild) marchContainer.removeChild(marchContainer.firstChild);
              renderMarchContent(marchContainer, marches[i], att, def, attPI, defPI);
            };
          })(idx)
        });
        tab.textContent = 'Round ' + (idx + 1);
        tabsWrap.appendChild(tab);
      });

      container.appendChild(tabsWrap);
      renderMarchContent(marchContainer, marches[0], att, def, attPI, defPI);
      container.appendChild(marchContainer);
    } else {
      renderMarchContent(container, fm, att, def, attPI, defPI);
    }

    // 4. Raw JSON
    container.appendChild(buildRawJSON(data));
  }

  // ---- Load report ----

  function loadReport() {
    var input = document.getElementById('report-id');
    var btn = document.getElementById('load-btn');
    var statusEl = document.getElementById('status');
    var id = input.value.trim();

    if (!id) {
      statusEl.textContent = 'Enter a report ID';
      statusEl.className = 'status error';
      return;
    }
    if (!/^\d{14,22}$/.test(id)) {
      statusEl.textContent = 'Report ID should be a numeric identifier';
      statusEl.className = 'status error';
      return;
    }

    btn.disabled = true;
    statusEl.textContent = 'Loading report...';
    statusEl.className = 'status';
    var reportEl = document.getElementById('report');
    while (reportEl.firstChild) reportEl.removeChild(reportEl.firstChild);

    var prefix = id.substring(0, 4);
    var url = CDN_BASE + prefix + '/' + id + '.json';

    fetch(url)
      .then(function(r) {
        if (!r.ok) throw new Error('Report not found (HTTP ' + r.status + ')');
        return r.json();
      })
      .then(function(data) {
        if (!data.battle) throw new Error('Invalid report format');
        statusEl.textContent = '';
        renderReport(data);
        var params = new URLSearchParams(window.location.search);
        params.set('id', id);
        history.replaceState(null, '', '?' + params.toString());
      })
      .catch(function(err) {
        statusEl.textContent = err.message;
        statusEl.className = 'status error';
      })
      .finally(function() { btn.disabled = false; });
  }

  document.getElementById('load-btn').addEventListener('click', loadReport);
  document.getElementById('report-id').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadReport();
  });

  // Auto-load from URL param
  var params = new URLSearchParams(window.location.search);
  var idParam = params.get('id');
  if (idParam) {
    document.getElementById('report-id').value = idParam;
    loadReport();
  }
})();
</script>

  document.addEventListener('click', function(e) {
    var pop = document.getElementById('bnpPop');
    if (pop && !pop.contains(e.target) && e.target.id !== 'bnpBtn' && !e.target.closest('#bnpBtn')) pop.classList.remove('open');
  });
