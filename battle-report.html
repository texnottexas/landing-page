<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'unsafe-inline'; img-src https://knight-cdn.akamaized.net https://h5.topwargame.com https://raw.githubusercontent.com data:; connect-src https://fight-report-va.oss-accelerate.aliyuncs.com; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'self'">
<title>Battle Report Viewer — 2864</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --card: #1c2128; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --navy: #388bfd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: .75rem 1rem; display: flex; align-items: center; gap: .75rem; }
  .header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
  .home-btn { display: flex; align-items: center; justify-content: center; background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: .4rem .6rem; text-decoration: none; transition: all .15s; }
  .home-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Search */
  .search-bar { max-width: 700px; margin: 2rem auto; padding: 0 1rem; width: 100%; }
  .search-row { display: flex; gap: .5rem; }
  .search-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .6rem .75rem; color: var(--text); font-size: .95rem; outline: none; }
  .search-row input:focus { border-color: var(--accent); }
  .search-row input::placeholder { color: var(--muted); }
  .search-row button { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: .6rem 1.2rem; font-weight: 600; cursor: pointer; font-size: .9rem; white-space: nowrap; }
  .search-row button:hover { opacity: .9; }
  .search-row button:disabled { opacity: .5; cursor: not-allowed; }
  .search-hint { font-size: .75rem; color: var(--muted); margin-top: .4rem; }

  /* Status */
  .status { text-align: center; padding: 1rem; color: var(--muted); font-size: .9rem; }
  .status.error { color: var(--red); }

  /* Report container */
  #report { max-width: 860px; margin: 0 auto 2rem; padding: 0 1rem; width: 100%; }

  /* Report header */
  .report-header { text-align: center; margin-bottom: 1.5rem; padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .report-type { font-size: 1.1rem; font-weight: 700; color: var(--accent); margin-bottom: .25rem; }
  .report-id { font-size: .8rem; color: var(--muted); font-family: 'SF Mono', Monaco, monospace; }
  .report-time { font-size: .8rem; color: var(--muted); margin-top: .25rem; }

  /* VS Section */
  .vs-section { display: grid; grid-template-columns: 1fr auto 1fr; gap: .75rem; align-items: start; margin-bottom: 1.5rem; }
  .vs-badge { align-self: center; font-size: 1.5rem; font-weight: 800; color: var(--muted); text-align: center; padding-top: 2rem; }
  .player-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
  .player-card.winner { border-color: var(--green); }
  .player-card.loser { border-color: var(--red); }
  .player-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: var(--surface); margin: 0 auto .5rem; display: block; }
  .player-name { font-weight: 600; font-size: 1rem; word-break: break-all; }
  .player-alliance { font-size: .8rem; color: var(--accent); margin-top: .15rem; }
  .player-flag { font-size: 1.3rem; margin-top: .25rem; }
  .player-result { font-size: .75rem; font-weight: 700; text-transform: uppercase; margin-top: .4rem; padding: .2rem .6rem; border-radius: 4px; display: inline-block; }
  .player-result.victory { background: rgba(63,185,80,.15); color: var(--green); }
  .player-result.defeat { background: rgba(248,81,73,.15); color: var(--red); }

  /* Details panel */
  .details-panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
  .section-title { font-size: .85rem; color: var(--muted); margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .details-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .details-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .detail-side { font-size: .85rem; }
  .detail-side.right { text-align: right; }
  .detail-label { color: var(--muted); font-size: .7rem; text-transform: uppercase; margin-bottom: .15rem; }
  .detail-value { font-weight: 600; }
  .detail-value.green { color: var(--green); }
  .detail-value.red { color: var(--red); }

  /* Hero portraits */
  .hero-portraits { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .25rem; }
  .hero-portraits.right { justify-content: flex-end; }
  .hero-portrait { display: flex; flex-direction: column; align-items: center; gap: .15rem; }
  .hero-portrait img { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; background: var(--surface); }
  .hero-portrait img.att-border { border: 2px solid var(--green); }
  .hero-portrait img.def-border { border: 2px solid var(--red); }
  .hero-portrait .hero-name { font-size: .6rem; color: var(--text); font-weight: 500; max-width: 56px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hero-portrait .hero-level { font-size: .65rem; color: var(--muted); }
  .hero-portrait .hero-stars { font-size: .55rem; color: var(--yellow); letter-spacing: 1px; line-height: 1; }
  .hero-portrait .excl-pill { font-size: .58rem; font-weight: 600; padding: 1px 6px; border-radius: 10px; background: rgba(121,192,255,0.12); color: var(--accent); border: 1px solid rgba(121,192,255,0.25); white-space: nowrap; margin-top: 2px; }

  /* Skill icon in damage table */
  .skill-icon { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; vertical-align: middle; margin-right: .25rem; background: var(--surface); flex-shrink: 0; }
  .skill-cell-wrap { display: inline-flex; align-items: center; gap: .25rem; }

  /* Army composition */
  .army-list { list-style: none; font-size: .8rem; }
  .army-list li { display: flex; align-items: center; padding: .2rem 0; gap: .4rem; }
  .army-list li .unit-info { display: flex; align-items: center; gap: .35rem; }
  .army-list li .unit-icon { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; background: var(--surface); flex-shrink: 0; }
  .army-list.left li { justify-content: flex-start; }
  .army-list.right li { justify-content: flex-end; }
  .army-list.right li .unit-info { flex-direction: row-reverse; }

  /* Survival bar */
  .survival-bar-wrap { margin-top: .25rem; }
  .survival-bar { height: 10px; border-radius: 5px; background: var(--surface); overflow: hidden; position: relative; }
  .survival-bar .fill { height: 100%; border-radius: 5px; transition: width .6s ease; }
  .survival-bar .fill.green { background: var(--green); }
  .survival-bar .fill.red { background: var(--red); }
  .survival-pct { font-size: .75rem; color: var(--muted); margin-top: .15rem; }
  .survival-pct.right { text-align: right; }

  /* Skill damage table */
  .skill-table-section { margin-bottom: 1.5rem; }
  .skill-tables-wrap { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; }
  .skill-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  .skill-table th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: .7rem; padding: .4rem .5rem; border-bottom: 1px solid var(--border); }
  .skill-table td { padding: .35rem .5rem; border-bottom: 1px solid var(--border); }
  .skill-table.left th, .skill-table.left td { text-align: left; }
  .skill-table.left td:nth-child(2), .skill-table.left td:nth-child(3) { text-align: right; }
  .skill-table.left th:nth-child(2), .skill-table.left th:nth-child(3) { text-align: right; }
  .skill-table.right th, .skill-table.right td { text-align: right; }
  .skill-table.right td:nth-child(1), .skill-table.right td:nth-child(2) { text-align: left; }
  .skill-table.right th:nth-child(1), .skill-table.right th:nth-child(2) { text-align: left; }
  .skill-table tr:last-child td { border-bottom: none; }
  .skill-table .skill-id { font-family: 'SF Mono', Monaco, monospace; color: var(--accent); font-size: .75rem; }
  .skill-table .common-label { color: var(--yellow); font-weight: 600; }
  .skill-divider { width: 1px; background: var(--border); margin: 0 .25rem; }

  /* March tabs (multi-march) */
  .march-tabs { display: flex; gap: .25rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .march-tab { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .4rem .8rem; font-size: .8rem; color: var(--muted); cursor: pointer; }
  .march-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  .march-tab:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  /* Total damage summary */
  .damage-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
  .damage-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
  .damage-card.att { border-left: 3px solid var(--green); }
  .damage-card.def { border-left: 3px solid var(--red); }
  .damage-card-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; margin-bottom: .25rem; }
  .damage-card-value { font-size: 1.3rem; font-weight: 700; }
  .damage-card-value.green { color: var(--green); }
  .damage-card-value.red { color: var(--red); }

  /* Raw JSON */
  .raw-json { margin-bottom: 2rem; }
  .raw-json summary { color: var(--muted); font-size: .8rem; cursor: pointer; padding: .5rem 0; }
  .raw-json summary:hover { color: var(--text); }
  .raw-json pre { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .75rem; font-size: .7rem; max-height: 400px; overflow: auto; white-space: pre-wrap; word-break: break-all; color: var(--text); font-family: 'SF Mono', Monaco, monospace; }

  /* Stats Comparison button */
  .stats-btn-wrap { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .stats-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .5rem 1.2rem; color: var(--accent); font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .15s; }
  .stats-btn:hover { border-color: var(--accent); background: rgba(121,192,255,.08); }

  /* Stats Comparison modal */
  .stats-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .stats-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; max-width: 700px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; }
  .stats-modal-header { display: flex; align-items: center; padding: .75rem 1rem; border-bottom: 1px solid var(--border); }
  .stats-modal-header h2 { flex: 1; font-size: 1rem; font-weight: 700; }
  .stats-close { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; padding: .2rem .5rem; line-height: 1; }
  .stats-close:hover { color: var(--text); }
  .stats-modal-body { overflow-y: auto; padding: .5rem 0; }
  .stats-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: .5rem; padding: .4rem 1rem; align-items: center; cursor: pointer; transition: background .1s; }
  .stats-row:hover { background: rgba(121,192,255,.06); }
  .stats-row:nth-child(even) { background: rgba(255,255,255,.02); }
  .stats-row:nth-child(even):hover { background: rgba(121,192,255,.06); }
  .stats-row .s-left { text-align: right; font-size: .85rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stats-row .s-name { text-align: center; font-size: .78rem; color: var(--muted); padding: 0 .25rem; white-space: nowrap; }
  .stats-row .s-right { text-align: left; font-size: .85rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stats-row .s-green, .decor-summary-row .s-green { color: var(--green); }
  .stats-row .s-red, .decor-summary-row .s-red { color: var(--red); }
  .stats-row .s-equal, .decor-summary-row .s-equal { color: var(--text); opacity: .7; }
  .stats-section-header { padding: .5rem 1rem .25rem; font-size: .7rem; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; border-top: 1px solid var(--border); margin-top: .25rem; }
  .stats-section-header:first-child { border-top: none; margin-top: 0; }
  .s-clickable { cursor: pointer; transition: color .15s; }
  .s-clickable:hover { color: var(--accent); }
  .decor-drill { display: inline-flex; align-items: center; gap: .3em; background: rgba(121,192,255,.1); border: 1px solid rgba(121,192,255,.35); border-radius: 10px; padding: .1rem .55rem .1rem .45rem; font-size: .78rem; color: var(--accent); cursor: pointer; transition: all .18s; font-weight: 600; }
  .decor-drill:hover { background: rgba(121,192,255,.2); border-color: var(--accent); filter: brightness(1.15); box-shadow: 0 0 6px rgba(121,192,255,.25); }
  .decor-drill .drill-arrow { font-size: .6rem; transition: transform .15s; }
  .decor-drill:hover .drill-arrow { transform: translateX(2px); }

  /* Decoration modal */
  .decor-section { margin-bottom: .75rem; }
  .decor-section-title { font-size: .72rem; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; padding: .5rem 1rem .25rem; border-top: 1px solid var(--border); margin-top: .25rem; cursor: pointer; user-select: none; }
  .decor-section-title:first-child { border-top: none; margin-top: 0; }
  .decor-section-title .decor-toggle { display: inline-block; width: 1em; font-size: .65rem; margin-right: .25rem; transition: transform .15s; }
  .decor-section-title.collapsed .decor-toggle { transform: rotate(-90deg); }
  .decor-section-content { overflow: hidden; }
  .decor-section-content.collapsed { display: none; }
  .decor-filter-bar { padding: .4rem .75rem; display: flex; flex-wrap: wrap; gap: .35rem; align-items: center; border-bottom: 1px solid var(--border); }
  .decor-filter-bar input { flex: 1; min-width: 120px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: .3rem .5rem; color: var(--text); font-size: .75rem; outline: none; }
  .decor-filter-bar input:focus { border-color: var(--accent); }
  .decor-filter-bar input::placeholder { color: var(--muted); }
  .decor-filter-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: .15rem .5rem; font-size: .65rem; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all .15s; }
  .decor-filter-pill:hover { border-color: var(--accent); color: var(--accent); }
  .decor-filter-pill.active { background: var(--accent); border-color: var(--accent); color: var(--bg); font-weight: 600; }
  .decor-att-tint { color: var(--green); }
  .decor-att-tint .decor-placed-name { color: var(--green); }
  .decor-att-tint .decor-placed-buffs { color: rgba(63,185,80,.6); }
  .decor-def-tint { color: var(--red); }
  .decor-def-tint .decor-placed-name { color: var(--red); }
  .decor-def-tint .decor-placed-buffs { color: rgba(248,81,73,.6); }
  .decor-placed-dash.muted { opacity: .4; }
  .decor-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: .25rem; padding: 0 .75rem; }
  .decor-item { display: flex; align-items: center; gap: .35rem; padding: .3rem .25rem; font-size: .8rem; }
  .decor-item.right { justify-content: flex-end; flex-direction: row-reverse; }
  .decor-icon { width: 36px; height: 36px; border-radius: 4px; object-fit: cover; background: var(--card); flex-shrink: 0; }
  .decor-item-info { display: flex; flex-direction: column; min-width: 0; }
  .decor-item-name { font-weight: 500; font-size: .78rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 180px; }
  .decor-item-val { font-size: .7rem; color: var(--muted); }
  .decor-label { text-align: center; font-size: .75rem; color: var(--muted); padding: .3rem .15rem; align-self: center; white-space: nowrap; }
  .decor-summary-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: .5rem; padding: .35rem 1rem; align-items: center; }
  .decor-summary-row .s-left { text-align: right; font-size: .85rem; font-weight: 600; }
  .decor-summary-row .s-right { text-align: left; font-size: .85rem; font-weight: 600; }
  .decor-summary-row .s-name { text-align: center; font-size: .78rem; color: var(--muted); }
  .decor-suit-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: .5rem; padding: .3rem 1rem; align-items: center; }
  .decor-suit-name { text-align: center; font-size: .78rem; color: var(--text); font-weight: 500; padding: 0 .25rem; white-space: nowrap; }
  .decor-suit-val { font-size: .8rem; font-weight: 600; }
  .decor-suit-val.left { text-align: right; }
  .decor-suit-val.right { text-align: left; }
  .decor-suit-icons { display: flex; gap: .2rem; justify-content: center; padding: .15rem 0 .3rem; flex-wrap: wrap; }
  .decor-suit-icons img { width: 24px; height: 24px; border-radius: 3px; object-fit: cover; background: var(--card); opacity: .8; transition: opacity .15s, transform .15s; }
  .decor-suit-icons img:hover { opacity: 1; transform: scale(1.2); }
  .decor-tooltip { background: var(--surface); border: 1px solid var(--accent); border-radius: 6px; padding: .5rem .7rem; z-index: 2000; box-shadow: 0 4px 12px rgba(0,0,0,.5); max-width: 220px; pointer-events: auto; }
  .decor-cat-header { font-size: .7rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; padding: .4rem 1rem .15rem; margin-top: .15rem; }
  .decor-placed-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: .25rem; padding: .2rem .75rem; align-items: center; }
  .decor-placed-cell { display: flex; align-items: center; gap: .3rem; font-size: .78rem; }
  .decor-placed-cell.right { justify-content: flex-end; flex-direction: row-reverse; }
  .decor-placed-cell .decor-icon { width: 32px; height: 32px; }
  .decor-placed-info { display: flex; flex-direction: column; min-width: 0; }
  .decor-placed-name { font-weight: 500; font-size: .75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 160px; cursor: default; }
  .decor-placed-level { font-size: .65rem; color: var(--accent); font-weight: 600; }
  .decor-placed-buffs { font-size: .65rem; color: var(--muted); }
  .decor-placed-check { color: var(--green); font-size: .85rem; }
  .decor-placed-dash { color: var(--muted); font-size: .85rem; }

  /* Rally (multi-player) sections */
  .rally-indicator { font-size: .75rem; color: var(--accent); background: rgba(121,192,255,.1); border: 1px solid rgba(121,192,255,.2); border-radius: 12px; padding: .2rem .6rem; margin-top: .35rem; display: inline-block; }
  .rally-player-header { display: flex; align-items: center; gap: .4rem; padding: .45rem .6rem; background: var(--card); border: 1px solid var(--border); border-radius: 6px; margin-top: .4rem; cursor: pointer; user-select: none; font-size: .8rem; font-weight: 600; transition: background .15s; }
  .rally-player-header:hover { background: var(--surface); }
  .rally-player-header .rally-toggle { font-size: .6rem; color: var(--muted); transition: transform .2s; }
  .rally-player-header.collapsed .rally-toggle { transform: rotate(-90deg); }
  .rally-player-content { padding: .35rem 0; }
  .rally-player-content.collapsed { display: none; }
  .rally-leader-badge { font-size: .55rem; background: var(--yellow); color: var(--bg); border-radius: 3px; padding: .1rem .3rem; font-weight: 700; }

  @media (max-width: 640px) {
    .stats-modal { max-height: 90vh; }
    .stats-row .s-name { font-size: .7rem; }
    .stats-row .s-left, .stats-row .s-right { font-size: .78rem; }
    .decor-item-name { max-width: 120px; }
    .decor-icon { width: 30px; height: 30px; }
    .decor-placed-name { max-width: 100px; }
    .decor-placed-cell .decor-icon { width: 28px; height: 28px; }
    .decor-suit-icons img { width: 20px; height: 20px; }
    .decor-filter-bar { flex-wrap: wrap; gap: .25rem; }
    .decor-filter-bar input { min-width: 100px; font-size: .7rem; }
    .decor-filter-pill { font-size: .6rem; padding: .1rem .35rem; }
  }

  /* Footer */
  .footer { text-align: center; padding: 2rem 1rem; font-size: .7rem; color: var(--muted); margin-top: auto; }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* Mobile */
  /* Mobile badge for attacker/defender sections */
  .mobile-badge { display: none; font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; padding: .15rem .5rem; border-radius: 4px; margin-bottom: .35rem; width: fit-content; }
  .mobile-badge.att { background: rgba(63,185,80,.15); color: var(--green); }
  .mobile-badge.def { background: rgba(248,81,73,.15); color: var(--red); }

  /** Compute aggregated buff values for one side from effectBuffs.
   *  Uses BUFF_GROUP to redirect raw buff IDs to their display categories,
   *  matching the game's EFFECTBUFF table group field + buff_divide logic. */
  function computeBuffStats(players) {
    if (!players || players.length === 0) return {};

    var pool = {};

    function addToPool(displayId, val) {
      var did = String(displayId);
      if (!pool[did]) pool[did] = 0;
      pool[did] += val;
    }

    for (var p = 0; p < players.length; p++) {

        var id = b.id || b.bufid;
        var val = b.val || b.value || 0;
        if (!id || !val) continue;

        // Skip IDs not in the game's EFFECTBUFF table
        if (id === 520130 || id === 520131 || id === 520132 || id === 520133 || id === 520141 || id === 520142 || id === 520143 || (id >= 932001 && id <= 932043) || id === 933007 || id === 933008 || id === 934001 || id === 934004 || (id >= 936007 && id <= 936013) || id === 950011) continue;
