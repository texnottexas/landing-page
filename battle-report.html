<title>Battle Report Viewer — 2864</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --card: #1c2128; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --navy: #388bfd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: .75rem 1rem; display: flex; align-items: center; gap: .75rem; }
  .header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
  .home-btn { display: flex; align-items: center; justify-content: center; background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: .4rem .6rem; text-decoration: none; transition: all .15s; }
  .home-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Search */
  .search-bar { max-width: 700px; margin: 2rem auto; padding: 0 1rem; width: 100%; }
  .search-row { display: flex; gap: .5rem; }
  .search-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .6rem .75rem; color: var(--text); font-size: .95rem; outline: none; }
  .search-row input:focus { border-color: var(--accent); }
  .search-row input::placeholder { color: var(--muted); }
  .search-row button { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: .6rem 1.2rem; font-weight: 600; cursor: pointer; font-size: .9rem; white-space: nowrap; }
  .search-row button:hover { opacity: .9; }
  .search-row button:disabled { opacity: .5; cursor: not-allowed; }
  .search-hint { font-size: .75rem; color: var(--muted); margin-top: .4rem; }

  /* Status */
  .status { text-align: center; padding: 1rem; color: var(--muted); font-size: .9rem; }
  .status.error { color: var(--red); }

  /* Report container */
  #report { max-width: 860px; margin: 0 auto 2rem; padding: 0 1rem; width: 100%; }

  /* Report header */
  .report-header { text-align: center; margin-bottom: 1.5rem; padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .report-type { font-size: 1.1rem; font-weight: 700; color: var(--accent); margin-bottom: .25rem; }
  .report-id { font-size: .8rem; color: var(--muted); font-family: 'SF Mono', Monaco, monospace; }
  .report-time { font-size: .8rem; color: var(--muted); margin-top: .25rem; }

  /* VS Section */
  .vs-section { display: grid; grid-template-columns: 1fr auto 1fr; gap: .75rem; align-items: start; margin-bottom: 1.5rem; }
  .vs-badge { align-self: center; font-size: 1.5rem; font-weight: 800; color: var(--muted); text-align: center; padding-top: 2rem; }
  .player-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
  .player-card.winner { border-color: var(--green); }
  .player-card.loser { border-color: var(--red); }
  .player-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: var(--surface); margin: 0 auto .5rem; display: block; }
  .player-name { font-weight: 600; font-size: 1rem; word-break: break-all; }
  .player-alliance { font-size: .8rem; color: var(--accent); margin-top: .15rem; }
  .player-flag { font-size: 1.3rem; margin-top: .25rem; }
  .player-result { font-size: .75rem; font-weight: 700; text-transform: uppercase; margin-top: .4rem; padding: .2rem .6rem; border-radius: 4px; display: inline-block; }
  .player-result.victory { background: rgba(63,185,80,.15); color: var(--green); }
  .player-result.defeat { background: rgba(248,81,73,.15); color: var(--red); }

  /* Details panel */
  .details-panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
  .section-title { font-size: .85rem; color: var(--muted); margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .details-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .details-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .detail-side { font-size: .85rem; }
  .detail-side.right { text-align: right; }
  .detail-label { color: var(--muted); font-size: .7rem; text-transform: uppercase; margin-bottom: .15rem; }
  .detail-value { font-weight: 600; }
  .detail-value.green { color: var(--green); }
  .detail-value.red { color: var(--red); }

  /* Hero portraits */
  .hero-portraits { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .25rem; }
  .hero-portraits.right { justify-content: flex-end; }
  .hero-portrait { display: flex; flex-direction: column; align-items: center; gap: .15rem; }
  .hero-portrait img { width: 48px; height: 48px; border-radius: 6px; object-fit: cover; background: var(--surface); }
  .hero-portrait img.att-border { border: 2px solid var(--green); }
  .hero-portrait img.def-border { border: 2px solid var(--red); }
  .hero-portrait .hero-name { font-size: .6rem; color: var(--text); font-weight: 500; max-width: 56px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hero-portrait .hero-level { font-size: .65rem; color: var(--muted); }
  .hero-portrait .hero-stars { font-size: .55rem; color: var(--yellow); letter-spacing: 1px; line-height: 1; }

  /* Skill icon in damage table */
  .skill-icon { width: 32px; height: 32px; border-radius: 4px; object-fit: cover; vertical-align: middle; margin-right: .25rem; background: var(--surface); flex-shrink: 0; }
  .skill-cell-wrap { display: inline-flex; align-items: center; gap: .25rem; }

  /* Army composition */
  .army-list { list-style: none; font-size: .8rem; }
  .army-list li { display: flex; align-items: center; padding: .2rem 0; gap: .4rem; }
  .army-list li .unit-info { display: flex; align-items: center; gap: .35rem; }
  .army-list li .unit-icon { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; background: var(--surface); flex-shrink: 0; }
  .army-list.left li { justify-content: flex-start; }
  .army-list.right li { justify-content: flex-end; }
  .army-list.right li .unit-info { flex-direction: row-reverse; }

  /* Survival bar */
  .survival-bar-wrap { margin-top: .25rem; }
  .survival-bar { height: 10px; border-radius: 5px; background: var(--surface); overflow: hidden; position: relative; }
  .survival-bar .fill { height: 100%; border-radius: 5px; transition: width .6s ease; }
  .survival-bar .fill.green { background: var(--green); }
  .survival-bar .fill.red { background: var(--red); }
  .survival-pct { font-size: .75rem; color: var(--muted); margin-top: .15rem; }
  .survival-pct.right { text-align: right; }

  /* Skill damage table */
  .skill-table-section { margin-bottom: 1.5rem; }
  .skill-tables-wrap { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; }
  .skill-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  .skill-table th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: .7rem; padding: .4rem .5rem; border-bottom: 1px solid var(--border); }
  .skill-table td { padding: .35rem .5rem; border-bottom: 1px solid var(--border); }
  .skill-table.left th, .skill-table.left td { text-align: left; }
  .skill-table.left td:nth-child(2), .skill-table.left td:nth-child(3) { text-align: right; }
  .skill-table.left th:nth-child(2), .skill-table.left th:nth-child(3) { text-align: right; }
  .skill-table.right th, .skill-table.right td { text-align: right; }
  .skill-table.right td:nth-child(1), .skill-table.right td:nth-child(2) { text-align: left; }
  .skill-table.right th:nth-child(1), .skill-table.right th:nth-child(2) { text-align: left; }
  .skill-table tr:last-child td { border-bottom: none; }
  .skill-table .skill-id { font-family: 'SF Mono', Monaco, monospace; color: var(--accent); font-size: .75rem; }
  .skill-table .common-label { color: var(--yellow); font-weight: 600; }
  .skill-divider { width: 1px; background: var(--border); margin: 0 .25rem; }

  /* March tabs (multi-march) */
  .march-tabs { display: flex; gap: .25rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .march-tab { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .4rem .8rem; font-size: .8rem; color: var(--muted); cursor: pointer; }
  .march-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  .march-tab:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  /* Total damage summary */
  .damage-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
  .damage-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
  .damage-card.att { border-left: 3px solid var(--green); }
  .damage-card.def { border-left: 3px solid var(--red); }
  .damage-card-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; margin-bottom: .25rem; }
  .damage-card-value { font-size: 1.3rem; font-weight: 700; }
  .damage-card-value.green { color: var(--green); }
  .damage-card-value.red { color: var(--red); }

  /* Raw JSON */
  .raw-json { margin-bottom: 2rem; }
  .raw-json summary { color: var(--muted); font-size: .8rem; cursor: pointer; padding: .5rem 0; }
  .raw-json summary:hover { color: var(--text); }
  .raw-json pre { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .75rem; font-size: .7rem; max-height: 400px; overflow: auto; white-space: pre-wrap; word-break: break-all; color: var(--text); font-family: 'SF Mono', Monaco, monospace; }

  /* Stats Comparison button */
  .stats-btn-wrap { text-align: center; margin-bottom: 1.5rem; }
  .stats-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .5rem 1.2rem; color: var(--accent); font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .15s; }
  .stats-btn:hover { border-color: var(--accent); background: rgba(121,192,255,.08); }

  /* Stats Comparison modal */
  .stats-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .stats-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; max-width: 700px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; }
  .stats-modal-header { display: flex; align-items: center; padding: .75rem 1rem; border-bottom: 1px solid var(--border); }
  .stats-modal-header h2 { flex: 1; font-size: 1rem; font-weight: 700; }
  .stats-close { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; padding: .2rem .5rem; line-height: 1; }
  .stats-close:hover { color: var(--text); }
  .stats-modal-body { overflow-y: auto; padding: .5rem 0; }
  .stats-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: .5rem; padding: .4rem 1rem; align-items: center; }
  .stats-row:nth-child(even) { background: rgba(255,255,255,.02); }
  .stats-row .s-left { text-align: right; font-size: .85rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stats-row .s-name { text-align: center; font-size: .78rem; color: var(--muted); padding: 0 .25rem; white-space: nowrap; }
  .stats-row .s-right { text-align: left; font-size: .85rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stats-row .s-green { color: var(--green); }
  .stats-row .s-red { color: var(--red); }
  .stats-row .s-equal { color: var(--text); opacity: .7; }
  .stats-section-header { padding: .5rem 1rem .25rem; font-size: .7rem; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; border-top: 1px solid var(--border); margin-top: .25rem; }
  .stats-section-header:first-child { border-top: none; margin-top: 0; }
  .s-clickable { cursor: pointer; transition: color .15s; }
  .s-clickable:hover { color: var(--accent); }

  @media (max-width: 640px) {
    .stats-modal { max-height: 90vh; }
    .stats-row .s-name { font-size: .7rem; }
    .stats-row .s-left, .stats-row .s-right { font-size: .78rem; }
  }

  /* Footer */
  .footer { text-align: center; padding: 2rem 1rem; font-size: .7rem; color: var(--muted); margin-top: auto; }
  .footer a { color: var(--accent); text-decoration: none; }
  .footer a:hover { text-decoration: underline; }

  /* Mobile */
  /* Mobile badge for attacker/defender sections */
  .mobile-badge { display: none; font-size: .65rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; padding: .15rem .5rem; border-radius: 4px; margin-bottom: .35rem; width: fit-content; }
  .mobile-badge.att { background: rgba(63,185,80,.15); color: var(--green); }
  .mobile-badge.def { background: rgba(248,81,73,.15); color: var(--red); }

  @media (max-width: 640px) {
    .vs-section { grid-template-columns: 1fr auto 1fr; gap: .4rem; align-items: stretch; }
    .player-card { padding: .6rem; display: flex; flex-direction: column; }
    .player-avatar { width: 40px; height: 40px; }
    .player-name { font-size: .85rem; }
    .vs-badge { font-size: 1rem; padding-top: 1rem; }
    .player-result { margin-top: auto; }
    .details-row { grid-template-columns: 1fr; gap: .5rem; }
    .detail-side.right { text-align: left; }
    .mobile-badge { display: block; }
    .army-list.left li { flex-direction: row; justify-content: flex-start; }
    .army-list.right li { flex-direction: row; justify-content: flex-start; }
    .army-list.right li .unit-info { flex-direction: row; }
    .survival-pct.right { text-align: left; }
    .hero-portraits.right { justify-content: flex-start; }
    .skill-tables-wrap { grid-template-columns: 1fr; gap: .75rem; }
    .skill-divider { display: none; }
    .skill-table.left, .skill-table.right { width: 100%; }
    /* On mobile, reorder defender columns to match attacker: Skill | Triggers | Damage */
    .skill-table.right thead tr, .skill-table.right tbody tr { display: flex; }
    .skill-table.right th, .skill-table.right td { flex: 1; text-align: left; }
    .skill-table.right th:nth-child(1), .skill-table.right td:nth-child(1) { order: 3; text-align: right; } /* Damage → last */
    .skill-table.right th:nth-child(2), .skill-table.right td:nth-child(2) { order: 2; text-align: right; } /* Triggers → middle */
    .skill-table.right th:nth-child(3), .skill-table.right td:nth-child(3) { order: 1; text-align: left; flex: 2; } /* Skill → first */
    .damage-summary { grid-template-columns: 1fr; }
  }
</style>

        if (k === 'className') node.className = attrs[k];
        else if (k === 'onclick') node.addEventListener('click', attrs[k]);
        else if (k === 'style') node.style.cssText = attrs[k];
        else node.setAttribute(k, attrs[k]);
      }
    }
    if (children) {
      if (!Array.isArray(children)) children = [children];
      children.forEach(function(c) {
        if (c == null) return;
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else node.appendChild(c);
      });
    }
    return node;
  }

  /** Parse playerInfo JSON from players array */
  function getPlayerInfo(side) {
    var players = side.players || [];
    if (players.length === 0) return { username: 'Unknown', nationalflag: 0 };
    try {
      var pi = JSON.parse(players[0].playerInfo || '{}');
      return pi;
    } catch(e) {
      return { username: 'Unknown', nationalflag: 0 };
    }
  }

  /** Get avatar URL from playerInfo */
  function resolveAvatar(url) {
    if (!url) return null;
    if (url.indexOf('http') === 0) return url;
    return 'https://h5.topwargame.com/DynRes/images/headpic/' + url + '.png?t=21.jpg';
  }

  function getAvatar(pi) {
    return resolveAvatar(pi.headimgurl_custom) || resolveAvatar(pi.avatarurl) || null;
  }

  /** UID stripping for raw JSON display — only strip the 'uid' field */
  function stripUIDs(obj) {
    if (obj == null || typeof obj !== 'object') return obj;
    if (Array.isArray(obj)) {
      return obj.map(function(item) { return stripUIDs(item); });
    }
    var result = {};
    for (var key in obj) {
      if (!obj.hasOwnProperty(key)) continue;
      if (key === 'uid') { result[key] = 0; continue; }
      result[key] = stripUIDs(obj[key]);
    }
    return result;
  }

  /** Calculate survival percentage from units array */
  function calcSurvival(units) {
    if (!units || units.length === 0) return { pct: 0, alive: 0, total: 0 };
    var alive = 0;
    var total = units.length;
    for (var i = 0; i < units.length; i++) {
      if (units[i].isDead === 0) alive++;
    }
    return { pct: total > 0 ? (alive / total * 100) : 0, alive: alive, total: total };
  }

  /** Get hero icon URL from hero ID */
  function heroIconUrl(heroId) {
    return 'https://h5.topwargame.com/DynRes/images/headpic/hero_icon' + heroId + '_global.png?t=22.jpg';
  }

  /** Create a hero icon img element with onerror fallback */
  function heroIconImg(heroId, size, borderClass) {
    var img = el('img', {
      src: heroIconUrl(heroId),
      alt: 'Hero ' + heroId,
      width: String(size),
      height: String(size),
      className: borderClass || ''
    });
    img.onerror = function() { this.style.display = 'none'; };
    return img;
  }

  /** Extract heroList from a side's players[0], or return empty array */
  function getHeroList(side) {
    var players = side.players || [];
    if (players.length === 0) return [];
    return players[0].heroList || [];
  }

  /** Build skillId -> { heroId, skillId } mapping from both sides' heroLists */
  function buildSkillToHeroMap(attHeroes, defHeroes) {
    var map = {};
    var allHeroes = (attHeroes || []).concat(defHeroes || []);
    allHeroes.forEach(function(hero) {
      if (!hero || !hero.nonActiveSkills || hero.nonActiveSkills.length === 0) return;
      var skillId = String(hero.nonActiveSkills[0].skillId);
      if (skillId && hero.id) {
        map[skillId] = { heroId: hero.id, skillId: hero.nonActiveSkills[0].skillId };
      }
    });
    return map;
  }

  /** Create a skill icon img element with onerror fallback */
  function skillIconImg(skillId, size) {
    var img = el('img', {
      src: ASSET_BASE + 'assets/skill-icons/skill_' + skillId + '.png',
      alt: 'Skill ' + skillId,
      width: String(size),
      height: String(size),
      className: 'skill-icon'
    });
    img.onerror = function() { this.style.display = 'none'; };
    return img;
  }

  /** Build hero portrait row for one side */
  function buildHeroPortraits(heroList, side) {
    if (!heroList || heroList.length === 0) return null;
    var isAtt = (side === 'att');
    var wrap = el('div', { className: 'hero-portraits' + (isAtt ? '' : ' right') });

    heroList.forEach(function(hero) {
      if (!hero || !hero.id) return;
      var portrait = el('div', { className: 'hero-portrait' });

      // Icon image
      var img = heroIconImg(hero.id, 48, isAtt ? 'att-border' : 'def-border');
      portrait.appendChild(img);

      // Hero name
      var heroName = HERO_NAMES[String(hero.id)] || ('#' + hero.id);
      var nameEl = el('span', { className: 'hero-name', title: heroName });
      nameEl.textContent = heroName;
      portrait.appendChild(nameEl);

      // Level label
      var lvl = el('span', { className: 'hero-level' });
      lvl.textContent = 'Lv.' + (hero.level || '?');
      portrait.appendChild(lvl);

      // Star indicators
      if (hero.star && hero.star > 0) {
        var stars = el('span', { className: 'hero-stars' });
        stars.textContent = '\u2605'.repeat(hero.star);
        portrait.appendChild(stars);
      }

      wrap.appendChild(portrait);
    });

    return wrap;
  }

  // ---- Build sections ----

  /** Build a detail-side with label and content for a details-row */
  function buildDetailSide(label, isRight, badgeName) {
    var side = el('div', { className: 'detail-side' + (isRight ? ' right' : '') });
    if (badgeName) {
      var badge = el('div', { className: 'mobile-badge ' + (isRight ? 'def' : 'att') });
      badge.textContent = badgeName;
      side.appendChild(badge);
    }
    var lbl = el('div', { className: 'detail-label' });
    lbl.textContent = label;
    side.appendChild(lbl);
    return side;
  }

  /** Build one side of the survival bar row */
  function buildSurvivalSide(surv, side, playerName) {
    var isAtt = (side === 'att');
    var color = isAtt ? 'green' : 'red';
    var sideEl = buildDetailSide('Survival', !isAtt, playerName);

    var barWrap = el('div', { className: 'survival-bar-wrap' });
    var bar = el('div', { className: 'survival-bar' });
    bar.appendChild(el('div', { className: 'fill ' + color, style: 'width:' + surv.pct.toFixed(1) + '%' }));
    barWrap.appendChild(bar);

    var pctEl = el('div', { className: 'survival-pct' + (isAtt ? '' : ' right') });
    pctEl.textContent = surv.alive + '/' + surv.total + ' survived (' + surv.pct.toFixed(0) + '%)';
    barWrap.appendChild(pctEl);

    sideEl.appendChild(barWrap);
    return sideEl;
  }

  /** Build a unit icon img with onerror fallback */
  function unitIconImg(src, alt) {
    var img = el('img', { src: src, className: 'unit-icon', alt: alt, width: '40', height: '40' });
    img.onerror = function() { this.style.display = 'none'; };
    return img;
  }

  /** Build one side of the army composition row */
  function buildArmySide(army, mechas, side, playerName) {
    var isAtt = (side === 'att');
    var sideEl = buildDetailSide('Unit Composition', !isAtt, playerName);
    var list = el('ul', { className: 'army-list ' + (isAtt ? 'left' : 'right') });

    army.forEach(function(a) {
      var li = el('li');
      var resolved = resolveUnitIcon(a.armyId, mechas);
      var numSpan = el('span');
      numSpan.textContent = 'x' + formatPower(a.s0 || a.s1 || a.num || a.armyNum || 0);
      var unitInfo = el('span', { className: 'unit-info' });
      var labelSpan = el('span');
      labelSpan.textContent = resolved.label;

      if (isAtt) {
        // Attacker: count, then label + icon
        unitInfo.appendChild(labelSpan);
        if (resolved.icon) unitInfo.appendChild(unitIconImg(resolved.icon, resolved.label));
        li.appendChild(numSpan);
        li.appendChild(unitInfo);
      } else {
        // Defender: icon + label, then count
        if (resolved.icon) unitInfo.appendChild(unitIconImg(resolved.icon, resolved.label));
        unitInfo.appendChild(labelSpan);
        li.appendChild(unitInfo);
        li.appendChild(numSpan);
      }

      list.appendChild(li);
    });

    sideEl.appendChild(list);
    return sideEl;
  }

  function buildReportHeader(data, battle) {
    var fightType = FIGHT_TYPES[battle.fightType] || ('Type ' + battle.fightType);
    var children = [
      el('div', { className: 'report-type' }, fightType),
      el('div', { className: 'report-id' }, 'Report ID: ' + data.reportId)
    ];
    if (data.logtime) {
      children.push(el('div', { className: 'report-time' }, formatDate(data.logtime)));
    }
    return el('div', { className: 'report-header' }, children);
  }

  function buildPlayerCard(side, pi, isWinner) {
    var card = el('div', { className: 'player-card ' + (isWinner ? 'winner' : 'loser') });

    // Avatar
    var avatarUrl = getAvatar(pi);
    if (avatarUrl && avatarUrl.indexOf('http') === 0) {
      var img = el('img', { className: 'player-avatar', src: avatarUrl, alt: '' });
      img.onerror = function() { this.style.display = 'none'; };
      card.appendChild(img);
    } else {
      // Fallback: first character of name as avatar
      var initial = (pi.username || '?').charAt(0).toUpperCase();
      var placeholder = el('div', {
        className: 'player-avatar',
        style: 'display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:var(--accent);background:var(--surface);border:1px solid var(--border);'
      }, initial);
      card.appendChild(placeholder);
    }

    // Name
    var nameEl = el('div', { className: 'player-name' });
    nameEl.textContent = pi.username || 'Unknown';
    card.appendChild(nameEl);

    // Alliance tag (always render to keep card heights equal)
    var alTag = side.alTag || (pi.alTag || '');
    var tagEl = el('div', { className: 'player-alliance' });
    tagEl.textContent = alTag ? '[' + alTag + ']' : 'No Alliance';
    if (!alTag) tagEl.style.color = 'var(--muted)';
    card.appendChild(tagEl);

    // National flag
    var flag = flagEmoji(pi.nationalflag || 0);
    if (flag) {
      var flagEl = el('div', { className: 'player-flag' });
      flagEl.textContent = flag;
      card.appendChild(flagEl);
    }

    // Result label
    var resultEl = el('div', { className: 'player-result ' + (isWinner ? 'victory' : 'defeat') });
    resultEl.textContent = isWinner ? 'VICTORY' : 'DEFEAT';
    card.appendChild(resultEl);

    return card;
  }

  function buildVSSection(att, def, attPI, defPI, attWins) {
    var vs = el('div', { className: 'vs-section' });
    vs.appendChild(buildPlayerCard(att, attPI, attWins));
    var badge = el('div', { className: 'vs-badge' });
    badge.textContent = 'VS';
    vs.appendChild(badge);
    vs.appendChild(buildPlayerCard(def, defPI, !attWins));
    return vs;
  }

  function buildDetailsPanel(fm, att, def, attPI, defPI, attHeroes, defHeroes) {
    var panel = el('div', { className: 'details-panel' });
    var title = el('div', { className: 'section-title' });
    title.textContent = 'Details';
    panel.appendChild(title);

    // Row 1: Names + Battle Power
    var row1 = el('div', { className: 'details-row' });
    var left1 = buildDetailSide('Attacker', false);
    var val1a = el('div', { className: 'detail-value green' });
    val1a.textContent = (attPI.username || 'Unknown') + (fm.attBattlePower ? '  —  CP:' + fm.attBattlePower : '');
    left1.appendChild(val1a);
    row1.appendChild(left1);

    var right1 = buildDetailSide('Defender', true);
    var val1b = el('div', { className: 'detail-value red' });
    val1b.textContent = (defPI.username || 'Unknown') + (fm.defBattlePower ? '  —  CP:' + fm.defBattlePower : '');
    right1.appendChild(val1b);
    row1.appendChild(right1);
    panel.appendChild(row1);

    // Row 1.5: Hero Portraits
    if ((attHeroes && attHeroes.length > 0) || (defHeroes && defHeroes.length > 0)) {
      var heroRow = el('div', { className: 'details-row' });

      var leftHero = buildDetailSide('Heroes', false, attPI.username || 'Attacker');
      var attPortraits = buildHeroPortraits(attHeroes, 'att');
      if (attPortraits) leftHero.appendChild(attPortraits);
      heroRow.appendChild(leftHero);

      var rightHero = buildDetailSide('Heroes', true, defPI.username || 'Defender');
      var defPortraits = buildHeroPortraits(defHeroes, 'def');
      if (defPortraits) rightHero.appendChild(defPortraits);
      heroRow.appendChild(rightHero);

      panel.appendChild(heroRow);
    }

    // Row 2: Unit Composition
    var attArmy = fm.attPutArmyV2 || [];
    var defArmy = fm.defPutArmyV2 || [];
    // Gather mecha data for icon resolution
    var attMechas = att.mechas || [];
    var defMechas = def.mechas || [];
    if (attArmy.length > 0 || defArmy.length > 0) {
      var row2 = el('div', { className: 'details-row' });
      row2.appendChild(buildArmySide(attArmy, attMechas, 'att', attPI.username || 'Attacker'));
      row2.appendChild(buildArmySide(defArmy, defMechas, 'def', defPI.username || 'Defender'));
      panel.appendChild(row2);
    }

    // Row 3: Survival Bar
    var attUnits = att.units || [];
    var defUnits = def.units || [];
    if (attUnits.length > 0 || defUnits.length > 0) {
      var attSurv = calcSurvival(attUnits);
      var defSurv = calcSurvival(defUnits);

      var row3 = el('div', { className: 'details-row' });
      row3.appendChild(buildSurvivalSide(attSurv, 'att', attPI.username || 'Attacker'));
      row3.appendChild(buildSurvivalSide(defSurv, 'def', defPI.username || 'Defender'));
      panel.appendChild(row3);
    }

    return panel;
  }

  function buildSkillTable(skillHurts, side, skillToHeroMap, mechas) {
    if (!skillHurts) return null;

    var commonHurt = parseFloat(skillHurts.common_hurt) || 0;
    var commonCount = parseInt(skillHurts.common_count) || 0;
    var hurts = skillHurts.skill_hurts || {};
    var counts = skillHurts.skill_hurt_count || {};
    var heroMap = skillToHeroMap || {};

    var isLeft = (side === 'att');

    var rows = [];
    // Skill rows
    var skillIds = Object.keys(hurts).sort(function(a, b) {
      return (parseFloat(hurts[b]) || 0) - (parseFloat(hurts[a]) || 0);
    });
    skillIds.forEach(function(id) {
      rows.push({
        skill: id,
        triggers: parseInt(counts[id]) || 0,
        damage: parseFloat(hurts[id]) || 0
      });
    });
    // Common attack row
    if (commonCount > 0 || commonHurt > 0) {
      rows.push({ skill: 'Common', triggers: commonCount, damage: commonHurt, isCommon: true });
    }

    var table = el('table', { className: 'skill-table ' + (isLeft ? 'left' : 'right') });

    // Header
    var thead = el('thead');
    var headerRow = el('tr');
    if (isLeft) {
      headerRow.appendChild(el('th', null, 'Skill'));
      headerRow.appendChild(el('th', null, 'Triggers'));
      headerRow.appendChild(el('th', null, 'Damage'));
    } else {
      headerRow.appendChild(el('th', null, 'Damage'));
      headerRow.appendChild(el('th', null, 'Triggers'));
      headerRow.appendChild(el('th', null, 'Skill'));
    }
    thead.appendChild(headerRow);
    table.appendChild(thead);

    // Body
    var tbody = el('tbody');
    rows.forEach(function(r) {
      var tr = el('tr');
      var skillTd = el('td');
      if (r.isCommon) {
        var commonSpan = el('span', { className: 'common-label' });
        commonSpan.textContent = 'Common';
        skillTd.appendChild(commonSpan);
      } else {
        var mapped = heroMap[r.skill];
        if (mapped) {
          // Show skill icon + hero name
          var cellWrap = el('span', { className: 'skill-cell-wrap' });
          var sIcon = skillIconImg(mapped.skillId, 32);
          cellWrap.appendChild(sIcon);
          var nameSpan = el('span', { className: 'skill-id' });
          nameSpan.textContent = HERO_NAMES[String(mapped.heroId)] || ('#' + mapped.heroId);
          cellWrap.appendChild(nameSpan);
          skillTd.appendChild(cellWrap);
        } else if (parseInt(r.skill) > 900000) {
          // Mecha skill — show mecha icon + label
          var mechaCellWrap = el('span', { className: 'skill-cell-wrap' });
          var mechaIconId = mechas && mechas.length > 0 && mechas[0].mechaId ? mechas[0].mechaId : null;
          if (mechaIconId) {
            var mechaImg = el('img', { src: ASSET_BASE + 'assets/mecha-icons/mecha_' + mechaIconId + '.png', className: 'skill-icon', alt: 'HT', width: '32', height: '32' });
            mechaImg.onerror = function() { this.style.display = 'none'; };
            mechaCellWrap.appendChild(mechaImg);
          }
          var mechaSpan = el('span', { className: 'skill-id' });
          mechaSpan.textContent = 'HT';
          mechaSpan.style.color = 'var(--yellow)';
          mechaCellWrap.appendChild(mechaSpan);
          skillTd.appendChild(mechaCellWrap);
        } else {
          var idSpan = el('span', { className: 'skill-id' });
          idSpan.textContent = '#' + r.skill;
          skillTd.appendChild(idSpan);
        }
      }

      var trigTd = el('td');
      trigTd.textContent = String(r.triggers);

      var dmgTd = el('td');
      dmgTd.textContent = formatPower(r.damage);

      if (isLeft) {
        tr.appendChild(skillTd);
        tr.appendChild(trigTd);
        tr.appendChild(dmgTd);
      } else {
        tr.appendChild(dmgTd);
        tr.appendChild(trigTd);
        tr.appendChild(skillTd);
      }
      tbody.appendChild(tr);
    });

    // If no rows, show empty state
    if (rows.length === 0) {
      var emptyTr = el('tr');
      var emptyTd = el('td', { colspan: '3', style: 'color:var(--muted);text-align:center;' });
      emptyTd.textContent = 'No skill data';
      emptyTr.appendChild(emptyTd);
      tbody.appendChild(emptyTr);
    }

    table.appendChild(tbody);
    return table;
  }

  function buildSkillSection(fm, skillToHeroMap, attMechas, defMechas, attName, defName) {
    var attSkill = fm.attSkillHurts;
    var defSkill = fm.defSkillHurts;
    if (!attSkill && !defSkill) return null;

    var section = el('div', { className: 'skill-table-section' });
    var title = el('div', { className: 'section-title' });
    title.textContent = 'Skill Damage';
    section.appendChild(title);

    var wrap = el('div', { className: 'skill-tables-wrap' });

    var attWrap = el('div');
    var attBadge = el('div', { className: 'mobile-badge att' });
    attBadge.textContent = attName || 'Attacker';
    attWrap.appendChild(attBadge);
    var attTable = buildSkillTable(attSkill, 'att', skillToHeroMap, attMechas);
    attWrap.appendChild(attTable || el('div'));
    wrap.appendChild(attWrap);

    wrap.appendChild(el('div', { className: 'skill-divider' }));

    var defWrap = el('div');
    var defBadge = el('div', { className: 'mobile-badge def' });
    defBadge.textContent = defName || 'Defender';
    defWrap.appendChild(defBadge);
    var defTable = buildSkillTable(defSkill, 'def', skillToHeroMap, defMechas);
    defWrap.appendChild(defTable || el('div'));
    wrap.appendChild(defWrap);

    section.appendChild(wrap);
    return section;
  }

  /** Build one damage card (attacker or defender) */
  function buildDamageCard(side, total, pct) {
    var isAtt = (side === 'att');
    var color = isAtt ? 'green' : 'red';
    var card = el('div', { className: 'damage-card ' + side });

    var label = el('div', { className: 'damage-card-label' });
    label.textContent = (isAtt ? 'Attacker' : 'Defender') + ' Total Damage';
    card.appendChild(label);

    var val = el('div', { className: 'damage-card-value ' + color });
    val.textContent = formatPower(total);
    card.appendChild(val);

    var barWrap = el('div', { className: 'survival-bar-wrap' });
    var bar = el('div', { className: 'survival-bar' });
    bar.appendChild(el('div', { className: 'fill ' + color, style: 'width:' + pct + '%' }));
    barWrap.appendChild(bar);
    card.appendChild(barWrap);

    var pctEl = el('div', { className: 'survival-pct', style: 'text-align:center' });
    pctEl.textContent = pct + '%';
    card.appendChild(pctEl);

    return card;
  }

  function buildDamageSummary(fm) {
    var attSkill = fm.attSkillHurts;
    var defSkill = fm.defSkillHurts;
    var attTotal = attSkill ? parseFloat(attSkill.total_hurt) || 0 : 0;
    var defTotal = defSkill ? parseFloat(defSkill.total_hurt) || 0 : 0;

    if (attTotal === 0 && defTotal === 0) return null;

    var grandTotal = attTotal + defTotal || 1;
    var attPct = ((attTotal / grandTotal) * 100).toFixed(1);
    var defPct = ((defTotal / grandTotal) * 100).toFixed(1);

    var wrap = el('div', { className: 'damage-summary' });
    wrap.appendChild(buildDamageCard('att', attTotal, attPct));
    wrap.appendChild(buildDamageCard('def', defTotal, defPct));
    return wrap;
  }

  function buildRawJSON(data) {
    var stripped = stripUIDs(data);
    var jsonStr = JSON.stringify(stripped, null, 2);
    var sizeKB = (jsonStr.length / 1024).toFixed(0);

    var summary = el('summary', null, 'Raw JSON (' + sizeKB + ' KB) — UIDs stripped');
    var pre = el('pre');
    pre.textContent = jsonStr;
    return el('details', { className: 'raw-json' }, [summary, pre]);
  }

  // ---- Multi-march rendering ----

  function renderMarchContent(container, fm, att, def, attPI, defPI) {
    // Extract heroLists from both sides
    var attHeroes = getHeroList(att);
    var defHeroes = getHeroList(def);
    var skillToHeroMap = buildSkillToHeroMap(attHeroes, defHeroes);

    // Details panel (with hero portraits)
    container.appendChild(buildDetailsPanel(fm, att, def, attPI, defPI, attHeroes, defHeroes));

    // Stats Comparison button
    var attHasBuffs = att.players && att.players[0] && att.players[0].effectBuffs;
    var defHasBuffs = def.players && def.players[0] && def.players[0].effectBuffs;
    if (attHasBuffs || defHasBuffs) {
      var btnWrap = el('div', { className: 'stats-btn-wrap' });
      var statsBtn = el('button', { className: 'stats-btn', onclick: function() {
        var modal = buildStatsModal(att, def, attPI, defPI);
        document.body.appendChild(modal);
      }});
      statsBtn.appendChild(el('span', { style: 'display:inline-flex;vertical-align:middle;margin-right:.35rem;' }, [
        (function() { var s = document.createElementNS('http://www.w3.org/2000/svg','svg'); s.setAttribute('width','16'); s.setAttribute('height','16'); s.setAttribute('viewBox','55 50 400 400'); s.setAttribute('fill','currentColor'); var p = document.createElementNS('http://www.w3.org/2000/svg','path'); p.setAttribute('d','M438,411.3l-37.6-37.6c0.1-0.2,0.1-0.2,0.1-0.4c9.7-20.8,6.2-46.3-11-63.5L363,336.3l-80.5-80.5l96.6-96.6c24-24,37.5-56.6,37.5-90.5L256,229.3L95.4,68.7c0,34,13.5,66.5,37.5,90.5l96.6,96.6L149,336.3l-26.5-26.5c-17.2,17.2-20.7,42.7-11,63.5c0.1,0.2,0.1,0.2,0.1,0.4L74,411.3c-7.3,7.3-7.3,19.2,0,26.5c7.3,7.3,19.2,7.3,26.5,0l37.6-37.6c0.2,0.1,0.2,0.1,0.4,0.1c20.8,9.7,46.3,6.2,63.5-11l-26.5-26.5l80.5-80.5l80.5,80.5L310,389.4c17.2,17.2,42.7,20.7,63.5,11c0.1-0.1,0.2-0.1,0.4-0.1l37.6,37.6c7.3,7.3,19.2,7.3,26.5,0C445.3,430.5,445.3,418.6,438,411.3z'); s.appendChild(p); return s; })()
      ]));
      statsBtn.appendChild(document.createTextNode('Stats Comparison'));
      btnWrap.appendChild(statsBtn);
      container.appendChild(btnWrap);
    }

    // Skill damage tables (with hero icons + mecha icons)
    var skillSection = buildSkillSection(fm, skillToHeroMap, att.mechas || [], def.mechas || [], attPI.username || 'Attacker', defPI.username || 'Defender');
    if (skillSection) container.appendChild(skillSection);

    // Total damage summary
    var dmgSummary = buildDamageSummary(fm);
    if (dmgSummary) container.appendChild(dmgSummary);
  }

  // ---- Main render ----

  function renderReport(data) {
    var container = document.getElementById('report');
    while (container.firstChild) container.removeChild(container.firstChild);

    var battle = data.battle;
    var att = battle.attacker;
    var def = battle.defender;
    var attPI = getPlayerInfo(att);
    var defPI = getPlayerInfo(def);
    var attWins = battle.result === 1;
    var marches = battle.fightMarches || [];
    var fm = marches[0] || {};

    // 1. Report header
    container.appendChild(buildReportHeader(data, battle));

    // 2. VS section
    container.appendChild(buildVSSection(att, def, attPI, defPI, attWins));

    // 3. March content (with tabs if multiple marches)
    if (marches.length > 1) {
      var tabsWrap = el('div', { className: 'march-tabs' });
      var marchContainer = el('div');

      marches.forEach(function(m, idx) {
        var tab = el('div', {
          className: 'march-tab' + (idx === 0 ? ' active' : ''),
          onclick: (function(i) {
            return function() {
              // Update tabs
              var allTabs = tabsWrap.querySelectorAll('.march-tab');
              for (var t = 0; t < allTabs.length; t++) {
                allTabs[t].className = 'march-tab' + (t === i ? ' active' : '');
              }
              // Render march
              while (marchContainer.firstChild) marchContainer.removeChild(marchContainer.firstChild);
              renderMarchContent(marchContainer, marches[i], att, def, attPI, defPI);
            };
          })(idx)
        });
        tab.textContent = 'March ' + (idx + 1);
        tabsWrap.appendChild(tab);
      });

      container.appendChild(tabsWrap);
      renderMarchContent(marchContainer, marches[0], att, def, attPI, defPI);
      container.appendChild(marchContainer);
    } else {
      renderMarchContent(container, fm, att, def, attPI, defPI);
    }

    // 4. Raw JSON
    container.appendChild(buildRawJSON(data));
  }

  // ---- Load report ----

  function loadReport() {
    var input = document.getElementById('report-id');
    var btn = document.getElementById('load-btn');
    var statusEl = document.getElementById('status');
    var id = input.value.trim();

    if (!id) {
      statusEl.textContent = 'Enter a report ID';
      statusEl.className = 'status error';
      return;
    }
    if (!/^\d{14,22}$/.test(id)) {
      statusEl.textContent = 'Report ID should be a numeric identifier';
      statusEl.className = 'status error';
      return;
    }

    btn.disabled = true;
    statusEl.textContent = 'Loading report...';
    statusEl.className = 'status';
    var reportEl = document.getElementById('report');
    while (reportEl.firstChild) reportEl.removeChild(reportEl.firstChild);

    var prefix = id.substring(0, 4);
    var url = CDN_BASE + prefix + '/' + id + '.json';

    fetch(url)
      .then(function(r) {
        if (!r.ok) throw new Error('Report not found (HTTP ' + r.status + ')');
        return r.json();
      })
      .then(function(data) {
        if (!data.battle) throw new Error('Invalid report format');
        statusEl.textContent = '';
        renderReport(data);
        var params = new URLSearchParams(window.location.search);
        params.set('id', id);
        history.replaceState(null, '', '?' + params.toString());
      })
      .catch(function(err) {
        statusEl.textContent = err.message;
        statusEl.className = 'status error';
      })
      .finally(function() { btn.disabled = false; });
  }

  document.getElementById('load-btn').addEventListener('click', loadReport);
  document.getElementById('report-id').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadReport();
  });

  // Auto-load from URL param
  var params = new URLSearchParams(window.location.search);
  var idParam = params.get('id');
  if (idParam) {
    document.getElementById('report-id').value = idParam;
    loadReport();
  }
})();
</script>
