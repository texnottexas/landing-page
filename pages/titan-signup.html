<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline'; style-src 'unsafe-inline'; connect-src 'self' https://push-worker.27tb8s6fct.workers.dev; img-src 'self' data:; base-uri 'self'; form-action 'none'; object-src 'none';">
<title>Titan Canyon Signup — Server 2864</title>
<style>
  :root[data-theme="dark"]{--bg:#0d1117;--bg2:#161b22;--card:#1c2128;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#79c0ff;--army:#3fb950;--red:#f85149;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;line-height:1.5}
  header{display:flex;align-items:center;gap:.75rem;padding:.9rem 1rem;background:var(--bg2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5}
  header h1{font-size:1rem;margin:0;font-weight:600}
  .home-btn{color:var(--text);display:flex}
  main{max-width:640px;margin:0 auto;padding:1.2rem 1rem 4rem}
  .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1rem}
  label{display:block;font-weight:600;margin:.6rem 0 .25rem}
  .hint{color:var(--muted);font-size:.8rem;font-weight:400}
  select,input[type=text],textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:7px;padding:.55rem .6rem;font-size:.95rem;font-family:inherit}
  textarea{min-height:70px;resize:vertical}
  .slot{display:flex;align-items:center;gap:.55rem;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:.55rem .6rem;margin:.35rem 0;cursor:pointer}
  .slot input{accent-color:var(--accent)}
  .slot .lbl{flex:1}
  .slot .all{color:var(--muted);font-size:.78rem}
  .btn{background:var(--accent);color:#08111d;border:none;border-radius:8px;padding:.7rem 1.1rem;font-weight:700;font-size:.95rem;cursor:pointer;width:100%}
  .btn[disabled]{opacity:.5;cursor:not-allowed}
  .status{margin-top:.7rem;font-size:.9rem;min-height:1.2em}
  .ok{color:var(--army)} .err{color:var(--red)}
  footer{text-align:center;color:var(--muted);font-size:.75rem;padding:1.5rem 1rem}
  footer a{color:var(--muted)}
</style>
</head>
<body>
<header>
  <a href="https://2864tw.com" class="home-btn" title="Back to 2864tw.com" aria-label="Home">
    <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path d="M10 2.5l-8 7h3v6a1 1 0 001 1h3v-4h2v4h3a1 1 0 001-1v-6h3z"/></svg>
  </a>
  <h1>Titan Canyon Signup</h1>
</header>
<main>
  <div class="card" id="intro">
    <div id="su-week-line" class="hint">Loading this week's slots…</div>
  </div>

  <form id="signup-form" class="card" autocomplete="off">
    <label for="player">Your in-game name <span class="hint">(required)</span></label>
    <select id="player"><option value="">— select your name —</option></select>
    <div id="player-fallback" style="display:none;margin-top:.4rem">
      <input type="text" id="player-typed" placeholder="Type your in-game name" maxlength="50">
    </div>

    <label>Times you can play <span class="hint">(check all that apply)</span></label>
    <div id="slots"></div>

    <label for="preferred">Preferred time <span class="hint">(pick one of the times you checked)</span></label>
    <select id="preferred"><option value="">— select preferred —</option></select>

    <label for="canswap">Willing to swap squad/alliance this week if needed?</label>
    <select id="canswap"><option value="no">No</option><option value="yes">Yes</option></select>

    <label for="questions">Any TC gameplay questions? <span class="hint">(optional)</span></label>
    <textarea id="questions" maxlength="1000" placeholder="Bounty scoring, where to park, etc."></textarea>

    <label for="notes">Notes for the roster team <span class="hint">(optional)</span></label>
    <textarea id="notes" maxlength="500"></textarea>

    <div style="margin-top:1rem"><button type="submit" class="btn" id="submit-btn">Submit signup</button></div>
    <div class="status" id="status"></div>
  </form>
</main>
<footer>
  <span>Brought to you by supporters of the fk boats movement</span>
</footer>

<script>
(function () {
  var TITAN_API = 'https://push-worker.27tb8s6fct.workers.dev';
  var cfg = null, players = [];

  function stripSymbols(s){ return String(s||'').replace(/^[^\w]+/, ''); }

  Promise.all([
    fetch(TITAN_API + '/titan/slotconfig').then(function (r){ return r.json(); }).catch(function(){ return null; }),
    fetch('player-data.json').then(function (r){ return r.json(); }).catch(function(){ return []; })
  ]).then(function (res) {
    cfg = res[0] || { week:'unset', slots:[] };
    players = Array.isArray(res[1]) ? res[1] : (res[1].players || []);
    renderWeek(); renderPlayers(); renderSlots();
  });

  function renderWeek() {
    var line = document.getElementById('su-week-line');
    if (cfg.week && cfg.week !== 'unset') {
      var txt = 'Signing up for the week of ' + cfg.week + '.';
      if (cfg.closesAt) txt += ' Signups close ' + new Date(cfg.closesAt).toLocaleString() + '.';
      line.textContent = txt;
      if (cfg.closesAt && Date.now() > Date.parse(cfg.closesAt)) {
        var c = document.createElement('span'); c.className = 'err'; c.textContent = ' Signups are closed for this week.';
        line.appendChild(c);
      }
    } else {
      line.textContent = 'Signups are not open yet. Check back soon.';
    }
  }

  function renderPlayers() {
    var sel = document.getElementById('player');
    players.slice().sort(function (a, b) { return stripSymbols(a.name).toLowerCase().localeCompare(stripSymbols(b.name).toLowerCase()); })
      .forEach(function (p) {
        var o = document.createElement('option');
        o.value = p.siteKey || ('name:' + p.name);
        o.textContent = p.name + ' — ' + (p.alliance || '');
        o.setAttribute('data-name', p.name);
        o.setAttribute('data-alliance', p.alliance || '');
        sel.appendChild(o);
      });
    var notListed = document.createElement('option');
    notListed.value = '__notlisted__'; notListed.textContent = "My name isn't listed…";
    sel.appendChild(notListed);

    try {
      var id = JSON.parse(localStorage.getItem('playerIdentity') || 'null');
      if (id && id.siteKey) { sel.value = id.siteKey; }
    } catch (e) {}

    sel.addEventListener('change', function () {
      document.getElementById('player-fallback').style.display = (sel.value === '__notlisted__') ? 'block' : 'none';
    });
  }

  function renderSlots() {
    var box = document.getElementById('slots');
    box.innerHTML = '';
    (cfg.slots || []).forEach(function (s) {
      var lab = document.createElement('label'); lab.className = 'slot';
      var cb = document.createElement('input'); cb.type = 'checkbox'; cb.value = s.id; cb.className = 'slot-cb';
      var name = document.createElement('span'); name.className = 'lbl'; name.textContent = s.label;
      var all = document.createElement('span'); all.className = 'all'; all.textContent = (s.alliances && s.alliances.length) ? ('(' + s.alliances.join(', ') + ')') : '';
      lab.appendChild(cb); lab.appendChild(name); lab.appendChild(all);
      box.appendChild(lab);
      cb.addEventListener('change', syncPreferred);
    });
  }

  function syncPreferred() {
    var pref = document.getElementById('preferred');
    var chosen = Array.prototype.map.call(document.querySelectorAll('.slot-cb:checked'), function (c){ return c.value; });
    var cur = pref.value;
    pref.innerHTML = '<option value="">— select preferred —</option>';
    chosen.forEach(function (id) {
      var s = (cfg.slots || []).find(function (x){ return x.id === id; });
      var o = document.createElement('option'); o.value = id; o.textContent = s ? s.label : id; pref.appendChild(o);
    });
    if (chosen.indexOf(cur) !== -1) pref.value = cur;
  }

  document.getElementById('signup-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var statusEl = document.getElementById('status');
    statusEl.className = 'status';

    var sel = document.getElementById('player');
    var name = '', siteKey = '', alliance = '';
    if (sel.value === '__notlisted__') {
      name = (document.getElementById('player-typed').value || '').trim();
    } else if (sel.value.indexOf('name:') === 0) {
      var opt = sel.options[sel.selectedIndex];
      name = opt.getAttribute('data-name'); alliance = opt.getAttribute('data-alliance');
    } else if (sel.value) {
      var opt2 = sel.options[sel.selectedIndex];
      name = opt2.getAttribute('data-name'); alliance = opt2.getAttribute('data-alliance');
      siteKey = /^[a-f0-9]{16}$/.test(sel.value) ? sel.value : '';
    }
    if (!name) { statusEl.textContent = 'Please select or type your name.'; statusEl.className = 'status err'; return; }

    var available = Array.prototype.map.call(document.querySelectorAll('.slot-cb:checked'), function (c){ return c.value; });
    if (!available.length) { statusEl.textContent = 'Pick at least one time you can play.'; statusEl.className = 'status err'; return; }
    var preferred = document.getElementById('preferred').value;
    if (!preferred) { statusEl.textContent = 'Pick your preferred time.'; statusEl.className = 'status err'; return; }

    var payload = {
      name: name, siteKey: siteKey, alliance: alliance,
      availableSlots: available, preferredSlot: preferred,
      canSwap: document.getElementById('canswap').value === 'yes',
      questions: document.getElementById('questions').value,
      notes: document.getElementById('notes').value
    };

    var btn = document.getElementById('submit-btn'); btn.disabled = true;
    statusEl.textContent = 'Submitting…';
    fetch(TITAN_API + '/titan/signup', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
    }).then(function (r){ return r.json().then(function (j){ return { status: r.status, j: j }; }); })
      .then(function (res) {
        btn.disabled = false;
        if (res.j && res.j.ok) {
          statusEl.textContent = 'Thanks ' + name + ' — your signup is in! You can re-submit to update it.';
          statusEl.className = 'status ok';
        } else if (res.status === 429) {
          statusEl.textContent = 'Please wait a moment before submitting again.'; statusEl.className = 'status err';
        } else if (res.j && res.j.error === 'signups_closed') {
          statusEl.textContent = 'Signups are closed for this week.'; statusEl.className = 'status err';
        } else if (res.j && res.j.error === 'signups_not_open') {
          statusEl.textContent = 'Signups are not open yet.'; statusEl.className = 'status err';
        } else {
          statusEl.textContent = 'Could not submit (' + ((res.j && res.j.error) || res.status) + ').'; statusEl.className = 'status err';
        }
      }).catch(function () {
        btn.disabled = false; statusEl.textContent = 'Network error. Try again.'; statusEl.className = 'status err';
      });
  });
})();
</script>
</body>
</html>
