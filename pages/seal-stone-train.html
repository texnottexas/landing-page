  * { box-sizing: border-box; }
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); line-height:1.5; min-height:100vh; }

  .card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px; margin-bottom:16px; }
  .card h2 { font-size:14px; text-transform:uppercase; color:var(--muted); margin:0 0 12px; display:flex; align-items:center; gap:8px; }
  .card h2 .icon { width:16px; height:16px; }
  button.primary { background:var(--accent); color:var(--bg); border:none; padding:10px 18px; border-radius:6px; cursor:pointer; font-weight:600; }
  button.danger  { background:transparent; color:var(--red); border:1px solid var(--red); padding:6px 12px; border-radius:6px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
  button.primary[disabled], button.danger[disabled] { opacity:0.5; cursor:not-allowed; }
  .icon { width:20px; height:20px; vertical-align:middle; }
  .roster-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(80px,1fr)); gap:8px; }
  .roster-cell { display:flex; flex-direction:column; align-items:center; gap:4px; font-size:11px; color:var(--muted); text-align:center; }
  .roster-cell img { width:48px; height:48px; border-radius:50%; border:1px solid var(--border); object-fit:cover; background:var(--surface); }
  .modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:50; padding:16px; }
  .modal-bg.show { display:flex; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:20px; max-width:520px; width:100%; max-height:90vh; overflow:auto; }
  .modal h2 { margin:0 0 12px; font-size:16px; }
  .slot-picker { display:flex; gap:8px; margin:12px 0; flex-wrap:wrap; }
  .slot-picker button { flex:1; min-width:90px; background:var(--surface); border:1px solid var(--border); color:var(--text); padding:10px 8px; border-radius:6px; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:2px; }
  .slot-picker button.selected { background:var(--accent); color:var(--bg); border-color:var(--accent); }
  .slot-time { font-size:11px; color:var(--muted); }
  .slot-picker button.selected .slot-time { color:var(--bg); }
  .banner-warn { background:rgba(210,153,34,0.1); border:1px solid var(--warn); color:var(--warn); padding:10px; border-radius:6px; margin-bottom:16px; display:flex; gap:8px; align-items:center; }
  .banner-end { background:rgba(248,81,73,0.1); border:1px solid var(--red); color:var(--red); padding:14px; border-radius:6px; margin-bottom:16px; text-align:center; font-weight:600; }
