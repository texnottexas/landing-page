<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline' 'self' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com; style-src 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; connect-src 'self' https://push-worker.27tb8s6fct.workers.dev https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com; img-src 'self' data: https://i.ibb.co https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://www.google.com https://fonts.gstatic.com; frame-src https://translate.google.com; object-src 'none'; base-uri 'self'; form-action 'none'; font-src https://fonts.gstatic.com;" />
  <title>Titan Canyon - Server 2864</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d1117; --bg2: #161b22; --card: #1c2128; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
      --army: #3fb950; --navy: #388bfd; --air: #d29922;
      --ce: #e3b341; --mm: #bc8cff; --tag: #21262d;
      --green: #3fb950; --gold: #e3b341; --red: #f85149;
      --shadow: rgba(0,0,0,.45);
    }
    :root[data-theme="light"] {
      --bg: #f6f8fa; --bg2: #ffffff; --card: #ffffff; --border: #d0d7de;
      --text: #1f2328; --muted: #656d76; --accent: #1f75d4;
      --army: #1a7f37; --navy: #0550ae; --air: #9a6700;
      --ce: #7d4e00; --mm: #6e40c9; --tag: #eaeef2;
      --green: #1a7f37; --gold: #9a6700; --red: #cf222e;
      --shadow: rgba(140,149,159,.2);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: .85rem 2rem; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200; box-shadow: 0 1px 0 var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 1.2rem; }
    .header-title { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .header-sub { font-size: .75rem; color: var(--muted); margin-top: 3px; }
    .nav-link {
      font-size: .8rem; color: var(--muted); text-decoration: none; padding: .35rem .8rem;
      border: 1px solid var(--border); border-radius: 7px; transition: all .15s;
    }
    .nav-link:hover { border-color: var(--accent); color: var(--accent); }
    .hdr-btn {
      background: var(--tag); border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: .38rem .9rem; cursor: pointer; font-size: .8rem;
      display: flex; align-items: center; gap: .4rem; transition: all .15s; white-space: nowrap;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

    main { max-width: 920px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 1.4rem 1.5rem; margin-bottom: 1.25rem;
    }
    .card h2 {
      font-size: .72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .07em; margin-bottom: 1rem;
    }
    .muted { color: var(--muted); }
    .row { display: flex; align-items: center; gap: .6rem; flex-wrap: wrap; }

    /* Identity bar */
    .id-bar { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; justify-content: space-between; }
    .id-who { display: flex; align-items: center; gap: .8rem; }
    .id-avatar {
      width: 46px; height: 46px; border-radius: 50%; background: var(--tag);
      border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 1.1rem; color: var(--accent);
    }
    .id-name { font-size: 1.15rem; font-weight: 700; }
    .id-meta { font-size: .78rem; color: var(--muted); margin-top: 2px; }
    .pill {
      display: inline-flex; align-items: center; gap: .3rem; padding: .15rem .55rem;
      border-radius: 999px; font-size: .68rem; font-weight: 600; border: 1px solid var(--border);
      background: var(--tag); color: var(--muted);
    }
    .pill.dog { color: var(--army); border-color: color-mix(in srgb, var(--army) 45%, var(--border)); }
    .pill.mss { color: var(--navy); border-color: color-mix(in srgb, var(--navy) 45%, var(--border)); }
    .pill.pru { color: var(--air); border-color: color-mix(in srgb, var(--air) 45%, var(--border)); }
    .pill.cat { color: var(--mm); border-color: color-mix(in srgb, var(--mm) 45%, var(--border)); }

    select, .btn {
      font-family: inherit; font-size: .85rem; border-radius: 8px;
      border: 1px solid var(--border); background: var(--bg2); color: var(--text);
      padding: .5rem .8rem; cursor: pointer; transition: all .15s;
    }
    select:hover, .btn:hover { border-color: var(--accent); }
    .btn-primary {
      background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600;
      padding: .7rem 1.2rem; font-size: .9rem;
    }
    .btn-primary:hover { filter: brightness(1.08); border-color: var(--accent); }
    .btn-block { display: block; width: 100%; text-align: center; }
    a.btn { text-decoration: none; display: inline-flex; align-items: center; gap: .45rem; justify-content: center; }

    .kv { display: grid; grid-template-columns: max-content 1fr; gap: .45rem 1rem; font-size: .88rem; }
    .kv dt { color: var(--muted); }
    .kv dd { font-weight: 600; }

    .squad-head { display: flex; align-items: baseline; gap: .6rem; flex-wrap: wrap; margin-bottom: .2rem; }
    .squad-name { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
    .squad-time { font-size: .9rem; color: var(--text); }
    .squad-time .et { color: var(--muted); font-size: .8rem; }
    .your-pos {
      display: inline-flex; align-items: center; gap: .4rem; margin-top: .8rem;
      padding: .45rem .8rem; border-radius: 8px; background: var(--tag); border: 1px solid var(--border);
      font-size: .85rem;
    }
    .your-pos b { color: var(--accent); }

    .swap-banner {
      margin-top: 1rem; padding: .8rem 1rem; border-radius: 10px;
      background: color-mix(in srgb, var(--gold) 12%, var(--card));
      border: 1px solid color-mix(in srgb, var(--gold) 45%, var(--border));
      font-size: .85rem; color: var(--text); display: flex; gap: .6rem; align-items: flex-start;
    }
    .swap-banner svg { flex-shrink: 0; margin-top: 1px; color: var(--gold); }

    .mates { list-style: none; display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .9rem; }
    .mates li {
      font-size: .78rem; padding: .28rem .6rem; border-radius: 7px;
      background: var(--bg2); border: 1px solid var(--border);
    }
    .mates li.me { border-color: var(--accent); color: var(--accent); font-weight: 700; }

    .cta-wrap { text-align: center; padding: 1rem 0 .25rem; }
    .cta-sub { font-size: .85rem; color: var(--muted); margin-top: .8rem; }
    .status-line { font-size: .82rem; color: var(--muted); margin-bottom: 1rem; }
    .status-line b { color: var(--text); }
    .countdown { color: var(--gold); font-weight: 700; font-variant-numeric: tabular-nums; }
    .links-row { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem; margin-top: .25rem; }
    @media (max-width: 540px) { .links-row { grid-template-columns: 1fr; } .kv { grid-template-columns: 1fr; gap: .15rem; } .kv dt { margin-top: .5rem; } }

    .loading { text-align: center; color: var(--muted); padding: 3rem 1rem; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @media (max-width: 640px) {
      main { padding: 1rem 1rem 2rem; }
      header { padding: .7rem 1rem; flex-wrap: wrap; gap: .5rem; }
    }

    .site-footer { text-align: center; padding: 1.5rem 2rem; font-size: .75rem; color: var(--muted); border-top: 1px solid var(--border); }
    .site-footer a { color: var(--accent); text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }

    /* Google Translate overrides */
    body { top: 0 !important; }
    body > .skiptranslate { display: none !important; }
    #google_translate_element { position: absolute; left: -9999px; opacity: 0; pointer-events: none; }
    .lang-btn {
      background: var(--tag); border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: .38rem .7rem; cursor: pointer; font-size: .8rem;
      display: flex; align-items: center; gap: .35rem; font-family: inherit;
      font-weight: 600; letter-spacing: .02em; white-space: nowrap; transition: border-color .2s;
    }
    .lang-btn:hover { border-color: var(--accent); color: var(--text); }
    .lang-modal-overlay { display: none; position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 1rem; }
    .lang-modal-overlay.active { display: flex; }
    .lang-modal { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 1.25rem; max-width: 400px; width: 100%; max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 32px var(--shadow); }
    .lang-modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .lang-modal-title { font-size: 1rem; font-weight: 700; color: var(--text); }
    .lang-modal-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; padding: .2rem; line-height: 1; }
    .lang-modal-close:hover { color: var(--text); }
    .lang-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: .5rem; }
    .lang-option { display: flex; align-items: center; gap: .5rem; padding: .5rem .65rem; border-radius: 8px; border: 1px solid transparent; background: var(--bg); cursor: pointer; font-size: .82rem; color: var(--text); font-family: inherit; transition: border-color .15s, background .15s; }
    .lang-option:hover { border-color: var(--accent); background: var(--tag); }
    .lang-option.active { border-color: var(--accent); background: var(--tag); }
    .lang-option .lang-flag { font-size: 1.1rem; }
    .lang-option .lang-name { flex: 1; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="header-title notranslate">&#9876; Titan Canyon</div>
      <div class="header-sub">Server 2864</div>
    </div>
    <a href="https://2864tw.com" class="nav-link" title="Home" style="padding:.35rem .6rem;display:inline-flex;align-items:center"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L10 3.5l7 7"/><path d="M5 9v7a1 1 0 001 1h3v-4h2v4h3a1 1 0 001-1V9"/></svg></a>
  </div>
  <div style="display:flex;gap:.6rem;align-items:center">
    <button class="lang-btn notranslate" id="langBtn" aria-label="Change language">
      <span id="langFlag">&#127482;&#127480;</span>
      <span id="langCode">/en</span>
    </button>
    <div id="google_translate_element"></div>
    <button class="hdr-btn" onclick="toggleTheme()">
      <span id="themeIcon">&#9728;&#65039;</span>
      <span id="themeLabel">Light Mode</span>
    </button>
  </div>
</header>

<main id="main">
  <div class="loading" id="loading">Loading your Titan Canyon dashboard&hellip;</div>
  <div id="dash" style="display:none"></div>
</main>

<div class="lang-modal-overlay" id="langModal">
  <div class="lang-modal">
    <div class="lang-modal-header">
      <span class="lang-modal-title">Select Language</span>
      <button class="lang-modal-close" id="langModalClose" aria-label="Close">&#10005;</button>
    </div>
    <div class="lang-grid" id="langGrid"></div>
  </div>
</div>

<footer class="site-footer">
  Brought to you by supporters of the fk boats movement<br>
  <a href="https://github.com/texnottexas/titan-canyon-rosters" target="_blank" rel="noopener noreferrer">GitHub</a>
</footer>

<script>
var TITAN_API = 'https://push-worker.27tb8s6fct.workers.dev';

// Canonical squad metadata — alliance + timeslot per squad name. Mirrors the
// worker's SQUAD_NAMES map (titan-alloc.js). Slot ids are hours offset from the
// noon-ET reset on the battle Saturday.
var SQUAD_META = {
  'Dog Squad A': { alliance: 'DOG',  slot: '+10' },
  'Dog Squad B': { alliance: 'DOG',  slot: '-2'  },
  'MSS Squad A': { alliance: 'MSS',  slot: '+2'  },
  'MSS Squad B': { alliance: 'MSS',  slot: '+10' },
  'PRU Squad A': { alliance: 'PRU',  slot: '-6'  },
  'Cat Squad A': { alliance: 'Cat+', slot: '+2'  }
};
var RESET_HOUR_ET = 12;
var ALL_DISPLAY = { 'DOG': 'Dog', 'MSS': 'MSS', 'PRU': 'PRU', 'Cat+': 'Cat' };
var SUPPORT_BUCKETS = ['goon', 'standby', 'hover', 'crystal'];
var BUCKET_LABEL = { goon: 'Goon Squad', standby: 'Standby', hover: 'Hover Captain', crystal: 'Crystal Lab Captain' };

var ESC_MAP = { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' };
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ESC_MAP[c]; }); }
function normName(s) { return String(s == null ? '' : s).toLowerCase().trim(); }
function allianceDisplay(a) { return ALL_DISPLAY[a] || a || ''; }
function allianceClass(a) { return a === 'DOG' ? 'dog' : a === 'MSS' ? 'mss' : a === 'PRU' ? 'pru' : a === 'Cat+' ? 'cat' : ''; }
function normAll(a) { var u = String(a == null ? '' : a).trim().toUpperCase(); if (u === 'DOG') return 'DOG'; if (u === 'MSS') return 'MSS'; if (u === 'PRU') return 'PRU'; if (u === 'CAT' || u === 'CAT+') return 'Cat+'; return u; }

function toggleTheme() {
  var d = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', d ? 'light' : 'dark');
  document.getElementById('themeIcon').textContent = d ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = d ? 'Dark Mode' : 'Light Mode';
}

// --- DST-safe ET wall-clock -> UTC instant (no library) ---------------------
function etWallToUTC(year, month, day, hour) {
  var guess = Date.UTC(year, month - 1, day, hour, 0, 0);
  var dtf = new Intl.DateTimeFormat('en-US', { timeZone: 'America/New_York', hour12: false, year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  var p = {};
  dtf.formatToParts(new Date(guess)).forEach(function (x) { p[x.type] = x.value; });
  var asET = Date.UTC(+p.year, +p.month - 1, +p.day, +(p.hour === '24' ? 0 : p.hour), +p.minute);
  return guess - (asET - guess);
}
// Local time string for a slot on the given battle-Saturday ISO date.
function slotLocalTime(weekISO, slotId) {
  var m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(weekISO || ''));
  var off = parseInt(slotId, 10);
  if (!m || isNaN(off)) return '';
  var utc = etWallToUTC(+m[1], +m[2], +m[3], RESET_HOUR_ET + off);
  try {
    return new Date(utc).toLocaleString(undefined, { weekday: 'short', hour: 'numeric', minute: '2-digit' });
  } catch (e) { return ''; }
}

// --- State ------------------------------------------------------------------
var state = { cfg: null, plan: {}, players: [], me: null, signup: null };
var countdownTimer = null;

function getStoredIdentity() {
  try {
    var v = localStorage.getItem('playerIdentity');
    if (!v || v === 'anonymous') return null;
    return JSON.parse(v);
  } catch (e) { return null; }
}
function getPickedChoice() {
  try { return localStorage.getItem('titanDashChoice') || ''; } catch (e) { return ''; }
}
function setPickedChoice(v) { try { localStorage.setItem('titanDashChoice', v); } catch (e) {} }

function findPlayer(siteKey, name) {
  var sk = (typeof siteKey === 'string' && /^[a-f0-9]{16}$/.test(siteKey)) ? siteKey : '';
  if (sk) { for (var i = 0; i < state.players.length; i++) if (state.players[i].siteKey === sk) return state.players[i]; }
  var nn = normName(name);
  if (nn) { for (var j = 0; j < state.players.length; j++) if (normName(state.players[j].name) === nn) return state.players[j]; }
  return null;
}

// Resolve "me": explicit picker choice first, else the site identity.
function resolveMe() {
  var choice = getPickedChoice();
  if (choice) {
    var p = choice.indexOf('name:') === 0 ? findPlayer('', choice.slice(5)) : findPlayer(choice, '');
    if (p) return { name: p.name, siteKey: p.siteKey || '', alliance: p.alliance || '' };
    if (choice.indexOf('name:') === 0) return { name: choice.slice(5), siteKey: '', alliance: '' };
  }
  var id = getStoredIdentity();
  if (id && (id.siteKey || id.name) && !id.guest) {
    var pp = findPlayer(id.siteKey, id.name);
    return { name: (pp && pp.name) || id.name, siteKey: (pp && pp.siteKey) || (/^[a-f0-9]{16}$/.test(id.siteKey || '') ? id.siteKey : ''), alliance: (pp && pp.alliance) || id.alliance || '' };
  }
  return null;
}

// Find the player's assignment in the battleplan. Returns { squad, position, bucket, mates[] } or null.
function findAssignment(name) {
  var nn = normName(name);
  for (var sq in state.plan) {
    if (!state.plan.hasOwnProperty(sq)) continue;
    var data = state.plan[sq];
    if (!data) continue;
    var found = null;
    if (data.positions) {
      for (var pos in data.positions) {
        if (data.positions.hasOwnProperty(pos) && normName(data.positions[pos]) === nn) found = { squad: sq, position: pos, bucket: null };
      }
    }
    for (var b = 0; b < SUPPORT_BUCKETS.length; b++) {
      var arr = data[SUPPORT_BUCKETS[b]] || [];
      for (var k = 0; k < arr.length; k++) if (normName(arr[k]) === nn) found = { squad: sq, position: null, bucket: SUPPORT_BUCKETS[b] };
    }
    if (found) {
      found.mates = squadMembers(data);
      return found;
    }
  }
  return null;
}
function squadMembers(data) {
  var out = [];
  if (data.positions) for (var pos in data.positions) if (data.positions.hasOwnProperty(pos) && data.positions[pos]) out.push(data.positions[pos]);
  for (var b = 0; b < SUPPORT_BUCKETS.length; b++) { var arr = data[SUPPORT_BUCKETS[b]] || []; for (var k = 0; k < arr.length; k++) if (arr[k]) out.push(arr[k]); }
  return out;
}

// --- Render -----------------------------------------------------------------
function render() {
  var el = document.getElementById('dash');
  document.getElementById('loading').style.display = 'none';
  el.style.display = 'block';
  if (countdownTimer) { clearInterval(countdownTimer); countdownTimer = null; }

  var html = renderIdentityBar();

  if (!state.me) {
    html += '<div class="card"><div class="cta-wrap"><p class="muted">Pick your in-game name above to see your Titan Canyon status.</p></div></div>';
    el.innerHTML = html;
    wireIdentityPicker();
    return;
  }

  html += renderStatus();

  var assignment = findAssignment(state.me.name);
  if (assignment) {
    html += renderSquadCard(assignment);
  }
  if (state.signup) {
    html += renderSignupCard(assignment);
  } else {
    html += renderRegisterCta();
  }
  html += renderLinks();

  el.innerHTML = html;
  wireIdentityPicker();
  startCountdown();
}

function renderIdentityBar() {
  var me = state.me;
  var initial = me && me.name ? esc(me.name.trim().charAt(0).toUpperCase()) : '?';
  var allianceTag = (me && me.alliance) ? '<span class="pill ' + allianceClass(me.alliance) + '">' + esc(allianceDisplay(me.alliance)) + '</span>' : '';
  var options = ['<option value="">Change player&hellip;</option>'];
  var meChoice = me ? (me.siteKey ? me.siteKey : 'name:' + me.name) : '';
  state.players.forEach(function (p) {
    var val = p.siteKey ? p.siteKey : 'name:' + p.name;
    options.push('<option value="' + esc(val) + '"' + (val === meChoice ? ' selected' : '') + '>' + esc(p.name) + '</option>');
  });
  return '' +
    '<div class="card"><div class="id-bar">' +
      '<div class="id-who">' +
        '<div class="id-avatar notranslate">' + initial + '</div>' +
        '<div>' +
          '<div class="id-name notranslate">' + (me ? esc(me.name) : 'Welcome') + '</div>' +
          '<div class="id-meta">' + (me ? allianceTag : 'Server 2864 Titan Canyon') + '</div>' +
        '</div>' +
      '</div>' +
      '<select id="playerPick" aria-label="Choose player">' + options.join('') + '</select>' +
    '</div></div>';
}

function renderStatus() {
  var cfg = state.cfg || {};
  if (!cfg.week || cfg.week === 'unset') {
    return '<div class="card"><div class="status-line">Signups for the next Titan Canyon are <b>not open yet</b>. Check back soon.</div></div>';
  }
  var closed = cfg.closesAt && Date.now() > Date.parse(cfg.closesAt);
  if (closed) {
    return '<div class="card"><div class="status-line">Signups for <b>' + esc(cfg.week) + '</b> are <b>closed</b>. Your assignment is below.</div></div>';
  }
  return '<div class="card"><div class="status-line">Signups for <b>' + esc(cfg.week) + '</b> are open, closing in <span class="countdown" id="cd">&hellip;</span></div></div>';
}

function startCountdown() {
  var cfg = state.cfg || {};
  if (!cfg.closesAt || cfg.week === 'unset') return;
  var elc = document.getElementById('cd');
  if (!elc) return;
  function tick() {
    var ms = Date.parse(cfg.closesAt) - Date.now();
    if (isNaN(ms)) { elc.textContent = ''; return; }
    if (ms <= 0) { elc.textContent = 'closed'; clearInterval(countdownTimer); return; }
    var d = Math.floor(ms / 86400000), h = Math.floor(ms % 86400000 / 3600000), m = Math.floor(ms % 3600000 / 60000), s = Math.floor(ms % 60000 / 1000);
    elc.textContent = (d ? d + 'd ' : '') + h + 'h ' + m + 'm ' + s + 's';
  }
  tick();
  countdownTimer = setInterval(tick, 1000);
}

function renderSquadCard(a) {
  var meta = SQUAD_META[a.squad] || {};
  var cfg = state.cfg || {};
  var slotObj = (cfg.slots || []).filter(function (s) { return s.id === meta.slot; })[0];
  var local = slotLocalTime(cfg.week, meta.slot);
  var posText = a.position ? ('Position ' + esc(a.position)) : (BUCKET_LABEL[a.bucket] || 'Support');

  var swap = '';
  var homeAll = normAll(state.me.alliance || (state.signup && state.signup.alliance) || '');
  if (homeAll && meta.alliance && homeAll !== meta.alliance) {
    swap = '<div class="swap-banner">' +
      '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 1l4 4-4 4"/><path d="M3 11V9a4 4 0 014-4h14"/><path d="M7 23l-4-4 4-4"/><path d="M21 13v2a4 4 0 01-4 4H3"/></svg>' +
      '<div>This squad fights in the <b>' + esc(allianceDisplay(meta.alliance)) + '</b> timeslot. You will need to swap to <b>' + esc(allianceDisplay(meta.alliance)) + '</b> before battle.</div>' +
    '</div>';
  }

  var mates = a.mates.filter(function (n) { return normName(n) !== normName(state.me.name); });
  var matesHtml = '<ul class="mates"><li class="me notranslate">' + esc(state.me.name) + ' (you)</li>' +
    mates.map(function (n) { return '<li class="notranslate">' + esc(n) + '</li>'; }).join('') + '</ul>';

  return '' +
    '<div class="card">' +
      '<h2>Your Squad</h2>' +
      '<div class="squad-head"><span class="squad-name notranslate">' + esc(a.squad) + '</span>' +
        (local ? '<span class="squad-time">' + esc(local) + ' your time <span class="et">' + (slotObj ? esc(slotObj.label) : '') + '</span></span>' : '') +
      '</div>' +
      '<div class="your-pos">Your spot: <b>' + posText + '</b></div>' +
      swap +
      '<div style="margin-top:1rem"><div class="id-meta" style="margin-bottom:.3rem">Squad (' + (mates.length + 1) + ')</div>' + matesHtml + '</div>' +
    '</div>';
}

function renderSignupCard(assignment) {
  var s = state.signup;
  var cfg = state.cfg || {};
  var slotLabel = function (id) { var o = (cfg.slots || []).filter(function (x) { return x.id === id; })[0]; return o ? o.label : id; };
  var prof = s.profession === 'CE' ? 'Combat Elite (CE)' : s.profession === 'MM' ? 'Mechanical Master (MM)' : '-';
  var avail = (s.availableSlots || []).map(function (id) { return esc(slotLabel(id)); }).join(', ') || '-';
  var ucLine = (s.profession === 'MM' && s.ucFacility != null) ? '<dt>Urgent Care</dt><dd>Level ' + esc(s.ucFacility) + '</dd>' : '';
  var pendingNote = assignment ? '' : '<div class="status-line" style="margin-top:1rem">You are signed up. Your squad assignment is being finalized and will appear here.</div>';
  return '' +
    '<div class="card">' +
      '<h2>Your Registration</h2>' +
      '<dl class="kv">' +
        '<dt>Profession</dt><dd>' + prof + '</dd>' +
        '<dt>Primary unit</dt><dd>' + (esc(s.unitType) || '-') + '</dd>' +
        ucLine +
        '<dt>Available</dt><dd>' + avail + '</dd>' +
        '<dt>Top pick</dt><dd>' + esc(slotLabel(s.preferredSlot)) + '</dd>' +
        '<dt>Can swap</dt><dd>' + (s.canSwap ? 'Yes' : 'No') + '</dd>' +
      '</dl>' +
      pendingNote +
      '<div style="margin-top:1.1rem"><a class="btn btn-block" href="titan-signup.html">Edit / re-submit registration</a></div>' +
    '</div>';
}

function renderRegisterCta() {
  var cfg = state.cfg || {};
  var open = cfg.week && cfg.week !== 'unset' && !(cfg.closesAt && Date.now() > Date.parse(cfg.closesAt));
  return '' +
    '<div class="card"><div class="cta-wrap">' +
      (open
        ? '<a class="btn btn-primary" href="titan-signup.html">Titan Canyon Registration</a><div class="cta-sub">You have not signed up for this week yet. Register to claim your squad spot.</div>'
        : '<p class="muted">No open registration right now. When signups open, you will register here.</p>') +
    '</div></div>';
}

function renderLinks() {
  return '' +
    '<div class="card"><h2>Titan Canyon</h2><div class="links-row">' +
      '<a class="btn btn-block" href="titan-battle-plan.html"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 8.5 22 15.5 12 22 2 15.5 2 8.5"/></svg> Battle Plan</a>' +
      '<a class="btn btn-block" href="titan-roster.html"><svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor"><rect x="1" y="8" width="3" height="7" rx="1"/><rect x="6" y="4" width="3" height="11" rx="1"/><rect x="11" y="1" width="3" height="14" rx="1"/></svg> Full Roster</a>' +
    '</div></div>';
}

function wireIdentityPicker() {
  var sel = document.getElementById('playerPick');
  if (!sel) return;
  sel.addEventListener('change', function () {
    var v = sel.value;
    if (!v) return;
    setPickedChoice(v);
    loadMine();
  });
}

// --- Load -------------------------------------------------------------------
function getJSON(url) { return fetch(url).then(function (r) { if (!r.ok) throw new Error('http ' + r.status); return r.json(); }); }

// Re-resolve "me" + fetch their signup, then render. Called on first load and
// whenever the player picker changes.
function loadMine() {
  state.me = resolveMe();
  state.signup = null;
  if (!state.me) { render(); return; }
  var week = (state.cfg && state.cfg.week) || '';
  var q = '?week=' + encodeURIComponent(week);
  if (state.me.siteKey) q += '&siteKey=' + encodeURIComponent(state.me.siteKey);
  if (state.me.name) q += '&name=' + encodeURIComponent(state.me.name);
  getJSON(TITAN_API + '/titan/my-signup' + q)
    .then(function (d) { state.signup = (d && d.signup) || null; })
    .catch(function () {})
    .then(function () { render(); });
}

function init() {
  Promise.all([
    getJSON(TITAN_API + '/titan/slotconfig').catch(function () { return null; }),
    getJSON(TITAN_API + '/titan/battleplan').catch(function () { return {}; }),
    getJSON('player-data.json').catch(function () { return []; })
  ]).then(function (res) {
    state.cfg = res[0] || {};
    state.plan = (res[1] && typeof res[1] === 'object' && !Array.isArray(res[1])) ? res[1] : {};
    state.players = Array.isArray(res[2]) ? res[2].slice().sort(function (a, b) { return normName(a.name) < normName(b.name) ? -1 : 1; }) : [];
    loadMine();
  });
}
init();
</script>
<script>
(function() {
  var LANGUAGES = [
    { code: 'en', flag: '\u{1F1FA}\u{1F1F8}', name: 'English' },
    { code: 'es', flag: '\u{1F1EA}\u{1F1F8}', name: 'Español' },
    { code: 'fr', flag: '\u{1F1EB}\u{1F1F7}', name: 'Français' },
    { code: 'de', flag: '\u{1F1E9}\u{1F1EA}', name: 'Deutsch' },
    { code: 'pt', flag: '\u{1F1E7}\u{1F1F7}', name: 'Português' },
    { code: 'it', flag: '\u{1F1EE}\u{1F1F9}', name: 'Italiano' },
    { code: 'ru', flag: '\u{1F1F7}\u{1F1FA}', name: 'Русский' },
    { code: 'ja', flag: '\u{1F1EF}\u{1F1F5}', name: '日本語' },
    { code: 'ko', flag: '\u{1F1F0}\u{1F1F7}', name: '한국어' },
    { code: 'zh-CN', flag: '\u{1F1E8}\u{1F1F3}', name: '中文' },
    { code: 'ar', flag: '\u{1F1F8}\u{1F1E6}', name: 'العربية' },
    { code: 'tr', flag: '\u{1F1F9}\u{1F1F7}', name: 'Türkçe' },
    { code: 'vi', flag: '\u{1F1FB}\u{1F1F3}', name: 'Tiếng Việt' },
    { code: 'th', flag: '\u{1F1F9}\u{1F1ED}', name: 'ไทย' },
    { code: 'hi', flag: '\u{1F1EE}\u{1F1F3}', name: 'हिन्दी' },
    { code: 'pl', flag: '\u{1F1F5}\u{1F1F1}', name: 'Polski' },
    { code: 'uk', flag: '\u{1F1FA}\u{1F1E6}', name: 'Українська' },
    { code: 'id', flag: '\u{1F1EE}\u{1F1E9}', name: 'Indonesia' }
  ];
  window._gtLoaded = false;
  function getLangData(code) {
    var base = code.split('-')[0];
    for (var i = 0; i < LANGUAGES.length; i++) { if (LANGUAGES[i].code === code || LANGUAGES[i].code === base) return LANGUAGES[i]; }
    return null;
  }
  window.updateLangBtn = function(code) {
    var data = getLangData(code);
    var flagEl = document.getElementById('langFlag'); var codeEl = document.getElementById('langCode');
    if (data && flagEl && codeEl) { flagEl.textContent = data.flag; codeEl.textContent = '/' + data.code; }
    else if (flagEl && codeEl) { flagEl.textContent = '\u{1F310}'; codeEl.textContent = '/' + code; }
    var options = document.querySelectorAll('.lang-option');
    for (var i = 0; i < options.length; i++) options[i].classList.toggle('active', options[i].getAttribute('data-lang') === code);
  };
  window.detectCurrentLang = function() {
    var match = document.cookie.match(/googtrans=\/en\/([a-zA-Z-]{2,10})/);
    if (match && match[1]) return match[1];
    return 'en';
  };
  function applyLangToCombo(code, delay, onSuccess) {
    var attempts = 0;
    var poll = setInterval(function() {
      var combo = document.querySelector('.goog-te-combo');
      if (combo) { combo.value = code; combo.dispatchEvent(new Event('change')); clearInterval(poll); window.updateLangBtn(code); if (onSuccess) onSuccess(); }
      if (++attempts > 30) clearInterval(poll);
    }, delay || 200);
  }
  function selectLanguage(code) {
    if (code === 'en') { restoreEnglish(); return; }
    try { sessionStorage.setItem('pendingLang', code); } catch(e) {}
    applyLangToCombo(code, 200, closeLangModal);
  }
  function restoreEnglish() {
    try { sessionStorage.removeItem('pendingLang'); } catch(e) {}
    document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax; Secure';
    document.cookie = 'googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.2864tw.com; SameSite=Lax; Secure';
    closeLangModal(); location.reload();
  }
  var langModalEl = document.getElementById('langModal');
  function openLangModal() { if (langModalEl) langModalEl.classList.add('active'); }
  function closeLangModal() { if (langModalEl) langModalEl.classList.remove('active'); }
  var grid = document.getElementById('langGrid');
  if (grid) {
    var detected = window.detectCurrentLang();
    for (var i = 0; i < LANGUAGES.length; i++) {
      var l = LANGUAGES[i];
      var btn = document.createElement('button');
      btn.className = 'lang-option' + (l.code === detected ? ' active' : '');
      btn.setAttribute('data-lang', l.code);
      var flagSpan = document.createElement('span'); flagSpan.className = 'lang-flag'; flagSpan.textContent = l.flag;
      var nameSpan = document.createElement('span'); nameSpan.className = 'lang-name'; nameSpan.textContent = l.name;
      btn.appendChild(flagSpan); btn.appendChild(nameSpan);
      btn.addEventListener('click', (function(code) { return function() { selectLanguage(code); }; })(l.code));
      grid.appendChild(btn);
    }
    window.updateLangBtn(detected);
  }
  var langBtn = document.getElementById('langBtn');
  if (langBtn) langBtn.addEventListener('click', openLangModal);
  var langModalClose = document.getElementById('langModalClose');
  if (langModalClose) langModalClose.addEventListener('click', closeLangModal);
  if (langModalEl) langModalEl.addEventListener('click', function(e) { if (e.target === langModalEl) closeLangModal(); });
  document.addEventListener('keydown', function(e) { if (e.key === 'Escape' && langModalEl && langModalEl.classList.contains('active')) { closeLangModal(); e.stopPropagation(); } });
  setTimeout(function() { if (!window._gtLoaded) { var btn = document.getElementById('langBtn'); if (btn) { btn.style.opacity = '0.5'; btn.style.cursor = 'default'; btn.title = 'Translation unavailable'; btn.removeEventListener('click', openLangModal); } } }, 15000);
})();
function googleTranslateElementInit() {
  window._gtLoaded = true;
  new google.translate.TranslateElement({ pageLanguage: 'en', autoDisplay: false }, 'google_translate_element');
  var pendingLang = null;
  try { pendingLang = sessionStorage.getItem('pendingLang'); sessionStorage.removeItem('pendingLang'); } catch(e) {}
  if (pendingLang) {
    var a = 0; var poll = setInterval(function () { var c = document.querySelector('.goog-te-combo'); if (c) { c.value = pendingLang; c.dispatchEvent(new Event('change')); clearInterval(poll); window.updateLangBtn(pendingLang); } if (++a > 30) clearInterval(poll); }, 250);
  } else {
    try {
      var dismissed = localStorage.getItem('translate-dismissed');
      if (!dismissed) { var lang = (navigator.language || navigator.userLanguage || 'en').split('-')[0]; if (lang !== 'en') { var a2 = 0; var p2 = setInterval(function () { var c = document.querySelector('.goog-te-combo'); if (c) { c.value = lang; c.dispatchEvent(new Event('change')); clearInterval(p2); window.updateLangBtn(lang); } if (++a2 > 30) clearInterval(p2); }, 250); } }
    } catch(e) {}
    var detected = window.detectCurrentLang();
    if (detected !== 'en') window.updateLangBtn(detected);
  }
}
</script>
<script src="https://translate.googleapis.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
