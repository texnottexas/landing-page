  function buildNcFlow(rd, root){
    var targetSet = {};
    (rd.ncTargets || []).forEach(function(t){ targetSet[t.ncNum] = true; });
    var flow = (rd.ncCaptureFlow || []).slice().sort(function(a,b){
      // Targets first, then immediate (via owned NC), then by level desc
      var na = (a.nc.match(/#(\d+)/) || [])[1];
      var nb = (b.nc.match(/#(\d+)/) || [])[1];
      var ta = targetSet[parseInt(na, 10)] ? 0 : 1;
      var tb = targetSet[parseInt(nb, 10)] ? 0 : 1;
      if (ta !== tb) return ta - tb;
      var ia = (a.viaOwnedNCs || []).length > 0 ? 0 : 1;
      var ib = (b.viaOwnedNCs || []).length > 0 ? 0 : 1;
      if (ia !== ib) return ia - ib;
      var la = parseInt(a.level) || 0, lb = parseInt(b.level) || 0;
      return lb - la;
    });
    if (!flow.length) return;
    var section = el('section', 'sect');
    tagSection(section, 'NC Flow', 'castle', flow.length);
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--green)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'NC Capture Flow — Reachable This/Next Round'));
    t.appendChild(el('span', 'tag', flow.length + ' NCs'));
    section.appendChild(t);

    var note = el('div', 'rule-box green');
    note.appendChild(makeIcon('info', 18));
    var body = el('div', 'body');
    body.appendChild(el('strong', null, 'How to read this: '));
    body.appendChild(document.createTextNode('NCs already 4-way adjacent to one of our owned NCs are attackable this round (green, "attack now"). Otherwise, capture the listed wasteland(s) this round and the NC becomes 4-way adjacent next round. NC Lv1 = 3pts, Lv2 = 5pts, Lv3 = 8pts.'));
    note.appendChild(body);
    section.appendChild(note);

    // NC target plan (one per level — game limit)
    if (rd.ncTargets && rd.ncTargets.length){
      var planBox = el('div', 'rule-box accent');
      planBox.appendChild(makeIcon('target', 18));
      var pb = el('div', 'body');
      pb.appendChild(el('strong', null, 'R' + (rd.label && rd.label.match(/\d+/) ? rd.label.match(/\d+/)[0] : '?') + ' NC target plan: '));
      rd.ncTargets.forEach(function(t, i){
        if (i > 0) pb.appendChild(document.createTextNode(' · '));
        pb.appendChild(el('b', 'nc-target-tag l' + t.level, 'Lv' + t.level + ' #' + t.ncNum));
      });
      pb.appendChild(el('div', 'nc-target-rule', rd.ncTargetsRule || ''));
      planBox.appendChild(pb);
      section.appendChild(planBox);
    }

    var targetSet = {};
    (rd.ncTargets || []).forEach(function(t){ targetSet[t.ncNum] = true; });

  // ===== 2-HOP NC PATH COMPUTATION =====
  function compute2HopPaths(rd){
    var cells = rd.cells || [];
    if (!cells.length) return [];
    var byRC = {};
    cells.forEach(function(c){ byRC[c.r + ',' + c.c] = c; });
    var declared = (rd.warTargets || []).map(function(w){ return w.seq; });
    var declaredSet = {};
    declared.forEach(function(s){ declaredSet[s] = true; });
    var seqToCell = {};
    cells.forEach(function(c){
      if (c.type !== 3) return;
      var m = (c.name||'').match(/Wasteland#(\d+)/);
      if (m) seqToCell[parseInt(m[1], 10)] = c;
    });
    // 1-hop NCs already covered — exclude
    var oneHop = {};
    (rd.ncCaptureFlow || []).forEach(function(nc){ oneHop[nc.r + ',' + nc.c] = true; });
    var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    var pathsByNc = {};
    declared.forEach(function(seq){
      var W = seqToCell[seq];
      if (!W) return;
      dirs.forEach(function(d){
        var W2 = byRC[(W.r + d[0]) + ',' + (W.c + d[1])];
        if (!W2 || W2.type !== 3 || W2.sid !== 0) return;
        var m = (W2.name||'').match(/Wasteland#(\d+)/);
        if (!m) return;
        var W2seq = parseInt(m[1], 10);
        dirs.forEach(function(d2){
          var ncR = W2.r + d2[0], ncC = W2.c + d2[1];
          var nc = byRC[ncR + ',' + ncC];
          if (!nc || nc.type !== 2) return;
          if (nc.sid === 2864) return; // already ours
          if (oneHop[ncR + ',' + ncC]) return; // 1-hop already
          var lm = (nc.name||'').match(/Lv\.\s*(\d+)/);
          var lvl = lm ? parseInt(lm[1], 10) : 1;
          var key = ncR + ',' + ncC;
          if (!pathsByNc[key]){
            pathsByNc[key] = { ncName: nc.name, r: ncR, c: ncC, sid: nc.sid, level: lvl, paths: [] };
          }
          var dup = pathsByNc[key].paths.some(function(p){ return p.via1 === seq && p.via2 === W2seq; });
          if (!dup) pathsByNc[key].paths.push({ via1: seq, via2: W2seq, via2Declared: !!declaredSet[W2seq] });
        });
      });
    });
    var arr = Object.keys(pathsByNc).map(function(k){ return pathsByNc[k]; });
    arr.sort(function(a,b){ return (b.level||0) - (a.level||0) || a.ncName.localeCompare(b.ncName); });
    return arr;
  }

  // ===== 3-HOP NC PATH COMPUTATION =====
  function compute3HopPaths(rd){
    var cells = rd.cells || [];
    if (!cells.length) return [];
    var byRC = {};
    cells.forEach(function(c){ byRC[c.r + ',' + c.c] = c; });
    var declared = (rd.warTargets || []).map(function(w){ return w.seq; });
    var declaredSet = {};
    declared.forEach(function(s){ declaredSet[s] = true; });
    var seqToCell = {};
    cells.forEach(function(c){
      if (c.type !== 3) return;
      var m = (c.name||'').match(/Wasteland#(\d+)/);
      if (m) seqToCell[parseInt(m[1], 10)] = c;
    });
    // Exclude 1-hop and 2-hop NCs
    var skipNc = {};
    (rd.ncCaptureFlow || []).forEach(function(nc){ skipNc[nc.r + ',' + nc.c] = true; });
    var twoHop = compute2HopPaths(rd);
    twoHop.forEach(function(nc){ skipNc[nc.r + ',' + nc.c] = true; });

    var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    var pathsByNc = {};
    function seqOf(cell){ var m = (cell.name||'').match(/Wasteland#(\d+)/); return m ? parseInt(m[1], 10) : null; }
    declared.forEach(function(seq){
      var W = seqToCell[seq];
      if (!W) return;
      dirs.forEach(function(d){
        var W2 = byRC[(W.r + d[0]) + ',' + (W.c + d[1])];
        if (!W2 || W2.type !== 3 || W2.sid !== 0) return;
        var W2seq = seqOf(W2);
        if (!W2seq) return;
        dirs.forEach(function(d2){
          var W3 = byRC[(W2.r + d2[0]) + ',' + (W2.c + d2[1])];
          if (!W3 || W3.type !== 3 || W3.sid !== 0) return;
          // No revisit: W3 != W
          if (W3.r === W.r && W3.c === W.c) return;
          var W3seq = seqOf(W3);
          if (!W3seq) return;
          dirs.forEach(function(d3){
            var ncR = W3.r + d3[0], ncC = W3.c + d3[1];
            var nc = byRC[ncR + ',' + ncC];
            if (!nc || nc.type !== 2) return;
            if (nc.sid === 2864) return;
            if (skipNc[ncR + ',' + ncC]) return;
            var lm = (nc.name||'').match(/Lv\.\s*(\d+)/);
            var lvl = lm ? parseInt(lm[1], 10) : 1;
            var key = ncR + ',' + ncC;
            if (!pathsByNc[key]){
              pathsByNc[key] = { ncName: nc.name, r: ncR, c: ncC, sid: nc.sid, level: lvl, paths: [] };
            }
            var dup = pathsByNc[key].paths.some(function(p){ return p.via1 === seq && p.via2 === W2seq && p.via3 === W3seq; });
            if (!dup) pathsByNc[key].paths.push({
              via1: seq, via2: W2seq, via3: W3seq,
              via2Declared: !!declaredSet[W2seq],
              via3Declared: !!declaredSet[W3seq]
            });
          });
        });
      });
    });
    var arr = Object.keys(pathsByNc).map(function(k){ return pathsByNc[k]; });
    arr.sort(function(a,b){ return (b.level||0) - (a.level||0) || a.ncName.localeCompare(b.ncName); });
    return arr;
  }

  // Buff cap row modal — wastelands feeding this buff this round + R11 candidates

  function buildBuffs(rd, root){
    var buffs = rd.buffOverview || [];
    if (!buffs.length) return;
    // Project buffs assuming all 33 declarations win. Computed client-side from
    // SPEC_LEVEL_CONTRIB so multi-effect specs (Realm, SS Train, Mining Hub,
    // Realm Thief) are handled correctly (the JSON-side projection only
    // mapped each spec to a single effect, missing tiered buff lines).
    var proj = computeProjection(rd);

    section.appendChild(t);

    var enriched = buffs.map(function(b){
      var sp = EFFECT_TO_SPEC[b.effectType];
      var cat = sp ? SPEC_CAT[sp] : 'special';
      var ico = sp ? SPEC_ICON[sp] : 'target';
      // Projection ADDS to current owned-buff value (rawCurrent from game extract)
      var live = b.rawCurrent || 0;
      var declared = proj[String(b.effectType)] || 0;
      var rawCur = live + declared;
      var rawMax = b.rawMax || 0;
      var pct = rawMax > 0 ? Math.min(100, 100 * rawCur / rawMax) : 0;
      var over = rawMax > 0 && rawCur > rawMax;
      return { eff:b.effectType, desc:b.description, cat:cat, ico:ico, rawCur:rawCur, rawLive:live, rawDeclared:declared, rawMax:rawMax, pct:pct, over:over, paraType:b.paraType };
    });
    // Custom display order: combat first, then Realm March (11023), then Treasury (11080), then rest by category
    var COMBAT_EFFECTS = { 11001:1, 11002:2, 11003:3, 11004:4, 11006:5 };
    function buffSortKey(b){
      if (COMBAT_EFFECTS[b.eff]) return [0, COMBAT_EFFECTS[b.eff]];
      if (b.eff === 11023) return [1, 0]; // Realm march speed
      if (b.eff === 11080) return [2, 0]; // Treasury
      var catOrder = { combat:3, economy:4, utility:5, special:6, other:7 };
      return [catOrder[b.cat] || 8, -b.rawMax];
    }
    enriched.sort(function(a,b){
      var ka = buffSortKey(a), kb = buffSortKey(b);
      if (ka[0] !== kb[0]) return ka[0] - kb[0];
      return ka[1] - kb[1];
    });

    function fmtVal(v, paraType){
      if (paraType === 2) return (v/100) + '%';

    var list = el('div', 'buff-list');

      var head = el('div', 'buff-head');
      var desc = el('span', 'desc');
      desc.appendChild(makeIcon(b.ico, 14));
      desc.appendChild(el('span', null, b.desc));
      head.appendChild(desc);
      var hideMax = (b.eff === 11080) && b.rawMax === 0; // Treasury cap is round-pool dependent, not fixed
      var dCur = fmtVal(b.rawCur, b.paraType);
      var dMax = fmtVal(b.rawMax, b.paraType);
      var dDeclared = fmtVal(b.rawDeclared, b.paraType);
      var dLive = fmtVal(b.rawLive, b.paraType);
      var vals = el('span', 'vals');
      vals.appendChild(el('b', null, hideMax ? ('+' + dCur) : dCur));
      if (hideMax){
        vals.appendChild(document.createTextNode(' (round pool)'));
      } else {
        vals.appendChild(document.createTextNode(' / ' + dMax));
        if (b.over) vals.appendChild(el('span', 'over', 'OVER'));
      }
      head.appendChild(vals);
      row.appendChild(head);
      // Projection breakdown subtitle (only when declarations contribute)
      if (b.rawDeclared > 0){
        var sub = el('div', 'buff-proj');
        if (b.rawLive > 0){
          sub.textContent = 'Live ' + dLive + ' + projected ' + dDeclared + ' from ' + (rd.warTargets || []).filter(function(w){
            var conf = SPEC_LEVEL_CONTRIB[w.specId];
            if (!conf) return false;
            var lvl = w.level || 3;
            var c = conf.byLevel ? (conf.byLevel[lvl] || {}) : Object.keys(conf.perStack||{}).reduce(function(o,k){ o[k]=conf.perStack[k]; return o; }, {});
            return c[b.eff] !== undefined;
          }).length + ' declaration(s)';
        } else {
          sub.textContent = 'Projected from ' + (rd.warTargets || []).filter(function(w){
            var conf = SPEC_LEVEL_CONTRIB[w.specId];
            if (!conf) return false;
            var lvl = w.level || 3;
            var c = conf.byLevel ? (conf.byLevel[lvl] || {}) : Object.keys(conf.perStack||{}).reduce(function(o,k){ o[k]=conf.perStack[k]; return o; }, {});
            return c[b.eff] !== undefined;
          }).length + ' declaration(s)';
        }
        row.appendChild(sub);
      }
      // Bar: hide for round-pool effect; otherwise normal
      if (!hideMax){
        var bar = el('div', 'buff-bar');
        var fill = el('div', 'buff-fill ' + (b.over ? 'over' : b.cat));
        fill.style.width = Math.max(2, b.pct) + '%';
        bar.appendChild(fill);

        // For treasury: show a static "earned" indicator instead of cap bar
        var bar = el('div', 'buff-bar');
        var fill = el('div', 'buff-fill special');
        fill.style.width = b.rawCur > 0 ? '100%' : '2%';
        fill.style.opacity = '.4';
        bar.appendChild(fill);
        row.appendChild(bar);
      }
      list.appendChild(row);
    });
    section.appendChild(list);
    clampGrid(list, '.buff-row', 5, 'buffs');
    root.appendChild(section);

  // Compute owned-NC adjacency for a wasteland seq (for defense importance).
  // Returns array of {name, level} of owned NCs 4-way adjacent to the wasteland.
  function adjacentOwnedNCs(rd, seq){
    var cells = rd.cells || [];
    var byRC = {};
    cells.forEach(function(c){ byRC[c.r + ',' + c.c] = c; });
    var w = null;
    cells.forEach(function(c){
      if (c.type !== 3) return;
      var m = (c.name||'').match(/Wasteland#(\d+)/);
      if (m && parseInt(m[1], 10) === seq) w = c;
    });
    if (!w) return [];
    var out = [];
    [[-1,0],[1,0],[0,-1],[0,1]].forEach(function(d){
      var n = byRC[(w.r+d[0]) + ',' + (w.c+d[1])];
      if (n && n.type === 2 && n.sid === 2864){
        var lm = (n.name||'').match(/Lv\.\s*(\d+)\s*Neutral City\s*#(\d+)/);
        if (lm) out.push({ name: 'NC#' + lm[2], level: parseInt(lm[1], 10) });
      }
    });
    return out;
  }
  function fameOfSid(rd, sid){
    var p = (rd.sectorPower || []).find(function(x){ return x.sid === sid; });
    return p ? (p.score2 || 0) : 0;
  }
  function fmtFame(f){ return f >= 1000 ? Math.round(f/1000) + 'K' : (f||0); }

  function buildDefense(rd, root){
    var def = (rd.defenseTargets || []).filter(function(d){ return (d.attackerSids||[]).length > 0; });
    if (!def.length) return;
    var section = el('section', 'sect');
    tagSection(section, 'Defense', 'shield', def.length);
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--navy)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'Defense — Wastelands We Own Under Attack'));
    t.appendChild(el('span', 'tag', def.length + ' incoming'));
    var helpBtn = document.createElement('button');
    helpBtn.type = 'button'; helpBtn.className = 'help-btn';
    helpBtn.appendChild(makeIcon('info', 12));
    helpBtn.appendChild(el('span', null, 'how marches are sized'));
    helpBtn.addEventListener('click', openDefenseLogicModal);
    t.appendChild(helpBtn);
    section.appendChild(t);

    // Compute richer per-fight info: max attacker fame, adjacent owned NC, march suggestion.
    var enriched = def.map(function(d){
      var atks = (d.attackerSids || []).slice();
      var atkFames = atks.map(function(s){ return { sid: s, fame: fameOfSid(rd, s) }; });
      atkFames.sort(function(a,b){ return b.fame - a.fame; });
      var topFame = atkFames[0] ? atkFames[0].fame : 0;
      var march = marchSuggestionMultiAttack(atkFames.map(function(a){ return a.fame; }), 'DEFEND');
      var adjNcs = adjacentOwnedNCs(rd, d.seq);
      var maxAdjLevel = adjNcs.reduce(function(m, n){ return Math.max(m, n.level); }, 0);
      return { d: d, atkFames: atkFames, topFame: topFame, march: march, adjNcs: adjNcs, maxAdjLevel: maxAdjLevel };
    });
    // Sort: alliance defense priority (if set) wins, then protect higher-
    // level NCs, then attacker fame desc, then 3-way first.
    var defPrio = (rd.focusOverrides && rd.focusOverrides.alliancePriorityDefense) || [];
    var defPrioIdx = {};
    defPrio.forEach(function(seq, i){ defPrioIdx[seq] = i; });
    enriched.sort(function(a,b){
      var ai = defPrioIdx[a.d.seq], bi = defPrioIdx[b.d.seq];
      if (ai != null && bi != null) return ai - bi;
      if (ai != null) return -1;
      if (bi != null) return 1;
      if (b.maxAdjLevel !== a.maxAdjLevel) return b.maxAdjLevel - a.maxAdjLevel;
      if (b.topFame !== a.topFame) return b.topFame - a.topFame;

  function ncStartTimeForRound(rd){
    if (rd && rd.ncBattleStart) return rd.ncBattleStart;
    if (rd && rd.roundFightTime && rd.roundFightTime.length){
      var nowSec = Math.floor(Date.now() / 1000);
      var future = rd.roundFightTime.filter(function(t){ return t > nowSec; });
      if (future.length) return future[0];
    }
    return null;
  }

  function buildNcCountdown(target){
    var wrap = el('div', 'nc-countdown');
    wrap.appendChild(el('span', 'nc-cd-label', 'Battle starts in'));
    var v = el('span', null, '');
    wrap.appendChild(v);
    function tick(){
      var nowSec = Math.floor(Date.now() / 1000);
      var d = target - nowSec;
      if (d <= 0){ v.textContent = 'NOW — GO!'; v.style.color = 'var(--red)'; return; }
      var days = Math.floor(d / 86400); d -= days * 86400;
      var hrs  = Math.floor(d / 3600);  d -= hrs  * 3600;
      var mins = Math.floor(d / 60);
      var secs = d - mins * 60;
      var parts = [];
      if (days) parts.push(days + 'd');
      parts.push(String(hrs).padStart(2,'0') + 'h');
      parts.push(String(mins).padStart(2,'0') + 'm');
      if (!days) parts.push(String(secs).padStart(2,'0') + 's');
      v.textContent = parts.join(' ');
    }
    tick();
    setInterval(tick, 1000);
    return wrap;
  }

  // Stash the search wrap once so subsequent NC re-renders can re-attach
  // the same element instead of losing it when ncRoot is cleared.
  var _bpSearchWrap = null;
  function buildNCPlan(rd){
    var ncRoot = document.getElementById('ncRoot');
    // Detach the search wrap before clearing so it survives the rebuild.
    if (!_bpSearchWrap) _bpSearchWrap = document.querySelector('.bp-search-wrap');
    if (_bpSearchWrap && _bpSearchWrap.parentNode){
      _bpSearchWrap.parentNode.removeChild(_bpSearchWrap);
    }
    while (ncRoot.firstChild) ncRoot.removeChild(ncRoot.firstChild);
    var plan = rd.neutralCityPlan;
    if (!plan || !plan.fronts || !plan.fronts.length){
      // Put the search wrap back where we found it (if it had a home) or
      // leave it detached — page won't render NC anyway.
      return false;
    }
    window.__ncPlanTotal__ = plan.fronts.reduce(function(a, f){ return a + (f.count || 0); }, 0) || 1;
    buildNcHero(rd, ncRoot, plan);
    if (_bpSearchWrap) ncRoot.appendChild(_bpSearchWrap);
    buildNcRules(ncRoot);
    buildNcAltNote(plan, ncRoot);
    var fronts = el('div', 'nc-fronts');
    ncRoot.appendChild(fronts);
    plan.fronts.forEach(function(front, idx){ buildNcFront(front, idx, fronts); });
    buildNcFoot(ncRoot);
    return true;
  }

    ncRoot.style.display = '';
    root.style.display = 'none';
    btn.textContent = 'Show wasteland plan ▾';

        root.style.display = '';
        ncRoot.style.display = 'none';

        window.scrollTo(0, 0);
      } else {
        ncRoot.style.display = '';
        root.style.display = 'none';
        btn.textContent = 'Show wasteland plan ▾';
        window.scrollTo(0, 0);
      }
    });
  }

  var _bpTiers = null;

  function render(data){
    var root = document.getElementById('root');
    while (root.firstChild) root.removeChild(root.firstChild);
    var roundKey = String(data.currentRound);
    _bpRoundKey = roundKey;
    var rd = data.rounds[roundKey];
    _bpRoundData = rd;
    if (!rd){
      var e = el('div', 'error', 'No data for current round ' + roundKey);
      root.appendChild(e);
      return;
    }
    document.getElementById('hdrSub').textContent = ' · R' + roundKey;
    buildHero(rd, roundKey, root);
    buildPower(rd, root);
    buildR11Setup(rd, root);
    buildRules(root);
    buildPillagePriority(rd, root);
    buildFocus(rd, root);
    buildContested(rd, root);
    buildDefense(rd, root);
    buildNcFlow(rd, root);
    buildTwoHopFlow(rd, root);
    buildThreeHopFlow(rd, root);
    buildBuffs(rd, root);
    buildAssignment(rd, root);
    buildFoot(rd, root);
    buildSectionNav(root);
    makeAllSectionsCollapsible(root);
    ensureBackToTop();
    // NC plan default view
    var hasNc = buildNCPlan(rd);
    wireModeToggle(hasNc);
    // Bootstrap attendance cache once, then re-render the NC plan so any
    // already-attending players get the green chip on first paint.
    if (hasNc){

  // ===== PLAYER SEARCH =====
  var _players = null, _playersLoading = false;

  function bpLoadPlayers(cb){
    if (_players) { cb(_players); return; }
    if (_playersLoading) return;
    _playersLoading = true;
    var url = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? '../player-data.json?_t=' + Date.now()
      : 'https://raw.githubusercontent.com/texnottexas/landing-page/main/player-data.json?_t=' + Date.now();
    fetch(url, { cache: 'no-store' })
      .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function(arr){ _players = Array.isArray(arr) ? arr : []; _playersLoading = false; cb(_players); })
      .catch(function(){ _playersLoading = false; cb([]); });
  }

  function bpProfCode(p){
    var s = (p && p.profession || '').toLowerCase();
    if (s.indexOf('combat') >= 0 || s === 'ce') return 'ce';
    if (s.indexOf('mechanical') >= 0 || s === 'mm') return 'mm';
    return '';
  }

  function bpSearchPlayers(q, limit){
    if (!_players) return [];
    var qn = q.toLowerCase().trim();
    if (!qn) return [];
    var startsWith = [], contains = [];
    for (var i = 0; i < _players.length; i++){
      var p = _players[i];
      var nm = (p.name || '').toLowerCase();
      if (!nm) continue;
      if (nm === qn) startsWith.unshift(p);
      else if (nm.indexOf(qn) === 0) startsWith.push(p);
      else if (nm.indexOf(qn) > 0) contains.push(p);
      if (startsWith.length >= limit) break;
    }
    return startsWith.concat(contains).slice(0, limit);
  }

  function bpRenderResults(){
    while (bpSearchResults.firstChild) bpSearchResults.removeChild(bpSearchResults.firstChild);
    if (!_bpMatches.length){ bpSearchResults.classList.remove('active'); return; }
    _bpMatches.forEach(function(p, i){

  // ===== Attendance check-in (NC battle) — worker-backed =====
  // Honor-system: any visitor can mark any name. Reads/writes go to
  // push-worker /nc-attend, scoped by round key. Cloudflare KV is
  // eventually consistent (~60s) — a fresh GET after a DELETE can
  // still echo the old name, which made unchecking feel broken. We
  // overlay a client-side "pending" map on top of the worker response
  // for 2 minutes so user intent always wins until KV settles.
  var NC_ATTEND_WORKER = 'https://push-worker.27tb8s6fct.workers.dev/nc-attend';
  var NC_PENDING_TTL_MS = 120 * 1000;
  var _ncAttendCache = {}; // name -> true
  var _ncAttendLoaded = false;
  function ncAttendRoundKey(){
    return _bpRoundKey || (_bpRoundData && _bpRoundData._roundKey) || '10.5';
  }
  function loadAttending(){ return _ncAttendCache; }
  function isAttending(name){ return !!_ncAttendCache[name]; }
  function pendingStorageKey(){ return 'nc-attend-pending:' + ncAttendRoundKey(); }
  function getPending(){
    try {
      var raw = localStorage.getItem(pendingStorageKey());
      var p = raw ? JSON.parse(raw) : {};
      var now = Date.now();
      var changed = false;
      // Auto-expire stale entries so the overlay doesn't drift forever
      Object.keys(p).forEach(function(k){
        if (!p[k] || (now - p[k].ts) > NC_PENDING_TTL_MS){ delete p[k]; changed = true; }
      });
      if (changed) try { localStorage.setItem(pendingStorageKey(), JSON.stringify(p)); } catch(e){}
      return p;
    } catch(e){ return {}; }
  }
  function setPending(name, state){
    try {
      var p = getPending();
      p[name] = { state: !!state, ts: Date.now() };
      localStorage.setItem(pendingStorageKey(), JSON.stringify(p));
    } catch(e){}
  }
  function applyPendingOverlay(map){
    var p = getPending();
    var now = Date.now();
    Object.keys(p).forEach(function(name){
      if (!p[name] || (now - p[name].ts) > NC_PENDING_TTL_MS) return;
      if (p[name].state) map[name] = true;
      else delete map[name];
    });
    return map;
  }
  function refreshAttending(){
    return fetch(NC_ATTEND_WORKER + '?round=' + encodeURIComponent(ncAttendRoundKey()) + '&_=' + Date.now(),
      { cache: 'no-store' })
      .then(function(r){ return r.json(); })
      .then(function(d){
        var next = {};
        if (d && d.ok && Array.isArray(d.names)){
          d.names.forEach(function(n){ if (n) next[n] = true; });
        }
        _ncAttendCache = applyPendingOverlay(next);
        _ncAttendLoaded = true;
      })
      .catch(function(){ _ncAttendLoaded = true; });
  }
  function setAttending(name, on){
    // Optimistic local update + pending-overlay write + worker POST
    if (on) _ncAttendCache[name] = true;
    else delete _ncAttendCache[name];
    setPending(name, !!on);
    return fetch(NC_ATTEND_WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ round: ncAttendRoundKey(), name: name, attending: !!on }),
    }).then(function(r){ return r.json().catch(function(){ return null; }); });
  }
  // ===== Fighting pill =====

    fist.appendChild(svgEl('path', {

    }));

  function openFightingModal(rd){

      overlay.className = 'opp-modal-overlay';

  function buildFightingModalContent(rd){
    var modal = el('div', 'opp-modal');
    // Header
    var head = el('div', 'opp-modal-head');
    var title = el('div', 'opp-modal-title');
    title.appendChild(makeCheckmark(16));
    var n = attendingCount();
    title.appendChild(el('span', null, n + ' Fighting'));
    head.appendChild(title);
    var closeBtn = el('button', 'opp-modal-close');
    closeBtn.type = 'button';
    closeBtn.setAttribute('aria-label', 'Close');
    closeBtn.appendChild(document.createTextNode('×'));
    closeBtn.addEventListener('click', function(){
      document.getElementById('fightingModalOverlay').classList.remove('active');
    });
    head.appendChild(closeBtn);
    modal.appendChild(head);

    if (n === 0){
      var empty = el('div', 'opp-card-section');
      var p = document.createElement('p');
      p.style.cssText = 'color:var(--muted);font-size:.85rem;text-align:center;padding:1rem 0;';
      p.textContent = 'No one has signed up yet. Find your name in search and check the box.';
      empty.appendChild(p);
      modal.appendChild(empty);
      return modal;
    }

    // Group attending names by their assigned NC front. Unassigned = sitouts
    // who self-signed-up despite not being on the alliance roster.
    var plan = (rd.neutralCityPlan || {});
    var fronts = plan.fronts || [];
    var nameToFront = {};
    var nameToPlayer = {};
    fronts.forEach(function(f){
      (f.players || []).forEach(function(p){
        nameToFront[p.name] = f;
        nameToPlayer[p.name] = p;
      });
    });
    var groups = {};
    var unassigned = [];
    Object.keys(_ncAttendCache).forEach(function(name){
      if (!_ncAttendCache[name]) return;
      var f = nameToFront[name];
      if (!f){ unassigned.push(name); return; }
      if (!groups[f.key]) groups[f.key] = { front: f, names: [] };
      groups[f.key].names.push(name);
    });

    // Stable front order
    var KEY_ORDER = ['storm', 'lv3', 'lv2', 'lv1'];
    var orderedKeys = KEY_ORDER.filter(function(k){ return groups[k]; });
    Object.keys(groups).forEach(function(k){ if (KEY_ORDER.indexOf(k) < 0) orderedKeys.push(k); });

    orderedKeys.forEach(function(k){
      var g = groups[k];
      var sect = el('div', 'opp-card-section');
      var h5 = document.createElement('h5');
      var label = g.front.name || (g.front.level + ' Neutral City' + (g.front.showNum ? ' #' + g.front.showNum : ''));
      h5.appendChild(document.createTextNode(label + ' — ' + g.names.length + ' of ' + (g.front.players || []).length));
      sect.appendChild(h5);
      var list = el('div', 'nc-fight-list');
      // Sort within group by roster rank if available, else alphabetical
      g.names.sort(function(a, b){
        var ra = nameToPlayer[a] ? nameToPlayer[a].rank : 9999;
        var rb = nameToPlayer[b] ? nameToPlayer[b].rank : 9999;
        return ra - rb;
      });
      g.names.forEach(function(nm){
        var pl = nameToPlayer[nm];
        var row = el('div', 'nc-fight-row');
        row.appendChild(makeCheckmark(10));
        row.appendChild(el('span', 'nc-fight-name', nm));
        if (pl){
          if (pl.alliance) row.appendChild(el('span', 'nc-fight-alli', pl.alliance));
          if (pl.power)    row.appendChild(el('span', 'nc-fight-pw', fmtPower(pl.power)));
        }
        list.appendChild(row);
      });
      sect.appendChild(list);
      modal.appendChild(sect);
    });

    if (unassigned.length){
      var sect = el('div', 'opp-card-section');
      var h5 = document.createElement('h5');
      h5.appendChild(document.createTextNode('Unassigned — ' + unassigned.length));
      sect.appendChild(h5);
      var sub = document.createElement('p');
      sub.style.cssText = 'font-size:.7rem;color:var(--muted);margin-bottom:.4rem;font-style:italic;';
      sub.textContent = 'Signed up but not on the alliance roster. Sitouts who flipped or names entered without a match.';
      sect.appendChild(sub);
      var list = el('div', 'nc-fight-list');
      unassigned.sort();
      unassigned.forEach(function(nm){
        var row = el('div', 'nc-fight-row');
        row.appendChild(makeCheckmark(10));
        row.appendChild(el('span', 'nc-fight-name', nm));
        list.appendChild(row);
      });
      sect.appendChild(list);
      modal.appendChild(sect);
    }

    return modal;
  }

  function makeCheckmark(size){

  // Render NC-mode pick into the player search modal
  function renderNcPick(player, fightsContainer){
    var plan = (_bpRoundData && _bpRoundData.neutralCityPlan) || {};
    var fronts = plan.fronts || [];
    var name = (player.name || '').trim();
    // Find which front (if any) has this player assigned
    var match = null;
    for (var i = 0; i < fronts.length; i++){
      var pl = fronts[i].players || [];
      for (var j = 0; j < pl.length; j++){
        if (pl[j].name === name){
          match = { front: fronts[i], rank: j + 1, total: pl.length };
          break;
        }
      }
      if (match) break;
    }
    if (!match){
      var empty = el('div', 'pm-empty');
      empty.appendChild(document.createTextNode(name + ' is not on the NC plan this week.'));
      var sub = el('div');
      sub.style.cssText = 'margin-top:.4rem;font-size:.78rem;color:var(--muted);';
      sub.textContent = 'Sitout or unassigned — go help where the alliance needs you.';
      empty.appendChild(sub);
      fightsContainer.appendChild(empty);
      return;
    }
    var f = match.front;
    var row = el('div', 'pm-fight');
    // City label
    var label = (f.level || '') + (f.showNum ? ' #' + f.showNum : '');
    row.appendChild(el('span', 'pm-w', label));
    var buff = el('div', 'pm-buff');
    buff.appendChild(el('div', 'pm-buff-name', f.name || (f.level + ' Neutral City')));
    var meta2 = el('div', 'pm-buff-meta');
    var opps = (f.opponents || []).filter(Boolean);
    if (opps.length){
      var vs = el('span');
      vs.appendChild(document.createTextNode('vs '));
      opps.forEach(function(o, i){
        if (i > 0) vs.appendChild(document.createTextNode(', '));
        var m = String(o).match(/^S?(\d+)/);
        if (m) vs.appendChild(makeSidPill(parseInt(m[1], 10), _bpRoundData));
        else vs.appendChild(document.createTextNode(o));
      });
      meta2.appendChild(vs);
    } else {
      meta2.appendChild(el('span', null, 'Separate event — see Storm’s Eye page'));
    }
    meta2.appendChild(el('span', null, ' · #' + match.rank + ' of ' + match.total));
    if (f.tactic){
      var tac = el('div');
      tac.style.cssText = 'margin-top:.35rem;font-size:.74rem;color:var(--muted);font-style:italic;';
      tac.textContent = f.tactic;
      buff.appendChild(meta2);
      buff.appendChild(tac);
    } else {
      buff.appendChild(meta2);
    }
    row.appendChild(buff);
    var tierLabel = (f.key === 'storm') ? 'STORM' :
                    (f.key === 'lv3' ? 'LV3' :
                     (f.key === 'lv2' ? 'LV2' :
                      (f.key === 'lv1' ? 'LV1' : f.key)));
    var tierClass = (f.key === 'storm') ? 'tA' :
                    (f.key === 'lv3' ? 'tA' :
                     (f.key === 'lv2' ? 'tB' :
                      (f.key === 'lv1' ? 'tC' : 'tD')));
    row.appendChild(el('span', 'pm-tier ' + tierClass, tierLabel));
    fightsContainer.appendChild(row);

    // Attendance check-in box
    var checkBox = el('div', 'pm-attend');
    var attending = isAttending(player.name);
    if (attending) checkBox.classList.add('on');
    var label = document.createElement('label');
    label.className = 'pm-attend-label';
    var box = document.createElement('input');
    box.type = 'checkbox';
    box.checked = attending;
    box.className = 'pm-attend-box';
    label.appendChild(box);
    var txt = el('span', 'pm-attend-txt', attending ? 'Me fight (signed up).' : 'Me fight.');
    label.appendChild(txt);
    checkBox.appendChild(label);
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'pm-attend-btn';
    btn.textContent = attending ? 'Update' : 'Submit';
    var statusMsg = el('span', 'pm-attend-status', '');
    btn.addEventListener('click', function(){
      var nowOn = box.checked;
      statusMsg.textContent = '… saving';
      statusMsg.classList.remove('on');
      btn.disabled = true;
      setAttending(player.name, nowOn).then(function(resp){
        btn.disabled = false;
        if (resp && resp.ok){
          statusMsg.textContent = nowOn ? '✓ Saved — me fight.' : '✓ Saved — no fight.';
          statusMsg.classList.toggle('on', nowOn);
          txt.textContent = nowOn ? 'Me fight (signed up).' : 'Me fight.';
          checkBox.classList.toggle('on', nowOn);
          btn.textContent = nowOn ? 'Update' : 'Submit';
          // Re-render NC fronts so the player chip turns green now,
          // and bump the Fighting pill count.
          if (_bpRoundData && _bpRoundData.neutralCityPlan){
            var ncRoot = document.getElementById('ncRoot');
            if (ncRoot) buildNCPlan(_bpRoundData);
          }
          refreshFightingPillCount();
        } else {
          statusMsg.textContent = '⚠ Save failed — try again';
          statusMsg.classList.remove('on');
          // Revert optimistic cache flip
          if (nowOn) delete _ncAttendCache[player.name];
          else _ncAttendCache[player.name] = true;
        }
      });
    });
    checkBox.appendChild(btn);
    checkBox.appendChild(statusMsg);
    fightsContainer.appendChild(checkBox);
  }

  function bpPickFights(p){
    if (!_bpTiers) return [];
    var pc = bpProfCode(p);
    var prefer = pc === 'ce'
      ? [_bpTiers.A, _bpTiers.B, _bpTiers.C, _bpTiers.D]
      : pc === 'mm'
        ? [_bpTiers.B, _bpTiers.C, _bpTiers.A, _bpTiers.D]
        : [_bpTiers.A, _bpTiers.B, _bpTiers.C, _bpTiers.D];
    var picks = [];
    var tierLetters = ['A','B','C','D'];
    var letterByList = {};
    if (pc === 'ce') { letterByList[0]='A'; letterByList[1]='B'; letterByList[2]='C'; letterByList[3]='D'; }
    else if (pc === 'mm') { letterByList[0]='B'; letterByList[1]='C'; letterByList[2]='A'; letterByList[3]='D'; }
    else { letterByList[0]='A'; letterByList[1]='B'; letterByList[2]='C'; letterByList[3]='D'; }
    for (var i = 0; i < prefer.length && picks.length < 4; i++){
      for (var j = 0; j < prefer[i].length && picks.length < 4; j++){
        picks.push({ entry: prefer[i][j], tier: letterByList[i] });
      }
    }
    return picks;
  }

  function bpSelectPlayer(p){
    if (bpSearchInput) bpSearchInput.value = p.name || '';

  function bpDoSearch(){
    var q = bpSearchInput.value || '';
    _bpFocusedIdx = -1;
    if (!q.trim()){ _bpMatches = []; bpRenderResults(); return; }
    if (!_players){
      bpLoadPlayers(function(){ _bpMatches = bpSearchPlayers(q, 5); bpRenderResults(); });
      return;
    }
    _bpMatches = bpSearchPlayers(q, 5);
    if (!_bpMatches.length){
      while (bpSearchResults.firstChild) bpSearchResults.removeChild(bpSearchResults.firstChild);
      bpSearchResults.appendChild(el('div', 'bp-search-empty', 'No player matches that name.'));
      bpSearchResults.classList.add('active');
      return;
    }
    bpRenderResults();
  }

  if (bpSearchInput){
    bpSearchInput.addEventListener('focus', function(){ bpLoadPlayers(function(){}); });
    bpSearchInput.addEventListener('input', bpDoSearch);
    bpSearchInput.addEventListener('keydown', function(ev){
      if (ev.key === 'Escape'){ bpSearchResults.classList.remove('active'); bpSearchInput.blur(); return; }
      if (!_bpMatches.length) return;
      if (ev.key === 'ArrowDown'){ ev.preventDefault(); _bpFocusedIdx = Math.min(_bpMatches.length - 1, _bpFocusedIdx + 1); bpRenderResults(); }
      else if (ev.key === 'ArrowUp'){ ev.preventDefault(); _bpFocusedIdx = Math.max(0, _bpFocusedIdx - 1); bpRenderResults(); }
      else if (ev.key === 'Enter'){ ev.preventDefault(); var pick = _bpMatches[_bpFocusedIdx >= 0 ? _bpFocusedIdx : 0]; if (pick) bpSelectPlayer(pick); }
    });
    document.addEventListener('click', function(ev){
      if (!bpSearchInput.contains(ev.target) && !bpSearchResults.contains(ev.target)) bpSearchResults.classList.remove('active');
    });
    document.addEventListener('keydown', function(ev){
      if (ev.key === 'Escape' && bpPmEl.classList.contains('active')) { bpCloseModal(); ev.stopPropagation(); }
    });
  }

  var DATA_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? '../data/ssc-map.json?_t=' + Date.now()
    : 'https://raw.githubusercontent.com/texnottexas/landing-page/main/data/ssc-map.json?_t=' + Date.now();
  fetch(DATA_URL, { cache: 'no-store' })
    .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function(err){ showError(err.message); });
})();
</script>
