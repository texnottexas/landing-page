<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com https://www.clarity.ms https://*.clarity.ms https://c.bing.com; style-src 'self' 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; connect-src 'self' https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com https://raw.githubusercontent.com https://push-worker.27tb8s6fct.workers.dev https://*.clarity.ms https://c.bing.com; img-src 'self' https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://www.google.com data: https://knight-cdn.akamaized.net https://h5.topwargame.com https://*.clarity.ms https://c.bing.com; frame-ancestors 'none'; frame-src https://translate.google.com;">
<title>S2864 Battle Plan</title>
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --card:#1c2128; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#79c0ff;
  --red:#f85149; --green:#3fb950; --yellow:#d29922; --navy:#388bfd; --purple:#a371f7;
  --tier-s:#f85149; --tier-a:#d29922; --tier-b:#79c0ff; --tier-c:#3fb950; --tier-d:#8b949e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:100;padding-top:calc(.65rem + env(safe-area-inset-top,0px));}
.hdr-left{display:flex;align-items:center;gap:.5rem;min-width:0;flex:1;}
.hdr-title{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-title .dim{color:var(--muted);font-weight:400;margin-left:.3rem;}
.home-btn,.lang-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .55rem;font-size:.78rem;text-decoration:none;transition:border-color .15s,color .15s;cursor:pointer;font-family:inherit;}
.home-btn:hover,.lang-btn:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}
.lang-btn{gap:.3rem;}
.lang-btn #langCode{font-size:.7rem;color:var(--muted);}
.notranslate{unicode-bidi:isolate;}
#google_translate_element{position:absolute;left:-9999px;opacity:0;pointer-events:none;}
.wrap{max-width:1080px;margin:0 auto;padding:1rem;}
@media (min-width:640px){.wrap{padding:1.25rem;}}

.hero{background:linear-gradient(135deg,rgba(121,192,255,.06),rgba(163,113,247,.05));border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem;}
.hero h1{font-size:1.15rem;font-weight:800;letter-spacing:-.01em;margin-bottom:.25rem;display:flex;align-items:center;gap:.5rem;}
.hero h1 svg{color:var(--accent);}
.hero .sub{font-size:.78rem;color:var(--muted);}
.hero .sub b{color:var(--text);}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.55rem;margin-top:.9rem;}
@media (max-width:560px){.hero-stats{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.6rem .5rem;text-align:center;}
.stat .v{font-size:1.1rem;font-weight:800;line-height:1.1;}
.stat .l{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:.25rem;}
.stat.v-green .v{color:var(--green);}
.stat.v-yellow .v{color:var(--yellow);}
.stat.v-accent .v{color:var(--accent);}
.stat.v-red .v{color:var(--red);}

.sect{margin-bottom:1.5rem;}
.sect-title{display:flex;align-items:center;gap:.5rem;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.65rem;padding-bottom:.4rem;border-bottom:1px solid var(--border);}
.sect-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sect-title .tag{margin-left:auto;font-size:.6rem;color:var(--muted);font-weight:500;letter-spacing:.02em;text-transform:none;}
.sect-title .tag + .tag{margin-left:.25rem;}
.sect-title .tag-accent{background:rgba(121,192,255,.08);border:1px solid rgba(121,192,255,.3);color:var(--accent);padding:.12rem .4rem;border-radius:5px;}
.sect-title.sect-toggle{transition:opacity .15s;}
.sect-title.sect-toggle:hover{opacity:.85;}
.sect-chev{display:inline-flex;align-items:center;color:var(--muted);transition:transform .15s;}
table.power tbody tr{transition:background .1s;}
table.power tbody tr:hover{background:rgba(121,192,255,.06);}
table.power tbody tr.us:hover{background:rgba(63,185,80,.1);}
td.power-top-merit{font-size:.72rem;color:var(--muted);}
/* Power Index methodology — shimmer card */
.pi-method-wrap{margin-bottom:1rem;}
.pi-method-header{display:flex;align-items:center;gap:.5rem;cursor:pointer;user-select:none;padding:.7rem 1rem;background:var(--card);border:1px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:700;transition:background .15s;animation:pi-method-border 6s ease-in-out infinite;}
.pi-method-header:hover{animation:none;border-color:var(--accent);box-shadow:0 0 16px rgba(121,192,255,.3);background:var(--surface);}
.pi-method-header .htext{animation:pi-method-text 6s ease-in-out infinite;}
.pi-method-header:hover .htext{animation:none;color:var(--accent);}
.pi-method-header .chev{font-size:.7rem;transition:transform .2s;color:var(--muted);margin-left:auto;}
.pi-method-header.closed .chev{transform:rotate(-90deg);}
.pi-method-body{background:var(--card);border:1px solid var(--border);border-top:none;border-radius:0 0 8px 8px;padding:1rem 1.25rem;display:none;}
.pi-method-body.open{display:block;}
.pi-method-body p{font-size:.82rem;line-height:1.6;color:var(--muted);margin:.3rem 0 .6rem;}
.pi-method-body p:last-child{margin-bottom:0;}
.pi-method-body .formula{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:.7rem .9rem;margin:.4rem 0;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:.78rem;color:var(--text);line-height:1.7;overflow-x:auto;}
.pi-method-body .formula .w{color:var(--accent);font-weight:700;}
.pi-method-body ul{font-size:.82rem;line-height:1.6;color:var(--muted);margin:.4em 0 .75rem 1.2em;padding:0;}
.pi-method-body ul li b{color:var(--text);}
@keyframes pi-method-border{
  0%{border-color:var(--accent);box-shadow:0 0 12px rgba(121,192,255,.2);}
  33%{border-color:var(--green);box-shadow:0 0 12px rgba(63,185,80,.2);}
  66%{border-color:var(--yellow);box-shadow:0 0 12px rgba(210,153,34,.2);}
  100%{border-color:var(--accent);box-shadow:0 0 12px rgba(121,192,255,.2);}
}
@keyframes pi-method-text{
  0%{color:var(--accent);} 33%{color:var(--green);} 66%{color:var(--yellow);} 100%{color:var(--accent);}
}
/* R11 Setup section */
h4.r11-sub{display:flex;align-items:center;gap:.4rem;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:1.1rem 0 .5rem;}
h4.r11-sub svg{color:var(--red);}
.r11-wl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.55rem;margin-bottom:.5rem;}
.r11-wl-card{background:var(--card);border:1px solid rgba(248,81,73,.32);border-radius:8px;padding:.55rem .7rem;display:flex;flex-direction:column;gap:.3rem;}
.r11-wl-head{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.r11-wl-seq{font-family:'SF Mono',Consolas,monospace;font-weight:800;color:var(--text);font-size:.82rem;}
.r11-wl-lvl{font-size:.6rem;padding:.1rem .35rem;border-radius:4px;font-weight:800;}
.r11-wl-lvl.l3{background:rgba(248,81,73,.14);color:var(--red);}
.r11-wl-lvl.l2{background:rgba(210,153,34,.14);color:var(--yellow);}
.r11-wl-lvl.l1{background:rgba(121,192,255,.1);color:var(--accent);}
.r11-wl-spec{font-size:.7rem;color:var(--text);margin-left:auto;}
.r11-wl-foot{font-size:.66rem;color:var(--muted);}
.r11-wl-contest{color:var(--red);font-weight:600;}
.r11-wl-uncontested{color:var(--green);}
.r11-nc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:.55rem;}
.r11-nc-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.6rem .8rem;display:flex;flex-direction:column;gap:.35rem;}
.r11-nc-card.lock{border-color:rgba(248,81,73,.45);box-shadow:0 0 16px rgba(248,81,73,.12);}
.r11-nc-head{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.r11-nc-lvl{font-size:.62rem;padding:.1rem .4rem;border-radius:4px;font-weight:800;}
.r11-nc-lvl.l3{background:rgba(248,81,73,.14);color:var(--red);}
.r11-nc-lvl.l2{background:rgba(210,153,34,.14);color:var(--yellow);}
.r11-nc-lvl.l1{background:rgba(121,192,255,.1);color:var(--accent);}
.r11-nc-name{font-weight:700;color:var(--text);font-size:.85rem;}
.r11-nc-pos{font-size:.65rem;color:var(--muted);}
.r11-nc-prio{font-size:.58rem;padding:.12rem .4rem;border-radius:4px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;margin-left:auto;}
.r11-nc-prio.lock{background:rgba(248,81,73,.14);color:var(--red);border:1px solid rgba(248,81,73,.4);}
.r11-nc-prio.target{background:rgba(210,153,34,.14);color:var(--yellow);border:1px solid rgba(210,153,34,.4);}
.r11-nc-why{font-size:.74rem;color:var(--muted);line-height:1.4;}
.r11-wl-card.curated{border-color:rgba(248,81,73,.45);box-shadow:0 0 10px rgba(248,81,73,.1);}
.r11-wl-card.auto{border-color:rgba(121,192,255,.3);background:rgba(121,192,255,.04);}
.r11-wl-card.auto2{border-color:rgba(163,113,247,.3);background:rgba(163,113,247,.04);}
.r11-wl-hops{font-size:.66rem;color:var(--muted);display:flex;flex-wrap:wrap;align-items:center;gap:.25rem;}
.r11-wl-hint{font-size:.66rem;color:var(--muted);font-style:italic;}
.r11-hop-pill{font-family:'SF Mono',Consolas,monospace;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:.05rem .3rem;color:var(--text);font-size:.65rem;font-weight:700;}
.r11-hop-pill.via{color:var(--muted);}
.r11-hop-pill.curated{background:rgba(248,81,73,.1);border-color:rgba(248,81,73,.4);color:var(--red);}
.r11-more{font-style:italic;color:var(--muted);}
.r11-sub-auto svg{color:var(--accent);}
.r11-sub-count{margin-left:.5rem;font-size:.62rem;color:var(--muted);font-weight:500;text-transform:none;letter-spacing:0;}
/* R11 Declarable combat (inverse view) */
.r11-decl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.5rem;margin-bottom:.5rem;}
.r11-decl-card{background:var(--card);border:1px solid rgba(121,192,255,.3);border-radius:8px;padding:.55rem .7rem;display:flex;flex-direction:column;gap:.3rem;}
.r11-decl-card.locked{border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.04);}
.r11-decl-head{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.r11-decl-seq{font-family:'SF Mono',Consolas,monospace;font-weight:800;color:var(--text);font-size:.82rem;}
.r11-decl-spec{font-size:.66rem;color:var(--muted);}
.r11-decl-locked{margin-left:auto;font-size:.55rem;padding:.1rem .35rem;border-radius:4px;background:rgba(248,81,73,.14);color:var(--red);border:1px solid rgba(248,81,73,.4);font-weight:800;letter-spacing:.04em;text-transform:uppercase;}
.r11-decl-via{font-size:.7rem;color:var(--muted);display:flex;flex-wrap:wrap;align-items:center;gap:.25rem;}
/* Buff cap row modal — wasteland breakdown */
.buff-row:hover{border-color:var(--accent);background:rgba(121,192,255,.04);}
.buff-modal-list{display:flex;flex-direction:column;gap:.3rem;max-height:260px;overflow-y:auto;}
.buff-modal-row{display:flex;align-items:center;gap:.4rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.3rem .55rem;font-size:.74rem;flex-wrap:wrap;}
.buff-modal-row .bm-seq{font-family:'SF Mono',Consolas,monospace;font-weight:800;color:var(--text);}
.buff-modal-row .bm-lvl{font-size:.55rem;padding:.1rem .35rem;border-radius:4px;font-weight:800;}
.buff-modal-row .bm-lvl.l3{background:rgba(248,81,73,.14);color:var(--red);}
.buff-modal-row .bm-lvl.l2{background:rgba(210,153,34,.14);color:var(--yellow);}
.buff-modal-row .bm-lvl.l1{background:rgba(121,192,255,.1);color:var(--accent);}
.buff-modal-row .bm-spec{color:var(--text);font-weight:600;flex:1;min-width:0;}
.buff-modal-row .bm-tags{display:flex;gap:.25rem;flex-wrap:wrap;}
.buff-modal-row .bm-tag{font-size:.58rem;padding:.1rem .35rem;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;}
.buff-modal-row .bm-tag.tag-r11{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.35);}
.buff-modal-row .bm-tag.tag-contested{background:rgba(210,153,34,.12);color:var(--yellow);border:1px solid rgba(210,153,34,.35);}
.buff-modal-row .bm-tag.tag-uncontested{background:rgba(63,185,80,.1);color:var(--green);border:1px solid rgba(63,185,80,.3);}
.buff-modal-row .bm-via{font-size:.66rem;color:var(--muted);display:flex;flex-wrap:wrap;align-items:center;gap:.25rem;}
.buff-modal-row .bm-via-pill{font-family:'SF Mono',Consolas,monospace;background:var(--card);border:1px solid var(--border);border-radius:4px;padding:.05rem .3rem;color:var(--text);font-size:.62rem;font-weight:700;}
.buff-modal-row .bm-via-pill.curated{background:rgba(248,81,73,.1);border-color:rgba(248,81,73,.4);color:var(--red);}
.bm-empty{font-size:.72rem;color:var(--muted);font-style:italic;padding:.5rem;text-align:center;}
/* Priority flag on focus rows */
.focus-row.r11-prio{box-shadow:inset 4px 0 0 var(--red);}
.focus-row .r11-prio-badge{display:inline-flex;align-items:center;gap:.25rem;background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.35);padding:.05rem .4rem;border-radius:4px;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-left:.4rem;}
.focus-row .fr-pin-badge{display:inline-flex;align-items:center;gap:.25rem;background:rgba(255,200,55,.16);color:#ffc837;border:1px solid rgba(255,200,55,.45);padding:.05rem .4rem;border-radius:4px;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-left:.4rem;}
.focus-row .fr-aprio-badge{display:inline-flex;align-items:center;gap:.25rem;background:rgba(56,139,253,.14);color:var(--navy);border:1px solid rgba(56,139,253,.45);padding:.05rem .4rem;border-radius:4px;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;margin-left:.4rem;}
.focus-row .fr-demote-badge{display:inline-flex;align-items:center;gap:.25rem;background:rgba(139,148,158,.12);color:var(--muted);border:1px solid rgba(139,148,158,.35);padding:.05rem .4rem;border-radius:4px;font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-left:.4rem;}
.focus-row.pinned{border-left-color:#ffc837;box-shadow:inset 3px 0 0 #ffc837;background:rgba(255,200,55,.04);}
.focus-row.alliance-priority{border-left-color:var(--navy);box-shadow:inset 3px 0 0 var(--navy);background:rgba(56,139,253,.04);}
.focus-row.demoted{opacity:.65;}
.focus-row.demoted .fr-w{color:var(--muted);}
.focus-row .fr-alliance-note{display:flex;align-items:flex-start;gap:.35rem;color:#79c0ff;font-size:.7rem;font-style:italic;padding:.25rem 0 .1rem;}
.focus-row .fr-alliance-note svg{flex-shrink:0;margin-top:.15rem;}

.rule-box{background:rgba(163,113,247,.06);border:1px solid rgba(163,113,247,.28);border-radius:10px;padding:.85rem 1rem;margin-bottom:1.1rem;display:flex;gap:.7rem;align-items:flex-start;}
.rule-box svg{flex-shrink:0;color:var(--purple);margin-top:.15rem;}
.rule-box .body{font-size:.82rem;}
.rule-box .body strong{color:var(--purple);}
.rule-box .body p+p{margin-top:.4rem;}
.rule-box.accent{background:rgba(121,192,255,.05);border-color:rgba(121,192,255,.28);}
.rule-box.accent svg{color:var(--accent);}
.rule-box.accent .body strong{color:var(--accent);}
.rule-box.green{background:rgba(63,185,80,.05);border-color:rgba(63,185,80,.3);}
.rule-box.green svg{color:var(--green);}
.rule-box.green .body strong{color:var(--green);}

.power-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;}
table.power{width:100%;min-width:560px;border-collapse:collapse;font-size:.78rem;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
table.power th{background:var(--surface);text-align:left;padding:.55rem .65rem;font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:1px solid var(--border);}
table.power td{padding:.5rem .65rem;border-bottom:1px solid var(--border);}
table.power tr:last-child td{border-bottom:none;}
table.power tr.us{background:rgba(121,192,255,.08);}
table.power tr.us td{font-weight:700;}
table.power.power-collapsed .hidden-row{display:none;}
.tier-pill{display:inline-block;padding:.1rem .45rem;border-radius:5px;font-size:.66rem;font-weight:800;letter-spacing:.05em;border:1px solid currentColor;background:rgba(255,255,255,.04);}
.tier-S{color:var(--tier-s);}
.tier-A{color:var(--tier-a);}
.tier-B{color:var(--tier-b);}
.tier-C{color:var(--tier-c);}
.tier-D{color:var(--tier-d);}
.pi-bar{display:inline-block;width:60px;height:6px;background:var(--surface);border-radius:3px;vertical-align:middle;margin-left:.4rem;overflow:hidden;}
.pi-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));}
.pow-toggle{margin-top:.5rem;font-size:.72rem;background:none;border:1px dashed var(--border);color:var(--muted);padding:.35rem .65rem;border-radius:6px;cursor:pointer;font-family:inherit;width:100%;}
.pow-toggle:hover{color:var(--accent);border-color:var(--accent);}

.fights{display:grid;gap:.6rem;grid-template-columns:1fr;}
@media (min-width:680px){.fights{grid-template-columns:repeat(2,1fr);}}
@media (min-width:1000px){.fights{grid-template-columns:repeat(3,1fr);}}
.fight{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.75rem .9rem;display:flex;flex-direction:column;gap:.4rem;position:relative;overflow:hidden;}
.fight::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.fight.p1::before{background:var(--red);}
.fight.p2::before{background:var(--yellow);}
.fight.p3::before{background:var(--accent);}
.fight.p4::before{background:var(--muted);}
.fight.threeway{box-shadow:inset 0 0 0 1px rgba(210,153,34,.45);background:rgba(210,153,34,.04);}
.fight .lvl.threeway-tag{margin-left:.3rem;color:var(--yellow);font-weight:700;}
.fight.defense::before{background:var(--navy);}
.fight.defense{background:rgba(56,139,253,.05);border-color:rgba(56,139,253,.3);}
.fight-opp-wrap{display:flex;flex-direction:column;gap:.25rem;}
.fight-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.4rem;}
.fight-id{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:.35rem;}
.fight-id .lvl{font-size:.55rem;padding:.1rem .4rem;border-radius:5px;background:rgba(121,192,255,.1);color:var(--accent);border:1px solid rgba(121,192,255,.25);font-weight:700;letter-spacing:.04em;}
.fight-prio{font-size:.55rem;padding:.15rem .45rem;border-radius:5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;}
.prio-1{background:rgba(248,81,73,.14);color:var(--red);border:1px solid rgba(248,81,73,.3);}
.prio-2{background:rgba(210,153,34,.12);color:var(--yellow);border:1px solid rgba(210,153,34,.3);}
.prio-3{background:rgba(121,192,255,.1);color:var(--accent);border:1px solid rgba(121,192,255,.28);}
.prio-4{background:rgba(139,148,158,.08);color:var(--muted);border:1px solid var(--border);}
.fight-spec{font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.35rem;}
.fight-spec svg{flex-shrink:0;color:var(--accent);}
.fight-opp{font-size:.72rem;padding:.4rem .55rem;border-radius:6px;background:rgba(121,192,255,.06);border:1px solid rgba(121,192,255,.25);color:var(--text);display:flex;align-items:center;gap:.35rem;cursor:pointer;transition:border-color .15s,background .15s;font-family:inherit;text-align:left;width:100%;}
.fight-opp:hover{border-color:var(--accent);background:rgba(121,192,255,.1);}
.fight-opp svg{flex-shrink:0;color:var(--accent);}
.fight-opp .opp-sid{font-weight:700;color:var(--text);}
.fight-opp .opp-where{color:var(--muted);}
.fight-opp .opp-info-icon{margin-left:auto;color:var(--muted);flex-shrink:0;opacity:.7;}
.fight-opp:hover .opp-info-icon{color:var(--accent);opacity:1;}

/* Opponent details modal */
.opp-modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:1rem;}
.opp-modal-overlay.active{display:flex;}
.opp-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.4rem;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;}
.opp-modal-head{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-bottom:.85rem;padding-bottom:.6rem;border-bottom:1px solid var(--border);}
.opp-modal-title{font-size:1.15rem;font-weight:800;display:flex;align-items:center;gap:.5rem;}
.opp-modal-title .verdict{font-size:.6rem;padding:.15rem .45rem;border-radius:5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;}
.opp-modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;padding:.2rem .4rem;border-radius:6px;}
.opp-modal-close:hover{background:var(--surface);color:var(--text);}
.opp-stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.45rem;margin-bottom:.85rem;}
.opp-stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem .65rem;}
.opp-stat .lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:.15rem;}
.opp-stat .val{font-size:.95rem;font-weight:800;color:var(--text);}
.opp-stat .sub{font-size:.62rem;color:var(--muted);margin-top:.2rem;font-weight:500;}
.opp-verdict-card{background:rgba(121,192,255,.05);border:1px solid rgba(121,192,255,.25);border-radius:8px;padding:.7rem .85rem;font-size:.78rem;color:var(--text);line-height:1.5;}
.opp-verdict-card.threat{background:rgba(248,81,73,.06);border-color:rgba(248,81,73,.3);}
.opp-verdict-card.watch{background:rgba(210,153,34,.06);border-color:rgba(210,153,34,.3);}
.opp-verdict-card.easy{background:rgba(63,185,80,.05);border-color:rgba(63,185,80,.28);}
.opp-verdict-card b{color:var(--text);font-weight:700;}
.opp-other-fights{margin-top:.85rem;padding-top:.65rem;border-top:1px solid var(--border);}
.opp-other-fights h5{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:.4rem;}
.opp-other-list{display:flex;flex-wrap:wrap;gap:.3rem;font-size:.7rem;}
.opp-other-pill{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:.15rem .45rem;color:var(--text);font-family:'SF Mono',Consolas,monospace;}
.opp-card-section{margin-top:.85rem;padding-top:.65rem;border-top:1px solid var(--border);}
.opp-card-section h5{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:.5rem;}
.opp-buff-list{display:flex;flex-direction:column;gap:.35rem;}
.opp-buff-row{display:flex;align-items:center;gap:.45rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.35rem .55rem;font-size:.74rem;}
.opp-buff-row .opp-buff-name{flex:1;font-weight:600;color:var(--text);}
.opp-buff-row .opp-buff-val{color:var(--yellow);font-weight:800;font-family:'SF Mono',Consolas,monospace;}
.opp-buff-row .opp-buff-pct{color:var(--muted);font-size:.62rem;font-family:'SF Mono',Consolas,monospace;margin-left:.25rem;}
.opp-buff-row.combat .opp-buff-val{color:var(--red);}
.opp-buff-row.zero{opacity:.55;}
.opp-buff-row.zero .opp-buff-val{color:var(--muted);}
.opp-buff-empty{color:var(--muted);font-style:italic;font-size:.72rem;text-align:center;padding:.4rem;border:1px dashed var(--border);border-radius:6px;}
.opp-buff-note{font-size:.66rem;color:var(--muted);font-style:italic;margin-top:.35rem;line-height:1.35;}
.opp-headline{display:flex;align-items:center;gap:.55rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem .6rem;margin-bottom:.5rem;}
.opp-headline .av{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--border);object-fit:cover;flex-shrink:0;}
.opp-headline .av-fb{width:34px;height:34px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.85rem;font-weight:700;color:var(--muted);flex-shrink:0;}
.opp-headline .hl-meta{flex:1;min-width:0;display:flex;flex-direction:column;gap:.1rem;}
.opp-headline .hl-name{font-size:.85rem;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.opp-headline .hl-sub{font-size:.66rem;color:var(--muted);}
.opp-headline .hl-score{font-size:.85rem;font-weight:700;color:var(--accent);font-family:'SF Mono',Consolas,monospace;}
.opp-merit-list{display:flex;flex-direction:column;gap:.25rem;max-height:260px;overflow-y:auto;}
.opp-merit-row{display:flex;align-items:center;gap:.45rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.3rem .5rem;font-size:.72rem;}
.opp-merit-row .av{width:22px;height:22px;border-radius:50%;background:var(--card);border:1px solid var(--border);object-fit:cover;flex-shrink:0;}
.opp-merit-row .av-fb{width:22px;height:22px;border-radius:50%;background:var(--card);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:700;color:var(--muted);flex-shrink:0;}
.opp-merit-row .rk{color:var(--muted);font-family:'SF Mono',Consolas,monospace;font-size:.65rem;width:3.2rem;flex-shrink:0;}
.opp-merit-row .nm{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;color:var(--text);}
.opp-merit-row .sc{color:var(--accent);font-family:'SF Mono',Consolas,monospace;font-size:.7rem;}
.opp-card-summary{display:flex;flex-wrap:wrap;gap:.3rem .8rem;font-size:.7rem;color:var(--muted);margin:.3rem 0 .55rem;}
.opp-card-summary b{color:var(--text);font-weight:700;font-family:'SF Mono',Consolas,monospace;}
.fight-bonus{font-size:.68rem;padding:.3rem .45rem;border-radius:6px;background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.28);color:var(--green);display:flex;align-items:center;gap:.35rem;}
.fight-bonus svg{flex-shrink:0;}

.nc-flow{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.nc-row{display:flex;align-items:center;gap:.7rem;padding:.6rem .85rem;border-bottom:1px solid var(--border);}
.nc-row:last-child{border-bottom:none;}
.nc-row svg{color:var(--green);flex-shrink:0;}
.nc-row .nc-name{flex:1;min-width:0;font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.nc-row .nc-lvl{font-size:.6rem;padding:.08rem .35rem;border-radius:4px;font-weight:800;}
.nc-row .nc-lvl.l3{background:rgba(248,81,73,.14);color:var(--red);}
.nc-row .nc-lvl.l2{background:rgba(210,153,34,.14);color:var(--yellow);}
.nc-row .nc-lvl.l1{background:rgba(121,192,255,.1);color:var(--accent);}
.nc-row .nc-pos{color:var(--muted);font-size:.7rem;font-weight:500;}
.nc-row .nc-via{font-size:.7rem;color:var(--muted);text-align:right;flex-shrink:0;}
.nc-row .nc-via b{color:var(--text);}
.nc-row .nc-via b.via-ownednc{color:var(--green);}
.nc-row .nc-via .via-tag{display:inline-block;margin-left:.35rem;padding:.05rem .35rem;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;border-radius:4px;background:rgba(63,185,80,.14);color:var(--green);border:1px solid rgba(63,185,80,.3);}
.nc-row .nc-via .path-break{height:.2rem;}
.nc-row.nc-target{background:rgba(210,153,34,.06);box-shadow:inset 3px 0 0 var(--yellow);}
.nc-target-badge{display:inline-block;margin-left:.35rem;padding:.08rem .4rem;font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;border-radius:4px;background:rgba(210,153,34,.18);color:var(--yellow);border:1px solid rgba(210,153,34,.45);}
.nc-target-tag{display:inline-block;margin:0 .15rem;padding:.05rem .4rem;font-size:.7rem;font-weight:800;border-radius:5px;}
.nc-target-tag.l3{background:rgba(248,81,73,.14);color:var(--red);border:1px solid rgba(248,81,73,.3);}
.nc-target-tag.l2{background:rgba(210,153,34,.14);color:var(--yellow);border:1px solid rgba(210,153,34,.3);}
.nc-target-tag.l1{background:rgba(121,192,255,.14);color:var(--accent);border:1px solid rgba(121,192,255,.3);}
.nc-target-rule{margin-top:.4rem;font-size:.7rem;color:var(--muted);font-style:italic;}
/* Pillage Priority section */
.pillage-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:.7rem;}
.pillage-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;display:flex;flex-direction:column;gap:.5rem;}
.pillage-card.l3{border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.04);}
.pillage-card.l2{border-color:rgba(210,153,34,.4);background:rgba(210,153,34,.04);}
.pillage-card.l1{border-color:rgba(121,192,255,.4);background:rgba(121,192,255,.04);}
.pillage-head{display:flex;align-items:center;gap:.5rem;}
.pillage-lvl{padding:.1rem .45rem;border-radius:5px;font-size:.7rem;font-weight:800;letter-spacing:.04em;}
.pillage-lvl.l3{background:rgba(248,81,73,.18);color:var(--red);}
.pillage-lvl.l2{background:rgba(210,153,34,.18);color:var(--yellow);}
.pillage-lvl.l1{background:rgba(121,192,255,.18);color:var(--accent);}
.pillage-name{font-weight:700;font-size:.95rem;flex:1;}
.pillage-pts{font-size:.72rem;color:var(--muted);font-weight:700;background:var(--card);padding:.1rem .45rem;border:1px solid var(--border);border-radius:5px;}
.pillage-attack{font-size:.78rem;color:var(--text);line-height:1.5;}
.pillage-attack.pillage-noop{color:var(--muted);font-style:italic;}
.pillage-note{font-size:.7rem;color:var(--muted);font-style:italic;border-top:1px dashed var(--border);padding-top:.4rem;}
/* Verb pills (TAKE / DEFEND) */
.verb{display:inline-block;padding:.1rem .45rem;border-radius:5px;font-size:.65rem;font-weight:800;letter-spacing:.05em;border:1px solid currentColor;}
.verb-take{background:rgba(63,185,80,.12);color:var(--green);}
.verb-defend{background:rgba(56,139,253,.12);color:var(--navy);}
/* Fight march suggestion row */
.fight-march{display:flex;align-items:center;gap:.4rem;padding:.35rem .55rem;border-radius:6px;font-size:.72rem;background:var(--card);border:1px solid var(--border);}
.fight-march b{color:var(--text);}
.fight-march svg{flex-shrink:0;}
.fight-march.tone-high{background:rgba(248,81,73,.08);border-color:rgba(248,81,73,.3);color:var(--red);}
.fight-march.tone-mid{background:rgba(210,153,34,.06);border-color:rgba(210,153,34,.28);color:var(--yellow);}
.fight-march.tone-low{background:rgba(121,192,255,.06);border-color:rgba(121,192,255,.25);color:var(--accent);}
.fight-march.tone-skip{background:rgba(139,148,158,.08);border-color:var(--border);color:var(--muted);font-style:italic;}
.fight-march .march-hint{color:var(--muted);font-style:italic;}
/* Adj-owned-NC tag on defense card */
.adj-nc-tag{font-size:.55rem;padding:.1rem .35rem;border-radius:4px;margin-left:.25rem;}
/* Section nav — sticky below page header */
.section-nav{display:flex;flex-wrap:wrap;gap:.4rem;padding:.55rem .25rem;position:sticky;top:54px;z-index:90;background:var(--bg);border-bottom:1px solid var(--border);margin-bottom:1rem;}
.section-nav a{display:inline-flex;align-items:center;gap:.3rem;padding:.35rem .65rem;background:var(--card);border:1px solid var(--border);border-radius:18px;font-size:.72rem;font-weight:600;color:var(--muted);text-decoration:none;transition:all .12s;}
.section-nav a:hover{color:var(--text);border-color:var(--accent);background:rgba(121,192,255,.08);}
.section-nav a.active{color:var(--text);border-color:var(--accent);background:rgba(121,192,255,.12);}
.section-nav a .nav-count{font-size:.66rem;background:var(--surface);color:var(--muted);padding:0 .35rem;border-radius:10px;font-weight:700;}
@media (max-width:700px){.section-nav{top:48px;padding:.4rem .15rem;gap:.3rem;}}
/* Section anchor offset (sticky nav + sticky header) */
section.sect{scroll-margin-top:120px;}
/* Back-to-top floating button */
.back-to-top{position:fixed;bottom:1.2rem;right:1.2rem;width:42px;height:42px;border-radius:50%;background:var(--accent);color:var(--bg);border:none;display:none;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.4);z-index:80;transition:transform .15s,background .15s;}
.back-to-top:hover{background:var(--text);transform:translateY(-2px);}
.back-to-top.visible{display:inline-flex;}
.back-to-top svg{stroke:var(--bg);transform:rotate(-90deg);}
@media (max-width:700px){.back-to-top{bottom:.9rem;right:.9rem;width:38px;height:38px;}}
/* Filter bar */
.filter-bar{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;padding:.5rem 0 .6rem;font-size:.74rem;}
.filter-bar label{color:var(--muted);font-weight:600;display:inline-flex;align-items:center;gap:.35rem;}
.filter-bar select{background:var(--card);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:.74rem;padding:.3rem .55rem;border-radius:6px;cursor:pointer;}
.filter-bar select:focus{outline:none;border-color:var(--accent);}
.filter-bar .filter-count{margin-left:auto;color:var(--muted);font-size:.7rem;font-style:italic;}
.filter-bar .filter-clear{background:none;border:1px dashed var(--border);color:var(--muted);font-family:inherit;font-size:.7rem;padding:.25rem .55rem;border-radius:6px;cursor:pointer;}
.filter-bar .filter-clear:hover{color:var(--text);border-color:var(--accent);}
/* Clamp fight grid + show-more */
.clampable.collapsed{max-height:520px;overflow:hidden;position:relative;}
.clampable.collapsed::after{content:'';position:absolute;left:0;right:0;bottom:0;height:80px;background:linear-gradient(to bottom,transparent,var(--bg) 90%);pointer-events:none;}
.focus-rows.clampable.collapsed{max-height:340px;}
.buff-list.clampable.collapsed{max-height:380px;}
.show-more-btn{display:block;width:100%;margin-top:.5rem;padding:.5rem;background:var(--surface);border:1px dashed var(--border);color:var(--accent);font-family:inherit;font-size:.78rem;font-weight:600;border-radius:8px;cursor:pointer;}
.show-more-btn:hover{border-color:var(--accent);background:rgba(121,192,255,.06);}
/* Help button + modal */
.help-btn{display:inline-flex;align-items:center;gap:.3rem;background:none;border:1px solid var(--border);color:var(--muted);font-family:inherit;font-size:.7rem;padding:.25rem .55rem;border-radius:6px;cursor:pointer;}
.help-btn:hover{color:var(--accent);border-color:var(--accent);}
.help-modal-overlay{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:1rem;}
.help-modal-overlay.show{display:flex;}
.help-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.4rem 1.6rem;max-width:760px;width:100%;max-height:85vh;overflow-y:auto;}
.help-modal h2{margin:0 0 .8rem;font-size:1.05rem;display:flex;align-items:center;gap:.5rem;}
.help-modal h3{margin:1rem 0 .5rem;font-size:.85rem;color:var(--accent);}
.help-modal p{margin:.3rem 0;font-size:.8rem;line-height:1.55;}
.help-modal table{width:100%;border-collapse:collapse;margin:.4rem 0;font-size:.74rem;}
.help-modal th{background:var(--surface);text-align:left;padding:.4rem .55rem;font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:1px solid var(--border);}
.help-modal td{padding:.4rem .55rem;border-bottom:1px solid var(--border);font-size:.76rem;}
.help-modal td b{color:var(--text);}
.help-modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem;float:right;padding:0 .35rem;line-height:1;}
.help-modal-close:hover{color:var(--text);}
.help-modal .key-rule{background:rgba(248,81,73,.06);border-left:3px solid var(--red);padding:.5rem .7rem;border-radius:6px;margin:.5rem 0;font-size:.78rem;}
/* Focus order — structured grid */
.focus-rows{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.5rem;margin-top:.6rem;}
.focus-row{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.55rem .7rem;display:flex;flex-direction:column;gap:.3rem;font-size:.75rem;}
.focus-row.threat{border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.04);}
.focus-row.threeway{border-color:rgba(210,153,34,.45);background:rgba(210,153,34,.04);}
.focus-row.with-nc{border-color:rgba(63,185,80,.35);}
.focus-row .fr-head{display:flex;align-items:center;gap:.4rem;font-weight:700;}
.focus-row .fr-w{color:var(--text);font-family:'SF Mono',Consolas,monospace;font-size:.78rem;}
.focus-row .fr-buff{color:var(--muted);font-weight:600;font-size:.72rem;}
.focus-row .fr-row{display:grid;grid-template-columns:60px 1fr;gap:.35rem;font-size:.7rem;line-height:1.4;}
.focus-row .fr-label{color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em;font-size:.62rem;align-self:center;}
.focus-row .fr-value{color:var(--text);}
.focus-row .fr-value.muted{color:var(--muted);font-style:italic;}
.fr-enemies{display:flex;flex-wrap:wrap;align-items:center;gap:.25rem;}
.fr-meta{color:var(--muted);font-size:.65rem;}
.enemy-pill{font-family:inherit;font-size:.7rem;font-weight:700;padding:.1rem .45rem;border-radius:5px;background:rgba(121,192,255,.08);border:1px solid rgba(121,192,255,.3);color:var(--accent);cursor:pointer;transition:all .12s;}
.enemy-pill:hover{background:rgba(121,192,255,.18);border-color:var(--accent);color:var(--text);}
.enemy-pill.us-pill{background:rgba(63,185,80,.1);border-color:rgba(63,185,80,.4);color:var(--green);}
.enemy-pill.us-pill:hover{background:rgba(63,185,80,.2);border-color:var(--green);color:var(--text);}
.focus-row.threat .enemy-pill{background:rgba(248,81,73,.08);border-color:rgba(248,81,73,.35);color:var(--red);}
.focus-row.threat .enemy-pill:hover{background:rgba(248,81,73,.18);}
.focus-row.threeway .enemy-pill{background:rgba(210,153,34,.1);border-color:rgba(210,153,34,.4);color:var(--yellow);}
.focus-row.threeway .enemy-pill:hover{background:rgba(210,153,34,.2);}
.adj-nc-tag.l3{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.3);}
.adj-nc-tag.l2{background:rgba(210,153,34,.12);color:var(--yellow);border:1px solid rgba(210,153,34,.3);}
.adj-nc-tag.l1{background:rgba(121,192,255,.1);color:var(--accent);border:1px solid rgba(121,192,255,.28);}
@media (max-width:640px){
  .nc-row{flex-direction:column;align-items:flex-start;gap:.4rem;padding:.7rem .85rem;}
  .nc-row .nc-name{flex-wrap:wrap;width:100%;}
  .nc-row .nc-via,.nc-row .two-hop-via{justify-content:flex-start;text-align:left;width:100%;}
  .nc-row .nc-pos{width:100%;}
}
.nc-row.two-hop svg{color:var(--purple);}
.nc-row .nc-via.two-hop-via{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;justify-content:flex-end;flex:1 1 60%;min-width:0;max-width:65%;overflow:hidden;}
.nc-row.two-hop .nc-name{flex:1 1 35%;min-width:200px;}
.two-hop-via .two-hop-path{display:inline-flex;align-items:center;gap:.25rem;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:.15rem .4rem;}
.two-hop-via .hop-arrow{color:var(--muted);}
.two-hop-via .w2-declared{color:var(--green);font-weight:700;}
.two-hop-via .w2-open{color:var(--accent);font-weight:700;}
.two-hop-via .path-sep{color:var(--muted);font-size:.65rem;}
.two-hop-via .path-more{color:var(--muted);font-size:.65rem;font-style:italic;}
.two-hop-via .path-break{flex-basis:100%;height:0;margin:0;}
.two-hop-via .path-alt-label{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:.05rem .35rem;align-self:center;}
.two-hop-legend{display:flex;gap:.85rem;flex-wrap:wrap;margin-top:.55rem;padding:.45rem .65rem;background:rgba(163,113,247,.04);border:1px dashed rgba(163,113,247,.25);border-radius:6px;font-size:.66rem;color:var(--muted);}
.two-hop-legend .leg-item b.w2-declared{color:var(--green);font-weight:700;}
.two-hop-legend .leg-item b.w2-open{color:var(--accent);font-weight:700;}

.three-hop-coll{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--card);}
.three-hop-toggle{width:100%;background:var(--card);border:none;color:var(--text);padding:.7rem .9rem;display:flex;align-items:center;gap:.5rem;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;text-align:left;transition:background .15s;}
.three-hop-toggle:hover{background:var(--surface);color:var(--accent);}
.three-hop-toggle svg{transition:transform .2s;color:var(--muted);transform:rotate(90deg);}
.three-hop-coll.open .three-hop-toggle svg{transform:rotate(-90deg);color:var(--accent);}
.three-hop-body{display:none;padding:.85rem 1rem 1rem;border-top:1px solid var(--border);}
.three-hop-coll.open .three-hop-body{display:block;}
.three-hop-body .rule-box{margin-bottom:.85rem;}
.three-hop-body .rule-box svg{color:var(--navy);}
.three-hop-body .rule-box .body strong{color:var(--navy);}
.nc-row.three-hop svg{color:var(--navy);}

.buff-list{display:flex;flex-direction:column;gap:.45rem;}
.buff-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.55rem .75rem;}
.buff-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;font-size:.78rem;font-weight:600;margin-bottom:.3rem;}
.buff-head .desc{display:flex;align-items:center;gap:.4rem;}
.buff-head svg{flex-shrink:0;}
.buff-head .vals{font-size:.7rem;color:var(--muted);font-family:'SF Mono',Consolas,monospace;}
.buff-head .vals b{color:var(--text);}
.buff-head .vals .over{color:var(--red);font-weight:700;margin-left:.3rem;}
.buff-proj{font-size:.62rem;color:var(--muted);margin-top:.2rem;font-style:italic;}
.buff-bar{height:7px;background:var(--surface);border-radius:4px;overflow:hidden;margin-top:.3rem;}
.buff-fill{height:100%;border-radius:4px;}
.buff-fill.combat{background:linear-gradient(90deg,var(--red),var(--yellow));}
.buff-fill.economy{background:linear-gradient(90deg,var(--accent),var(--green));}
.buff-fill.utility{background:linear-gradient(90deg,var(--purple),var(--accent));}
.buff-fill.special{background:linear-gradient(90deg,var(--green),var(--yellow));}
.buff-fill.over{background:repeating-linear-gradient(45deg,var(--red),var(--red) 4px,#a13b35 4px,#a13b35 8px);}

.assign-grid{display:grid;gap:.55rem;grid-template-columns:1fr;}
@media (min-width:720px){.assign-grid{grid-template-columns:repeat(2,1fr);}}
.assign-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.7rem .9rem;}
.assign-card h4{font-size:.78rem;font-weight:800;margin-bottom:.45rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.assign-card h4 .count{margin-left:auto;font-size:.66rem;background:var(--surface);color:var(--muted);padding:.1rem .4rem;border-radius:10px;font-weight:700;}
.assign-card .desc{font-size:.7rem;color:var(--muted);margin:.3rem 0 .55rem;line-height:1.45;}
.assign-card .focus-rows{margin-top:0;}
.assign-card h4 .pill{font-size:.6rem;padding:.1rem .4rem;border-radius:5px;font-weight:700;}
.assign-card.t1 h4 .pill{background:rgba(248,81,73,.14);color:var(--red);border:1px solid rgba(248,81,73,.3);}
.assign-card.t2 h4 .pill{background:rgba(210,153,34,.12);color:var(--yellow);border:1px solid rgba(210,153,34,.3);}
.assign-card.t3 h4 .pill{background:rgba(121,192,255,.08);color:var(--accent);border:1px solid rgba(121,192,255,.25);}
.assign-card.t4 h4 .pill{background:rgba(139,148,158,.08);color:var(--muted);border:1px solid var(--border);}
.assign-card .seqs{font-size:.72rem;color:var(--text);font-family:'SF Mono',Consolas,monospace;line-height:1.7;}
.assign-card .seqs .seq{display:inline-block;padding:.05rem .35rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-right:.25rem;margin-bottom:.2rem;}
.assign-card .seqs .seq.threeway{border-color:rgba(210,153,34,.85);background:rgba(210,153,34,.18);font-weight:700;}
.assign-card .desc{font-size:.7rem;color:var(--muted);margin-top:.5rem;line-height:1.45;}

.rules{display:grid;gap:.5rem;grid-template-columns:1fr;}
@media (min-width:640px){.rules{grid-template-columns:repeat(2,1fr);}}
.rule{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.7rem .85rem;display:flex;gap:.55rem;align-items:flex-start;font-size:.78rem;}
.rule svg{flex-shrink:0;margin-top:.15rem;}
.rule h5{font-size:.78rem;font-weight:700;margin-bottom:.15rem;}
.rule p{font-size:.72rem;color:var(--muted);line-height:1.45;}
.rule.accent svg{color:var(--accent);}
.rule.green svg{color:var(--green);}
.rule.red svg{color:var(--red);}
.rule.yellow svg{color:var(--yellow);}
.rule.purple svg{color:var(--purple);}

/* Focus order banner */
.focus-order{display:flex;align-items:stretch;gap:.5rem;flex-wrap:wrap;margin-bottom:.85rem;}
.fo-step{flex:1 1 160px;min-width:0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem .85rem;text-align:center;position:relative;overflow:hidden;}
.fo-step::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.fo-step.fo-a::before{background:var(--red);}
.fo-step.fo-b::before{background:var(--yellow);}
.fo-step.fo-c::before{background:var(--green);}
.fo-step.fo-d::before{background:var(--muted);}
.fo-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin-top:.15rem;}
.fo-title{font-size:.95rem;font-weight:800;margin:.2rem 0 .1rem;}
.fo-step.fo-a .fo-title{color:var(--red);}
.fo-step.fo-b .fo-title{color:var(--yellow);}
.fo-step.fo-c .fo-title{color:var(--green);}
.fo-step.fo-d .fo-title{color:var(--muted);}
.fo-sub{font-size:.65rem;color:var(--muted);line-height:1.35;}
.fo-arrow{color:var(--muted);align-self:center;flex-shrink:0;}
@media (max-width:700px){.focus-order{flex-direction:column;gap:.4rem;}.fo-arrow{transform:rotate(90deg);align-self:center;}.fo-step{flex-basis:auto;}}

/* Focus tier expanded cards */
.focus-tier{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem .9rem;margin-bottom:.55rem;display:flex;gap:.6rem;align-items:flex-start;}
.focus-tier.fa{border-left:4px solid var(--red);}
.focus-tier.fb{border-left:4px solid var(--yellow);}
.focus-tier.fc{border-left:4px solid var(--green);}
.focus-tier.fd{border-left:4px solid var(--muted);}
.focus-tier .icon-wrap{flex-shrink:0;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);}
.focus-tier.fa .icon-wrap svg{color:var(--red);}
.focus-tier.fb .icon-wrap svg{color:var(--yellow);}
.focus-tier.fc .icon-wrap svg{color:var(--green);}
.focus-tier.fd .icon-wrap svg{color:var(--muted);}
.focus-tier .body{flex:1;min-width:0;}
.focus-tier h4{font-size:.85rem;font-weight:800;margin-bottom:.2rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.focus-tier h4 .count{font-size:.65rem;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:.1rem .4rem;border-radius:5px;}
.focus-tier .desc{font-size:.72rem;color:var(--muted);line-height:1.45;margin-bottom:.45rem;}
.focus-tier .desc b{color:var(--text);}
.focus-tier .seq-pills{display:flex;flex-wrap:wrap;gap:.25rem;}
.focus-tier .seq-pill{font-family:'SF Mono',Consolas,monospace;font-size:.66rem;padding:.12rem .4rem;background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--text);}
.focus-tier .seq-pill.with-nc{border-color:rgba(63,185,80,.5);background:rgba(63,185,80,.08);}
.focus-tier .seq-pill.threat{border-color:rgba(248,81,73,.5);background:rgba(248,81,73,.08);}
.focus-tier .seq-pill.over{border-color:rgba(139,148,158,.5);background:rgba(139,148,158,.08);text-decoration:line-through;color:var(--muted);}
.focus-tier .seq-pill.contested{border-color:rgba(210,153,34,.55);background:rgba(210,153,34,.10);}
.focus-tier .seq-pill.threeway{border-color:rgba(210,153,34,.85);background:rgba(210,153,34,.18);font-weight:600;}
.focus-tier .seq-pill.threat.threeway{border-color:rgba(248,81,73,.85);background:rgba(248,81,73,.16);}

.foot{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border);font-size:.7rem;color:var(--muted);text-align:center;}
.foot .upd{display:block;margin-bottom:.25rem;}
.foot a{color:var(--muted);}

.lang-modal-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.65);align-items:center;justify-content:center;padding:1rem;}
.lang-modal-overlay.active{display:flex;}
.lang-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;}
.lang-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;}
.lang-modal-title{font-size:.95rem;font-weight:700;}
.lang-modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:.2rem;}
.lang-modal-close:hover{color:var(--text);}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
@media (max-width:480px){.lang-grid{grid-template-columns:1fr;}}
.lang-option{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid transparent;background:var(--surface);cursor:pointer;font-size:.82rem;color:var(--text);font-family:inherit;}
.lang-option:hover{border-color:var(--accent);}
.lang-option.active{border-color:var(--accent);background:rgba(121,192,255,.08);}
.lang-option .lang-flag{font-size:1.1rem;}
.goog-te-banner-frame{display:none!important;}
body{top:0!important;}

.loading{padding:2rem 1rem;text-align:center;color:var(--muted);font-size:.85rem;}
.error{padding:1rem;background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.3);border-radius:8px;color:var(--red);font-size:.82rem;}

/* Player search */
@keyframes bp-shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
.bp-search-wrap{position:relative;margin-bottom:1.2rem;}
.bp-search-input{width:100%;background-color:var(--card);background-image:linear-gradient(var(--card),var(--card)),linear-gradient(90deg,var(--muted) 0%,var(--accent) 25%,var(--muted) 50%,var(--accent) 75%,var(--muted) 100%);background-origin:border-box;background-clip:padding-box,border-box;background-size:100% 100%,200% auto;border:2px solid transparent;border-radius:14px;color:var(--text);font-size:.95rem;font-weight:600;padding:.75rem 1rem .75rem 2.5rem;font-family:inherit;animation:bp-shimmer 6s linear infinite;transition:background-color .15s ease;}
.bp-search-input:focus{outline:none;background-color:var(--surface);background-image:linear-gradient(var(--surface),var(--surface)),linear-gradient(90deg,var(--accent) 0%,var(--green) 50%,var(--accent) 100%);}
.bp-search-input::placeholder{color:var(--muted);font-weight:500;}
.bp-search-icon{position:absolute;left:.9rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.bp-search-input:focus + .bp-search-icon{color:var(--accent);}
.bp-search-results{position:absolute;top:calc(100% + .25rem);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:none;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.bp-search-results.active{display:block;}
.bp-sr{display:flex;align-items:center;gap:.6rem;padding:.6rem .85rem;cursor:pointer;font-size:.82rem;border-bottom:1px solid var(--border);transition:background .12s ease;}
.bp-sr:last-child{border-bottom:none;}
.bp-sr:hover,.bp-sr.focused{background:rgba(121,192,255,.1);}
.bp-sr-name{font-weight:700;color:var(--text);flex:1;min-width:0;}
.bp-sr-alli{font-size:.7rem;font-family:'SF Mono',Consolas,monospace;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:.05rem .35rem;border-radius:5px;}
.bp-sr-prof{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
.bp-sr-prof.ce{color:var(--red);}
.bp-sr-prof.mm{color:var(--accent);}
.bp-search-empty{padding:.75rem;text-align:center;font-size:.78rem;color:var(--muted);}

.pm-overlay{display:none;position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.75);align-items:center;justify-content:center;padding:1rem;}
.pm-overlay.active{display:flex;}
.pm{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.4rem;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;}
.pm-head{display:flex;align-items:flex-start;justify-content:space-between;gap:.6rem;margin-bottom:.4rem;}
.pm-name{font-size:1.4rem;font-weight:900;line-height:1.1;}
.pm-meta{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem;font-size:.75rem;color:var(--muted);}
.pm-meta .pm-alli{font-family:'SF Mono',Consolas,monospace;background:var(--surface);border:1px solid var(--border);padding:.1rem .45rem;border-radius:5px;font-weight:700;color:var(--text);}
.pm-meta .pm-prof{font-weight:800;text-transform:uppercase;letter-spacing:.04em;}
.pm-meta .pm-prof.ce{color:var(--red);}
.pm-meta .pm-prof.mm{color:var(--accent);}
.pm-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem;padding:.15rem .45rem;border-radius:6px;line-height:1;}
.pm-close:hover{background:var(--surface);color:var(--text);}
.pm-sub{font-size:.85rem;color:var(--text);background:rgba(121,192,255,.06);border:1px solid rgba(121,192,255,.3);border-radius:10px;padding:.7rem .9rem;margin-bottom:.95rem;line-height:1.45;}
.pm-sub b{color:var(--accent);}
.pm-heading{font-size:.9rem;font-weight:800;margin-bottom:.55rem;display:flex;align-items:center;gap:.4rem;}
.pm-heading svg{color:var(--green);}
.pm-fights{display:flex;flex-direction:column;gap:.45rem;}
.pm-fight{display:flex;align-items:center;gap:.65rem;padding:.55rem .75rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:.85rem;}
.pm-fight .pm-w{font-family:'SF Mono',Consolas,monospace;font-weight:800;color:var(--text);min-width:3.4rem;}
.pm-fight .pm-buff{flex:1;min-width:0;}
.pm-fight .pm-buff .pm-buff-name{font-weight:700;}
.pm-fight .pm-buff .pm-buff-meta{font-size:.7rem;color:var(--muted);margin-top:.1rem;display:flex;gap:.35rem;flex-wrap:wrap;align-items:center;}
.pm-fight .pm-tier{font-size:.6rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:.15rem .45rem;border-radius:999px;white-space:nowrap;}
.pm-fight .pm-tier.tA{background:rgba(248,81,73,.18);color:var(--red);border:1px solid rgba(248,81,73,.4);}
.pm-fight .pm-tier.tB{background:rgba(210,153,34,.16);color:var(--yellow);border:1px solid rgba(210,153,34,.4);}
.pm-fight .pm-tier.tC{background:rgba(63,185,80,.16);color:var(--green);border:1px solid rgba(63,185,80,.4);}
.pm-fight .pm-tier.tD{background:rgba(139,148,158,.12);color:var(--muted);border:1px solid var(--border);}
.pm-empty{background:var(--surface);border:1px dashed var(--border);border-radius:10px;padding:.85rem;text-align:center;color:var(--muted);font-size:.85rem;}
.pm-attend{margin-top:.6rem;padding:.65rem .8rem;background:var(--surface);border:1px dashed var(--border);border-radius:10px;display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;}
.pm-attend.on{background:rgba(63,185,80,.08);border-color:var(--green);border-style:solid;}
.pm-attend-label{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0;cursor:pointer;font-size:.82rem;font-weight:600;color:var(--text);}
.pm-attend-box{width:18px;height:18px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
.pm-attend-txt{flex:1;min-width:0;}
.pm-attend-btn{background:var(--green);color:#0d1117;border:none;border-radius:8px;padding:.4rem .8rem;font-weight:800;font-size:.78rem;cursor:pointer;font-family:inherit;letter-spacing:.02em;}
.pm-attend-btn:hover{filter:brightness(1.1);}
.pm-attend-status{font-size:.7rem;color:var(--muted);font-style:italic;width:100%;}
.pm-attend-status.on{color:var(--green);font-style:normal;font-weight:600;}
.pm-foot{margin-top:1.1rem;display:flex;justify-content:flex-end;}
.pm-ok{background:linear-gradient(135deg,var(--green),var(--accent));border:none;color:#0d1117;font-weight:800;font-size:.9rem;padding:.5rem 1.15rem;border-radius:10px;cursor:pointer;font-family:inherit;letter-spacing:.02em;}
.pm-ok:hover{filter:brightness(1.1);}

/* ==== NC BATTLE PLAN — caveman mode ==== */
.nc-toggle{display:inline-flex;align-items:center;gap:.35rem;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .65rem;font-size:.78rem;font-weight:700;cursor:pointer;font-family:inherit;transition:border-color .15s,color .15s;}
.nc-toggle:hover{border-color:var(--accent);color:var(--accent);}
.nc-hero{background:linear-gradient(135deg,rgba(248,81,73,.14),rgba(210,153,34,.10),rgba(121,192,255,.10));border:1px solid var(--border);border-radius:18px;padding:1.4rem;margin-bottom:1.2rem;position:relative;overflow:hidden;}
.nc-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(248,81,73,.18),transparent 70%);pointer-events:none;}
.nc-hero h1{font-size:1.7rem;font-weight:900;letter-spacing:-.02em;line-height:1.1;margin-bottom:.5rem;display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;}
.nc-hero h1 .em{color:var(--red);text-shadow:0 0 18px rgba(248,81,73,.45);font-style:italic;}
.nc-hero .nc-sub{font-size:.95rem;color:var(--text);font-weight:500;line-height:1.45;}
.nc-hero .nc-sub b{color:var(--yellow);font-weight:800;}
.nc-pill{display:inline-flex;align-items:center;gap:.35rem;background:rgba(248,81,73,.16);border:1px solid rgba(248,81,73,.4);color:var(--red);font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:.25rem .6rem;border-radius:999px;margin-bottom:.55rem;}
.nc-countdown{display:inline-flex;align-items:center;gap:.4rem;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.85rem;font-weight:700;padding:.3rem .65rem;border-radius:10px;margin-top:.7rem;font-family:'SF Mono',Consolas,monospace;}
.nc-countdown .nc-cd-label{color:var(--muted);font-weight:500;font-family:inherit;}
@media (max-width:560px){.nc-hero h1{font-size:1.3rem;}.nc-hero .nc-sub{font-size:.85rem;}}

.nc-rules{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;margin-bottom:1.2rem;}
.nc-rules-title{font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;}
.nc-rules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.45rem .8rem;font-size:.82rem;line-height:1.4;}
.nc-rules-grid b{color:var(--yellow);font-weight:800;}
.nc-rules-grid .nc-rule{padding:.2rem 0;}

.nc-fronts{display:flex;flex-direction:column;gap:.85rem;}
.nc-front{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.05rem;position:relative;overflow:hidden;}
.nc-front::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;}
.nc-front.f-storm::before{background:linear-gradient(180deg,#f85149,#d29922);}
.nc-front.f-lv3::before{background:linear-gradient(180deg,#a371f7,#79c0ff);}
.nc-front.f-lv2::before{background:linear-gradient(180deg,#79c0ff,#3fb950);}
.nc-front.f-lv1::before{background:linear-gradient(180deg,#3fb950,#79c0ff);}
.nc-front.f-rsv::before{background:linear-gradient(180deg,#8b949e,#30363d);}
.nc-front-head{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap;}

  function computeProjection(rd){
    var proj = {};

      var conf = SPEC_LEVEL_CONTRIB[w.specId];
      if (!conf) return;
      // When level unknown (level missing or 0), assume Lv.3 — best-case projection
      var lvl = w.level || 3;
      var contrib = null;
      if (conf.byLevel) contrib = conf.byLevel[lvl] || null;
      else if (conf.perStack){

    });

  // Threat model: only sector servers with ≥100K event fame are real threats.

  var FAME_THREAT_THRESHOLD = 100000;

    if (opPI >= 30) return 2;
    if (opPI >= 15) return 3;
    return 4;

  // March allocation by opponent fame.
  // We are #1 combat in sector — 1 strong player ≈ 2× average. Volume bands
  // tuned for "1 strong player can carry the fight"; 200 cap reserved only when
  // multi-strong opponents stack.
  // TAKE = we declared (offense). DEFEND = enemy declared on us (incoming).
  function marchSuggestionByFame(opFame, verb){
    var fame = opFame || 0;
    if (verb === 'TAKE'){
      if (fame >= 100000) return { count: 65, label: '60–70 (1 strong)',       tone: 'high' };
      if (fame >= 50000)  return { count: 45, label: '40–50 (1 strong)',       tone: 'mid'  };
      if (fame >= 20000)  return { count: 25, label: '20–30 marches',          tone: 'low'  };
      return { count: 15, label: '10–15 marches', tone: 'low' };
    }
    // DEFEND — never 0; empty defense = enemy takes it automatically.
    // Minimum 5–10 marches even vs ghosts to force them to commit.
    if (fame >= 100000) return { count: 65, label: '60–70 (1 strong)',         tone: 'high' };
    if (fame >= 50000)  return { count: 40, label: '40 (1 strong)',            tone: 'mid'  };
    if (fame >= 20000)  return { count: 20, label: '20 marches (token)',       tone: 'low'  };
    return { count: 8, label: '5–10 marches (minimum — empty = auto-loss)',    tone: 'low'  };
  }
  // Multi-attacker bump only when ≥2 attackers each ≥50K fame (both will
  // actually ship). One big + one ghost (e.g. S2616 184K + S3343 31K) does
  // not escalate — small attacker won't add meaningful march volume.
  function marchSuggestionMultiAttack(attackerFames, verb){
    var fames = (attackerFames || []).slice().sort(function(a,b){ return b - a; });
    var max = fames[0] || 0;
    var seriousCount = fames.filter(function(f){ return f >= 50000; }).length;
    var base = marchSuggestionByFame(max, verb);
    if (seriousCount < 2) return base;
    // Two+ serious attackers → escalate band
    if (base.tone === 'high') return { count: 100, label: 'Full Mothership (100) — multi-strong', tone: 'high' };
    if (base.tone === 'mid')  return { count: 65,  label: '60–70 (1 strong) — multi-strong',      tone: 'high' };
    if (base.tone === 'low')  return { count: 35,  label: '30–40 — multi-strong',                 tone: 'mid'  };
    return { count: 20, label: '20 marches — multi-strong', tone: 'low' };
  }

  function tagSection(section, navLabel, navIcon, count){

  function buildSectionNav(root){
    var sections = root.querySelectorAll('section[data-nav-label]');
    if (!sections.length) return;
    var nav = el('nav', 'section-nav notranslate');
    var navLinks = [];
    sections.forEach(function(s){
      var a = document.createElement('a');
      a.href = '#' + s.id;
      a.dataset.targetId = s.id;
      var label = s.getAttribute('data-nav-label');
      var icon = s.getAttribute('data-nav-icon');
      var count = s.getAttribute('data-nav-count');
      if (icon) a.appendChild(makeIcon(icon, 12));
      a.appendChild(el('span', null, label));
      if (count) a.appendChild(el('span', 'nav-count', count));
      nav.appendChild(a);
      navLinks.push({ link: a, sectionId: s.id });
    });
    var hero = root.querySelector('section.hero');
    if (hero && hero.nextSibling) root.insertBefore(nav, hero.nextSibling);
    else root.insertBefore(nav, root.children[1] || null);
    // Active-section highlight on scroll (intersection observer)
    if ('IntersectionObserver' in window){
      var visibility = {};
      var io = new IntersectionObserver(function(entries){
        entries.forEach(function(en){
          visibility[en.target.id] = en.isIntersecting ? en.intersectionRatio : 0;
        });
        var bestId = null, bestRatio = 0;
        Object.keys(visibility).forEach(function(id){
          if (visibility[id] > bestRatio){ bestRatio = visibility[id]; bestId = id; }
        });
        navLinks.forEach(function(nl){
          if (nl.sectionId === bestId) nl.link.classList.add('active');
          else nl.link.classList.remove('active');
        });
      }, { rootMargin: '-130px 0px -55% 0px', threshold: [0, 0.2, 0.5, 1] });
      sections.forEach(function(s){ io.observe(s); });
    }
  }

  // Live grid column count. null when container isn't display:grid.
  function gridColCount(el){
    try {
      var cs = getComputedStyle(el);
      if (cs.display !== 'grid' && cs.display !== 'inline-grid') return null;
      var t = cs.gridTemplateColumns;
      if (!t || t === 'none') return null;

  // Clamp a container to N visible items + partial peek of next.
  // - For CSS grid: threshold = cols × 2 (always 2 rows visible).
  // - For non-grid (flex/block list): threshold = fallback param.
  // Max-height computed from actual rendered offsets so the cutoff is exact
  // regardless of varying card heights.
  function clampGrid(grid, itemSelector, fallbackThreshold, noun){
    if (!grid) return;
    // Defer until grid is actually in the DOM and laid out — getComputedStyle
    // on detached elements returns the specified, unresolved value (e.g.
    // "repeat(auto-fill, minmax(...))") which breaks gridColCount.
    if (!grid.isConnected){
      var schedule = window.requestAnimationFrame || function(fn){ setTimeout(fn, 0); };
      schedule(function(){ clampGrid(grid, itemSelector, fallbackThreshold, noun); });
      return;
    }
    var items = grid.querySelectorAll(itemSelector);
    var count = items.length;
    if (count === 0) return;
    var label = noun || 'items';
    function thresholdNow(){
      var cols = gridColCount(grid);
      return cols ? cols * 2 : fallbackThreshold;
    }
    var threshold = thresholdNow();
    if (count <= threshold) return;
    grid.classList.add('clampable', 'collapsed');
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'show-more-btn';
    function setLabel(open){
      var th = thresholdNow();
      var hidden = Math.max(0, count - th);
      btn.textContent = open ? 'Show fewer' : ('Show ' + hidden + ' more ' + label + ' · ' + count + ' total');
    }
    setLabel(false);
    btn.addEventListener('click', function(){
      var collapsed = grid.classList.toggle('collapsed');
      if (collapsed) applyMaxHeight();
      else grid.style.maxHeight = '';
      setLabel(!collapsed);
    });
    // Compute max-height from offset of N-th item + ~30% peek of next item.
    function applyMaxHeight(){
      if (!grid.classList.contains('collapsed')) return;
      var its = grid.querySelectorAll(itemSelector);
      if (its.length === 0) return;
      var th = thresholdNow();
      if (its.length <= th){
        grid.style.maxHeight = '';
        return;
      }
      var lastVisible = its[th - 1];
      var nextItem = its[th] || null;
      var gridTop = grid.getBoundingClientRect().top;
      var lastBottom = lastVisible.getBoundingClientRect().bottom;
      var nextH = nextItem ? nextItem.getBoundingClientRect().height : 0;
      var peek = nextH * 0.3;
      var max = (lastBottom - gridTop) + peek;
      grid.style.maxHeight = max + 'px';
      setLabel(false);
    }
    // Initial measurement may be off if fonts/icons still loading — also try one frame later.
    applyMaxHeight();
    if (window.requestAnimationFrame){
      requestAnimationFrame(applyMaxHeight);
      setTimeout(applyMaxHeight, 100);
    }
    if (window.ResizeObserver){
      var ro = new ResizeObserver(applyMaxHeight);
      ro.observe(grid);
    } else {
      window.addEventListener('resize', applyMaxHeight);
    }
    if (grid.parentNode) grid.parentNode.insertBefore(btn, grid.nextSibling);
  }

  function buildFocus(rd, root){

    contested.forEach(function(f){
      var k = String(f.seq);

    });

      var opp = oppBySeq[seqStr];

  function buildContested(rd, root){
    var contested = (rd.contestedRanked || []).slice().sort(function(a,b){ return b.opPI - a.opPI; });
    if (!contested.length) return;
    // Count distinct contested seqs vs total entries (3-way fights show twice)
    var seqCount = {};
    contested.forEach(function(f){ seqCount[f.seq] = (seqCount[f.seq] || 0) + 1; });
    var threeWayCount = Object.keys(seqCount).filter(function(k){ return seqCount[k] >= 2; }).length;
    var distinctSeqs = Object.keys(seqCount).length;
    var section = el('section', 'sect');
    tagSection(section, 'Contested', 'sword', distinctSeqs);
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--red)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'Contested Fights — Ranked by Opponent Power'));
    var tagLabel = distinctSeqs + ' wastelands · ' + contested.length + ' fight cards';
    if (threeWayCount) tagLabel += ' · ' + threeWayCount + ' 3-way';
    t.appendChild(el('span', 'tag', tagLabel));
    section.appendChild(t);

    var grid = el('div', 'fights');
    var ncUnlocks = rd.declarationNcUnlocks || {};
    var fightItems = []; // for filters
    contested.forEach(function(f){
      var prio = priorityLevel(f.opPI, f.opFame);
      var isThreeWay = seqCount[f.seq] >= 2;
      var card = el('div', 'fight p' + prio + (isThreeWay ? ' threeway' : ''));
      var top = el('div', 'fight-top');
      var idDiv = el('div', 'fight-id');
      idDiv.appendChild(document.createTextNode('W-' + f.seq + ' '));
      idDiv.appendChild(el('span', 'lvl', 'Lv.' + f.level));
      if (isThreeWay) idDiv.appendChild(el('span', 'lvl threeway-tag', '⚠ 3-way'));
      top.appendChild(idDiv);
      top.appendChild(el('span', 'fight-prio prio-' + prio, priorityLabel(prio)));
      card.appendChild(top);

      var spec = el('div', 'fight-spec');
      spec.appendChild(makeIcon(SPEC_ICON[f.specId] || 'target', 14));
      spec.appendChild(el('span', null, SPEC_NAMES[f.specId] || ('Spec ' + f.specId)));
      card.appendChild(spec);

      // Compact clickable opponent pill — opens detail modal
      var sectorTotal = (rd.sectorPower || []).length;
      var oppBtn = document.createElement('button');
      oppBtn.type = 'button';
      oppBtn.className = 'fight-opp';
      oppBtn.appendChild(makeIcon('users', 14));
      var oppText = el('span');
      var sidSpan = el('span', 'opp-sid', 'S' + f.opponent);
      oppText.appendChild(document.createTextNode('vs '));
      oppText.appendChild(sidSpan);
      var whereSpan = el('span', 'opp-where', ' · ' + sectorRankDescriptor(f.sectorRank));
      oppText.appendChild(whereSpan);
      oppBtn.appendChild(oppText);
      var info = makeIcon('info', 14);
      info.classList.add('opp-info-icon');
      oppBtn.appendChild(info);
      oppBtn.addEventListener('click', function(){ openOppModal(f, rd); });
      card.appendChild(oppBtn);

      var unlocks = ncUnlocks[String(f.seq)];
      if (unlocks && unlocks.length){
        var bonus = el('div', 'fight-bonus');
        bonus.appendChild(makeIcon('castle', 13));
        bonus.appendChild(el('span', null, 'Win unlocks ' + formatNcUnlockList(unlocks)));
        card.appendChild(bonus);
      }
      grid.appendChild(card);
      fightItems.push({
        element: card,
        servers: [f.opponent],
        buff: SPEC_NAMES[f.specId] || ('Spec ' + f.specId)
      });
    });
    section.appendChild(grid);
    attachFightFilters(section, grid, fightItems);
    clampFightGrid(grid, 6);
    root.appendChild(section);
  }

  // ===== PILLAGE PRIORITY — top-of-plan: enemy NCs we plan to take =====
  // Round 11 Setup — alliance-curated + auto-detected declarations that open
  // R11 combat-buff declarations, plus NC strategic targets for this week.
  function buildR11Setup(rd, root){
    var strat = rd.r11StrategyTargets;
    if (!strat) return;
    var warByseq = {};
    (rd.warTargets || []).forEach(function(w){ warByseq[w.seq] = w; });

    var section = el('section', 'sect');
    var curated = strat.curated || [];
    var auto1 = strat.auto1Hop || [];
    var ncs = strat.ncTargets || [];
    var totalPri = curated.length + auto1.length + ncs.length;
    if (!totalPri) return; // nothing to show — skip the section entirely
    var lastCycle = !!rd.isLastWastelandCycle;
    var navLabel = lastCycle ? 'Priority NCs' : 'R11 Setup';
    tagSection(section, navLabel, 'flame', totalPri);

    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--red)';
    t.appendChild(dot);
    var headline = lastCycle
      ? 'Priority NC Targets — Lock-Ins for Saturday\'s NC Battle'
      : 'Round 11 Setup — Priority Targets';
    t.appendChild(el('span', null, headline));
    var tagText = lastCycle
      ? (ncs.length + ' NC pick' + (ncs.length === 1 ? '' : 's'))
      : (curated.length + ' curated · ' + auto1.length + ' auto · ' + ncs.length + ' NCs');
    t.appendChild(el('span', 'tag', tagText));
    section.appendChild(t);

    if (strat.note){
      var note = el('div', 'rule-box');
      note.appendChild(makeIcon('flame', 18));
      var body = el('div', 'body');
      body.appendChild(document.createTextNode(strat.note));
      note.appendChild(body);
      section.appendChild(note);
    }

    function renderWasteland(card, w, hops){
      var head = el('div', 'r11-wl-head');
      head.appendChild(el('span', 'r11-wl-seq', 'W-' + w.seq));
      head.appendChild(el('span', 'r11-wl-lvl l' + w.level, 'Lv.' + w.level));
      var specName = SPEC_NAMES[w.specId] || ('Spec ' + w.specId);
      head.appendChild(el('span', 'r11-wl-spec', specName));
      card.appendChild(head);
      if (hops && hops.length){
        var hopRow = el('div', 'r11-wl-hops');
        hopRow.appendChild(document.createTextNode('opens '));
        hops.forEach(function(h, i){
          if (i > 0) hopRow.appendChild(document.createTextNode(' · '));
          var pill = el('b', 'r11-hop-pill', 'W-' + h.seq);
          if (h.specName){
            pill.appendChild(document.createTextNode(' · ' + h.specName));
          }
          hopRow.appendChild(pill);
        });
        card.appendChild(hopRow);
      }
      var foot = el('div', 'r11-wl-foot');
      if (w.isContested){
        var fcontest = el('span', 'r11-wl-contest');
        fcontest.appendChild(document.createTextNode('Contested vs '));
        (w.contestedBy || []).forEach(function(s, i){
          if (i > 0) fcontest.appendChild(document.createTextNode(', '));
          fcontest.appendChild(makeSidPill(s, rd));
        });
        foot.appendChild(fcontest);
      } else {
        foot.appendChild(el('span', 'r11-wl-uncontested', 'Uncontested'));
      }
      card.appendChild(foot);
    }

    // Curated block — only one declaration phase left this week, so 2-hop
    // chains are irrelevant. Curated picks without a 1-hop combat neighbour
    // (e.g. W-177, W-318) still render so the alliance pick is preserved.
    if (curated.length){
      var sub = el('h4', 'r11-sub');
      sub.appendChild(makeIcon('sword', 14));
      sub.appendChild(document.createTextNode(' Curated by alliance — direct combat-buff openers for R11'));
      section.appendChild(sub);
      var grid = el('div', 'r11-wl-grid');
      curated.forEach(function(c){
        var w = warByseq[c.seq];
        if (!w) return;
        var card = el('div', 'r11-wl-card curated');
        renderWasteland(card, w, c.oneHop || []);
        grid.appendChild(card);
      });
      section.appendChild(grid);
    }

    // Auto 1-hop block
    if (auto1.length){
      var sub2 = el('h4', 'r11-sub r11-sub-auto');
      sub2.appendChild(makeIcon('compass', 14));
      sub2.appendChild(document.createTextNode(' Also detected — every other declaration adjacent to an undeclared combat wasteland'));
      sub2.appendChild(el('span', 'r11-sub-count', auto1.length + ' more'));
      section.appendChild(sub2);
      var grid2 = el('div', 'r11-wl-grid');
      auto1.forEach(function(c){
        var w = warByseq[c.seq];
        if (!w) return;
        var card = el('div', 'r11-wl-card auto');
        renderWasteland(card, w, c.oneHop || []);
        grid2.appendChild(card);
      });
      section.appendChild(grid2);
    }

    // R11-declarable combat wastelands (inverse view): the combat wastelands we
    // CAN'T declare this round, but would unlock for R11 if we win the listed
    // R10 declarations.
    var declarables = rd.r11DeclarableCombat || [];
    if (declarables.length){
      var subd = el('h4', 'r11-sub');
      subd.appendChild(makeIcon('target', 14));
      subd.appendChild(document.createTextNode(' Combat wastelands that BECOME declarable in R11 — win the R10 source(s) to open them'));
      subd.appendChild(el('span', 'r11-sub-count', declarables.length + ' targets'));
      section.appendChild(subd);

      var dbox = el('div', 'r11-decl-grid');
      declarables.forEach(function(d){
        var card = el('div', 'r11-decl-card' + (d.lockedByCurated ? ' locked' : ''));
        var head = el('div', 'r11-decl-head');
        head.appendChild(el('span', 'r11-decl-seq', 'W-' + d.seq));
        var specLabel = d.specName ? ('L3 · ' + d.specName) : ('Combat L3 · ' + (d.landType || ''));
        head.appendChild(el('span', 'r11-decl-spec', specLabel));
        if (d.lockedByCurated){
          head.appendChild(el('span', 'r11-decl-locked', 'LOCKED IN'));
        }
        card.appendChild(head);
        var via = el('div', 'r11-decl-via');
        via.appendChild(document.createTextNode('via '));
        d.viaWastelands.forEach(function(v, i){
          if (i > 0) via.appendChild(document.createTextNode(', '));
          var isCur = (d.viaCurated || []).indexOf(v) >= 0;
          var pill = el('b', 'r11-hop-pill' + (isCur ? ' curated' : ''), (isCur ? '★ ' : '') + 'W-' + v);
          via.appendChild(pill);
        });
        card.appendChild(via);
        dbox.appendChild(card);
      });
      section.appendChild(dbox);
    }

    // NC strategic targets
    if (ncs.length){
      var subnc = el('h4', 'r11-sub');
      subnc.appendChild(makeIcon('castle', 14));
      subnc.appendChild(document.createTextNode(' NC strategic targets — alliance picks for this week'));
      section.appendChild(subnc);
      var nbox = el('div', 'r11-nc-grid');
      ncs.forEach(function(n){
        var card = el('div', 'r11-nc-card l' + n.level + (n.priority === 'lock' ? ' lock' : ''));
        var head = el('div', 'r11-nc-head');
        head.appendChild(el('span', 'r11-nc-lvl l' + n.level, 'Lv.' + n.level));
        head.appendChild(el('span', 'r11-nc-name', n.nc.replace(/^Lv\.\s*\d+\s*/, '')));
        if (n.r != null){
          var ncPos = el('span', 'r11-nc-pos');
          ncPos.appendChild(document.createTextNode('@(' + n.r + ',' + n.c + ') · '));
          if (n.sid){
            ncPos.appendChild(makeSidPill(n.sid, rd));
          } else {
            ncPos.appendChild(document.createTextNode('unclaimed'));
          }
          head.appendChild(ncPos);
        }
        var prioTag = el('span', 'r11-nc-prio ' + (n.priority === 'lock' ? 'lock' : 'target'),
          n.priority === 'lock' ? 'LOCK IN' : 'TARGET');
        head.appendChild(prioTag);
        card.appendChild(head);
        if (n.rationale){
          card.appendChild(el('div', 'r11-nc-why', n.rationale));
        }
        nbox.appendChild(card);
      });
      section.appendChild(nbox);
    }

    root.appendChild(section);
  }

    tagSection(section, 'Pillage', 'target', targets.length);

    var note = el('div', 'rule-box');
    note.appendChild(makeIcon('target', 18));
