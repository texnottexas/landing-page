<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com; style-src 'self' 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; connect-src 'self' https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com https://raw.githubusercontent.com; img-src 'self' https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://www.google.com data:; frame-ancestors 'none'; frame-src https://translate.google.com;">
<title>S2864 Battle Plan</title>
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --card:#1c2128; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#79c0ff;
  --red:#f85149; --green:#3fb950; --yellow:#d29922; --navy:#388bfd; --purple:#a371f7;
  --tier-s:#f85149; --tier-a:#d29922; --tier-b:#79c0ff; --tier-c:#3fb950; --tier-d:#8b949e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:100;padding-top:calc(.65rem + env(safe-area-inset-top,0px));}
.hdr-left{display:flex;align-items:center;gap:.5rem;min-width:0;flex:1;}
.hdr-title{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-title .dim{color:var(--muted);font-weight:400;margin-left:.3rem;}
.home-btn,.lang-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .55rem;font-size:.78rem;text-decoration:none;transition:border-color .15s,color .15s;cursor:pointer;font-family:inherit;}
.home-btn:hover,.lang-btn:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}
.lang-btn{gap:.3rem;}
.lang-btn #langCode{font-size:.7rem;color:var(--muted);}
.notranslate{unicode-bidi:isolate;}
#google_translate_element{position:absolute;left:-9999px;opacity:0;pointer-events:none;}
.wrap{max-width:1080px;margin:0 auto;padding:1rem;}
@media (min-width:640px){.wrap{padding:1.25rem;}}

.hero{background:linear-gradient(135deg,rgba(121,192,255,.06),rgba(163,113,247,.05));border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem;}
.hero h1{font-size:1.15rem;font-weight:800;letter-spacing:-.01em;margin-bottom:.25rem;display:flex;align-items:center;gap:.5rem;}
.hero h1 svg{color:var(--accent);}
.hero .sub{font-size:.78rem;color:var(--muted);}
.hero .sub b{color:var(--text);}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.55rem;margin-top:.9rem;}
@media (max-width:560px){.hero-stats{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.6rem .5rem;text-align:center;}
.stat .v{font-size:1.1rem;font-weight:800;line-height:1.1;}
.stat .l{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:.25rem;}
.stat.v-green .v{color:var(--green);}
.stat.v-yellow .v{color:var(--yellow);}
.stat.v-accent .v{color:var(--accent);}
.stat.v-red .v{color:var(--red);}

.sect{margin-bottom:1.5rem;}
.sect-title{display:flex;align-items:center;gap:.5rem;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.65rem;padding-bottom:.4rem;border-bottom:1px solid var(--border);}
.sect-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sect-title .tag{margin-left:auto;font-size:.6rem;color:var(--muted);font-weight:500;letter-spacing:.02em;text-transform:none;}

.rule-box{background:rgba(163,113,247,.06);border:1px solid rgba(163,113,247,.28);border-radius:10px;padding:.85rem 1rem;margin-bottom:1.1rem;display:flex;gap:.7rem;align-items:flex-start;}
.rule-box svg{flex-shrink:0;color:var(--purple);margin-top:.15rem;}
.rule-box .body{font-size:.82rem;}
.rule-box .body strong{color:var(--purple);}
.rule-box .body p+p{margin-top:.4rem;}
.rule-box.accent{background:rgba(121,192,255,.05);border-color:rgba(121,192,255,.28);}
.rule-box.accent svg{color:var(--accent);}
.rule-box.accent .body strong{color:var(--accent);}
.rule-box.green{background:rgba(63,185,80,.05);border-color:rgba(63,185,80,.3);}
.rule-box.green svg{color:var(--green);}
.rule-box.green .body strong{color:var(--green);}

table.power{width:100%;border-collapse:collapse;font-size:.78rem;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
table.power th{background:var(--surface);text-align:left;padding:.55rem .65rem;font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:1px solid var(--border);}
table.power td{padding:.5rem .65rem;border-bottom:1px solid var(--border);}
table.power tr:last-child td{border-bottom:none;}
table.power tr.us{background:rgba(121,192,255,.08);}
table.power tr.us td{font-weight:700;}
table.power.power-collapsed .hidden-row{display:none;}
.tier-pill{display:inline-block;padding:.1rem .45rem;border-radius:5px;font-size:.66rem;font-weight:800;letter-spacing:.05em;border:1px solid currentColor;background:rgba(255,255,255,.04);}
.tier-S{color:var(--tier-s);}
.tier-A{color:var(--tier-a);}
.tier-B{color:var(--tier-b);}
.tier-C{color:var(--tier-c);}
.tier-D{color:var(--tier-d);}
.pi-bar{display:inline-block;width:60px;height:6px;background:var(--surface);border-radius:3px;vertical-align:middle;margin-left:.4rem;overflow:hidden;}
.pi-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));}
.pow-toggle{margin-top:.5rem;font-size:.72rem;background:none;border:1px dashed var(--border);color:var(--muted);padding:.35rem .65rem;border-radius:6px;cursor:pointer;font-family:inherit;width:100%;}
.pow-toggle:hover{color:var(--accent);border-color:var(--accent);}

.fights{display:grid;gap:.6rem;grid-template-columns:1fr;}
@media (min-width:680px){.fights{grid-template-columns:repeat(2,1fr);}}
@media (min-width:1000px){.fights{grid-template-columns:repeat(3,1fr);}}
.fight{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.75rem .9rem;display:flex;flex-direction:column;gap:.4rem;position:relative;overflow:hidden;}
.fight::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.fight.p1::before{background:var(--red);}
.fight.p2::before{background:var(--yellow);}
.fight.p3::before{background:var(--accent);}
.fight.p4::before{background:var(--muted);}
.fight-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.4rem;}
.fight-id{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:.35rem;}
.fight-id .lvl{font-size:.55rem;padding:.1rem .4rem;border-radius:5px;background:rgba(121,192,255,.1);color:var(--accent);border:1px solid rgba(121,192,255,.25);font-weight:700;letter-spacing:.04em;}
.fight-prio{font-size:.55rem;padding:.15rem .45rem;border-radius:5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;}
.prio-1{background:rgba(248,81,73,.14);color:var(--red);border:1px solid rgba(248,81,73,.3);}
.prio-2{background:rgba(210,153,34,.12);color:var(--yellow);border:1px solid rgba(210,153,34,.3);}
.prio-3{background:rgba(121,192,255,.1);color:var(--accent);border:1px solid rgba(121,192,255,.28);}
.prio-4{background:rgba(139,148,158,.08);color:var(--muted);border:1px solid var(--border);}
.fight-spec{font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.35rem;}
.fight-spec svg{flex-shrink:0;color:var(--accent);}
.fight-meta{font-size:.7rem;color:var(--muted);line-height:1.5;}
.fight-meta b{color:var(--text);font-weight:600;}
.fight-bonus{font-size:.68rem;padding:.3rem .45rem;border-radius:6px;background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.28);color:var(--green);display:flex;align-items:center;gap:.35rem;}
.fight-bonus svg{flex-shrink:0;}

.nc-flow{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.nc-row{display:flex;align-items:center;gap:.7rem;padding:.6rem .85rem;border-bottom:1px solid var(--border);}
.nc-row:last-child{border-bottom:none;}
.nc-row svg{color:var(--green);flex-shrink:0;}
.nc-row .nc-name{flex:1;min-width:0;font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.nc-row .nc-lvl{font-size:.6rem;padding:.08rem .35rem;border-radius:4px;font-weight:800;}
.nc-row .nc-lvl.l3{background:rgba(248,81,73,.14);color:var(--red);}
.nc-row .nc-lvl.l2{background:rgba(210,153,34,.14);color:var(--yellow);}
.nc-row .nc-lvl.l1{background:rgba(121,192,255,.1);color:var(--accent);}
.nc-row .nc-pos{color:var(--muted);font-size:.7rem;font-weight:500;}
.nc-row .nc-via{font-size:.7rem;color:var(--muted);text-align:right;flex-shrink:0;}
.nc-row .nc-via b{color:var(--text);}

.buff-list{display:flex;flex-direction:column;gap:.45rem;}
.buff-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.55rem .75rem;}
.buff-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;font-size:.78rem;font-weight:600;margin-bottom:.3rem;}
.buff-head .desc{display:flex;align-items:center;gap:.4rem;}
.buff-head svg{flex-shrink:0;}
.buff-head .vals{font-size:.7rem;color:var(--muted);font-family:'SF Mono',Consolas,monospace;}
.buff-head .vals b{color:var(--text);}
.buff-head .vals .over{color:var(--red);font-weight:700;margin-left:.3rem;}
.buff-bar{height:7px;background:var(--surface);border-radius:4px;overflow:hidden;}
.buff-fill{height:100%;border-radius:4px;}
.buff-fill.combat{background:linear-gradient(90deg,var(--red),var(--yellow));}
.buff-fill.economy{background:linear-gradient(90deg,var(--accent),var(--green));}
.buff-fill.utility{background:linear-gradient(90deg,var(--purple),var(--accent));}
.buff-fill.special{background:linear-gradient(90deg,var(--green),var(--yellow));}
.buff-fill.over{background:repeating-linear-gradient(45deg,var(--red),var(--red) 4px,#a13b35 4px,#a13b35 8px);}

.assign-grid{display:grid;gap:.55rem;grid-template-columns:1fr;}
@media (min-width:720px){.assign-grid{grid-template-columns:repeat(2,1fr);}}
.assign-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.7rem .9rem;}
.assign-card h4{font-size:.78rem;font-weight:800;margin-bottom:.45rem;display:flex;align-items:center;gap:.4rem;}
.assign-card h4 .pill{font-size:.6rem;padding:.1rem .4rem;border-radius:5px;font-weight:700;}
.assign-card.t1 h4 .pill{background:rgba(248,81,73,.14);color:var(--red);border:1px solid rgba(248,81,73,.3);}
.assign-card.t2 h4 .pill{background:rgba(210,153,34,.12);color:var(--yellow);border:1px solid rgba(210,153,34,.3);}
.assign-card.t3 h4 .pill{background:rgba(121,192,255,.08);color:var(--accent);border:1px solid rgba(121,192,255,.25);}
.assign-card.t4 h4 .pill{background:rgba(139,148,158,.08);color:var(--muted);border:1px solid var(--border);}
.assign-card .seqs{font-size:.72rem;color:var(--text);font-family:'SF Mono',Consolas,monospace;line-height:1.7;}
.assign-card .seqs .seq{display:inline-block;padding:.05rem .35rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-right:.25rem;margin-bottom:.2rem;}
.assign-card .desc{font-size:.7rem;color:var(--muted);margin-top:.5rem;line-height:1.45;}

.rules{display:grid;gap:.5rem;grid-template-columns:1fr;}
@media (min-width:640px){.rules{grid-template-columns:repeat(2,1fr);}}
.rule{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.7rem .85rem;display:flex;gap:.55rem;align-items:flex-start;font-size:.78rem;}
.rule svg{flex-shrink:0;margin-top:.15rem;}
.rule h5{font-size:.78rem;font-weight:700;margin-bottom:.15rem;}
.rule p{font-size:.72rem;color:var(--muted);line-height:1.45;}
.rule.accent svg{color:var(--accent);}
.rule.green svg{color:var(--green);}
.rule.red svg{color:var(--red);}
.rule.yellow svg{color:var(--yellow);}
.rule.purple svg{color:var(--purple);}

.foot{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border);font-size:.7rem;color:var(--muted);text-align:center;}
.foot .upd{display:block;margin-bottom:.25rem;}
.foot a{color:var(--muted);}

.lang-modal-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.65);align-items:center;justify-content:center;padding:1rem;}
.lang-modal-overlay.active{display:flex;}
.lang-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;}
.lang-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;}
.lang-modal-title{font-size:.95rem;font-weight:700;}
.lang-modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:.2rem;}
.lang-modal-close:hover{color:var(--text);}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
@media (max-width:480px){.lang-grid{grid-template-columns:1fr;}}
.lang-option{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid transparent;background:var(--surface);cursor:pointer;font-size:.82rem;color:var(--text);font-family:inherit;}
.lang-option:hover{border-color:var(--accent);}
.lang-option.active{border-color:var(--accent);background:rgba(121,192,255,.08);}
.lang-option .lang-flag{font-size:1.1rem;}
.goog-te-banner-frame{display:none!important;}
body{top:0!important;}

.loading{padding:2rem 1rem;text-align:center;color:var(--muted);font-size:.85rem;}
.error{padding:1rem;background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.3);border-radius:8px;color:var(--red);font-size:.82rem;}
</style>
</head>
<body>

<header>
  <div class="hdr-left">
    <a href="https://2864tw.com/index.html" class="home-btn notranslate" title="Home" aria-label="Home" id="homeBtn"></a>
    <span class="hdr-title notranslate">S2864 Battle Plan<span class="dim" id="hdrSub">&middot; loading</span></span>
  </div>
  <button class="lang-btn notranslate" id="langBtn" aria-label="Change language">
    <span id="langFlag"></span><span id="langCode">/en</span>
  </button>
</header>
<div id="google_translate_element"></div>

<div class="wrap" id="root">
  <div class="loading">Loading sector data&hellip;</div>
</div>

<div class="lang-modal-overlay" id="langModal">
  <div class="lang-modal">
    <div class="lang-modal-header">
      <span class="lang-modal-title">Select Language</span>
      <button class="lang-modal-close" id="langModalClose" aria-label="Close">&#10005;</button>
    </div>
    <div class="lang-grid" id="langGrid"></div>
  </div>
</div>

<script>
(function(){
  // ===== SAFE DOM HELPERS =====
  var SVG_NS = 'http://www.w3.org/2000/svg';
  function el(tag, cls, txt){ var n = document.createElement(tag); if (cls) n.className = cls; if (txt !== undefined && txt !== null) n.textContent = String(txt); return n; }
  function svgEl(name, attrs){ var n = document.createElementNS(SVG_NS, name); if (attrs) Object.keys(attrs).forEach(function(k){ n.setAttribute(k, attrs[k]); }); return n; }

  // SVG icon definitions — all path strings are trusted constants
  var ICONS = {

    flag: { parts: [ ['path', { d: 'M4 21V4h12l-2 4 2 4H4' }] ] },
    target: { parts: [ ['circle', { cx:'12', cy:'12', r:'10' }], ['circle', { cx:'12', cy:'12', r:'6' }], ['circle', { cx:'12', cy:'12', r:'2', fill:'currentColor' }] ] },

    info: { parts: [ ['circle', { cx:'12', cy:'12', r:'10' }], ['line', { x1:'12', y1:'8', x2:'12', y2:'12' }], ['circle', { cx:'12', cy:'16', r:'.5', fill:'currentColor' }] ] },

    chart: { parts: [ ['path', { d: 'M3 3v18h18' }], ['path', { d: 'M7 14l4-4 4 4 5-5' }] ] },
    compass: { parts: [ ['circle', { cx:'12', cy:'12', r:'10' }], ['polygon', { points:'16 8 14 14 8 16 10 10' }] ] }
  };

  // ===== LANG SWITCHER (kept simple, matches other pages) =====
  var LANGUAGES=[
    {code:'en',flag:'\u{1F1FA}\u{1F1F8}',name:'English'},
    {code:'es',flag:'\u{1F1EA}\u{1F1F8}',name:'Español'},
    {code:'fr',flag:'\u{1F1EB}\u{1F1F7}',name:'Français'},
    {code:'de',flag:'\u{1F1E9}\u{1F1EA}',name:'Deutsch'},
    {code:'pt',flag:'\u{1F1E7}\u{1F1F7}',name:'Português'},
    {code:'it',flag:'\u{1F1EE}\u{1F1F9}',name:'Italiano'},
    {code:'ru',flag:'\u{1F1F7}\u{1F1FA}',name:'Русский'},
    {code:'ja',flag:'\u{1F1EF}\u{1F1F5}',name:'日本語'},
    {code:'ko',flag:'\u{1F1F0}\u{1F1F7}',name:'한국어'},
    {code:'zh-CN',flag:'\u{1F1E8}\u{1F1F3}',name:'中文'},
    {code:'tr',flag:'\u{1F1F9}\u{1F1F7}',name:'Türkçe'},
    {code:'vi',flag:'\u{1F1FB}\u{1F1F3}',name:'Tiếng Việt'}
  ];
  function getLangData(c){var b=c.split('-')[0];return LANGUAGES.find(function(l){return l.code===c||l.code===b;})||null;}
  function detectCurrentLang(){var m=document.cookie.match(/googtrans=\/en\/([a-zA-Z-]{2,10})/);return m&&m[1]?m[1]:'en';}
  function updateLangBtn(code){var d=getLangData(code);var f=document.getElementById('langFlag');var c=document.getElementById('langCode');if(d&&f){f.textContent=d.flag;c.textContent='/'+d.code;}else if(f){f.textContent='\u{1F310}';c.textContent='/'+code;}document.querySelectorAll('.lang-option').forEach(function(o){o.classList.toggle('active',o.dataset.lang===code);});}
  function applyLangToCombo(code,delay){var a=0;var p=setInterval(function(){var c=document.querySelector('.goog-te-combo');if(c){c.value=code;c.dispatchEvent(new Event('change'));clearInterval(p);updateLangBtn(code);}if(++a>30)clearInterval(p);},delay||200);}
  var langModalEl=document.getElementById('langModal');
  function openLangModal(){langModalEl.classList.add('active');}
  function closeLangModal(){langModalEl.classList.remove('active');}
  function selectLanguage(code){if(code==='en'){sessionStorage.removeItem('pendingLang');document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax; Secure';document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.2864tw.com; SameSite=Lax; Secure';closeLangModal();location.reload();return;}sessionStorage.setItem('pendingLang',code);applyLangToCombo(code,200);closeLangModal();}
  (function(){
    var g=document.getElementById('langGrid');
    var det=detectCurrentLang();
    LANGUAGES.forEach(function(l){
      var btn=document.createElement('button');
      btn.className='lang-option'+(l.code===det?' active':'');
      btn.dataset.lang=l.code;
      btn.type='button';
      var flagSpan=el('span','lang-flag',l.flag);
      var nameSpan=el('span','lang-name',l.name);
      btn.appendChild(flagSpan);
      btn.appendChild(nameSpan);
      btn.addEventListener('click',function(){selectLanguage(l.code);});
      g.appendChild(btn);
    });
    updateLangBtn(det);
  })();
  document.getElementById('langBtn').addEventListener('click',openLangModal);
  document.getElementById('langModalClose').addEventListener('click',closeLangModal);
  langModalEl.addEventListener('click',function(e){if(e.target===langModalEl)closeLangModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&langModalEl.classList.contains('active')){closeLangModal();e.stopPropagation();}});
  setTimeout(function(){if(!window._gtLoaded){var b=document.getElementById('langBtn');if(b){b.style.opacity='0.5';b.title='Translation unavailable';}}},15000);
  window.googleTranslateElementInit=function(){
    window._gtLoaded=true;
    new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:false},'google_translate_element');
    var p=sessionStorage.getItem('pendingLang');
    if(p){sessionStorage.removeItem('pendingLang');applyLangToCombo(p,250);}
    else{var lo=localStorage.getItem('langOverride');if(lo&&lo!=='en')applyLangToCombo(lo,250);var d=detectCurrentLang();if(d!=='en')updateLangBtn(d);}
  };
  // Inject home icon
  document.getElementById('homeBtn').appendChild(makeIcon('home', 15));

  // ===== SPEC METADATA =====
  var SPEC_NAMES = {4001:'ATK Buff',4002:'Truck Transport',4003:'Truck Heist',4004:'Mining Hub',4006:'HP Buff',4007:'DMG Increase',4008:'DMG Reduction',4010:'DEF Buff',4015:'Daily Tasks',4016:'Seal Stone Train',4017:'Realm',4018:'Realm Thief',4080:'Treasury Reward'};
  var SPEC_CAT = {4001:'combat',4006:'combat',4007:'combat',4008:'combat',4010:'combat',4002:'economy',4003:'economy',4004:'economy',4015:'economy',4016:'utility',4017:'utility',4018:'utility',4080:'special'};
  var SPEC_ICON = {4001:'sword',4006:'heart',4007:'sword',4008:'shield',4010:'shield',4002:'truck',4003:'truck',4004:'pickaxe',4015:'list',4016:'train',4017:'compass',4018:'ghost',4080:'treasure'};
  var EFFECT_TO_SPEC = {11001:4001,11002:4006,11003:4007,11004:4008,11006:4010,11011:4002,11012:4003,11017:4015,11020:4016,11023:4017,11015:4018,11080:4080};

  function priorityLevel(opPI){ if (opPI >= 50) return 1; if (opPI >= 30) return 2; if (opPI >= 15) return 3; return 4; }
  function priorityLabel(p){ return ['','Top-3 power','Top-10 power','Mid power','Standard'][p]; }
  function fmtNum(n){ return (n||0).toLocaleString(); }

  // ===== BUILDERS =====
  function buildHero(rd, roundKey, root){
    var hero = el('section', 'hero');
    var h1 = el('h1');
    h1.appendChild(makeIcon('flag', 16));
    h1.appendChild(document.createTextNode(' Round ' + roundKey + ' — Sector ' + (rd.sector || '?')));
    hero.appendChild(h1);
    var sub = el('div', 'sub');
    sub.appendChild(document.createTextNode((rd.label || '') + ' · All ' + (rd.s2864 ? rd.s2864.warDeclarations : 0) + ' declarations made · '));
    var bold = el('b', null, 'S2864 = #1 sector power');
    sub.appendChild(bold);
    hero.appendChild(sub);
    var hs = el('div', 'hero-stats');
    var statsArr = [
      { v: (rd.s2864 ? rd.s2864.warDeclarations : 0), l: 'Declarations', c: 'v-accent' },
      { v: (rd.contestedRanked || []).length, l: 'Contested', c: 'v-yellow' },
      { v: (rd.ncCaptureFlow || []).length, l: 'NCs Reachable', c: 'v-green' },
      { v: (rd.neutralCityOwned || []).length, l: 'NCs Owned', c: 'v-accent' }
    ];
    statsArr.forEach(function(s){
      var sd = el('div', 'stat ' + s.c);
      sd.appendChild(el('div', 'v', s.v));
      sd.appendChild(el('div', 'l', s.l));
      hs.appendChild(sd);
    });
    hero.appendChild(hs);
    root.appendChild(hero);
  }

  function buildRules(root){
    var section = el('section', 'sect');
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot');
    dot.style.background = 'var(--purple)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'How This Round Works'));
    var tag = el('span', 'tag', 'read first');
    t.appendChild(tag);
    section.appendChild(t);
    var grid = el('div', 'rules');
    var rules = [
      { cls: 'accent', icon: 'compass', title: 'Adjacency = 4-way (no diagonals)', body: 'Capturing a wasteland only opens orthogonal neighbors (N/S/E/W). Plan capture chains in straight lines toward the next NC.' },
      { cls: 'purple', icon: 'arrow', title: 'Empty cells (type 0) allow jump-overs', body: 'Blank cells in the grid count as bridges — an enemy adjacent to one side can target our wasteland on the other side. Watch the edges of our cluster.' },
      { cls: 'red', icon: 'sword', title: 'Combat buffs are the priority', body: 'ATK / HP / DEF / DMG Inc / DMG Red caps are all under 50% filled. Wins on combat L3 wastelands feed everything else for the rest of the event.' },
      { cls: 'green', icon: 'castle', title: 'Goal: capture wastelands then reach NCs', body: 'Every wasteland we hold expands our 4-way reach. NCs (3pts each, more for Lv2/Lv3) are the score multiplier. The capture flow below shows which wins unlock which NCs next round.' },
      { cls: 'yellow', icon: 'info', title: 'Mothership-first on contested L3', body: 'Mothership = 100 troops at 5 HP. Sweeper / Patrol = 50 at 3 HP. For high-power opponent fights, fill Mothership first; smalls only if uncontested.' },
      { cls: 'accent', icon: 'bolt', title: 'No Rockfield', body: 'Use your strongest standard march. Wasted attacks = lost hearts on our side. If you cannot kill anyone at your wasteland, ping a leader for a reassign.' }
    ];
    rules.forEach(function(r){
      var div = el('div', 'rule ' + r.cls);
      div.appendChild(makeIcon(r.icon, 18));
      var inner = el('div');
      inner.appendChild(el('h5', null, r.title));
      inner.appendChild(el('p', null, r.body));
      div.appendChild(inner);
      grid.appendChild(div);
    });
    section.appendChild(grid);
    root.appendChild(section);
  }

  function buildContested(rd, root){
    var contested = (rd.contestedRanked || []).slice().sort(function(a,b){ return b.opPI - a.opPI; });
    if (!contested.length) return;
    var section = el('section', 'sect');
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--red)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'Contested Fights — Ranked by Opponent Power'));
    t.appendChild(el('span', 'tag', contested.length + ' fights'));
    section.appendChild(t);

    var grid = el('div', 'fights');
    var ncUnlocks = rd.declarationNcUnlocks || {};
    contested.forEach(function(f){
      var prio = priorityLevel(f.opPI);
      var card = el('div', 'fight p' + prio);
      var top = el('div', 'fight-top');
      var idDiv = el('div', 'fight-id');
      idDiv.appendChild(document.createTextNode('W-' + f.seq + ' '));
      idDiv.appendChild(el('span', 'lvl', 'Lv.' + f.level));
      top.appendChild(idDiv);
      top.appendChild(el('span', 'fight-prio prio-' + prio, priorityLabel(prio)));
      card.appendChild(top);

      var spec = el('div', 'fight-spec');
      spec.appendChild(makeIcon(SPEC_ICON[f.specId] || 'target', 14));
      spec.appendChild(el('span', null, SPEC_NAMES[f.specId] || ('Spec ' + f.specId)));
      card.appendChild(spec);

      var meta = el('div', 'fight-meta');
      meta.appendChild(document.createTextNode('vs '));
      meta.appendChild(el('b', null, 'S' + f.opponent));
      meta.appendChild(document.createTextNode(' · '));
      meta.appendChild(el('span', 'tier-pill tier-' + (f.tier || 'D'), f.tier || '?'));
      meta.appendChild(document.createTextNode(' sec#' + f.sectorRank));
      meta.appendChild(el('br'));
      meta.appendChild(document.createTextNode('Fame ' + fmtNum(f.opFame) + ' · Score ' + f.opScore + ' · PI ' + f.opPI));
      card.appendChild(meta);

      var unlocks = ncUnlocks[String(f.seq)];
      if (unlocks && unlocks.length){
        var bonus = el('div', 'fight-bonus');
        bonus.appendChild(makeIcon('castle', 13));
        bonus.appendChild(el('span', null, 'Win unlocks ' + unlocks.length + ' NC' + (unlocks.length > 1 ? 's' : '') + ' next round'));
        card.appendChild(bonus);
      }
      grid.appendChild(card);
    });
    section.appendChild(grid);
    root.appendChild(section);
  }

  function buildNcFlow(rd, root){
    var flow = (rd.ncCaptureFlow || []).slice().sort(function(a,b){
      var la = parseInt(a.level) || 0, lb = parseInt(b.level) || 0;
      return lb - la;
    });
    if (!flow.length) return;
    var section = el('section', 'sect');
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--green)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'NC Capture Flow — Reachable Next Round'));
    t.appendChild(el('span', 'tag', flow.length + ' NCs'));
    section.appendChild(t);

    var note = el('div', 'rule-box green');
    note.appendChild(makeIcon('info', 18));
    var body = el('div', 'body');
    body.appendChild(el('strong', null, 'How to read this: '));
    body.appendChild(document.createTextNode('if we capture the listed wasteland(s) this round, the NC becomes 4-way adjacent next round and we can declare on it for points (NC Lv1 = 3pts, Lv2 = 5pts, Lv3 = 8pts).'));
    note.appendChild(body);
    section.appendChild(note);

    var box = el('div', 'nc-flow');
    flow.forEach(function(nc){
      var lvl = parseInt(nc.level) || 1;
      var row = el('div', 'nc-row');
      row.appendChild(makeIcon('castle', 16));
      var name = el('div', 'nc-name');
      name.appendChild(el('span', 'nc-lvl l' + lvl, 'Lv.' + lvl));
      name.appendChild(document.createTextNode(' ' + nc.nc.replace(/^Lv\.\s*\d+\s*/, '')));
      var ownerStr = nc.sid ? 'S' + nc.sid : 'unclaimed';
      name.appendChild(el('span', 'nc-pos', '@(' + nc.r + ',' + nc.c + ') · ' + ownerStr));
      row.appendChild(name);
      var via = el('div', 'nc-via');
      via.appendChild(document.createTextNode('via '));
      via.appendChild(el('b', null, 'W-' + nc.viaWastelands.join(', W-')));
      row.appendChild(via);
      box.appendChild(row);
    });
    section.appendChild(box);
    root.appendChild(section);
  }

  function buildPower(rd, root){
    var pow = rd.sectorPower || [];
    if (!pow.length) return;
    var section = el('section', 'sect');
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--accent)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'Sector ' + rd.sector + ' Power Index'));
    t.appendChild(el('span', 'tag', pow.length + ' servers'));
    section.appendChild(t);

    var note = el('div', 'rule-box accent');
    note.appendChild(makeIcon('chart', 18));
    var body = el('div', 'body');
    body.appendChild(el('strong', null, 'PI'));
    body.appendChild(document.createTextNode(' = 0.4 × round_score + 0.6 × event_fame, normalized 0–100 within sector. '));
    var ours = pow.find(function(p){ return p.sid === 2864; });
    if (ours){
      var b = el('b', null, 'S2864 ranked #' + ours.sectorRank + ' (PI ' + ours.powerIndex + ')');
      body.appendChild(b);
      body.appendChild(document.createTextNode(' — we outpower every opponent except the top 2 in head-to-head fights.'));
    }
    note.appendChild(body);
    section.appendChild(note);

    var table = el('table', 'power power-collapsed');
    var thead = el('thead');
    var trh = el('tr');
    ['Tier','Sec#','SID','Score','Fame','Global','PI'].forEach(function(h){ trh.appendChild(el('th', null, h)); });
    thead.appendChild(trh);
    table.appendChild(thead);
    var tbody = el('tbody');
    pow.forEach(function(p, idx){
      var tr = el('tr');
      if (p.sid === 2864) tr.classList.add('us');
      if (idx >= 12) tr.classList.add('hidden-row');
      var tdTier = el('td');
      tdTier.appendChild(el('span', 'tier-pill tier-' + p.tier, p.tier));
      tr.appendChild(tdTier);
      tr.appendChild(el('td', null, '#' + p.sectorRank));
      var tdSid = el('td');
      var sidB = el('b', null, p.sid === 2864 ? ('S' + p.sid + ' (us)') : ('S' + p.sid));
      tdSid.appendChild(sidB);
      tr.appendChild(tdSid);
      tr.appendChild(el('td', null, p.score || 0));
      tr.appendChild(el('td', null, fmtNum(p.score2 || 0)));
      tr.appendChild(el('td', null, p.rank || '—'));
      var tdPi = el('td');
      tdPi.appendChild(document.createTextNode(p.powerIndex + ''));
      var bar = el('span', 'pi-bar');
      var fill = el('span', 'pi-fill');
      fill.style.width = p.powerIndex + '%';
      bar.appendChild(fill);
      tdPi.appendChild(bar);
      tr.appendChild(tdPi);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    section.appendChild(table);

    var hidden = Math.max(0, pow.length - 12);
    if (hidden > 0){
      var btn = el('button', 'pow-toggle', 'Show all ' + pow.length + ' servers (' + hidden + ' hidden)');
      btn.addEventListener('click', function(){
        var col = table.classList.toggle('power-collapsed');
        btn.textContent = col ? ('Show all ' + pow.length + ' servers (' + hidden + ' hidden)') : ('Hide bottom ' + hidden + ' servers');
      });
      section.appendChild(btn);
    }
    root.appendChild(section);
  }

  function buildBuffs(rd, root){
    var buffs = rd.buffOverview || [];
    if (!buffs.length) return;
    var proj = rd.projectedBuffsFromDeclarations || {};
    var section = el('section', 'sect');
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--yellow)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'Buff Caps — Projected If All Wins'));
    t.appendChild(el('span', 'tag', 'all declarations'));
    section.appendChild(t);

    var enriched = buffs.map(function(b){
      var sp = EFFECT_TO_SPEC[b.effectType];
      var cat = sp ? SPEC_CAT[sp] : 'special';
      var ico = sp ? SPEC_ICON[sp] : 'target';
      var rawCur = (proj[String(b.effectType)] !== undefined) ? proj[String(b.effectType)] : (b.rawCurrent || 0);
      var rawMax = b.rawMax || 0;
      var pct = rawMax > 0 ? Math.min(100, 100 * rawCur / rawMax) : 0;
      var over = rawMax > 0 && rawCur > rawMax;
      return { eff:b.effectType, desc:b.description, cat:cat, ico:ico, rawCur:rawCur, rawMax:rawMax, pct:pct, over:over, paraType:b.paraType };
    });
    var catOrder = { combat:0, economy:1, utility:2, special:3, other:4 };
    enriched.sort(function(a,b){ var co = (catOrder[a.cat]||9) - (catOrder[b.cat]||9); if (co !== 0) return co; return b.rawMax - a.rawMax; });

    var list = el('div', 'buff-list');
    enriched.forEach(function(b){
      var row = el('div', 'buff-row');
      var head = el('div', 'buff-head');
      var desc = el('span', 'desc');
      desc.appendChild(makeIcon(b.ico, 14));
      desc.appendChild(el('span', null, b.desc));
      head.appendChild(desc);
      var dCur, dMax;
      if (b.paraType === 2){ dCur = (b.rawCur/100) + '%'; dMax = (b.rawMax/100) + '%'; }
      else { dCur = b.rawCur + ''; dMax = b.rawMax + ''; }
      var vals = el('span', 'vals');
      vals.appendChild(el('b', null, dCur));
      vals.appendChild(document.createTextNode(' / ' + dMax));
      if (b.over) vals.appendChild(el('span', 'over', 'OVER'));
      head.appendChild(vals);
      row.appendChild(head);
      var bar = el('div', 'buff-bar');
      var fill = el('div', 'buff-fill ' + (b.over ? 'over' : b.cat));
      fill.style.width = Math.max(2, b.pct) + '%';
      bar.appendChild(fill);
      row.appendChild(bar);
      list.appendChild(row);
    });
    section.appendChild(list);
    root.appendChild(section);
  }

  function buildAssignment(rd, root){
    var contested = (rd.contestedRanked || []).slice();
    if (!contested.length) return;
    var section = el('section', 'sect');
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--accent)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'Player Assignment Matrix'));
    t.appendChild(el('span', 'tag', 'deploy strongest where it matters'));
    section.appendChild(t);

    var tiers = { 1: [], 2: [], 3: [], 4: [] };
    contested.forEach(function(f){ tiers[priorityLevel(f.opPI)].push(f); });
    var meta = {
      1: { cls: 't1', label: 'P1', title: 'Top 3 Power Players', desc: 'S/A-tier opponents (PI ≥50). Full Mothership; smalls if needed. Lose-points-if-lose fights.' },
      2: { cls: 't2', label: 'P2', title: 'Top 4-10 Power Players', desc: 'A-tier opponents (PI 30–50). Full Mothership. NC unlock bonuses worth extra effort.' },
      3: { cls: 't3', label: 'P3', title: 'Mid-Tier Power Players', desc: 'B/C-tier opponents (PI 15–30). Standard march composition.' },
      4: { cls: 't4', label: 'P4', title: 'Standard Players', desc: 'D-tier or near-empty defenders (PI <15). We are 5-10x stronger; routine wins.' }
    };
    var grid = el('div', 'assign-grid');
    [1,2,3,4].forEach(function(p){
      if (!tiers[p].length) return;
      var m = meta[p];
      var card = el('div', 'assign-card ' + m.cls);
      var h4 = el('h4');
      h4.appendChild(el('span', 'pill', m.label));
      h4.appendChild(el('span', null, m.title));
      card.appendChild(h4);
      var seqs = el('div', 'seqs');
      tiers[p].forEach(function(f){
        var s = el('span', 'seq', 'W-' + f.seq + ' L' + f.level + ' vs S' + f.opponent);
        seqs.appendChild(s);
      });
      card.appendChild(seqs);
      card.appendChild(el('div', 'desc', m.desc));
      grid.appendChild(card);
    });
    section.appendChild(grid);
    root.appendChild(section);
  }

  function buildFoot(rd, root){
    var foot = el('div', 'foot');
    var date = (rd.extractedAt || '').split('T')[0];
    var upd = el('span', 'upd notranslate', 'Last extracted ' + date);
    foot.appendChild(upd);
    foot.appendChild(document.createTextNode('Live data: '));
    var a1 = el('a', null, 'Sector Map');
    a1.href = 'ssc-map.html';
    foot.appendChild(a1);
    foot.appendChild(document.createTextNode(' · Reference: '));
    var a2 = el('a', null, 'SSC event guide');
    a2.href = 'https://github.com/texnottexas/landing-page/blob/main/data/seal-stone-chaos-event.md';
    foot.appendChild(a2);
    root.appendChild(foot);
  }

  // ===== RENDER =====
  function render(data){
    var root = document.getElementById('root');
    while (root.firstChild) root.removeChild(root.firstChild);
    var roundKey = String(data.currentRound);
    var rd = data.rounds[roundKey];
    if (!rd){
      var e = el('div', 'error', 'No data for current round ' + roundKey);
      root.appendChild(e);
      return;
    }
    document.getElementById('hdrSub').textContent = ' · R' + roundKey;
    buildHero(rd, roundKey, root);
    buildRules(root);
    buildContested(rd, root);
    buildNcFlow(rd, root);
    buildPower(rd, root);
    buildBuffs(rd, root);
    buildAssignment(rd, root);
    buildFoot(rd, root);
  }

  function showError(msg){
    var root = document.getElementById('root');
    while (root.firstChild) root.removeChild(root.firstChild);
    root.appendChild(el('div', 'error', 'Could not load sector data: ' + msg));
  }

  fetch('https://raw.githubusercontent.com/texnottexas/landing-page/main/data/ssc-map.json?_t=' + Date.now(), { cache: 'no-store' })
    .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function(err){ showError(err.message); });
})();
</script>
