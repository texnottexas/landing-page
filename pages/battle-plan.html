<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com; style-src 'self' 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; connect-src 'self' https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com https://raw.githubusercontent.com; img-src 'self' https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://www.google.com data:; frame-ancestors 'none'; frame-src https://translate.google.com;">
<title>S2864 Battle Plan</title>
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --card:#1c2128; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#79c0ff;
  --red:#f85149; --green:#3fb950; --yellow:#d29922; --navy:#388bfd; --purple:#a371f7;
  --tier-s:#f85149; --tier-a:#d29922; --tier-b:#79c0ff; --tier-c:#3fb950; --tier-d:#8b949e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:100;padding-top:calc(.65rem + env(safe-area-inset-top,0px));}
.hdr-left{display:flex;align-items:center;gap:.5rem;min-width:0;flex:1;}
.hdr-title{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-title .dim{color:var(--muted);font-weight:400;margin-left:.3rem;}
.home-btn,.lang-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .55rem;font-size:.78rem;text-decoration:none;transition:border-color .15s,color .15s;cursor:pointer;font-family:inherit;}
.home-btn:hover,.lang-btn:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}
.lang-btn{gap:.3rem;}
.lang-btn #langCode{font-size:.7rem;color:var(--muted);}
.notranslate{unicode-bidi:isolate;}
#google_translate_element{position:absolute;left:-9999px;opacity:0;pointer-events:none;}
.wrap{max-width:1080px;margin:0 auto;padding:1rem;}
@media (min-width:640px){.wrap{padding:1.25rem;}}

.hero{background:linear-gradient(135deg,rgba(121,192,255,.06),rgba(163,113,247,.05));border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;margin-bottom:1rem;}
.hero h1{font-size:1.15rem;font-weight:800;letter-spacing:-.01em;margin-bottom:.25rem;display:flex;align-items:center;gap:.5rem;}
.hero h1 svg{color:var(--accent);}
.hero .sub{font-size:.78rem;color:var(--muted);}
.hero .sub b{color:var(--text);}
.hero-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.55rem;margin-top:.9rem;}
@media (max-width:560px){.hero-stats{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.6rem .5rem;text-align:center;}
.stat .v{font-size:1.1rem;font-weight:800;line-height:1.1;}
.stat .l{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:.25rem;}
.stat.v-green .v{color:var(--green);}
.stat.v-yellow .v{color:var(--yellow);}
.stat.v-accent .v{color:var(--accent);}
.stat.v-red .v{color:var(--red);}

.sect{margin-bottom:1.5rem;}
.sect-title{display:flex;align-items:center;gap:.5rem;font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.65rem;padding-bottom:.4rem;border-bottom:1px solid var(--border);}
.sect-title .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sect-title .tag{margin-left:auto;font-size:.6rem;color:var(--muted);font-weight:500;letter-spacing:.02em;text-transform:none;}

.rule-box{background:rgba(163,113,247,.06);border:1px solid rgba(163,113,247,.28);border-radius:10px;padding:.85rem 1rem;margin-bottom:1.1rem;display:flex;gap:.7rem;align-items:flex-start;}
.rule-box svg{flex-shrink:0;color:var(--purple);margin-top:.15rem;}
.rule-box .body{font-size:.82rem;}
.rule-box .body strong{color:var(--purple);}
.rule-box .body p+p{margin-top:.4rem;}
.rule-box.accent{background:rgba(121,192,255,.05);border-color:rgba(121,192,255,.28);}
.rule-box.accent svg{color:var(--accent);}
.rule-box.accent .body strong{color:var(--accent);}
.rule-box.green{background:rgba(63,185,80,.05);border-color:rgba(63,185,80,.3);}
.rule-box.green svg{color:var(--green);}
.rule-box.green .body strong{color:var(--green);}

.power-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:10px;}
table.power{width:100%;min-width:560px;border-collapse:collapse;font-size:.78rem;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
table.power th{background:var(--surface);text-align:left;padding:.55rem .65rem;font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);border-bottom:1px solid var(--border);}
table.power td{padding:.5rem .65rem;border-bottom:1px solid var(--border);}
table.power tr:last-child td{border-bottom:none;}
table.power tr.us{background:rgba(121,192,255,.08);}
table.power tr.us td{font-weight:700;}
table.power.power-collapsed .hidden-row{display:none;}
.tier-pill{display:inline-block;padding:.1rem .45rem;border-radius:5px;font-size:.66rem;font-weight:800;letter-spacing:.05em;border:1px solid currentColor;background:rgba(255,255,255,.04);}
.tier-S{color:var(--tier-s);}
.tier-A{color:var(--tier-a);}
.tier-B{color:var(--tier-b);}
.tier-C{color:var(--tier-c);}
.tier-D{color:var(--tier-d);}
.pi-bar{display:inline-block;width:60px;height:6px;background:var(--surface);border-radius:3px;vertical-align:middle;margin-left:.4rem;overflow:hidden;}
.pi-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));}
.pow-toggle{margin-top:.5rem;font-size:.72rem;background:none;border:1px dashed var(--border);color:var(--muted);padding:.35rem .65rem;border-radius:6px;cursor:pointer;font-family:inherit;width:100%;}
.pow-toggle:hover{color:var(--accent);border-color:var(--accent);}

.fights{display:grid;gap:.6rem;grid-template-columns:1fr;}
@media (min-width:680px){.fights{grid-template-columns:repeat(2,1fr);}}
@media (min-width:1000px){.fights{grid-template-columns:repeat(3,1fr);}}
.fight{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.75rem .9rem;display:flex;flex-direction:column;gap:.4rem;position:relative;overflow:hidden;}
.fight::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
.fight.p1::before{background:var(--red);}
.fight.p2::before{background:var(--yellow);}
.fight.p3::before{background:var(--accent);}
.fight.p4::before{background:var(--muted);}
.fight.threeway{box-shadow:inset 0 0 0 1px rgba(210,153,34,.45);background:rgba(210,153,34,.04);}
.fight .lvl.threeway-tag{margin-left:.3rem;color:var(--yellow);font-weight:700;}
.fight.defense::before{background:var(--navy);}
.fight.defense{background:rgba(56,139,253,.05);border-color:rgba(56,139,253,.3);}
.fight-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.4rem;}
.fight-id{font-size:1rem;font-weight:800;display:flex;align-items:center;gap:.35rem;}
.fight-id .lvl{font-size:.55rem;padding:.1rem .4rem;border-radius:5px;background:rgba(121,192,255,.1);color:var(--accent);border:1px solid rgba(121,192,255,.25);font-weight:700;letter-spacing:.04em;}
.fight-prio{font-size:.55rem;padding:.15rem .45rem;border-radius:5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;}
.prio-1{background:rgba(248,81,73,.14);color:var(--red);border:1px solid rgba(248,81,73,.3);}
.prio-2{background:rgba(210,153,34,.12);color:var(--yellow);border:1px solid rgba(210,153,34,.3);}
.prio-3{background:rgba(121,192,255,.1);color:var(--accent);border:1px solid rgba(121,192,255,.28);}
.prio-4{background:rgba(139,148,158,.08);color:var(--muted);border:1px solid var(--border);}
.fight-spec{font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:.35rem;}
.fight-spec svg{flex-shrink:0;color:var(--accent);}
.fight-opp{font-size:.72rem;padding:.4rem .55rem;border-radius:6px;background:rgba(121,192,255,.06);border:1px solid rgba(121,192,255,.25);color:var(--text);display:flex;align-items:center;gap:.35rem;cursor:pointer;transition:border-color .15s,background .15s;font-family:inherit;text-align:left;width:100%;}
.fight-opp:hover{border-color:var(--accent);background:rgba(121,192,255,.1);}
.fight-opp svg{flex-shrink:0;color:var(--accent);}
.fight-opp .opp-sid{font-weight:700;color:var(--text);}
.fight-opp .opp-where{color:var(--muted);}
.fight-opp .opp-info-icon{margin-left:auto;color:var(--muted);flex-shrink:0;opacity:.7;}
.fight-opp:hover .opp-info-icon{color:var(--accent);opacity:1;}

/* Opponent details modal */
.opp-modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:1rem;}
.opp-modal-overlay.active{display:flex;}
.opp-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.25rem 1.4rem;max-width:440px;width:100%;max-height:85vh;overflow-y:auto;}
.opp-modal-head{display:flex;align-items:center;justify-content:space-between;gap:.6rem;margin-bottom:.85rem;padding-bottom:.6rem;border-bottom:1px solid var(--border);}
.opp-modal-title{font-size:1.15rem;font-weight:800;display:flex;align-items:center;gap:.5rem;}
.opp-modal-title .verdict{font-size:.6rem;padding:.15rem .45rem;border-radius:5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;}
.opp-modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;padding:.2rem .4rem;border-radius:6px;}
.opp-modal-close:hover{background:var(--surface);color:var(--text);}
.opp-stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.45rem;margin-bottom:.85rem;}
.opp-stat{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.5rem .65rem;}
.opp-stat .lbl{font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:600;margin-bottom:.15rem;}
.opp-stat .val{font-size:.95rem;font-weight:800;color:var(--text);}
.opp-verdict-card{background:rgba(121,192,255,.05);border:1px solid rgba(121,192,255,.25);border-radius:8px;padding:.7rem .85rem;font-size:.78rem;color:var(--text);line-height:1.5;}
.opp-verdict-card.threat{background:rgba(248,81,73,.06);border-color:rgba(248,81,73,.3);}
.opp-verdict-card.watch{background:rgba(210,153,34,.06);border-color:rgba(210,153,34,.3);}
.opp-verdict-card.easy{background:rgba(63,185,80,.05);border-color:rgba(63,185,80,.28);}
.opp-verdict-card b{color:var(--text);font-weight:700;}
.opp-other-fights{margin-top:.85rem;padding-top:.65rem;border-top:1px solid var(--border);}
.opp-other-fights h5{font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:.4rem;}
.opp-other-list{display:flex;flex-wrap:wrap;gap:.3rem;font-size:.7rem;}
.opp-other-pill{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:.15rem .45rem;color:var(--text);font-family:'SF Mono',Consolas,monospace;}
.fight-bonus{font-size:.68rem;padding:.3rem .45rem;border-radius:6px;background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.28);color:var(--green);display:flex;align-items:center;gap:.35rem;}
.fight-bonus svg{flex-shrink:0;}

.nc-flow{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.nc-row{display:flex;align-items:center;gap:.7rem;padding:.6rem .85rem;border-bottom:1px solid var(--border);}
.nc-row:last-child{border-bottom:none;}
.nc-row svg{color:var(--green);flex-shrink:0;}
.nc-row .nc-name{flex:1;min-width:0;font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.nc-row .nc-lvl{font-size:.6rem;padding:.08rem .35rem;border-radius:4px;font-weight:800;}
.nc-row .nc-lvl.l3{background:rgba(248,81,73,.14);color:var(--red);}
.nc-row .nc-lvl.l2{background:rgba(210,153,34,.14);color:var(--yellow);}
.nc-row .nc-lvl.l1{background:rgba(121,192,255,.1);color:var(--accent);}
.nc-row .nc-pos{color:var(--muted);font-size:.7rem;font-weight:500;}
.nc-row .nc-via{font-size:.7rem;color:var(--muted);text-align:right;flex-shrink:0;}
.nc-row .nc-via b{color:var(--text);}
@media (max-width:640px){
  .nc-row{flex-direction:column;align-items:flex-start;gap:.4rem;padding:.7rem .85rem;}
  .nc-row .nc-name{flex-wrap:wrap;width:100%;}
  .nc-row .nc-via,.nc-row .two-hop-via{justify-content:flex-start;text-align:left;width:100%;}
  .nc-row .nc-pos{width:100%;}
}
.nc-row.two-hop svg{color:var(--purple);}
.two-hop-via{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;justify-content:flex-end;}
.two-hop-via .two-hop-path{display:inline-flex;align-items:center;gap:.25rem;background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:.15rem .4rem;}
.two-hop-via .hop-arrow{color:var(--muted);}
.two-hop-via .w2-declared{color:var(--green);font-weight:700;}
.two-hop-via .w2-open{color:var(--accent);font-weight:700;}
.two-hop-via .path-sep{color:var(--muted);font-size:.65rem;}
.two-hop-via .path-more{color:var(--muted);font-size:.65rem;font-style:italic;}
.two-hop-via .path-break{flex-basis:100%;height:0;margin:0;}
.two-hop-via .path-alt-label{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;background:var(--surface);border:1px solid var(--border);border-radius:3px;padding:.05rem .35rem;align-self:center;}
.two-hop-legend{display:flex;gap:.85rem;flex-wrap:wrap;margin-top:.55rem;padding:.45rem .65rem;background:rgba(163,113,247,.04);border:1px dashed rgba(163,113,247,.25);border-radius:6px;font-size:.66rem;color:var(--muted);}
.two-hop-legend .leg-item b.w2-declared{color:var(--green);font-weight:700;}
.two-hop-legend .leg-item b.w2-open{color:var(--accent);font-weight:700;}

.three-hop-coll{border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--card);}
.three-hop-toggle{width:100%;background:var(--card);border:none;color:var(--text);padding:.7rem .9rem;display:flex;align-items:center;gap:.5rem;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:600;text-align:left;transition:background .15s;}
.three-hop-toggle:hover{background:var(--surface);color:var(--accent);}
.three-hop-toggle svg{transition:transform .2s;color:var(--muted);transform:rotate(90deg);}
.three-hop-coll.open .three-hop-toggle svg{transform:rotate(-90deg);color:var(--accent);}
.three-hop-body{display:none;padding:.85rem 1rem 1rem;border-top:1px solid var(--border);}
.three-hop-coll.open .three-hop-body{display:block;}
.three-hop-body .rule-box{margin-bottom:.85rem;}
.three-hop-body .rule-box svg{color:var(--navy);}
.three-hop-body .rule-box .body strong{color:var(--navy);}
.nc-row.three-hop svg{color:var(--navy);}

.buff-list{display:flex;flex-direction:column;gap:.45rem;}
.buff-row{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.55rem .75rem;}
.buff-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;font-size:.78rem;font-weight:600;margin-bottom:.3rem;}
.buff-head .desc{display:flex;align-items:center;gap:.4rem;}
.buff-head svg{flex-shrink:0;}
.buff-head .vals{font-size:.7rem;color:var(--muted);font-family:'SF Mono',Consolas,monospace;}
.buff-head .vals b{color:var(--text);}
.buff-head .vals .over{color:var(--red);font-weight:700;margin-left:.3rem;}
.buff-proj{font-size:.62rem;color:var(--muted);margin-top:.2rem;font-style:italic;}
.buff-bar{height:7px;background:var(--surface);border-radius:4px;overflow:hidden;margin-top:.3rem;}
.buff-fill{height:100%;border-radius:4px;}
.buff-fill.combat{background:linear-gradient(90deg,var(--red),var(--yellow));}
.buff-fill.economy{background:linear-gradient(90deg,var(--accent),var(--green));}
.buff-fill.utility{background:linear-gradient(90deg,var(--purple),var(--accent));}
.buff-fill.special{background:linear-gradient(90deg,var(--green),var(--yellow));}
.buff-fill.over{background:repeating-linear-gradient(45deg,var(--red),var(--red) 4px,#a13b35 4px,#a13b35 8px);}

.assign-grid{display:grid;gap:.55rem;grid-template-columns:1fr;}
@media (min-width:720px){.assign-grid{grid-template-columns:repeat(2,1fr);}}
.assign-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.7rem .9rem;}
.assign-card h4{font-size:.78rem;font-weight:800;margin-bottom:.45rem;display:flex;align-items:center;gap:.4rem;}
.assign-card h4 .pill{font-size:.6rem;padding:.1rem .4rem;border-radius:5px;font-weight:700;}
.assign-card.t1 h4 .pill{background:rgba(248,81,73,.14);color:var(--red);border:1px solid rgba(248,81,73,.3);}
.assign-card.t2 h4 .pill{background:rgba(210,153,34,.12);color:var(--yellow);border:1px solid rgba(210,153,34,.3);}
.assign-card.t3 h4 .pill{background:rgba(121,192,255,.08);color:var(--accent);border:1px solid rgba(121,192,255,.25);}
.assign-card.t4 h4 .pill{background:rgba(139,148,158,.08);color:var(--muted);border:1px solid var(--border);}
.assign-card .seqs{font-size:.72rem;color:var(--text);font-family:'SF Mono',Consolas,monospace;line-height:1.7;}
.assign-card .seqs .seq{display:inline-block;padding:.05rem .35rem;background:var(--surface);border:1px solid var(--border);border-radius:4px;margin-right:.25rem;margin-bottom:.2rem;}
.assign-card .seqs .seq.threeway{border-color:rgba(210,153,34,.85);background:rgba(210,153,34,.18);font-weight:700;}
.assign-card .desc{font-size:.7rem;color:var(--muted);margin-top:.5rem;line-height:1.45;}

.rules{display:grid;gap:.5rem;grid-template-columns:1fr;}
@media (min-width:640px){.rules{grid-template-columns:repeat(2,1fr);}}
.rule{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.7rem .85rem;display:flex;gap:.55rem;align-items:flex-start;font-size:.78rem;}
.rule svg{flex-shrink:0;margin-top:.15rem;}
.rule h5{font-size:.78rem;font-weight:700;margin-bottom:.15rem;}
.rule p{font-size:.72rem;color:var(--muted);line-height:1.45;}
.rule.accent svg{color:var(--accent);}
.rule.green svg{color:var(--green);}
.rule.red svg{color:var(--red);}
.rule.yellow svg{color:var(--yellow);}
.rule.purple svg{color:var(--purple);}

/* Focus order banner */
.focus-order{display:flex;align-items:stretch;gap:.5rem;flex-wrap:wrap;margin-bottom:.85rem;}
.fo-step{flex:1 1 160px;min-width:0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem .85rem;text-align:center;position:relative;overflow:hidden;}
.fo-step::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
.fo-step.fo-a::before{background:var(--red);}
.fo-step.fo-b::before{background:var(--yellow);}
.fo-step.fo-c::before{background:var(--green);}
.fo-step.fo-d::before{background:var(--muted);}
.fo-lbl{font-size:.6rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700;margin-top:.15rem;}
.fo-title{font-size:.95rem;font-weight:800;margin:.2rem 0 .1rem;}
.fo-step.fo-a .fo-title{color:var(--red);}
.fo-step.fo-b .fo-title{color:var(--yellow);}
.fo-step.fo-c .fo-title{color:var(--green);}
.fo-step.fo-d .fo-title{color:var(--muted);}
.fo-sub{font-size:.65rem;color:var(--muted);line-height:1.35;}
.fo-arrow{color:var(--muted);align-self:center;flex-shrink:0;}
@media (max-width:700px){.focus-order{flex-direction:column;gap:.4rem;}.fo-arrow{transform:rotate(90deg);align-self:center;}.fo-step{flex-basis:auto;}}

/* Focus tier expanded cards */
.focus-tier{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.75rem .9rem;margin-bottom:.55rem;display:flex;gap:.6rem;align-items:flex-start;}
.focus-tier.fa{border-left:4px solid var(--red);}
.focus-tier.fb{border-left:4px solid var(--yellow);}
.focus-tier.fc{border-left:4px solid var(--green);}
.focus-tier.fd{border-left:4px solid var(--muted);}
.focus-tier .icon-wrap{flex-shrink:0;width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);}
.focus-tier.fa .icon-wrap svg{color:var(--red);}
.focus-tier.fb .icon-wrap svg{color:var(--yellow);}
.focus-tier.fc .icon-wrap svg{color:var(--green);}
.focus-tier.fd .icon-wrap svg{color:var(--muted);}
.focus-tier .body{flex:1;min-width:0;}
.focus-tier h4{font-size:.85rem;font-weight:800;margin-bottom:.2rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.focus-tier h4 .count{font-size:.65rem;font-weight:600;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:.1rem .4rem;border-radius:5px;}
.focus-tier .desc{font-size:.72rem;color:var(--muted);line-height:1.45;margin-bottom:.45rem;}
.focus-tier .desc b{color:var(--text);}
.focus-tier .seq-pills{display:flex;flex-wrap:wrap;gap:.25rem;}
.focus-tier .seq-pill{font-family:'SF Mono',Consolas,monospace;font-size:.66rem;padding:.12rem .4rem;background:var(--surface);border:1px solid var(--border);border-radius:5px;color:var(--text);}
.focus-tier .seq-pill.with-nc{border-color:rgba(63,185,80,.5);background:rgba(63,185,80,.08);}
.focus-tier .seq-pill.threat{border-color:rgba(248,81,73,.5);background:rgba(248,81,73,.08);}
.focus-tier .seq-pill.over{border-color:rgba(139,148,158,.5);background:rgba(139,148,158,.08);text-decoration:line-through;color:var(--muted);}
.focus-tier .seq-pill.contested{border-color:rgba(210,153,34,.55);background:rgba(210,153,34,.10);}
.focus-tier .seq-pill.threeway{border-color:rgba(210,153,34,.85);background:rgba(210,153,34,.18);font-weight:600;}
.focus-tier .seq-pill.threat.threeway{border-color:rgba(248,81,73,.85);background:rgba(248,81,73,.16);}

.foot{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border);font-size:.7rem;color:var(--muted);text-align:center;}
.foot .upd{display:block;margin-bottom:.25rem;}
.foot a{color:var(--muted);}

.lang-modal-overlay{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.65);align-items:center;justify-content:center;padding:1rem;}
.lang-modal-overlay.active{display:flex;}
.lang-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem;max-width:400px;width:100%;max-height:80vh;overflow-y:auto;}
.lang-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem;}
.lang-modal-title{font-size:.95rem;font-weight:700;}
.lang-modal-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;padding:.2rem;}
.lang-modal-close:hover{color:var(--text);}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
@media (max-width:480px){.lang-grid{grid-template-columns:1fr;}}
.lang-option{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid transparent;background:var(--surface);cursor:pointer;font-size:.82rem;color:var(--text);font-family:inherit;}
.lang-option:hover{border-color:var(--accent);}
.lang-option.active{border-color:var(--accent);background:rgba(121,192,255,.08);}
.lang-option .lang-flag{font-size:1.1rem;}
.goog-te-banner-frame{display:none!important;}
body{top:0!important;}

.loading{padding:2rem 1rem;text-align:center;color:var(--muted);font-size:.85rem;}
.error{padding:1rem;background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.3);border-radius:8px;color:var(--red);font-size:.82rem;}
</style>

<body>

<header>
  <div class="hdr-left">
    <a href="https://2864tw.com/index.html" class="home-btn notranslate" title="Home" aria-label="Home" id="homeBtn"></a>
    <span class="hdr-title notranslate">S2864 Battle Plan<span class="dim" id="hdrSub">&middot; loading</span></span>
  </div>
  <button class="lang-btn notranslate" id="langBtn" aria-label="Change language">
    <span id="langFlag"></span><span id="langCode">/en</span>
  </button>
</header>
<div id="google_translate_element"></div>

<div class="wrap" id="root">
  <div class="loading">Loading sector data&hellip;</div>
</div>

<div class="lang-modal-overlay" id="langModal">
  <div class="lang-modal">
    <div class="lang-modal-header">
      <span class="lang-modal-title">Select Language</span>
      <button class="lang-modal-close" id="langModalClose" aria-label="Close">&#10005;</button>
    </div>
    <div class="lang-grid" id="langGrid"></div>
  </div>
</div>

<script>
(function(){
  // ===== SAFE DOM HELPERS =====
  var SVG_NS = 'http://www.w3.org/2000/svg';
  function el(tag, cls, txt){ var n = document.createElement(tag); if (cls) n.className = cls; if (txt !== undefined && txt !== null) n.textContent = String(txt); return n; }
  function svgEl(name, attrs){ var n = document.createElementNS(SVG_NS, name); if (attrs) Object.keys(attrs).forEach(function(k){ n.setAttribute(k, attrs[k]); }); return n; }

  /** Build SVG icon from a path-spec entry. Path-spec is an array of
   * primitive instructions: ['path', { d: '...' }] etc. All values are
   * trusted constants from the ICONS table below — never user input. */
  function makeIcon(name, size){
    size = size || 14;
    var spec = ICONS[name];
    if (!spec) return null;
    var s = svgEl('svg', { width: size, height: size, viewBox: '0 0 24 24', fill: spec.fill || 'none', stroke: spec.fill === 'currentColor' ? 'none' : 'currentColor', 'stroke-width': '2', 'stroke-linecap': 'round', 'stroke-linejoin': 'round' });
    spec.parts.forEach(function(p){
      var node = svgEl(p[0], p[1]);
      s.appendChild(node);
    });
    return s;
  }

  // SVG icon definitions — all path strings are trusted constants
  var ICONS = {
    home: { parts: [ ['path', { d: 'M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V9.5z' }] ] },
    flag: { parts: [ ['path', { d: 'M4 21V4h12l-2 4 2 4H4' }] ] },
    target: { parts: [ ['circle', { cx:'12', cy:'12', r:'10' }], ['circle', { cx:'12', cy:'12', r:'6' }], ['circle', { cx:'12', cy:'12', r:'2', fill:'currentColor' }] ] },
    sword: { parts: [ ['path', { d: 'M14.5 17.5 21 24l-3-10 2-2L14 8l1-1L6 4l-2 2 3 9-2 2 10 3-1-1z' }] ] },
    heart: { parts: [ ['path', { d: 'M12 21s-7-4.5-7-11a5 5 0 0 1 7-4.58A5 5 0 0 1 19 10c0 6.5-7 11-7 11z' }] ] },
    shield: { parts: [ ['path', { d: 'M12 2 3 6v6c0 5 4 9 9 10 5-1 9-5 9-10V6l-9-4z' }] ] },
    truck: { parts: [ ['path', { d: 'M1 7h13v10H1zM14 10h5l3 3v4h-8z' }], ['circle', { cx:'6', cy:'18', r:'2' }], ['circle', { cx:'18', cy:'18', r:'2' }] ] },
    pickaxe: { parts: [ ['path', { d: 'M14 2c4 0 8 4 8 8L4 22l-2-2L14 2z' }] ] },
    list: { parts: [ ['line', { x1:'8', y1:'6', x2:'21', y2:'6' }], ['line', { x1:'8', y1:'12', x2:'21', y2:'12' }], ['line', { x1:'8', y1:'18', x2:'21', y2:'18' }], ['circle', { cx:'3.5', cy:'6', r:'1', fill:'currentColor' }], ['circle', { cx:'3.5', cy:'12', r:'1', fill:'currentColor' }], ['circle', { cx:'3.5', cy:'18', r:'1', fill:'currentColor' }] ] },
    train: { parts: [ ['rect', { x:'4', y:'3', width:'16', height:'14', rx:'2' }], ['path', { d: 'M4 11h16M8 17v3M16 17v3' }], ['circle', { cx:'9', cy:'14', r:'1' }], ['circle', { cx:'15', cy:'14', r:'1' }] ] },
    ghost: { parts: [ ['path', { d: 'M12 2c4 0 7 3 7 7v12l-2-2-2 2-2-2-2 2-2-2-2 2-2-2V9c0-4 3-7 7-7z' }], ['circle', { cx:'9', cy:'10', r:'1', fill:'currentColor' }], ['circle', { cx:'15', cy:'10', r:'1', fill:'currentColor' }] ] },
    castle: { parts: [ ['path', { d: 'M3 21V8h3V4h3v4h6V4h3v4h3v13zM10 21v-6h4v6' }] ] },
    treasure: { parts: [ ['rect', { x:'3', y:'9', width:'18', height:'11', rx:'1' }], ['path', { d: 'M3 12h18M11 9V7c0-2 2-3 3-3h-4c1 0 3 1 3 3v2' }], ['circle', { cx:'12', cy:'14', r:'1.5' }] ] },
    info: { parts: [ ['circle', { cx:'12', cy:'12', r:'10' }], ['line', { x1:'12', y1:'8', x2:'12', y2:'12' }], ['circle', { cx:'12', cy:'16', r:'.5', fill:'currentColor' }] ] },
    arrow: { parts: [ ['line', { x1:'5', y1:'12', x2:'19', y2:'12' }], ['polyline', { points:'12 5 19 12 12 19' }] ] },
    bolt: { parts: [ ['polygon', { points:'13 2 3 14 12 14 11 22 21 10 12 10' }] ] },
    chart: { parts: [ ['path', { d: 'M3 3v18h18' }], ['path', { d: 'M7 14l4-4 4 4 5-5' }] ] },
    compass: { parts: [ ['circle', { cx:'12', cy:'12', r:'10' }], ['polygon', { points:'16 8 14 14 8 16 10 10' }] ] },
    users: { parts: [ ['path', { d: 'M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2' }], ['circle', { cx:'9', cy:'7', r:'4' }], ['path', { d: 'M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75' }] ] },
    globe: { parts: [ ['circle', { cx:'12', cy:'12', r:'10' }], ['line', { x1:'2', y1:'12', x2:'22', y2:'12' }], ['path', { d: 'M12 2a15 15 0 0 1 0 20a15 15 0 0 1 0-20' }] ] }
  };

  // ===== LANG SWITCHER (kept simple, matches other pages) =====
  var LANGUAGES=[
    {code:'en',flag:'\u{1F1FA}\u{1F1F8}',name:'English'},
    {code:'es',flag:'\u{1F1EA}\u{1F1F8}',name:'Español'},
    {code:'fr',flag:'\u{1F1EB}\u{1F1F7}',name:'Français'},
    {code:'de',flag:'\u{1F1E9}\u{1F1EA}',name:'Deutsch'},
    {code:'pt',flag:'\u{1F1E7}\u{1F1F7}',name:'Português'},
    {code:'it',flag:'\u{1F1EE}\u{1F1F9}',name:'Italiano'},
    {code:'ru',flag:'\u{1F1F7}\u{1F1FA}',name:'Русский'},
    {code:'ja',flag:'\u{1F1EF}\u{1F1F5}',name:'日本語'},
    {code:'ko',flag:'\u{1F1F0}\u{1F1F7}',name:'한국어'},
    {code:'zh-CN',flag:'\u{1F1E8}\u{1F1F3}',name:'中文'},
    {code:'tr',flag:'\u{1F1F9}\u{1F1F7}',name:'Türkçe'},
    {code:'vi',flag:'\u{1F1FB}\u{1F1F3}',name:'Tiếng Việt'}
  ];
  function getLangData(c){var b=c.split('-')[0];return LANGUAGES.find(function(l){return l.code===c||l.code===b;})||null;}
  function detectCurrentLang(){var m=document.cookie.match(/googtrans=\/en\/([a-zA-Z-]{2,10})/);return m&&m[1]?m[1]:'en';}
  function updateLangBtn(code){var d=getLangData(code);var f=document.getElementById('langFlag');var c=document.getElementById('langCode');if(d&&f){f.textContent=d.flag;c.textContent='/'+d.code;}else if(f){f.textContent='\u{1F310}';c.textContent='/'+code;}document.querySelectorAll('.lang-option').forEach(function(o){o.classList.toggle('active',o.dataset.lang===code);});}
  function applyLangToCombo(code,delay){var a=0;var p=setInterval(function(){var c=document.querySelector('.goog-te-combo');if(c){c.value=code;c.dispatchEvent(new Event('change'));clearInterval(p);updateLangBtn(code);}if(++a>30)clearInterval(p);},delay||200);}
  var langModalEl=document.getElementById('langModal');
  function openLangModal(){langModalEl.classList.add('active');}
  function closeLangModal(){langModalEl.classList.remove('active');}
  function selectLanguage(code){if(code==='en'){sessionStorage.removeItem('pendingLang');document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax; Secure';document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.2864tw.com; SameSite=Lax; Secure';closeLangModal();location.reload();return;}sessionStorage.setItem('pendingLang',code);applyLangToCombo(code,200);closeLangModal();}
  (function(){
    var g=document.getElementById('langGrid');
    var det=detectCurrentLang();
    LANGUAGES.forEach(function(l){
      var btn=document.createElement('button');
      btn.className='lang-option'+(l.code===det?' active':'');
      btn.dataset.lang=l.code;
      btn.type='button';
      var flagSpan=el('span','lang-flag',l.flag);
      var nameSpan=el('span','lang-name',l.name);
      btn.appendChild(flagSpan);
      btn.appendChild(nameSpan);
      btn.addEventListener('click',function(){selectLanguage(l.code);});
      g.appendChild(btn);
    });
    updateLangBtn(det);
  })();
  document.getElementById('langBtn').addEventListener('click',openLangModal);
  document.getElementById('langModalClose').addEventListener('click',closeLangModal);
  langModalEl.addEventListener('click',function(e){if(e.target===langModalEl)closeLangModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&langModalEl.classList.contains('active')){closeLangModal();e.stopPropagation();}});
  setTimeout(function(){if(!window._gtLoaded){var b=document.getElementById('langBtn');if(b){b.style.opacity='0.5';b.title='Translation unavailable';}}},15000);
  window.googleTranslateElementInit=function(){
    window._gtLoaded=true;
    new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:false},'google_translate_element');
    var p=sessionStorage.getItem('pendingLang');
    if(p){sessionStorage.removeItem('pendingLang');applyLangToCombo(p,250);}
    else{var lo=localStorage.getItem('langOverride');if(lo&&lo!=='en')applyLangToCombo(lo,250);var d=detectCurrentLang();if(d!=='en')updateLangBtn(d);}
  };
  // Inject home icon
  document.getElementById('homeBtn').appendChild(makeIcon('home', 15));

  // ===== SPEC METADATA =====
  var SPEC_NAMES = {4001:'ATK Buff',4002:'Truck Transport',4003:'Truck Heist',4004:'Mining Hub',4006:'HP Buff',4007:'DMG Increase',4008:'DMG Reduction',4010:'DEF Buff',4015:'Daily Tasks',4016:'Seal Stone Train',4017:'Realm',4018:'Realm Thief',4080:'Treasury Reward'};
  var SPEC_CAT = {4001:'combat',4006:'combat',4007:'combat',4008:'combat',4010:'combat',4002:'economy',4003:'economy',4004:'economy',4015:'economy',4016:'utility',4017:'utility',4018:'utility',4080:'special'};
  var SPEC_ICON = {4001:'sword',4006:'heart',4007:'sword',4008:'shield',4010:'shield',4002:'truck',4003:'truck',4004:'pickaxe',4015:'list',4016:'train',4017:'compass',4018:'ghost',4080:'treasure'};
  var EFFECT_TO_SPEC = {11001:4001,11002:4006,11003:4007,11004:4008,11006:4010,11011:4002,11012:4003,11017:4015,11020:4016,11023:4017,11015:4018,11080:4080,11026:4004,11013:4004,11014:4004,11021:4016,11022:4016,11016:4018,11024:4017};

  // Per-wasteland buff contribution. perStack scales with level (linear),
  // byLevel encodes cumulative tiered buffs (different effect unlocked per level).
  // Raw values: % effects ×100, count effects as integers.
  var SPEC_LEVEL_CONTRIB = {
    // Combat — single effect, linear by level
    4001: { perStack: { 11001: 9000 } },   // ATK +90% per stack
    4006: { perStack: { 11002: 9000 } },   // HP
    4007: { perStack: { 11003: 1500 } },   // DMG Inc
    4008: { perStack: { 11004: 1500 } },   // DMG Red
    4010: { perStack: { 11006: 500 } },    // DEF
    // Economy — single effect, linear
    4002: { perStack: { 11011: 1 } },      // Truck Transport seal
    4003: { perStack: { 11012: 1 } },      // Truck Heist seal
    4015: { perStack: { 11017: 2 } },      // Daily Tasks seal
    4080: { perStack: { 11080: 1 } },      // Treasury reward
    // Tiered multi-effect: each level adds a new buff line
    4004: { byLevel: {
      1: { 11026: 500 },                                // Mining Speed +5%
      2: { 11026: 500, 11013: 1 },                      // + Warehouse Lv +1
      3: { 11026: 500, 11013: 1, 11014: 1 }             // + Mining Lv +1
    }},
    4016: { byLevel: {
      1: { 11020: 1 },                                  // Passengers +1
      2: { 11020: 1, 11021: 2 },                        // + Refresh cost -2
      3: { 11020: 1, 11021: 2, 11022: 1 }               // + Rarity cap +1
    }},
    4017: { byLevel: {
      1: { 11023: 1000 },                               // March +10%
      2: { 11023: 3000 },                               // March +10% + +20% = +30%
      3: { 11023: 3000, 11024: 1 }                      // + 1 Enigma Beast
    }},
    4018: { byLevel: {
      1: { 11015: 1000 },                               // Pass drop -10%
      2: { 11015: 1000, 11016: 1000 },                  // + Pass gain +10%
      3: { 11015: 1000, 11016: 3000 }                   // + Pass gain +20% total
    }}
  };

  function computeProjection(rd){
    var proj = {};
    (rd.warTargets || []).forEach(function(w){
      var conf = SPEC_LEVEL_CONTRIB[w.specId];
      if (!conf) return;
      var contrib = null;
      if (conf.byLevel) contrib = conf.byLevel[w.level] || null;
      else if (conf.perStack){
        contrib = {};
        Object.keys(conf.perStack).forEach(function(eff){
          contrib[eff] = conf.perStack[eff] * w.level;
        });
      }
      if (!contrib) return;
      Object.keys(contrib).forEach(function(eff){
        proj[eff] = (proj[eff] || 0) + contrib[eff];
      });
    });
    return proj;
  }

  // Threat model: only sector servers with ≥100K event fame are real threats.
  // Everything below = expected win regardless of round-score PI swings.
  var FAME_THREAT_THRESHOLD = 100000;
  function priorityLevel(opPI, opFame){
    if ((opFame||0) >= FAME_THREAT_THRESHOLD) return 1;
    if (opPI >= 30) return 2;
    if (opPI >= 15) return 3;
    return 4;
  }
  function priorityLabel(p){ return ['','Real threat','Watch — strong','Should win','Easy win'][p]; }
  function sectorRankDescriptor(rank){
    if (rank <= 3) return 'top of sector';
    if (rank <= 6) return 'upper sector';
    if (rank <= 12) return 'mid sector';
    if (rank <= 20) return 'lower-mid sector';
    return 'bottom of sector';
  }
  function plainSummary(opFame, sectorRank, sectorTotal){
    var k = (opFame||0) >= 1000 ? Math.round(opFame/1000) + 'K' : (opFame||0);
    return sectorRankDescriptor(sectorRank) + ' · ranked #' + sectorRank + ' of ' + sectorTotal + ' · ' + k + ' fame';
  }
  // ===== OPPONENT DETAILS MODAL =====
  function openOppModal(fight, rd){
    var overlay = document.getElementById('oppModalOverlay');
    if (!overlay){
      overlay = document.createElement('div');
      overlay.id = 'oppModalOverlay';
      overlay.className = 'opp-modal-overlay';
      document.body.appendChild(overlay);
      overlay.addEventListener('click', function(e){ if (e.target === overlay) closeOppModal(); });
      document.addEventListener('keydown', function(e){
        if (e.key === 'Escape' && overlay.classList.contains('active')) closeOppModal();
      });
    }
    while (overlay.firstChild) overlay.removeChild(overlay.firstChild);
    overlay.appendChild(buildOppModalContent(fight, rd));
    overlay.classList.add('active');
  }
  function closeOppModal(){
    var overlay = document.getElementById('oppModalOverlay');
    if (overlay) overlay.classList.remove('active');
  }
  function buildOppModalContent(fight, rd){
    var modal = el('div', 'opp-modal');
    var pow = (rd.sectorPower || []).find(function(p){ return p.sid === fight.opponent; }) || {};
    var sectorTotal = (rd.sectorPower || []).length;
    var prio = priorityLevel(fight.opPI, fight.opFame);

    // Header
    var head = el('div', 'opp-modal-head');
    var title = el('div', 'opp-modal-title');
    title.appendChild(makeIcon('users', 18));
    title.appendChild(el('span', null, 'S' + fight.opponent));
    var verdictCls = ['','prio-1','prio-2','prio-3','prio-4'][prio];
    title.appendChild(el('span', 'verdict ' + verdictCls, priorityLabel(prio)));
    head.appendChild(title);
    var closeBtn = el('button', 'opp-modal-close');
    closeBtn.type = 'button';
    closeBtn.setAttribute('aria-label', 'Close');
    closeBtn.appendChild(document.createTextNode('×'));
    closeBtn.addEventListener('click', closeOppModal);
    head.appendChild(closeBtn);
    modal.appendChild(head);

    // Stat grid
    var grid = el('div', 'opp-stat-grid');
    var stats = [
      { lbl: 'Sector Rank', val: '#' + fight.sectorRank + ' of ' + sectorTotal },
      { lbl: 'Position', val: sectorRankDescriptor(fight.sectorRank) },
      { lbl: 'Event Fame', val: (fight.opFame||0).toLocaleString() },
      { lbl: 'Round Score', val: (fight.opScore||0) },
      { lbl: 'Global Rank', val: pow.rank ? '#' + pow.rank : '—' },
      { lbl: 'Power Index', val: (fight.opPI != null ? fight.opPI : '—') }
    ];
    stats.forEach(function(s){
      var st = el('div', 'opp-stat');
      st.appendChild(el('div', 'lbl', s.lbl));
      st.appendChild(el('div', 'val', s.val));
      grid.appendChild(st);
    });
    modal.appendChild(grid);

    // Verdict card
    var verdictBox = el('div', 'opp-verdict-card');
    var verdictText;
    if (prio === 1){
      verdictBox.classList.add('threat');
      verdictText = 'Real threat. Fame ≥100K means this server has proven sustained power across many rounds. ';
      verdictText += 'Assign a top-3 power player. Fill Mothership; smalls only if uncontested.';
    } else if (prio === 2){
      verdictBox.classList.add('watch');
      verdictText = 'Strong opponent (PI ≥30) but fame is below 100K threshold. Watch the fight; assign top-10 power player. ';
      verdictText += 'Likely a win, but do not let mid-tier players solo this.';
    } else if (prio === 3){
      verdictText = 'Mid-tier opponent. Standard march composition. Routine win expected.';
    } else {
      verdictBox.classList.add('easy');
      verdictText = 'Weak opponent. Easy win expected — assign anyone with march capacity. ';
      verdictText += 'We are typically 5–10× stronger.';
    }
    verdictBox.appendChild(document.createTextNode(verdictText));
    modal.appendChild(verdictBox);

    // Other contested fights with this server
    var others = (rd.contestedRanked || []).filter(function(c){ return c.opponent === fight.opponent && c.seq !== fight.seq; });
    if (others.length){
      var ofSect = el('div', 'opp-other-fights');
      ofSect.appendChild(el('h5', null, 'Also fighting us at:'));

  // Parse "Lv. 2 Neutral City #2015" -> { num: 2015, level: 2 }
  function parseNc(name){
    var m = (name || '').match(/Lv\.\s*(\d+)\s*Neutral City\s*#(\d+)/);

  // ===== 2-HOP NC PATH COMPUTATION =====
  function compute2HopPaths(rd){
    var cells = rd.cells || [];
    if (!cells.length) return [];
    var byRC = {};
    cells.forEach(function(c){ byRC[c.r + ',' + c.c] = c; });
    var declared = (rd.warTargets || []).map(function(w){ return w.seq; });
    var declaredSet = {};
    declared.forEach(function(s){ declaredSet[s] = true; });
    var seqToCell = {};
    cells.forEach(function(c){
      if (c.type !== 3) return;
      var m = (c.name||'').match(/Wasteland#(\d+)/);
      if (m) seqToCell[parseInt(m[1], 10)] = c;
    });
    // 1-hop NCs already covered — exclude
    var oneHop = {};
    (rd.ncCaptureFlow || []).forEach(function(nc){ oneHop[nc.r + ',' + nc.c] = true; });
    var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    var pathsByNc = {};
    declared.forEach(function(seq){
      var W = seqToCell[seq];
      if (!W) return;
      dirs.forEach(function(d){
        var W2 = byRC[(W.r + d[0]) + ',' + (W.c + d[1])];
        if (!W2 || W2.type !== 3 || W2.sid !== 0) return;
        var m = (W2.name||'').match(/Wasteland#(\d+)/);
        if (!m) return;
        var W2seq = parseInt(m[1], 10);
        dirs.forEach(function(d2){
          var ncR = W2.r + d2[0], ncC = W2.c + d2[1];
          var nc = byRC[ncR + ',' + ncC];
          if (!nc || nc.type !== 2) return;
          if (nc.sid === 2864) return; // already ours
          if (oneHop[ncR + ',' + ncC]) return; // 1-hop already
          var lm = (nc.name||'').match(/Lv\.\s*(\d+)/);
          var lvl = lm ? parseInt(lm[1], 10) : 1;
          var key = ncR + ',' + ncC;
          if (!pathsByNc[key]){
            pathsByNc[key] = { ncName: nc.name, r: ncR, c: ncC, sid: nc.sid, level: lvl, paths: [] };
          }
          var dup = pathsByNc[key].paths.some(function(p){ return p.via1 === seq && p.via2 === W2seq; });
          if (!dup) pathsByNc[key].paths.push({ via1: seq, via2: W2seq, via2Declared: !!declaredSet[W2seq] });
        });
      });
    });
    var arr = Object.keys(pathsByNc).map(function(k){ return pathsByNc[k]; });
    arr.sort(function(a,b){ return (b.level||0) - (a.level||0) || a.ncName.localeCompare(b.ncName); });
    return arr;
  }

  function compute3HopPaths(rd){
    var cells = rd.cells || [];

    var byRC = {};
    cells.forEach(function(c){ byRC[c.r + ',' + c.c] = c; });
    var declared = (rd.warTargets || []).map(function(w){ return w.seq; });
    var declaredSet = {};
    declared.forEach(function(s){ declaredSet[s] = true; });
    var seqToCell = {};
    cells.forEach(function(c){
      if (c.type !== 3) return;
      var m = (c.name||'').match(/Wasteland#(\d+)/);
      if (m) seqToCell[parseInt(m[1], 10)] = c;
    });
    // Exclude 1-hop and 2-hop NCs
    var skipNc = {};
    (rd.ncCaptureFlow || []).forEach(function(nc){ skipNc[nc.r + ',' + nc.c] = true; });
    var twoHop = compute2HopPaths(rd);
    twoHop.forEach(function(nc){ skipNc[nc.r + ',' + nc.c] = true; });

    var dirs = [[-1,0],[1,0],[0,-1],[0,1]];
    var pathsByNc = {};
    function seqOf(cell){ var m = (cell.name||'').match(/Wasteland#(\d+)/); return m ? parseInt(m[1], 10) : null; }
    declared.forEach(function(seq){
      var W = seqToCell[seq];
      if (!W) return;
      dirs.forEach(function(d){
        var W2 = byRC[(W.r + d[0]) + ',' + (W.c + d[1])];
        if (!W2 || W2.type !== 3 || W2.sid !== 0) return;
        var W2seq = seqOf(W2);
        if (!W2seq) return;
        dirs.forEach(function(d2){
          var W3 = byRC[(W2.r + d2[0]) + ',' + (W2.c + d2[1])];
          if (!W3 || W3.type !== 3 || W3.sid !== 0) return;
          // No revisit: W3 != W
          if (W3.r === W.r && W3.c === W.c) return;
          var W3seq = seqOf(W3);
          if (!W3seq) return;
          dirs.forEach(function(d3){
            var ncR = W3.r + d3[0], ncC = W3.c + d3[1];
            var nc = byRC[ncR + ',' + ncC];
            if (!nc || nc.type !== 2) return;
            if (nc.sid === 2864) return;
            if (skipNc[ncR + ',' + ncC]) return;
            var lm = (nc.name||'').match(/Lv\.\s*(\d+)/);
            var lvl = lm ? parseInt(lm[1], 10) : 1;
            var key = ncR + ',' + ncC;
            if (!pathsByNc[key]){
              pathsByNc[key] = { ncName: nc.name, r: ncR, c: ncC, sid: nc.sid, level: lvl, paths: [] };
            }
            var dup = pathsByNc[key].paths.some(function(p){ return p.via1 === seq && p.via2 === W2seq && p.via3 === W3seq; });
            if (!dup) pathsByNc[key].paths.push({
              via1: seq, via2: W2seq, via3: W3seq,
              via2Declared: !!declaredSet[W2seq],
              via3Declared: !!declaredSet[W3seq]
            });
          });
        });
      });
    });
    var arr = Object.keys(pathsByNc).map(function(k){ return pathsByNc[k]; });
    arr.sort(function(a,b){ return (b.level||0) - (a.level||0) || a.ncName.localeCompare(b.ncName); });
    return arr;
  }

  function buildThreeHopFlow(rd, root){
    var paths = compute3HopPaths(rd);
    if (!paths.length) return;
    var totalRounds = 15;
    var roundsLeft = Math.max(0, totalRounds - (parseInt(rd.label && rd.label.match(/\d+/) && rd.label.match(/\d+/)[0], 10) || 0));

    var section = el('section', 'sect');
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--navy)';
    t.appendChild(dot);
    t.appendChild(el('span', null, '3-Hop NC Pathways — Reachable in 3 Rounds'));
    var roundsTag = (roundsLeft > 0 ? roundsLeft + ' rounds left · ' : '') + paths.length + ' more NCs';
    t.appendChild(el('span', 'tag', roundsTag));
    section.appendChild(t);

    // Collapsible body
    var coll = el('div', 'three-hop-coll');
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'three-hop-toggle';
    btn.appendChild(makeIcon('arrow', 14));
    btn.appendChild(el('span', null, 'Show 3-hop pathways (' + paths.length + ' NCs)'));
    coll.appendChild(btn);

    var body = el('div', 'three-hop-body');

    var note = el('div', 'rule-box');
    note.style.background = 'rgba(56,139,253,.05)';
    note.style.borderColor = 'rgba(56,139,253,.28)';
    note.appendChild(makeIcon('compass', 18));
    var noteBody = el('div', 'body');
    noteBody.appendChild(el('strong', null, 'Long-term planning: '));
    noteBody.appendChild(document.createTextNode('NCs that need 3 captures to reach. Win W-A this round, declare W-B next round, declare W-C the round after. Three rounds out the NC opens up. With ' + roundsLeft + ' rounds left in the event, these are still actionable.'));
    note.appendChild(noteBody);
    body.appendChild(note);

    var box = el('div', 'nc-flow');
    paths.forEach(function(p){
      var lvl = p.level || 1;
      var row = el('div', 'nc-row three-hop');
      row.appendChild(makeIcon('castle', 16));
      var name = el('div', 'nc-name');
      name.appendChild(el('span', 'nc-lvl l' + lvl, 'Lv.' + lvl));
      name.appendChild(document.createTextNode(' ' + p.ncName.replace(/^Lv\.\s*\d+\s*/, '')));
      var ownerStr = p.sid ? 'S' + p.sid : 'unclaimed';
      name.appendChild(el('span', 'nc-pos', '@(' + p.r + ',' + p.c + ') · ' + ownerStr));
      row.appendChild(name);
      var via = el('div', 'nc-via two-hop-via');
      p.paths.forEach(function(path, i){
        if (i > 0){
          via.appendChild(el('div', 'path-break'));
          via.appendChild(el('span', 'path-alt-label', 'alt route ' + i));
        }
        var pathSpan = el('span', 'two-hop-path');
        pathSpan.appendChild(el('b', null, 'W-' + path.via1));
        var arrow1 = makeIcon('arrow', 10); arrow1.classList.add('hop-arrow');
        pathSpan.appendChild(arrow1);
        pathSpan.appendChild(el('b', path.via2Declared ? 'w2-declared' : 'w2-open', 'W-' + path.via2));
        var arrow2 = makeIcon('arrow', 10); arrow2.classList.add('hop-arrow');
        pathSpan.appendChild(arrow2);
        pathSpan.appendChild(el('b', path.via3Declared ? 'w2-declared' : 'w2-open', 'W-' + path.via3));
        via.appendChild(pathSpan);
      });
      row.appendChild(via);
      box.appendChild(row);
    });
    body.appendChild(box);
    coll.appendChild(body);

    btn.addEventListener('click', function(){
      var open = coll.classList.toggle('open');
      btn.querySelector('span').textContent = open ? 'Hide 3-hop pathways' : ('Show 3-hop pathways (' + paths.length + ' NCs)');
    });

    section.appendChild(coll);
    root.appendChild(section);
  }

  function buildPower(rd, root){
    var pow = rd.sectorPower || [];
    if (!pow.length) return;
    var section = el('section', 'sect');
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--accent)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'Sector ' + rd.sector + ' Power Index'));
    t.appendChild(el('span', 'tag', pow.length + ' servers'));
    section.appendChild(t);

    var note = el('div', 'rule-box accent');
    note.appendChild(makeIcon('chart', 18));
    var body = el('div', 'body');
    body.appendChild(el('strong', null, 'PI'));
    body.appendChild(document.createTextNode(' = 0.4 × round_score + 0.6 × event_fame, normalized 0–100 within sector. '));
    var ours = pow.find(function(p){ return p.sid === 2864; });
    if (ours){
      var b = el('b', null, 'S2864 ranked #' + ours.sectorRank + ' (PI ' + ours.powerIndex + ')');
      body.appendChild(b);
      body.appendChild(document.createTextNode(' — we outpower every opponent except the top 2 in head-to-head fights.'));
    }
    note.appendChild(body);
    section.appendChild(note);

    var table = el('table', 'power power-collapsed');
    var thead = el('thead');
    var trh = el('tr');
    ['Tier','Sec#','SID','Score','Fame','Global','PI'].forEach(function(h){ trh.appendChild(el('th', null, h)); });
    thead.appendChild(trh);
    table.appendChild(thead);
    var tbody = el('tbody');
    pow.forEach(function(p, idx){
      var tr = el('tr');
      if (p.sid === 2864) tr.classList.add('us');
      if (idx >= 12) tr.classList.add('hidden-row');
      var tdTier = el('td');
      tdTier.appendChild(el('span', 'tier-pill tier-' + p.tier, p.tier));
      tr.appendChild(tdTier);
      tr.appendChild(el('td', null, '#' + p.sectorRank));
      var tdSid = el('td');
      var sidB = el('b', null, p.sid === 2864 ? ('S' + p.sid + ' (us)') : ('S' + p.sid));
      tdSid.appendChild(sidB);
      tr.appendChild(tdSid);
      tr.appendChild(el('td', null, p.score || 0));
      tr.appendChild(el('td', null, fmtNum(p.score2 || 0)));
      tr.appendChild(el('td', null, p.rank || '—'));
      var tdPi = el('td');
      tdPi.appendChild(document.createTextNode(p.powerIndex + ''));
      var bar = el('span', 'pi-bar');
      var fill = el('span', 'pi-fill');
      fill.style.width = p.powerIndex + '%';
      bar.appendChild(fill);
      tdPi.appendChild(bar);
      tr.appendChild(tdPi);
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    var tableWrap = el('div', 'power-wrap');
    tableWrap.appendChild(table);
    section.appendChild(tableWrap);

    var hidden = Math.max(0, pow.length - 12);
    if (hidden > 0){
      var btn = el('button', 'pow-toggle', 'Show all ' + pow.length + ' servers (' + hidden + ' hidden)');
      btn.addEventListener('click', function(){
        var col = table.classList.toggle('power-collapsed');
        btn.textContent = col ? ('Show all ' + pow.length + ' servers (' + hidden + ' hidden)') : ('Hide bottom ' + hidden + ' servers');
      });
      section.appendChild(btn);
    }
    root.appendChild(section);
  }

  function buildBuffs(rd, root){
    var buffs = rd.buffOverview || [];
    if (!buffs.length) return;
    // Project buffs assuming all 33 declarations win. Computed client-side from
    // SPEC_LEVEL_CONTRIB so multi-effect specs (Realm, SS Train, Mining Hub,
    // Realm Thief) are handled correctly (the JSON-side projection only
    // mapped each spec to a single effect, missing tiered buff lines).
    var proj = computeProjection(rd);
    var section = el('section', 'sect');
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--yellow)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'Buff Caps — Projected If All Wins'));
    t.appendChild(el('span', 'tag', 'all ' + (rd.warTargets || []).length + ' declarations'));
    section.appendChild(t);

    var enriched = buffs.map(function(b){
      var sp = EFFECT_TO_SPEC[b.effectType];
      var cat = sp ? SPEC_CAT[sp] : 'special';
      var ico = sp ? SPEC_ICON[sp] : 'target';
      // Projection ADDS to current owned-buff value (rawCurrent from game extract)
      var live = b.rawCurrent || 0;
      var declared = proj[String(b.effectType)] || 0;
      var rawCur = live + declared;
      var rawMax = b.rawMax || 0;
      var pct = rawMax > 0 ? Math.min(100, 100 * rawCur / rawMax) : 0;
      var over = rawMax > 0 && rawCur > rawMax;
      return { eff:b.effectType, desc:b.description, cat:cat, ico:ico, rawCur:rawCur, rawLive:live, rawDeclared:declared, rawMax:rawMax, pct:pct, over:over, paraType:b.paraType };
    });
    // Custom display order: combat first, then Realm March (11023), then Treasury (11080), then rest by category
    var COMBAT_EFFECTS = { 11001:1, 11002:2, 11003:3, 11004:4, 11006:5 };
    function buffSortKey(b){
      if (COMBAT_EFFECTS[b.eff]) return [0, COMBAT_EFFECTS[b.eff]];
      if (b.eff === 11023) return [1, 0]; // Realm march speed
      if (b.eff === 11080) return [2, 0]; // Treasury
      var catOrder = { combat:3, economy:4, utility:5, special:6, other:7 };
      return [catOrder[b.cat] || 8, -b.rawMax];
    }
    enriched.sort(function(a,b){
      var ka = buffSortKey(a), kb = buffSortKey(b);
      if (ka[0] !== kb[0]) return ka[0] - kb[0];
      return ka[1] - kb[1];
    });

    function fmtVal(v, paraType){
      if (paraType === 2) return (v/100) + '%';
      return v + '';
    }

    var list = el('div', 'buff-list');
    enriched.forEach(function(b){
      var row = el('div', 'buff-row');
      var head = el('div', 'buff-head');
      var desc = el('span', 'desc');
      desc.appendChild(makeIcon(b.ico, 14));
      desc.appendChild(el('span', null, b.desc));
      head.appendChild(desc);
      var hideMax = (b.eff === 11080) && b.rawMax === 0; // Treasury cap is round-pool dependent, not fixed
      var dCur = fmtVal(b.rawCur, b.paraType);
      var dMax = fmtVal(b.rawMax, b.paraType);
      var dDeclared = fmtVal(b.rawDeclared, b.paraType);
      var dLive = fmtVal(b.rawLive, b.paraType);
      var vals = el('span', 'vals');
      vals.appendChild(el('b', null, hideMax ? ('+' + dCur) : dCur));
      if (hideMax){
        vals.appendChild(document.createTextNode(' (round pool)'));
      } else {
        vals.appendChild(document.createTextNode(' / ' + dMax));
        if (b.over) vals.appendChild(el('span', 'over', 'OVER'));
      }
      head.appendChild(vals);
      row.appendChild(head);
      // Projection breakdown subtitle (only when declarations contribute)
      if (b.rawDeclared > 0){
        var sub = el('div', 'buff-proj');
        if (b.rawLive > 0){
          sub.textContent = 'Live ' + dLive + ' + projected ' + dDeclared + ' from ' + (rd.warTargets || []).filter(function(w){
            var conf = SPEC_LEVEL_CONTRIB[w.specId];
            if (!conf) return false;
            var c = conf.byLevel ? (conf.byLevel[w.level] || {}) : Object.keys(conf.perStack||{}).reduce(function(o,k){ o[k]=conf.perStack[k]; return o; }, {});
            return c[b.eff] !== undefined;
          }).length + ' declaration(s)';
        } else {
          sub.textContent = 'Projected from ' + (rd.warTargets || []).filter(function(w){
            var conf = SPEC_LEVEL_CONTRIB[w.specId];
            if (!conf) return false;
            var c = conf.byLevel ? (conf.byLevel[w.level] || {}) : Object.keys(conf.perStack||{}).reduce(function(o,k){ o[k]=conf.perStack[k]; return o; }, {});
            return c[b.eff] !== undefined;
          }).length + ' declaration(s)';
        }
        row.appendChild(sub);
      }
      // Bar: hide for round-pool effect; otherwise normal
      if (!hideMax){
        var bar = el('div', 'buff-bar');
        var fill = el('div', 'buff-fill ' + (b.over ? 'over' : b.cat));
        fill.style.width = Math.max(2, b.pct) + '%';
        bar.appendChild(fill);
        row.appendChild(bar);
      } else {
        // For treasury: show a static "earned" indicator instead of cap bar
        var bar = el('div', 'buff-bar');
        var fill = el('div', 'buff-fill special');
        fill.style.width = b.rawCur > 0 ? '100%' : '2%';
        fill.style.opacity = '.4';
        bar.appendChild(fill);
        row.appendChild(bar);
      }
      list.appendChild(row);
    });
    section.appendChild(list);
    root.appendChild(section);
  }

  function buildAssignment(rd, root){
    var contested = (rd.contestedRanked || []).slice();
    if (!contested.length) return;
    var section = el('section', 'sect');
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--accent)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'Player Assignment Matrix'));
    t.appendChild(el('span', 'tag', 'deploy strongest where it matters'));
    section.appendChild(t);

    // Group per-seq so 3-way fights produce one card per wasteland (highest-priority opponent drives tier)
    var bySeq = {};
    contested.forEach(function(f){
      var k = String(f.seq);
      if (!bySeq[k]) bySeq[k] = { seq: f.seq, level: f.level, specId: f.specId, opps: [] };
      bySeq[k].opps.push(f);
    });
    Object.keys(bySeq).forEach(function(k){
      bySeq[k].opps.sort(function(a,b){ return (b.opPI||0) - (a.opPI||0); });
      bySeq[k].topOpp = bySeq[k].opps[0];
    });

    var tiers = { 1: [], 2: [], 3: [], 4: [] };
    Object.keys(bySeq).forEach(function(k){
      var f = bySeq[k];
      tiers[priorityLevel(f.topOpp.opPI, f.topOpp.opFame)].push(f);
    });
    // Sort each tier by top-opponent power desc
    Object.keys(tiers).forEach(function(p){
      tiers[p].sort(function(a,b){ return (b.topOpp.opPI||0) - (a.topOpp.opPI||0); });
    });
    var meta = {
      1: { cls: 't1', label: 'P1', title: 'Real-Threat Fights — Top Power Players', desc: 'Opponent fame ≥100K. Full Mothership; smalls if needed. The only fights where a wrong assignment can lose us points.' },
      2: { cls: 't2', label: 'P2', title: 'Top 4–10 Power Players', desc: 'Opponent fame <100K but PI ≥30. Full Mothership. NC unlock bonuses worth extra effort.' },
      3: { cls: 't3', label: 'P3', title: 'Mid Power Players', desc: 'Opponent PI 15–30. Standard march composition. Routine wins.' },
      4: { cls: 't4', label: 'P4', title: 'Standard Players', desc: 'Opponent PI <15 or near-empty. We are 5–10× stronger; assign anyone.' }
    };
    var grid = el('div', 'assign-grid');
    [1,2,3,4].forEach(function(p){
      if (!tiers[p].length) return;
      var m = meta[p];
      var card = el('div', 'assign-card ' + m.cls);
      var h4 = el('h4');
      h4.appendChild(el('span', 'pill', m.label));
      h4.appendChild(el('span', null, m.title));
      card.appendChild(h4);
      var seqs = el('div', 'seqs');
      tiers[p].forEach(function(f){
        var sids = f.opps.map(function(o){ return 'S' + o.opponent; }).join(' + ');
        var label = 'W-' + f.seq + ' L' + f.level + (f.opps.length >= 2 ? ' ⚠ ' + (f.opps.length + 1) + '-way ' : ' vs ') + sids;
        var s = el('span', 'seq', label);
        if (f.opps.length >= 2) s.classList.add('threeway');
        seqs.appendChild(s);
      });
      card.appendChild(seqs);
      card.appendChild(el('div', 'desc', m.desc));
      grid.appendChild(card);
    });
    section.appendChild(grid);
    root.appendChild(section);
  }

  function buildDefense(rd, root){
    var def = (rd.defenseTargets || []).filter(function(d){ return (d.attackerSids||[]).length > 0; });
    if (!def.length) return;
    var section = el('section', 'sect');
    var t = el('div', 'sect-title');
    var dot = el('span', 'dot'); dot.style.background = 'var(--navy)';
    t.appendChild(dot);
    t.appendChild(el('span', null, 'Defense — Wastelands We Own Under Attack'));
    t.appendChild(el('span', 'tag', def.length + ' incoming'));
    section.appendChild(t);

    var grid = el('div', 'fights');
    def.sort(function(a,b){ return (b.attackerSids.length) - (a.attackerSids.length) || a.seq - b.seq; });
    def.forEach(function(d){
      var atks = d.attackerSids || [];
      var multi = atks.length >= 2;
      var card = el('div', 'fight defense' + (multi ? ' threeway' : ''));
      var top = el('div', 'fight-top');
      var idDiv = el('div', 'fight-id');
      idDiv.appendChild(document.createTextNode('W-' + d.seq + ' '));
      idDiv.appendChild(el('span', 'lvl', 'Lv.' + d.level));
      if (multi) idDiv.appendChild(el('span', 'lvl threeway-tag', '⚠ ' + (atks.length + 1) + '-way'));
      top.appendChild(idDiv);
      top.appendChild(el('span', 'fight-prio prio-1', 'Defend'));
      card.appendChild(top);

      var spec = el('div', 'fight-spec');
      spec.appendChild(makeIcon((typeof SPEC_ICON !== 'undefined' && SPEC_ICON[d.specId]) || 'shield', 14));
      spec.appendChild(el('span', null, d.specName || ('Spec ' + d.specId)));
      card.appendChild(spec);

      var oppDiv = el('div', 'fight-opp');
      oppDiv.appendChild(makeIcon('users', 14));
      oppDiv.appendChild(el('span', null, 'Defending vs ' + atks.map(function(s){ return 'S'+s; }).join(' + ')));
      card.appendChild(oppDiv);
      grid.appendChild(card);
    });
    section.appendChild(grid);
    root.appendChild(section);
  }

  function buildFoot(rd, root){
    var foot = el('div', 'foot');
    var date = (rd.extractedAt || '').split('T')[0];
    var upd = el('span', 'upd notranslate', 'Last extracted ' + date);
    foot.appendChild(upd);
    foot.appendChild(document.createTextNode('Live data: '));
    var a1 = el('a', null, 'Sector Map');
    a1.href = 'ssc-map.html';
    foot.appendChild(a1);
    foot.appendChild(document.createTextNode(' · Reference: '));
    var a2 = el('a', null, 'SSC event guide');
    a2.href = 'https://github.com/texnottexas/landing-page/blob/main/data/seal-stone-chaos-event.md';
    foot.appendChild(a2);
    root.appendChild(foot);
  }

  // ===== RENDER =====
  function render(data){
    var root = document.getElementById('root');
    while (root.firstChild) root.removeChild(root.firstChild);
    var roundKey = String(data.currentRound);
    var rd = data.rounds[roundKey];
    if (!rd){
      var e = el('div', 'error', 'No data for current round ' + roundKey);
      root.appendChild(e);
      return;
    }
    document.getElementById('hdrSub').textContent = ' · R' + roundKey;
    buildHero(rd, roundKey, root);
    buildRules(root);
    buildFocus(rd, root);
    buildContested(rd, root);
    buildDefense(rd, root);
    buildNcFlow(rd, root);
    buildTwoHopFlow(rd, root);
    buildThreeHopFlow(rd, root);
    buildPower(rd, root);
    buildBuffs(rd, root);
    buildAssignment(rd, root);
    buildFoot(rd, root);
  }

  function showError(msg){
    var root = document.getElementById('root');
    while (root.firstChild) root.removeChild(root.firstChild);
    root.appendChild(el('div', 'error', 'Could not load sector data: ' + msg));
  }

  fetch('https://raw.githubusercontent.com/texnottexas/landing-page/main/data/ssc-map.json?_t=' + Date.now(), { cache: 'no-store' })
    .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function(err){ showError(err.message); });
})();
</script>
