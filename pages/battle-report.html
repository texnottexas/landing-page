    ownContent.appendChild(skinGrid);
    ownSec.appendChild(ownContent);
    body.appendChild(ownSec);

    modal.appendChild(body);
    overlay.appendChild(modal);
    return overlay;
  }

  /** Create a DOM element safely */
  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) {
      for (var k in attrs) {
        if (k === 'className') node.className = attrs[k];
        else if (k === 'onclick') node.addEventListener('click', attrs[k]);
        else if (k === 'style') node.style.cssText = attrs[k];
        else node.setAttribute(k, attrs[k]);
      }
    }
    if (children) {
      if (!Array.isArray(children)) children = [children];
      children.forEach(function(c) {
        if (c == null) return;
        if (typeof c === 'string') node.appendChild(document.createTextNode(c));
        else node.appendChild(c);
      });
    }
    return node;
  }

  /** Parse playerInfo JSON from players array */
  function getPlayerInfo(side, playerIndex) {
    var players = side.players || [];
    var idx = (playerIndex !== undefined) ? playerIndex : 0;
    if (players.length === 0 || idx >= players.length) return { username: 'Unknown', nationalflag: 0 };
    try {
      var pi = JSON.parse(players[idx].playerInfo || '{}');
      return pi;
    } catch(e) {
      return { username: 'Unknown', nationalflag: 0 };
    }
  }

  /** Get avatar URL from playerInfo */
  function resolveAvatar(url) {
    if (!url) return null;
    if (url.indexOf('http') === 0) return url;
    return 'https://h5.topwargame.com/DynRes/images/headpic/' + url + '.png?t=21.jpg';
  }

  function getAvatar(pi) {
    return resolveAvatar(pi.headimgurl_custom) || resolveAvatar(pi.avatarurl) || null;
  }

  /** UID stripping for raw JSON display — only strip the 'uid' field */
  function stripUIDs(obj) {
    if (obj == null || typeof obj !== 'object') return obj;
    if (Array.isArray(obj)) {
      return obj.map(function(item) { return stripUIDs(item); });
    }
    var result = {};
    for (var key in obj) {
      if (!obj.hasOwnProperty(key)) continue;
      if (key === 'uid') { result[key] = 0; continue; }
      result[key] = stripUIDs(obj[key]);
    }
    return result;
  }

  /** Calculate survival percentage from units array */
  function calcSurvival(units) {
    if (!units || units.length === 0) return { pct: 0, alive: 0, total: 0 };
    var alive = 0;
    var total = units.length;
    for (var i = 0; i < units.length; i++) {
      if (units[i].isDead === 0) alive++;
    }
    return { pct: total > 0 ? (alive / total * 100) : 0, alive: alive, total: total };
  }

  /** Get hero icon URL from hero ID */
  function heroIconUrl(heroId) {
    return 'https://h5.topwargame.com/DynRes/images/headpic/hero_icon' + heroId + '_global.png?t=22.jpg';
  }

  /** Create a hero icon img element with onerror fallback */
  function heroIconImg(heroId, size, borderClass) {
    var img = el('img', {
      src: heroIconUrl(heroId),
      alt: 'Hero ' + heroId,
      width: String(size),
      height: String(size),
      className: borderClass || ''
    });
    img.onerror = function() { this.style.display = 'none'; };
    return img;
  }

  /** Extract heroList from a side's players[playerIndex], or return empty array */
  function getHeroList(side, playerIndex) {
    var players = side.players || [];
    var idx = (playerIndex !== undefined) ? playerIndex : 0;
    if (players.length === 0 || idx >= players.length) return [];
    return players[idx].heroList || [];
  }

  /** Collect heroLists from ALL players on a side (for rally reports) */
  function getAllHeroLists(side) {
    var players = side.players || [];
    var all = [];
    for (var i = 0; i < players.length; i++) {
      var hl = players[i].heroList || [];
      for (var j = 0; j < hl.length; j++) all.push(hl[j]);
    }
    return all;
  }

  /** Check how many unique players exist on a side (by username) */
  function getUniquePlayerCount(side) {
    var players = side.players || [];
    if (players.length <= 1) return players.length;
    var names = {};
    for (var i = 0; i < players.length; i++) {
      try { var pi = JSON.parse(players[i].playerInfo || '{}'); names[pi.username || ('_p' + i)] = true; } catch(e) { names['_p' + i] = true; }
    }
    return Object.keys(names).length;
  }

  /** Build skillId -> { heroId, skillId } mapping from both sides' heroLists */
  function buildSkillToHeroMap(attHeroes, defHeroes) {
    var map = {};
    var allHeroes = (attHeroes || []).concat(defHeroes || []);
    allHeroes.forEach(function(hero) {
      if (!hero || !hero.nonActiveSkills || hero.nonActiveSkills.length === 0) return;
      var skillId = String(hero.nonActiveSkills[0].skillId);
      if (skillId && hero.id) {
        map[skillId] = { heroId: hero.id, skillId: hero.nonActiveSkills[0].skillId };
      }
    });
    return map;
  }

  /** Create a skill icon img element with onerror fallback */
  function skillIconImg(skillId, size) {
    var img = el('img', {
      src: ASSET_BASE + 'assets/skill-icons/skill_' + skillId + '.png',
      alt: 'Skill ' + skillId,
      width: String(size),
      height: String(size),
      className: 'skill-icon'
    });
    img.onerror = function() { this.style.display = 'none'; };
    return img;
  }

  /** Build hero portrait row for one side */
  function buildHeroPortraits(heroList, side) {
    if (!heroList || heroList.length === 0) return null;
    var isAtt = (side === 'att');
    var wrap = el('div', { className: 'hero-portraits' + (isAtt ? '' : ' right') });

    heroList.forEach(function(hero) {
      if (!hero || !hero.id) return;
      var portrait = el('div', { className: 'hero-portrait' });

      // Icon image
      var img = heroIconImg(hero.id, 48, isAtt ? 'att-border' : 'def-border');
      portrait.appendChild(img);

      // Hero name
      var heroName = HERO_NAMES[String(hero.id)] || ('#' + hero.id);
      var nameEl = el('span', { className: 'hero-name', title: heroName });
      nameEl.textContent = heroName;
      portrait.appendChild(nameEl);

      // Level label
      var lvl = el('span', { className: 'hero-level' });
      lvl.textContent = 'Lv.' + (hero.level || '?');
      portrait.appendChild(lvl);

      // Star indicators
      if (hero.star && hero.star > 0) {
        var stars = el('span', { className: 'hero-stars' });
        stars.textContent = '\u2605'.repeat(hero.star);
        portrait.appendChild(stars);
      }

      // Exclusive skill level pill
      var exclInfo = EXCL_SKILL[hero.id];
      if (exclInfo) {
        var exclEntry = (hero.nonActiveSkills || []).find(function(s){ return s.skillId === exclInfo.id; });
        if (exclEntry) {
          var pill = el('span', { className: 'excl-pill' });
          pill.textContent = 'Excl. Lv.' + exclEntry.level;
          portrait.appendChild(pill);
        }
      }

      wrap.appendChild(portrait);
    });

    return wrap;
  }

  // ---- Build sections ----

  /** Build a detail-side with label and content for a details-row */
  function buildDetailSide(label, isRight, badgeName) {
    var side = el('div', { className: 'detail-side' + (isRight ? ' right' : '') });
    if (badgeName) {
      var badge = el('div', { className: 'mobile-badge ' + (isRight ? 'def' : 'att') });
      badge.textContent = badgeName;
      side.appendChild(badge);
    }
    var lbl = el('div', { className: 'detail-label' });
    lbl.textContent = label;
    side.appendChild(lbl);
    return side;
  }

  /** Build one side of the survival bar row */
  function buildSurvivalSide(surv, side, playerName) {
    var isAtt = (side === 'att');
    var color = isAtt ? 'green' : 'red';
    var sideEl = buildDetailSide('Survival', !isAtt, playerName);

    var barWrap = el('div', { className: 'survival-bar-wrap' });
    var bar = el('div', { className: 'survival-bar' });
    bar.appendChild(el('div', { className: 'fill ' + color, style: 'width:' + surv.pct.toFixed(1) + '%' }));
    barWrap.appendChild(bar);

    var pctEl = el('div', { className: 'survival-pct' + (isAtt ? '' : ' right') });
    pctEl.textContent = surv.alive + '/' + surv.total + ' stacks survived (' + surv.pct.toFixed(0) + '%)';
    barWrap.appendChild(pctEl);

    sideEl.appendChild(barWrap);
    return sideEl;
  }

  /** Build a unit icon img with onerror fallback */
  function unitIconImg(src, alt) {
    var img = el('img', { src: src, className: 'unit-icon', alt: alt, width: '40', height: '40' });
    img.onerror = function() { this.style.display = 'none'; };
    return img;
  }

  /** Build one side of the army composition row */
  function buildArmySide(army, mechas, side, playerName, totalArmyNum) {
    var isAtt = (side === 'att');
    var sideEl = buildDetailSide('Unit Composition', !isAtt, playerName);

    // Show total army count if available
    if (totalArmyNum) {
      var totalEl = el('div', { style: 'font-size:.75rem;color:var(--accent);font-weight:600;margin-bottom:.25rem;' });
      totalEl.textContent = formatPower(totalArmyNum) + ' total units';
      sideEl.appendChild(totalEl);
    }

    var list = el('ul', { className: 'army-list ' + (isAtt ? 'left' : 'right') });

    army.forEach(function(a) {
      var resolved = resolveUnitIcon(a.armyId, mechas);
      var survived = a.s0 || 0;
      var died = a.s1 || 0;
      var hasBreakdown = survived > 0 || died > 0;

      function makeLi(count, color, label, icon) {
        var li = el('li');
        if (color) li.style.color = 'var(--' + color + ')';
        var numSpan = el('span');
        numSpan.textContent = 'x' + formatPower(count);
        var unitInfo = el('span', { className: 'unit-info' });
        var labelSpan = el('span');
        labelSpan.textContent = label;
        if (isAtt) {
          unitInfo.appendChild(labelSpan);
          if (icon) unitInfo.appendChild(unitIconImg(icon, label));
          li.appendChild(numSpan);
          li.appendChild(unitInfo);
        } else {
          if (icon) unitInfo.appendChild(unitIconImg(icon, label));
          unitInfo.appendChild(labelSpan);
          li.appendChild(unitInfo);
          li.appendChild(numSpan);
        }
        return li;
      }

      if (hasBreakdown) {
        if (survived > 0) list.appendChild(makeLi(survived, 'green', resolved.label, resolved.icon));
        if (died > 0) list.appendChild(makeLi(died, 'red', resolved.label, resolved.icon));
      } else {
        list.appendChild(makeLi(a.num || a.armyNum || 0, null, resolved.label, resolved.icon));
      }
    });

    sideEl.appendChild(list);
    return sideEl;
  }

  function buildReportHeader(data, battle) {
    var fightType = FIGHT_TYPES[battle.fightType] || ('Type ' + battle.fightType);
    var children = [
      el('div', { className: 'report-type' }, fightType),
      el('div', { className: 'report-id' }, 'Report ID: ' + data.reportId)
    ];
    if (data.logtime) {
      children.push(el('div', { className: 'report-time' }, formatDate(data.logtime)));
    }
    return el('div', { className: 'report-header' }, children);
  }

  function buildPlayerCard(side, pi, isWinner) {
    var card = el('div', { className: 'player-card ' + (isWinner ? 'winner' : 'loser') });

    // Avatar
    var avatarUrl = getAvatar(pi);
    if (avatarUrl && avatarUrl.indexOf('http') === 0) {
      var img = el('img', { className: 'player-avatar', src: avatarUrl, alt: '' });
      img.onerror = function() { this.style.display = 'none'; };
      card.appendChild(img);
    } else {
      // Fallback: first character of name as avatar
      var initial = (pi.username || '?').charAt(0).toUpperCase();
      var placeholder = el('div', {
        className: 'player-avatar',
        style: 'display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:700;color:var(--accent);background:var(--surface);border:1px solid var(--border);'
      }, initial);
      card.appendChild(placeholder);
    }

    // Name
    var nameEl = el('div', { className: 'player-name' });
    nameEl.textContent = pi.username || 'Unknown';
    card.appendChild(nameEl);

    // Alliance tag (always render to keep card heights equal)
    var alTag = side.alTag || (pi.alTag || '');
    var tagEl = el('div', { className: 'player-alliance' });
    tagEl.textContent = alTag ? '[' + alTag + ']' : 'No Alliance';
    if (!alTag) tagEl.style.color = 'var(--muted)';
    card.appendChild(tagEl);

    // National flag
    var flag = flagEmoji(pi.nationalflag || 0);
    if (flag) {
      var flagEl = el('div', { className: 'player-flag' });
      flagEl.textContent = flag;
      card.appendChild(flagEl);
    }

    // Result label
    var resultEl = el('div', { className: 'player-result ' + (isWinner ? 'victory' : 'defeat') });
    resultEl.textContent = isWinner ? 'VICTORY' : 'DEFEAT';
    card.appendChild(resultEl);

    return card;
  }

  function buildVSSection(att, def, attPI, defPI, attWins) {
    var vs = el('div', { className: 'vs-section' });
    var attCard = buildPlayerCard(att, attPI, attWins);
    var attPlayers = att.players || [];
    if (attPlayers.length > 1 && getUniquePlayerCount(att) > 1) {
      attCard.appendChild(el('div', { className: 'rally-indicator' }, 'Rally (' + attPlayers.length + ' players)'));
    }
    vs.appendChild(attCard);
    var badge = el('div', { className: 'vs-badge' });
    badge.textContent = 'VS';
    vs.appendChild(badge);
    var defCard = buildPlayerCard(def, defPI, !attWins);
    var defPlayers = def.players || [];
    if (defPlayers.length > 1 && getUniquePlayerCount(def) > 1) {
      defCard.appendChild(el('div', { className: 'rally-indicator' }, 'Rally (' + defPlayers.length + ' players)'));
    }
    vs.appendChild(defCard);
    return vs;
  }

  function buildDetailsPanel(fm, att, def, attPI, defPI, attHeroes, defHeroes) {
    var panel = el('div', { className: 'details-panel' });
    var title = el('div', { className: 'section-title' });
    title.textContent = 'Details';
    panel.appendChild(title);

    // Row 1: Names + Battle Power
    var row1 = el('div', { className: 'details-row' });
    var left1 = buildDetailSide('Attacker', false);
    var val1a = el('div', { className: 'detail-value green' });
    val1a.textContent = (attPI.username || 'Unknown') + (fm.attBattlePower ? '  —  CP:' + fm.attBattlePower : '');
    left1.appendChild(val1a);
    row1.appendChild(left1);

    var right1 = buildDetailSide('Defender', true);
    var val1b = el('div', { className: 'detail-value red' });
    val1b.textContent = (defPI.username || 'Unknown') + (fm.defBattlePower ? '  —  CP:' + fm.defBattlePower : '');
    right1.appendChild(val1b);
    row1.appendChild(right1);
    panel.appendChild(row1);

    // Row 1.5: Hero Portraits (rally-aware: collapsible per-player sections)
    if ((attHeroes && attHeroes.length > 0) || (defHeroes && defHeroes.length > 0)) {
      var attPlayerCount = (att.players || []).length;
      var defPlayerCount = (def.players || []).length;
      var isRally = attPlayerCount > 1 || defPlayerCount > 1;

      if (isRally) {
        // Rally mode: render per-player collapsible hero sections
        var heroRow = el('div', { className: 'details-row' });

        var leftHero = buildDetailSide('Heroes', false, attPI.username || 'Attacker');
        var attUniqueCount = getUniquePlayerCount(att);
        if (attPlayerCount > 1 && attUniqueCount > 1) {
          for (var ai = 0; ai < attPlayerCount; ai++) {
            var api = getPlayerInfo(att, ai);
            var aHeroes = getHeroList(att, ai);
            var aFlag = flagEmoji(api.nationalflag || 0);
            var aHeaderChildren = [
              el('span', { className: 'rally-toggle' }, '\u25BC'),
              aFlag ? el('span', null, aFlag + ' ') : null,
              el('span', null, api.username || 'Unknown')
            ];
            if (ai === 0) aHeaderChildren.push(el('span', { className: 'rally-leader-badge' }, 'LEADER'));
            var aHeader = el('div', { className: 'rally-player-header' + (ai > 0 ? ' collapsed' : '') }, aHeaderChildren);
            var aContent = el('div', { className: 'rally-player-content' + (ai > 0 ? ' collapsed' : '') });
            var ap = buildHeroPortraits(aHeroes, 'att');
            if (ap) aContent.appendChild(ap);
            (function(hdr, cnt) {
              hdr.addEventListener('click', function() {
                hdr.classList.toggle('collapsed');
                cnt.classList.toggle('collapsed');
              });
            })(aHeader, aContent);
            leftHero.appendChild(aHeader);
            leftHero.appendChild(aContent);
          }
        } else if (attPlayerCount > 1 && attUniqueCount === 1) {
          var allAttHeroesCombined = getAllHeroLists(att);
          var attPortraits = buildHeroPortraits(allAttHeroesCombined, 'att');
          if (attPortraits) leftHero.appendChild(attPortraits);
        } else {
          var attPortraits = buildHeroPortraits(attHeroes, 'att');
          if (attPortraits) leftHero.appendChild(attPortraits);
        }
        heroRow.appendChild(leftHero);

        var rightHero = buildDetailSide('Heroes', true, defPI.username || 'Defender');
        var defUniqueCount = getUniquePlayerCount(def);
        if (defPlayerCount > 1 && defUniqueCount > 1) {
          for (var di = 0; di < defPlayerCount; di++) {
            var dpi = getPlayerInfo(def, di);
            var dHeroes = getHeroList(def, di);
            var dFlag = flagEmoji(dpi.nationalflag || 0);
            var dHeaderChildren = [
              el('span', { className: 'rally-toggle' }, '\u25BC'),
              dFlag ? el('span', null, dFlag + ' ') : null,
              el('span', null, dpi.username || 'Unknown')
            ];
            if (di === 0) dHeaderChildren.push(el('span', { className: 'rally-leader-badge' }, 'LEADER'));
            var dHeader = el('div', { className: 'rally-player-header' + (di > 0 ? ' collapsed' : '') }, dHeaderChildren);
            var dContent = el('div', { className: 'rally-player-content' + (di > 0 ? ' collapsed' : '') });
            var dp = buildHeroPortraits(dHeroes, 'def');
            if (dp) dContent.appendChild(dp);
            (function(hdr, cnt) {
              hdr.addEventListener('click', function() {
                hdr.classList.toggle('collapsed');
                cnt.classList.toggle('collapsed');
              });
            })(dHeader, dContent);
            rightHero.appendChild(dHeader);
            rightHero.appendChild(dContent);
          }
        } else if (defPlayerCount > 1 && defUniqueCount === 1) {
          /* Same player across multiple rounds — show per-round collapsible */
          for (var dri = 0; dri < defPlayerCount; dri++) {
            var drHeroes = getHeroList(def, dri);
            var drHeader = el('div', { className: 'rally-player-header' + (dri > 0 ? ' collapsed' : '') }, [
              el('span', { className: 'rally-toggle' }, '\u25BC'),
              el('span', null, 'Round ' + (dri + 1))
            ]);
            var drContent = el('div', { className: 'rally-player-content' + (dri > 0 ? ' collapsed' : '') });
            var drp = buildHeroPortraits(drHeroes, 'def');
            if (drp) drContent.appendChild(drp);
            (function(hdr, cnt) {
              hdr.addEventListener('click', function() { hdr.classList.toggle('collapsed'); cnt.classList.toggle('collapsed'); });
            })(drHeader, drContent);
            rightHero.appendChild(drHeader);
            rightHero.appendChild(drContent);
          }
        } else {
          var defPortraits = buildHeroPortraits(defHeroes, 'def');
          if (defPortraits) rightHero.appendChild(defPortraits);
        }
        heroRow.appendChild(rightHero);

        panel.appendChild(heroRow);
      } else {
        // Standard 1v1 hero row
        var heroRow = el('div', { className: 'details-row' });

        var leftHero = buildDetailSide('Heroes', false, attPI.username || 'Attacker');
        var attPortraits = buildHeroPortraits(attHeroes, 'att');
        if (attPortraits) leftHero.appendChild(attPortraits);
        heroRow.appendChild(leftHero);

        var rightHero = buildDetailSide('Heroes', true, defPI.username || 'Defender');
        var defPortraits = buildHeroPortraits(defHeroes, 'def');
        if (defPortraits) rightHero.appendChild(defPortraits);
        heroRow.appendChild(rightHero);

        panel.appendChild(heroRow);
      }
    }

    // Row 2: Unit Composition
    var attArmy = fm.attPutArmyV2 || [];
    var defArmy = fm.defPutArmyV2 || [];
    // Gather mecha data for icon resolution
    var attMechas = att.mechas || [];
    var defMechas = def.mechas || [];
    if (attArmy.length > 0 || defArmy.length > 0) {
      var row2 = el('div', { className: 'details-row' });
      row2.appendChild(buildArmySide(attArmy, attMechas, 'att', attPI.username || 'Attacker', fm.attArmyNum));
      row2.appendChild(buildArmySide(defArmy, defMechas, 'def', defPI.username || 'Defender', fm.defArmyNum));
      panel.appendChild(row2);
    }

    // Row 3: Survival Bar
    var attUnits = att.units || [];
    var defUnits = def.units || [];
    if (attUnits.length > 0 || defUnits.length > 0) {
      var attSurv = calcSurvival(attUnits);
      var defSurv = calcSurvival(defUnits);

      var row3 = el('div', { className: 'details-row' });
      row3.appendChild(buildSurvivalSide(attSurv, 'att', attPI.username || 'Attacker'));
      row3.appendChild(buildSurvivalSide(defSurv, 'def', defPI.username || 'Defender'));
      panel.appendChild(row3);
    }

    return panel;
  }

  function buildSkillTable(skillHurts, side, skillToHeroMap, mechas) {
    if (!skillHurts) return null;

    var commonHurt = parseFloat(skillHurts.common_hurt) || 0;
    var commonCount = parseInt(skillHurts.common_count) || 0;
    var hurts = skillHurts.skill_hurts || {};
    var counts = skillHurts.skill_hurt_count || {};
    var heroMap = skillToHeroMap || {};

    var isLeft = (side === 'att');

    var rows = [];
    // Skill rows
    var skillIds = Object.keys(hurts).sort(function(a, b) {
      return (parseFloat(hurts[b]) || 0) - (parseFloat(hurts[a]) || 0);
    });
    skillIds.forEach(function(id) {
      rows.push({
        skill: id,
        triggers: parseInt(counts[id]) || 0,
        damage: parseFloat(hurts[id]) || 0
      });
    });
    // Common attack row
    if (commonCount > 0 || commonHurt > 0) {
      rows.push({ skill: 'Common', triggers: commonCount, damage: commonHurt, isCommon: true });
    }

    var table = el('table', { className: 'skill-table ' + (isLeft ? 'left' : 'right') });

    // Header
    var thead = el('thead');
    var headerRow = el('tr');
    if (isLeft) {
      headerRow.appendChild(el('th', null, 'Skill'));
      headerRow.appendChild(el('th', null, 'Triggers'));
      headerRow.appendChild(el('th', null, 'Damage'));
    } else {
      headerRow.appendChild(el('th', null, 'Damage'));
      headerRow.appendChild(el('th', null, 'Triggers'));
      headerRow.appendChild(el('th', null, 'Skill'));
    }
    thead.appendChild(headerRow);
    table.appendChild(thead);

    // Body
    var tbody = el('tbody');
    rows.forEach(function(r) {
      var tr = el('tr');
      var skillTd = el('td');
      if (r.isCommon) {
        var commonSpan = el('span', { className: 'common-label' });
        commonSpan.textContent = 'Common';
        skillTd.appendChild(commonSpan);
      } else {
        var mapped = heroMap[r.skill];
        if (mapped) {
          // Show skill icon + hero name
          var cellWrap = el('span', { className: 'skill-cell-wrap' });
          var sIcon = skillIconImg(mapped.skillId, 32);
          cellWrap.appendChild(sIcon);
          var nameSpan = el('span', { className: 'skill-id' });
          nameSpan.textContent = HERO_NAMES[String(mapped.heroId)] || ('#' + mapped.heroId);
          cellWrap.appendChild(nameSpan);
          skillTd.appendChild(cellWrap);
        } else if (parseInt(r.skill) > 900000) {
          // Mecha skill — show mecha icon + label
          var mechaCellWrap = el('span', { className: 'skill-cell-wrap' });
          var mechaIconId = mechas && mechas.length > 0 && mechas[0].mechaId ? mechas[0].mechaId : null;
          if (mechaIconId) {
            var mechaImg = el('img', { src: ASSET_BASE + 'assets/mecha-icons/mecha_' + mechaIconId + '.png', className: 'skill-icon', alt: 'HT', width: '32', height: '32' });
            mechaImg.onerror = function() { this.style.display = 'none'; };
            mechaCellWrap.appendChild(mechaImg);
          }
          var mechaSpan = el('span', { className: 'skill-id' });
          mechaSpan.textContent = 'HT';
          mechaSpan.style.color = 'var(--yellow)';
          mechaCellWrap.appendChild(mechaSpan);
          skillTd.appendChild(mechaCellWrap);
        } else {
          var idSpan = el('span', { className: 'skill-id' });
          idSpan.textContent = '#' + r.skill;
          skillTd.appendChild(idSpan);
        }
      }

      var trigTd = el('td');
      trigTd.textContent = String(r.triggers);

      var dmgTd = el('td');
      dmgTd.textContent = formatPower(r.damage);

      if (isLeft) {
        tr.appendChild(skillTd);
        tr.appendChild(trigTd);
        tr.appendChild(dmgTd);
      } else {
        tr.appendChild(dmgTd);
        tr.appendChild(trigTd);
        tr.appendChild(skillTd);
      }
      tbody.appendChild(tr);
    });

    // If no rows, show empty state
    if (rows.length === 0) {
      var emptyTr = el('tr');
      var emptyTd = el('td', { colspan: '3', style: 'color:var(--muted);text-align:center;' });
      emptyTd.textContent = 'No skill data';
      emptyTr.appendChild(emptyTd);
      tbody.appendChild(emptyTr);
    }

    table.appendChild(tbody);
    return table;
  }

  function buildSkillSection(fm, skillToHeroMap, attMechas, defMechas, attName, defName) {
    var attSkill = fm.attSkillHurts;
    var defSkill = fm.defSkillHurts;
    if (!attSkill && !defSkill) return null;

    var section = el('div', { className: 'skill-table-section' });
    var title = el('div', { className: 'section-title' });
    title.textContent = 'Skill Damage';
    section.appendChild(title);

    var wrap = el('div', { className: 'skill-tables-wrap' });

    var attWrap = el('div');
    var attBadge = el('div', { className: 'mobile-badge att' });
    attBadge.textContent = attName || 'Attacker';
    attWrap.appendChild(attBadge);
    var attTable = buildSkillTable(attSkill, 'att', skillToHeroMap, attMechas);
    attWrap.appendChild(attTable || el('div'));
    wrap.appendChild(attWrap);

    wrap.appendChild(el('div', { className: 'skill-divider' }));

    var defWrap = el('div');
    var defBadge = el('div', { className: 'mobile-badge def' });
    defBadge.textContent = defName || 'Defender';
    defWrap.appendChild(defBadge);
    var defTable = buildSkillTable(defSkill, 'def', skillToHeroMap, defMechas);
    defWrap.appendChild(defTable || el('div'));
    wrap.appendChild(defWrap);

    section.appendChild(wrap);
    return section;
  }

  /** Build one damage card (attacker or defender) */
  function buildDamageCard(side, total, pct) {
    var isAtt = (side === 'att');
    var color = isAtt ? 'green' : 'red';
    var card = el('div', { className: 'damage-card ' + side });

    var label = el('div', { className: 'damage-card-label' });
    label.textContent = (isAtt ? 'Attacker' : 'Defender') + ' Total Damage';
    card.appendChild(label);

    var val = el('div', { className: 'damage-card-value ' + color });
    val.textContent = formatPower(total);
    card.appendChild(val);

    var barWrap = el('div', { className: 'survival-bar-wrap' });
    var bar = el('div', { className: 'survival-bar' });
    bar.appendChild(el('div', { className: 'fill ' + color, style: 'width:' + pct + '%' }));
    barWrap.appendChild(bar);
    card.appendChild(barWrap);

    var pctEl = el('div', { className: 'survival-pct', style: 'text-align:center' });
    pctEl.textContent = pct + '%';
    card.appendChild(pctEl);

    return card;
  }

  function buildDamageSummary(fm) {
    var attSkill = fm.attSkillHurts;
    var defSkill = fm.defSkillHurts;
    var attTotal = attSkill ? parseFloat(attSkill.total_hurt) || 0 : 0;
    var defTotal = defSkill ? parseFloat(defSkill.total_hurt) || 0 : 0;

    if (attTotal === 0 && defTotal === 0) return null;

    var grandTotal = attTotal + defTotal || 1;
    var attPct = ((attTotal / grandTotal) * 100).toFixed(1);
    var defPct = ((defTotal / grandTotal) * 100).toFixed(1);

    var wrap = el('div', { className: 'damage-summary' });
    wrap.appendChild(buildDamageCard('att', attTotal, attPct));
    wrap.appendChild(buildDamageCard('def', defTotal, defPct));
    return wrap;
  }

  function buildRawJSON(data) {
    var stripped = stripUIDs(data);
    var jsonStr = JSON.stringify(stripped, null, 2);
    var sizeKB = (jsonStr.length / 1024).toFixed(0);

    var summary = el('summary', null, 'Raw JSON (' + sizeKB + ' KB) — UIDs stripped');
    var pre = el('pre');
    pre.textContent = jsonStr;
    return el('details', { className: 'raw-json' }, [summary, pre]);
  }

  // ---- Main render ----

  function renderReport(data) {
    var container = document.getElementById('report');
    while (container.firstChild) container.removeChild(container.firstChild);

    var battle = data.battle;
    var att = battle.attacker;
    var def = battle.defender;
    var attPI = getPlayerInfo(att);
    var defPI = getPlayerInfo(def);
    var attWins = battle.result === 1;
    var marches = battle.fightMarches || [];
    var fm = marches[0] || {};

    // 1. Report header
    container.appendChild(buildReportHeader(data, battle));

    // 2. VS section
    container.appendChild(buildVSSection(att, def, attPI, defPI, attWins));

    // 3. March content (with tabs if multiple marches)
    if (marches.length > 1) {
      var tabsWrap = el('div', { className: 'march-tabs' });
      var marchContainer = el('div');

      marches.forEach(function(m, idx) {
        var tab = el('div', {
          className: 'march-tab' + (idx === 0 ? ' active' : ''),
          onclick: (function(i) {
            return function() {
              // Update tabs
              var allTabs = tabsWrap.querySelectorAll('.march-tab');
              for (var t = 0; t < allTabs.length; t++) {
                allTabs[t].className = 'march-tab' + (t === i ? ' active' : '');
              }
              // Render march
              while (marchContainer.firstChild) marchContainer.removeChild(marchContainer.firstChild);
              renderMarchContent(marchContainer, marches[i], att, def, attPI, defPI, attWins);
            };
          })(idx)
        });
        tab.textContent = 'Round ' + (idx + 1);
        tabsWrap.appendChild(tab);
      });

      container.appendChild(tabsWrap);
      renderMarchContent(marchContainer, marches[0], att, def, attPI, defPI, attWins);
      container.appendChild(marchContainer);
    } else {
      renderMarchContent(container, fm, att, def, attPI, defPI, attWins);
    }

    // 4. Raw JSON
    container.appendChild(buildRawJSON(data));
  }

        var byPos = {}, setCounts = {}, chipColor = 1;
        chips.forEach(function(c) {
          var lk = CL[c.chipId]; if (!lk) return;
          var pos = lk[1]; byPos[pos] = {chip:c, lk:lk};
          var sg = lk[0]; setCounts[sg] = (setCounts[sg]||0)+1;
          if (pos === 0) chipColor = lk[2];
        });

        // Find dominant set (highest chip count) — handles mixed sets correctly
        var dominantSet = 0; var dominantCount = 0;
        for (var sg in setCounts) { if (setCounts[sg] > dominantCount) { dominantCount = setCounts[sg]; dominantSet = Number(sg); } }
        var setId = dominantSet;
        var setName = SET_NAMES[setId] || ('Set #'+setId);
        var mechaName = MECHA_NAMES[mecha.mechaId] || ('Mecha #'+mecha.mechaId);
        var setIcon = SET_ICONS[setId];

        var card = el('div', {className:'htc-army-card'});

        // Card header
        var hdr = el('div', {className:'htc-army-card-hdr'});
        if (setIcon) {
          var hico = el('img', {style:'width:40px;height:40px;border-radius:8px;object-fit:contain;flex-shrink:0'});
          hico.src = ICON_BASE + setIcon; hico.onerror = function(){ this.style.display='none'; };
          hdr.appendChild(hico);
        }
        var nameDiv = el('div');
        nameDiv.appendChild(el('div', {className:'htc-army-name'}, setName));
        // Show mixed set breakdown in subtitle if chips come from multiple sets
        var setKeys = Object.keys(setCounts);
        var chipsSub = mechaName + ' \u00B7 ';
        if (setKeys.length > 1) {
          chipsSub += setKeys.map(function(sg) { return (SET_NAMES[sg]||'Set#'+sg)+' '+setCounts[sg]; }).join(', ');
        } else {
          chipsSub += chips.length + '/7 chips';
        }
        nameDiv.appendChild(el('div', {className:'htc-mecha-name'}, chipsSub));
        hdr.appendChild(nameDiv);
        card.appendChild(hdr);

        // Hex chip layout
        var layout = el('div', {className:'htc-chip-layout'});
        var selDetail = {el:null, slotNum:-1};

        function buildSlot(cd, slotNum, isCore) {
          var filled = !!cd;
          var cls = 'htc-chip-slot'+(isCore?' htc-core':'')+(!filled?' htc-empty':'');
          var slotEl = el('div', {className:cls});
          if (filled) {
            var lk = cd.lk, chip = cd.chip, color = lk[2];
            slotEl.classList.add('htc-q'+color);
            var si = SET_ICONS[lk[0]];
            if (si) {
              var img = el('img'); img.src = ICON_BASE+si;
              img.alt = SET_NAMES[lk[0]]||''; img.onerror = function(){ this.style.display='none'; };
              slotEl.appendChild(img);
            }
            if (chip.level > 0) slotEl.appendChild(el('span', {className:'htc-chip-lv'}, 'Lv'+chip.level));
            (function(cd2, sn, ic) {
              slotEl.onclick = function() {
                if (selDetail.el && selDetail.el.parentNode) {
                  selDetail.el.parentNode.removeChild(selDetail.el);
                  if (selDetail.slotNum === sn) { selDetail.el=null; selDetail.slotNum=-1; return; }
                }
                var det = buildChipDetailEl(cd2, sn, ic);
                layout.appendChild(det);
                selDetail.el = det; selDetail.slotNum = sn;
              };
            })(cd, slotNum, isCore);
          } else {
            slotEl.appendChild(el('div', {style:'width:8px;height:8px;border-radius:50%;background:var(--border)'}));
          }
          slotEl.appendChild(el('span', {className:'htc-slot-label'}, SLOT_LABELS[slotNum]||String(slotNum)));
          return slotEl;
        }

        var r1 = el('div', {className:'htc-chip-row'});
        r1.appendChild(buildSlot(byPos[1],1,false)); r1.appendChild(buildSlot(byPos[2],2,false));
        layout.appendChild(r1);
        var r2 = el('div', {className:'htc-chip-row'});
        r2.appendChild(buildSlot(byPos[6],6,false)); r2.appendChild(buildSlot(byPos[0],0,true)); r2.appendChild(buildSlot(byPos[3],3,false));
        layout.appendChild(r2);
        var r3 = el('div', {className:'htc-chip-row'});
        r3.appendChild(buildSlot(byPos[5],5,false)); r3.appendChild(buildSlot(byPos[4],4,false));
        layout.appendChild(r3);
        card.appendChild(layout);

        // Set bonuses
        var setInfo = el('div', {className:'htc-set-info'});
        for (var sg in setCounts) {
          if (!setCounts.hasOwnProperty(sg)) continue;
          var bonuses = getBonuses(parseInt(sg), chipColor); if (!bonuses.length) continue;
          var cnt = setCounts[sg];
          var setHdr = el('div', {className:'htc-set-header'});
          var shi = SET_ICONS[sg];
          if (shi) {
            var sico = el('img', {style:'width:24px;height:24px;border-radius:4px;object-fit:contain'});
            sico.src = ICON_BASE+shi; sico.onerror = function(){ this.style.display='none'; };
            setHdr.appendChild(sico);
          }
          setHdr.appendChild(document.createTextNode(SET_NAMES[sg]||('Set #'+sg)));
          setHdr.appendChild(el('span', {className:'htc-set-count'}, ' ('+cnt+'/7)'));
          setInfo.appendChild(setHdr);
          var bonusList = el('ul', {className:'htc-set-bonuses'});
          bonuses.forEach(function(b) {
            var isActive = cnt >= b.count;
            var li = el('li', {className:'htc-set-bonus '+(isActive?'htc-bon-active':'htc-bon-inactive')});
            var chk = el('span', {className:'htc-bon-check '+(isActive?'htc-on':'htc-off')});
            chk.textContent = isActive ? '\u2713' : '\u25CB';
            li.appendChild(chk);
            li.appendChild(el('span', {className:'htc-bon-tier'}, b.count+'pc'));
            li.appendChild(el('span', {className:'htc-bon-desc'}, b.desc+' +'+fmt(b.base)));
            if (!isActive) li.appendChild(el('span', {className:'htc-bon-need'}, 'need '+(b.count-cnt)+' more'));
            bonusList.appendChild(li);
          });
          setInfo.appendChild(bonusList);
          if (cnt >= 2) {
            var activeTiers = bonuses.filter(function(b){ return cnt>=b.count; });
            if (activeTiers.length) {
              var sumMap = {};
              activeTiers.forEach(function(b,i){ var m=activeTiers.length-i; if(!sumMap[b.desc])sumMap[b.desc]=0; sumMap[b.desc]+=b.base*m; });
              var cumul = el('div', {className:'htc-cumul'});
              cumul.appendChild(el('div', {className:'htc-cumul-title'}, 'Cumulative Bonuses'));
              for (var d in sumMap) {
                if (!sumMap.hasOwnProperty(d)) continue;
                var cr = el('div', {className:'htc-cumul-row'});
                cr.appendChild(el('span', {className:'htc-cumul-label'}, d));
                cr.appendChild(el('span', {className:'htc-cumul-value'}, '+'+(sumMap[d]/100).toFixed(0)+'%'));
                cumul.appendChild(cr);
              }
              setInfo.appendChild(cumul);
            }
          }
        }
        card.appendChild(setInfo);
        col.appendChild(card);
      });
      return col;
    }

    var overlay = el('div', {className:'stats-overlay', onclick:function(e){ if(e.target===overlay) document.body.removeChild(overlay); }});
    var modal = el('div', {className:'stats-modal', style:'max-width:960px;'});
    var hdr = el('div', {className:'stats-modal-header'});
    var title = el('h2'); title.textContent = 'HT Chips';
    var closeBtn = el('button', {className:'stats-close', onclick:function(){ document.body.removeChild(overlay); }}, '\u00D7');
    hdr.appendChild(title); hdr.appendChild(closeBtn);
    modal.appendChild(hdr);

    var body = el('div', {className:'stats-modal-body'});
    var attName = attPI.username||'Attacker', defName = defPI.username||'Defender';

    var tabs = el('div', {className:'htc-tabs'});
    var attTab = el('button', {className:'htc-tab htc-active'}, attName);
    var defTab = el('button', {className:'htc-tab'}, defName);
    tabs.appendChild(attTab); tabs.appendChild(defTab);
    body.appendChild(tabs);

    var grid = el('div', {className:'htc-grid'});
    var attCol = buildSide(att, 'ATTACKER \u2014 '+attName);
    var defCol = buildSide(def, 'DEFENDER \u2014 '+defName);
    attTab.onclick = function(){ attTab.className='htc-tab htc-active'; defTab.className='htc-tab'; attCol.className='htc-col'; defCol.className='htc-col htc-hidden'; };
    defTab.onclick = function(){ defTab.className='htc-tab htc-active'; attTab.className='htc-tab'; defCol.className='htc-col'; attCol.className='htc-col htc-hidden'; };
    grid.appendChild(attCol); grid.appendChild(defCol);
    body.appendChild(grid);
    modal.appendChild(body);
    overlay.appendChild(modal);
    return overlay;
  }

  // ---- Load report ----

  function loadReport() {
    var input = document.getElementById('report-id');
    var btn = document.getElementById('load-btn');
    var statusEl = document.getElementById('status');
    var id = input.value.trim();

    if (!id) {
      statusEl.textContent = 'Enter a report ID';
      statusEl.className = 'status error';
      return;
    }
    if (!/^\d{14,22}$/.test(id)) {
      statusEl.textContent = 'Report ID should be a numeric identifier';
      statusEl.className = 'status error';
      return;
    }

    btn.disabled = true;
    statusEl.textContent = 'Loading report...';
    statusEl.className = 'status';
    var reportEl = document.getElementById('report');
    while (reportEl.firstChild) reportEl.removeChild(reportEl.firstChild);

    var prefix = id.substring(0, 4);
    var url = CDN_BASE + prefix + '/' + id + '.json';

    fetch(url)
      .then(function(r) {
        if (!r.ok) throw new Error('Report not found (HTTP ' + r.status + ')');
        return r.json();
      })
      .then(function(data) {
        if (!data.battle) throw new Error('Invalid report format');
        statusEl.textContent = '';
        renderReport(data);
        var params = new URLSearchParams(window.location.search);
        params.set('id', id);
        history.replaceState(null, '', '?' + params.toString());
        // Passive collect — fire-and-forget, never blocks the UI
        fetch('https://push-worker.27tb8s6fct.workers.dev/collect-report', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({id: id})
        }).catch(function(){});
      })
      .catch(function(err) {
        statusEl.textContent = err.message;
        statusEl.className = 'status error';
      })
      .finally(function() { btn.disabled = false; });
  }

  document.getElementById('load-btn').addEventListener('click', loadReport);
  document.getElementById('report-id').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') loadReport();
  });

  // Auto-load from URL param
  var params = new URLSearchParams(window.location.search);
  var idParam = params.get('id');
  if (idParam) {
    document.getElementById('report-id').value = idParam;
    loadReport();
  }
})();
</script>

<script>
  // Google Translate + language modal

  var LANGUAGES=[
    {code:'en',flag:'\uD83C\uDDFA\uD83C\uDDF8',name:'English'},{code:'es',flag:'\uD83C\uDDEA\uD83C\uDDF8',name:'Espa\u00F1ol'},

    {code:'vi',flag:'\uD83C\uDDFB\uD83C\uDDF3',name:'Ti\u1EBFng Vi\u1EC7t'},{code:'th',flag:'\uD83C\uDDF9\uD83C\uDDED',name:'\u0E44\u0E17\u0E22'},
    {code:'hi',flag:'\uD83C\uDDEE\uD83C\uDDF3',name:'\u0939\u093F\u0928\u094D\u0926\u0940'},{code:'pl',flag:'\uD83C\uDDF5\uD83C\uDDF1',name:'Polski'},
    {code:'uk',flag:'\uD83C\uDDFA\uD83C\uDDE6',name:'\u0423\u043A\u0440\u0430\u0457\u043D\u0441\u044C\u043A\u0430'},{code:'id',flag:'\uD83C\uDDEE\uD83C\uDDE9',name:'Indonesia'}
  ];
  function getLangData(c){var b=c.split('-')[0];return LANGUAGES.find(function(l){return l.code===c||l.code===b;})||null;}
  function detectCurrentLang(){var m=document.cookie.match(/googtrans=\/en\/([a-zA-Z-]{2,10})/);return m&&m[1]?m[1]:'en';}
  function updateLangBtn(code){var d=getLangData(code);var f=document.getElementById('langFlag');var c=document.getElementById('langCode');if(d&&f){f.textContent=d.flag;c.textContent='/'+d.code;}else if(f){f.textContent='\uD83C\uDF10';c.textContent='/'+code;}document.querySelectorAll('.lang-option').forEach(function(o){o.classList.toggle('active',o.dataset.lang===code);});}
  function applyLangToCombo(code,delay){var a=0;var p=setInterval(function(){var c=document.querySelector('.goog-te-combo');if(c){c.value=code;c.dispatchEvent(new Event('change'));clearInterval(p);updateLangBtn(code);}if(++a>30)clearInterval(p);},delay||200);}
  function selectLanguage(code){if(code==='en'){sessionStorage.removeItem('pendingLang');document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax; Secure';document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.2864tw.com; SameSite=Lax; Secure';closeLangModal();location.reload();return;}sessionStorage.setItem('pendingLang',code);applyLangToCombo(code,200);closeLangModal();}
  var langModalEl=document.getElementById('langModal');
  function openLangModal(){if(langModalEl)langModalEl.classList.add('active');}
  function closeLangModal(){if(langModalEl)langModalEl.classList.remove('active');}
  (function(){var g=document.getElementById('langGrid');if(!g)return;var det=detectCurrentLang();LANGUAGES.forEach(function(l){var b=document.createElement('button');b.className='lang-option'+(l.code===det?' active':'');b.dataset.lang=l.code;b.innerHTML='<span class="lang-flag">'+l.flag+'</span><span class="lang-name">'+esc(l.name)+'</span>';b.addEventListener('click',function(){selectLanguage(l.code);});g.appendChild(b);});updateLangBtn(det);})();
  var lb=document.getElementById('langBtn');if(lb)lb.addEventListener('click',openLangModal);
  var lmc=document.getElementById('langModalClose');if(lmc)lmc.addEventListener('click',closeLangModal);
  if(langModalEl)langModalEl.addEventListener('click',function(e){if(e.target===langModalEl)closeLangModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&langModalEl&&langModalEl.classList.contains('active')){closeLangModal();e.stopPropagation();}});
  setTimeout(function(){if(!window._gtLoaded){var b=document.getElementById('langBtn');if(b){b.style.opacity='0.5';b.title='Translation unavailable';}}},15000);
  function googleTranslateElementInit(){window._gtLoaded=true;new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:false},'google_translate_element');var p=sessionStorage.getItem('pendingLang');if(p){sessionStorage.removeItem('pendingLang');applyLangToCombo(p,250);}else{var lo=localStorage.getItem('langOverride');if(lo&&lo!=='en')applyLangToCombo(lo,250);var d=detectCurrentLang();if(d!=='en')updateLangBtn(d);}}
</script>
