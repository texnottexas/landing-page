<title>Battle Report Viewer — 2864</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --card: #1c2128; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --navy: #388bfd;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: .75rem 1rem; display: flex; align-items: center; gap: .75rem; }
  .header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
  .home-btn { display: flex; align-items: center; justify-content: center; background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: .4rem .6rem; text-decoration: none; transition: all .15s; }
  .home-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Search */
  .search-bar { max-width: 700px; margin: 2rem auto; padding: 0 1rem; width: 100%; }
  .search-row { display: flex; gap: .5rem; }
  .search-row input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .6rem .75rem; color: var(--text); font-size: .95rem; outline: none; }
  .search-row input:focus { border-color: var(--accent); }
  .search-row input::placeholder { color: var(--muted); }
  .search-row button { background: var(--accent); color: var(--bg); border: none; border-radius: 6px; padding: .6rem 1.2rem; font-weight: 600; cursor: pointer; font-size: .9rem; white-space: nowrap; }
  .search-row button:hover { opacity: .9; }
  .search-row button:disabled { opacity: .5; cursor: not-allowed; }
  .search-hint { font-size: .75rem; color: var(--muted); margin-top: .4rem; }

  /* Status */
  .status { text-align: center; padding: 1rem; color: var(--muted); font-size: .9rem; }
  .status.error { color: var(--red); }

  /* Report container */
  #report { max-width: 860px; margin: 0 auto 2rem; padding: 0 1rem; width: 100%; }

  /* Report header */
  .report-header { text-align: center; margin-bottom: 1.5rem; padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
  .report-type { font-size: 1.1rem; font-weight: 700; color: var(--accent); margin-bottom: .25rem; }
  .report-id { font-size: .8rem; color: var(--muted); font-family: 'SF Mono', Monaco, monospace; }
  .report-time { font-size: .8rem; color: var(--muted); margin-top: .25rem; }

  /* VS Section */
  .vs-section { display: grid; grid-template-columns: 1fr auto 1fr; gap: .75rem; align-items: start; margin-bottom: 1.5rem; }
  .vs-badge { align-self: center; font-size: 1.5rem; font-weight: 800; color: var(--muted); text-align: center; padding-top: 2rem; }
  .player-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
  .player-card.winner { border-color: var(--green); }
  .player-card.loser { border-color: var(--red); }
  .player-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; background: var(--surface); margin: 0 auto .5rem; display: block; }
  .player-name { font-weight: 600; font-size: 1rem; word-break: break-all; }
  .player-alliance { font-size: .8rem; color: var(--accent); margin-top: .15rem; }
  .player-flag { font-size: 1.3rem; margin-top: .25rem; }
  .player-result { font-size: .75rem; font-weight: 700; text-transform: uppercase; margin-top: .4rem; padding: .2rem .6rem; border-radius: 4px; display: inline-block; }
  .player-result.victory { background: rgba(63,185,80,.15); color: var(--green); }
  .player-result.defeat { background: rgba(248,81,73,.15); color: var(--red); }

  /* Details panel */
  .details-panel { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; }
  .section-title { font-size: .85rem; color: var(--muted); margin-bottom: .75rem; text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .details-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
  .details-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
  .detail-side { font-size: .85rem; }
  .detail-side.right { text-align: right; }
  .detail-label { color: var(--muted); font-size: .7rem; text-transform: uppercase; margin-bottom: .15rem; }
  .detail-value { font-weight: 600; }
  .detail-value.green { color: var(--green); }
  .detail-value.red { color: var(--red); }

  /* Hero portraits */
  .hero-portraits { display: flex; gap: .5rem; flex-wrap: wrap; margin-top: .25rem; }
  .hero-portraits.right { justify-content: flex-end; }

  .hero-portrait img.att-border { border: 2px solid var(--green); }
  .hero-portrait img.def-border { border: 2px solid var(--red); }
  .hero-portrait .hero-name { font-size: .6rem; color: var(--text); font-weight: 500; max-width: 56px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .hero-portrait .excl-pill { font-size: .58rem; font-weight: 600; padding: 1px 6px; border-radius: 10px; background: rgba(121,192,255,0.12); color: var(--accent); border: 1px solid rgba(121,192,255,0.25); white-space: nowrap; margin-top: 2px; }

  /* Skill icon in damage table */

  /* Army composition */

  .survival-pct { font-size: .75rem; color: var(--muted); margin-top: .15rem; }

  /* Skill damage table */
  .skill-table-section { margin-bottom: 1.5rem; }
  .skill-tables-wrap { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0; }
  .skill-table { width: 100%; border-collapse: collapse; font-size: .78rem; }
  .skill-table th { color: var(--muted); font-weight: 600; text-transform: uppercase; font-size: .7rem; padding: .4rem .5rem; border-bottom: 1px solid var(--border); }
  .skill-table td { padding: .35rem .5rem; border-bottom: 1px solid var(--border); }
  .skill-table.left th, .skill-table.left td { text-align: left; }
  .skill-table.left td:nth-child(2), .skill-table.left td:nth-child(3) { text-align: right; }
  .skill-table.left th:nth-child(2), .skill-table.left th:nth-child(3) { text-align: right; }
  .skill-table.right th, .skill-table.right td { text-align: right; }
  .skill-table.right td:nth-child(1), .skill-table.right td:nth-child(2) { text-align: left; }
  .skill-table.right th:nth-child(1), .skill-table.right th:nth-child(2) { text-align: left; }
  .skill-table tr:last-child td { border-bottom: none; }
  .skill-table .skill-id { font-family: 'SF Mono', Monaco, monospace; color: var(--accent); font-size: .75rem; }
  .skill-table .common-label { color: var(--yellow); font-weight: 600; }
  .skill-divider { width: 1px; background: var(--border); margin: 0 .25rem; }

  /* March tabs (multi-march) */
  .march-tabs { display: flex; gap: .25rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .march-tab { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .4rem .8rem; font-size: .8rem; color: var(--muted); cursor: pointer; }
  .march-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); font-weight: 600; }
  .march-tab:hover:not(.active) { border-color: var(--accent); color: var(--text); }

  /* Total damage summary */
  .damage-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
  .damage-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; text-align: center; }
  .damage-card.att { border-left: 3px solid var(--green); }
  .damage-card.def { border-left: 3px solid var(--red); }
  .damage-card-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; margin-bottom: .25rem; }
  .damage-card-value { font-size: 1.3rem; font-weight: 700; }
  .damage-card-value.green { color: var(--green); }
  .damage-card-value.red { color: var(--red); }

  /* Raw JSON */
  .raw-json { margin-bottom: 2rem; }
  .raw-json summary { color: var(--muted); font-size: .8rem; cursor: pointer; padding: .5rem 0; }
  .raw-json summary:hover { color: var(--text); }
  .raw-json pre { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .75rem; font-size: .7rem; max-height: 400px; overflow: auto; white-space: pre-wrap; word-break: break-all; color: var(--text); font-family: 'SF Mono', Monaco, monospace; }

  /* Stats Comparison button */
  .stats-btn-wrap { display: flex; gap: .5rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.5rem; }
  .stats-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .5rem 1.2rem; color: var(--accent); font-size: .85rem; font-weight: 600; cursor: pointer; transition: all .15s; }
  .stats-btn:hover { border-color: var(--accent); background: rgba(121,192,255,.08); }

  /* Stats Comparison modal */
  .stats-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .stats-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; max-width: 700px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; }
  .stats-modal-header { display: flex; align-items: center; padding: .75rem 1rem; border-bottom: 1px solid var(--border); }
  .stats-modal-header h2 { flex: 1; font-size: 1rem; font-weight: 700; }
  .stats-close { background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; padding: .2rem .5rem; line-height: 1; }
  .stats-close:hover { color: var(--text); }
  .stats-modal-body { overflow-y: auto; padding: .5rem 0; }
  .stats-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: .5rem; padding: .4rem 1rem; align-items: center; cursor: pointer; transition: background .1s; }

  .stats-row .s-left { text-align: right; font-size: .85rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stats-row .s-name { text-align: center; font-size: .78rem; color: var(--muted); padding: 0 .25rem; white-space: nowrap; }
  .stats-row .s-right { text-align: left; font-size: .85rem; font-weight: 600; font-variant-numeric: tabular-nums; }
  .stats-row .s-green, .decor-summary-row .s-green { color: var(--green); }

  .stats-row .s-equal, .decor-summary-row .s-equal { color: var(--text); opacity: .7; }
  .stats-section-header { padding: .5rem 1rem .25rem; font-size: .7rem; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; border-top: 1px solid var(--border); margin-top: .25rem; }
  .stats-section-header:first-child { border-top: none; margin-top: 0; }

  .decor-drill { display: inline-flex; align-items: center; gap: .3em; background: rgba(121,192,255,.1); border: 1px solid rgba(121,192,255,.35); border-radius: 10px; padding: .1rem .55rem .1rem .45rem; font-size: .78rem; color: var(--accent); cursor: pointer; transition: all .18s; font-weight: 600; }
  .decor-drill:hover { background: rgba(121,192,255,.2); border-color: var(--accent); filter: brightness(1.15); box-shadow: 0 0 6px rgba(121,192,255,.25); }

  /* Decoration modal */
  .decor-section { margin-bottom: .75rem; }
  .decor-section-title { font-size: .72rem; color: var(--accent); text-transform: uppercase; letter-spacing: .05em; font-weight: 700; padding: .5rem 1rem .25rem; border-top: 1px solid var(--border); margin-top: .25rem; cursor: pointer; user-select: none; }
  .decor-section-title:first-child { border-top: none; margin-top: 0; }

    if (s.length === 6 && s.substring(0, 2) === '50') {
      // Find mechaId from mechas array (passed as unitNewData)
      var mechaId = null;
      if (unitNewData) {
        for (var mi = 0; mi < unitNewData.length; mi++) {

        }
      }

      return { icon: ASSET_BASE + 'assets/mecha-icons/mecha_1002.png', label: 'Heavy Trooper' };
    }

    // Base troops (5-digit)
    if (s.length === 5) {
      var firstDigit = s.charAt(0);
      if (firstDigit === '1') return { icon: ASSET_BASE + 'assets/unit-icons/LuJun_048.png', label: 'Army' };

    }

    return { icon: null, label: 'Unit ' + armyId };
  }

      var did = String(displayId);

  var BUFF_SOURCE_NAMES = {1:"Science",2:"Hero Skills",3:"Hero Perk",4:"CPNT",5:"Suppress",6:"Alliance Tech",7:"Decoration",8:"VIP privileges",9:"Class Talent",13:"Alliance Badge",16:"Hero Bond",17:"Mastery",18:"Special Effect Upgrade",20:"Alliance Titles",24:"Morale",25:"Base Effect",26:"Unit Equipment",27:"Heavy Trooper",31:"Odinium Tech",32:"Formations",33:"Secret Weapon",34:"Alliance Monster",37:"Titan Gear",88:"Base Skin Skill",95:"Ruin Bonus",98:"Official Position Effect",100:"Loot Quest",106:"Enigma Beast",134:"Wasteland Airship Effect",135:"Wasteland Effect"};

  /** Resolve type_small (s field) → type_big (display group) */
  function resolveSourceGroup(s) { return SOURCE_GROUP[s] || s; }

  /** Check if a raw buff ID resolves to the target display buff ID */
  function buffMatchesTarget(rawId, targetId) {
    var redirect = BUFF_GROUP[rawId];
    if (!redirect) return rawId === targetId;
    if (Array.isArray(redirect)) {
      for (var i = 0; i < redirect.length; i++) { if (redirect[i] === targetId) return true; }
      return false;
    }
    return redirect === targetId;
  }

  /** Compute per-source breakdown for a specific buff from traceEffectBuffs */
  function computeSourceBreakdown(players, targetBuffId) {
    if (!players || players.length === 0) return {};
    var sources = {};
    for (var p = 0; p < players.length; p++) {
      var trace = players[p].traceEffectBuffs || [];
      if (typeof trace === 'string') try { trace = JSON.parse(trace); } catch(e) { trace = []; }

      for (var i = 0; i < trace.length; i++) {
        var b = trace[i];
        if (!b.id || !b.val || b.s === undefined) continue;
        if (!buffMatchesTarget(b.id, targetBuffId)) continue;
        var typeBig = resolveSourceGroup(b.s);
        if (!sources[typeBig]) sources[typeBig] = 0;
        sources[typeBig] += b.val;
      }
    }
    return sources;
  }

  /** Build source breakdown sub-modal for a specific buff */
  function buildSourceModal(att, def, attPI, defPI, buffId, buffName, parentOverlay) {

    var allSources = {};
    for (var s in attSources) allSources[s] = true;

    var sortedKeys = Object.keys(allSources).map(Number).sort(function(a, b) { return a - b; });

  /** Resolve decoration icon URL from group number */
  function decorIconUrl(group) {
    var g = String(group);
    var name = DECOR_GROUPS[g];
    if (!name) return null;
    // Check filename override first
    if (DECOR_ICON_FIX[g]) return ASSET_BASE + 'assets/decor-icons/' + DECOR_ICON_FIX[g];
    // Standard: group_SanitizedName.png (non-alphanum-non-space removed, each space→underscore)
    var sanitized = name.replace(/[^a-zA-Z0-9 ]/g, '').replace(/ /g, '_');
    return ASSET_BASE + 'assets/decor-icons/' + g + '_' + sanitized + '.png';
  }

    // Direct lookup first (fastest)
    var direct = DECOR_ID_TO_GROUP[id];
    if (direct) return direct;
    // Try base ID offsets: id could be baseId + (level-1) for levels 1-15
    for (var off = 0; off < 15; off++) {

      if (DECOR_BASE_TO_GROUP[candidate]) return DECOR_BASE_TO_GROUP[candidate];
    }
    return null;
  }

    for (var cli = 0; cli < catLabels.length; cli++) {
      (function(idx) {
        var pill = el('button', { className: 'decor-filter-pill' + (idx === 0 ? ' active' : '') }, catLabels[idx]);
        pill.addEventListener('click', function() {
          activeCatFilter = idx === 0 ? -1 : (idx - 1);
          for (var pi = 0; pi < catFilterBtns.length; pi++) {
            catFilterBtns[pi].classList.toggle('active', pi === idx);
          }
          applyFilters();
        });
        catFilterBtns.push(pill);
        filterBar.appendChild(pill);
      })(cli);
    }
    body.appendChild(filterBar);

    // --- Summary counts (hide when filtering by specific stat) ---
    if (filterBuffId) {
      // Show a filter indicator instead of summary
      var filterNote = el('div', { style: 'padding:.5rem 1rem;color:var(--muted);font-size:.78rem;border-bottom:1px solid var(--border);' },
        'Showing decorations contributing to: ' + (filterBuffName || 'selected stat'));
      body.appendChild(filterNote);
    }
    var summaryContent = !filterBuffId ? makeSection(body, 'Summary') : null;

    if (summaryContent) {
      var summaryItems = [
        { label: 'Placed', a: attIds.length, d: defIds.length },
        { label: 'Sublimed (Adv. Upgrade)', a: attSublimes.length, d: defSublimes.length },
        { label: 'Active Sets', a: attSuits.length, d: defSuits.length }
      ];

      summaryItems.forEach(function(item) {
        var row = el('div', { className: 'decor-summary-row' });
        var lCls = 's-left';
        var rCls = 's-right';
        if (item.a > item.d) { lCls += ' s-green'; rCls += ' s-red'; }
        else if (item.d > item.a) { lCls += ' s-red'; rCls += ' s-green'; }
        else { lCls += ' s-equal'; rCls += ' s-equal'; }
        row.appendChild(el('div', { className: lCls }, String(item.a)));
        row.appendChild(el('div', { className: 's-name' }, item.label));
        row.appendChild(el('div', { className: rCls }, String(item.d)));
        summaryContent.appendChild(row);
      });
    }

    // --- Placed Decorations section ---
    // Deduplicate placed IDs to unique groups for each side
    // ME variants map to their canonical group so both sides compare on the same row
    function idsToGroups(ids) {
      var groups = {};   // canonical group → placedId
      var variants = {}; // canonical group → actual group (for display)
      var unmapped = 0;
      for (var i = 0; i < ids.length; i++) {
        var g = decorIdToGroup(ids[i]);
        if (g) {
          var canon = meCanonical(g);
          groups[canon] = ids[i];
          variants[canon] = g;
        } else { unmapped++; }
      }
      return { groups: groups, variants: variants, unmapped: unmapped };
    }

    /** Compute decoration level from placed ID and group */
    function decorLevel(group, placedId) {
      var base = DECOR_GROUP_BASE[String(group)];
      if (!base || !placedId) return 0;
      return placedId - base + 1;
    }

    var attPlaced = idsToGroups(attIds);
    var defPlaced = idsToGroups(defIds);

    // Collect all unique groups from both sides
    var allPlacedGroups = {};
    var gk;
    for (gk in attPlaced.groups) allPlacedGroups[gk] = true;
    for (gk in defPlaced.groups) allPlacedGroups[gk] = true;

    // When opened from a specific stat row, filter to only decorations contributing to that stat
    if (filterBuffId) {
      for (gk in allPlacedGroups) {
        // Check canonical group and actual variants for DECOR_DATA match
        if (!decorMatchesBuff(gk, filterBuffId) &&
            !decorMatchesBuff(attPlaced.variants[gk] || gk, filterBuffId) &&
            !decorMatchesBuff(defPlaced.variants[gk] || gk, filterBuffId)) {
          delete allPlacedGroups[gk];
        }
      }
    }

    if (Object.keys(allPlacedGroups).length === 0) {
      filterBar.style.display = 'none';
      if (filterBuffId) {
        body.appendChild(el('div', { style: 'padding:1.5rem 1rem;text-align:center;color:var(--muted);font-size:.85rem;' },
          'No placed decorations contribute to this stat.'));
      }
    }

    if (Object.keys(allPlacedGroups).length > 0) {
      var placedContent = makeSection(body, 'Placed Decorations');

      // Group by category using DECOR_DATA
      // For ME canonical groups, also check actual variant groups for DECOR_DATA entry
      var byCat = [[], [], [], []]; // 0=March Size, 1=Defense, 2=Damage Boost, 3=Others
      var uncategorized = [];
      for (gk in allPlacedGroups) {
        var dd = DECOR_DATA[String(gk)];
        if (!dd) dd = DECOR_DATA[String(attPlaced.variants[gk] || gk)];
        if (!dd) dd = DECOR_DATA[String(defPlaced.variants[gk] || gk)];
        if (dd) {
          byCat[dd.c].push({ group: parseInt(gk), data: dd });
        } else {
          uncategorized.push(parseInt(gk));
        }
      }

      // Count categories for filter pills
      for (var cci = 0; cci < 4; cci++) catCounts[cci] = byCat[cci].length;
      // Update pill labels with counts
      for (var pli = 1; pli < catFilterBtns.length; pli++) {
        catFilterBtns[pli].textContent = catLabels[pli] + ' (' + catCounts[pli - 1] + ')';
      }
      var totalPlaced = catCounts[0] + catCounts[1] + catCounts[2] + catCounts[3] + uncategorized.length;
      catFilterBtns[0].textContent = 'All (' + totalPlaced + ')';

      // Sort within each category: both have first, attacker only second, defender only third
      function decorOwnership(d) {
        var att = !!attPlaced.groups[d.group];
        var def = !!defPlaced.groups[d.group];
        if (att && def) return 0; // both
        if (att) return 1;        // attacker only
        if (def) return 2;        // defender only
        return 3;
      }
      function decorSortVal(d) {
        if (!d.data.b || d.data.b.length === 0) return 0;
        var b = d.data.b[0];
        return b.t === 1 ? b.v * 10000 : b.v;
      }

      // Helper: build a placed cell with icon, name (truncated+tooltip), level, buffs
      function buildPlacedCell(side, hasIt, otherHas, grpId, name, bDesc, placedId) {
            var tintCls = side === 'att' ? ' decor-att-tint' : ' decor-def-tint';
            var cell = el('div', { className: 'decor-placed-cell' + (side === 'def' ? ' right' : '') + (hasIt ? tintCls : '') });
            if (hasIt) {
              var icon = decorIconImg(grpId);
              if (icon) cell.appendChild(icon);
              var info = el('div', { className: 'decor-placed-info' });
              var nameEl = el('div', { className: 'decor-placed-name', title: name }, name);
              nameEl.onclick = function(e) {
                e.stopPropagation();
                var tip = document.querySelector('.decor-tooltip');
                if (tip) tip.remove();
                tip = el('div', { className: 'decor-tooltip' });
                tip.textContent = name;
                tip.style.position = 'fixed';
                tip.style.left = Math.min(e.clientX, window.innerWidth - 230) + 'px';
                tip.style.top = (e.clientY - 40) + 'px';
                document.body.appendChild(tip);
                setTimeout(function() { if (tip.parentNode) tip.remove(); }, 3000);
                document.addEventListener('click', function rm() { if (tip.parentNode) tip.remove(); document.removeEventListener('click', rm); }, { once: true });
              };
              info.appendChild(nameEl);
              var lvl = decorLevel(grpId, placedId);
              if (lvl > 0) info.appendChild(el('div', { className: 'decor-placed-level' }, 'Lv.' + lvl));
              info.appendChild(el('div', { className: 'decor-placed-buffs' }, bDesc));
              cell.appendChild(info);
            } else {
              cell.appendChild(el('span', { className: 'decor-placed-dash' + (otherHas ? ' muted' : '') }, '\u2014'));
            }
        return cell;
      }

      for (var ci = 0; ci < 4; ci++) {
        if (byCat[ci].length === 0) continue;
        byCat[ci].sort(function(a, b) {
          var oa = decorOwnership(a), ob = decorOwnership(b);
          if (oa !== ob) return oa - ob;
          return decorSortVal(b) - decorSortVal(a);
        });
        placedContent.appendChild(el('div', { className: 'decor-cat-header' }, DECOR_CAT_NAMES[ci] + ' (' + byCat[ci].length + ')'));

        for (var di = 0; di < byCat[ci].length; di++) {
          var entry = byCat[ci][di];
          var grp = entry.group; // canonical group
          var buffDesc = decorBuffDesc(entry.data.b);
          var attHasIt = !!attPlaced.groups[grp];
          var defHasIt = !!defPlaced.groups[grp];

          // For ME variants, each side may have a different variant — show their actual name/icon
          var attVariant = attPlaced.variants[grp] || grp;
          var defVariant = defPlaced.variants[grp] || grp;
          var attName = DECOR_GROUPS[String(attVariant)] || DECOR_GROUPS[String(grp)] || ('Decor #' + grp);
          var defName = DECOR_GROUPS[String(defVariant)] || DECOR_GROUPS[String(grp)] || ('Decor #' + grp);
          var searchName = (attName + ' ' + defName).toLowerCase();

          var row = el('div', { className: 'decor-placed-row' });
          row.setAttribute('data-name', searchName);
          row.setAttribute('data-cat', String(ci));

          row.appendChild(buildPlacedCell('att', attHasIt, defHasIt, attVariant, attName, buffDesc, attPlaced.groups[grp]));
          row.appendChild(el('div', { className: 'decor-label', style: 'font-size:.65rem;' }, ''));
          row.appendChild(buildPlacedCell('def', defHasIt, attHasIt, defVariant, defName, buffDesc, defPlaced.groups[grp]));

          placedContent.appendChild(row);
          placedRows.push({ el: row, name: searchName, cat: ci });
        }
      }

      // Uncategorized decorations (in DECOR_GROUPS but not in DECOR_DATA)
      if (uncategorized.length > 0) {
        placedContent.appendChild(el('div', { className: 'decor-cat-header' }, 'Uncategorized (' + uncategorized.length + ')'));
        for (var ui = 0; ui < uncategorized.length; ui++) {
          var uGrp = uncategorized[ui]; // canonical group
          var uAttHas = !!attPlaced.groups[uGrp];
          var uDefHas = !!defPlaced.groups[uGrp];
          var uAttVar = attPlaced.variants[uGrp] || uGrp;
          var uDefVar = defPlaced.variants[uGrp] || uGrp;
          var uAttName = DECOR_GROUPS[String(uAttVar)] || DECOR_GROUPS[String(uGrp)] || ('Decor #' + uGrp);
          var uDefName = DECOR_GROUPS[String(uDefVar)] || DECOR_GROUPS[String(uGrp)] || ('Decor #' + uGrp);
          var uSearchName = (uAttName + ' ' + uDefName).toLowerCase();

          var uRow = el('div', { className: 'decor-placed-row' });
          uRow.setAttribute('data-name', uSearchName);
          uRow.setAttribute('data-cat', '-1');
          uRow.appendChild(buildPlacedCell('att', uAttHas, uDefHas, uAttVar, uAttName, '', attPlaced.groups[uGrp]));
          uRow.appendChild(el('div', { className: 'decor-label' }, ''));
          uRow.appendChild(buildPlacedCell('def', uDefHas, uAttHas, uDefVar, uDefName, '', defPlaced.groups[uGrp]));
          placedContent.appendChild(uRow);
          placedRows.push({ el: uRow, name: uSearchName, cat: -1 });
        }
      }

    }

    // --- Decoration Sets section (hidden when filtering by stat) ---
    if (!filterBuffId && (attSuits.length > 0 || defSuits.length > 0)) {
      var setsContent = makeSection(body, 'Decoration Sets');

      var allSuitIds = {};
      for (var asi = 0; asi < attSuits.length; asi++) allSuitIds[attSuits[asi]] = true;
      for (var dsi = 0; dsi < defSuits.length; dsi++) allSuitIds[defSuits[dsi]] = true;

      var attSuitLevel = (attDecos && attDecos.suitLevelBuff) || {};
      var defSuitLevel = (defDecos && defDecos.suitLevelBuff) || {};

      var sortedSuitIds = Object.keys(allSuitIds).sort(function(a, b) { return parseInt(a) - parseInt(b); });

      sortedSuitIds.forEach(function(suitId) {
        var suit = SUIT_LOOKUP[suitId];
        var suitName = suit ? suit.n : ('Set ' + suitId);
        var suitGroups = suit ? suit.g : [];

        var attHas = attSuits.indexOf(parseInt(suitId)) !== -1;
        var defHas = defSuits.indexOf(parseInt(suitId)) !== -1;
        var attLevel = attSuitLevel[suitId] || 0;
        var defLevel = defSuitLevel[suitId] || 0;

        var suitRow = el('div', { className: 'decor-suit-row' });

        // Attacker side — use suit array as ownership indicator (CDN doesn't track unplaced inventory)
        var aLabel = attHas ? ('\u2713 Lv.' + attLevel) : '\u2014';
        var aEl = el('div', { className: 'decor-suit-val left' });
        aEl.style.color = attHas ? 'var(--green)' : 'var(--muted)';
        aEl.textContent = aLabel;
        suitRow.appendChild(aEl);

        // Suit name center
        suitRow.appendChild(el('div', { className: 'decor-suit-name' }, suitName + ' (' + suitGroups.length + ')'));

        // Defender side
        var dLabel = defHas ? ('\u2713 Lv.' + defLevel) : '\u2014';
        var dEl = el('div', { className: 'decor-suit-val right' });
        dEl.style.color = defHas ? 'var(--red)' : 'var(--muted)';
        dEl.textContent = dLabel;
        suitRow.appendChild(dEl);

        setsContent.appendChild(suitRow);

        // Component icons row — clickable to show tooltip with name + buffs
        if (suitGroups.length > 0) {
          var iconsRow = el('div', { className: 'decor-suit-icons' });
          for (var si = 0; si < suitGroups.length; si++) {
            (function(grp) {
              var cIcon = decorIconImg(grp);
              if (cIcon) {
                var compName = DECOR_GROUPS[String(grp)] || '';
                var compData = DECOR_DATA[String(grp)];
                var buffStr = compData ? decorBuffDesc(compData.b) : '';
                cIcon.title = compName + (buffStr ? ' — ' + buffStr : '');
                cIcon.style.width = '24px';
                cIcon.style.height = '24px';
                cIcon.style.cursor = 'pointer';
                cIcon.onclick = function(e) {
                  e.stopPropagation();
                  // Remove existing tooltip
                  var existing = document.querySelector('.decor-tooltip');
                  if (existing) existing.remove();
                  // Create tooltip
                  var tip = el('div', { className: 'decor-tooltip' });
                  tip.appendChild(el('div', { style: 'font-weight:600;font-size:.8rem;margin-bottom:.2rem;' }, compName));
                  if (buffStr) tip.appendChild(el('div', { style: 'font-size:.72rem;color:var(--accent);' }, buffStr));
                  // Position near the icon
                  tip.style.position = 'fixed';
                  tip.style.left = (e.clientX - 60) + 'px';
                  tip.style.top = (e.clientY - 60) + 'px';
                  document.body.appendChild(tip);
                  setTimeout(function() { if (tip.parentNode) tip.remove(); }, 3000);
                  document.addEventListener('click', function rmTip() { if (tip.parentNode) tip.remove(); document.removeEventListener('click', rmTip); }, { once: true });
                };
                iconsRow.appendChild(cIcon);
              }
            })(suitGroups[si]);
          }
          setsContent.appendChild(iconsRow);
        }
      });
    }

    // --- Advanced Upgrades section (hidden when filtering by stat) ---
    if (!filterBuffId && (attSublimes.length > 0 || defSublimes.length > 0)) {
      var advContent = makeSection(body, 'Advanced Upgrades');

      // Group sublimes by buffId for each side
      function groupSublimes(sublimes) {
        var byBuff = {};
        for (var i = 0; i < sublimes.length; i++) {
          var sub = sublimes[i];
          var buffs = sub.buffs || [];
          for (var j = 0; j < buffs.length; j++) {
            var b = buffs[j];
            if (!b.buffId) continue;
            var key = String(b.buffId);
            if (!byBuff[key]) byBuff[key] = { total: 0, items: [] };
            byBuff[key].total += (b.value || 0);
            var group = decorIdToGroup(sub.id);
            var name = group ? (DECOR_GROUPS[String(group)] || ('Decor #' + sub.id)) : ('Decor #' + sub.id);
            if (b.value) byBuff[key].items.push({ id: sub.id, group: group, name: name, value: b.value });
          }
        }
        return byBuff;
      }

      var attGrouped = groupSublimes(attSublimes);
      var defGrouped = groupSublimes(defSublimes);

      var allBuffIds = {};
      for (var ab in attGrouped) allBuffIds[ab] = true;
      for (var db in defGrouped) allBuffIds[db] = true;
      var sortedBuffIds = Object.keys(allBuffIds).sort(function(a, b) { return parseInt(a) - parseInt(b); });

      sortedBuffIds.forEach(function(buffId) {
        var attData = attGrouped[buffId] || { total: 0, items: [] };
        var defData = defGrouped[buffId] || { total: 0, items: [] };
        var aTotal = attData.total;
        var dTotal = defData.total;
        // Skip buff categories where both sides are 0
        if (aTotal === 0 && dTotal === 0) return;
        var buffName = BUFF_NAMES[buffId] || ('Buff ' + buffId);

        // Buff header row with totals
        var buffRow = el('div', { className: 'decor-summary-row', style: 'background:rgba(255,255,255,.03);' });
        var bLeftCls = 's-left';
        var bRightCls = 's-right';
        if (aTotal > dTotal) { bLeftCls += ' s-green'; bRightCls += ' s-red'; }
        else if (dTotal > aTotal) { bLeftCls += ' s-red'; bRightCls += ' s-green'; }
        else { bLeftCls += ' s-equal'; bRightCls += ' s-equal'; }
        buffRow.appendChild(el('div', { className: bLeftCls }, formatBuffVal(aTotal)));
        buffRow.appendChild(el('div', { className: 's-name', style: 'font-weight:600;color:var(--text);font-size:.75rem;' }, buffName));
        buffRow.appendChild(el('div', { className: bRightCls }, formatBuffVal(dTotal)));
        advContent.appendChild(buffRow);

        // Merge items by decoration group/id, sort: both → att only → def only
        var attByKey = {}, defByKey = {};
        for (var aii = 0; aii < attData.items.length; aii++) {
          var ak = attData.items[aii].group || attData.items[aii].id;
          attByKey[ak] = attData.items[aii];
        }
        for (var dii2 = 0; dii2 < defData.items.length; dii2++) {
          var dk = defData.items[dii2].group || defData.items[dii2].id;
          defByKey[dk] = defData.items[dii2];
        }
        var allAdvKeys = {};
        for (var aak in attByKey) allAdvKeys[aak] = true;
        for (var ddk in defByKey) allAdvKeys[ddk] = true;
        var advEntries = Object.keys(allAdvKeys).map(function(k) {
          var a = attByKey[k], d = defByKey[k];
          var both = !!a && !!d;
          return { key: k, att: a || null, def: d || null, order: both ? 0 : (a ? 1 : 2) };
        });
        advEntries.sort(function(x, y) {
          if (x.order !== y.order) return x.order - y.order;
          var xv = (x.att ? x.att.value : 0) + (x.def ? x.def.value : 0);
          var yv = (y.att ? y.att.value : 0) + (y.def ? y.def.value : 0);
          return yv - xv;
        });

        for (var idx = 0; idx < advEntries.length; idx++) {
          var ae = advEntries[idx];
          var advRow = el('div', { className: 'decor-placed-row' });

          // Attacker cell
          var advACell = el('div', { className: 'decor-placed-cell' + (ae.att ? ' decor-att-tint' : '') });
          if (ae.att) {
            var aIcon = ae.att.group ? decorIconImg(ae.att.group) : null;
            if (aIcon) { aIcon.style.width = '28px'; aIcon.style.height = '28px'; advACell.appendChild(aIcon); }
            var aInfo = el('div', { className: 'decor-placed-info' });
            aInfo.appendChild(el('div', { className: 'decor-placed-name', title: ae.att.name }, ae.att.name));
            aInfo.appendChild(el('div', { className: 'decor-placed-buffs' }, formatBuffVal(ae.att.value)));
            advACell.appendChild(aInfo);
          } else {
            advACell.appendChild(el('span', { className: 'decor-placed-dash muted' }, '\u2014'));
          }
          advRow.appendChild(advACell);

          advRow.appendChild(el('div', { className: 'decor-label' }, ''));

          // Defender cell
          var advDCell = el('div', { className: 'decor-placed-cell right' + (ae.def ? ' decor-def-tint' : '') });
          if (ae.def) {
            var dIcon = ae.def.group ? decorIconImg(ae.def.group) : null;
            if (dIcon) { dIcon.style.width = '28px'; dIcon.style.height = '28px'; advDCell.appendChild(dIcon); }
            var dInfo = el('div', { className: 'decor-placed-info' });
            dInfo.appendChild(el('div', { className: 'decor-placed-name', title: ae.def.name }, ae.def.name));
            dInfo.appendChild(el('div', { className: 'decor-placed-buffs' }, formatBuffVal(ae.def.value)));
            advDCell.appendChild(dInfo);
          } else {
            advDCell.appendChild(el('span', { className: 'decor-placed-dash muted' }, '\u2014'));
          }
          advRow.appendChild(advDCell);

          advContent.appendChild(advRow);
        }
      });
    }

    // --- Sublime Experience Buffs section ---
    var attSublimeExps = (attDecos && attDecos.sublimeExps) || [];
    var defSublimeExps = (defDecos && defDecos.sublimeExps) || [];
    if (attSublimeExps.length > 0 || defSublimeExps.length > 0) {
      var sublimeContent = makeSection(body, 'Sublime Experience Buffs');

      function groupExps(exps) {
        var m = {};
        for (var i = 0; i < exps.length; i++) {
          var key = String(exps[i].id);
          if (!m[key]) m[key] = 0;
          m[key] += (exps[i].val || 0);
        }
        return m;
      }

      var attExpMap = groupExps(attSublimeExps);
      var defExpMap = groupExps(defSublimeExps);
      var allExpIds = {};
      for (var ae in attExpMap) allExpIds[ae] = true;
      for (var de in defExpMap) allExpIds[de] = true;

      Object.keys(allExpIds).sort(function(a, b) { return parseInt(a) - parseInt(b); }).forEach(function(eid) {
        var aV = attExpMap[eid] || 0;
        var dV = defExpMap[eid] || 0;
        var eName = BUFF_NAMES[eid] || ('Buff ' + eid);
        var eRow = el('div', { className: 'decor-summary-row' });
        var eLCls = 's-left';
        var eRCls = 's-right';
        if (aV > dV) { eLCls += ' s-green'; eRCls += ' s-red'; }
        else if (dV > aV) { eLCls += ' s-red'; eRCls += ' s-green'; }
        else { eLCls += ' s-equal'; eRCls += ' s-equal'; }
        eRow.appendChild(el('div', { className: eLCls }, formatBuffVal(aV)));
        eRow.appendChild(el('div', { className: 's-name' }, eName));
        eRow.appendChild(el('div', { className: eRCls }, formatBuffVal(dV)));
        sublimeContent.appendChild(eRow);
      });
    }

    // --- Base Decorations & Halo section (from effectSkins) ---
    if (!filterBuffId) {
      var attSkins = (att.players && att.players[0] && att.players[0].effectSkins) || {};
      var defSkins = (def.players && def.players[0] && def.players[0].effectSkins) || {};

      function renderBaseEffectSection(title, dataMap, attOwned, attEquipped, defOwned, defEquipped) {
        var allIds = {};
        (attOwned || []).forEach(function(id) { allIds[id] = true; });
        (defOwned || []).forEach(function(id) { allIds[id] = true; });
        var ids = Object.keys(allIds).map(Number).sort(function(a,b) { return a - b; });
        if (ids.length === 0) return;

        var sec = el('div', { className: 's-section' });
        var secH = el('div', { className: 's-section-header', onclick: function() { secH.classList.toggle('collapsed'); secBody.classList.toggle('collapsed'); } });
        secH.appendChild(el('span', { className: 's-section-toggle' }, '\u25BC'));
        secH.appendChild(document.createTextNode(title + ' (' + ids.length + ')'));
        sec.appendChild(secH);

        var secBody = el('div', { className: 's-section-body' });
        var attEq = {}; var defEq = {};
        (attEquipped || []).forEach(function(id) { attEq[id] = true; });
        (defEquipped || []).forEach(function(id) { defEq[id] = true; });
        var attSet = {}; var defSet = {};
        (attOwned || []).forEach(function(id) { attSet[id] = true; });
        (defOwned || []).forEach(function(id) { defSet[id] = true; });

        ids.forEach(function(id) {

          var dCell = el('div', { className: 's-right' + (defEq[id] ? ' s-green' : defSet[id] ? '' : ' s-muted') });
          dCell.textContent = defSet[id] ? (defEq[id] ? '\u2605' : '\u2713') : '\u2014';
          row.appendChild(aCell);
          row.appendChild(nCell);
          row.appendChild(dCell);
          secBody.appendChild(row);
        });

        // Summary row
        var sumRow = el('div', { className: 's-row', style: 'border-top:1px solid var(--border);margin-top:.25rem;padding-top:.25rem' });
        sumRow.appendChild(el('div', { className: 's-left', style: 'font-weight:600' }, (attOwned || []).length + ' owned'));
        sumRow.appendChild(el('div', { className: 's-name', style: 'font-size:.65rem;color:var(--muted)' }, '\u2605 = equipped'));
        sumRow.appendChild(el('div', { className: 's-right', style: 'font-weight:600' }, (defOwned || []).length + ' owned'));
        secBody.appendChild(sumRow);

        sec.appendChild(secBody);
        body.appendChild(sec);
      }

      renderBaseEffectSection('Base Decorations', BASE_DECOR_MAP,
        attSkins.ownCastleEffects, attSkins.useCastleEffects,
        defSkins.ownCastleEffects, defSkins.useCastleEffects);
      renderBaseEffectSection('Base Halo', BASE_HALO_MAP,
        attSkins.ownHaloSkins, attSkins.useHaloSkins,
        defSkins.ownHaloSkins, defSkins.useHaloSkins);
    }

    // Empty state
    if (!attDecos && !defDecos) {
      body.appendChild(el('div', { style: 'text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.85rem;' }, 'No decoration data available in this report.'));
    }

    modal.appendChild(body);
    overlay.appendChild(modal);
    return overlay;
  }

  /** Format a decoration buff value using its valueType */
  function formatDecoVal(value, valueType) {
    if (valueType === 1) return '+' + value;
    if (valueType === 10000) {
      var pct = value / 100;
      if (pct === Math.floor(pct)) return pct.toFixed(0) + '%';
      return pct.toFixed(1) + '%';
    }
    return formatBuffVal(value);
  }

  /** Build a compact buff description string from DECOR_DATA buffs array */
  function decorBuffDesc(buffs) {
    if (!buffs || buffs.length === 0) return '';
    var parts = [];
    for (var i = 0; i < buffs.length; i++) {
      var b = buffs[i];
      var name = BUFF_NAMES[String(b.i)] || '';
      var val = formatDecoVal(b.v, b.t);
      parts.push(name ? (name + ' ' + val) : val);
    }
    return parts.join(', ');
  }

  // Buff IDs that use raw integer values (not percentage)
  var RAW_VALUE_BUFFS = {960012:1, 1131006:1, 1130010:1, 1201003:1, 1101064:1};

  /** Format a buff value for display (raw 100 = 1.0%, unless it's a raw-value buff) */
  function formatBuffVal(val, buffId) {
    if (!val || val === 0) return buffId && RAW_VALUE_BUFFS[buffId] ? '0' : '0%';
    if (buffId && RAW_VALUE_BUFFS[buffId]) {
      return String(val);
    }
    var pct = val / 100;
    if (pct === Math.floor(pct)) return pct.toFixed(0) + '%';
    return pct.toFixed(1) + '%';
  }

    // Body

    var attUC = getUniquePlayerCount(att);
    var defUC = getUniquePlayerCount(def);
    var hasRallySelector = (attUC > 1 || defUC > 1);
    var buffTableWrap = el('div');

    function renderBuffTable(attPlayers, defPlayers, attLabel, defLabel) {
      while (buffTableWrap.firstChild) buffTableWrap.removeChild(buffTableWrap.firstChild);
      var attBuffs = computeBuffStats(attPlayers);
      var defBuffs = computeBuffStats(defPlayers);

      var nameRow = el('div', { className: 'stats-row', style: 'padding:.6rem 1rem;border-bottom:1px solid var(--border);' });

      categories.forEach(function(cat) {
        var hasAny = false;
        var rows = [];
        cat.ids.forEach(function(id) {
          var aVal = attBuffs[id] || 0;
          var dVal = defBuffs[id] || 0;
          if (aVal === 0 && dVal === 0) return;
          hasAny = true;
          placed[id] = true;
          var row = el('div', { className: 'stats-row' });
          var leftCls = 's-left';
          var rightCls = 's-right';
          if (aVal > dVal) { leftCls += ' s-green'; rightCls += ' s-red'; }
          else if (dVal > aVal) { leftCls += ' s-red'; rightCls += ' s-green'; }
          else { leftCls += ' s-equal'; rightCls += ' s-equal'; }
          row.appendChild(el('div', { className: leftCls }, aVal ? formatBuffVal(aVal, parseInt(id)) : '\u2014'));
          row.appendChild(el('div', { className: 's-name' }, BUFF_NAMES[id] || id));
          row.appendChild(el('div', { className: rightCls }, dVal ? formatBuffVal(dVal, parseInt(id)) : '\u2014'));
          (function(buffId, buffName) {
            row.onclick = function() { document.body.appendChild(buildSourceModal(att, def, attPI, defPI, parseInt(buffId), buffName, overlay)); };
          })(id, BUFF_NAMES[id] || id);
          rows.push(row);

          buffTableWrap.appendChild(el('div', { className: 'stats-section-header' }, cat.label));
          rows.forEach(function(r) { buffTableWrap.appendChild(r); });
        }
      });

      // Uncategorized
      var uncatRows = [];
      var allIds = {};
      for (var id in attBuffs) { if (BUFF_NAMES[id]) allIds[id] = true; }
      for (var id2 in defBuffs) { if (BUFF_NAMES[id2]) allIds[id2] = true; }
      Object.keys(allIds).forEach(function(id) {
        if (placed[id]) return;
        var aVal = attBuffs[id] || 0;

        var row = el('div', { className: 'stats-row' });

        var rightCls = 's-right';

        row.appendChild(el('div', { className: rightCls }, dVal ? formatBuffVal(dVal, parseInt(id)) : '\u2014'));

          row.onclick = function() { document.body.appendChild(buildSourceModal(att, def, attPI, defPI, parseInt(buffId), buffName, overlay)); };
        })(id, BUFF_NAMES[id] || id);
        uncatRows.push(row);
      });
      if (uncatRows.length) {
        buffTableWrap.appendChild(el('div', { className: 'stats-cat' }, 'Other'));
        uncatRows.forEach(function(r) { buffTableWrap.appendChild(r); });
      }

    if (hasRallySelector) {
      var selectorRow = el('div', { style: 'display:flex;gap:.5rem;align-items:center;padding:.6rem 1rem;border-bottom:1px solid var(--border);flex-wrap:wrap;' });
      var selectStyle = 'background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:.25rem .4rem;font-size:.75rem;';

      /* Build attacker selector — dropdown if multiple unique players, label if single */
      var attSelect = null;
      selectorRow.appendChild(el('span', { style: 'font-size:.7rem;color:var(--green);font-weight:600;' }, 'ATK:'));
      if (attUC > 1) {
        attSelect = el('select', { style: selectStyle });
        for (var ai = 0; ai < (att.players || []).length; ai++) {
          var api = getPlayerInfo(att, ai);
          attSelect.appendChild(el('option', { value: String(ai) }, (api.username || 'Player ' + (ai+1))));
        }
        selectorRow.appendChild(attSelect);
      } else {
        selectorRow.appendChild(el('span', { style: 'font-size:.75rem;color:var(--text);' }, attPI.username || 'Attacker'));
      }

      selectorRow.appendChild(el('span', { style: 'font-size:.7rem;color:var(--muted);' }, 'vs'));

      /* Build defender selector */
      var defSelect = null;
      selectorRow.appendChild(el('span', { style: 'font-size:.7rem;color:var(--red);font-weight:600;' }, 'DEF:'));
      if (defUC > 1) {
        defSelect = el('select', { style: selectStyle });
        for (var di = 0; di < (def.players || []).length; di++) {
          var dpi = getPlayerInfo(def, di);
          defSelect.appendChild(el('option', { value: String(di) }, (dpi.username || 'Player ' + (di+1))));
        }
        selectorRow.appendChild(defSelect);
      } else {
        selectorRow.appendChild(el('span', { style: 'font-size:.75rem;color:var(--text);' }, defPI.username || 'Defender'));
      }

      body.appendChild(selectorRow);

      function updateBuffTable() {
        var ai = attSelect ? parseInt(attSelect.value) : 0;
        var di = defSelect ? parseInt(defSelect.value) : 0;
        var aPlayers = [att.players[ai]];
        var dPlayers = [def.players[di]];
        var aLabel = getPlayerInfo(att, ai).username || 'Attacker';
        var dLabel = getPlayerInfo(def, di).username || 'Defender';
        renderBuffTable(aPlayers, dPlayers, aLabel, dLabel);
      }
      if (attSelect) attSelect.addEventListener('change', updateBuffTable);
      if (defSelect) defSelect.addEventListener('change', updateBuffTable);
    }

    // Initial render — first player on each side
    renderBuffTable([att.players[0]], [def.players[0]], attPI.username || 'Attacker', defPI.username || 'Defender');
    body.appendChild(buffTableWrap);

    modal.appendChild(body);
    overlay.appendChild(modal);
    return overlay;
  }

  // ---- Helpers ----

  function flagEmoji(idx) {
    if (idx === -1) return '\uD83C\uDDFA\uD83C\uDDF3'; // UN flag for -1
    if (!idx || idx <= 0) return '';
    var code = (idx > 0 && idx <= ISO_CODES.length) ? ISO_CODES[idx - 1] : null;
    if (!code || code.length !== 2) return '';
    return String.fromCodePoint(0x1F1E6 + code.charCodeAt(0) - 65, 0x1F1E6 + code.charCodeAt(1) - 65);
  }

  function formatPower(p) {
    if (p == null || p === 0) return '0';
    if (typeof p === 'string') p = parseFloat(p);
    if (isNaN(p)) return '0';
    var abs = Math.abs(p);
    // Game-style suffixes: K, M, B, T, then aa, bb, cc, dd, ee, ff, gg
    var tiers = [
      { thresh: 1e33, suffix: 'gg' },
      { thresh: 1e30, suffix: 'ff' },
      { thresh: 1e27, suffix: 'ee' },
      { thresh: 1e24, suffix: 'dd' },
      { thresh: 1e21, suffix: 'cc' },
      { thresh: 1e18, suffix: 'bb' },
      { thresh: 1e15, suffix: 'aa' },
      { thresh: 1e12, suffix: 'T' },
      { thresh: 1e9, suffix: 'B' },
      { thresh: 1e6, suffix: 'M' },
      { thresh: 1e3, suffix: 'K' }
    ];
    for (var i = 0; i < tiers.length; i++) {
      if (abs >= tiers[i].thresh) {
        return (p / tiers[i].thresh).toFixed(2) + tiers[i].suffix;
      }
    }
    return p.toFixed(0);
  }

  function formatDate(ts) {
    if (!ts) return '';
    var d = new Date(ts * 1000);
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) +
           ' ' + d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  var EB_BUFF_NAMES = {
    520000:'March Size',
    520010:'All DMG Increase',520011:'Army DMG Increase',520012:'Navy DMG Increase',520013:'Air DMG Increase',
    520020:'All Decreased DMG Taken',520021:'Army Decreased DMG Taken',520022:'Navy Decreased DMG Taken',520023:'Air Decreased DMG Taken',
    520030:'All DEF Increase',520031:'Army DEF Increase',520032:'Navy DEF Increase',520033:'Air DEF Increase',
    520040:'All ATK (off)',520041:'Army ATK (off)',520042:'Navy ATK (off)',520043:'Air ATK (off)',
    520050:'All HP (off)',520051:'Army HP (off)',520052:'Navy HP (off)',520053:'Air HP (off)',
    520060:'All ATK (def)',520061:'Army ATK (def)',520062:'Navy ATK (def)',520063:'Air ATK (def)',
    520070:'All HP (def)',520071:'Army HP (def)',520072:'Navy HP (def)',520073:'Air HP (def)',
    520100:'Suppression DEF',520101:'Navy DEF vs Army',520102:'Air DEF vs Navy',520103:'Army DEF vs Air',
    520110:'All ATK (off)',520111:'Army ATK (off)',520112:'Navy ATK (off)',520113:'Air ATK (off)',
    520120:'All HP (off)',520121:'Army HP (off)',520122:'Navy HP (off)',520123:'Air HP (off)',
    520130:'All ATK (def)',520131:'Army ATK (def)',520132:'Navy ATK (def)',520133:'Air ATK (def)',
    520140:'All HP (def)',520141:'Army HP (def)',520142:'Navy HP (def)',520143:'Air HP (def)'
  };
  var EB_FIELD_BUFF_NAMES = {
    9301160:'All ATK (field)',9301161:'Army ATK (field)',9301162:'Navy ATK (field)',9301163:'Air ATK (field)',
    9301170:'All HP (field)',9301171:'Army HP (field)',9301172:'Navy HP (field)',9301173:'Air HP (field)',
    1131001:'Cross-field Bonus',1131002:'Cross-field Bonus',
    1000021:'Formation Bonus',1000022:'Formation Bonus',
    990202:'Combat Bonus'
  };

  function ebDecodeCfg(cfg) {
    for (var t = 1; t <= 9; t++) {
      for (var f = 1; f <= 4; f++) {
        var q5 = (t - 1) * 20 + f * 5;
        if (q5 === cfg) return { type: t, faction: f, quality: 5 };
        if (q5 - 1 === cfg) return { type: t, faction: f, quality: 4 };
      }
    }
    return { type: 0, faction: 0, quality: 5 };
  }

  function ebBeastName(type, star) {
    if (star >= 5 && EB_TYPES_5STAR[type]) return EB_TYPES_5STAR[type];
    return EB_TYPES[type] || ('Beast #' + type);
  }

  function ebBuffName(id) { return EB_BUFF_NAMES[id] || EB_FIELD_BUFF_NAMES[id] || ('Buff #' + id); }

  function ebBeastIconUrl(type, faction, star) {
    var name = EB_TYPES[type] || 'Unknown';
    var elem = EB_ELEMENTS[faction] || 'Unknown';
    var tier = star >= 5 ? 'evolved' : 'base';
    return EB_ICON_BASE + name + '_' + elem + '_' + tier + '.png';
  }

  function ebStarStr(n) {
    var s = '';
    for (var i = 0; i < n; i++) s += '\u2605';
    for (var j = n; j < 5; j++) s += '\u2606';
    return s;
  }

  function ebResolveBeasts(enigmas) {
    if (!enigmas || !enigmas.beastDatas) return { beasts: [], fields: [] };
    var beastMap = {};
    var beasts = enigmas.beastDatas.map(function(b) {
      var info = ebDecodeCfg(b.cfg);
      var resolved = {
        id: b.id, cfg: b.cfg, type: info.type, faction: info.faction,
        quality: info.quality, element: EB_ELEMENTS[info.faction] || 'Unknown',
        name: ebBeastName(info.type, b.star), star: b.star, level: b.level,
        potential: b.potential, maxPotential: info.quality === 4 ? 8000 : 16000,
        power: b.power, mainBuff: b.mainBuff, mainBuffName: ebBuffName(b.mainBuff),
        baseBuff: (b.baseBuff || []).map(function(id) { return { id: id, name: ebBuffName(id) }; }),
        fieldCfg: null, fieldName: null, slotId: null, fieldSlotNum: null, slotLevel: null, slotBuffs: []
      };
      beastMap[b.id] = resolved;
      return resolved;
    });

    var fields = (enigmas.fields || []).map(function(f) {
      var slots = (f.slots || []).map(function(s, idx) {
        var fieldSlotNum = idx + 1;
        var beast = beastMap[s.beastId];
        if (beast && s.beastId !== '0') {
          beast.fieldCfg = f.cfg;
          beast.fieldName = EB_FIELD_NAMES[f.cfg] || ('Field ' + f.cfg);
          beast.slotId = s.id;
          beast.fieldSlotNum = fieldSlotNum;
          beast.slotLevel = s.level;
          beast.slotBuffs = (s.buffs || []).map(function(sb) {
            return { id: sb.id, name: ebBuffName(sb.id), val: sb.val };
          });
        }
        return {
          id: s.id, fieldSlotNum: fieldSlotNum, beastId: s.beastId, level: s.level, potential: s.potential,
          buffs: (s.buffs || []).map(function(sb) { return { id: sb.id, name: ebBuffName(sb.id), val: sb.val }; }),
          beast: (s.beastId !== '0' && beast) ? beast : null
        };
      });
      return {
        cfg: f.cfg, name: EB_FIELD_NAMES[f.cfg] || ('Field ' + f.cfg), active: f.active,
        expectedSlots: EB_FIELD_SLOT_COUNTS[f.cfg] || slots.length,
        slots: slots, deployedCount: slots.filter(function(s) { return s.beast; }).length
      };
    });

    return { beasts: beasts, fields: fields };
  }

  function buildEnigmaModal(att, def, attPI, defPI) {
    var overlay = el('div', {className: 'stats-overlay', onclick: function(e){ if(e.target===overlay) document.body.removeChild(overlay); }});

    var title = el('h2');

    var closeBtn = el('button', {className: 'stats-close', onclick: function(){ document.body.removeChild(overlay); }}, '\u00D7');
    hdr.appendChild(title);
    hdr.appendChild(closeBtn);
    modal.appendChild(hdr);

    var body = el('div', {className: 'stats-modal-body'});
    var innerGrid = el('div', {className: 'enigma-grid'});

    function buildEnigmaSide(players, sideLabel) {

      var lbl = el('div', {className: 'enigma-side-label'});
      lbl.textContent = sideLabel;
      col.appendChild(lbl);

      // Gather all enigma data across rally players

      (players || []).forEach(function(player) {
        if (player.enigmas && player.enigmas.beastDatas && player.enigmas.beastDatas.length > 0) {
          allResolved.push(ebResolveBeasts(player.enigmas));
        }
      });

          totalBeasts++;
          if (b.star >= 5) fiveStarCount++;
          totalPower += (b.power || 0);
        });
        r.fields.forEach(function(f) {
          if (f.active) activeFields++;
        });
      });

        s.textContent = val;
        item.appendChild(s);
        return item;
      };
      summaryDiv.appendChild(mkStat('Beasts:', String(totalBeasts)));
      summaryDiv.appendChild(mkStat('5\u2605:', String(fiveStarCount)));
      summaryDiv.appendChild(mkStat('Active Fields:', String(activeFields)));
      if (totalPower > 0) summaryDiv.appendChild(mkStat('Power:', totalPower.toLocaleString()));

      // Render fields
      allResolved.forEach(function(resolved) {

          var fieldBody = el('div', {className: 'enigma-field-body'});

            numSpan.textContent = '#' + slot.fieldSlotNum;
            slotDiv.appendChild(numSpan);

            if (slot.beast) {
              var b = slot.beast;
              // Icon wrapper
              var iconWrap = el('div', {className: 'enigma-beast-icon-wrap'});
              var img = el('img', {
                className: 'enigma-beast-icon ' + (b.quality >= 5 ? 'q5' : 'q4'),

                width: '28', height: '28'
              });
              img.onerror = function() { this.style.display = 'none'; };
              iconWrap.appendChild(img);

              // Element overlay
              var elemOverlay = el('span', {className: 'enigma-elem-overlay'});
              elemOverlay.textContent = EB_ELEM_CHARS[b.faction] || '?';
              iconWrap.appendChild(elemOverlay);
              slotDiv.appendChild(iconWrap);

              // Beast info
              var infoDiv = el('div', {className: 'enigma-beast-info'});
              var nameSpan = el('span', {className: 'enigma-beast-name'});
              nameSpan.textContent = b.name;
              infoDiv.appendChild(nameSpan);

              var metaLine = el('div', {style: 'display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;'});
              var starsSpan = el('span', {className: 'enigma-beast-stars'});
              starsSpan.textContent = ebStarStr(b.star);
              metaLine.appendChild(starsSpan);
              var lvSpan = el('span', {className: 'enigma-beast-lv'});
              lvSpan.textContent = 'Lv.' + b.level;
              metaLine.appendChild(lvSpan);
              var potPct = Math.round((b.potential / b.maxPotential) * 100);
              var potSpan = el('span', {style: 'font-size:.62rem;color:' + (potPct >= 85 ? 'var(--green)' : potPct >= 65 ? 'var(--yellow)' : 'var(--red)') + ';'});
              potSpan.textContent = potPct + '%';
              metaLine.appendChild(potSpan);
              infoDiv.appendChild(metaLine);

              // Main buff
              var mainDiv = el('div', {className: 'enigma-beast-main'});
              mainDiv.textContent = b.mainBuffName;
              infoDiv.appendChild(mainDiv);

              // Slot buffs
              if (slot.buffs && slot.buffs.length > 0) {
                var buffsDiv = el('div', {className: 'enigma-slot-buffs'});
                slot.buffs.forEach(function(sb) {
                  var chip = el('span', {className: 'enigma-slot-buff'});
                  var valStr = Number(sb.id) === 520000 ? ('+' + Math.round(sb.val)) : ('+' + (Number(sb.val) / 100).toFixed(2) + '%');
                  chip.textContent = sb.name + ' ' + valStr;
                  buffsDiv.appendChild(chip);
                });
                infoDiv.appendChild(buffsDiv);
              }

              slotDiv.appendChild(infoDiv);
            } else {
              slotDiv.appendChild(el('span', {className: 'enigma-empty-slot'}, '\u2014 empty'));
            }
            fieldBody.appendChild(slotDiv);
          });

          fieldDiv.appendChild(fieldHdr);
          fieldDiv.appendChild(fieldBody);
          col.appendChild(fieldDiv);
        });
      });

      return col;
    }

    var attCol = buildEnigmaSide(att.players || [], (attPI.username || 'Attacker') + ' (Attacker)');
    var defCol = buildEnigmaSide(def.players || [], (defPI.username || 'Defender') + ' (Defender)');
    innerGrid.appendChild(attCol);
    innerGrid.appendChild(defCol);
    body.appendChild(innerGrid);
    modal.appendChild(body);
    overlay.appendChild(modal);
    return overlay;
  }

  /** Base Skin comparison modal */
  function buildBaseSkinModal(att, def, attPI, defPI, attWins) {
    var attSkins = (att.players && att.players[0] && att.players[0].effectSkins) || {};
    var defSkins = (def.players && def.players[0] && def.players[0].effectSkins) || {};
    var attOwned = attSkins.effectIds || [];
    var defOwned = defSkins.effectIds || [];
    var attEquipped = (attSkins.useIds || [])[0] || null;
    var defEquipped = (defSkins.useIds || [])[0] || null;
    var attCls = attWins ? 'bskin-att' : 'bskin-def';
    var defCls = attWins ? 'bskin-def' : 'bskin-att';

    var body = el('div', { className: 'stats-modal-body' });

    // Helper: build skin icon element

      }

    // Helper: build skin cell (icon + name + badge)

      var cell = el('div', { className: 'bskin-cell' + (side === 'right' ? ' right' : '') + (!isOwned ? ' empty' : '') });
      cell.appendChild(skinIcon(sid, isEquipped));
      var info = el('div', { className: 'bskin-info' });
      var name = BASE_SKIN_NAMES[sid] || 'Skin #' + sid;

      var noAtt = el('div', { className: 'bskin-cell' });
      noAtt.appendChild(el('div', { className: 'bskin-placeholder' }, '\u2014'));
      noAtt.appendChild(el('div', { className: 'bskin-info' }, el('div', { className: 'bskin-name', style: 'color:var(--muted)' }, 'None')));
      eqGrid.appendChild(noAtt);

      noDef.appendChild(el('div', { className: 'bskin-placeholder' }, '\u2014'));
      noDef.appendChild(el('div', { className: 'bskin-info' }, el('div', { className: 'bskin-name', style: 'color:var(--muted)' }, 'None')));

    // All owned skins comparison
    var allIds = {};

    var sortedIds = Object.keys(allIds).map(Number).sort(function(a, b) {
      var an = BASE_SKIN_NAMES[a] || ''; var bn = BASE_SKIN_NAMES[b] || '';
      return an.localeCompare(bn);
    });
    var attSet = {}; var defSet = {};
    attOwned.forEach(function(id) { attSet[id] = true; });
