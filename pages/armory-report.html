<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com; style-src 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; img-src https://knight-cdn.akamaized.net https://h5.topwargame.com https://raw.githubusercontent.com data: https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://www.google.com; connect-src https://fight-report-va.oss-accelerate.aliyuncs.com https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com https://push-worker.27tb8s6fct.workers.dev; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'self'; frame-src https://translate.google.com;">
<title>Player Report — Server 2864</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --card: #1c2128; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #388bfd;
    --army: #56d364; --navy: #6cb6ff; --air: #e3b341;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Google Translate overrides */
  body { top: 0 !important; }
  body > .skiptranslate { display: none !important; }
  #google_translate_element { position: absolute; left: -9999px; opacity: 0; pointer-events: none; }

  /* Empty state */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; padding: 2rem; }
  .empty-state h2 { color: var(--text); margin: 1rem 0 .5rem; font-size: 1.5rem; }
  .empty-state p { color: var(--muted); margin-bottom: 1.5rem; max-width: 400px; }
  .btn-primary { background: #238636; color: #fff; border: none; padding: .75rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; }
  .btn-primary:hover { background: #2ea043; }
  .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

  /* Wizard overlay */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  .wizard-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .wizard-overlay.open {
    display: flex;
    animation: fadeIn .2s ease;
  }

  .wizard-card {
    background: var(--bg);
    border-radius: 16px;
    padding: 2.5rem;
    max-width: 520px;
    width: 100%;
    border: 1px solid var(--border);
    text-align: center;
    animation: slideUp .25s ease;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }

  .wizard-card h2 { font-size: 1.4rem; margin: 1rem 0 .4rem; color: var(--text); }
  .wizard-card p { color: var(--muted); margin-bottom: 1.5rem; font-size: .95rem; }

  .wizard-input-row {
    display: flex;
    gap: .5rem;
    margin-bottom: .5rem;
  }

  .wizard-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .65rem .9rem;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color .15s;
  }
  .wizard-input::placeholder { color: var(--muted); }
  .wizard-input:focus { border-color: var(--accent); }

  .wizard-error {
    color: var(--red);
    font-size: .875rem;
    min-height: 1.25rem;
    text-align: left;
  }

  .wizard-spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 4px;
  }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: .65rem 1.25rem;
    border-radius: 8px;
    font-size: .95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .2s, border-color .2s;
  }
  .btn-secondary:hover { background: var(--card); border-color: var(--muted); }
  .btn-secondary:disabled { opacity: .6; cursor: not-allowed; }

  /* Capture summary items */
  .capture-item {
    display: flex; align-items: flex-start; gap: .75rem;
    padding: .6rem 0; border-bottom: 1px solid #21262d;
    opacity: 0; transform: translateX(-10px);
    animation: captureReveal .4s ease forwards;
  }
  .capture-item:last-child { border-bottom: none; }
  @keyframes captureReveal { to { opacity: 1; transform: translateX(0); } }

  /* Build progress bar */
  .build-progress { background: var(--surface); height: 6px; border-radius: 3px; overflow: hidden; max-width: 300px; margin: 1rem auto 0; }
  .build-progress-fill { background: linear-gradient(90deg, #238636, var(--green)); height: 100%; border-radius: 3px; transition: width .5s ease; width: 0; }

  /* Dashboard */
  .dashboard { max-width: 900px; margin: 0 auto; padding: 1.5rem; }

  .dashboard-header {
    display: flex; align-items: center; gap: 1rem;
    padding-bottom: 1.25rem; border-bottom: 1px solid var(--border);
  }
  .dashboard-avatar { width: 64px; height: 64px; border-radius: 50%; object-fit: cover; background: var(--surface); flex-shrink: 0; }
  .dashboard-avatar-fallback {
    width: 64px; height: 64px; border-radius: 50%;
    background: linear-gradient(135deg, #238636, #2ea043);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.75rem; color: #fff; font-weight: 700; flex-shrink: 0;
  }
  .dashboard-info { flex: 1; }
  .dashboard-name { color: var(--text); font-size: 1.25rem; font-weight: 700; }
  .dashboard-meta { color: var(--muted); font-size: .8rem; margin-top: .15rem; }
  .dashboard-actions { display: flex; align-items: center; gap: .75rem; }

  .reports-badge {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    padding: .25rem .75rem; font-size: .75rem; color: var(--muted);
  }
  .settings-btn {
    background: none; border: 1px solid var(--border); border-radius: 8px;
    padding: .4rem; cursor: pointer; color: var(--muted);
    transition: color .2s, border-color .2s; display: flex;
  }
  .settings-btn:hover { color: var(--text); border-color: var(--muted); }

  /* Summary cards */
  .summary-cards {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: .75rem; margin-top: 1.25rem;
  }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem; text-align: center;
    opacity: 0; animation: cardFadeIn .4s ease forwards;
  }
  @keyframes cardFadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .summary-card:nth-child(1) { animation-delay: .1s; }
  .summary-card:nth-child(2) { animation-delay: .2s; }
  .summary-card:nth-child(3) { animation-delay: .3s; }
  .summary-card:nth-child(4) { animation-delay: .4s; }
  .summary-card:nth-child(5) { animation-delay: .5s; }
  .summary-card .value { color: var(--text); font-size: 1.5rem; font-weight: 700; }
  .summary-card .label { color: var(--muted); font-size: .75rem; margin-top: .25rem; }

  /* Tab bar */
  .tab-bar {
    display: flex; gap: 0; margin-top: 1.5rem;
    border-bottom: 2px solid var(--border);
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .tab-btn {
    padding: .75rem 1.25rem; color: var(--muted); font-size: .85rem;
    font-weight: 500; cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    white-space: nowrap; transition: color .2s, border-color .2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .tab-content { display: none; padding-top: 1.25rem; }
  .tab-content.active { display: block; }

  /* Empty tab state */
  .empty-tab { text-align: center; padding: 3rem; color: var(--muted); font-size: .9rem; }

  /* Decoration grid */
  .deco-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: .75rem;
  }
  .deco-card {
    display: flex; align-items: center; gap: .75rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .75rem;
  }
  .deco-icon { width: 40px; height: 40px; border-radius: 6px; object-fit: cover; background: var(--card); flex-shrink: 0; }
  .deco-icon-placeholder { width: 40px; height: 40px; border-radius: 6px; background: var(--card); flex-shrink: 0; }
  .deco-name { color: var(--text); font-size: .85rem; font-weight: 500; }
  .deco-buffs { display: flex; flex-wrap: wrap; gap: .25rem; margin-top: .25rem; }
  .deco-buff { font-size: .7rem; color: var(--muted); background: var(--card); padding: 1px 6px; border-radius: 4px; }

  /* Responsive */
  @media (max-width: 768px) {
    .dashboard-header { flex-wrap: wrap; }
    .dashboard-actions { width: 100%; justify-content: flex-end; }
    .summary-cards { grid-template-columns: repeat(2, 1fr); }
  }

  /* Filter bar */
  .filter-bar {
    display: flex; flex-wrap: wrap; gap: .75rem; align-items: center;
    padding: .75rem 0; margin-bottom: .75rem;
  }
  .filter-search {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    padding: .5rem .75rem; color: var(--text); font-size: .85rem; outline: none;
    min-width: 180px; transition: border-color .15s;
  }
  .filter-search::placeholder { color: var(--muted); }
  .filter-search:focus { border-color: var(--accent); }

  .branch-pill {
    padding: .3rem .7rem; border-radius: 12px; font-size: .75rem; font-weight: 600;
    cursor: pointer; border: 1px solid; transition: opacity .15s;
    user-select: none;
  }
  .branch-pill.army { background: rgba(86,211,100,0.15); color: var(--army); border-color: rgba(86,211,100,0.3); }
  .branch-pill.navy { background: rgba(108,182,255,0.15); color: var(--navy); border-color: rgba(108,182,255,0.3); }
  .branch-pill.air { background: rgba(227,179,65,0.15); color: var(--air); border-color: rgba(227,179,65,0.3); }
  .branch-pill:not(.active) { opacity: .35; }

  .sort-btn {
    padding: .3rem .7rem; border-radius: 6px; font-size: .75rem;
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    cursor: pointer; transition: color .15s, border-color .15s;
    font-family: inherit;
  }
  .sort-btn.active { color: var(--accent); border-color: var(--accent); }

  /* Hero cards */
  .hero-grid { display: flex; flex-direction: column; gap: .5rem; }

  .hero-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; transition: border-color .15s;
  }
  .hero-card:hover { border-color: var(--muted); }

  .hero-header {
    display: flex; align-items: center; gap: .75rem;
    padding: .75rem 1rem; cursor: pointer; user-select: none;
  }
  .hero-icon {
    width: 48px; height: 48px; border-radius: 50%; object-fit: cover;
    background: var(--card); flex-shrink: 0; border: 2px solid var(--border);
  }
  .hero-icon.army-border { border-color: var(--army); }
  .hero-icon.navy-border { border-color: var(--navy); }
  .hero-icon.air-border { border-color: var(--air); }

  .hero-info { flex: 1; min-width: 0; }
  .hero-name-line { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
  .hero-name { font-weight: 600; font-size: .9rem; color: var(--text); }
  .branch-badge {
    font-size: .65rem; font-weight: 600; padding: 2px 6px; border-radius: 4px;
  }
  .branch-badge.army { background: rgba(86,211,100,0.15); color: var(--army); }
  .branch-badge.navy { background: rgba(108,182,255,0.15); color: var(--navy); }
  .branch-badge.air { background: rgba(227,179,65,0.15); color: var(--air); }

  .hero-meta { color: var(--muted); font-size: .75rem; margin-top: .15rem; }
  .hero-stars { color: var(--yellow); letter-spacing: 1px; }

  .excl-pill {
    font-size: .65rem; font-weight: 600; padding: 2px 6px; border-radius: 8px;
    background: rgba(121,192,255,0.12); color: var(--accent);
    border: 1px solid rgba(121,192,255,0.25);
  }

  .expand-icon {
    color: var(--muted); font-size: .75rem; transition: transform .2s; flex-shrink: 0;
  }
  .hero-card.expanded .expand-icon { transform: rotate(180deg); }

  /* Gear panel */
  .gear-panel {
    max-height: 0; overflow: hidden; transition: max-height .4s ease;
    border-top: 1px solid transparent;
  }
  .hero-card.expanded .gear-panel {
    max-height: 2000px; border-top-color: var(--border);
  }
  .gear-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem;
    padding: .75rem 1rem;
  }
  .gear-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    padding: .6rem;
  }
  .gear-slot-name { font-size: .75rem; font-weight: 600; color: var(--text); margin-bottom: .3rem; }
  .gear-stat { font-size: .7rem; color: var(--muted); }

  @media (max-width: 1100px) { .gear-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 600px) { .gear-grid { grid-template-columns: 1fr; } }

  /* Sub-tab bar (Bases, future tabs) */
  .sub-tab-bar {
    display: flex; gap: 0; margin-bottom: 1rem; border-bottom: 1px solid var(--border);
  }
  .sub-tab-btn {
    padding: .5rem 1rem; color: var(--muted); font-size: .8rem; font-weight: 500;
    cursor: pointer; border: none; background: none;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
    transition: color .2s, border-color .2s;
  }
  .sub-tab-btn:hover { color: var(--text); }
  .sub-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .sub-tab-content { display: none; }
  .sub-tab-content.active { display: block; }

  /* Skin card */
  .skin-card-active {
    display: flex; align-items: center; gap: 1rem;
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 1rem; max-width: 420px;
  }
  .skin-icon {
    width: 64px; height: 64px; border-radius: 8px; object-fit: cover;
    background: var(--card); flex-shrink: 0; border: 1px solid var(--border);
  }
  .skin-icon-placeholder {
    width: 64px; height: 64px; border-radius: 8px; background: var(--card);
    flex-shrink: 0; border: 1px solid var(--border);
  }
  .skin-info-name { color: var(--text); font-size: 1rem; font-weight: 600; }
  .skin-info-meta { color: var(--muted); font-size: .8rem; margin-top: .25rem; }
  .skin-owned-note {
    margin-top: .75rem; color: var(--muted); font-size: .8rem;
  }

  /* Enigma Beasts tab */
  .enigma-field {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: .75rem; overflow: hidden;
  }
  .enigma-field-header {
    display: flex; align-items: center; gap: .75rem;
    padding: .75rem 1rem; cursor: pointer; user-select: none;
  }
  .enigma-field-name { color: var(--text); font-weight: 600; font-size: .9rem; flex: 1; }
  .enigma-field-meta { color: var(--muted); font-size: .75rem; }
  .enigma-field-body {
    max-height: 0; overflow: hidden; transition: max-height .4s ease;
    border-top: 1px solid transparent;
  }
  .enigma-field.expanded .enigma-field-body {
    max-height: 2000px; border-top-color: var(--border);
  }
  .enigma-field .expand-icon { color: var(--muted); transition: transform .2s; flex-shrink: 0; }
  .enigma-field.expanded .expand-icon { transform: rotate(180deg); }
  .enigma-beast-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: .5rem; padding: .75rem 1rem; }
  .enigma-beast-card {
    display: flex; align-items: center; gap: .75rem;
    background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: .6rem;
  }
  .enigma-beast-icon { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: var(--surface); flex-shrink: 0; }
  .enigma-beast-name { color: var(--text); font-size: .85rem; font-weight: 500; }
  .enigma-beast-meta { color: var(--muted); font-size: .7rem; margin-top: .15rem; }
  .enigma-beast-stars { color: var(--yellow); font-size: .7rem; letter-spacing: 1px; }
  .enigma-buff-pill {
    display: inline-block; font-size: .65rem; padding: 1px 5px; border-radius: 3px;
    background: rgba(121,192,255,0.1); color: var(--accent); margin-right: .25rem; margin-top: .2rem;
  }
  .enigma-empty-slot {
    display: flex; align-items: center; justify-content: center;
    background: var(--card); border: 1px dashed var(--border); border-radius: 6px;
    padding: .6rem; color: var(--muted); font-size: .75rem; min-height: 60px;
  }

  /* HT Chips tab */
  .chip-mecha {
    background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
    margin-bottom: 1rem; padding: 1rem;
  }
  .chip-mecha-header {
    display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem;
  }
  .chip-mecha-icon { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: var(--card); }
  .chip-mecha-name { color: var(--text); font-size: 1rem; font-weight: 600; }
  .chip-mecha-set { color: var(--muted); font-size: .8rem; }

  .chip-layout {
    display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: auto auto auto;
    gap: .5rem; max-width: 480px; margin: 0 auto;
  }

  .chip-slot {
    background: var(--card); border: 1px solid var(--border); border-radius: 6px;
    padding: .5rem; font-size: .75rem; min-height: 60px;
  }
  .chip-slot.core { grid-column: 2; grid-row: 2; border-color: var(--accent); }
  .chip-slot.pos1 { grid-column: 1; grid-row: 1; }
  .chip-slot.pos2 { grid-column: 1; grid-row: 2; }
  .chip-slot.pos3 { grid-column: 1; grid-row: 3; }
  .chip-slot.pos4 { grid-column: 3; grid-row: 1; }
  .chip-slot.pos5 { grid-column: 3; grid-row: 2; }
  .chip-slot.pos6 { grid-column: 3; grid-row: 3; }

  .chip-slot-label { color: var(--muted); font-size: .65rem; margin-bottom: .2rem; }
  .chip-slot-set { font-size: .7rem; color: var(--text); font-weight: 500; }
  .chip-slot-rarity { font-size: .65rem; font-weight: 600; }
  .chip-slot-rarity.r1 { color: #aaa; }
  .chip-slot-rarity.r2 { color: #3fb950; }
  .chip-slot-rarity.r3 { color: #a371f7; }
  .chip-slot-rarity.r4 { color: #d29922; }
  .chip-slot-rarity.r5 { color: #f0883e; }
  .chip-slot-buff { color: var(--muted); font-size: .65rem; margin-top: .15rem; }
  .chip-rnd-attr { color: var(--muted); font-size: .6rem; }

  .chip-set-bonus {
    margin-top: .75rem; padding-top: .75rem; border-top: 1px solid var(--border);
  }
  .chip-bonus-title { color: var(--text); font-size: .8rem; font-weight: 600; margin-bottom: .3rem; }
  .chip-bonus-tier { color: var(--muted); font-size: .7rem; margin-bottom: .15rem; }
  .chip-bonus-tier.active { color: var(--green); }
  .chip-bonus-count { font-size: .75rem; color: var(--muted); margin-bottom: .5rem; }

  /* Management view */
  .manage-identity {
    display: flex; align-items: center; gap: .75rem;
    padding: .75rem; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: 1rem; text-align: left;
  }
  .manage-identity-avatar {
    width: 48px; height: 48px; border-radius: 50%; object-fit: cover;
    background: var(--card); flex-shrink: 0;
  }
  .manage-identity-fallback {
    width: 48px; height: 48px; border-radius: 50%;
    background: linear-gradient(135deg, #238636, #2ea043);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.25rem; color: #fff; font-weight: 700; flex-shrink: 0;
  }
  .manage-identity-name { color: var(--text); font-size: .95rem; font-weight: 600; }
  .manage-identity-sub { color: var(--muted); font-size: .75rem; margin-top: .15rem; }

  .manage-report-list { margin-bottom: .75rem; }
  .manage-report-card {
    display: flex; align-items: center; gap: .75rem;
    padding: .75rem; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; margin-bottom: .5rem;
  }
  .manage-report-info { flex: 1; text-align: left; }
  .manage-report-title { color: var(--text); font-size: .85rem; font-weight: 500; }
  .manage-report-meta { color: var(--muted); font-size: .7rem; margin-top: .15rem; }
  .remove-btn {
    background: none; border: 1px solid var(--border); border-radius: 6px;
    padding: .3rem; cursor: pointer; color: var(--muted);

  // ── selectPlayer ──────────────────────────────────────────────────────────
  function selectPlayer(side) {
    var report = wizardState._pendingReport;
    var sideData = side === 'attacker' ? report.data.battle.attacker : report.data.battle.defender;
    var pi = parsePlayerInfo(sideData, 0);
    if (!pi) return;

    wizardState.player = {
      name: pi.username || 'Unknown',
      avatar: getAvatar(pi),
      avatarFallback: (pi.username || '?').charAt(0).toUpperCase(),
      level: pi.level || 0,
      server: pi.server || ''
    };

    var extracted = extractPlayerData(report.data, wizardState.player.name);
    wizardState.reportData.push({ id: report.id, extracted: extracted });
    delete wizardState._pendingReport;

    wizardState.step = 'summary';
    renderWizardStep();
  }

  // ── Hero name + type cache ────────────────────────────────────────────────
  var HERO_CACHE = null;
  var HERO_TYPE_CACHE = null;

  function loadHeroNames(cb) {
    if (HERO_CACHE) return cb(HERO_CACHE);
    fetch('data/all-heroes.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        HERO_CACHE = {};
        HERO_TYPE_CACHE = {};
        data.forEach(function(h) {
          HERO_CACHE[h.id] = h.displayName || h.name || ('Hero #' + h.id);
          HERO_TYPE_CACHE[h.id] = h.typeName || 'Unknown';
        });
        cb(HERO_CACHE);
      })
      .catch(function() { HERO_CACHE = {}; HERO_TYPE_CACHE = {}; cb(HERO_CACHE); });
  }

  function loadHeroData(cb) {
    if (HERO_TYPE_CACHE) return cb();
    fetch('data/all-heroes.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        HERO_CACHE = {};
        HERO_TYPE_CACHE = {};
        data.forEach(function(h) {
          HERO_CACHE[h.id] = h.displayName || h.name || ('Hero #' + h.id);
          HERO_TYPE_CACHE[h.id] = h.typeName || 'Unknown';
        });
        cb();
      })
      .catch(function() { HERO_TYPE_CACHE = {}; cb(); });
  }

  function heroName(id) {
    return (HERO_CACHE && HERO_CACHE[id]) || ('Hero #' + id);
  }

  function heroBranch(id) {
    return (HERO_TYPE_CACHE && HERO_TYPE_CACHE[id]) || 'Unknown';
  }

  function branchClass(branch) {
    if (/army/i.test(branch)) return 'army';
    if (/navy/i.test(branch)) return 'navy';
    return 'air';
  }

  function heroIconUrl(heroId) {
    return 'https://h5.topwargame.com/DynRes/images/headpic/hero_icon' + heroId + '_global.png?t=22.jpg';
  }

  // ── Build capture summary from all reports ────────────────────────────────
  function buildCaptureSummary() {
    var heroMap = {};       // id -> true, for deduplication
    var gearCount = 0;
    var decoCount = 0;
    var skinInfo = null;
    var enigmaDeployed = 0;
    var enigmaFields = 0;
    var mechaMap = {};      // mechaId -> true
    var ctcsInfo = null;

    wizardState.reportData.forEach(function(r) {
      var x = r.extracted;
      if (!x) return;

      // Heroes + gear
      (x.heroes || []).forEach(function(h) {
        if (!heroMap[h.id]) {
          heroMap[h.id] = true;
          gearCount += (h.heroEquips || []).length;
        }
      });

      // Decorations — take first non-null
      if (!decoCount && x.decorations) {
        var placed = (x.decorations.sublimes || []).length || (x.decorations.buildings || []).length;
        if (!placed && x.decorations.effectList) placed = x.decorations.effectList.length;
        decoCount = placed || 0;
      }

      // Skin — take first available
      if (!skinInfo && x.skins) skinInfo = x.skins;

      // Enigma beasts — take first available
      if (!enigmaDeployed && x.enigmas) {
        var fields = x.enigmas.fields || x.enigmas;
        if (Array.isArray(fields)) {
          enigmaFields = fields.length;
          fields.forEach(function(f) {
            enigmaDeployed += (f.beasts || f.beastList || []).length;
          });
        }
      }

      // Mechas — deduplicate by mechaId
      (x.mechas || []).forEach(function(m) {
        if (m.mechaId) mechaMap[m.mechaId] = true;
      });

      // CTCs — take first available
      if (!ctcsInfo && x.ctcs) ctcsInfo = x.ctcs;
    });

    var heroIds = Object.keys(heroMap);
    var heroNames = heroIds.map(function(id) { return heroName(Number(id)); });

    var mechaIds = Object.keys(mechaMap).map(Number);
    var mechaNamesList = mechaIds.map(function(mid) { return MECHA_NAMES[mid] || ('Mecha #' + mid); });

    return {
      heroNames: heroNames,
      heroCount: heroIds.length,
      gearCount: gearCount,
      decoCount: decoCount,
      skinInfo: skinInfo,
      enigmaDeployed: enigmaDeployed,
      enigmaFields: enigmaFields,
      mechaNames: mechaNamesList,
      mechaCount: mechaIds.length,
      ctcsInfo: ctcsInfo
    };
  }

    statusText.textContent = 'Preparing\u2026';
    container.appendChild(statusText);

    // Animate through 5 stages
    var stages = [
      { pct: 20, msg: 'Merging hero data\u2026' },
      { pct: 40, msg: 'Building decorations\u2026' },
      { pct: 60, msg: 'Processing enigma beasts\u2026' },
      { pct: 80, msg: 'Assembling chip loadouts\u2026' },
      { pct: 100, msg: 'Finalizing report\u2026' }
    ];

    var idx = 0;
    function runStage() {
      if (idx >= stages.length) {
        setTimeout(saveAndRenderReport, 400);

      progressFill.style.width = stage.pct + '%';
      statusText.textContent = stage.msg;
      setTimeout(runStage, 600);
    }

    // Kick off after a short initial delay so the bar animates from 0
    setTimeout(runStage, 150);

  // ── Tab switching ─────────────────────────────────────────────────────────
  function switchTab(btn) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });

    btn.classList.add('active');
    var tabId = 'tab-' + btn.getAttribute('data-tab');
    document.getElementById(tabId).classList.add('active');

    var container = document.getElementById(tabId);
    if (container.getAttribute('data-rendered')) return;
    container.setAttribute('data-rendered', '1');

    var tab = btn.getAttribute('data-tab');
    var m = window._mergedData;
    switch (tab) {
      case 'heroes':      renderHeroesTab(m); break;
      case 'decorations': renderDecorationsTab(m); break;
      case 'bases':       renderBasesTab(m); break;
      case 'enigma':      renderEnigmaTab(m); break;
      case 'chips':       renderChipsTab(m); break;
    }
  }

  // ── Gear slot name helper ─────────────────────────────────────────────────
  var GEAR_SLOT_NAMES = { 1: 'Weapon', 2: 'Helmet', 3: 'Armor', 4: 'Boots', 5: 'Ring', 6: 'Amulet' };

  function gearSlotName(equipId) {
    // equipId format is typically XXYYYY where XX encodes slot
    // Detect by last digit of first two digits, or use modulo approach
    // From battle report data, slot is encoded in the equip config
    // Simplest reliable approach: use slot index order (1-6)
    var slot = equipId % 10;
    if (slot >= 1 && slot <= 6) return GEAR_SLOT_NAMES[slot] || ('Slot ' + slot);
    // fallback: try first digit of 6-digit ID
    var asStr = String(equipId);
    if (asStr.length >= 6) {
      var prefix = parseInt(asStr.charAt(0), 10);
      if (prefix >= 1 && prefix <= 6) return GEAR_SLOT_NAMES[prefix] || ('Slot ' + prefix);
    }
    return 'Gear';
  }

  // ── renderHeroGrid ────────────────────────────────────────────────────────
  function renderHeroGrid(heroes) {
    var grid = document.getElementById('hero-grid-container');
    if (!grid) return;
    while (grid.firstChild) grid.removeChild(grid.firstChild);

    // Get active branches
    var activeBranches = {};
    var pills = document.querySelectorAll('.branch-pill');
    pills.forEach(function(p) {
      if (p.classList.contains('active')) activeBranches[p.getAttribute('data-branch')] = true;
    });

    // Get search text
    var searchEl = document.getElementById('hero-search-input');
    var query = searchEl ? searchEl.value.trim().toLowerCase() : '';

    // Get sort
    var sortMode = 'name';
    var sortBtns = document.querySelectorAll('.sort-btn');
    sortBtns.forEach(function(b) {
      if (b.classList.contains('active')) sortMode = b.getAttribute('data-sort');
    });

    // Filter
    var filtered = heroes.filter(function(hero) {
      var branch = heroBranch(hero.id);
      var bc = branchClass(branch);
      if (!activeBranches[bc]) return false;
      if (query) {
        var name = heroName(hero.id).toLowerCase();
        if (name.indexOf(query) === -1) return false;
      }
      return true;
    });

    // Sort
    filtered.sort(function(a, b) {
      if (sortMode === 'level') {
        return (b.level || 0) - (a.level || 0);
      }
      var na = heroName(a.id).toLowerCase();
      var nb = heroName(b.id).toLowerCase();
      return na < nb ? -1 : na > nb ? 1 : 0;
    });

    if (filtered.length === 0) {
      var empty = document.createElement('p');
      empty.className = 'empty-tab';
      empty.textContent = 'No heroes match the current filters.';
      grid.appendChild(empty);
      return;
    }

    filtered.forEach(function(hero) {
      grid.appendChild(buildHeroCard(hero));
    });
  }

  function renderDecorationsTab(merged) {
    var container = document.getElementById('tab-decorations');
    while (container.firstChild) container.removeChild(container.firstChild);

    if (!merged.decorations || !merged.decorations.ids || !merged.decorations.ids.length) {
      var empty = document.createElement('p');
      empty.className = 'empty-tab';
      empty.textContent = 'No decoration data found in your reports.';
      container.appendChild(empty);
      return;
    }

    // Group decorations by group ID, keeping highest ID per group (highest level)
    var groups = {};
    merged.decorations.ids.forEach(function(id) {
      var group = decorIdToGroup(id);
      if (!group) return;
      if (!groups[group] || id > groups[group].maxId) {
        groups[group] = { groupId: group, maxId: id, name: DECOR_GROUPS[String(group)] || ('Decoration #' + group) };
      }
    });

    // Sort alphabetically by name
    var sorted = [];
    for (var g in groups) sorted.push(groups[g]);
    sorted.sort(function(a, b) { return a.name.localeCompare(b.name); });

    if (!sorted.length) {
      var noMatch = document.createElement('p');
      noMatch.className = 'empty-tab';
      noMatch.textContent = 'No recognized decorations found.';
      container.appendChild(noMatch);
      return;
    }

    // Build grid
    var grid = document.createElement('div');
    grid.className = 'deco-grid';

    sorted.forEach(function(d) {
      var card = document.createElement('div');
      card.className = 'deco-card';

      var iconUrl = decorIconUrl(d.groupId);
      if (iconUrl) {
        var img = document.createElement('img');
        img.className = 'deco-icon';

        img.alt = '';

        card.appendChild(img);
      } else {

      var info = document.createElement('div');

  // ── Skin data cache + loader ───────────────────────────────────────────────
  var SKIN_CACHE = null;
  function loadSkinData(cb) {
    if (SKIN_CACHE) return cb();
    fetch('data/base-skins.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        SKIN_CACHE = {};
        data.forEach(function(s) { SKIN_CACHE[s.id] = s; });
        cb();
      })
      .catch(function() { SKIN_CACHE = {}; cb(); });
  }

  // ── Sub-tab switcher ───────────────────────────────────────────────────────
  function switchSubTab(btn, parent) {
    parent.querySelectorAll('.sub-tab-btn').forEach(function(b) { b.classList.remove('active'); });
    parent.querySelectorAll('.sub-tab-content').forEach(function(c) { c.classList.remove('active'); });
    btn.classList.add('active');
    var subtabId = 'subtab-' + btn.getAttribute('data-subtab');
    var el = document.getElementById(subtabId);
    el.classList.add('active');

    // Lazy render
    if (el.getAttribute('data-rendered')) return;
    el.setAttribute('data-rendered', '1');

    var m = window._mergedData;
    var key = btn.getAttribute('data-subtab');
    if (key === 'skins') renderSkinsSubTab(m);
    else if (key === 'basedecor') renderBaseDecorSubTab(m);
    else if (key === 'halo') renderHaloSubTab(m);
  }

  function renderChipsTab(merged) {
    var container = document.getElementById('tab-chips');
    while (container.firstChild) container.removeChild(container.firstChild);

    var mechasWithChips = (merged.mechas || []).filter(function(m) {
      return m.chips && m.chips.length > 0;
    });

    if (mechasWithChips.length === 0) {
      var empty = document.createElement('p');
      empty.className = 'empty-tab';
      empty.textContent = 'No Heavy Trooper chip data found in your reports. Add a battle that includes HT deployments.';
      container.appendChild(empty);
      return;
    }

    mechasWithChips.forEach(function(mecha) {
      var section = document.createElement('div');
      section.className = 'chip-mecha';

      // Mecha header
      var header = document.createElement('div');
      header.className = 'chip-mecha-header';

      var icon = document.createElement('img');
      icon.className = 'chip-mecha-icon';
      icon.src = ASSET_BASE + 'assets/mecha-icons/' + mecha.mechaId + '.png';
      icon.alt = '';
      icon.onerror = function() { icon.style.display = 'none'; };
      header.appendChild(icon);

      var info = document.createElement('div');
      var nameEl = document.createElement('div');
      nameEl.className = 'chip-mecha-name';
      nameEl.textContent = MECHA_NAMES[mecha.mechaId] || ('HT #' + mecha.mechaId);
      info.appendChild(nameEl);
      header.appendChild(info);
      section.appendChild(header);

      // Process chips
      var byPos = {};
      var coreSetGroup = null;
      var chipColor = 1;

      mecha.chips.forEach(function(c) {
        var lk = CL[c.chipId];
        if (!lk) return;
        var pos = lk[1];
        byPos[pos] = { chip: c, lk: lk };
        if (pos === 0) {
          chipColor = lk[2];
          coreSetGroup = lk[0];
        }
      });

      // Show set info
      if (coreSetGroup) {
        var setInfo = document.createElement('div');
        setInfo.className = 'chip-mecha-set';
        setInfo.textContent = (SET_NAMES[coreSetGroup] || 'Unknown Set') + ' \u00B7 ' + (RARITY[chipColor] || '');
        info.appendChild(setInfo);
      }

      // Chip layout grid (1-2-3 left, core center, 4-5-6 right)
      var layout = document.createElement('div');
      layout.className = 'chip-layout';

      var posClasses = { 0: 'core', 1: 'pos1', 2: 'pos2', 3: 'pos3', 4: 'pos4', 5: 'pos5', 6: 'pos6' };

      for (var p = 0; p <= 6; p++) {
        var slot = document.createElement('div');
        slot.className = 'chip-slot ' + (posClasses[p] || '');

        var labelEl = document.createElement('div');
        labelEl.className = 'chip-slot-label';
        labelEl.textContent = SLOT_LABELS[p] || ('Slot ' + p);
        slot.appendChild(labelEl);

        if (byPos[p]) {
          var lk = byPos[p].lk;
          var chip = byPos[p].chip;

          // Set name
          var setEl = document.createElement('div');
          setEl.className = 'chip-slot-set';
          setEl.textContent = SET_NAMES[lk[0]] || '';
          slot.appendChild(setEl);

          // Rarity
          var rarityEl = document.createElement('div');
          rarityEl.className = 'chip-slot-rarity r' + lk[2];
          rarityEl.textContent = (RARITY[lk[2]] || '') + ' Lv.' + (chip.level || 0);
          slot.appendChild(rarityEl);

          // Buff (for non-core slots)
          if (p > 0 && lk[3]) {
            var buffName = BUFF_NAMES_CHIP[lk[3]] || null;
            if (buffName) {
              var val = lk[4] + (lk[5] * (chip.level || 0));
              var buffEl = document.createElement('div');
              buffEl.className = 'chip-slot-buff';
              buffEl.textContent = buffName + ': ' + val;
              slot.appendChild(buffEl);
            }
          }

          // Random attributes
          if (chip.rndAttrs) {
            var rnds = decodeRnd(chip.rndAttrs, p);
            rnds.forEach(function(r) {
              var rndEl = document.createElement('div');
              rndEl.className = 'chip-rnd-attr';
              rndEl.textContent = r.name + ': ' + r.val;
              slot.appendChild(rndEl);
            });
          }
        } else {
          var emptyEl = document.createElement('div');
          emptyEl.style.color = 'var(--muted)';
          emptyEl.style.fontSize = '.65rem';
          emptyEl.textContent = 'Empty';
          slot.appendChild(emptyEl);
        }

        layout.appendChild(slot);
      }

      section.appendChild(layout);

      // Set bonuses (ONLY core chip's set, count non-core chips of that set /6)
      if (coreSetGroup) {
        var matchCount = 0;
        for (var sp = 1; sp <= 6; sp++) {
          if (byPos[sp] && byPos[sp].lk[0] === coreSetGroup) matchCount++;
        }

        var bonuses = getBonuses(coreSetGroup, chipColor);
        if (bonuses.length) {
          var bonusSection = document.createElement('div');
          bonusSection.className = 'chip-set-bonus';

          var bonusTitle = document.createElement('div');
          bonusTitle.className = 'chip-bonus-title';
          bonusTitle.textContent = SET_NAMES[coreSetGroup] + ' Set Bonuses';
          bonusSection.appendChild(bonusTitle);

          var countEl = document.createElement('div');
          countEl.className = 'chip-bonus-count';
          countEl.textContent = matchCount + '/6 matching slots';
          bonusSection.appendChild(countEl);

          bonuses.forEach(function(b) {
            var tier = document.createElement('div');
            tier.className = 'chip-bonus-tier' + (matchCount >= b.count ? ' active' : '');
            tier.textContent = b.count + 'pc: ' + b.desc + (b.base ? ' (' + b.base + ')' : '');
            bonusSection.appendChild(tier);
          });

          section.appendChild(bonusSection);
        }
      }

      container.appendChild(section);
    });
  }

      addBtn.className = 'btn-secondary';
      addBtn.textContent = 'Add Report';
      addBtn.addEventListener('click', manageAddReport);
      btnRow.appendChild(addBtn);
    }

    var doneBtn = document.createElement('button');
    doneBtn.className = 'btn-primary';
    doneBtn.textContent = 'Done';
    doneBtn.addEventListener('click', manageDone);
    btnRow.appendChild(doneBtn);

    container.appendChild(btnRow);
  }

  function removeReport(idx) {
    wizardState.reportData.splice(idx, 1);

    if (wizardState.reportData.length === 0) {
      localStorage.removeItem('playerReport');
      localStorage.removeItem('playerReportData');
      wizardState.player = null;
      closeWizard();
      renderEmptyState();
      return;
    }

    saveState();
    renderManageView();
  }

  function manageAddReport() {
    wizardState.step = 'input';
    renderWizardStep();
  }

  function manageDone() {
    saveState();
    closeWizard();
    renderFullReport();
  }

  function saveState() {
    var saved = {
      player: wizardState.player,
      reportIds: wizardState.reportData.map(function(r) { return r.id; }),
      marchGroups: []
    };
    localStorage.setItem('playerReport', JSON.stringify(saved));

    var cache = {};
    wizardState.reportData.forEach(function(r) { cache[r.id] = r.extracted; });
    localStorage.setItem('playerReportData', JSON.stringify(cache));
  }

  // ── Wire Get Started button ───────────────────────────────────────────────
  document.getElementById('getStartedBtn').addEventListener('click', openWizard);

  // ── Object.values polyfill ────────────────────────────────────────────────
  function objValues(obj) {
    return Object.keys(obj).map(function(k) { return obj[k]; });
  }

  // ── Data merge engine ─────────────────────────────────────────────────────
  function mergeReportData(reports) {
    var merged = {
      heroes: {},        // keyed by heroId, latest wins
      decorations: null, skins: null, ctcs: null, enigmas: null,
      mechas: {},        // keyed by mechaId
      effectBuffs: null, traceEffectBuffs: null
    };

    reports.forEach(function(report) {
      var ex = report.extracted;
      if (!ex) return;

      // Per-march: latest-added wins for same hero/mecha
      (ex.heroes || []).forEach(function(h) { merged.heroes[h.id] = h; });
      (ex.mechas || []).forEach(function(m) {
        if (m.chips && m.chips.length) merged.mechas[m.mechaId] = m;
      });

      // Account-level: first report wins
      if (!merged.decorations && ex.decorations) merged.decorations = ex.decorations;
      if (!merged.skins && ex.skins) merged.skins = ex.skins;
      if (!merged.ctcs && ex.ctcs) merged.ctcs = ex.ctcs;
      if (!merged.enigmas && ex.enigmas) merged.enigmas = ex.enigmas;
      if (!merged.effectBuffs && ex.effectBuffs) merged.effectBuffs = ex.effectBuffs;
      if (!merged.traceEffectBuffs && ex.traceEffectBuffs) merged.traceEffectBuffs = ex.traceEffectBuffs;
    });

    return {
      heroes: objValues(merged.heroes),
      decorations: merged.decorations,
      skins: merged.skins,
      ctcs: merged.ctcs,
      enigmas: merged.enigmas,
      mechas: objValues(merged.mechas),
      effectBuffs: merged.effectBuffs,
      traceEffectBuffs: merged.traceEffectBuffs
    };
  }

  // ── Empty state renderer ──────────────────────────────────────────────────
  function renderEmptyState() {
    var app = document.getElementById('app');
    while (app.firstChild) app.removeChild(app.firstChild);

    var wrap = document.createElement('div');
    wrap.className = 'empty-state';

    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', '48'); svg.setAttribute('height', '48');
    svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'var(--accent)'); svg.setAttribute('stroke-width', '1.5');
    var pathEl = document.createElementNS(svgNS, 'path');
    pathEl.setAttribute('d', 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z');
    var polyEl = document.createElementNS(svgNS, 'polyline');
    polyEl.setAttribute('points', '14,2 14,8 20,8');
    var line1 = document.createElementNS(svgNS, 'line');
    line1.setAttribute('x1', '16'); line1.setAttribute('y1', '13');
    line1.setAttribute('x2', '8');  line1.setAttribute('y2', '13');
    var line2 = document.createElementNS(svgNS, 'line');
    line2.setAttribute('x1', '16'); line2.setAttribute('y1', '17');
    line2.setAttribute('x2', '8');  line2.setAttribute('y2', '17');
    svg.appendChild(pathEl); svg.appendChild(polyEl);
    svg.appendChild(line1); svg.appendChild(line2);
    wrap.appendChild(svg);

    var h2 = document.createElement('h2');
    h2.textContent = 'Set Up Your Report';
    wrap.appendChild(h2);

    var p = document.createElement('p');
    p.textContent = 'Generate a personal account report from your battle data';
    wrap.appendChild(p);

    var btn = document.createElement('button');
    btn.className = 'btn-primary';
    btn.textContent = 'Get Started';
    btn.addEventListener('click', openWizard);
    wrap.appendChild(btn);

    app.appendChild(wrap);
  }

  // ── Re-fetch + merge init ─────────────────────────────────────────────────
  function initFromSaved(saved) {
    wizardState.player = saved.player;
    wizardState.reportData = [];

    var cache = {};
    try { cache = JSON.parse(localStorage.getItem('playerReportData')) || {}; } catch(e) {}

    var ids = saved.reportIds || [];
    var pending = ids.length;
    var results = [];

    if (pending === 0) return;

    // Show loading state
    var app = document.getElementById('app');
    while (app.firstChild) app.removeChild(app.firstChild);
    var loadWrap = document.createElement('div');
    loadWrap.style.cssText = 'display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;';
    var spinner = document.createElement('div');
    spinner.className = 'wizard-spinner';
    spinner.style.cssText = 'width:32px;height:32px;border-width:3px;border-color:rgba(121,192,255,0.3);border-top-color:var(--accent);margin-bottom:1rem;';
    loadWrap.appendChild(spinner);
    var loadText = document.createElement('p');
    loadText.style.color = 'var(--muted)';
    loadText.textContent = 'Loading your report...';
    loadWrap.appendChild(loadText);
    app.appendChild(loadWrap);

    ids.forEach(function(id, idx) {
      if (cache[id]) {
        results[idx] = { id: id, extracted: cache[id] };
        if (--pending === 0) finishInit(results, saved);
        return;
      }

      var prefix = id.substring(0, 4);
      fetch(CDN_BASE + prefix + '/' + id + '.json')
        .then(function(r) { return r.ok ? r.json() : null; })
        .then(function(data) {
          if (data && data.battle) {
            var extracted = extractPlayerData(data, saved.player.name);
            results[idx] = { id: id, extracted: extracted };
          } else {
            results[idx] = { id: id, extracted: null, error: true };
          }
        })
        .catch(function() {
          results[idx] = { id: id, extracted: null, error: true };
        })
        .finally(function() {
          if (--pending === 0) finishInit(results, saved);
        });
    });
  }

  function finishInit(results, saved) {
    var valid = results.filter(function(r) { return r && r.extracted; });
    wizardState.reportData = valid;

    // Update localStorage if any reports were dropped
    if (valid.length < (saved.reportIds || []).length) {
      saved.reportIds = valid.map(function(r) { return r.id; });
      localStorage.setItem('playerReport', JSON.stringify(saved));
    }

    // Update cache
    var newCache = {};
    valid.forEach(function(r) { newCache[r.id] = r.extracted; });
    localStorage.setItem('playerReportData', JSON.stringify(newCache));

    if (valid.length === 0) {
      localStorage.removeItem('playerReport');
      localStorage.removeItem('playerReportData');
      renderEmptyState();
      return;
    }

    renderFullReport();
  }

  // ── Page init: restore saved report ──────────────────────────────────────
  (function init() {
    var saved = null;
    try { saved = JSON.parse(localStorage.getItem('playerReport')); } catch(e) {}
    if (saved && saved.player && saved.reportIds && saved.reportIds.length) {
      initFromSaved(saved);
    }
  })();
</script>
