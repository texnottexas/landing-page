<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com; style-src 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; img-src https://knight-cdn.akamaized.net https://h5.topwargame.com https://raw.githubusercontent.com data: https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://www.google.com; connect-src https://fight-report-va.oss-accelerate.aliyuncs.com https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com https://push-worker.27tb8s6fct.workers.dev; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'self'; frame-src https://translate.google.com;">
<title>Player Report — Server 2864</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --card: #1c2128; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #388bfd;
    --army: #56d364; --navy: #6cb6ff; --air: #e3b341;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Google Translate overrides */
  body { top: 0 !important; }
  body > .skiptranslate { display: none !important; }
  #google_translate_element { position: absolute; left: -9999px; opacity: 0; pointer-events: none; }

  /* Empty state */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; padding: 2rem; }
  .empty-state h2 { color: var(--text); margin: 1rem 0 .5rem; font-size: 1.5rem; }
  .empty-state p { color: var(--muted); margin-bottom: 1.5rem; max-width: 400px; }
  .btn-primary { background: #238636; color: #fff; border: none; padding: .75rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; }
  .btn-primary:hover { background: #2ea043; }
  .btn-primary:disabled { opacity: .6; cursor: not-allowed; }

  /* Wizard overlay */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }

  .wizard-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .wizard-overlay.open {
    display: flex;
    animation: fadeIn .2s ease;
  }

  .wizard-card {
    background: var(--bg);
    border-radius: 16px;
    padding: 2.5rem;
    max-width: 520px;
    width: 100%;
    border: 1px solid var(--border);
    text-align: center;
    animation: slideUp .25s ease;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
  }

  .wizard-card h2 { font-size: 1.4rem; margin: 1rem 0 .4rem; color: var(--text); }
  .wizard-card p { color: var(--muted); margin-bottom: 1.5rem; font-size: .95rem; }

  .wizard-input-row {
    display: flex;
    gap: .5rem;
    margin-bottom: .5rem;
  }

  .wizard-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .65rem .9rem;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color .15s;
  }
  .wizard-input::placeholder { color: var(--muted); }
  .wizard-input:focus { border-color: var(--accent); }

  .wizard-error {
    color: var(--red);
    font-size: .875rem;
    min-height: 1.25rem;
    text-align: left;
  }

  .wizard-spinner {
    display: inline-block;
    width: 14px;
    height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 4px;
  }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    padding: .65rem 1.25rem;
    border-radius: 8px;
    font-size: .95rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .2s, border-color .2s;
  }
  .btn-secondary:hover { background: var(--card); border-color: var(--muted); }
  .btn-secondary:disabled { opacity: .6; cursor: not-allowed; }

  /* Capture summary items */
  .capture-item {
    display: flex; align-items: flex-start; gap: .75rem;
    padding: .6rem 0; border-bottom: 1px solid #21262d;
    opacity: 0; transform: translateX(-10px);
    animation: captureReveal .4s ease forwards;
  }
  .capture-item:last-child { border-bottom: none; }
  @keyframes captureReveal { to { opacity: 1; transform: translateX(0); } }

  /* Build progress bar */
  .build-progress { background: var(--surface); height: 6px; border-radius: 3px; overflow: hidden; max-width: 300px; margin: 1rem auto 0; }
  .build-progress-fill { background: linear-gradient(90deg, #238636, var(--green)); height: 100%; border-radius: 3px; transition: width .5s ease; width: 0; }
</style>
</head>
<body>

<div id="google_translate_element"></div>

<div id="app">
  <div class="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14,2 14,8 20,8"/>
      <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    <h2>Set Up Your Report</h2>
    <p>Generate a personal account report from your battle data</p>
    <button class="btn-primary" id="getStartedBtn">Get Started</button>
  </div>
</div>

<!-- Wizard overlay -->
<div class="wizard-overlay" id="wizard">
  <div class="wizard-card" id="wizard-content">
  </div>
</div>

<script>
  var CDN_BASE = 'https://fight-report-va.oss-accelerate.aliyuncs.com/prod/';
  var ASSET_BASE = 'https://raw.githubusercontent.com/texnottexas/landing-page/main/';

  function esc(s) {
    if (s == null) return '';
    var d = document.createElement('div');
    d.textContent = String(s);
    return d.innerHTML;
  }

  function el(tag, attrs, text) {
    var e = document.createElement(tag);
    if (attrs) { for (var k in attrs) e[k] = attrs[k]; }
    if (text != null) e.textContent = text;
    return e;
  }

  // ── Wizard state ──────────────────────────────────────────────────────────
  var wizardState = {
    reportData: [],       // array of {id, extracted} for each loaded report
    player: null,         // {name, avatar, avatarFallback, level, server}
    step: 'input'         // 'input' | 'select-player' | 'summary' | 'building'
  };

  function openWizard() {
    wizardState.step = 'input';
    document.getElementById('wizard').classList.add('open');
    renderWizardStep();
  }

  function closeWizard() {
    document.getElementById('wizard').classList.remove('open');
  }

  function renderWizardStep() {
    var container = document.getElementById('wizard-content');
    switch (wizardState.step) {
      case 'input':         renderStepInput(container); break;
      case 'select-player': renderStepSelectPlayer(container); break;
      case 'summary':       renderStepSummary(container); break;
      case 'building':      renderStepBuilding(container); break;
    }
  }

  // ── Step 1: Report ID input ───────────────────────────────────────────────
  function renderStepInput(container) {
    var isFirst = wizardState.player === null;
    var heading = isFirst ? 'Set Up Your Report' : 'Add Another Report';
    var subtitle = 'Paste a battle report ID';

    // Clear container using DOM (not innerHTML = '')
    while (container.firstChild) container.removeChild(container.firstChild);

    // SVG document icon (40px) - safe static SVG
    var iconWrap = document.createElement('div');
    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', '40'); svg.setAttribute('height', '40');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'var(--accent)');
    svg.setAttribute('stroke-width', '1.5');
    var pathEl = document.createElementNS(svgNS, 'path');
    pathEl.setAttribute('d', 'M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z');
    var polyEl = document.createElementNS(svgNS, 'polyline');
    polyEl.setAttribute('points', '14,2 14,8 20,8');
    var line1 = document.createElementNS(svgNS, 'line');
    line1.setAttribute('x1', '16'); line1.setAttribute('y1', '13');
    line1.setAttribute('x2', '8');  line1.setAttribute('y2', '13');
    var line2 = document.createElementNS(svgNS, 'line');
    line2.setAttribute('x1', '16'); line2.setAttribute('y1', '17');
    line2.setAttribute('x2', '8');  line2.setAttribute('y2', '17');
    svg.appendChild(pathEl); svg.appendChild(polyEl);
    svg.appendChild(line1); svg.appendChild(line2);
    iconWrap.appendChild(svg);
    container.appendChild(iconWrap);

    var h2 = document.createElement('h2');
    h2.textContent = heading;
    container.appendChild(h2);

    var sub = document.createElement('p');
    sub.textContent = subtitle;
    container.appendChild(sub);

    // Input row
    var row = document.createElement('div');
    row.className = 'wizard-input-row';

    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'wizard-input';
    input.placeholder = 'Battle Report ID';
    input.id = 'wizard-report-input';
    input.setAttribute('autocomplete', 'off');
    input.setAttribute('inputmode', 'numeric');

    var loadBtn = document.createElement('button');
    loadBtn.className = 'btn-primary';
    loadBtn.id = 'wizard-load-btn';
    loadBtn.textContent = 'Load';

    row.appendChild(input);
    row.appendChild(loadBtn);
    container.appendChild(row);

    // Error div
    var errDiv = document.createElement('div');
    errDiv.className = 'wizard-error';
    errDiv.id = 'wizard-error';
    container.appendChild(errDiv);

    // Wire events
    loadBtn.addEventListener('click', wizardLoadReport);
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') wizardLoadReport();
    });

    // Auto-focus
    setTimeout(function() {
      var inp = document.getElementById('wizard-report-input');
      if (inp) inp.focus();
    }, 100);
  }

  // ── CDN fetch ─────────────────────────────────────────────────────────────
  function wizardLoadReport() {
    var input = document.getElementById('wizard-report-input');
    var errDiv = document.getElementById('wizard-error');
    var loadBtn = document.getElementById('wizard-load-btn');
    if (!input || !errDiv || !loadBtn) return;

    var id = input.value.trim();
    errDiv.textContent = '';

    // Validate: numeric, 10-25 digits
    if (!/^\d{10,25}$/.test(id)) {
      errDiv.textContent = 'Enter a valid numeric report ID (10\u201325 digits).';
      return;
    }

    // Check duplicate
    for (var i = 0; i < wizardState.reportData.length; i++) {
      if (wizardState.reportData[i].id === id) {
        errDiv.textContent = 'This report is already added.';
        return;
      }
    }

    // Check max
    if (wizardState.reportData.length >= 6) {
      errDiv.textContent = 'Maximum 6 reports reached.';
      return;
    }

    // Disable button + show spinner via DOM
    loadBtn.disabled = true;
    while (loadBtn.firstChild) loadBtn.removeChild(loadBtn.firstChild);
    var spinner = document.createElement('span');
    spinner.className = 'wizard-spinner';
    loadBtn.appendChild(spinner);
    loadBtn.appendChild(document.createTextNode('Loading\u2026'));

    var url = CDN_BASE + id.substring(0, 4) + '/' + id + '.json';

    fetch(url)
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(data) {
        if (!data || !data.battle) {
          throw new Error('Invalid report data (no battle field).');
        }
        onReportLoaded(id, data);
      })
      .catch(function(err) {
        var errDiv2 = document.getElementById('wizard-error');
        var loadBtn2 = document.getElementById('wizard-load-btn');
        if (errDiv2) {
          var msg = err && err.message ? err.message : '';
          if (msg.indexOf('HTTP 404') !== -1) {
            errDiv2.textContent = 'Report not found. Check the ID and try again.';
          } else if (msg.indexOf('HTTP') !== -1) {
            errDiv2.textContent = 'Could not fetch report (' + msg + ').';
          } else {
            errDiv2.textContent = 'Failed to load report. Please try again.';
          }
        }
        if (loadBtn2) {
          loadBtn2.disabled = false;
          loadBtn2.textContent = 'Load';
        }
      });
  }

  // ── After successful fetch ────────────────────────────────────────────────
  function onReportLoaded(id, data) {
    if (wizardState.player === null) {
      // First report — need to pick the player
      wizardState._pendingReport = { id: id, data: data };
      wizardState.step = 'select-player';
      renderWizardStep();
    } else {
      // Subsequent report — match against known player name
      var extracted = extractPlayerData(data, wizardState.player.name);
      if (!extracted) {
        var errDiv = document.getElementById('wizard-error');
        var loadBtn = document.getElementById('wizard-load-btn');
        if (errDiv) errDiv.textContent = 'Your player (' + (wizardState.player.name || '') + ') was not found in this report.';
        if (loadBtn) { loadBtn.disabled = false; loadBtn.textContent = 'Load'; }
        return;
      }
      wizardState.reportData.push({ id: id, extracted: extracted });
      wizardState.step = 'summary';
      renderWizardStep();
    }
  }

  // ── Avatar / player info helpers ─────────────────────────────────────────
  function resolveAvatar(url) {
    if (!url) return null;
    if (url.indexOf('http') === 0) return url;
    return 'https://h5.topwargame.com/DynRes/images/headpic/' + url + '.png?t=21.jpg';
  }

  function getAvatar(pi) {
    return resolveAvatar(pi.headimgurl_custom) || resolveAvatar(pi.avatarurl) || null;
  }

  function parsePlayerInfo(side, playerIndex) {
    var players = side.players || [];
    var idx = playerIndex || 0;
    if (idx >= players.length) return null;
    try {
      return JSON.parse(players[idx].playerInfo || '{}');
    } catch(e) { return null; }
  }

  // ── Core extraction engine ────────────────────────────────────────────────
  function extractPlayerData(data, playerName) {
    var battle = data.battle;
    if (!battle) return null;

    var sides = [
      { key: 'attacker', data: battle.attacker },
      { key: 'defender', data: battle.defender }
    ];
    var matchedSide = null;
    var matchedPlayerIdx = 0;

    for (var s = 0; s < sides.length; s++) {
      var players = (sides[s].data && sides[s].data.players) || [];
      for (var p = 0; p < players.length; p++) {
        try {
          var pi = JSON.parse(players[p].playerInfo || '{}');
          if (pi.username === playerName) {
            matchedSide = sides[s];
            matchedPlayerIdx = p;
            break;
          }
        } catch(e) {}
      }
      if (matchedSide) break;
    }

    if (!matchedSide) return null;

    var player0 = matchedSide.data.players[matchedPlayerIdx];

    return {
      playerInfo: JSON.parse(player0.playerInfo || '{}'),
      heroes: (player0.heroList || []).map(function(h) {
        return {
          id: h.id, heroEquips: h.heroEquips || [],
          skills: h.skills || [], nonActiveSkills: h.nonActiveSkills || [],
          star: h.star || 0, level: h.level || 0
        };
      }),
      decorations: player0.effectDecorations || null,
      skins: player0.effectSkins || null,
      enigmas: player0.enigmas || null,
      // mechas is on the side level, not per-player
      mechas: (matchedSide.data.mechas || []).map(function(m) {
        return { mechaId: m.mechaId, chips: m.chips || [] };
      }),
      ctcs: player0.CTCs || null,
      effectBuffs: player0.effectBuffs || null,
      traceEffectBuffs: player0.traceEffectBuffs || null
    };
  }

  // ── Step 2: Select player ─────────────────────────────────────────────────
  function renderStepSelectPlayer(container) {
    var report = wizardState._pendingReport;
    while (container.firstChild) container.removeChild(container.firstChild);

    var svgNS = 'http://www.w3.org/2000/svg';

    // Icon — two-person icon using SVG
    var iconWrap = document.createElement('div');
    var iconSvg = document.createElementNS(svgNS, 'svg');
    iconSvg.setAttribute('width', '40'); iconSvg.setAttribute('height', '40');
    iconSvg.setAttribute('viewBox', '0 0 24 24'); iconSvg.setAttribute('fill', 'none');
    iconSvg.setAttribute('stroke', 'var(--accent)'); iconSvg.setAttribute('stroke-width', '1.5');
    // person circle
    var c1 = document.createElementNS(svgNS, 'circle'); c1.setAttribute('cx','9'); c1.setAttribute('cy','7'); c1.setAttribute('r','4');
    var p1 = document.createElementNS(svgNS, 'path'); p1.setAttribute('d','M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2');
    var p2 = document.createElementNS(svgNS, 'path'); p2.setAttribute('d','M16 3.13a4 4 0 0 1 0 7.75');
    var p3 = document.createElementNS(svgNS, 'path'); p3.setAttribute('d','M21 21v-2a4 4 0 0 0-3-3.85');
    iconSvg.appendChild(c1); iconSvg.appendChild(p1); iconSvg.appendChild(p2); iconSvg.appendChild(p3);
    iconWrap.appendChild(iconSvg);
    container.appendChild(iconWrap);

    var h2 = document.createElement('h2');
    h2.textContent = 'Which one is you?';
    container.appendChild(h2);

    var sub = document.createElement('p');
    sub.textContent = 'Pick your player card to set up your report.';
    container.appendChild(sub);

    // Cards row
    var cardsRow = document.createElement('div');
    cardsRow.style.cssText = 'display:flex;gap:1rem;justify-content:center;margin-top:.5rem;flex-wrap:wrap;';
    container.appendChild(cardsRow);

    var sides = [
      { key: 'attacker', label: 'Attacker', color: 'var(--green)' },
      { key: 'defender', label: 'Defender', color: 'var(--red)' }
    ];

    sides.forEach(function(side) {
      var sideData = side.key === 'attacker' ? report.data.battle.attacker : report.data.battle.defender;
      var pi = parsePlayerInfo(sideData, 0) || {};

      var card = document.createElement('div');
      card.style.cssText = [
        'flex:1;min-width:160px;max-width:220px;',
        'background:var(--card);border:2px solid var(--border);border-radius:12px;',
        'padding:1.25rem 1rem;cursor:pointer;',
        'display:flex;flex-direction:column;align-items:center;gap:.6rem;',
        'transition:border-color .15s,transform .15s,box-shadow .15s;',
        'user-select:none;'
      ].join('');

      // Hover effect via mouseover/mouseout
      card.addEventListener('mouseover', function() {
        card.style.borderColor = side.color;
        card.style.transform = 'translateY(-3px)';
        card.style.boxShadow = '0 8px 24px rgba(0,0,0,0.4)';
      });
      card.addEventListener('mouseout', function() {
        card.style.borderColor = 'var(--border)';
        card.style.transform = '';
        card.style.boxShadow = '';
      });

      // Avatar container (relative positioning for fallback overlay)
      var avatarWrap = document.createElement('div');
      avatarWrap.style.cssText = 'position:relative;width:56px;height:56px;flex-shrink:0;';

      var avatarUrl = getAvatar(pi);
      var fallbackLetter = (pi.username || '?').charAt(0).toUpperCase();

      // Letter fallback div (always present, shown when img errors)
      var fallbackDiv = document.createElement('div');
      fallbackDiv.style.cssText = [
        'position:absolute;inset:0;border-radius:50%;',
        'background:var(--surface);border:2px solid ' + side.color + ';',
        'display:none;align-items:center;justify-content:center;',
        'font-size:1.5rem;font-weight:700;color:' + side.color + ';'
      ].join('');
      fallbackDiv.textContent = fallbackLetter;

      if (avatarUrl) {
        var img = document.createElement('img');
        img.src = avatarUrl;
        img.alt = '';
        img.style.cssText = 'width:56px;height:56px;border-radius:50%;object-fit:cover;display:block;border:2px solid ' + side.color + ';';
        img.onerror = function() {
          img.style.display = 'none';
          fallbackDiv.style.display = 'flex';
        };
        avatarWrap.appendChild(img);
      } else {
        fallbackDiv.style.display = 'flex';
      }
      avatarWrap.appendChild(fallbackDiv);
      card.appendChild(avatarWrap);

      // Player name
      var nameEl = document.createElement('div');
      nameEl.style.cssText = 'font-weight:600;font-size:.95rem;color:var(--text);text-align:center;word-break:break-word;';
      nameEl.textContent = pi.username || 'Unknown';
      card.appendChild(nameEl);

      // Role badge with SVG icon
      var roleRow = document.createElement('div');
      roleRow.style.cssText = 'display:flex;align-items:center;gap:.35rem;';

      var roleSvg = document.createElementNS(svgNS, 'svg');
      roleSvg.setAttribute('width', '14'); roleSvg.setAttribute('height', '14');
      roleSvg.setAttribute('viewBox', '0 0 24 24'); roleSvg.setAttribute('fill', 'none');
      roleSvg.setAttribute('stroke', side.color); roleSvg.setAttribute('stroke-width', '2');
      roleSvg.setAttribute('stroke-linecap', 'round'); roleSvg.setAttribute('stroke-linejoin', 'round');

      if (side.key === 'attacker') {
        // Sword icon
        var swordPath = document.createElementNS(svgNS, 'path');
        swordPath.setAttribute('d', 'M14.5 17.5L3 6V3h3l11.5 11.5');
        var swordPath2 = document.createElementNS(svgNS, 'path');
        swordPath2.setAttribute('d', 'M13 19l6-6');
        var swordPath3 = document.createElementNS(svgNS, 'path');
        swordPath3.setAttribute('d', 'M16 16l4 4');
        var swordPath4 = document.createElementNS(svgNS, 'path');
        swordPath4.setAttribute('d', 'M19 21l2-2');
        roleSvg.appendChild(swordPath); roleSvg.appendChild(swordPath2);
        roleSvg.appendChild(swordPath3); roleSvg.appendChild(swordPath4);
      } else {
        // Shield icon
        var shieldPath = document.createElementNS(svgNS, 'path');
        shieldPath.setAttribute('d', 'M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z');
        roleSvg.appendChild(shieldPath);
      }

      var roleLabel = document.createElement('span');
      roleLabel.style.cssText = 'font-size:.8rem;font-weight:600;color:' + side.color + ';';
      roleLabel.textContent = side.label;

      roleRow.appendChild(roleSvg);
      roleRow.appendChild(roleLabel);
      card.appendChild(roleRow);

      // Level display
      if (pi.level) {
        var levelEl = document.createElement('div');
        levelEl.style.cssText = 'font-size:.8rem;color:var(--muted);';
        levelEl.textContent = 'Lv. ' + pi.level;
        card.appendChild(levelEl);
      }

      // Click handler
      card.addEventListener('click', function() { selectPlayer(side.key); });

      cardsRow.appendChild(card);
    });
  }

  // ── selectPlayer ──────────────────────────────────────────────────────────
  function selectPlayer(side) {
    var report = wizardState._pendingReport;
    var sideData = side === 'attacker' ? report.data.battle.attacker : report.data.battle.defender;
    var pi = parsePlayerInfo(sideData, 0);
    if (!pi) return;

    wizardState.player = {
      name: pi.username || 'Unknown',
      avatar: getAvatar(pi),
      avatarFallback: (pi.username || '?').charAt(0).toUpperCase(),
      level: pi.level || 0,
      server: pi.server || ''
    };

    var extracted = extractPlayerData(report.data, wizardState.player.name);
    wizardState.reportData.push({ id: report.id, extracted: extracted });
    delete wizardState._pendingReport;

    wizardState.step = 'summary';
    renderWizardStep();
  }

  // ── Hero name cache ───────────────────────────────────────────────────────
  var HERO_CACHE = null;

  function loadHeroNames(cb) {
    if (HERO_CACHE) return cb(HERO_CACHE);
    fetch('data/all-heroes.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        HERO_CACHE = {};
        data.forEach(function(h) { HERO_CACHE[h.id] = h.displayName || h.name || ('Hero #' + h.id); });
        cb(HERO_CACHE);
      })
      .catch(function() { HERO_CACHE = {}; cb(HERO_CACHE); });
  }

  function heroName(id) {
    return (HERO_CACHE && HERO_CACHE[id]) || ('Hero #' + id);
  }

  // ── Mecha names ───────────────────────────────────────────────────────────
  var MECHA_NAMES = {
    1002: 'Earthshaker E-100',
    1003: 'Blazing Gale Rx',
    1004: 'Tide Crusher BW-3',
    1005: 'Doom Sawblade D-4',
    1006: 'Luminary Knight LP-4',
    1007: 'Blade Angel BA-6',
    1008: 'Heavy Mothership HC-9999'
  };

  // ── Build capture summary from all reports ────────────────────────────────
  function buildCaptureSummary() {
    var heroMap = {};       // id -> true, for deduplication
    var gearCount = 0;
    var decoCount = 0;
    var skinInfo = null;
    var enigmaDeployed = 0;
    var enigmaFields = 0;
    var mechaMap = {};      // mechaId -> true
    var ctcsInfo = null;

    wizardState.reportData.forEach(function(r) {
      var x = r.extracted;
      if (!x) return;

      // Heroes + gear
      (x.heroes || []).forEach(function(h) {
        if (!heroMap[h.id]) {
          heroMap[h.id] = true;
          gearCount += (h.heroEquips || []).length;
        }
      });

      // Decorations — take first non-null
      if (!decoCount && x.decorations) {
        var placed = (x.decorations.sublimes || []).length || (x.decorations.buildings || []).length;
        if (!placed && x.decorations.effectList) placed = x.decorations.effectList.length;
        decoCount = placed || 0;
      }

      // Skin — take first available
      if (!skinInfo && x.skins) skinInfo = x.skins;

      // Enigma beasts — take first available
      if (!enigmaDeployed && x.enigmas) {
        var fields = x.enigmas.fields || x.enigmas;
        if (Array.isArray(fields)) {
          enigmaFields = fields.length;
          fields.forEach(function(f) {
            enigmaDeployed += (f.beasts || f.beastList || []).length;
          });
        }
      }

      // Mechas — deduplicate by mechaId
      (x.mechas || []).forEach(function(m) {
        if (m.mechaId) mechaMap[m.mechaId] = true;
      });

      // CTCs — take first available
      if (!ctcsInfo && x.ctcs) ctcsInfo = x.ctcs;
    });

    var heroIds = Object.keys(heroMap);
    var heroNames = heroIds.map(function(id) { return heroName(Number(id)); });

    var mechaIds = Object.keys(mechaMap).map(Number);
    var mechaNamesList = mechaIds.map(function(mid) { return MECHA_NAMES[mid] || ('Mecha #' + mid); });

    return {
      heroNames: heroNames,
      heroCount: heroIds.length,
      gearCount: gearCount,
      decoCount: decoCount,
      skinInfo: skinInfo,
      enigmaDeployed: enigmaDeployed,
      enigmaFields: enigmaFields,
      mechaNames: mechaNamesList,
      mechaCount: mechaIds.length,
      ctcsInfo: ctcsInfo
    };
  }

  // ── Shared helper: SVG checkmark ──────────────────────────────────────────
  function makeCheckSvg(color) {
    var svgNS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('width', '18'); svg.setAttribute('height', '18');
    svg.setAttribute('viewBox', '0 0 24 24'); svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', color || 'var(--green)'); svg.setAttribute('stroke-width', '2.5');
    svg.setAttribute('stroke-linecap', 'round'); svg.setAttribute('stroke-linejoin', 'round');
    svg.style.flexShrink = '0';
    svg.style.marginTop = '1px';
    var poly = document.createElementNS(svgNS, 'polyline');
    poly.setAttribute('points', '20 6 9 17 4 12');
    svg.appendChild(poly);
    return svg;
  }

  // ── Step 3: Capture summary ───────────────────────────────────────────────
  function renderStepSummary(container) {
    loadHeroNames(function() {
      _buildSummaryDOM(container);
    });
  }

  function _buildSummaryDOM(container) {
    while (container.firstChild) container.removeChild(container.firstChild);

    var player = wizardState.player || {};
    var summary = buildCaptureSummary();
    var reportCount = wizardState.reportData.length;

    // ── Avatar (72px with green glow) ──
    var avatarWrap = document.createElement('div');
    avatarWrap.style.cssText = 'position:relative;width:72px;height:72px;margin:0 auto .75rem;flex-shrink:0;';

    var fallbackLetter = (player.avatarFallback || (player.name || '?').charAt(0)).toUpperCase();

    var fallbackDiv = document.createElement('div');
    fallbackDiv.style.cssText = [
      'position:absolute;inset:0;border-radius:50%;',
      'background:var(--surface);border:2px solid var(--green);',
      'display:none;align-items:center;justify-content:center;',
      'font-size:2rem;font-weight:700;color:var(--green);',
      'box-shadow:0 0 16px rgba(63,185,80,0.35);'
    ].join('');
    fallbackDiv.textContent = fallbackLetter;

    if (player.avatar) {
      var img = document.createElement('img');
      img.src = player.avatar;
      img.alt = '';
      img.style.cssText = [
        'width:72px;height:72px;border-radius:50%;object-fit:cover;display:block;',
        'border:2px solid var(--green);',
        'box-shadow:0 0 16px rgba(63,185,80,0.35);'
      ].join('');
      img.onerror = function() { img.style.display = 'none'; fallbackDiv.style.display = 'flex'; };
      avatarWrap.appendChild(img);
    } else {
      fallbackDiv.style.display = 'flex';
    }
    avatarWrap.appendChild(fallbackDiv);
    container.appendChild(avatarWrap);

    // ── Welcome heading ──
    var h2 = document.createElement('h2');
    h2.style.marginBottom = '.25rem';
    h2.textContent = 'Welcome, ' + (player.name || 'Player') + '!';
    container.appendChild(h2);

    // ── Subtitle ──
    var sub = document.createElement('p');
    sub.style.marginBottom = '1rem';
    sub.textContent = 'Data captured from ' + reportCount + ' battle report' + (reportCount !== 1 ? 's' : '');
    container.appendChild(sub);

    // ── Capture checklist container ──
    var list = document.createElement('div');
    list.style.cssText = 'text-align:left;width:100%;margin-bottom:1.5rem;';
    container.appendChild(list);

    var delay = 0;

    function addItem(labelText, detailText, countText, countColor) {
      var item = document.createElement('div');
      item.className = 'capture-item';
      item.style.animationDelay = delay + 'ms';
      delay += 150;

      item.appendChild(makeCheckSvg());

      var textBlock = document.createElement('div');
      textBlock.style.cssText = 'flex:1;min-width:0;';

      var labelEl = document.createElement('div');
      labelEl.style.cssText = 'font-size:.9rem;font-weight:600;color:var(--text);';
      labelEl.textContent = labelText;
      textBlock.appendChild(labelEl);

      if (detailText) {
        var detailEl = document.createElement('div');
        detailEl.style.cssText = 'font-size:.8rem;color:var(--muted);margin-top:.1rem;';
        detailEl.textContent = detailText;
        textBlock.appendChild(detailEl);
      }

      item.appendChild(textBlock);

      if (countText != null) {
        var countEl = document.createElement('div');
        countEl.style.cssText = 'font-size:.85rem;font-weight:700;color:' + (countColor || 'var(--green)') + ';flex-shrink:0;white-space:nowrap;';
        countEl.textContent = countText;
        item.appendChild(countEl);
      }

      list.appendChild(item);
    }

    // Heroes row
    var heroDetail = summary.heroCount > 0
      ? summary.heroNames.slice(0, 4).join(', ') + (summary.heroCount > 4 ? ' +' + (summary.heroCount - 4) + ' more' : '')
      : 'None found';
    addItem('Heroes', heroDetail, summary.heroCount > 0 ? String(summary.heroCount) : null);

    // Titan Gear row
    addItem(
      'Titan Gear',
      summary.heroCount + ' hero' + (summary.heroCount !== 1 ? 'es' : '') + ' equipped, ' + summary.gearCount + ' gear piece' + (summary.gearCount !== 1 ? 's' : '')
    );

    // Decorations row
    if (summary.decoCount > 0) {
      addItem('Decorations', summary.decoCount + ' placed');
    }

    // Base Skin row
    if (summary.skinInfo) {
      addItem('Base Skin', 'Equipped');
    }

    // Base Decor & Halo row — check effectSkins for decor/halo sub-data
    // (the extraction bundles base decor inside skins or as separate field — show if present)
    if (summary.skinInfo && (summary.skinInfo.decorList || summary.skinInfo.haloList)) {
      addItem('Base Decor & Halo', 'Data captured');
    }

    // Enigma Beasts row
    if (summary.enigmaDeployed > 0 || summary.enigmaFields > 0) {
      addItem(
        'Enigma Beasts',
        summary.enigmaDeployed + ' deployed, ' + summary.enigmaFields + ' field' + (summary.enigmaFields !== 1 ? 's' : '') + ' active'
      );
    }

    // Heavy Troopers row
    if (summary.mechaCount > 0) {
      var mechaDetail = summary.mechaNames.join(', ');
      var mechaCountColor = summary.mechaCount < 6 ? 'var(--yellow)' : 'var(--green)';
      addItem('Heavy Troopers', mechaDetail, summary.mechaCount + '/6', mechaCountColor);
    }

    // ── Action buttons ──
    var btnRow = document.createElement('div');
    btnRow.style.cssText = 'display:flex;gap:.75rem;justify-content:center;flex-wrap:wrap;';
    container.appendChild(btnRow);

    var addBtn = document.createElement('button');
    addBtn.className = 'btn-secondary';
    addBtn.textContent = 'Add Another Report';
    addBtn.addEventListener('click', wizardAddAnother);
    btnRow.appendChild(addBtn);

    var genBtn = document.createElement('button');
    genBtn.className = 'btn-primary';
    genBtn.textContent = 'Generate Report';
    genBtn.addEventListener('click', wizardGenerate);
    btnRow.appendChild(genBtn);
  }

  // ── Step 4: Building animation ────────────────────────────────────────────
  function renderStepBuilding(container) {
    while (container.firstChild) container.removeChild(container.firstChild);

    var svgNS = 'http://www.w3.org/2000/svg';

    // Green circle with checkmark (72px)
    var iconWrap = document.createElement('div');
    iconWrap.style.cssText = [
      'width:72px;height:72px;border-radius:50%;',
      'background:rgba(35,134,54,0.15);border:2px solid var(--green);',
      'display:flex;align-items:center;justify-content:center;',
      'margin:0 auto .75rem;'
    ].join('');

    var checkSvg = document.createElementNS(svgNS, 'svg');
    checkSvg.setAttribute('width', '36'); checkSvg.setAttribute('height', '36');
    checkSvg.setAttribute('viewBox', '0 0 24 24'); checkSvg.setAttribute('fill', 'none');
    checkSvg.setAttribute('stroke', 'var(--green)'); checkSvg.setAttribute('stroke-width', '2.5');
    checkSvg.setAttribute('stroke-linecap', 'round'); checkSvg.setAttribute('stroke-linejoin', 'round');
    var checkPoly = document.createElementNS(svgNS, 'polyline');
    checkPoly.setAttribute('points', '20 6 9 17 4 12');
    checkSvg.appendChild(checkPoly);
    iconWrap.appendChild(checkSvg);
    container.appendChild(iconWrap);

    // Heading
    var h2 = document.createElement('h2');
    h2.style.marginBottom = '.4rem';
    h2.textContent = 'Building Your Report';
    container.appendChild(h2);

    // Progress bar wrapper
    var progressWrap = document.createElement('div');
    progressWrap.className = 'build-progress';
    var progressFill = document.createElement('div');
    progressFill.className = 'build-progress-fill';
    progressWrap.appendChild(progressFill);
    container.appendChild(progressWrap);

    // Status text
    var statusText = document.createElement('p');
    statusText.style.cssText = 'margin-top:.75rem;font-size:.9rem;color:var(--muted);';
    statusText.textContent = 'Preparing\u2026';
    container.appendChild(statusText);

    // Animate through 5 stages
    var stages = [
      { pct: 20, msg: 'Merging hero data\u2026' },
      { pct: 40, msg: 'Building decorations\u2026' },
      { pct: 60, msg: 'Processing enigma beasts\u2026' },
      { pct: 80, msg: 'Assembling chip loadouts\u2026' },
      { pct: 100, msg: 'Finalizing report\u2026' }
    ];

    var idx = 0;
    function runStage() {
      if (idx >= stages.length) {
        setTimeout(saveAndRenderReport, 400);
        return;
      }
      var stage = stages[idx++];
      progressFill.style.width = stage.pct + '%';
      statusText.textContent = stage.msg;
      setTimeout(runStage, 600);
    }

    // Kick off after a short initial delay so the bar animates from 0
    setTimeout(runStage, 150);
  }

  // ── Wizard navigation helpers ─────────────────────────────────────────────
  function wizardAddAnother() {
    wizardState.step = 'input';
    renderWizardStep();
  }

  function wizardGenerate() {
    wizardState.step = 'building';
    renderWizardStep();
  }

  // ── Persist + render full report ──────────────────────────────────────────
  function saveAndRenderReport() {
    var saved = {
      player: wizardState.player,
      reportIds: wizardState.reportData.map(function(r) { return r.id; }),
      marchGroups: []
    };
    localStorage.setItem('playerReport', JSON.stringify(saved));

    var cache = {};
    wizardState.reportData.forEach(function(r) { cache[r.id] = r.extracted; });
    localStorage.setItem('playerReportData', JSON.stringify(cache));

    closeWizard();
    renderFullReport();
  }

  function renderFullReport() {
    var app = document.getElementById('app');
    while (app.firstChild) app.removeChild(app.firstChild);
    var msg = document.createElement('div');
    msg.style.cssText = 'padding:3rem;text-align:center;';
    var h = document.createElement('h2');
    h.style.color = 'var(--text)';
    h.textContent = 'Report for ' + (wizardState.player ? wizardState.player.name : 'Unknown');
    msg.appendChild(h);
    var p = document.createElement('p');
    p.style.color = 'var(--muted)';
    p.textContent = 'Dashboard + tabs coming next';
    msg.appendChild(p);
    app.appendChild(msg);
  }

  // ── Wire Get Started button ───────────────────────────────────────────────
  document.getElementById('getStartedBtn').addEventListener('click', openWizard);

  // ── Page init: restore saved report ──────────────────────────────────────
  (function init() {
    var saved = null;
    try { saved = JSON.parse(localStorage.getItem('playerReport')); } catch(e) {}
    if (saved && saved.player && saved.reportIds && saved.reportIds.length) {
      wizardState.player = saved.player;
      wizardState.reportData = [];
      var cache = {};
      try { cache = JSON.parse(localStorage.getItem('playerReportData')) || {}; } catch(e) {}
      saved.reportIds.forEach(function(id) {
        wizardState.reportData.push({ id: id, extracted: cache[id] || null });
      });
      renderFullReport();
    }
  })();
</script>
