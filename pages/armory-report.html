<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">
<title>Player Report — Server 2864</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --card: #1c2128; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
    --green: #3fb950; --red: #f85149; --yellow: #d29922; --blue: #388bfd;
    --army: #56d364; --navy: #6cb6ff; --air: #e3b341;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Google Translate overrides */
  body { top: 0 !important; }
  body > .skiptranslate { display: none !important; }
  #google_translate_element { position: absolute; left: -9999px; opacity: 0; pointer-events: none; }

  /* Empty state */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; text-align: center; padding: 2rem; }
  .empty-state h2 { color: var(--text); margin: 1rem 0 .5rem; font-size: 1.5rem; }
  .empty-state p { color: var(--muted); margin-bottom: 1.5rem; max-width: 400px; }
  .btn-primary { background: #238636; color: #fff; border: none; padding: .75rem 2rem; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; }
  .btn-primary:hover { background: #2ea043; }
</style>
</head>
<body>

<div id="google_translate_element"></div>

<div id="app">
  <div class="empty-state">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14,2 14,8 20,8"/>
      <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
    <h2>Set Up Your Report</h2>
    <p>Generate a personal account report from your battle data</p>
    <button class="btn-primary" id="getStartedBtn">Get Started</button>
  </div>
</div>

<script>
  var CDN_BASE = 'https://fight-report-va.oss-accelerate.aliyuncs.com/prod/';
  var ASSET_BASE = 'https://raw.githubusercontent.com/texnottexas/landing-page/main/';
  function esc(s) { if (s == null) return ''; var d = document.createElement('div'); d.textContent = String(s); return d.innerHTML; }
  function el(tag, attrs, text) { var e = document.createElement(tag); if (attrs) { for (var k in attrs) e[k] = attrs[k]; } if (text != null) e.textContent = text; return e; }
</script>

    {code:'pt',flag:'\uD83C\uDDE7\uD83C\uDDF7',name:'Portugu\u00EAs'},{code:'it',flag:'\uD83C\uDDEE\uD83C\uDDF9',name:'Italiano'},
    {code:'ru',flag:'\uD83C\uDDF7\uD83C\uDDFA',name:'\u0420\u0443\u0441\u0441\u043A\u0438\u0439'},{code:'ja',flag:'\uD83C\uDDEF\uD83C\uDDF5',name:'\u65E5\u672C\u8A9E'},

  ];
  function detectCurrentLang(){var m=document.cookie.match(/googtrans=\/en\/([a-zA-Z-]{2,10})/);return m&&m[1]?m[1]:'en';}
  function applyLangToCombo(code,delay){var a=0;var p=setInterval(function(){var c=document.querySelector('.goog-te-combo');if(c){c.value=code;c.dispatchEvent(new Event('change'));clearInterval(p);}if(++a>30)clearInterval(p);},delay||200);}
  function googleTranslateElementInit(){window._gtLoaded=true;new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:false},'google_translate_element');var p=sessionStorage.getItem('pendingLang');if(p){sessionStorage.removeItem('pendingLang');applyLangToCombo(p,250);}else{var lo=localStorage.getItem('langOverride');if(lo&&lo!=='en')applyLangToCombo(lo,250);}}
</script>
<script src="https://translate.googleapis.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
<script src="feedback-widget.js"></script>
</body>
</html>
