<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com https://www.clarity.ms https://*.clarity.ms https://c.bing.com; style-src 'self' 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; connect-src 'self' https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com https://raw.githubusercontent.com https://*.clarity.ms https://c.bing.com; img-src 'self' https: data: https://*.clarity.ms https://c.bing.com; frame-ancestors 'none'; frame-src https://translate.google.com;">
<title>Storm Battle Plan &middot; S2864</title>
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --card:#1c2128; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#79c0ff;
  --red:#f85149; --green:#3fb950; --yellow:#d29922; --navy:#388bfd; --purple:#a371f7; --pink:#f778ba;
  --defend:#3fb950; --attack:#f85149;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:100;padding-top:calc(.65rem + env(safe-area-inset-top,0px));}
.hdr-left{display:flex;align-items:center;gap:.5rem;min-width:0;flex:1;}
.hdr-title{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-title .dim{color:var(--muted);font-weight:400;margin-left:.3rem;}
.home-btn,.lang-btn,.full-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .55rem;font-size:.78rem;text-decoration:none;transition:border-color .15s,color .15s;cursor:pointer;font-family:inherit;gap:.3rem;}
.home-btn:hover,.lang-btn:hover,.full-btn:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}
.full-btn{font-weight:700;}
.lang-btn #langCode{font-size:.7rem;color:var(--muted);}
.notranslate{unicode-bidi:isolate;}
#google_translate_element{position:absolute;left:-9999px;opacity:0;pointer-events:none;}

.wrap{max-width:1100px;margin:0 auto;padding:1rem;}
@media (min-width:640px){.wrap{padding:1.25rem;}}

.sb-hero{background:linear-gradient(135deg,rgba(248,81,73,.14),rgba(210,153,34,.10),rgba(121,192,255,.10));border:1px solid var(--border);border-radius:18px;padding:1.4rem;margin-bottom:1.2rem;position:relative;overflow:hidden;display:flex;align-items:flex-start;gap:1rem;}
.sb-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(248,81,73,.18),transparent 70%);pointer-events:none;}
.sb-hero-text{flex:1;min-width:0;}
.sb-hero h1{font-size:1.7rem;font-weight:900;letter-spacing:-.02em;line-height:1.1;margin-bottom:.5rem;display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;}
.sb-hero h1 .em{color:var(--red);text-shadow:0 0 18px rgba(248,81,73,.45);font-style:italic;}
.sb-hero .sb-sub{font-size:.95rem;color:var(--text);font-weight:500;line-height:1.45;}
.sb-hero .sb-sub b{color:var(--yellow);font-weight:800;}
.sb-pill{display:inline-flex;align-items:center;gap:.35rem;background:rgba(248,81,73,.16);border:1px solid rgba(248,81,73,.4);color:var(--red);font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:.25rem .6rem;border-radius:999px;margin-bottom:.55rem;}
.sb-countdown{display:inline-flex;align-items:center;gap:.4rem;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.85rem;font-weight:700;padding:.3rem .65rem;border-radius:10px;margin-top:.7rem;font-family:'SF Mono',Consolas,monospace;}
.sb-countdown .sb-cd-label{color:var(--muted);font-weight:500;font-family:inherit;}
.sb-hero-mascot{flex-shrink:0;width:130px;align-self:stretch;display:flex;align-items:flex-end;justify-content:flex-end;pointer-events:none;}
.sb-hero-mascot img{width:130px;height:auto;filter:drop-shadow(0 6px 14px rgba(0,0,0,.55));max-height:180px;object-fit:contain;}
@media (max-width:560px){.sb-hero h1{font-size:1.3rem;}.sb-hero .sb-sub{font-size:.85rem;}.sb-hero-mascot{width:80px;}.sb-hero-mascot img{width:80px;max-height:120px;}}
@media (max-width:380px){.sb-hero-mascot{display:none;}}

/* Rules */
.sb-rules{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;margin-bottom:1.2rem;}
.sb-rules-title{font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;}
.sb-rules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.55rem .9rem;font-size:.82rem;line-height:1.45;}
.sb-rules-grid b{font-weight:800;}
.sb-rules-grid b.d{color:var(--defend);}
.sb-rules-grid b.a{color:var(--attack);}
.sb-rules-grid b.y{color:var(--yellow);}
.sb-rules-grid .sb-rule{padding:.2rem 0;}

/* Lane assignment overview */
.lane-overview{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:1.2rem;}
@media (max-width:560px){.lane-overview{grid-template-columns:1fr;}}
.lane-block{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.85rem 1rem;position:relative;}
.lane-block.defend{border-left:5px solid var(--defend);}
.lane-block.attack{border-left:5px solid var(--attack);}
.lane-block-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.45rem;}
.lane-block-tag{font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:.18rem .5rem;border-radius:999px;}
.lane-block.defend .lane-block-tag{background:rgba(63,185,80,.16);color:var(--defend);border:1px solid rgba(63,185,80,.4);}
.lane-block.attack .lane-block-tag{background:rgba(248,81,73,.16);color:var(--attack);border:1px solid rgba(248,81,73,.4);}
.lane-block-title{font-size:.95rem;font-weight:800;color:var(--text);}
.lane-block-srvs{display:flex;flex-wrap:wrap;gap:.35rem;}
.srv-chip{display:inline-flex;align-items:center;gap:.45rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.4rem .7rem;font-family:'SF Mono',Consolas,monospace;font-weight:800;font-size:.95rem;letter-spacing:.02em;}
.lane-block.defend .srv-chip{border-color:rgba(63,185,80,.5);color:var(--defend);background:rgba(63,185,80,.08);}
.lane-block.attack .srv-chip{border-color:rgba(248,81,73,.5);color:var(--attack);background:rgba(248,81,73,.08);}

/* Pin callout */
.pins-block{background:rgba(121,192,255,.06);border:1px solid rgba(121,192,255,.3);border-radius:14px;padding:.85rem 1rem;margin-bottom:1.2rem;}
.pins-block .pins-title{font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);margin-bottom:.55rem;display:flex;align-items:center;gap:.4rem;}
.pins-list{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.4rem;}
.pin-chip{display:inline-flex;align-items:center;gap:.4rem;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:.25rem .6rem;font-size:.8rem;font-weight:800;color:var(--text);}
.pin-chip img{width:22px;height:22px;border-radius:50%;object-fit:cover;background:var(--surface);border:1px solid var(--border);}
.pin-chip .pin-sid{font-family:'SF Mono',Consolas,monospace;font-size:.65rem;color:var(--muted);font-weight:600;}
.pin-chip.defend{border-color:rgba(63,185,80,.5);}
.pin-chip.attack{border-color:rgba(248,81,73,.5);}
.pins-sub{font-size:.78rem;color:var(--text);line-height:1.5;}
.pins-sub b.def{color:var(--defend);font-weight:800;}
.pins-sub b.att{color:var(--attack);font-weight:800;}

/* Stage targets */
.stages{display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.2rem;}
.stage{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;position:relative;}
.stage.s1{border-left:5px solid var(--red);}
.stage.s2{border-left:5px solid var(--yellow);}
.stage.s3{border-left:5px solid var(--accent);}
.stage-head{display:flex;align-items:center;gap:.55rem;margin-bottom:.55rem;flex-wrap:wrap;}
.stage-time{font-size:.7rem;font-weight:800;letter-spacing:.05em;font-family:'SF Mono',Consolas,monospace;padding:.18rem .55rem;border-radius:6px;}
.stage.s1 .stage-time{background:rgba(248,81,73,.16);color:var(--red);border:1px solid rgba(248,81,73,.4);}
.stage.s2 .stage-time{background:rgba(210,153,34,.16);color:var(--yellow);border:1px solid rgba(210,153,34,.4);}
.stage.s3 .stage-time{background:rgba(121,192,255,.14);color:var(--accent);border:1px solid rgba(121,192,255,.4);}
.stage-name{font-size:1.05rem;font-weight:900;}
.stage.s1 .stage-name{color:var(--red);}
.stage.s2 .stage-name{color:var(--yellow);}
.stage.s3 .stage-name{color:var(--accent);}
.stage-focus{font-size:.78rem;color:var(--muted);font-weight:600;}
.tgt-split{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
@media (max-width:560px){.tgt-split{grid-template-columns:1fr;}}
.tgt-col{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.7rem .85rem;}
.tgt-col.attack{border-left:4px solid var(--attack);}
.tgt-col.defend{border-left:4px solid var(--defend);}
.tgt-col-head{font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:.45rem;display:flex;align-items:center;gap:.4rem;}
.tgt-col.attack .tgt-col-head{color:var(--attack);}
.tgt-col.defend .tgt-col-head{color:var(--defend);}
.tgt-line{display:flex;align-items:center;justify-content:space-between;gap:.5rem;padding:.3rem 0;font-size:.82rem;border-bottom:1px dashed var(--border);}
.tgt-line:last-child{border-bottom:none;}
.tgt-line.reserve{color:var(--muted);font-style:italic;}
.tgt-line .tgt-name{font-weight:700;color:var(--text);}
.tgt-line .tgt-slots{font-size:.7rem;font-weight:800;font-family:'SF Mono',Consolas,monospace;background:var(--card);border:1px solid var(--border);padding:.1rem .4rem;border-radius:5px;color:var(--muted);}
.tgt-line .tgt-pts{font-size:.7rem;color:var(--accent);font-weight:700;font-family:'SF Mono',Consolas,monospace;}
.tgt-block{padding:.45rem 0;border-bottom:1px dashed var(--border);}
.tgt-block:last-child{border-bottom:none;}
.tgt-block.reserve .tgt-line .tgt-name{color:var(--muted);font-style:italic;}
.tgt-team{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.35rem;}
.tgt-empty{font-size:.7rem;color:var(--muted);font-style:italic;margin-top:.25rem;}
.pchip{font-size:.72rem;font-weight:700;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:.15rem .35rem .15rem .15rem;display:inline-flex;align-items:center;gap:.3rem;line-height:1;}
.pchip.pinned{background:rgba(121,192,255,.1);border-color:rgba(121,192,255,.5);}
.pchip-av{width:18px;height:18px;border-radius:50%;object-fit:cover;background:var(--surface);border:1px solid var(--border);flex-shrink:0;}
.pchip-name{font-weight:700;color:var(--text);}
.pchip-sid{font-size:.62rem;font-family:'SF Mono',Consolas,monospace;color:var(--muted);font-weight:600;}
.pchip-pw{color:var(--muted);font-weight:600;font-size:.62rem;font-family:'SF Mono',Consolas,monospace;}
.pchip-star{font-size:.6rem;color:var(--accent);font-weight:800;letter-spacing:.04em;}

/* Server cards (full roster) */
.servers-section{margin-bottom:1.2rem;}
.servers-head{font-size:.8rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.55rem;}
.servers-grid{display:grid;grid-template-columns:1fr;gap:.7rem;}
@media (min-width:740px){.servers-grid{grid-template-columns:1fr 1fr;}}
.srv-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;}
.srv-card.defend{border-left:5px solid var(--defend);}
.srv-card.attack{border-left:5px solid var(--attack);}
.srv-card-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.5rem;flex-wrap:wrap;}
.srv-card-left{display:flex;align-items:center;gap:.55rem;min-width:0;flex:1;}
.srv-avatar{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);overflow:hidden;flex-shrink:0;}
.srv-avatar img{width:100%;height:100%;object-fit:cover;}
.srv-id{font-family:'SF Mono',Consolas,monospace;font-size:.9rem;font-weight:800;}
.srv-card.defend .srv-id{color:var(--defend);}
.srv-card.attack .srv-id{color:var(--attack);}
.srv-leader{font-size:.78rem;color:var(--muted);font-weight:600;}
.srv-role{font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:.18rem .5rem;border-radius:999px;flex-shrink:0;}
.srv-card.defend .srv-role{background:rgba(63,185,80,.16);color:var(--defend);border:1px solid rgba(63,185,80,.4);}
.srv-card.attack .srv-role{background:rgba(248,81,73,.16);color:var(--attack);border:1px solid rgba(248,81,73,.4);}
.srv-anchor{font-size:.62rem;font-weight:800;letter-spacing:.05em;color:var(--yellow);margin-top:.15rem;}
.srv-meta{font-size:.7rem;color:var(--muted);font-weight:600;margin-bottom:.45rem;display:flex;gap:.55rem;flex-wrap:wrap;}
.srv-meta .mm{padding:.08rem .35rem;border:1px solid var(--border);border-radius:5px;background:var(--surface);}
.srv-roster-lab{font-size:.62rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;}
.srv-chips{display:flex;flex-wrap:wrap;gap:.25rem;}
.pchip{font-size:.72rem;font-weight:700;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:.15rem .45rem;display:inline-flex;align-items:center;gap:.3rem;}
.pchip.pinned{background:rgba(121,192,255,.1);border-color:rgba(121,192,255,.5);}
.pchip .pchip-pw{color:var(--muted);font-weight:600;font-size:.65rem;}
.pchip .pchip-star{color:var(--accent);font-size:.7rem;}
.see-more{margin-top:.4rem;background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:.25rem .55rem;font-size:.7rem;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:.25rem;}
.see-more:hover{border-color:var(--accent);color:var(--accent);}
.see-more.open svg{transform:rotate(180deg);}
.see-more svg{transition:transform .15s;}

/* Search */
.sb-search-wrap{position:relative;margin-bottom:1.2rem;}
.sb-search-input{width:100%;background:var(--card);border:2px solid var(--border);border-radius:14px;color:var(--text);font-size:1rem;font-weight:600;padding:.85rem 1rem .85rem 2.6rem;font-family:inherit;transition:border-color .15s ease,background .15s ease;}
.sb-search-input:focus{outline:none;border-color:var(--accent);background:var(--surface);}
.sb-search-input::placeholder{color:var(--muted);font-weight:500;}
.sb-search-icon{position:absolute;left:.95rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.sb-search-input:focus + .sb-search-icon{color:var(--accent);}
.sb-search-results{position:absolute;top:calc(100% + .25rem);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:none;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.sb-search-results.active{display:block;}
.sb-sr{display:flex;align-items:center;gap:.6rem;padding:.65rem .85rem;cursor:pointer;font-size:.85rem;border-bottom:1px solid var(--border);transition:background .12s ease;}
.sb-sr:last-child{border-bottom:none;}
.sb-sr:hover,.sb-sr.focused{background:rgba(121,192,255,.1);}
.sb-sr .sb-sr-name{font-weight:700;color:var(--text);flex:1;min-width:0;}
.sb-sr .sb-sr-srv{font-size:.65rem;font-family:'SF Mono',Consolas,monospace;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:.05rem .35rem;border-radius:5px;}
.sb-sr .sb-sr-role.defend{color:var(--defend);font-weight:800;font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;}
.sb-sr .sb-sr-role.attack{color:var(--attack);font-weight:800;font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;}
.sb-search-empty{padding:.85rem;text-align:center;font-size:.8rem;color:var(--muted);}

/* Player modal */
.pm-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);align-items:center;justify-content:center;padding:1rem;}
.pm-overlay.active{display:flex;}
.pm{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.4rem;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;}
.pm-head{display:flex;align-items:flex-start;justify-content:space-between;gap:.6rem;margin-bottom:.4rem;}
.pm-name{font-size:1.4rem;font-weight:900;line-height:1.1;}
.pm-meta{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem;font-size:.75rem;color:var(--muted);}
.pm-meta .pm-srv{font-family:'SF Mono',Consolas,monospace;background:var(--surface);border:1px solid var(--border);padding:.1rem .45rem;border-radius:5px;font-weight:700;color:var(--text);}
.pm-meta .pm-role{font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:.1rem .4rem;border-radius:5px;font-size:.62rem;}
.pm-meta .pm-role.defend{background:rgba(63,185,80,.16);color:var(--defend);border:1px solid rgba(63,185,80,.4);}
.pm-meta .pm-role.attack{background:rgba(248,81,73,.16);color:var(--attack);border:1px solid rgba(248,81,73,.4);}
.pm-meta .pm-pin{font-weight:800;color:var(--accent);font-size:.62rem;text-transform:uppercase;letter-spacing:.04em;}
.pm-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem;padding:.15rem .45rem;border-radius:6px;line-height:1;}
.pm-close:hover{background:var(--surface);color:var(--text);}
.pm-sub{font-size:.85rem;color:var(--text);background:rgba(248,81,73,.06);border:1px solid rgba(248,81,73,.3);border-radius:10px;padding:.7rem .9rem;margin-bottom:.95rem;line-height:1.45;}
.pm-sub.defend{background:rgba(63,185,80,.06);border-color:rgba(63,185,80,.3);}
.pm-sub b.def{color:var(--defend);}
.pm-sub b.att{color:var(--attack);}
.pm-orders{display:flex;flex-direction:column;gap:.5rem;}
.pm-order{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.7rem .9rem;}
.pm-order .o-head{display:flex;align-items:center;gap:.55rem;margin-bottom:.3rem;}
.pm-order .o-tag{font-size:.62rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:.15rem .45rem;border-radius:999px;}
.pm-order.s1 .o-tag{background:rgba(248,81,73,.16);color:var(--red);border:1px solid rgba(248,81,73,.4);}
.pm-order.s2 .o-tag{background:rgba(210,153,34,.16);color:var(--yellow);border:1px solid rgba(210,153,34,.4);}
.pm-order.s3 .o-tag{background:rgba(121,192,255,.14);color:var(--accent);border:1px solid rgba(121,192,255,.4);}
.pm-order .o-title{font-size:.82rem;font-weight:800;color:var(--text);}
.pm-order .o-body{font-size:.8rem;color:var(--text);line-height:1.45;}
.pm-order .o-body b{font-weight:800;}
.pm-foot{margin-top:1.1rem;display:flex;justify-content:flex-end;}
.pm-ok{background:linear-gradient(135deg,var(--green),var(--accent));border:none;color:#0d1117;font-weight:800;font-size:.9rem;padding:.55rem 1.2rem;border-radius:10px;cursor:pointer;font-family:inherit;letter-spacing:.02em;}
.pm-ok:hover{filter:brightness(1.1);}

/* Lang */
.lang-modal-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:1rem;}
.lang-modal-overlay.active{display:flex;}
.lang-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;max-width:380px;width:100%;}
.lang-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}
.lang-modal-title{font-size:1rem;font-weight:700;}
.lang-modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:.15rem .4rem;border-radius:6px;}
.lang-modal-close:hover{background:var(--surface);color:var(--text);}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem;}

  function getLangData(c){var b=c.split('-')[0];return LANGUAGES.find(function(l){return l.code===c||l.code===b;})||null;}

  function applyLangToCombo(code,delay){var a=0;var p=setInterval(function(){var c=document.querySelector('.goog-te-combo');if(c){c.value=code;c.dispatchEvent(new Event('change'));clearInterval(p);updateLangBtn(code);}if(++a>30)clearInterval(p);},delay||200);}

  function fmtNum(n){n=+n||0;if(n>=1e9)return (n/1e9).toFixed(2)+'B';if(n>=1e6)return (n/1e6).toFixed(1)+'M';if(n>=1e3)return (n/1e3).toFixed(0)+'K';return String(n);}

  // ===== R9 Lane assignment (mirrors storm-duel.html) =====

      ]
    }
  ];

  // ===== State =====
  var _data=null;

  var _allyRosters={}; // sid → [{name, power, merit, avatar_url}]
  var _assigns=null;   // built by buildAssignments

  var DATA_URL=(location.hostname==='localhost'||location.hostname==='127.0.0.1')
    ? '../data/storm-duel.json?_t='+Date.now()
    : 'https://raw.githubusercontent.com/texnottexas/2864tw.com-landing-page/main/data/storm-duel.json?_t='+Date.now();
  // Fix: that path was wrong on first guess. The repo is /texnottexas/landing-page.
  DATA_URL = (location.hostname==='localhost'||location.hostname==='127.0.0.1')

  function showError(msg){

  // Build a roster for each ally warzone by merging merit / kartz / formations.
  // This is the ONLY player list we render — no opponents, no broad search.
  function buildAllyRosters(data){
    _allyRosters={};
    (data.ally.warzones||[]).forEach(function(z){
      var byName={};
      function bump(p, src){
        var nm=p.username||p.name; if(!nm)return;
        var rec=byName[nm];
        if(!rec) byName[nm]={name:nm, sid:z.sid, power:p.power||0, merit:p.merit||0, avatar_url:p.avatar_url||null, src:src};
        else {
          if(p.power && p.power>rec.power) rec.power=p.power;
          if(p.merit && p.merit>rec.merit) rec.merit=p.merit;
          if(!rec.avatar_url && p.avatar_url) rec.avatar_url=p.avatar_url;
        }
      }
      ((z.individual_merit||{}).top||[]).forEach(function(p){bump(p,'merit');});
      ((z.kartz_individual||{}).top||[]).forEach(function(p){bump(p,'kartz');});
      var fm=z.formations||{};
      ['Army','Navy','AirForce'].forEach(function(u){(fm[u]||[]).forEach(function(m){bump(m,'formation');});});
      var list=Object.keys(byName).map(function(k){return byName[k];});
      list.sort(function(a,b){return (b.power||0)-(a.power||0) || (b.merit||0)-(a.merit||0);});
      _allyRosters[z.sid]=list;
    });
  }

  function roleForSid(sid){
    if(DEFEND_SIDS.indexOf(sid)>=0) return 'DEFEND';
    if(ATTACK_SIDS.indexOf(sid)>=0) return 'ATTACK';
    return 'ATTACK';
  }
  function isDefensePin(name){return DEFENSE_PIN_NAMES.indexOf(name)>=0;}
  function isAttackCallout(name){return ATTACK_CALLOUTS.indexOf(name)>=0;}

  // Effective role for a single player: respect the pin list, otherwise
  // fall back to their server's role.
  function roleForPlayer(name, sid){
    if(isDefensePin(name)) return 'DEFEND';
    return roleForSid(sid);
  }

  function render(data){
    var root=document.getElementById('sbRoot');
    while(root.firstChild)root.removeChild(root.firstChild);
    var round=(data.metadata||{}).round||'?';
    document.getElementById('hdrSub').textContent=' · R'+round;
    var assigns=buildAssignments(data);
    _assigns=assigns;

  // Build the assignment plan — mirrors storm-duel.html's buildAssignments
  // exactly: split ally roster by attack/defend sid, pull the defense pins
  // across from offense, then drain top-power players into each stage's
  // ruin slots. Leftovers land in Reserve / Roving.
  function buildAssignments(data){
    // Flat roster across all 5 ally warzones — best (highest-power) entry
    // per name|sid wins.
    var players={};
    (data.ally.warzones||[]).forEach(function(z){
      var fm=z.formations||{};
      ['Army','Navy','AirForce'].forEach(function(u){
        (fm[u]||[]).forEach(function(m){
          var key=(m.username||'?')+'|'+z.sid;
          if(!players[key] || (m.power||0)>players[key].power){
            players[key]={name:m.username, sid:z.sid, power:m.power||0, avatar_url:m.avatar_url||null, merit:m.merit||0};
          } else if(!players[key].avatar_url && m.avatar_url){
            players[key].avatar_url=m.avatar_url;
          }
        });
      });
    });
    var ranked=Object.values(players).sort(function(a,b){return b.power-a.power;});

    var attackSet=new Set(ATTACK_SIDS);
    var defendSet=new Set(DEFEND_SIDS);
    var baseOffense=ranked.filter(function(p){return attackSet.has(p.sid);});
    var baseDefense=ranked.filter(function(p){return defendSet.has(p.sid);});

    // Apply defense pins — pull named players from offense → defense.
    var moved=[];
    DEFENSE_PIN_NAMES.forEach(function(nm){
      var idx=baseOffense.findIndex(function(p){return p.name===nm;});
      if(idx>=0) moved.push(baseOffense.splice(idx,1)[0]);
    });
    if(moved.length) baseDefense=baseDefense.concat(moved).sort(function(a,b){return b.power-a.power;});

    function takeFromTop(pool, n, used){
      var out=[];
      for(var i=0;i<pool.length;i++){
        var p=pool[i];
        var k=p.name+'|'+p.sid;
        if(used.has(k)) continue;
        out.push(p); used.add(k);
        if(out.length>=n) break;
      }
      return out;
    }

    // Clone the STAGES template so we don't mutate the original constant.
    var stages=STAGES.map(function(s){
      return {
        id:s.id, time:s.time, name:s.name, focus:s.focus,
        attack:s.attack.map(function(t){return Object.assign({},t);}),
        defend:s.defend.map(function(t){return Object.assign({},t);})
      };
    });

    stages.forEach(function(s){
      var usedAttack=new Set(), usedDefend=new Set();
      s.attack.forEach(function(t){ t.team = t.reserve ? [] : takeFromTop(baseOffense, t.slots||0, usedAttack); });
      s.defend.forEach(function(t){ t.team = t.reserve ? [] : takeFromTop(baseDefense, t.slots||0, usedDefend); });
      // Reserve = leftovers from each pool, balanced for display
      var leftAtk=baseOffense.filter(function(p){return !usedAttack.has(p.name+'|'+p.sid);});
      var leftDef=baseDefense.filter(function(p){return !usedDefend.has(p.name+'|'+p.sid);});
      s.attack.filter(function(t){return t.reserve;}).forEach(function(t){t.team=leftAtk;});
      s.defend.filter(function(t){return t.reserve;}).forEach(function(t){t.team=leftDef;});
    });

    // Build name → assignment map so the player modal can show what target
    // they're on in each stage.
    var byName={};
    stages.forEach(function(s){
      ['attack','defend'].forEach(function(side){
        s[side].forEach(function(t){
          (t.team||[]).forEach(function(p){
            var key=p.name;
            if(!byName[key]) byName[key]={sid:p.sid, power:p.power, avatar_url:p.avatar_url, byStage:{}};
            byName[key].byStage[s.id]={ stage:s, target:t, side:side };
          });
        });
      });
    });

    return { stages:stages, byName:byName, baseOffense:baseOffense, baseDefense:baseDefense };
  }

  function buildCountdown(startTs, endTs){
    var wrap=el('div','sb-countdown');
    var lbl=el('span','sb-cd-label',''); wrap.appendChild(lbl);
    var v=el('span',null,''); wrap.appendChild(v);
    function tick(){
      var nowSec=Math.floor(Date.now()/1000);
      var target=(nowSec<startTs)?startTs:endTs;
      if(!target){v.textContent='';return;}
      lbl.textContent=(nowSec<startTs)?'Fight starts in':'Fight ends in';
      var d=target-nowSec;
      if(d<=0){
        if(target===startTs){v.textContent='NOW — GO!';v.style.color='var(--red)';}
        else{v.textContent='Fight is over';v.style.color='var(--muted)';}
        return;
      }
      var days=Math.floor(d/86400);d-=days*86400;
      var hrs =Math.floor(d/3600); d-=hrs *3600;
      var mins=Math.floor(d/60);
      var secs=d-mins*60;
      var parts=[];
      if(days)parts.push(days+'d');
      parts.push(String(hrs).padStart(2,'0')+'h');
      parts.push(String(mins).padStart(2,'0')+'m');
      if(!days)parts.push(String(secs).padStart(2,'0')+'s');
      v.textContent=parts.join(' ');
    }
    tick(); setInterval(tick,1000); return wrap;
  }

  function buildSearch(root){
    var host=el('div','sb-search-wrap');
    var input=document.createElement('input');
    input.id='sbSearchInput'; input.className='sb-search-input notranslate'; input.type='text';
    input.setAttribute('autocomplete','off');input.setAttribute('autocapitalize','off');
    input.setAttribute('autocorrect','off');input.setAttribute('spellcheck','false');
    input.placeholder='FIND NAME. GET ORDERS.';
    host.appendChild(input);
    var ic=el('span','sb-search-icon'); ic.appendChild(makeIcon('search',18)); host.appendChild(ic);
    var res=el('div','sb-search-results'); res.id='sbSearchResults'; host.appendChild(res);
    root.appendChild(host);
    wireSearch();
  }

  function buildRules(root){
    var box=el('div','sb-rules');
    var title=el('div','sb-rules-title');
    title.appendChild(makeIcon('info',14));
    title.appendChild(el('span',null,'How storm duel scores — capture buildings, hold for points/min'));
    box.appendChild(title);
    var grid=el('div','sb-rules-grid');
    var rules=[
      {head:'Capital', cls:'y', body:'100 pts/min (opens 30m). Tiebreaker decider.'},
      {head:'L3 Ruin', cls:'y', body:'40 pts/min (opens 15m). 1 per side.'},
      {head:'L2 Ruin', cls:'y', body:'20 pts/min (open from start). 2 per side.'},
      {head:'L1 Ruin', cls:'y', body:'10 pts/min (open from start). 3 per side.'},
      {head:'Capture flow', cls:null, body:'Besiege → 60s capture timer → captured → 120s at-peace → held (+pts/min ticks).'},
      {head:'Min 4 bodies', cls:null, body:'Every L1/L2/L3 slot has at least 4 players assigned — pulled from the cross-server Roving pool when needed.'}
    ];
    rules.forEach(function(r){
      var d=el('div','sb-rule');
      d.appendChild(el('b', r.cls?r.cls:null, r.head));
      d.appendChild(el('br'));
      d.appendChild(txt(r.body));
      grid.appendChild(d);
    });
    box.appendChild(grid);
    root.appendChild(box);
  }

  // Compact one-line lane strip — just context for the stage board below.
  function buildLaneStrip(data, root){
    var wrap=el('div','lane-overview');
    wrap.appendChild(buildLaneBlock('defend', 'Defenders', DEFEND_SIDS, data));
    wrap.appendChild(buildLaneBlock('attack', 'Attackers', ATTACK_SIDS, data));
    root.appendChild(wrap);
  }

  function buildLaneBlock(side, title, sids, data){
    var block=el('div','lane-block '+side);
    var head=el('div','lane-block-head');
    head.appendChild(el('div','lane-block-title', title));
    head.appendChild(el('span','lane-block-tag', side==='defend' ? sids.length+' servers · defend' : sids.length+' servers · attack'));
    block.appendChild(head);
    var srvs=el('div','lane-block-srvs');
    sids.forEach(function(sid){
      var chip=el('span','srv-chip', 'S'+sid);
      srvs.appendChild(chip);
    });
    block.appendChild(srvs);
    return block;
  }


  // Primary content — the 3-stage board with named players on each target.
  function buildStageBoard(assigns, root){
    var head=el('div','servers-head','3-stage assignments — bodies on every building');
    root.appendChild(head);
    var stages=el('div','stages');
    assigns.stages.forEach(function(s){
      var card=el('div','stage '+s.id);
      var h=el('div','stage-head');
      h.appendChild(el('span','stage-time', s.time));
      h.appendChild(el('span','stage-name', s.name));
      h.appendChild(el('span','stage-focus', s.focus));
      card.appendChild(h);
      var split=el('div','tgt-split');
      split.appendChild(buildTgtCol('attack', s.attack));
      split.appendChild(buildTgtCol('defend', s.defend));
      card.appendChild(split);
      stages.appendChild(card);
    });
    root.appendChild(stages);
  }

  function buildTgtCol(side, lines){
    var col=el('div','tgt-col '+side);
    col.appendChild(el('div','tgt-col-head', side==='attack' ? 'Attack lane · S2864 + S3885' : 'Defense lane · S655 + S1421 + S2474'));
    lines.forEach(function(t){
      var block=el('div','tgt-block'+(t.reserve?' reserve':''));
      var row=el('div','tgt-line');
      row.appendChild(el('span','tgt-name', t.type));
      var right=el('span',null,'');
      right.style.display='inline-flex';
      right.style.alignItems='center';
      right.style.gap='.4rem';
      if(t.pts)   right.appendChild(el('span','tgt-pts', t.pts+'/min'));
      if(t.slots) right.appendChild(el('span','tgt-slots', t.slots+' slots'));
      if(t.reserve) right.appendChild(el('span','tgt-slots', (t.team||[]).length+' left'));
      row.appendChild(right);
      block.appendChild(row);
      // Player chips on this target
      var team=t.team||[];
      if(team.length){
        var chips=el('div','tgt-team');
        var show=t.reserve ? team.slice(0,8) : team;
        show.forEach(function(p){chips.appendChild(buildPlayerChip(p));});
        block.appendChild(chips);
        if(t.reserve && team.length>8){
          var moreBtn=document.createElement('button');
          moreBtn.type='button'; moreBtn.className='see-more';
          var lbl=el('span',null,'See all '+team.length); moreBtn.appendChild(lbl);
          var caret=svgEl('svg',{width:12,height:12,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','stroke-width':'3','stroke-linecap':'round','stroke-linejoin':'round'});
          caret.appendChild(svgEl('polyline',{points:'6 9 12 15 18 9'}));
          moreBtn.appendChild(caret);
          var hidden=el('div','tgt-team'); hidden.style.display='none'; hidden.style.marginTop='.3rem';
          team.slice(8).forEach(function(p){hidden.appendChild(buildPlayerChip(p));});
          moreBtn.addEventListener('click', function(){
            var on=(hidden.style.display==='none');
            hidden.style.display=on?'flex':'none';
            moreBtn.classList.toggle('open', on);
            lbl.textContent= on ? 'Hide' : ('See all '+team.length);
          });
          block.appendChild(moreBtn);
          block.appendChild(hidden);
        }
      } else if(!t.reserve){
        block.appendChild(el('div','tgt-empty','— no players assigned —'));
      }
      col.appendChild(block);
    });
    return col;
  }

  function buildPlayerChip(p){
    var pin=isDefensePin(p.name);
    var att=isAttackCallout(p.name);
    var c=el('span','pchip'+((pin||att)?' pinned':''));
    if(p.avatar_url){
      var img=el('img','pchip-av');
      img.setAttribute('src',p.avatar_url);img.setAttribute('alt','');img.setAttribute('loading','lazy');
      img.addEventListener('error',function(){this.style.display='none';});
      c.appendChild(img);
    }
    c.appendChild(el('span','pchip-name',p.name));
    c.appendChild(el('span','pchip-sid','S'+p.sid));
    if(p.power) c.appendChild(el('span','pchip-pw', fmtNum(p.power)));
    if(pin) c.appendChild(el('span','pchip-star','★ DEF'));
    else if(att) c.appendChild(el('span','pchip-star','★ ATK'));
    return c;
  }

  function buildFoot(root){
    var f=el('div','sb-foot');
    f.appendChild(txt('Mirrors the Server Lane Assignment from '));
    var a=el('a',null,'Storm Duel'); a.setAttribute('href','storm-duel.html'); f.appendChild(a);
    f.appendChild(txt(' (Strategy tab). Wasteland plan = '));
    var b=el('a',null,'Battle Plan'); b.setAttribute('href','battle-plan.html'); f.appendChild(b);
    f.appendChild(txt('.'));
    root.appendChild(f);
    var fk=el('div','fkb');
    var fka=document.createElement('a');
    fka.textContent='Brought to you by supporters of the fk boats movement';
    fka.href='https://github.com/texnottexas/landing-page';
    fka.target='_blank';fka.rel='noopener';
    fk.appendChild(fka);
    root.appendChild(fk);
  }

  // ===== Player search — only over OUR ally warzone rosters =====
  function searchPlayers(q,limit){
    var qn=q.toLowerCase().trim(); if(!qn)return [];
    var starts=[],contains=[];
    var sids=Object.keys(_allyRosters);
    for(var i=0;i<sids.length;i++){
      var list=_allyRosters[sids[i]]||[];
      for(var j=0;j<list.length;j++){
        var p=list[j]; var nm=(p.name||'').toLowerCase();
        if(!nm)continue;
        if(nm===qn) starts.unshift(p);
        else if(nm.indexOf(qn)===0) starts.push(p);
        else if(nm.indexOf(qn)>0) contains.push(p);
      }
    }
    // De-dup by name|sid
    var seen={}; var out=[];
    function push(p){var k=p.name+'|'+p.sid; if(!seen[k]){seen[k]=1; out.push(p);}}
    starts.forEach(push); contains.forEach(push);
    return out.slice(0, limit);
  }

  var _matches=[], _focusedIdx=-1;
  function renderResults(){
    var box=document.getElementById('sbSearchResults'); if(!box)return;
    while(box.firstChild)box.removeChild(box.firstChild);
    if(!_matches.length){box.classList.remove('active');return;}
    _matches.forEach(function(p,i){
      var row=el('div','sb-sr'+(i===_focusedIdx?' focused':''));
      row.appendChild(el('span','sb-sr-name', p.name||'?'));
      row.appendChild(el('span','sb-sr-srv','S'+p.sid));
      var role=roleForPlayer(p.name, p.sid);
      row.appendChild(el('span','sb-sr-role '+role.toLowerCase(), role));
      row.addEventListener('mousedown', function(ev){ev.preventDefault();selectPlayer(p);});
      box.appendChild(row);
    });
    box.classList.add('active');
  }

  function openModal(p){
    if(!_data)return;
    var role=roleForPlayer(p.name, p.sid);
    var pinned=isDefensePin(p.name);
    var callout=isAttackCallout(p.name);
    var serverRole=roleForSid(p.sid);

    document.getElementById('pmName').textContent=p.name||'?';
    var meta=document.getElementById('pmMeta');
    while(meta.firstChild)meta.removeChild(meta.firstChild);
    meta.appendChild(el('span','pm-srv','S'+p.sid));
    meta.appendChild(el('span','pm-role '+role.toLowerCase(), role));
    if(pinned)  meta.appendChild(el('span','pm-pin','★ Defense pin'));
    if(callout) meta.appendChild(el('span','pm-pin','★ Attack callout'));

    var sub=document.getElementById('pmSub');
    sub.className='pm-sub '+(role==='DEFEND' ? 'defend' : '');
    while(sub.firstChild)sub.removeChild(sub.firstChild);
    if(pinned){
      sub.appendChild(el('b','def','You\'re pinned to home defense.'));
      sub.appendChild(txt(' Anchor an L2 or L3 ruin on Team 2864\'s map regardless of your server (S'+p.sid+'\'s lane is ' + serverRole + ').'));
    } else if(callout){
      sub.appendChild(el('b','att','You\'re explicitly on attack.'));
      sub.appendChild(txt(' Stay with the S2864 attack lane — do not get pulled back to defense.'));
    } else if(role==='DEFEND'){
      sub.appendChild(el('b','def','You\'re on defense.'));
      sub.appendChild(txt(' Hold home L1/L2 ruins (min 4 bodies per ruin). S'+p.sid+' is one of the 3 defending servers.'));
    } else {
      sub.appendChild(el('b','att','You\'re on attack.'));
      sub.appendChild(txt(' Push enemy ruins with the S2864 + S3885 attack lane (min 4 bodies per ruin).'));
    }

    var orders=document.getElementById('pmOrders');
    while(orders.firstChild)orders.removeChild(orders.firstChild);
    var byName = (_assigns && _assigns.byName) || {};
    var rec = byName[p.name];
    (_assigns ? _assigns.stages : []).forEach(function(s){
      var ord=el('div','pm-order '+s.id);
      var h=el('div','o-head');
      h.appendChild(el('span','o-tag', s.time));
      h.appendChild(el('span','o-title', s.name+' · '+s.focus));
      ord.appendChild(h);
      var body=el('div','o-body');
      var slot = rec && rec.byStage && rec.byStage[s.id];
      if(slot){
        body.appendChild(el('b',null, 'Your target: '));
        body.appendChild(txt(slot.target.type + (slot.target.pts ? ' ('+slot.target.pts+'/min)' : '')));
        body.appendChild(el('br'));
        body.appendChild(txt('Lane: '+(slot.side==='attack' ? 'Attack' : 'Defense')+' · '+(slot.target.slots||0)+' bodies total here'));
      } else {
        body.appendChild(txt('No slot — not in this stage\'s top-power allocation. Stay on previous stage target or join Roving.'));
      }
      ord.appendChild(body);
      orders.appendChild(ord);
    });

    document.getElementById('playerModal').classList.add('active');
  }

  function selectPlayer(p){
    var input=document.getElementById('sbSearchInput');
    if(input)input.value=p.name||'';
    var box=document.getElementById('sbSearchResults');
    if(box)box.classList.remove('active');
    _focusedIdx=-1;
    openModal(p);
  }

  function doSearch(){
    var input=document.getElementById('sbSearchInput');
    var box=document.getElementById('sbSearchResults');
    var q=input.value||'';
    _focusedIdx=-1;
    if(!q.trim()){_matches=[];renderResults();return;}
    _matches=searchPlayers(q,8);
    if(!_matches.length){
      while(box.firstChild)box.removeChild(box.firstChild);
      box.appendChild(el('div','sb-search-empty','No ally roster match for that name.'));
      box.classList.add('active');
      return;
    }
    renderResults();
  }

  function wireSearch(){
    var input=document.getElementById('sbSearchInput');
    var box=document.getElementById('sbSearchResults');
    if(!input)return;
    input.addEventListener('input', doSearch);
    input.addEventListener('keydown', function(ev){
      if(ev.key==='Escape'){box.classList.remove('active');input.blur();return;}
      if(!_matches.length)return;
      if(ev.key==='ArrowDown'){ev.preventDefault();_focusedIdx=Math.min(_matches.length-1,_focusedIdx+1);renderResults();}
      else if(ev.key==='ArrowUp'){ev.preventDefault();_focusedIdx=Math.max(0,_focusedIdx-1);renderResults();}
      else if(ev.key==='Enter'){ev.preventDefault();var pick=_matches[_focusedIdx>=0?_focusedIdx:0]; if(pick)selectPlayer(pick);}
    });
    document.addEventListener('click', function(ev){
      if(!input.contains(ev.target)&&!box.contains(ev.target)) box.classList.remove('active');
    });
  }

  function closeModal(){document.getElementById('playerModal').classList.remove('active');}
  document.getElementById('pmClose').addEventListener('click', closeModal);
  document.getElementById('pmOk').addEventListener('click', closeModal);
  document.getElementById('playerModal').addEventListener('click', function(ev){
    if(ev.target===document.getElementById('playerModal')) closeModal();
  });
  document.addEventListener('keydown', function(ev){
    if(ev.key==='Escape'&&document.getElementById('playerModal').classList.contains('active')){closeModal();ev.stopPropagation();}
  });
})();
</script>
