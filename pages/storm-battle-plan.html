<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com https://www.clarity.ms https://*.clarity.ms https://c.bing.com; style-src 'self' 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; connect-src 'self' https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com https://raw.githubusercontent.com https://*.clarity.ms https://c.bing.com; img-src 'self' https: data: https://*.clarity.ms https://c.bing.com; frame-ancestors 'none'; frame-src https://translate.google.com;">
<title>Storm Battle Plan &middot; S2864</title>
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --card:#1c2128; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#79c0ff;
  --red:#f85149; --green:#3fb950; --yellow:#d29922; --navy:#388bfd; --purple:#a371f7; --pink:#f778ba;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:100;padding-top:calc(.65rem + env(safe-area-inset-top,0px));}
.hdr-left{display:flex;align-items:center;gap:.5rem;min-width:0;flex:1;}
.hdr-title{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-title .dim{color:var(--muted);font-weight:400;margin-left:.3rem;}
.home-btn,.lang-btn,.full-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .55rem;font-size:.78rem;text-decoration:none;transition:border-color .15s,color .15s;cursor:pointer;font-family:inherit;gap:.3rem;}
.home-btn:hover,.lang-btn:hover,.full-btn:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}
.full-btn{font-weight:700;}
.lang-btn #langCode{font-size:.7rem;color:var(--muted);}
.notranslate{unicode-bidi:isolate;}
#google_translate_element{position:absolute;left:-9999px;opacity:0;pointer-events:none;}

.wrap{max-width:1080px;margin:0 auto;padding:1rem;}
@media (min-width:640px){.wrap{padding:1.25rem;}}

/* Hero */
.nc-hero{background:linear-gradient(135deg,rgba(248,81,73,.14),rgba(210,153,34,.10),rgba(121,192,255,.10));border:1px solid var(--border);border-radius:18px;padding:1.4rem;margin-bottom:1.2rem;position:relative;overflow:hidden;display:flex;align-items:flex-start;gap:1rem;}
.nc-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(248,81,73,.18),transparent 70%);pointer-events:none;}
.nc-hero-text{flex:1;min-width:0;}
.nc-hero h1{font-size:1.7rem;font-weight:900;letter-spacing:-.02em;line-height:1.1;margin-bottom:.5rem;display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;}
.nc-hero h1 .em{color:var(--red);text-shadow:0 0 18px rgba(248,81,73,.45);font-style:italic;}
.nc-hero .nc-sub{font-size:.95rem;color:var(--text);font-weight:500;line-height:1.45;}
.nc-hero .nc-sub b{color:var(--yellow);font-weight:800;}
.nc-pill{display:inline-flex;align-items:center;gap:.35rem;background:rgba(248,81,73,.16);border:1px solid rgba(248,81,73,.4);color:var(--red);font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:.25rem .6rem;border-radius:999px;margin-bottom:.55rem;}
.nc-countdown{display:inline-flex;align-items:center;gap:.4rem;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.85rem;font-weight:700;padding:.3rem .65rem;border-radius:10px;margin-top:.7rem;font-family:'SF Mono',Consolas,monospace;}
.nc-countdown .nc-cd-label{color:var(--muted);font-weight:500;font-family:inherit;}
.nc-hero-mascot{flex-shrink:0;width:130px;align-self:stretch;display:flex;align-items:flex-end;justify-content:flex-end;pointer-events:none;}
.nc-hero-mascot img{width:130px;height:auto;filter:drop-shadow(0 6px 14px rgba(0,0,0,.55));max-height:180px;object-fit:contain;}
@media (max-width:560px){.nc-hero h1{font-size:1.3rem;}.nc-hero .nc-sub{font-size:.85rem;}.nc-hero-mascot{width:80px;}.nc-hero-mascot img{width:80px;max-height:120px;}}
@media (max-width:380px){.nc-hero-mascot{display:none;}}

/* Rules card */
.nc-rules{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;margin-bottom:1.2rem;}
.nc-rules-title{font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;}
.nc-rules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.45rem .8rem;font-size:.82rem;line-height:1.4;}
.nc-rules-grid b{color:var(--yellow);font-weight:800;}
.nc-rules-grid .nc-rule{padding:.2rem 0;}
.nc-rule-when{font-size:.7rem;color:var(--accent);font-weight:700;font-family:'SF Mono',Consolas,monospace;}

/* Lane filter pills */
.lane-filter{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.lane-filter-lbl{font-size:.7rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-right:.25rem;}
.lane-pill{display:inline-flex;align-items:center;gap:.4rem;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:.78rem;font-weight:700;padding:.35rem .65rem;border-radius:999px;cursor:pointer;font-family:inherit;transition:border-color .12s,background .12s,color .12s;}
.lane-pill:hover{border-color:var(--accent);}
.lane-pill.active{background:rgba(121,192,255,.12);border-color:var(--accent);color:var(--accent);}
.lane-pill.all.active{background:rgba(163,113,247,.12);border-color:var(--purple);color:var(--purple);}
.lane-pill img{width:18px;height:18px;border-radius:50%;object-fit:cover;background:var(--surface);border:1px solid var(--border);}
.lane-pill .lane-sid{font-family:'SF Mono',Consolas,monospace;color:var(--muted);font-size:.7rem;}
.lane-pill.active .lane-sid{color:var(--accent);}

/* Lane cards (fronts) */
.nc-fronts{display:flex;flex-direction:column;gap:.85rem;}
.nc-front{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem 1.05rem;position:relative;overflow:hidden;display:grid;grid-template-columns:1fr auto;column-gap:1rem;}
.nc-front::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;}
.nc-front.lane-0::before{background:linear-gradient(180deg,#f85149,#d29922);}
.nc-front.lane-1::before{background:linear-gradient(180deg,#a371f7,#79c0ff);}
.nc-front.lane-2::before{background:linear-gradient(180deg,#79c0ff,#3fb950);}
.nc-front.lane-3::before{background:linear-gradient(180deg,#3fb950,#79c0ff);}
.nc-front.lane-4::before{background:linear-gradient(180deg,#d29922,#f85149);}
.nc-front.hidden{display:none;}
.nc-front.dim{opacity:.45;}
.nc-front-head{display:flex;align-items:flex-start;justify-content:space-between;gap:.75rem;margin-bottom:.6rem;flex-wrap:wrap;grid-column:1;}
.nc-front-title{display:flex;align-items:center;gap:.65rem;flex:1;min-width:0;}
.nc-front-icon{flex-shrink:0;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);overflow:hidden;}
.nc-front.lane-0 .nc-front-icon{color:#ff7b73;background:radial-gradient(circle,rgba(248,81,73,.22),rgba(248,81,73,.04));border-color:rgba(248,81,73,.5);}
.nc-front.lane-1 .nc-front-icon{color:#c39bff;background:radial-gradient(circle,rgba(163,113,247,.22),rgba(163,113,247,.04));border-color:rgba(163,113,247,.5);}
.nc-front.lane-2 .nc-front-icon{color:#79c0ff;background:radial-gradient(circle,rgba(121,192,255,.22),rgba(121,192,255,.04));border-color:rgba(121,192,255,.5);}
.nc-front.lane-3 .nc-front-icon{color:#3fb950;background:radial-gradient(circle,rgba(63,185,80,.22),rgba(63,185,80,.04));border-color:rgba(63,185,80,.5);}
.nc-front.lane-4 .nc-front-icon{color:#d29922;background:radial-gradient(circle,rgba(210,153,34,.22),rgba(210,153,34,.04));border-color:rgba(210,153,34,.5);}
.nc-front-icon img{width:100%;height:100%;object-fit:cover;}
.nc-front-name{font-size:1.1rem;font-weight:900;line-height:1.2;letter-spacing:-.01em;}
.nc-front.lane-0 .nc-front-name{color:#ff7b73;}
.nc-front.lane-1 .nc-front-name{color:#c39bff;}
.nc-front.lane-2 .nc-front-name{color:#79c0ff;}
.nc-front.lane-3 .nc-front-name{color:#3fb950;}
.nc-front.lane-4 .nc-front-name{color:#d29922;}
.nc-front-sub{font-size:.78rem;color:var(--muted);font-weight:600;margin-top:.1rem;}
.nc-front-pri{font-size:.65rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:.2rem .55rem;border-radius:999px;flex-shrink:0;}
.nc-front-pri.p1{background:rgba(248,81,73,.18);color:var(--red);border:1px solid rgba(248,81,73,.4);}
.nc-front-pri.p2{background:rgba(163,113,247,.18);color:#a371f7;border:1px solid rgba(163,113,247,.4);}
.nc-front-pri.p3{background:rgba(121,192,255,.18);color:var(--accent);border:1px solid rgba(121,192,255,.4);}
.nc-front-pri.p4{background:rgba(63,185,80,.16);color:var(--green);border:1px solid rgba(63,185,80,.4);}
.nc-front-pri.p5{background:rgba(210,153,34,.14);color:var(--yellow);border:1px solid rgba(210,153,34,.4);}
.nc-bigline{display:flex;align-items:baseline;gap:.55rem;margin:.7rem 0 .55rem;flex-wrap:wrap;grid-column:1;}
.nc-bigline-num{font-size:2.2rem;font-weight:900;line-height:1;letter-spacing:-.03em;font-family:'SF Mono',Consolas,monospace;}
.nc-front.lane-0 .nc-bigline-num{color:#ff7b73;}
.nc-front.lane-1 .nc-bigline-num{color:#c39bff;}
.nc-front.lane-2 .nc-bigline-num{color:#79c0ff;}
.nc-front.lane-3 .nc-bigline-num{color:#3fb950;}
.nc-front.lane-4 .nc-bigline-num{color:#d29922;}
.nc-bigline-lab{font-size:.95rem;font-weight:700;color:var(--text);}
.nc-bigline-pw{margin-left:auto;font-size:.78rem;font-weight:700;font-family:'SF Mono',Consolas,monospace;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:.18rem .5rem;border-radius:8px;}
.nc-front-line{font-size:.88rem;line-height:1.5;color:var(--text);margin-bottom:.4rem;grid-column:1;}
.nc-front-line b{color:var(--yellow);font-weight:800;margin-right:.15rem;}
.nc-names-lab{font-size:.7rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-top:.65rem;margin-bottom:.4rem;grid-column:1;}
.nc-anchors{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.4rem;grid-column:1;}
.nc-anchor{font-size:.78rem;font-weight:700;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.18rem .5rem;display:inline-flex;align-items:center;gap:.3rem;}
.nc-anchor .nc-anchor-pw{color:var(--muted);font-weight:600;font-size:.7rem;}
.nc-anchor.alli-DOG{border-color:rgba(63,185,80,.4);}
.nc-anchor.alli-MSS{border-color:rgba(56,139,253,.4);}
.nc-anchor.alli-Cat{border-color:rgba(210,153,34,.35);}
.nc-roster-toggle{margin-top:.55rem;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.4rem .7rem;font-size:.75rem;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:.3rem;grid-column:1;}
.nc-roster-toggle:hover{border-color:var(--accent);color:var(--accent);}
.nc-roster{display:none;margin-top:.55rem;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.6rem .75rem;font-size:.78rem;line-height:1.5;color:var(--text);column-count:2;column-gap:1rem;grid-column:1;}
@media (max-width:560px){.nc-roster{column-count:1;}}
.nc-roster.open{display:block;}
.nc-roster-name{break-inside:avoid;display:block;padding:.05rem 0;}
.nc-roster-name .nc-roster-tag{display:inline-block;font-size:.6rem;font-weight:800;letter-spacing:.05em;width:34px;color:var(--muted);}
.nc-roster-name .nc-roster-pw{color:var(--muted);font-size:.7rem;font-weight:600;font-family:'SF Mono',Consolas,monospace;}

/* Caveman mascots in front cards */
.nc-front-mascot{grid-column:2;grid-row:1 / span 99;align-self:center;justify-self:end;width:108px;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:.92;overflow:visible;}
.nc-front-mascot img{width:108px;height:auto;max-height:170px;object-fit:contain;filter:drop-shadow(0 4px 10px rgba(0,0,0,.45));}
@media (max-width:560px){.nc-front{grid-template-columns:1fr 92px;column-gap:.55rem;}.nc-front-mascot{width:92px;}.nc-front-mascot img{width:92px;max-height:150px;}}
@media (max-width:380px){.nc-front{grid-template-columns:1fr;}.nc-front-mascot{display:none;}}

/* Captain row (top enemy merit player) inside the lane card */
.nc-captain{margin-top:.55rem;display:flex;align-items:center;gap:.55rem;background:rgba(248,81,73,.06);border:1px solid rgba(248,81,73,.3);border-radius:10px;padding:.5rem .65rem;grid-column:1;}
.nc-captain img{width:36px;height:36px;border-radius:50%;object-fit:cover;background:var(--surface);border:1px solid var(--border);}
.nc-captain .cap-text{flex:1;min-width:0;}
.nc-captain .cap-name{font-size:.88rem;font-weight:800;line-height:1.15;color:var(--text);}
.nc-captain .cap-meta{font-size:.72rem;color:var(--muted);font-weight:600;}
.nc-captain .cap-meta b{color:var(--red);font-weight:800;}

/* Footer */
.nc-foot{margin-top:1rem;padding:.85rem 1rem;background:var(--surface);border:1px dashed var(--border);border-radius:12px;color:var(--muted);font-size:.78rem;line-height:1.55;}
.nc-foot b{color:var(--text);}
.nc-foot a{color:var(--accent);}

/* Loading / error */
.loading,.error{padding:2rem 1rem;text-align:center;color:var(--muted);font-size:.9rem;}
.error{color:var(--red);}

/* Player search */
.bp-search-wrap{position:relative;margin-bottom:1.2rem;}
.bp-search-input{width:100%;background:var(--card);border:2px solid var(--border);border-radius:14px;color:var(--text);font-size:1rem;font-weight:600;padding:.85rem 1rem .85rem 2.6rem;font-family:inherit;transition:border-color .15s ease,background .15s ease;}
.bp-search-input:focus{outline:none;border-color:var(--accent);background:var(--surface);}
.bp-search-input::placeholder{color:var(--muted);font-weight:500;}
.bp-search-icon{position:absolute;left:.95rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.bp-search-input:focus + .bp-search-icon{color:var(--accent);}
.bp-search-results{position:absolute;top:calc(100% + .25rem);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:none;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.bp-search-results.active{display:block;}
.bp-sr{display:flex;align-items:center;gap:.6rem;padding:.65rem .85rem;cursor:pointer;font-size:.85rem;border-bottom:1px solid var(--border);transition:background .12s ease;}
.bp-sr:last-child{border-bottom:none;}
.bp-sr:hover,.bp-sr.focused{background:rgba(121,192,255,.1);}
.bp-sr .bp-sr-name{font-weight:700;color:var(--text);flex:1;min-width:0;}
.bp-sr .bp-sr-alli{font-size:.7rem;font-family:'SF Mono',Consolas,monospace;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:.05rem .35rem;border-radius:5px;}
.bp-sr .bp-sr-lane{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
.bp-search-empty{padding:.85rem;text-align:center;font-size:.8rem;color:var(--muted);}

/* Player modal */
.pm-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);align-items:center;justify-content:center;padding:1rem;}
.pm-overlay.active{display:flex;}
.pm{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.4rem;max-width:480px;width:100%;max-height:88vh;overflow-y:auto;}
.pm-head{display:flex;align-items:flex-start;justify-content:space-between;gap:.6rem;margin-bottom:.4rem;}
.pm-name{font-size:1.4rem;font-weight:900;line-height:1.1;}
.pm-meta{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem;font-size:.75rem;color:var(--muted);}
.pm-meta .pm-alli{font-family:'SF Mono',Consolas,monospace;background:var(--surface);border:1px solid var(--border);padding:.1rem .45rem;border-radius:5px;font-weight:700;color:var(--text);}
.pm-meta .pm-prof{font-weight:800;text-transform:uppercase;letter-spacing:.04em;}
.pm-meta .pm-prof.ce{color:var(--red);}
.pm-meta .pm-prof.mm{color:var(--accent);}
.pm-meta .pm-lane{font-weight:800;color:var(--text);}
.pm-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem;padding:.15rem .45rem;border-radius:6px;line-height:1;}
.pm-close:hover{background:var(--surface);color:var(--text);}
.pm-sub{font-size:.85rem;color:var(--text);background:rgba(248,81,73,.06);border:1px solid rgba(248,81,73,.3);border-radius:10px;padding:.7rem .9rem;margin-bottom:.95rem;line-height:1.45;}
.pm-sub b{color:var(--red);}
.pm-heading{font-size:.95rem;font-weight:800;margin-bottom:.55rem;display:flex;align-items:center;gap:.45rem;}
.pm-heading svg{color:var(--green);}
.pm-fights{display:flex;flex-direction:column;gap:.5rem;}
.pm-fight{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.65rem .85rem;display:flex;align-items:center;gap:.6rem;}
.pm-fight .pm-rank{font-size:.65rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:.15rem .45rem;border-radius:999px;background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.3);white-space:nowrap;}
.pm-fight .pm-buff{flex:1;min-width:0;}
.pm-fight .pm-buff-name{font-size:.88rem;font-weight:700;color:var(--text);line-height:1.2;}
.pm-fight .pm-buff-meta{font-size:.72rem;color:var(--muted);margin-top:.15rem;}
.pm-foot{margin-top:1.1rem;display:flex;justify-content:flex-end;}
.pm-ok{background:linear-gradient(135deg,var(--green),var(--accent));border:none;color:#0d1117;font-weight:800;font-size:.9rem;padding:.55rem 1.2rem;border-radius:10px;cursor:pointer;font-family:inherit;letter-spacing:.02em;}
.pm-ok:hover{filter:brightness(1.1);}

/* Language modal */
.lang-modal-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:1rem;}
.lang-modal-overlay.active{display:flex;}
.lang-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;max-width:380px;width:100%;}
.lang-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}
.lang-modal-title{font-size:1rem;font-weight:700;}
.lang-modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:.15rem .4rem;border-radius:6px;}
.lang-modal-close:hover{background:var(--surface);color:var(--text);}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem;}
.lang-option{display:flex;align-items:center;gap:.45rem;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem .6rem;border-radius:8px;font-size:.78rem;cursor:pointer;font-family:inherit;}
.lang-option:hover{border-color:var(--accent);}
.lang-option.active{background:rgba(121,192,255,.1);border-color:var(--accent);color:var(--accent);}
.lang-flag{font-size:1rem;}

.fkb{margin-top:1.2rem;text-align:center;font-size:.65rem;color:var(--muted);opacity:.6;}
.fkb a{color:inherit;text-decoration:none;}
.fkb a:hover{color:var(--accent);}
</style>

<body>
<header>
  <div class="hdr-left">
    <a href="https://2864tw.com/index.html" class="home-btn notranslate" title="Home" aria-label="Home" id="homeBtn"></a>
    <span class="hdr-title notranslate">Storm Battle Plan<span class="dim" id="hdrSub">&middot; loading</span></span>
  </div>
  <a href="storm-duel.html" class="full-btn notranslate" title="Full Storm Duel page">Full plan</a>
  <button class="lang-btn notranslate" id="langBtn" aria-label="Change language">
    <span id="langFlag"></span><span id="langCode">/en</span>
  </button>
</header>
<div id="google_translate_element"></div>

<div class="lang-modal-overlay" id="langModal">
  <div class="lang-modal">
    <div class="lang-modal-header">
      <span class="lang-modal-title">Select Language</span>
      <button class="lang-modal-close" id="langModalClose" aria-label="Close">&#10005;</button>
    </div>
    <div class="lang-grid" id="langGrid"></div>
  </div>
</div>

<div class="wrap" id="ncRoot">
  <div class="loading">Loading storm data&hellip;</div>
</div>

<div class="pm-overlay" id="bpPlayerModal">
  <div class="pm">
    <div class="pm-head">
      <div>
        <div class="pm-name" id="bpPmName"></div>
        <div class="pm-meta" id="bpPmMeta"></div>
      </div>
      <button class="pm-close" id="bpPmClose" type="button" aria-label="Close">&#x2715;</button>
    </div>
    <div class="pm-sub" id="bpPmSub"></div>
    <div class="pm-heading" id="bpPmHeading"></div>
    <div class="pm-fights" id="bpPmFights"></div>
    <div class="pm-foot"><button class="pm-ok" id="bpPmOk" type="button">Got it</button></div>
  </div>
</div>

<script>
(function(){
  var SVG_NS = 'http://www.w3.org/2000/svg';
  function el(tag, cls, txt){ var n=document.createElement(tag); if(cls)n.className=cls; if(txt!=null)n.textContent=String(txt); return n; }
  function svgEl(name, attrs){ var n=document.createElementNS(SVG_NS,name); if(attrs)Object.keys(attrs).forEach(function(k){n.setAttribute(k,attrs[k]);}); return n; }
  function makeIcon(name, size){
    size=size||14;
    var spec=ICONS[name]; if(!spec)return null;
    var s=svgEl('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:spec.fill||'none',stroke:spec.fill==='currentColor'?'none':'currentColor','stroke-width':'2','stroke-linecap':'round','stroke-linejoin':'round'});
    spec.parts.forEach(function(p){s.appendChild(svgEl(p[0],p[1]));});
    return s;
  }
  var ICONS = {
    home:   { parts:[['path',{d:'M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V9.5z'}]] },
    search: { parts:[['circle',{cx:'11',cy:'11',r:'7'}],['line',{x1:'16.5',y1:'16.5',x2:'21',y2:'21'}]] },
    info:   { parts:[['circle',{cx:'12',cy:'12',r:'10'}],['line',{x1:'12',y1:'8',x2:'12',y2:'12'}],['circle',{cx:'12',cy:'16',r:'.5',fill:'currentColor'}]] },
    compass:{ parts:[['circle',{cx:'12',cy:'12',r:'10'}],['polygon',{points:'16 8 14 14 8 16 10 10'}]] },
    bolt:   { parts:[['polygon',{points:'13 2 3 14 12 14 11 22 21 10 12 10'}]] },
    skull:  { parts:[['path',{d:'M12 2a8 8 0 0 0-8 8v5l2 2v3h3v-3h6v3h3v-3l2-2v-5a8 8 0 0 0-8-8z'}],['circle',{cx:'9',cy:'12',r:'1.5',fill:'currentColor'}],['circle',{cx:'15',cy:'12',r:'1.5',fill:'currentColor'}]] }
  };

  // ===== LANG SWITCHER =====
  var LANGUAGES=[
    {code:'en',flag:'\u{1F1FA}\u{1F1F8}',name:'English'},
    {code:'es',flag:'\u{1F1EA}\u{1F1F8}',name:'Español'},
    {code:'fr',flag:'\u{1F1EB}\u{1F1F7}',name:'Français'},
    {code:'de',flag:'\u{1F1E9}\u{1F1EA}',name:'Deutsch'},
    {code:'pt',flag:'\u{1F1E7}\u{1F1F7}',name:'Português'},
    {code:'it',flag:'\u{1F1EE}\u{1F1F9}',name:'Italiano'},
    {code:'ru',flag:'\u{1F1F7}\u{1F1FA}',name:'Русский'},
    {code:'ja',flag:'\u{1F1EF}\u{1F1F5}',name:'日本語'},
    {code:'ko',flag:'\u{1F1F0}\u{1F1F7}',name:'한국어'},
    {code:'zh-CN',flag:'\u{1F1E8}\u{1F1F3}',name:'中文'},
    {code:'tr',flag:'\u{1F1F9}\u{1F1F7}',name:'Türkçe'},
    {code:'vi',flag:'\u{1F1FB}\u{1F1F3}',name:'Tiếng Việt'}
  ];
  function getLangData(c){var b=c.split('-')[0];return LANGUAGES.find(function(l){return l.code===c||l.code===b;})||null;}
  function detectCurrentLang(){var m=document.cookie.match(/googtrans=\/en\/([a-zA-Z-]{2,10})/);return m&&m[1]?m[1]:'en';}
  function updateLangBtn(code){var d=getLangData(code);var f=document.getElementById('langFlag');var c=document.getElementById('langCode');if(d&&f){f.textContent=d.flag;c.textContent='/'+d.code;}else if(f){f.textContent='\u{1F310}';c.textContent='/'+code;}document.querySelectorAll('.lang-option').forEach(function(o){o.classList.toggle('active',o.dataset.lang===code);});}
  function applyLangToCombo(code,delay){var a=0;var p=setInterval(function(){var c=document.querySelector('.goog-te-combo');if(c){c.value=code;c.dispatchEvent(new Event('change'));clearInterval(p);updateLangBtn(code);}if(++a>30)clearInterval(p);},delay||200);}
  var langModalEl=document.getElementById('langModal');
  function openLangModal(){langModalEl.classList.add('active');}
  function closeLangModal(){langModalEl.classList.remove('active');}
  function selectLanguage(code){if(code==='en'){sessionStorage.removeItem('pendingLang');document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax; Secure';document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.2864tw.com; SameSite=Lax; Secure';closeLangModal();location.reload();return;}sessionStorage.setItem('pendingLang',code);applyLangToCombo(code,200);closeLangModal();}
  (function(){
    var g=document.getElementById('langGrid');
    var det=detectCurrentLang();
    LANGUAGES.forEach(function(l){
      var btn=document.createElement('button');
      btn.className='lang-option'+(l.code===det?' active':'');
      btn.dataset.lang=l.code; btn.type='button';
      btn.appendChild(el('span','lang-flag',l.flag));
      btn.appendChild(el('span','lang-name',l.name));
      btn.addEventListener('click',function(){selectLanguage(l.code);});
      g.appendChild(btn);
    });
    updateLangBtn(det);
  })();
  document.getElementById('langBtn').addEventListener('click',openLangModal);
  document.getElementById('langModalClose').addEventListener('click',closeLangModal);
  langModalEl.addEventListener('click',function(e){if(e.target===langModalEl)closeLangModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&langModalEl.classList.contains('active')){closeLangModal();e.stopPropagation();}});
  setTimeout(function(){if(!window._gtLoaded){var b=document.getElementById('langBtn');if(b){b.style.opacity='0.5';b.title='Translation unavailable';}}},15000);
  window.googleTranslateElementInit=function(){
    window._gtLoaded=true;
    new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:false},'google_translate_element');
    var p=sessionStorage.getItem('pendingLang');
    if(p){sessionStorage.removeItem('pendingLang');applyLangToCombo(p,250);}
    else{var lo=localStorage.getItem('langOverride');if(lo&&lo!=='en')applyLangToCombo(lo,250);var d=detectCurrentLang();if(d!=='en')updateLangBtn(d);}
  };
  document.getElementById('homeBtn').appendChild(makeIcon('home', 15));

  // ===== UTILS =====
  function fmtNum(n){
    n = +n || 0;
    if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
    if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(0) + 'K';
    return String(n);
  }

  // Mascot per lane index — cycle through stocked caveman art
  var MASCOTS = [
    'caveman-primal-battle.webp',
    'caveman-primal-attack-mode.webp',
    'caveman-primal-rocksmash.png',
    'caveman-primal-roar.png',
    'caveman-primal-attack-mode2.png'
  ];
  function mascotForLane(idx){
    var rel = MASCOTS[idx % MASCOTS.length];
    return '../assets/caveman/' + rel;
  }

  // ===== STATE =====
  var _data = null;
  var _laneByPlayer = {};   // name → laneIdx (0-4) from merit/kartz/formations
  var _activeLaneFilter = 'all'; // 'all' or laneIdx

  // ===== DATA LOAD =====
  var DATA_URL = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
    ? '../data/storm-duel.json?_t=' + Date.now()
    : 'https://raw.githubusercontent.com/texnottexas/landing-page/main/data/storm-duel.json?_t=' + Date.now();

  fetch(DATA_URL, { cache: 'no-store' })
    .then(function(r){ if(!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data){ _data = data; buildPlayerLaneIndex(data); render(data); })
    .catch(function(err){ showError(err.message); });

  function showError(msg){
    var root = document.getElementById('ncRoot');
    while (root.firstChild) root.removeChild(root.firstChild);
    root.appendChild(el('div','error','Could not load storm data: ' + msg));
  }

  // Build name → laneIdx map from all known appearances in merit / kartz / formations.
  // Logic: every name we see in lane N gets pinned to N. First match wins (merit takes
  // priority over kartz over formations because that ordering matches the iteration).
  function buildPlayerLaneIndex(data){
    _laneByPlayer = {};
    (data.ally.warzones || []).forEach(function(z, laneIdx){
      function add(nm){
        if (!nm) return;
        if (_laneByPlayer[nm] === undefined) _laneByPlayer[nm] = laneIdx;
      }
      ((z.individual_merit || {}).top || []).forEach(function(p){ add(p.username); });
      ((z.kartz_individual || {}).top || []).forEach(function(p){ add(p.username); });
      var fm = z.formations || {};
      ['Army','Navy','AirForce'].forEach(function(u){
        (fm[u] || []).forEach(function(m){ add(m.username); });
      });
    });
  }

  // ===== RENDER =====
  function render(data){
    var root = document.getElementById('ncRoot');
    while (root.firstChild) root.removeChild(root.firstChild);

    var round = (data.metadata || {}).round || '?';
    document.getElementById('hdrSub').textContent = ' · R' + round;

    buildHero(round, data, root);
    buildSearch(root);
    buildRules(root);
    buildLaneFilter(data, root);

    var fronts = el('div', 'nc-fronts');
    fronts.id = 'fronts';
    root.appendChild(fronts);
    renderFronts(data);

    buildFoot(root);
  }

  function buildHero(round, data, root){
    var hero = el('div','nc-hero');
    var textWrap = el('div','nc-hero-text');
    textWrap.appendChild(el('div','nc-pill','Storm Duel · Round ' + round));
    var h1 = el('h1');
    h1.appendChild(document.createTextNode('Pick lane. '));
    h1.appendChild(el('span','em','Smash lane.'));
    textWrap.appendChild(h1);
    var sub = el('div','nc-sub');
    sub.appendChild(el('b',null,'5 lanes.'));
    sub.appendChild(document.createTextNode(' Find name. Pick lane. Kill captain. Steal storm score. Win.'));
    textWrap.appendChild(sub);
    var fightBegin = (data.metadata && data.metadata.schedule && data.metadata.schedule.fightBeginTime) || 0;
    var fightEnd   = (data.metadata && data.metadata.schedule && data.metadata.schedule.fightEndTime) || 0;
    if (fightBegin || fightEnd){
      textWrap.appendChild(buildCountdown(fightBegin, fightEnd));
    }
    hero.appendChild(textWrap);
    var mascot = el('div','nc-hero-mascot');
    var img = el('img');
    img.setAttribute('src','../assets/caveman/caveman-primal-stoic.png');
    img.setAttribute('alt','');
    img.setAttribute('aria-hidden','true');
    img.setAttribute('loading','eager');
    mascot.appendChild(img);
    hero.appendChild(mascot);
    root.appendChild(hero);
  }

  function buildCountdown(startTs, endTs){
    var wrap = el('div','nc-countdown');
    var lbl = el('span','nc-cd-label','');
    wrap.appendChild(lbl);
    var v = el('span',null,'');
    wrap.appendChild(v);
    function tick(){
      var nowSec = Math.floor(Date.now() / 1000);
      var target = (nowSec < startTs) ? startTs : endTs;
      if (!target){ v.textContent = ''; return; }
      lbl.textContent = (nowSec < startTs) ? 'Fight starts in' : 'Fight ends in';
      var d = target - nowSec;
      if (d <= 0){
        if (target === startTs){ v.textContent = 'NOW — GO!'; v.style.color = 'var(--red)'; }
        else { v.textContent = 'Fight is over'; v.style.color = 'var(--muted)'; }
        return;
      }
      var days = Math.floor(d/86400); d -= days*86400;
      var hrs  = Math.floor(d/3600);  d -= hrs*3600;
      var mins = Math.floor(d/60);
      var secs = d - mins*60;
      var parts = [];
      if (days) parts.push(days + 'd');
      parts.push(String(hrs).padStart(2,'0') + 'h');
      parts.push(String(mins).padStart(2,'0') + 'm');
      if (!days) parts.push(String(secs).padStart(2,'0') + 's');
      v.textContent = parts.join(' ');
    }
    tick();
    setInterval(tick, 1000);
    return wrap;
  }

  function buildSearch(root){
    var host = el('div','bp-search-wrap');
    var input = document.createElement('input');
    input.id = 'bpSearchInput';
    input.className = 'bp-search-input notranslate';
    input.type = 'text';
    input.setAttribute('autocomplete','off');
    input.setAttribute('autocapitalize','off');
    input.setAttribute('autocorrect','off');
    input.setAttribute('spellcheck','false');
    input.placeholder = 'FIND NAME. PICK LANE.';
    host.appendChild(input);
    var ic = el('span','bp-search-icon');
    ic.id = 'bpSearchIcon';
    ic.appendChild(makeIcon('search',18));
    host.appendChild(ic);
    var res = el('div','bp-search-results');
    res.id = 'bpSearchResults';
    host.appendChild(res);
    root.appendChild(host);
    wirePlayerSearch();
  }

  function buildRules(root){
    var box = el('div','nc-rules');
    var title = el('div','nc-rules-title');
    title.appendChild(makeIcon('info',14));
    title.appendChild(el('span',null,'How win storm (1-hour fight)'));
    box.appendChild(title);
    var grid = el('div','nc-rules-grid');
    var rules = [
      ['Pick lane',     null,    'Your lane. Stay your lane.'],
      ['Take L3 buffs', '0:00',  'Combat L3 = storm score. Take fast.'],
      ['Kill captain',  '15:00', 'Top enemy merit. Smash hard.'],
      ['Hold and farm', '40:00', 'Don’t lose buffs. Push kartz.']
    ];
    rules.forEach(function(r){
      var d = el('div','nc-rule');
      d.appendChild(el('b',null,r[0]));
      if (r[1]){
        d.appendChild(document.createTextNode(' '));
        d.appendChild(el('span','nc-rule-when','@ ' + r[1]));
      }
      d.appendChild(el('br'));
      d.appendChild(document.createTextNode(r[2]));
      grid.appendChild(d);
    });
    box.appendChild(grid);
    root.appendChild(box);
  }

  function buildLaneFilter(data, root){
    var wrap = el('div','lane-filter');
    wrap.appendChild(el('span','lane-filter-lbl','Lane:'));
    var allBtn = document.createElement('button');
    allBtn.type = 'button';
    allBtn.className = 'lane-pill all active';
    allBtn.dataset.lane = 'all';
    allBtn.appendChild(el('span',null,'All 5'));
    wrap.appendChild(allBtn);
    (data.ally.warzones || []).forEach(function(z, idx){
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'lane-pill';
      btn.dataset.lane = String(idx);
      var sq = z.squad || {};
      if (sq.leader_avatar){
        var img = el('img');
        img.setAttribute('src', sq.leader_avatar);
        img.setAttribute('alt','');
        img.setAttribute('loading','lazy');
        img.addEventListener('error', function(){ this.style.display='none'; });
        btn.appendChild(img);
      }
      btn.appendChild(el('span','lane-sid','S' + z.sid));
      btn.appendChild(el('span',null, sq.leader || ''));
      wrap.appendChild(btn);
    });
    root.appendChild(wrap);
    wrap.addEventListener('click', function(ev){
      var b = ev.target.closest('.lane-pill'); if (!b) return;
      setLaneFilter(b.dataset.lane);
    });
  }

  function setLaneFilter(key){
    _activeLaneFilter = key;
    document.querySelectorAll('.lane-pill').forEach(function(p){
      p.classList.toggle('active', p.dataset.lane === key);
    });
    document.querySelectorAll('.nc-front').forEach(function(card){
      var idx = card.dataset.lane;
      if (key === 'all'){ card.classList.remove('hidden'); card.classList.remove('dim'); }
      else { card.classList.toggle('hidden', idx !== key); }
    });
  }

  // Names of S2864 players known to be deployed on each lane, for the
  // anchor chips at the bottom of each lane card. We lean on the player-data
  // roster fetched lazily; until it lands we still draw chips for any name
  // we picked up from merit / kartz / formations so the cards are never blank.
  function laneAnchors(data, laneIdx){
    var z = data.ally.warzones[laneIdx];
    if (!z) return [];
    var byName = {};
    function bump(p, src){
      var nm = p.username || p.name;
      if (!nm) return;
      if (!byName[nm]){
        byName[nm] = { name: nm, power: p.power || 0, merit: p.merit || 0, src: src };
      } else {
        if (p.merit && p.merit > (byName[nm].merit || 0)) byName[nm].merit = p.merit;
        if (p.power && p.power > (byName[nm].power || 0)) byName[nm].power = p.power;
      }
    }
    ((z.individual_merit || {}).top || []).forEach(function(p){ bump(p,'merit'); });
    ((z.kartz_individual || {}).top || []).forEach(function(p){ bump(p,'kartz'); });
    var fm = z.formations || {};
    ['Army','Navy','AirForce'].forEach(function(u){
      (fm[u] || []).forEach(function(m){ bump(m,'formation'); });
    });
    var list = Object.keys(byName).map(function(k){ return byName[k]; });
    // Sort: merit desc, then power desc
    list.sort(function(a,b){ return (b.merit||0) - (a.merit||0) || (b.power||0) - (a.power||0); });
    return list;
  }

  // Annotate anchor list with alliance once player-data lands.
  function decorateAnchorsWithAlliance(list){
    if (!_players) return list;
    var byName = {};
    _players.forEach(function(p){ byName[p.name] = p; });
    list.forEach(function(a){
      var pd = byName[a.name];
      if (pd){ a.alliance = pd.alliance || ''; a.profession = pd.profession || ''; }
    });
    return list;
  }

  function renderFronts(data){
    var host = document.getElementById('fronts');
    if (!host) return;
    while (host.firstChild) host.removeChild(host.firstChild);

    var allyLanes = data.ally.warzones || [];
    var oppLanes  = data.opp.warzones  || [];

    allyLanes.forEach(function(allyZ, laneIdx){
      var oppZ = oppLanes[laneIdx] || {};
      var card = el('div','nc-front lane-' + laneIdx);
      card.dataset.lane = String(laneIdx);

      // Head
      var head = el('div','nc-front-head');
      var titleWrap = el('div','nc-front-title');
      var iconWrap = el('span','nc-front-icon');
      var allySq = allyZ.squad || {};
      if (allySq.leader_avatar){
        var img = el('img');
        img.setAttribute('src', allySq.leader_avatar);
        img.setAttribute('alt','');
        img.setAttribute('loading','lazy');
        img.addEventListener('error', function(){ this.style.display='none'; });
        iconWrap.appendChild(img);
      }
      titleWrap.appendChild(iconWrap);
      var nameBlock = el('div',null,'');
      nameBlock.appendChild(el('div','nc-front-name','S' + allyZ.sid + ' × S' + (oppZ.sid || '?')));
      var oppSq = oppZ.squad || {};
      var subTxt = (allySq.leader || '') + ' vs ' + (oppSq.leader || '?');
      nameBlock.appendChild(el('div','nc-front-sub', subTxt));
      titleWrap.appendChild(nameBlock);
      head.appendChild(titleWrap);
      head.appendChild(el('span','nc-front-pri p' + (laneIdx + 1),'Lane ' + (laneIdx + 1)));
      card.appendChild(head);

      // Big stat: combat L3 wastelands held on this lane (storm-score buffs)
      var cb = allyZ.combat_buffs_L3 || {};
      var byCat = cb.byCat || {};
      var combatCount = byCat.combat || 0;
      var econCount   = byCat.economy || 0;
      var utilCount   = byCat.utility || 0;
      var specCount   = byCat.special || 0;

      var bigRow = el('div','nc-bigline');
      bigRow.appendChild(el('span','nc-bigline-num', String(combatCount)));
      bigRow.appendChild(el('span','nc-bigline-lab','L3 combat = storm score'));
      var pw = el('span','nc-bigline-pw', fmtNum((allyZ.fame || {}).event_fame || 0) + ' fame');
      bigRow.appendChild(pw);
      card.appendChild(bigRow);

      // Smash line — opp leader / sid
      var smash = el('div','nc-front-line');
      smash.appendChild(el('b',null,'Smash:'));
      smash.appendChild(document.createTextNode(' S' + (oppZ.sid || '?') + ' — ' + (oppSq.leader || '?')
        + ' (rank #' + (((oppZ.fame || {}).rank) || '?') + ', '
        + fmtNum((oppZ.fame || {}).event_fame || 0) + ' fame)'));
      card.appendChild(smash);

      // Plan line — wasteland breakdown
      var bits = [];
      if (combatCount) bits.push(combatCount + ' combat');
      if (econCount)   bits.push(econCount + ' econ');
      if (utilCount)   bits.push(utilCount + ' utility');
      if (specCount)   bits.push(specCount + ' special');
      if (bits.length){
        var plan = el('div','nc-front-line');
        plan.appendChild(el('b',null,'Plan:'));
        plan.appendChild(document.createTextNode(' Hold ' + bits.join(' / ') + ' L3 wastelands. Combat = points.'));
        card.appendChild(plan);
      }

      // Captain row — top enemy merit player on this lane
      var topOpp = ((oppZ.individual_merit || {}).top || [])[0];
      if (topOpp){
        var cap = el('div','nc-captain');
        if (topOpp.avatar_url){
          var aImg = el('img');
          aImg.setAttribute('src', topOpp.avatar_url);
          aImg.setAttribute('alt','');
          aImg.setAttribute('loading','lazy');
          aImg.addEventListener('error', function(){ this.style.display='none'; });
          cap.appendChild(aImg);
        }
        var capText = el('div','cap-text');
        capText.appendChild(el('div','cap-name','Captain: ' + (topOpp.username || '?')));
        var capMeta = el('div','cap-meta');
        capMeta.appendChild(document.createTextNode('Top merit · '));
        capMeta.appendChild(el('b',null, fmtNum(topOpp.merit || 0) + ' merit'));
        capText.appendChild(capMeta);
        cap.appendChild(capText);
        card.appendChild(cap);
      }

      // Anchor list — names of allies on this lane
      var anchors = decorateAnchorsWithAlliance(laneAnchors(data, laneIdx));
      if (anchors.length){
        var lbl = el('div','nc-names-lab','Allies on this lane');
        card.appendChild(lbl);
        var aBox = el('div','nc-anchors');
        anchors.slice(0,6).forEach(function(a){
          var alli = (a.alliance || '').replace('*','').replace('+','');
          var chip = el('span','nc-anchor' + (alli ? ' alli-'+alli : ''));
          chip.appendChild(el('span',null, a.name));
          if (a.power)      chip.appendChild(el('span','nc-anchor-pw', fmtNum(a.power)));
          else if (a.merit) chip.appendChild(el('span','nc-anchor-pw', fmtNum(a.merit) + 'm'));
          aBox.appendChild(chip);
        });
        card.appendChild(aBox);
        if (anchors.length > 6){
          var btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'nc-roster-toggle';
          var lbl2 = el('span',null,'See all ' + anchors.length + ' names');
          btn.appendChild(lbl2);
          var caret = svgEl('svg',{width:12,height:12,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','stroke-width':'3','stroke-linecap':'round','stroke-linejoin':'round'});
          caret.appendChild(svgEl('polyline',{points:'6 9 12 15 18 9'}));
          btn.appendChild(caret);
          var roster = el('div','nc-roster');
          anchors.slice().sort(function(a,b){
            if ((a.alliance||'') !== (b.alliance||'')) return (a.alliance||'').localeCompare(b.alliance||'');
            return (b.power||0) - (a.power||0);
          }).forEach(function(p){
            var line = el('span','nc-roster-name');
            if (p.alliance) line.appendChild(el('span','nc-roster-tag', p.alliance));
            line.appendChild(document.createTextNode(p.name + ' '));
            if (p.power) line.appendChild(el('span','nc-roster-pw', fmtNum(p.power)));
            roster.appendChild(line);
          });
          btn.addEventListener('click', function(){
            var on = roster.classList.toggle('open');
            lbl2.textContent = on ? 'Hide names' : 'See all ' + anchors.length + ' names';
            caret.style.transform = on ? 'rotate(180deg)' : '';
            caret.style.transition = 'transform .15s';
          });
          card.appendChild(btn);
          card.appendChild(roster);
        }
      }

      // Caveman mascot
      var mascot = el('div','nc-front-mascot');
      var mImg = el('img');
      mImg.setAttribute('src', mascotForLane(laneIdx));
      mImg.setAttribute('alt','');
      mImg.setAttribute('aria-hidden','true');
      mImg.setAttribute('loading','lazy');
      mascot.appendChild(mImg);
      card.appendChild(mascot);

      host.appendChild(card);
    });
  }

  function buildFoot(root){
    var f = el('div','nc-foot');
    f.appendChild(document.createTextNode('Names = plan. Lead can move you. Full storm tactics: '));
    var a = el('a',null,'Storm Duel');
    a.setAttribute('href','storm-duel.html');
    f.appendChild(a);
    f.appendChild(document.createTextNode(' . Wasteland plan = '));
    var b = el('a',null,'Battle Plan');
    b.setAttribute('href','battle-plan.html');
    f.appendChild(b);
    f.appendChild(document.createTextNode('.'));
    root.appendChild(f);
    var fk = el('div','fkb');
    var fka = document.createElement('a');
    fka.textContent = 'Brought to you by supporters of the fk boats movement';
    fka.href = 'https://github.com/texnottexas/landing-page';
    fka.target = '_blank'; fka.rel='noopener';
    fk.appendChild(fka);
    root.appendChild(fk);
  }

  // ===== PLAYER SEARCH =====
  var _players = null, _playersLoading = false;
  var _bpFocusedIdx = -1;
  var _bpMatches = [];
  function bpLoadPlayers(cb){
    if (_players){ cb(_players); return; }
    if (_playersLoading) return;
    _playersLoading = true;
    var url = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? '../player-data.json?_t=' + Date.now()
      : 'https://raw.githubusercontent.com/texnottexas/landing-page/main/player-data.json?_t=' + Date.now();
    fetch(url, { cache: 'no-store' })
      .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function(arr){
        _players = Array.isArray(arr) ? arr : [];
        _playersLoading = false;
        // Re-render fronts now that we can attach alliance tags
        if (_data) renderFronts(_data);
        cb(_players);
      })
      .catch(function(){ _playersLoading = false; cb([]); });
  }

  function bpProfCode(p){
    var s = (p && p.profession || '').toLowerCase();
    if (s.indexOf('combat') >= 0 || s === 'ce') return 'ce';
    if (s.indexOf('mechanical') >= 0 || s === 'mm') return 'mm';
    return '';
  }

  function bpSearchPlayers(q, limit){
    if (!_players) return [];
    var qn = q.toLowerCase().trim();
    if (!qn) return [];
    var starts=[], contains=[];
    for (var i=0; i<_players.length; i++){
      var p = _players[i];
      var nm = (p.name || '').toLowerCase();
      if (!nm) continue;
      if (nm === qn) starts.unshift(p);
      else if (nm.indexOf(qn) === 0) starts.push(p);
      else if (nm.indexOf(qn) > 0) contains.push(p);
      if (starts.length >= limit) break;
    }
    return starts.concat(contains).slice(0, limit);
  }

  function bpRenderResults(){
    var box = document.getElementById('bpSearchResults');
    if (!box) return;
    while (box.firstChild) box.removeChild(box.firstChild);
    if (!_bpMatches.length){ box.classList.remove('active'); return; }
    _bpMatches.forEach(function(p, i){
      var row = el('div','bp-sr' + (i === _bpFocusedIdx ? ' focused' : ''));
      row.appendChild(el('span','bp-sr-name', p.name || '?'));
      if (p.alliance) row.appendChild(el('span','bp-sr-alli', p.alliance));
      var laneIdx = _laneByPlayer[p.name];
      if (laneIdx !== undefined && _data){
        var z = _data.ally.warzones[laneIdx];
        if (z) row.appendChild(el('span','bp-sr-lane','S' + z.sid));
      }
      row.addEventListener('mousedown', function(ev){ ev.preventDefault(); bpSelectPlayer(p); });
      box.appendChild(row);
    });
    box.classList.add('active');
  }

  function bpResolveLane(p){
    if (!_data) return 0;
    var idx = _laneByPlayer[p.name];
    if (idx !== undefined) return idx;
    // Default to S2864 lane (the one whose sid matches 2864)
    var lanes = _data.ally.warzones || [];
    for (var i = 0; i < lanes.length; i++){
      if (lanes[i].sid === 2864) return i;
    }
    return 0;
  }

  function bpOpenModal(p){
    if (!_data) return;
    var laneIdx = bpResolveLane(p);
    var allyZ = _data.ally.warzones[laneIdx];
    var oppZ  = _data.opp.warzones[laneIdx] || {};

    document.getElementById('bpPmName').textContent = p.name || '?';
    var meta = document.getElementById('bpPmMeta');
    while (meta.firstChild) meta.removeChild(meta.firstChild);
    if (p.alliance) meta.appendChild(el('span','pm-alli', p.alliance));
    var pc = bpProfCode(p);
    if (pc === 'ce') meta.appendChild(el('span','pm-prof ce','Combat Elite'));
    else if (pc === 'mm') meta.appendChild(el('span','pm-prof mm','Mechanical Master'));
    if (allyZ) meta.appendChild(el('span','pm-lane','Lane S' + allyZ.sid));

    var sub = document.getElementById('bpPmSub');
    var oppSq = oppZ.squad || {};
    var oppLeader = oppSq.leader || 'them';
    var oppSid = oppZ.sid || '?';
    var name = p.name || '';
    var verdict = (allyZ && (allyZ.fame || {}).rank && (oppZ.fame || {}).rank)
      ? ( (allyZ.fame.rank < oppZ.fame.rank) ? 'You are ahead. Keep pressure.' : 'They are ahead. Pile on.' )
      : '';
    sub.textContent = name + ' — lane S' + (allyZ ? allyZ.sid : '?') + ' vs S' + oppSid + ' (' + oppLeader + '). ' + verdict;

    var heading = document.getElementById('bpPmHeading');
    while (heading.firstChild) heading.removeChild(heading.firstChild);
    heading.appendChild(makeIcon('compass',16));
    heading.appendChild(document.createTextNode(' Smash list (top 3 enemy captains)'));

    var fights = document.getElementById('bpPmFights');
    while (fights.firstChild) fights.removeChild(fights.firstChild);
    var topOpps = ((oppZ.individual_merit || {}).top || []).slice(0, 3);
    if (!topOpps.length){
      fights.appendChild(el('div','pm-empty','Nothing scouted yet on this lane.'));
    } else {
      topOpps.forEach(function(o, i){
        var row = el('div','pm-fight');
        row.appendChild(el('span','pm-rank','#' + (i+1)));
        var buff = el('div','pm-buff');
        buff.appendChild(el('div','pm-buff-name', o.username || '?'));
        var bm = el('div','pm-buff-meta');
        bm.appendChild(document.createTextNode(fmtNum(o.merit || 0) + ' merit'));
        if (o.rank) bm.appendChild(document.createTextNode(' · game rank #' + o.rank));
        buff.appendChild(bm);
        row.appendChild(buff);
        fights.appendChild(row);
      });
    }
    document.getElementById('bpPlayerModal').classList.add('active');

    // Also filter the page to this player's lane for context
    setLaneFilter(String(laneIdx));
  }

  function bpCloseModal(){ document.getElementById('bpPlayerModal').classList.remove('active'); }
  function bpSelectPlayer(p){
    var input = document.getElementById('bpSearchInput');
    if (input) input.value = p.name || '';
    var box = document.getElementById('bpSearchResults');
    if (box) box.classList.remove('active');
    _bpFocusedIdx = -1;
    bpOpenModal(p);
  }

  function bpDoSearch(){
    var input = document.getElementById('bpSearchInput');
    var box = document.getElementById('bpSearchResults');
    var q = input.value || '';
    _bpFocusedIdx = -1;
    if (!q.trim()){ _bpMatches = []; bpRenderResults(); return; }
    if (!_players){
      bpLoadPlayers(function(){ _bpMatches = bpSearchPlayers(q, 6); bpRenderResults(); });
      return;
    }
    _bpMatches = bpSearchPlayers(q, 6);
    if (!_bpMatches.length){
      while (box.firstChild) box.removeChild(box.firstChild);
      box.appendChild(el('div','bp-search-empty','No player matches that name.'));
      box.classList.add('active');
      return;
    }
    bpRenderResults();
  }

  function wirePlayerSearch(){
    var input = document.getElementById('bpSearchInput');
    var box = document.getElementById('bpSearchResults');
    if (!input) return;
    input.addEventListener('focus', function(){ bpLoadPlayers(function(){}); });
    input.addEventListener('input', bpDoSearch);
    input.addEventListener('keydown', function(ev){
      if (ev.key === 'Escape'){ box.classList.remove('active'); input.blur(); return; }
      if (!_bpMatches.length) return;
      if (ev.key === 'ArrowDown'){ ev.preventDefault(); _bpFocusedIdx = Math.min(_bpMatches.length - 1, _bpFocusedIdx + 1); bpRenderResults(); }
      else if (ev.key === 'ArrowUp'){ ev.preventDefault(); _bpFocusedIdx = Math.max(0, _bpFocusedIdx - 1); bpRenderResults(); }
      else if (ev.key === 'Enter'){ ev.preventDefault(); var pick = _bpMatches[_bpFocusedIdx >= 0 ? _bpFocusedIdx : 0]; if (pick) bpSelectPlayer(pick); }
    });
    document.addEventListener('click', function(ev){
      if (!input.contains(ev.target) && !box.contains(ev.target)) box.classList.remove('active');
    });
  }

  // Modal close wires (DOM is static)
  document.getElementById('bpPmClose').addEventListener('click', bpCloseModal);
  document.getElementById('bpPmOk').addEventListener('click', bpCloseModal);
  document.getElementById('bpPlayerModal').addEventListener('click', function(ev){
    if (ev.target === document.getElementById('bpPlayerModal')) bpCloseModal();
  });
  document.addEventListener('keydown', function(ev){
    if (ev.key === 'Escape' && document.getElementById('bpPlayerModal').classList.contains('active')){
      bpCloseModal(); ev.stopPropagation();
    }
  });
})();
</script>
