<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com https://www.clarity.ms https://*.clarity.ms https://c.bing.com; style-src 'self' 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; connect-src 'self' https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com https://raw.githubusercontent.com https://*.clarity.ms https://c.bing.com; img-src 'self' https: data: https://*.clarity.ms https://c.bing.com; frame-ancestors 'none'; frame-src https://translate.google.com;">
<title>Storm Battle Plan &middot; S2864</title>
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --card:#1c2128; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#79c0ff;
  --red:#f85149; --green:#3fb950; --yellow:#d29922; --navy:#388bfd; --purple:#a371f7; --pink:#f778ba;
  --home:#3fb950; --away:#f85149;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:100;padding-top:calc(.65rem + env(safe-area-inset-top,0px));}
.hdr-left{display:flex;align-items:center;gap:.5rem;min-width:0;flex:1;}
.hdr-title{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-title .dim{color:var(--muted);font-weight:400;margin-left:.3rem;}
.home-btn,.lang-btn,.full-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .55rem;font-size:.78rem;text-decoration:none;transition:border-color .15s,color .15s;cursor:pointer;font-family:inherit;gap:.3rem;}
.home-btn:hover,.lang-btn:hover,.full-btn:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}
.full-btn{font-weight:700;}
.lang-btn #langCode{font-size:.7rem;color:var(--muted);}
.notranslate{unicode-bidi:isolate;}
#google_translate_element{position:absolute;left:-9999px;opacity:0;pointer-events:none;}

.wrap{max-width:1100px;margin:0 auto;padding:1rem;}
@media (min-width:640px){.wrap{padding:1.25rem;}}

/* Hero */
.sb-hero{background:linear-gradient(135deg,rgba(248,81,73,.14),rgba(210,153,34,.10),rgba(121,192,255,.10));border:1px solid var(--border);border-radius:18px;padding:1.4rem;margin-bottom:1.2rem;position:relative;overflow:hidden;display:flex;align-items:flex-start;gap:1rem;}
.sb-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(248,81,73,.18),transparent 70%);pointer-events:none;}
.sb-hero-text{flex:1;min-width:0;}
.sb-hero h1{font-size:1.7rem;font-weight:900;letter-spacing:-.02em;line-height:1.1;margin-bottom:.5rem;display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;}
.sb-hero h1 .em{color:var(--red);text-shadow:0 0 18px rgba(248,81,73,.45);font-style:italic;}
.sb-hero .sb-sub{font-size:.95rem;color:var(--text);font-weight:500;line-height:1.45;}
.sb-hero .sb-sub b{color:var(--yellow);font-weight:800;}
.sb-pill{display:inline-flex;align-items:center;gap:.35rem;background:rgba(248,81,73,.16);border:1px solid rgba(248,81,73,.4);color:var(--red);font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:.25rem .6rem;border-radius:999px;margin-bottom:.55rem;}
.sb-countdown{display:inline-flex;align-items:center;gap:.4rem;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.85rem;font-weight:700;padding:.3rem .65rem;border-radius:10px;margin-top:.7rem;font-family:'SF Mono',Consolas,monospace;}
.sb-countdown .sb-cd-label{color:var(--muted);font-weight:500;font-family:inherit;}
.sb-hero-mascot{flex-shrink:0;width:130px;align-self:stretch;display:flex;align-items:flex-end;justify-content:flex-end;pointer-events:none;}
.sb-hero-mascot img{width:130px;height:auto;filter:drop-shadow(0 6px 14px rgba(0,0,0,.55));max-height:180px;object-fit:contain;}
@media (max-width:560px){.sb-hero h1{font-size:1.3rem;}.sb-hero .sb-sub{font-size:.85rem;}.sb-hero-mascot{width:80px;}.sb-hero-mascot img{width:80px;max-height:120px;}}
@media (max-width:380px){.sb-hero-mascot{display:none;}}

/* Rules / two-map explainer */
.sb-rules{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.9rem 1rem;margin-bottom:1.2rem;}
.sb-rules-title{font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;display:flex;align-items:center;gap:.4rem;}
.sb-rules-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:.55rem .9rem;font-size:.82rem;line-height:1.45;}
.sb-rules-grid b.h{color:var(--home);font-weight:800;}
.sb-rules-grid b.a{color:var(--away);font-weight:800;}
.sb-rules-grid b.y{color:var(--yellow);font-weight:800;}
.sb-rules-grid .sb-rule{padding:.2rem 0;}
.sb-rule-when{font-size:.7rem;color:var(--accent);font-weight:700;font-family:'SF Mono',Consolas,monospace;}

/* Lane filter pills */
.lane-filter{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center;}
.lane-filter-lbl{font-size:.7rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin-right:.25rem;}
.lane-pill{display:inline-flex;align-items:center;gap:.4rem;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:.78rem;font-weight:700;padding:.35rem .65rem;border-radius:999px;cursor:pointer;font-family:inherit;transition:border-color .12s,background .12s,color .12s;}
.lane-pill:hover{border-color:var(--accent);}
.lane-pill.active{background:rgba(121,192,255,.12);border-color:var(--accent);color:var(--accent);}
.lane-pill.all.active{background:rgba(163,113,247,.12);border-color:var(--purple);color:var(--purple);}
.lane-pill img{width:18px;height:18px;border-radius:50%;object-fit:cover;background:var(--surface);border:1px solid var(--border);}
.lane-pill .lane-sid{font-family:'SF Mono',Consolas,monospace;color:var(--muted);font-size:.7rem;}
.lane-pill.active .lane-sid{color:var(--accent);}
.lane-pill .lane-vs{color:var(--muted);font-weight:500;font-size:.7rem;}

/* Lane card */
.lanes{display:flex;flex-direction:column;gap:1rem;}
.lane{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1rem 1.05rem 1.1rem;position:relative;overflow:hidden;}
.lane::before{content:'';position:absolute;left:0;top:0;bottom:0;width:6px;}
.lane.lane-0::before{background:linear-gradient(180deg,#f85149,#d29922);}
.lane.lane-1::before{background:linear-gradient(180deg,#a371f7,#79c0ff);}
.lane.lane-2::before{background:linear-gradient(180deg,#79c0ff,#3fb950);}
.lane.lane-3::before{background:linear-gradient(180deg,#3fb950,#79c0ff);}
.lane.lane-4::before{background:linear-gradient(180deg,#d29922,#f85149);}
.lane.hidden{display:none;}

.lane-head{display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:.85rem;flex-wrap:wrap;}
.lane-title{display:flex;align-items:center;gap:.7rem;flex:1;min-width:0;}
.lane-icons{display:flex;align-items:center;gap:.35rem;}
.lane-icon{width:44px;height:44px;border-radius:12px;background:var(--surface);border:1px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.lane-icon img{width:100%;height:100%;object-fit:cover;}
.lane-vs-sep{font-size:.85rem;font-weight:800;color:var(--muted);}
.lane-name{font-size:1.15rem;font-weight:900;line-height:1.15;letter-spacing:-.01em;}
.lane.lane-0 .lane-name{color:#ff7b73;}
.lane.lane-1 .lane-name{color:#c39bff;}
.lane.lane-2 .lane-name{color:#79c0ff;}
.lane.lane-3 .lane-name{color:#3fb950;}
.lane.lane-4 .lane-name{color:#d29922;}
.lane-sub{font-size:.78rem;color:var(--muted);font-weight:600;margin-top:.1rem;}
.lane-prio{font-size:.65rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:.2rem .55rem;border-radius:999px;flex-shrink:0;}
.lane-prio.p1{background:rgba(248,81,73,.18);color:var(--red);border:1px solid rgba(248,81,73,.4);}
.lane-prio.p2{background:rgba(163,113,247,.18);color:#a371f7;border:1px solid rgba(163,113,247,.4);}
.lane-prio.p3{background:rgba(121,192,255,.18);color:var(--accent);border:1px solid rgba(121,192,255,.4);}
.lane-prio.p4{background:rgba(63,185,80,.16);color:var(--green);border:1px solid rgba(63,185,80,.4);}
.lane-prio.p5{background:rgba(210,153,34,.14);color:var(--yellow);border:1px solid rgba(210,153,34,.4);}

/* Two-map split */
.map-split{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;}
@media (max-width:680px){.map-split{grid-template-columns:1fr;}}
.map{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:.85rem .9rem;position:relative;}
.map.home{border-left:4px solid var(--home);}
.map.away{border-left:4px solid var(--away);}
.map-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.55rem;}
.map-role{display:inline-flex;align-items:center;gap:.35rem;font-size:.62rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:.18rem .5rem;border-radius:999px;}
.map.home .map-role{background:rgba(63,185,80,.16);color:var(--home);border:1px solid rgba(63,185,80,.4);}
.map.away .map-role{background:rgba(248,81,73,.16);color:var(--away);border:1px solid rgba(248,81,73,.4);}
.map-srv{display:flex;align-items:center;gap:.4rem;font-weight:800;}
.map-srv .map-sid{font-family:'SF Mono',Consolas,monospace;font-size:.85rem;}
.map.home .map-sid{color:var(--home);}
.map.away .map-sid{color:var(--away);}
.map-leader{font-size:.72rem;color:var(--muted);font-weight:600;}
.map-big{display:flex;align-items:baseline;gap:.5rem;margin:.4rem 0 .35rem;}
.map-big-num{font-size:1.9rem;font-weight:900;line-height:1;letter-spacing:-.02em;font-family:'SF Mono',Consolas,monospace;}
.map.home .map-big-num{color:var(--home);}
.map.away .map-big-num{color:var(--away);}
.map-big-lab{font-size:.82rem;font-weight:700;color:var(--text);}
.map-objective{font-size:.78rem;line-height:1.45;color:var(--text);margin-bottom:.4rem;}
.map-objective b{color:var(--yellow);font-weight:800;}
.map-mix{font-size:.7rem;color:var(--muted);font-weight:600;margin-bottom:.55rem;display:flex;gap:.45rem;flex-wrap:wrap;}
.map-mix .mb{padding:.08rem .35rem;border:1px solid var(--border);border-radius:5px;background:var(--card);}

/* Captain row */
.captain{display:flex;align-items:center;gap:.5rem;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.45rem .55rem;margin-bottom:.55rem;}
.captain img{width:34px;height:34px;border-radius:50%;object-fit:cover;background:var(--surface);border:1px solid var(--border);flex-shrink:0;}
.captain .cap-text{flex:1;min-width:0;}
.captain .cap-name{font-size:.82rem;font-weight:800;line-height:1.15;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.captain .cap-meta{font-size:.7rem;color:var(--muted);font-weight:600;}
.captain .cap-meta b{color:var(--away);font-weight:800;}
.map.home .captain{background:rgba(248,81,73,.05);border-color:rgba(248,81,73,.25);}
.map.away .captain{background:rgba(63,185,80,.05);border-color:rgba(63,185,80,.25);}
.map.away .captain .cap-meta b{color:var(--home);}

/* Ally chips */
.map-allies-lab{font-size:.66rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.3rem;}
.allies-chips{display:flex;flex-wrap:wrap;gap:.25rem;}
.chip{font-size:.72rem;font-weight:700;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:.15rem .45rem;display:inline-flex;align-items:center;gap:.3rem;}
.chip.alli-DOG{border-color:rgba(63,185,80,.4);}
.chip.alli-MSS{border-color:rgba(56,139,253,.4);}
.chip.alli-Cat{border-color:rgba(210,153,34,.35);}
.chip .chip-pw{color:var(--muted);font-weight:600;font-size:.65rem;}
.chip.lonely{background:rgba(210,153,34,.08);border-color:rgba(210,153,34,.4);}
.map-empty{font-size:.72rem;color:var(--muted);font-style:italic;padding:.35rem 0;}
.see-more{margin-top:.4rem;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:.25rem .55rem;font-size:.7rem;font-weight:700;color:var(--muted);cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;gap:.25rem;}
.see-more:hover{border-color:var(--accent);color:var(--accent);}
.see-more.open svg{transform:rotate(180deg);}
.see-more svg{transition:transform .15s;}

/* Lane foot */
.lane-mascot-row{margin-top:.8rem;display:flex;align-items:center;justify-content:space-between;gap:.6rem;padding-top:.7rem;border-top:1px dashed var(--border);}
.lane-mascot-line{font-size:.78rem;color:var(--muted);line-height:1.4;flex:1;min-width:0;}
.lane-mascot-line b{color:var(--text);font-weight:700;}
.lane-mascot-line b.ahead{color:var(--home);}
.lane-mascot-line b.behind{color:var(--away);}
.lane-mascot{flex-shrink:0;width:74px;height:74px;display:flex;align-items:center;justify-content:center;pointer-events:none;}
.lane-mascot img{width:74px;height:auto;max-height:90px;object-fit:contain;filter:drop-shadow(0 4px 10px rgba(0,0,0,.45));opacity:.92;}
@media (max-width:560px){.lane-mascot{width:54px;height:54px;}.lane-mascot img{width:54px;max-height:64px;}}

/* Loading / error */
.loading,.error{padding:2rem 1rem;text-align:center;color:var(--muted);font-size:.9rem;}
.error{color:var(--red);}

/* Player search */
.sb-search-wrap{position:relative;margin-bottom:1.2rem;}
.sb-search-input{width:100%;background:var(--card);border:2px solid var(--border);border-radius:14px;color:var(--text);font-size:1rem;font-weight:600;padding:.85rem 1rem .85rem 2.6rem;font-family:inherit;transition:border-color .15s ease,background .15s ease;}
.sb-search-input:focus{outline:none;border-color:var(--accent);background:var(--surface);}
.sb-search-input::placeholder{color:var(--muted);font-weight:500;}
.sb-search-icon{position:absolute;left:.95rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.sb-search-input:focus + .sb-search-icon{color:var(--accent);}
.sb-search-results{position:absolute;top:calc(100% + .25rem);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:none;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.sb-search-results.active{display:block;}
.sb-sr{display:flex;align-items:center;gap:.6rem;padding:.65rem .85rem;cursor:pointer;font-size:.85rem;border-bottom:1px solid var(--border);transition:background .12s ease;}
.sb-sr:last-child{border-bottom:none;}
.sb-sr:hover,.sb-sr.focused{background:rgba(121,192,255,.1);}
.sb-sr .sb-sr-name{font-weight:700;color:var(--text);flex:1;min-width:0;}
.sb-sr .sb-sr-alli{font-size:.7rem;font-family:'SF Mono',Consolas,monospace;color:var(--muted);background:var(--surface);border:1px solid var(--border);padding:.05rem .35rem;border-radius:5px;}
.sb-sr .sb-sr-lane{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);}
.sb-sr .sb-sr-map.home{color:var(--home);}
.sb-sr .sb-sr-map.away{color:var(--away);}
.sb-search-empty{padding:.85rem;text-align:center;font-size:.8rem;color:var(--muted);}

/* Player modal */
.pm-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);align-items:center;justify-content:center;padding:1rem;}
.pm-overlay.active{display:flex;}
.pm{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:1.4rem;max-width:500px;width:100%;max-height:88vh;overflow-y:auto;}
.pm-head{display:flex;align-items:flex-start;justify-content:space-between;gap:.6rem;margin-bottom:.4rem;}
.pm-name{font-size:1.4rem;font-weight:900;line-height:1.1;}
.pm-meta{display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;margin-bottom:.85rem;font-size:.75rem;color:var(--muted);}
.pm-meta .pm-alli{font-family:'SF Mono',Consolas,monospace;background:var(--surface);border:1px solid var(--border);padding:.1rem .45rem;border-radius:5px;font-weight:700;color:var(--text);}
.pm-meta .pm-prof{font-weight:800;text-transform:uppercase;letter-spacing:.04em;}
.pm-meta .pm-prof.ce{color:var(--red);}
.pm-meta .pm-prof.mm{color:var(--accent);}
.pm-meta .pm-lane{font-weight:800;color:var(--text);}
.pm-meta .pm-mapbadge{font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:.1rem .4rem;border-radius:5px;font-size:.62rem;}
.pm-meta .pm-mapbadge.home{background:rgba(63,185,80,.16);color:var(--home);border:1px solid rgba(63,185,80,.4);}
.pm-meta .pm-mapbadge.away{background:rgba(248,81,73,.16);color:var(--away);border:1px solid rgba(248,81,73,.4);}
.pm-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.4rem;padding:.15rem .45rem;border-radius:6px;line-height:1;}
.pm-close:hover{background:var(--surface);color:var(--text);}
.pm-sub{font-size:.85rem;color:var(--text);background:rgba(248,81,73,.06);border:1px solid rgba(248,81,73,.3);border-radius:10px;padding:.7rem .9rem;margin-bottom:.95rem;line-height:1.45;}
.pm-sub b{color:var(--red);}
.pm-orders{display:flex;flex-direction:column;gap:.5rem;}
.pm-order{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:.7rem .9rem;display:flex;align-items:flex-start;gap:.55rem;}
.pm-order.home{border-left:4px solid var(--home);}
.pm-order.away{border-left:4px solid var(--away);}
.pm-order .o-tag{font-size:.62rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:.15rem .45rem;border-radius:999px;flex-shrink:0;}
.pm-order.home .o-tag{background:rgba(63,185,80,.16);color:var(--home);border:1px solid rgba(63,185,80,.4);}
.pm-order.away .o-tag{background:rgba(248,81,73,.16);color:var(--away);border:1px solid rgba(248,81,73,.4);}
.pm-order .o-body{flex:1;min-width:0;font-size:.82rem;line-height:1.45;}
.pm-order .o-body b{color:var(--text);font-weight:800;}
.pm-foot{margin-top:1.1rem;display:flex;justify-content:flex-end;}
.pm-ok{background:linear-gradient(135deg,var(--green),var(--accent));border:none;color:#0d1117;font-weight:800;font-size:.9rem;padding:.55rem 1.2rem;border-radius:10px;cursor:pointer;font-family:inherit;letter-spacing:.02em;}
.pm-ok:hover{filter:brightness(1.1);}

/* Lang */
.lang-modal-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:1rem;}
.lang-modal-overlay.active{display:flex;}
.lang-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;max-width:380px;width:100%;}
.lang-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}
.lang-modal-title{font-size:1rem;font-weight:700;}
.lang-modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:.15rem .4rem;border-radius:6px;}
.lang-modal-close:hover{background:var(--surface);color:var(--text);}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem;}
.lang-option{display:flex;align-items:center;gap:.45rem;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem .6rem;border-radius:8px;font-size:.78rem;cursor:pointer;font-family:inherit;}
.lang-option:hover{border-color:var(--accent);}
.lang-option.active{background:rgba(121,192,255,.1);border-color:var(--accent);color:var(--accent);}
.lang-flag{font-size:1rem;}

.fkb{margin-top:1.2rem;text-align:center;font-size:.65rem;color:var(--muted);opacity:.6;}
.fkb a{color:inherit;text-decoration:none;}
.fkb a:hover{color:var(--accent);}
.sb-foot{margin-top:1rem;padding:.85rem 1rem;background:var(--surface);border:1px dashed var(--border);border-radius:12px;color:var(--muted);font-size:.78rem;line-height:1.55;}
.sb-foot b{color:var(--text);}
.sb-foot a{color:var(--accent);}
</style>

<script>
(function(){
  var SVG_NS='http://www.w3.org/2000/svg';
  function el(tag,cls,txt){var n=document.createElement(tag);if(cls)n.className=cls;if(txt!=null)n.textContent=String(txt);return n;}
  function txt(s){return document.createTextNode(String(s));}
  function svgEl(name,attrs){var n=document.createElementNS(SVG_NS,name);if(attrs)Object.keys(attrs).forEach(function(k){n.setAttribute(k,attrs[k]);});return n;}
  function makeIcon(name,size){
    size=size||14;
    var spec=ICONS[name];if(!spec)return null;
    var s=svgEl('svg',{width:size,height:size,viewBox:'0 0 24 24',fill:spec.fill||'none',stroke:spec.fill==='currentColor'?'none':'currentColor','stroke-width':'2','stroke-linecap':'round','stroke-linejoin':'round'});
    spec.parts.forEach(function(p){s.appendChild(svgEl(p[0],p[1]));});
    return s;
  }
  var ICONS={
    home:{parts:[['path',{d:'M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V9.5z'}]]},
    search:{parts:[['circle',{cx:'11',cy:'11',r:'7'}],['line',{x1:'16.5',y1:'16.5',x2:'21',y2:'21'}]]},
    info:{parts:[['circle',{cx:'12',cy:'12',r:'10'}],['line',{x1:'12',y1:'8',x2:'12',y2:'12'}],['circle',{cx:'12',cy:'16',r:'.5',fill:'currentColor'}]]}
  };

  // Lang switcher
  var LANGUAGES=[
    {code:'en',flag:'\u{1F1FA}\u{1F1F8}',name:'English'},
    {code:'es',flag:'\u{1F1EA}\u{1F1F8}',name:'Español'},
    {code:'fr',flag:'\u{1F1EB}\u{1F1F7}',name:'Français'},
    {code:'de',flag:'\u{1F1E9}\u{1F1EA}',name:'Deutsch'},
    {code:'pt',flag:'\u{1F1E7}\u{1F1F7}',name:'Português'},
    {code:'it',flag:'\u{1F1EE}\u{1F1F9}',name:'Italiano'},
    {code:'ru',flag:'\u{1F1F7}\u{1F1FA}',name:'Русский'},
    {code:'ja',flag:'\u{1F1EF}\u{1F1F5}',name:'日本語'},
    {code:'ko',flag:'\u{1F1F0}\u{1F1F7}',name:'한국어'},
    {code:'zh-CN',flag:'\u{1F1E8}\u{1F1F3}',name:'中文'},
    {code:'tr',flag:'\u{1F1F9}\u{1F1F7}',name:'Türkçe'},
    {code:'vi',flag:'\u{1F1FB}\u{1F1F3}',name:'Tiếng Việt'}
  ];
  function getLangData(c){var b=c.split('-')[0];return LANGUAGES.find(function(l){return l.code===c||l.code===b;})||null;}
  function detectCurrentLang(){var m=document.cookie.match(/googtrans=\/en\/([a-zA-Z-]{2,10})/);return m&&m[1]?m[1]:'en';}
  function updateLangBtn(code){var d=getLangData(code);var f=document.getElementById('langFlag');var c=document.getElementById('langCode');if(d&&f){f.textContent=d.flag;c.textContent='/'+d.code;}else if(f){f.textContent='\u{1F310}';c.textContent='/'+code;}document.querySelectorAll('.lang-option').forEach(function(o){o.classList.toggle('active',o.dataset.lang===code);});}
  function applyLangToCombo(code,delay){var a=0;var p=setInterval(function(){var c=document.querySelector('.goog-te-combo');if(c){c.value=code;c.dispatchEvent(new Event('change'));clearInterval(p);updateLangBtn(code);}if(++a>30)clearInterval(p);},delay||200);}
  var langModalEl=document.getElementById('langModal');
  function openLangModal(){langModalEl.classList.add('active');}
  function closeLangModal(){langModalEl.classList.remove('active');}
  function selectLanguage(code){if(code==='en'){sessionStorage.removeItem('pendingLang');document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax; Secure';document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.2864tw.com; SameSite=Lax; Secure';closeLangModal();location.reload();return;}sessionStorage.setItem('pendingLang',code);applyLangToCombo(code,200);closeLangModal();}
  (function(){
    var g=document.getElementById('langGrid');
    var det=detectCurrentLang();
    LANGUAGES.forEach(function(l){
      var btn=document.createElement('button');
      btn.className='lang-option'+(l.code===det?' active':'');
      btn.dataset.lang=l.code;btn.type='button';
      btn.appendChild(el('span','lang-flag',l.flag));
      btn.appendChild(el('span','lang-name',l.name));
      btn.addEventListener('click',function(){selectLanguage(l.code);});
      g.appendChild(btn);
    });
    updateLangBtn(det);
  })();
  document.getElementById('langBtn').addEventListener('click',openLangModal);
  document.getElementById('langModalClose').addEventListener('click',closeLangModal);
  langModalEl.addEventListener('click',function(e){if(e.target===langModalEl)closeLangModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&langModalEl.classList.contains('active')){closeLangModal();e.stopPropagation();}});
  setTimeout(function(){if(!window._gtLoaded){var b=document.getElementById('langBtn');if(b){b.style.opacity='0.5';b.title='Translation unavailable';}}},15000);
  window.googleTranslateElementInit=function(){
    window._gtLoaded=true;
    new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:false},'google_translate_element');
    var p=sessionStorage.getItem('pendingLang');
    if(p){sessionStorage.removeItem('pendingLang');applyLangToCombo(p,250);}
    else{var lo=localStorage.getItem('langOverride');if(lo&&lo!=='en')applyLangToCombo(lo,250);var d=detectCurrentLang();if(d!=='en')updateLangBtn(d);}
  };
  document.getElementById('homeBtn').appendChild(makeIcon('home',15));

  function fmtNum(n){n=+n||0;if(n>=1e9)return (n/1e9).toFixed(2)+'B';if(n>=1e6)return (n/1e6).toFixed(1)+'M';if(n>=1e3)return (n/1e3).toFixed(0)+'K';return String(n);}

  var MASCOTS=[
    'caveman-primal-battle.webp',
    'caveman-primal-attack-mode.webp',
    'caveman-primal-rocksmash.png',
    'caveman-primal-roar.png',
    'caveman-primal-attack-mode2.png'
  ];
  function mascotForLane(idx){return '../assets/caveman/'+MASCOTS[idx%MASCOTS.length];}

  // State
  var _data=null;
  var _players=null,_playersLoading=false;
  var _activeFilter='all';
  var _playerLocation={};  // name → {laneIdx, side:'ally'|'opp'}
  var HOME_SID=2864;

  var DATA_URL=(location.hostname==='localhost'||location.hostname==='127.0.0.1')
    ? '../data/storm-duel.json?_t='+Date.now()
    : 'https://raw.githubusercontent.com/texnottexas/landing-page/main/data/storm-duel.json?_t='+Date.now();

  fetch(DATA_URL,{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(d){_data=d;buildPlayerLocations(d);render(d);})
    .catch(function(err){showError(err.message);});

  function showError(msg){
    var root=document.getElementById('sbRoot');
    while(root.firstChild)root.removeChild(root.firstChild);
    root.appendChild(el('div','error','Could not load storm data: '+msg));
  }

  // Each player is logged at the FIRST warzone we see them in, capturing
  // lane index (0-4) and which side of the lane (ally home vs opp home).
  // Lets the search bar show "Lane 1 · Away" for someone like Sparky who
  // crossed onto the opp home map.
  function buildPlayerLocations(data){
    _playerLocation={};
    function visit(z, laneIdx, side){
      function add(nm){if(!nm)return;if(_playerLocation[nm]===undefined) _playerLocation[nm]={laneIdx:laneIdx,side:side};}
      ((z.individual_merit||{}).top||[]).forEach(function(p){add(p.username);});
      ((z.kartz_individual||{}).top||[]).forEach(function(p){add(p.username);});
      var fm=z.formations||{};
      ['Army','Navy','AirForce'].forEach(function(u){(fm[u]||[]).forEach(function(m){add(m.username);});});
    }
    (data.ally.warzones||[]).forEach(function(z,i){visit(z,i,'ally');});
    (data.opp.warzones||[]).forEach(function(z,i){visit(z,i,'opp');});
  }

  function render(data){
    var root=document.getElementById('sbRoot');
    while(root.firstChild)root.removeChild(root.firstChild);
    var round=(data.metadata||{}).round||'?';
    document.getElementById('hdrSub').textContent=' · R'+round;
    buildHero(round,data,root);
    buildSearch(root);
    buildRules(root);
    buildLaneFilter(data,root);
    var host=el('div','lanes'); host.id='lanes'; root.appendChild(host);
    renderLanes(data);
    buildFoot(root);
  }

  function buildHero(round, data, root){
    var hero=el('div','sb-hero');
    var textWrap=el('div','sb-hero-text');
    textWrap.appendChild(el('div','sb-pill','Storm Duel · Round '+round));
    var h1=el('h1');
    h1.appendChild(txt('Two maps. '));
    h1.appendChild(el('span','em','One lane.'));
    textWrap.appendChild(h1);
    var sub=el('div','sb-sub');
    sub.appendChild(el('b',null,'5 lanes. 10 maps.'));
    sub.appendChild(txt(' Each lane has a home fight and an away fight. Find name. Pick lane. Pick side. Smash.'));
    textWrap.appendChild(sub);
    var fightBegin=(data.metadata&&data.metadata.schedule&&data.metadata.schedule.fightBeginTime)||0;
    var fightEnd  =(data.metadata&&data.metadata.schedule&&data.metadata.schedule.fightEndTime  )||0;
    if(fightBegin||fightEnd) textWrap.appendChild(buildCountdown(fightBegin,fightEnd));
    hero.appendChild(textWrap);
    var mascot=el('div','sb-hero-mascot');
    var img=el('img');
    img.setAttribute('src','../assets/caveman/caveman-primal-stoic.png');
    img.setAttribute('alt','');img.setAttribute('aria-hidden','true');img.setAttribute('loading','eager');
    mascot.appendChild(img);
    hero.appendChild(mascot);
    root.appendChild(hero);
  }

  function buildCountdown(startTs, endTs){
    var wrap=el('div','sb-countdown');
    var lbl=el('span','sb-cd-label',''); wrap.appendChild(lbl);
    var v=el('span',null,''); wrap.appendChild(v);
    function tick(){
      var nowSec=Math.floor(Date.now()/1000);
      var target=(nowSec<startTs)?startTs:endTs;
      if(!target){v.textContent='';return;}
      lbl.textContent=(nowSec<startTs)?'Fight starts in':'Fight ends in';
      var d=target-nowSec;
      if(d<=0){
        if(target===startTs){v.textContent='NOW — GO!';v.style.color='var(--red)';}
        else{v.textContent='Fight is over';v.style.color='var(--muted)';}
        return;
      }
      var days=Math.floor(d/86400);d-=days*86400;
      var hrs =Math.floor(d/3600); d-=hrs *3600;
      var mins=Math.floor(d/60);
      var secs=d-mins*60;
      var parts=[];
      if(days)parts.push(days+'d');
      parts.push(String(hrs).padStart(2,'0')+'h');
      parts.push(String(mins).padStart(2,'0')+'m');
      if(!days)parts.push(String(secs).padStart(2,'0')+'s');
      v.textContent=parts.join(' ');
    }
    tick(); setInterval(tick,1000); return wrap;
  }

  function buildSearch(root){
    var host=el('div','sb-search-wrap');
    var input=document.createElement('input');
    input.id='sbSearchInput'; input.className='sb-search-input notranslate'; input.type='text';
    input.setAttribute('autocomplete','off');input.setAttribute('autocapitalize','off');
    input.setAttribute('autocorrect','off');input.setAttribute('spellcheck','false');
    input.placeholder='FIND NAME. PICK LANE.';
    host.appendChild(input);
    var ic=el('span','sb-search-icon'); ic.appendChild(makeIcon('search',18)); host.appendChild(ic);
    var res=el('div','sb-search-results'); res.id='sbSearchResults'; host.appendChild(res);
    root.appendChild(host);
    wireSearch();
  }

  function buildRules(root){
    var box=el('div','sb-rules');
    var title=el('div','sb-rules-title');
    title.appendChild(makeIcon('info',14));
    title.appendChild(el('span',null,'How storm duel works — two maps per lane'));
    box.appendChild(title);
    var grid=el('div','sb-rules-grid');
    var rules=[
      {head:'Home map (defense)', cls:'h', body:'Each ally server gets a map on their territory. We hold buffs there. Opp invaders try to take them.'},
      {head:'Away map (offense)', cls:'a', body:'Each opp server has their own map. We invade. Stealing their buffs is how we win storm score.'},
      {head:'Storm score = L3 buffs', cls:'y', body:'Combat L3 wastelands you hold across both maps drive storm score. Combat beats everything else.'},
      {head:'You pick one side', cls:null, body:'Most players defend their home server map. A few cross over to invade the away map. Lead decides splits.'}
    ];
    rules.forEach(function(r){
      var d=el('div','sb-rule');
      d.appendChild(el('b', r.cls?r.cls:null, r.head));
      d.appendChild(el('br'));
      d.appendChild(txt(r.body));
      grid.appendChild(d);
    });
    box.appendChild(grid);
    root.appendChild(box);
  }

  function buildLaneFilter(data, root){
    var wrap=el('div','lane-filter');
    wrap.appendChild(el('span','lane-filter-lbl','Lane:'));
    var allBtn=document.createElement('button');
    allBtn.type='button'; allBtn.className='lane-pill all active'; allBtn.dataset.lane='all';
    allBtn.appendChild(el('span',null,'All 5'));
    wrap.appendChild(allBtn);
    (data.ally.warzones||[]).forEach(function(z, idx){
      var oppZ=(data.opp.warzones||[])[idx]||{};
      var btn=document.createElement('button');
      btn.type='button'; btn.className='lane-pill'; btn.dataset.lane=String(idx);
      var sq=z.squad||{};
      if(sq.leader_avatar){
        var img=el('img');
        img.setAttribute('src',sq.leader_avatar);img.setAttribute('alt','');img.setAttribute('loading','lazy');
        img.addEventListener('error',function(){this.style.display='none';});
        btn.appendChild(img);
      }
      btn.appendChild(el('span','lane-sid','S'+z.sid));
      btn.appendChild(el('span','lane-vs','vs S'+(oppZ.sid||'?')));
      wrap.appendChild(btn);
    });
    root.appendChild(wrap);
    wrap.addEventListener('click', function(ev){
      var b=ev.target.closest('.lane-pill'); if(!b)return;
      setLaneFilter(b.dataset.lane);
    });
  }

  function setLaneFilter(key){
    _activeFilter=key;
    document.querySelectorAll('.lane-pill').forEach(function(p){p.classList.toggle('active', p.dataset.lane===key);});
    document.querySelectorAll('.lane').forEach(function(card){
      var idx=card.dataset.lane;
      if(key==='all') card.classList.remove('hidden');
      else card.classList.toggle('hidden', idx!==key);
    });
  }

  // Build the player list for one specific map (one warzone).
  function mapAllies(z){
    var byName={};
    function bump(p, src){
      var nm=p.username||p.name; if(!nm)return;
      var rec=byName[nm];
      if(!rec) byName[nm]={name:nm,power:p.power||0,merit:p.merit||0,src:src};
      else {
        if(p.merit&&p.merit>(rec.merit||0)) rec.merit=p.merit;
        if(p.power&&p.power>(rec.power||0)) rec.power=p.power;
      }
    }
    ((z.individual_merit||{}).top||[]).forEach(function(p){bump(p,'merit');});
    ((z.kartz_individual||{}).top||[]).forEach(function(p){bump(p,'kartz');});
    var fm=z.formations||{};
    ['Army','Navy','AirForce'].forEach(function(u){(fm[u]||[]).forEach(function(m){bump(m,'formation');});});
    var list=Object.keys(byName).map(function(k){return byName[k];});
    list.sort(function(a,b){return (b.merit||0)-(a.merit||0) || (b.power||0)-(a.power||0);});
    if(_players){
      var pdByName={}; _players.forEach(function(p){pdByName[p.name]=p;});
      list.forEach(function(a){var pd=pdByName[a.name]; if(pd){a.alliance=pd.alliance||'';a.profession=pd.profession||'';}});
    }
    return list;
  }

  // Keep only S2864 players in a map's roster — those are "our team" on
  // that side of the lane (defenders on home, invaders on away).
  function ourTeamOnly(list){
    if(!_players) return list;
    var s2864=Object.create(null);
    _players.forEach(function(p){s2864[p.name]=1;});
    return list.filter(function(a){return s2864[a.name]===1;});
  }

  function renderLanes(data){
    var host=document.getElementById('lanes'); if(!host) return;
    while(host.firstChild) host.removeChild(host.firstChild);
    var allyL=data.ally.warzones||[];
    var oppL =data.opp.warzones||[];
    allyL.forEach(function(allyZ, laneIdx){
      var oppZ=oppL[laneIdx]||{};
      var card=el('div','lane lane-'+laneIdx);
      card.dataset.lane=String(laneIdx);
      card.appendChild(buildLaneHead(allyZ, oppZ, laneIdx));
      var split=el('div','map-split');
      split.appendChild(buildMapPanel({side:'home',wz:allyZ,sid:allyZ.sid,leader:(allyZ.squad||{}).leader||'?',role:'Defend'}));
      split.appendChild(buildMapPanel({side:'away',wz:oppZ ,sid:oppZ.sid ,leader:(oppZ.squad ||{}).leader||'?',role:'Invade'}));
      card.appendChild(split);
      card.appendChild(buildLaneFoot(allyZ, oppZ, laneIdx));
      host.appendChild(card);
    });
  }

  function buildLaneHead(allyZ, oppZ, laneIdx){
    var head=el('div','lane-head');
    var title=el('div','lane-title');
    var icons=el('div','lane-icons');
    icons.appendChild(makeAvatarBox((allyZ.squad||{}).leader_avatar));
    icons.appendChild(el('span','lane-vs-sep','vs'));
    icons.appendChild(makeAvatarBox((oppZ.squad||{}).leader_avatar));
    title.appendChild(icons);
    var names=el('div',null,'');
    names.appendChild(el('div','lane-name','S'+allyZ.sid+' vs S'+(oppZ.sid||'?')));
    var aLeader=(allyZ.squad||{}).leader||'?';
    var oLeader=(oppZ.squad||{}).leader||'?';
    names.appendChild(el('div','lane-sub', aLeader+' commands ours · '+oLeader+' commands theirs'));
    title.appendChild(names);
    head.appendChild(title);
    head.appendChild(el('span','lane-prio p'+(laneIdx+1),'Lane '+(laneIdx+1)));
    return head;
  }

  function makeAvatarBox(url){
    var box=el('span','lane-icon');
    if(url){
      var img=el('img');
      img.setAttribute('src',url);img.setAttribute('alt','');img.setAttribute('loading','lazy');
      img.addEventListener('error',function(){this.style.display='none';});
      box.appendChild(img);
    }
    return box;
  }

  // One map panel inside a lane card. side='home' = our defensive map,
  // side='away' = the opp's map we invade.
  function buildMapPanel(cfg){
    var panel=el('div','map '+cfg.side);
    var head=el('div','map-head');
    head.appendChild(el('span','map-role '+cfg.side, cfg.role));
    var srv=el('div','map-srv');
    srv.appendChild(el('span','map-sid','S'+(cfg.sid||'?')));
    srv.appendChild(el('span','map-leader','· '+cfg.leader));
    head.appendChild(srv);
    panel.appendChild(head);

    var cb=(cfg.wz&&cfg.wz.combat_buffs_L3)||{};
    var byCat=cb.byCat||{};
    var combat=byCat.combat||0;
    var econ  =byCat.economy||0;
    var util  =byCat.utility||0;
    var spec  =byCat.special||0;

    var big=el('div','map-big');
    big.appendChild(el('span','map-big-num',String(combat)));
    big.appendChild(el('span','map-big-lab','L3 combat ('+(cfg.side==='home'?'ours, defend':'theirs, steal')+')'));
    panel.appendChild(big);

    var obj=el('div','map-objective');
    obj.appendChild(el('b',null, cfg.side==='home' ? 'Defend:' : 'Invade:'));
    obj.appendChild(txt(cfg.side==='home'
      ? ' hold our L3 buffs. Every buff lost is points to them.'
      : ' steal their L3 buffs. Every one taken is points to us.'));
    panel.appendChild(obj);

    var bits=[];
    if(econ) bits.push(['econ',econ]);
    if(util) bits.push(['util',util]);
    if(spec) bits.push(['special',spec]);
    if(bits.length){
      var mix=el('div','map-mix');
      mix.appendChild(txt('also '));
      bits.forEach(function(b){
        var m=el('span','mb', b[1]+' '+b[0]);
        mix.appendChild(m);
      });
      panel.appendChild(mix);
    }

    var topMerit=((cfg.wz&&cfg.wz.individual_merit)||{}).top||[];
    var top=topMerit[0];
    if(top){
      var cap=el('div','captain');
      if(top.avatar_url){
        var img=el('img');
        img.setAttribute('src',top.avatar_url);img.setAttribute('alt','');img.setAttribute('loading','lazy');
        img.addEventListener('error',function(){this.style.display='none';});
        cap.appendChild(img);
      }
      var ct=el('div','cap-text');
      ct.appendChild(el('div','cap-name', top.username||'?'));
      var capLabel = (cfg.side==='home') ? 'Threat on our map' : 'Top scorer on their map';
      var cm=el('div','cap-meta');
      cm.appendChild(txt(capLabel+' · '));
      cm.appendChild(el('b',null, fmtNum(top.merit||0)+' merit'));
      ct.appendChild(cm);
      cap.appendChild(ct);
      panel.appendChild(cap);
    }

    var ourTeam=ourTeamOnly(mapAllies(cfg.wz));
    panel.appendChild(buildAllyChipBox(ourTeam, cfg.side));

    return panel;
  }

  function buildAllyChipBox(list, side){
    var wrap=el('div',null,'');
    wrap.appendChild(el('div','map-allies-lab', side==='home' ? 'Our defenders' : 'Our invaders'));
    if(!list.length){
      wrap.appendChild(el('div','map-empty', side==='home' ? 'No defenders scouted yet.' : 'No one scouted across.'));
      return wrap;
    }
    var chips=el('div','allies-chips');
    list.slice(0,6).forEach(function(p){chips.appendChild(buildChip(p, side, list.length===1));});
    wrap.appendChild(chips);
    if(list.length>6){
      var btn=document.createElement('button');
      btn.type='button'; btn.className='see-more';
      var lbl=el('span',null,'See all '+list.length); btn.appendChild(lbl);
      var caret=svgEl('svg',{width:12,height:12,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','stroke-width':'3','stroke-linecap':'round','stroke-linejoin':'round'});
      caret.appendChild(svgEl('polyline',{points:'6 9 12 15 18 9'}));
      btn.appendChild(caret);
      var hidden=el('div','allies-chips'); hidden.style.display='none'; hidden.style.marginTop='.3rem';
      list.slice(6).forEach(function(p){hidden.appendChild(buildChip(p, side, false));});
      btn.addEventListener('click', function(){
        var on=(hidden.style.display==='none');
        hidden.style.display=on?'flex':'none';
        btn.classList.toggle('open', on);
        lbl.textContent= on ? 'Hide' : ('See all '+list.length);
      });
      wrap.appendChild(btn);
      wrap.appendChild(hidden);
    }
    return wrap;
  }

  function buildChip(p, side, lonely){
    var alli=(p.alliance||'').replace('*','').replace('+','');
    var c=el('span','chip'+(alli?' alli-'+alli:'')+(lonely?' lonely':''));
    c.appendChild(el('span',null,p.name));
    if(p.power)      c.appendChild(el('span','chip-pw', fmtNum(p.power)));
    else if(p.merit) c.appendChild(el('span','chip-pw', fmtNum(p.merit)+'m'));
    return c;
  }

  function buildLaneFoot(allyZ, oppZ, laneIdx){
    var row=el('div','lane-mascot-row');
    var line=el('div','lane-mascot-line');
    var allyFame=((allyZ.fame||{}).event_fame)||0;
    var oppFame =((oppZ .fame||{}).event_fame)||0;
    var aRank=(allyZ.fame||{}).rank, oRank=(oppZ.fame||{}).rank;
    var ahead = (aRank&&oRank) ? (aRank<oRank) : (allyFame>oppFame);
    if(ahead){
      line.appendChild(el('b','ahead','Pressure on.'));
      line.appendChild(txt(' We sit higher (fame '+fmtNum(allyFame)+' vs '+fmtNum(oppFame)+'). Don’t hand back the lead.'));
    } else {
      line.appendChild(el('b','behind','Behind.'));
      line.appendChild(txt(' Fame '+fmtNum(allyFame)+' vs '+fmtNum(oppFame)+'. Pile on combat L3 to climb.'));
    }
    row.appendChild(line);
    var mascot=el('div','lane-mascot');
    var img=el('img');
    img.setAttribute('src',mascotForLane(laneIdx));img.setAttribute('alt','');
    img.setAttribute('aria-hidden','true');img.setAttribute('loading','lazy');
    mascot.appendChild(img);
    row.appendChild(mascot);
    return row;
  }

  function buildFoot(root){
    var f=el('div','sb-foot');
    f.appendChild(txt('Two maps per lane. Pick your side. Full storm data: '));
    var a=el('a',null,'Storm Duel'); a.setAttribute('href','storm-duel.html'); f.appendChild(a);
    f.appendChild(txt(' . Wasteland plan = '));
    var b=el('a',null,'Battle Plan'); b.setAttribute('href','battle-plan.html'); f.appendChild(b);
    f.appendChild(txt('.'));
    root.appendChild(f);
    var fk=el('div','fkb');
    var fka=document.createElement('a');
    fka.textContent='Brought to you by supporters of the fk boats movement';
    fka.href='https://github.com/texnottexas/landing-page';
    fka.target='_blank';fka.rel='noopener';
    fk.appendChild(fka);
    root.appendChild(fk);
  }

  // ===== PLAYER SEARCH =====
  function loadPlayers(cb){
    if(_players){cb(_players);return;}
    if(_playersLoading)return;
    _playersLoading=true;
    var url=(location.hostname==='localhost'||location.hostname==='127.0.0.1')
      ? '../player-data.json?_t='+Date.now()
      : 'https://raw.githubusercontent.com/texnottexas/landing-page/main/player-data.json?_t='+Date.now();
    fetch(url,{cache:'no-store'})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(function(arr){
        _players=Array.isArray(arr)?arr:[];
        _playersLoading=false;
        if(_data) renderLanes(_data);
        cb(_players);
      })
      .catch(function(){_playersLoading=false;cb([]);});
  }

  function profCode(p){var s=(p&&p.profession||'').toLowerCase();
    if(s.indexOf('combat')>=0||s==='ce')return 'ce';
    if(s.indexOf('mechanical')>=0||s==='mm')return 'mm';
    return '';
  }

  function searchPlayers(q,limit){
    if(!_players)return [];
    var qn=q.toLowerCase().trim(); if(!qn)return [];
    var starts=[],contains=[];
    for(var i=0;i<_players.length;i++){
      var p=_players[i]; var nm=(p.name||'').toLowerCase();
      if(!nm)continue;
      if(nm===qn)starts.unshift(p);
      else if(nm.indexOf(qn)===0)starts.push(p);
      else if(nm.indexOf(qn)>0)contains.push(p);
      if(starts.length>=limit)break;
    }
    return starts.concat(contains).slice(0,limit);
  }

  var _matches=[], _focusedIdx=-1;
  function renderResults(){
    var box=document.getElementById('sbSearchResults'); if(!box)return;
    while(box.firstChild)box.removeChild(box.firstChild);
    if(!_matches.length){box.classList.remove('active');return;}
    _matches.forEach(function(p,i){
      var row=el('div','sb-sr'+(i===_focusedIdx?' focused':''));
      row.appendChild(el('span','sb-sr-name', p.name||'?'));
      if(p.alliance)row.appendChild(el('span','sb-sr-alli',p.alliance));
      var loc=_playerLocation[p.name];
      if(loc && _data){
        var lane=_data.ally.warzones[loc.laneIdx];
        if(lane){
          row.appendChild(el('span','sb-sr-lane','S'+lane.sid));
          row.appendChild(el('span','sb-sr-map '+(loc.side==='ally'?'home':'away'), loc.side==='ally'?'home':'away'));
        }
      }
      row.addEventListener('mousedown',function(ev){ev.preventDefault();selectPlayer(p);});
      box.appendChild(row);
    });
    box.classList.add('active');
  }

  function resolveLocation(p){
    if(!_data) return {laneIdx:0,side:'ally'};
    var loc=_playerLocation[p.name];
    if(loc) return loc;
    var lanes=_data.ally.warzones||[];
    for(var i=0;i<lanes.length;i++) if(lanes[i].sid===HOME_SID) return {laneIdx:i, side:'ally'};
    return {laneIdx:0,side:'ally'};
  }

  function openModal(p){
    if(!_data)return;
    var loc=resolveLocation(p);
    var allyZ=_data.ally.warzones[loc.laneIdx];
    var oppZ =_data.opp.warzones[loc.laneIdx]||{};
    var mySid = (loc.side==='ally') ? allyZ.sid : oppZ.sid;
    var role = (loc.side==='ally') ? 'home' : 'away';

    document.getElementById('pmName').textContent=p.name||'?';
    var meta=document.getElementById('pmMeta');
    while(meta.firstChild)meta.removeChild(meta.firstChild);
    if(p.alliance)meta.appendChild(el('span','pm-alli', p.alliance));
    var pc=profCode(p);
    if(pc==='ce')meta.appendChild(el('span','pm-prof ce','Combat Elite'));
    else if(pc==='mm')meta.appendChild(el('span','pm-prof mm','Mechanical Master'));
    if(allyZ) meta.appendChild(el('span','pm-lane','Lane '+(loc.laneIdx+1)+' · S'+allyZ.sid+' vs S'+(oppZ.sid||'?')));
    meta.appendChild(el('span','pm-mapbadge '+role, role==='home'?'Home map':'Away map'));

    var sub=document.getElementById('pmSub');
    while(sub.firstChild)sub.removeChild(sub.firstChild);
    if(role==='home'){
      sub.appendChild(el('b',null,'You’re on our home map (S'+mySid+').'));
      sub.appendChild(txt(' Defend our L3 combat buffs. Stop the invaders before they steal points.'));
    } else {
      sub.appendChild(el('b',null,'You crossed over to the away map (S'+mySid+').'));
      sub.appendChild(txt(' Invade. Take their L3 buffs. Every steal is points for us.'));
    }

    var orders=document.getElementById('pmOrders');
    while(orders.firstChild)orders.removeChild(orders.firstChild);

    // Home order — defend our map
    var homeOrder=el('div','pm-order home');
    homeOrder.appendChild(el('span','o-tag','Home'));
    var hb=el('div','o-body');
    var hCombat=(((allyZ.combat_buffs_L3||{}).byCat)||{}).combat||0;
    var hTop=(((allyZ.individual_merit||{}).top)||[])[0];
    hb.appendChild(el('b',null,'S'+allyZ.sid+' map:'));
    hb.appendChild(txt(' hold '+hCombat+' L3 combat buffs. '));
    if(hTop){
      hb.appendChild(txt('Threat: '));
      hb.appendChild(el('b',null, hTop.username));
      hb.appendChild(txt(' ('+fmtNum(hTop.merit||0)+' merit). '));
    }
    if(loc.side==='ally') hb.appendChild(txt('This is your post.'));
    homeOrder.appendChild(hb);
    orders.appendChild(homeOrder);

    // Away order — invade their map
    var awayOrder=el('div','pm-order away');
    awayOrder.appendChild(el('span','o-tag','Away'));
    var ab=el('div','o-body');
    var aCombat=(((oppZ.combat_buffs_L3||{}).byCat)||{}).combat||0;
    var aTop=(((oppZ.individual_merit||{}).top)||[])[0];
    ab.appendChild(el('b',null,'S'+(oppZ.sid||'?')+' map:'));
    ab.appendChild(txt(' steal from '+aCombat+' L3 combat buffs they hold. '));
    if(aTop){
      ab.appendChild(txt('Top scorer: '));
      ab.appendChild(el('b',null, aTop.username));
      ab.appendChild(txt(' ('+fmtNum(aTop.merit||0)+' merit). '));
    }
    if(loc.side==='opp') ab.appendChild(txt('This is your post.'));
    awayOrder.appendChild(ab);
    orders.appendChild(awayOrder);

    document.getElementById('playerModal').classList.add('active');
    setLaneFilter(String(loc.laneIdx));
  }

  function selectPlayer(p){
    var input=document.getElementById('sbSearchInput');
    if(input)input.value=p.name||'';
    var box=document.getElementById('sbSearchResults');
    if(box)box.classList.remove('active');
    _focusedIdx=-1;
    openModal(p);
  }

  function doSearch(){
    var input=document.getElementById('sbSearchInput');
    var box=document.getElementById('sbSearchResults');
    var q=input.value||'';
    _focusedIdx=-1;
    if(!q.trim()){_matches=[];renderResults();return;}
    if(!_players){
      loadPlayers(function(){_matches=searchPlayers(q,6);renderResults();});
      return;
    }
    _matches=searchPlayers(q,6);
    if(!_matches.length){
      while(box.firstChild)box.removeChild(box.firstChild);
      box.appendChild(el('div','sb-search-empty','No player matches that name.'));
      box.classList.add('active');
      return;
    }
    renderResults();
  }

  function wireSearch(){
    var input=document.getElementById('sbSearchInput');
    var box=document.getElementById('sbSearchResults');
    if(!input)return;
    input.addEventListener('focus', function(){loadPlayers(function(){});});
    input.addEventListener('input', doSearch);
    input.addEventListener('keydown', function(ev){
      if(ev.key==='Escape'){box.classList.remove('active');input.blur();return;}
      if(!_matches.length)return;
      if(ev.key==='ArrowDown'){ev.preventDefault();_focusedIdx=Math.min(_matches.length-1,_focusedIdx+1);renderResults();}
      else if(ev.key==='ArrowUp'){ev.preventDefault();_focusedIdx=Math.max(0,_focusedIdx-1);renderResults();}
      else if(ev.key==='Enter'){ev.preventDefault();var pick=_matches[_focusedIdx>=0?_focusedIdx:0]; if(pick)selectPlayer(pick);}
    });
    document.addEventListener('click', function(ev){
      if(!input.contains(ev.target)&&!box.contains(ev.target)) box.classList.remove('active');
    });
  }

  function closeModal(){document.getElementById('playerModal').classList.remove('active');}
  document.getElementById('pmClose').addEventListener('click', closeModal);
  document.getElementById('pmOk').addEventListener('click', closeModal);
  document.getElementById('playerModal').addEventListener('click', function(ev){
    if(ev.target===document.getElementById('playerModal')) closeModal();
  });
  document.addEventListener('keydown', function(ev){
    if(ev.key==='Escape'&&document.getElementById('playerModal').classList.contains('active')){closeModal();ev.stopPropagation();}
  });
})();
</script>
