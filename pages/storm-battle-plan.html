<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; frame-ancestors 'none';">
<title>Storm Battle Plan &middot; S2864</title>
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --card:#1c2128; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#79c0ff;
  --red:#f85149; --green:#3fb950; --yellow:#d29922;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;display:flex;flex-direction:column;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;gap:.5rem;position:sticky;top:0;z-index:100;padding-top:calc(.65rem + env(safe-area-inset-top,0px));}
.hdr-title{font-size:.88rem;font-weight:700;color:var(--text);}
.hdr-title .dim{color:var(--muted);font-weight:400;margin-left:.3rem;}
.home-btn{margin-left:auto;display:inline-flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .6rem;font-size:.78rem;transition:border-color .15s,color .15s;}
.home-btn:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}

.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.uc{max-width:560px;width:100%;text-align:center;background:linear-gradient(135deg,rgba(210,153,34,.12),rgba(248,81,73,.08));border:1px solid var(--border);border-radius:20px;padding:2.4rem 1.6rem;position:relative;overflow:hidden;}
.uc::after{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;border-radius:50%;background:radial-gradient(circle,rgba(210,153,34,.16),transparent 70%);pointer-events:none;}
.uc .icon{font-size:3.2rem;line-height:1;margin-bottom:.9rem;display:inline-block;animation:swing 2.4s ease-in-out infinite;transform-origin:50% 10%;}
@keyframes swing{0%,100%{transform:rotate(-8deg);}50%{transform:rotate(8deg);}}
.uc h1{font-size:1.65rem;font-weight:900;letter-spacing:-.02em;margin-bottom:.6rem;}
.uc h1 .em{color:var(--yellow);font-style:italic;}
.uc p{color:var(--muted);font-size:.95rem;max-width:42ch;margin:0 auto .4rem;}
.uc .badge{display:inline-block;margin-top:1.2rem;background:var(--card);border:1px solid var(--border);border-radius:999px;padding:.35rem .9rem;font-size:.72rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--yellow);}
.uc .links{margin-top:1.4rem;display:flex;gap:.6rem;justify-content:center;flex-wrap:wrap;}
.uc .links a{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.55rem .9rem;font-size:.82rem;font-weight:600;color:var(--text);}
.uc .links a:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}

footer{text-align:center;padding:1rem;color:var(--muted);font-size:.72rem;}
</style>
</head>
<body>
<header>
  <span class="hdr-title">Storm Battle Plan<span class="dim">&middot; S2864</span></span>
  <a class="home-btn" href="https://2864tw.com/index.html">&#8962; Home</a>
</header>

<main class="wrap">
  <div class="uc">
    <span class="icon">&#128296;</span>
    <h1>Under <span class="em">Construction</span></h1>
    <p>The Storm Duel battle plan is being rebuilt for this round.</p>
    <p>Check back shortly &mdash; the cavemen are sharpening their rocks.</p>
    <div class="badge">Work in progress</div>
    <div class="links">
      <a href="https://2864tw.com/storm-duel.html">Storm Duel hub</a>
      <a href="https://2864tw.com/index.html">Back to 2864tw</a>
    </div>
  </div>
</main>

<footer>Brought to you by supporters of the fk boats movement</footer>
</body>
</html>
