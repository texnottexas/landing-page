<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com https://www.clarity.ms https://*.clarity.ms https://c.bing.com; style-src 'self' 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; connect-src 'self' https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com https://raw.githubusercontent.com https://*.clarity.ms https://c.bing.com; img-src 'self' https: data: https://*.clarity.ms https://c.bing.com; frame-src https://translate.google.com;">
<title>Storm Battle Plan &middot; S2864</title>
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --card:#1c2128; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#79c0ff;
  --red:#f85149; --green:#3fb950; --yellow:#d29922; --navy:#388bfd; --purple:#a371f7; --pink:#f778ba;
  --attack:#f85149;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:100;padding-top:calc(.65rem + env(safe-area-inset-top,0px));}
.hdr-left{display:flex;align-items:center;gap:.5rem;min-width:0;flex:1;}
.hdr-title{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-title .dim{color:var(--muted);font-weight:400;margin-left:.3rem;}
.hdr-title .target{color:var(--red);font-weight:800;margin-left:.3rem;}
.home-btn,.lang-btn,.full-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .55rem;font-size:.78rem;text-decoration:none;transition:border-color .15s,color .15s;cursor:pointer;font-family:inherit;gap:.3rem;}
.home-btn:hover,.lang-btn:hover,.full-btn:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}
.full-btn{font-weight:700;}
.lang-btn #langCode{font-size:.7rem;color:var(--muted);}
.notranslate{unicode-bidi:isolate;}
#google_translate_element{position:absolute;left:-9999px;opacity:0;pointer-events:none;}

.wrap{max-width:1000px;margin:0 auto;padding:1rem;}
@media (min-width:640px){.wrap{padding:1.25rem;}}

/* Hero — target server is the only meta the page needs */
.sb-hero{background:linear-gradient(135deg,rgba(248,81,73,.18),rgba(210,153,34,.10),rgba(121,192,255,.10));border:1px solid var(--border);border-radius:18px;padding:1.4rem;margin-bottom:1.2rem;position:relative;overflow:hidden;display:flex;align-items:flex-start;gap:1rem;}
.sb-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(248,81,73,.18),transparent 70%);pointer-events:none;}
.sb-hero-text{flex:1;min-width:0;}
.sb-hero h1{font-size:1.7rem;font-weight:900;letter-spacing:-.02em;line-height:1.1;margin-bottom:.5rem;display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;}
.sb-hero h1 .em{color:var(--red);text-shadow:0 0 18px rgba(248,81,73,.45);font-style:italic;}
.sb-hero .sb-sub{font-size:.95rem;color:var(--text);font-weight:500;line-height:1.45;}
.sb-hero .sb-sub b{color:var(--yellow);font-weight:800;}
.sb-pill{display:inline-flex;align-items:center;gap:.35rem;background:rgba(248,81,73,.16);border:1px solid rgba(248,81,73,.4);color:var(--red);font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:.25rem .6rem;border-radius:999px;margin-bottom:.55rem;}
.sb-target-row{display:inline-flex;align-items:center;gap:.55rem;background:var(--surface);border:1px solid rgba(248,81,73,.4);border-radius:12px;padding:.45rem .8rem;margin-top:.4rem;font-family:'SF Mono',Consolas,monospace;font-weight:800;font-size:1rem;letter-spacing:.02em;}
.sb-target-row .lbl{color:var(--muted);font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:inherit;}
.sb-target-row .sid{color:var(--red);font-size:1.05rem;}
.sb-target-row .lead{color:var(--text);font-weight:700;font-family:inherit;font-size:.85rem;}
.sb-countdown{display:inline-flex;align-items:center;gap:.4rem;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.85rem;font-weight:700;padding:.3rem .65rem;border-radius:10px;margin-top:.7rem;font-family:'SF Mono',Consolas,monospace;}
.sb-countdown .sb-cd-label{color:var(--muted);font-weight:500;font-family:inherit;}
.sb-hero-mascot{flex-shrink:0;width:130px;align-self:stretch;display:flex;align-items:flex-end;justify-content:flex-end;pointer-events:none;}
.sb-hero-mascot img{width:130px;height:auto;filter:drop-shadow(0 6px 14px rgba(0,0,0,.55));max-height:180px;object-fit:contain;}
@media (max-width:560px){.sb-hero h1{font-size:1.3rem;}.sb-hero .sb-sub{font-size:.85rem;}.sb-hero-mascot{width:80px;}.sb-hero-mascot img{width:80px;max-height:120px;}}
@media (max-width:380px){.sb-hero-mascot{display:none;}}

/* The one and only caveman instruction card */
@keyframes sb-pulse{0%,100%{box-shadow:0 0 0 0 rgba(248,81,73,.45),0 0 38px rgba(248,81,73,.15);}50%{box-shadow:0 0 0 8px rgba(248,81,73,0),0 0 60px rgba(248,81,73,.35);}}
.sb-order{background:linear-gradient(135deg,rgba(248,81,73,.22),rgba(248,81,73,.10) 60%,var(--card));border:2px solid rgba(248,81,73,.6);border-radius:18px;padding:1.8rem 1.2rem;margin-bottom:1.2rem;text-align:center;animation:sb-pulse 2.4s ease-in-out infinite;position:relative;overflow:hidden;}
.sb-order::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(45deg,rgba(248,81,73,.04) 0 12px,transparent 12px 24px);pointer-events:none;}
.sb-order-pill{display:inline-flex;align-items:center;gap:.35rem;background:var(--surface);border:1px solid rgba(248,81,73,.6);color:var(--red);font-size:.66rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.28rem .7rem;border-radius:999px;margin-bottom:.85rem;position:relative;z-index:1;}
.sb-order-h{font-size:2.6rem;font-weight:900;color:var(--text);letter-spacing:-.02em;line-height:1.1;position:relative;z-index:1;text-shadow:0 0 28px rgba(248,81,73,.4);display:flex;flex-direction:column;gap:.25rem;align-items:center;}
.sb-order-h .ln{display:block;}
.sb-order-h .em{color:var(--red);font-style:italic;}
.sb-order-sub{margin-top:.65rem;font-size:.95rem;color:var(--text);font-weight:600;line-height:1.5;max-width:560px;margin-left:auto;margin-right:auto;position:relative;z-index:1;}
.sb-order-sub b{color:var(--yellow);font-weight:800;}
@media (max-width:560px){.sb-order-h{font-size:1.9rem;}.sb-order-sub{font-size:.85rem;}}
@media (max-width:380px){.sb-order-h{font-size:1.55rem;}}

/* Prep checklist — three big centered lines on the page bg, no card */
.sb-prep{padding:1.2rem .5rem 1.4rem;margin-bottom:1.2rem;display:flex;flex-direction:column;gap:1rem;align-items:center;text-align:center;}
.sb-prep-row{display:inline-flex;align-items:center;justify-content:center;gap:.8rem;font-size:2.4rem;font-weight:900;color:var(--text);letter-spacing:-.025em;line-height:1;text-shadow:0 2px 18px rgba(0,0,0,.55);}
.sb-prep-row .ic{flex-shrink:0;width:60px;height:60px;display:inline-flex;align-items:center;justify-content:center;}
.sb-prep-row.r1{color:var(--yellow);}
.sb-prep-row.r2{color:var(--accent);}
.sb-prep-row.r3{color:var(--pink);}
.sb-prep-row.r1 .ic{color:var(--yellow);filter:drop-shadow(0 0 10px rgba(210,153,34,.55));}
.sb-prep-row.r2 .ic{color:var(--accent);filter:drop-shadow(0 0 10px rgba(121,192,255,.55));}
.sb-prep-row.r3 .ic{color:var(--pink);filter:drop-shadow(0 0 10px rgba(247,120,186,.55));}
@media (max-width:560px){.sb-prep-row{font-size:1.85rem;gap:.6rem;}.sb-prep-row .ic{width:51px;height:51px;}}
@media (max-width:380px){.sb-prep-row{font-size:1.45rem;gap:.5rem;}.sb-prep-row .ic{width:43px;height:43px;}}

/* Search — shimmer border */
@keyframes sb-shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
@keyframes sb-glow{0%,100%{box-shadow:0 0 12px rgba(121,192,255,.2),0 0 24px rgba(63,185,80,.08);}50%{box-shadow:0 0 16px rgba(121,192,255,.35),0 0 32px rgba(63,185,80,.18);}}
.sb-search-wrap{position:relative;margin-bottom:1.2rem;}
.sb-search-input{width:100%;background-color:var(--card);background-image:linear-gradient(var(--card),var(--card)),linear-gradient(90deg,var(--accent) 0%,var(--green) 25%,var(--yellow) 50%,var(--red) 75%,var(--accent) 100%);background-origin:border-box;background-clip:padding-box,border-box;background-size:100% 100%,200% auto;border:2px solid transparent;border-radius:14px;color:var(--text);font-size:1rem;font-weight:600;padding:.85rem 1rem .85rem 2.6rem;font-family:inherit;animation:sb-shimmer 6s linear infinite,sb-glow 4s ease-in-out infinite;transition:background-color .15s ease;}
.sb-search-input:focus{outline:none;background-color:var(--surface);background-image:linear-gradient(var(--surface),var(--surface)),linear-gradient(90deg,var(--accent) 0%,var(--green) 50%,var(--accent) 100%);}
.sb-search-input::placeholder{color:var(--muted);font-weight:500;}
.sb-search-icon{position:absolute;left:.95rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.sb-search-input:focus + .sb-search-icon{color:var(--accent);}
.sb-search-results{position:absolute;top:calc(100% + .25rem);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:none;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.sb-search-results.active{display:block;}
.sb-sr{display:flex;align-items:center;gap:.6rem;padding:.65rem .85rem;cursor:pointer;font-size:.85rem;border-bottom:1px solid var(--border);transition:background .12s ease;}
.sb-sr:last-child{border-bottom:none;}
.sb-sr:hover,.sb-sr.focused{background:rgba(248,81,73,.08);}
.sb-sr .sb-sr-av{width:24px;height:24px;border-radius:50%;background:var(--surface);border:1px solid var(--border);object-fit:cover;flex-shrink:0;}
.sb-sr .sb-sr-name{font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-sr .sb-sr-meta{font-size:.65rem;font-family:'SF Mono',Consolas,monospace;color:var(--muted);}
.sb-search-empty{padding:.85rem;text-align:center;font-size:.8rem;color:var(--muted);}

/* Roster list — S2864 players, all on the same order */
.roster-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.55rem;flex-wrap:wrap;}
.roster-h{font-size:.78rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.roster-h .cnt{color:var(--red);font-weight:900;font-size:.95rem;font-family:'SF Mono',Consolas,monospace;}
.roster-tabs{display:inline-flex;gap:.25rem;}
.roster-tab{background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:.7rem;font-weight:800;letter-spacing:.04em;text-transform:uppercase;padding:.3rem .65rem;border-radius:999px;cursor:pointer;font-family:inherit;transition:all .15s;}
.roster-tab:hover{border-color:var(--accent);color:var(--accent);}
.roster-tab.active{background:rgba(248,81,73,.16);border-color:rgba(248,81,73,.5);color:var(--red);}
.roster-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:.55rem;}
.roster-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:.65rem .75rem;display:flex;align-items:center;gap:.65rem;position:relative;overflow:hidden;}
.roster-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);}
.roster-av{width:38px;height:38px;border-radius:50%;background:var(--surface);border:1px solid var(--border);object-fit:cover;flex-shrink:0;}
.roster-body{flex:1;min-width:0;}
.roster-name{font-weight:800;font-size:.92rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.roster-meta{font-size:.7rem;color:var(--muted);font-family:'SF Mono',Consolas,monospace;display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.15rem;}
.roster-meta .m{background:var(--surface);border:1px solid var(--border);padding:.05rem .35rem;border-radius:5px;}
.roster-order{font-size:.68rem;font-weight:800;color:var(--red);letter-spacing:.04em;text-transform:uppercase;margin-top:.25rem;font-style:italic;}

/* Lang modal */
.lang-modal-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:1rem;}
.lang-modal-overlay.active{display:flex;}
.lang-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;max-width:380px;width:100%;}
.lang-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}
.lang-modal-title{font-size:1rem;font-weight:700;}
.lang-modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:.15rem .4rem;border-radius:6px;}
.lang-modal-close:hover{background:var(--surface);color:var(--text);}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem;}
.lang-option{display:flex;align-items:center;gap:.45rem;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem .6rem;border-radius:8px;font-size:.78rem;cursor:pointer;font-family:inherit;}
.lang-option:hover{border-color:var(--accent);}
.lang-option.active{background:rgba(121,192,255,.1);border-color:var(--accent);color:var(--accent);}
.lang-flag{font-size:1rem;}

.loading,.error{padding:2rem 1rem;text-align:center;color:var(--muted);font-size:.9rem;}
.error{color:var(--red);}
.fkb{margin-top:1.2rem;text-align:center;font-size:.65rem;color:var(--muted);opacity:.6;}
.fkb a{color:inherit;text-decoration:none;}
.fkb a:hover{color:var(--accent);}
.sb-foot{margin-top:1rem;padding:.85rem 1rem;background:var(--surface);border:1px dashed var(--border);border-radius:12px;color:var(--muted);font-size:.78rem;line-height:1.55;text-align:center;}
.sb-foot b{color:var(--text);}
.sb-foot a{color:var(--accent);}
</style>

  // Pull every named S2864 player who has a march or merit entry in this matchup,
  // dedupe by uid (fall back to name) and keep the highest power + best avatar.
  function buildHomeRoster(data){
    var home=(data.ally.warzones||[]).find(function(z){return z.sid===2864;});
    if(!home) return [];
    var byKey={};
    function bump(p, march_type){
      var key = p.uid || p.username; if(!key) return;
      var rec=byKey[key];
      if(!rec){
        byKey[key]={
          uid:p.uid||null,
          name:p.username||p.name||'?',
          avatar_url:p.avatar_url||null,
          power:p.power||0,
          merit:p.merit||0,
          march_size:p.march_size||0,
          types:march_type ? [march_type] : []
        };
      } else {
        if(p.power && p.power>rec.power) rec.power=p.power;
        if(p.merit && p.merit>rec.merit) rec.merit=p.merit;
        if(!rec.avatar_url && p.avatar_url) rec.avatar_url=p.avatar_url;
        if(p.march_size && p.march_size>rec.march_size) rec.march_size=p.march_size;
        if(march_type && rec.types.indexOf(march_type)<0) rec.types.push(march_type);
      }
    }
    var fm=home.formations||{};
    ['Army','Navy','AirForce'].forEach(function(u){(fm[u]||[]).forEach(function(m){bump(m,u);});});
    ((home.individual_merit||{}).top||[]).forEach(function(p){bump(p,null);});
    ((home.kartz_individual||{}).top||[]).forEach(function(p){bump(p,null);});
    var list=Object.keys(byKey).map(function(k){return byKey[k];});
    list.sort(function(a,b){return (b.power||0)-(a.power||0) || (b.merit||0)-(a.merit||0) || a.name.localeCompare(b.name);});
    return list;
  }

    if(!oppCore && data.opp.warzones && data.opp.warzones.length) oppCore=data.opp.warzones[0];
    var oppSid = oppCore ? oppCore.sid : (meta.opp_core_sid||'?');

    var hdrSub=document.getElementById('hdrSub');

  function buildCountdown(startTs, endTs){
    var wrap=el('div','sb-countdown');
    var lbl=el('span','sb-cd-label',''); wrap.appendChild(lbl);
    var v=el('span',null,''); wrap.appendChild(v);
    function tick(){
      var nowSec=Math.floor(Date.now()/1000);
      var target=(nowSec<startTs)?startTs:endTs;
      if(!target){v.textContent='';return;}
      lbl.textContent=(nowSec<startTs)?'Fight starts in':'Fight ends in';
      var d=target-nowSec;
      if(d<=0){
        if(target===startTs){v.textContent='NOW — GO!';v.style.color='var(--red)';}
        else{v.textContent='Fight is over';v.style.color='var(--muted)';}
        return;
      }
      var days=Math.floor(d/86400);d-=days*86400;
      var hrs =Math.floor(d/3600); d-=hrs *3600;
      var mins=Math.floor(d/60);
      var secs=d-mins*60;
      var parts=[];
      if(days)parts.push(days+'d');
      parts.push(String(hrs).padStart(2,'0')+'h');
      parts.push(String(mins).padStart(2,'0')+'m');
      if(!days)parts.push(String(secs).padStart(2,'0')+'s');
      v.textContent=parts.join(' ');
    }
    tick(); setInterval(tick,1000); return wrap;
  }

  // ===== Search — only over S2864 roster =====
  function searchPlayers(q,limit){
    var qn=q.toLowerCase().trim(); if(!qn)return [];
    var starts=[],contains=[];
    for(var i=0;i<_roster.length;i++){
      var p=_roster[i]; var nm=(p.name||'').toLowerCase();
      if(!nm)continue;
      if(nm===qn) starts.unshift(p);
      else if(nm.indexOf(qn)===0) starts.push(p);
      else if(nm.indexOf(qn)>0) contains.push(p);
    }
    return starts.concat(contains).slice(0, limit);
  }

    input.addEventListener('keydown', function(ev){
      if(ev.key==='Escape'){box.classList.remove('active');input.blur();return;}
      if(!_matches.length)return;
      if(ev.key==='ArrowDown'){ev.preventDefault();_focusedIdx=Math.min(_matches.length-1,_focusedIdx+1);renderResults();}
      else if(ev.key==='ArrowUp'){ev.preventDefault();_focusedIdx=Math.max(0,_focusedIdx-1);renderResults();}
      else if(ev.key==='Enter'){ev.preventDefault();var pick=_matches[_focusedIdx>=0?_focusedIdx:0]; if(pick)selectPlayer(pick);}
    });
    document.addEventListener('click', function(ev){
      if(!input.contains(ev.target)&&!box.contains(ev.target)) box.classList.remove('active');
    });
  }
})();
</script>
