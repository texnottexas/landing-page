<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com https://www.clarity.ms https://*.clarity.ms https://c.bing.com; style-src 'self' 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; connect-src 'self' https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com https://raw.githubusercontent.com https://push-worker.27tb8s6fct.workers.dev https://*.clarity.ms https://c.bing.com; img-src 'self' https: data: https://*.clarity.ms https://c.bing.com; frame-src https://translate.google.com;">
<title>Storm Battle Plan &middot; S2864</title>
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --card:#1c2128; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#79c0ff;
  --red:#f85149; --green:#3fb950; --yellow:#d29922; --navy:#388bfd; --purple:#a371f7; --pink:#f778ba;
  --prize:#d29922; --capture:#f85149; --defend:#388bfd;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;min-height:100vh;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:100;padding-top:calc(.65rem + env(safe-area-inset-top,0px));}
.hdr-left{display:flex;align-items:center;gap:.5rem;min-width:0;flex:1;}
.hdr-title{font-size:.88rem;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-title .dim{color:var(--muted);font-weight:400;margin-left:.3rem;}
.home-btn,.lang-btn,.full-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .55rem;font-size:.78rem;text-decoration:none;transition:border-color .15s,color .15s;cursor:pointer;font-family:inherit;gap:.3rem;}
.home-btn:hover,.lang-btn:hover,.full-btn:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}
.full-btn{font-weight:700;}
.lang-btn #langCode{font-size:.7rem;color:var(--muted);}
.notranslate{unicode-bidi:isolate;}
#google_translate_element{position:absolute;left:-9999px;opacity:0;pointer-events:none;}

.wrap{max-width:1040px;margin:0 auto;padding:1rem;}
@media (min-width:640px){.wrap{padding:1.25rem;}}

/* Hero */
.sb-hero{background:linear-gradient(135deg,rgba(210,153,34,.16),rgba(248,81,73,.10),rgba(56,139,253,.10));border:1px solid var(--border);border-radius:18px;padding:1.4rem;margin-bottom:1.1rem;position:relative;overflow:hidden;display:flex;align-items:flex-start;gap:1rem;}
.sb-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(210,153,34,.18),transparent 70%);pointer-events:none;}
.sb-hero-text{flex:1;min-width:0;}
.sb-hero h1{font-size:1.7rem;font-weight:900;letter-spacing:-.02em;line-height:1.1;margin-bottom:.5rem;display:flex;align-items:center;gap:.45rem;flex-wrap:wrap;}
.sb-hero h1 .em{color:var(--prize);text-shadow:0 0 18px rgba(210,153,34,.45);font-style:italic;}
.sb-hero .sb-sub{font-size:.95rem;color:var(--text);font-weight:500;line-height:1.45;}
.sb-hero .sb-sub b{color:var(--yellow);font-weight:800;}
.sb-pill{display:inline-flex;align-items:center;gap:.35rem;background:rgba(210,153,34,.16);border:1px solid rgba(210,153,34,.4);color:var(--prize);font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:.25rem .6rem;border-radius:999px;margin-bottom:.55rem;}
.sb-countdown{display:inline-flex;align-items:center;gap:.4rem;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.9rem;font-weight:700;padding:.35rem .7rem;border-radius:10px;margin-top:.7rem;font-family:'SF Mono',Consolas,monospace;}
.sb-countdown .sb-cd-label{color:var(--muted);font-weight:500;font-family:inherit;}
.sb-hero-mascot{flex-shrink:0;width:120px;align-self:stretch;display:flex;align-items:flex-end;justify-content:flex-end;pointer-events:none;}
.sb-hero-mascot img{width:120px;height:auto;filter:drop-shadow(0 6px 14px rgba(0,0,0,.55));max-height:170px;object-fit:contain;}
@media (max-width:560px){.sb-hero h1{font-size:1.3rem;}.sb-hero .sb-sub{font-size:.85rem;}.sb-hero-mascot{width:74px;}.sb-hero-mascot img{width:74px;max-height:110px;}}
@media (max-width:380px){.sb-hero-mascot{display:none;}}

/* Strategy order banner */
.sb-order{background:linear-gradient(135deg,rgba(210,153,34,.16),rgba(28,33,40,.6) 60%,var(--card));border:1px solid rgba(210,153,34,.45);border-radius:16px;padding:1.1rem 1.2rem;margin-bottom:1.1rem;}
.sb-order-pill{display:inline-flex;align-items:center;gap:.35rem;background:var(--surface);border:1px solid rgba(210,153,34,.5);color:var(--prize);font-size:.64rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;padding:.26rem .65rem;border-radius:999px;margin-bottom:.7rem;}
.sb-order-list{display:flex;flex-direction:column;gap:.5rem;}
.sb-order-row{display:flex;align-items:flex-start;gap:.6rem;font-size:.95rem;font-weight:600;color:var(--text);line-height:1.4;}
.sb-order-row .num{flex-shrink:0;width:22px;height:22px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:900;background:var(--surface);border:1px solid var(--border);color:var(--prize);}
.sb-order-row b{color:var(--yellow);font-weight:800;}
.sb-burn{margin-top:.85rem;display:flex;align-items:center;gap:.55rem;background:rgba(248,81,73,.12);border:1px solid rgba(248,81,73,.4);border-radius:10px;padding:.6rem .8rem;font-size:.9rem;font-weight:800;color:var(--red);}
.sb-burn .ic{flex-shrink:0;color:var(--red);}

/* Target summary cards */
.sbp-targets{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:.7rem;margin-bottom:1.2rem;}
.sbp-tcard{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1rem;position:relative;overflow:hidden;cursor:pointer;transition:border-color .15s,transform .1s;min-height:172px;}
.sbp-tcard:hover{border-color:var(--accent);}
.sbp-tcard.active{border-color:var(--sel);box-shadow:0 0 0 1px var(--sel);}
.sbp-tcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--sel);}
.sbp-tcard.prize{--sel:var(--prize);} .sbp-tcard.capture{--sel:var(--capture);} .sbp-tcard.defend{--sel:var(--defend);}
.sbp-tc-mascot{position:absolute;right:2px;bottom:0;width:68px;height:auto;opacity:.96;pointer-events:none;filter:drop-shadow(0 4px 9px rgba(0,0,0,.55));}
.sbp-tc-top{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.5rem;}
.sbp-tc-kind{font-size:.62rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--sel);display:inline-flex;align-items:center;gap:.3rem;}
.sbp-tc-lvl{font-size:.62rem;font-weight:800;background:var(--surface);border:1px solid var(--border);color:var(--muted);padding:.12rem .45rem;border-radius:6px;}
.sbp-tc-name{font-size:1.15rem;font-weight:900;letter-spacing:-.01em;color:var(--text);margin-bottom:.2rem;}
.sbp-tc-head{font-size:.82rem;color:var(--text);font-weight:600;line-height:1.35;margin-bottom:.55rem;padding-right:74px;}
.sbp-tc-meta{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;font-size:.7rem;padding-right:74px;}
.sbp-tc-count{font-family:'SF Mono',Consolas,monospace;font-weight:900;font-size:1rem;color:var(--sel);}
.sbp-tc-count .lbl{color:var(--muted);font-weight:600;font-size:.65rem;font-family:inherit;margin-left:.2rem;}
.sbp-vs{display:inline-flex;align-items:center;gap:.3rem;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:.12rem .45rem;font-family:'SF Mono',Consolas,monospace;font-weight:700;color:var(--muted);}
.sbp-vs b{color:var(--text);}
.sbp-tc-big{margin-top:.55rem;font-size:.72rem;color:var(--muted);display:flex;align-items:center;gap:.35rem;padding-right:74px;}
.sbp-tc-big b{color:var(--prize);font-weight:800;}

/* Search — shimmer border */
@keyframes sb-shimmer{0%{background-position:-200% center;}100%{background-position:200% center;}}
@keyframes sb-glow{0%,100%{box-shadow:0 0 12px rgba(121,192,255,.2),0 0 24px rgba(63,185,80,.08);}50%{box-shadow:0 0 16px rgba(121,192,255,.35),0 0 32px rgba(63,185,80,.18);}}
.sb-search-wrap{position:relative;margin-bottom:1rem;}
.sb-search-input{width:100%;background-color:var(--card);background-image:linear-gradient(var(--card),var(--card)),linear-gradient(90deg,var(--accent) 0%,var(--green) 25%,var(--yellow) 50%,var(--red) 75%,var(--accent) 100%);background-origin:border-box;background-clip:padding-box,border-box;background-size:100% 100%,200% auto;border:2px solid transparent;border-radius:14px;color:var(--text);font-size:1rem;font-weight:600;padding:.85rem 1rem .85rem 2.6rem;font-family:inherit;animation:sb-shimmer 6s linear infinite,sb-glow 4s ease-in-out infinite;transition:background-color .15s ease;}
.sb-search-input:focus{outline:none;background-color:var(--surface);background-image:linear-gradient(var(--surface),var(--surface)),linear-gradient(90deg,var(--accent) 0%,var(--green) 50%,var(--accent) 100%);}
.sb-search-input::placeholder{color:var(--muted);font-weight:500;}
.sb-search-icon{position:absolute;left:.95rem;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;}
.sb-search-input:focus + .sb-search-icon{color:var(--accent);}
.sb-search-results{position:absolute;top:calc(100% + .25rem);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;display:none;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.4);}
.sb-search-results.active{display:block;}
.sb-sr{display:flex;align-items:center;gap:.6rem;padding:.65rem .85rem;cursor:pointer;font-size:.85rem;border-bottom:1px solid var(--border);transition:background .12s ease;}
.sb-sr:last-child{border-bottom:none;}
.sb-sr:hover,.sb-sr.focused{background:rgba(121,192,255,.08);}
.sb-sr .sb-sr-av{width:24px;height:24px;border-radius:50%;background:var(--surface);border:1px solid var(--border);object-fit:cover;flex-shrink:0;}
.sb-sr .sb-sr-name{font-weight:700;color:var(--text);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-sr .sb-sr-meta{font-size:.65rem;font-family:'SF Mono',Consolas,monospace;color:var(--muted);}
.sb-sr .sb-sr-tgt{font-size:.6rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:.1rem .4rem;border-radius:5px;}
.sb-search-empty{padding:.85rem;text-align:center;font-size:.8rem;color:var(--muted);}

/* Roster */
.roster-head{display:flex;align-items:center;justify-content:space-between;gap:.5rem;margin-bottom:.6rem;flex-wrap:wrap;}
.roster-h{font-size:.78rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);}
.roster-h .cnt{color:var(--prize);font-weight:900;font-size:.95rem;font-family:'SF Mono',Consolas,monospace;}
.roster-tabs{display:inline-flex;gap:.25rem;flex-wrap:wrap;}
.roster-tab{background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:.7rem;font-weight:800;letter-spacing:.03em;text-transform:uppercase;padding:.3rem .65rem;border-radius:999px;cursor:pointer;font-family:inherit;transition:all .15s;}
.roster-tab:hover{border-color:var(--accent);color:var(--accent);}
.roster-tab.active{background:rgba(210,153,34,.16);border-color:rgba(210,153,34,.5);color:var(--prize);}
.roster-group{margin-bottom:1.1rem;}
.roster-group-h{display:flex;align-items:center;gap:.5rem;font-size:.74rem;font-weight:800;text-transform:uppercase;letter-spacing:.05em;margin:.2rem 0 .55rem;padding-bottom:.35rem;border-bottom:1px solid var(--border);}
.roster-group-h .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.roster-group-h .gcnt{color:var(--muted);font-family:'SF Mono',Consolas,monospace;font-weight:900;}
.roster-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:.5rem;}
.roster-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:.55rem .65rem;display:flex;align-items:center;gap:.6rem;position:relative;overflow:hidden;}
.roster-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tcol,var(--border));}
.roster-card.is-big{box-shadow:inset 0 0 0 1px rgba(210,153,34,.4);}
.roster-av{width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);object-fit:cover;flex-shrink:0;}
.av-ph{display:inline-flex;align-items:center;justify-content:center;font-weight:800;color:#fff;text-transform:uppercase;line-height:1;overflow:hidden;}
.roster-av.av-ph{font-size:.95rem;}
.sb-sr-av.av-ph{font-size:.7rem;}
.roster-body{flex:1;min-width:0;}
.roster-name{font-weight:800;font-size:.9rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:.3rem;}
.roster-name .crown{color:var(--prize);flex-shrink:0;}
.roster-meta{font-size:.68rem;color:var(--muted);font-family:'SF Mono',Consolas,monospace;display:flex;gap:.3rem;flex-wrap:wrap;margin-top:.12rem;align-items:center;}
.roster-meta .m{background:var(--surface);border:1px solid var(--border);padding:.04rem .32rem;border-radius:5px;}
.role-badge{font-size:.58rem;font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:.06rem .35rem;border-radius:5px;}
.role-big{background:rgba(210,153,34,.18);color:var(--prize);border:1px solid rgba(210,153,34,.45);}
.role-mid{background:rgba(121,192,255,.14);color:var(--accent);border:1px solid rgba(121,192,255,.35);}
.role-core{background:rgba(139,148,158,.14);color:var(--muted);border:1px solid var(--border);}
.roster-assign{flex-shrink:0;}
.roster-assign select{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:7px;font-size:.66rem;font-weight:700;padding:.25rem .3rem;font-family:inherit;cursor:pointer;max-width:100px;}
.roster-assign select:focus{outline:none;border-color:var(--accent);}
.tgt-static{font-size:.62rem;font-weight:800;text-transform:uppercase;letter-spacing:.03em;padding:.18rem .45rem;border-radius:6px;border:1px solid var(--border);background:rgba(255,255,255,.03);white-space:nowrap;}

/* Tools */
.sbp-tools{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;}
.sbp-btn{display:inline-flex;align-items:center;gap:.35rem;background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:.72rem;font-weight:700;padding:.4rem .7rem;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .15s;}
.sbp-btn:hover{border-color:var(--accent);color:var(--accent);}
.sbp-btn:disabled{opacity:.5;cursor:default;}
.sbp-btn-primary{border-color:rgba(63,185,80,.5);color:var(--green);}
.sbp-btn-primary.dirty{background:rgba(63,185,80,.14);color:var(--green);border-color:rgba(63,185,80,.6);}
.sbp-note{font-size:.7rem;color:var(--muted);display:inline-flex;align-items:center;gap:.3rem;}
.sbp-note b{color:var(--text);}
.sbp-locked{color:var(--muted);}

/* Lang modal */
.lang-modal-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:1rem;}
.lang-modal-overlay.active{display:flex;}
.lang-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;max-width:380px;width:100%;}
.lang-modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}
.lang-modal-title{font-size:1rem;font-weight:700;}
.lang-modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:.15rem .4rem;border-radius:6px;}
.lang-modal-close:hover{background:var(--surface);color:var(--text);}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem;}
.lang-option{display:flex;align-items:center;gap:.45rem;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem .6rem;border-radius:8px;font-size:.78rem;cursor:pointer;font-family:inherit;}
.lang-option:hover{border-color:var(--accent);}
.lang-option.active{background:rgba(121,192,255,.1);border-color:var(--accent);color:var(--accent);}
.lang-flag{font-size:1rem;}

.loading,.error{padding:2rem 1rem;text-align:center;color:var(--muted);font-size:.9rem;}
.error{color:var(--red);}
.fkb{margin-top:1.2rem;text-align:center;font-size:.65rem;color:var(--muted);opacity:.6;}
.fkb a{color:inherit;text-decoration:none;}
.fkb a:hover{color:var(--accent);}
.sb-foot{margin-top:1rem;padding:.85rem 1rem;background:var(--surface);border:1px dashed var(--border);border-radius:12px;color:var(--muted);font-size:.78rem;line-height:1.55;text-align:center;}
.sb-foot b{color:var(--text);}
.sb-foot a{color:var(--accent);}
</style>

  function buildCountdown(startTs){
    var wrap=el('div','sb-countdown');
    var lbl=el('span','sb-cd-label',''); wrap.appendChild(lbl);
    var v=el('span',null,''); wrap.appendChild(v);
    function tick(){
      var nowSec=Math.floor(Date.now()/1000);
      var d=startTs-nowSec;
      if(d<=0){lbl.textContent='';v.textContent='● BATTLE IS LIVE';v.style.color='var(--red)';return;}
      lbl.textContent='Battle starts in';
      var days=Math.floor(d/86400);d-=days*86400;
      var hrs =Math.floor(d/3600); d-=hrs *3600;
      var mins=Math.floor(d/60); var secs=d-mins*60;
      var parts=[];
      if(days)parts.push(days+'d');
      parts.push(String(hrs).padStart(2,'0')+'h');
      parts.push(String(mins).padStart(2,'0')+'m');
      if(!days)parts.push(String(secs).padStart(2,'0')+'s');
      v.textContent=parts.join(' ');
    }
    tick(); setInterval(tick,1000); return wrap;
  }

      as.appendChild(badge);
    }
    card.appendChild(as);
    return card;
  }

  function buildFoot(root){
    var f=el('div','sb-foot');
    f.appendChild(txt('Only players seen in the last '+(_meta.activeWindowDays||2)+' days are on the plan ('));
    f.appendChild(el('b',null,String(_meta.pool||_players.length)));
    f.appendChild(txt(' active · '+(_meta.inactiveExcluded||0)+' sat out). Full threat breakdown on the '));
    var a=el('a',null,'briefing'); a.setAttribute('href','storm-briefing.html'); f.appendChild(a);
    f.appendChild(txt('.'));
    root.appendChild(f);
    var fk=el('div','fkb');
    var fka=document.createElement('a');
    fka.textContent='Brought to you by supporters of the fk boats movement';
    fka.href='https://github.com/texnottexas/landing-page';
    fka.target='_blank';fka.rel='noopener';
    fk.appendChild(fka);
    root.appendChild(fk);
  }

  // ===== Search =====
  function searchPlayers(q,limit){
    var qn=q.toLowerCase().trim(); if(!qn)return [];
    var starts=[],contains=[];
    for(var i=0;i<_players.length;i++){
      var p=_players[i]; var nm=(p.name||'').toLowerCase();
      if(!nm)continue;
      if(nm===qn) starts.unshift(p);
      else if(nm.indexOf(qn)===0) starts.push(p);
      else if(nm.indexOf(qn)>0) contains.push(p);
    }
    return starts.concat(contains).slice(0, limit);
  }
  var _matches=[], _focusedIdx=-1;
  function renderResults(){
    var box=document.getElementById('sbSearchResults'); if(!box)return;
    while(box.firstChild)box.removeChild(box.firstChild);
    if(!_matches.length){box.classList.remove('active');return;}
    _matches.forEach(function(p,i){
      var row=el('div','sb-sr'+(i===_focusedIdx?' focused':''));
      row.appendChild(avatarEl(p,'sb-sr-av'));
      row.appendChild(el('span','sb-sr-name', p.name||'?'));
      var tid=effTarget(p); var t=_tindex[tid];
      if(p.power)row.appendChild(el('span','sb-sr-meta', fmtNum(p.power)));
      var tg=el('span','sb-sr-tgt'); tg.textContent=t?(t.ncId||t.label):tid;
      tg.style.color=tcolor(tid); tg.style.background='rgba(255,255,255,.04)'; tg.style.border='1px solid '+tcolor(tid);
      row.appendChild(tg);
      row.addEventListener('mousedown', function(ev){ev.preventDefault();selectPlayer(p);});
      box.appendChild(row);
    });
    box.classList.add('active');
  }
  function selectPlayer(p){
    var input=document.getElementById('sbSearchInput');
    if(input)input.value=p.name||'';
    var box=document.getElementById('sbSearchResults'); if(box)box.classList.remove('active');
    _focusedIdx=-1;
    // make sure the player's group is visible, then highlight their card
    if(_filter!=='all' && effTarget(p)!==_filter){_filter='all';render();}
    setTimeout(function(){
      var card=document.querySelector('.roster-card[data-sk="'+p.siteKey+'"]');
      if(!card)return;
      card.scrollIntoView({behavior:'smooth', block:'center'});
      card.style.transition='box-shadow .25s, background .25s';
      card.style.background='rgba(210,153,34,.18)';
      card.style.boxShadow='0 0 0 2px var(--prize)';
      setTimeout(function(){ card.style.background=''; card.style.boxShadow=''; }, 1700);
    },60);
  }
  function doSearch(){
    var input=document.getElementById('sbSearchInput');
    var box=document.getElementById('sbSearchResults');
    var q=input.value||'';
    _focusedIdx=-1;
    if(!q.trim()){_matches=[];renderResults();return;}
    _matches=searchPlayers(q,8);
    if(!_matches.length){
      while(box.firstChild)box.removeChild(box.firstChild);
      box.appendChild(el('div','sb-search-empty','No active S2864 player matches.'));
      box.classList.add('active');
      return;
    }
    renderResults();
  }
  function wireSearch(){
    var input=document.getElementById('sbSearchInput');
    var box=document.getElementById('sbSearchResults');
    if(!input)return;
    input.addEventListener('input', doSearch);
    input.addEventListener('keydown', function(ev){
      if(ev.key==='Escape'){box.classList.remove('active');input.blur();return;}
      if(!_matches.length)return;
      if(ev.key==='ArrowDown'){ev.preventDefault();_focusedIdx=Math.min(_matches.length-1,_focusedIdx+1);renderResults();}
      else if(ev.key==='ArrowUp'){ev.preventDefault();_focusedIdx=Math.max(0,_focusedIdx-1);renderResults();}
      else if(ev.key==='Enter'){ev.preventDefault();var pick=_matches[_focusedIdx>=0?_focusedIdx:0]; if(pick)selectPlayer(pick);}
    });
    document.addEventListener('click', function(ev){
      if(!input.contains(ev.target)&&!box.contains(ev.target)) box.classList.remove('active');
    });
  }
})();
</script>
