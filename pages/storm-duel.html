<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com; style-src 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; img-src 'self' https://raw.githubusercontent.com https://knight-cdn.akamaized.net https://h5.topwargame.com data: https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://www.google.com; connect-src 'self' https://raw.githubusercontent.com https://push-worker.27tb8s6fct.workers.dev https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com; object-src 'none'; base-uri 'self'; form-action 'none'; frame-ancestors 'self'; frame-src https://translate.google.com;">
<title>Storm Duel — Team vs Team</title>
<style>
  :root {
    --bg: #0d1117; --surface: #161b22; --card: #1c2128; --border: #30363d;
    --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
    --ally: #3fb950; --opp: #f85149;
    --army: #3fb950; --navy: #388bfd; --air: #d29922; --purple: #a371f7;
    --red: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.4; }
  a { color: var(--accent); text-decoration: none; }

  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: .65rem 1rem; display: flex; align-items: center; gap: .75rem; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 1rem; font-weight: 700; flex: 1; }
  .home-btn { display: flex; align-items: center; justify-content: center; background: var(--card); border: 1px solid var(--border); color: var(--muted); border-radius: 8px; padding: .4rem .55rem; transition: all .15s; }
  .home-btn:hover { border-color: var(--accent); color: var(--accent); }
  .meta-pill { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: .15rem .55rem; font-size: .7rem; color: var(--muted); font-weight: 600; }

  .container { max-width: 1280px; margin: 0 auto; padding: 1rem; }
  .status { text-align: center; padding: 2rem; color: var(--muted); }
  .status.error { color: var(--red); }

  /* Top scoreboard */
  .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 1rem; align-items: center; padding: 1rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1rem; }
  .team-summary { display: flex; flex-direction: column; gap: .35rem; }
  .team-summary.opp { text-align: right; }
  .team-name { font-weight: 700; font-size: 1.05rem; }
  .team-name.ally { color: var(--ally); }
  .team-name.opp  { color: var(--opp); }
  .team-stats { display: flex; gap: .9rem; flex-wrap: wrap; font-size: .8rem; color: var(--muted); }
  .team-summary.opp .team-stats { justify-content: flex-end; }
  .team-stats b { color: var(--text); font-weight: 700; }
  .vs { font-size: 1.4rem; font-weight: 800; color: var(--muted); padding: 0 .5rem; }

  /* Server cards */
  .servers { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
  .server-col { display: flex; flex-direction: column; gap: .5rem; }
  .server-col.ally h3 { color: var(--ally); }
  .server-col.opp  h3 { color: var(--opp);  }
  .server-col h3 { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); padding-bottom: .35rem; border-bottom: 1px solid var(--border); }
  .scard { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .65rem; cursor: pointer; transition: border-color .15s; }
  .scard:hover { border-color: var(--accent); }
  .scard.expanded { border-color: var(--accent); }
  .scard.is-leader { box-shadow: inset 3px 0 0 var(--accent); }
  .scard-head { display: flex; align-items: center; gap: .55rem; }
  .scard-sid { font-family: 'SF Mono', Menlo, monospace; font-weight: 800; font-size: 1.05rem; min-width: 4.5rem; }
  .scard.ally .scard-sid { color: var(--ally); }
  .scard.opp  .scard-sid { color: var(--opp);  }
  .scard-leader { display: flex; align-items: center; gap: .4rem; flex: 1; min-width: 0; }
  .scard-leader .av { width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0; background: var(--surface); border: 1px solid var(--border); object-fit: cover; }
  .scard-leader .lname { font-size: .8rem; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .scard-arrow { color: var(--muted); transition: transform .2s; font-size: .9rem; }
  .scard.expanded .scard-arrow { transform: rotate(90deg); }
  .scard-body { display: none; padding-top: .55rem; margin-top: .55rem; border-top: 1px dashed var(--border); }
  .scard.expanded .scard-body { display: block; }
  .scard-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: .4rem; }
  .scard-stat { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .4rem .5rem; }
  .scard-stat .lab { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; }
  .scard-stat .val { font-weight: 700; font-size: .9rem; font-variant-numeric: tabular-nums; }
  .scard-stat .sub { font-size: .65rem; color: var(--muted); }

  /* Tabs */
  .tabs { display: flex; gap: .25rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .tab { background: transparent; border: 0; padding: .65rem 1rem; color: var(--muted); cursor: pointer; font-size: .8rem; font-weight: 600; border-bottom: 2px solid transparent; white-space: nowrap; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .panel { display: none; }
  .panel.active { display: block; }

  /* View toggle */
  .view-toggle { display: flex; gap: .25rem; margin-bottom: .75rem; flex-wrap: wrap; }
  .vbtn { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: .35rem .8rem; color: var(--muted); cursor: pointer; font-size: .75rem; font-weight: 600; }
  .vbtn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  /* Compare two columns */
  .compare { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }
  .col { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .65rem; }
  .col h4 { font-size: .75rem; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin-bottom: .5rem; display: flex; justify-content: space-between; align-items: center; }
  .col.ally h4 { color: var(--ally); }
  .col.opp  h4 { color: var(--opp);  }

  /* Fame table */
  .fame-table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  .fame-table th { text-align: left; color: var(--muted); font-weight: 600; padding: .4rem; border-bottom: 1px solid var(--border); font-size: .7rem; text-transform: uppercase; letter-spacing: .03em; }
  .fame-table td { padding: .4rem; border-bottom: 1px solid var(--border); }
  .fame-table tr:hover td { background: rgba(255,255,255,.02); }
  .fame-table .num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
  .fame-table .rank-pill { display: inline-block; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .05rem .35rem; font-size: .7rem; color: var(--muted); font-weight: 700; }
  .team-row.ally { background: rgba(63,185,80,.05); }
  .team-row.opp  { background: rgba(248,81,73,.05); }

  /* Bars */
  .bar-row { display: grid; grid-template-columns: 110px 1fr 60px; gap: .5rem; align-items: center; font-size: .75rem; }
  .bar-row .lab { color: var(--muted); }
  .bar-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width .3s; }
  .bar-fill.ally { background: var(--ally); }
  .bar-fill.opp  { background: var(--opp); }
  .bar-row .v { text-align: right; font-weight: 700; font-variant-numeric: tabular-nums; font-size: .75rem; }

  /* Player list rows */
  .pl-row { display: grid; grid-template-columns: 38px 32px 1fr auto; gap: .5rem; padding: .35rem 0; align-items: center; font-size: .8rem; border-bottom: 1px dashed var(--border); }
  .pl-row:last-child { border-bottom: 0; }
  .pl-row .rk { color: var(--muted); font-weight: 700; text-align: center; font-size: .75rem; font-variant-numeric: tabular-nums; }
  .pl-row .av { width: 32px; height: 32px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); object-fit: cover; }
  .pl-row .info { min-width: 0; display: flex; align-items: center; gap: .4rem; }
  .pl-row .name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
  .pl-row .stag { font-family: 'SF Mono', Menlo, monospace; font-size: .65rem; padding: .05rem .35rem; border-radius: 3px; flex-shrink: 0; font-weight: 700; }
  .pl-row .stag.ally { background: rgba(63,185,80,.12); color: var(--ally); border: 1px solid rgba(63,185,80,.3); }
  .pl-row .stag.opp  { background: rgba(248,81,73,.12); color: var(--opp); border: 1px solid rgba(248,81,73,.3); }
  .pl-row .score { font-weight: 700; font-variant-numeric: tabular-nums; font-size: .8rem; text-align: right; }

  /* Warzone block (used in by-server view) */
  .wz-block { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .65rem; margin-bottom: .5rem; }
  .wz-block .wz-head { display: flex; align-items: center; gap: .5rem; padding-bottom: .5rem; border-bottom: 1px solid var(--border); margin-bottom: .5rem; flex-wrap: wrap; }
  .wz-block .wz-tag { font-family: 'SF Mono', Menlo, monospace; font-weight: 800; padding: .2rem .55rem; border-radius: 6px; font-size: .85rem; }
  .wz-block.ally .wz-tag { background: rgba(63,185,80,.12); color: var(--ally); border: 1px solid rgba(63,185,80,.3); }
  .wz-block.opp  .wz-tag { background: rgba(248,81,73,.12); color: var(--opp);  border: 1px solid rgba(248,81,73,.3); }
  .wz-block .wz-meta { color: var(--muted); font-size: .8rem; }

  /* March row inline */
  .march-inline { display: grid; grid-template-columns: 32px 1fr auto auto auto; gap: .55rem; padding: .35rem 0; align-items: center; font-size: .8rem; border-bottom: 1px dashed var(--border); }
  .march-inline:last-child { border-bottom: 0; }
  .march-inline .av { width: 32px; height: 32px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); object-fit: cover; }
  .march-inline .name-wrap { min-width: 0; display: flex; align-items: center; gap: .4rem; }
  .march-inline .name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .march-inline .stag { font-family: 'SF Mono', Menlo, monospace; font-size: .65rem; padding: .05rem .35rem; border-radius: 3px; font-weight: 700; flex-shrink: 0; }
  .march-inline .stag.ally { background: rgba(63,185,80,.12); color: var(--ally); border: 1px solid rgba(63,185,80,.3); }
  .march-inline .stag.opp  { background: rgba(248,81,73,.12); color: var(--opp); border: 1px solid rgba(248,81,73,.3); }
  .march-inline .heroes { display: flex; gap: .15rem; }
  .march-inline .heroes .hav { width: 26px; height: 26px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); object-fit: cover; }
  .march-inline .heroes .hav.placeholder { display: flex; align-items: center; justify-content: center; font-size: .55rem; color: var(--muted); font-weight: 700; }
  .march-inline .march-size { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .15rem .45rem; font-weight: 700; font-size: .75rem; font-variant-numeric: tabular-nums; }
  .march-inline .pwr { font-weight: 700; font-variant-numeric: tabular-nums; min-width: 4rem; text-align: right; }

  /* GTA "Wasted" stamp for transferred-out players */
  .pl-row.is-wasted, .march-inline.is-wasted { position: relative; }
  .pl-row.is-wasted > *, .march-inline.is-wasted > * { opacity: .35; filter: grayscale(1); }
  .pl-row.is-wasted::after, .march-inline.is-wasted::after {
    content: 'WASTED';
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-weight: 900; font-style: italic;
    font-size: 1.5rem; letter-spacing: .18em;
    color: #c1121f;
    text-shadow: 0 0 6px rgba(0,0,0,.95), 2px 2px 0 #000, -1px 1px 0 #000, 0 0 14px rgba(193,18,31,.5);
    transform: rotate(-5deg);
    pointer-events: none;
    z-index: 5;
    text-transform: uppercase;
    opacity: 1 !important;
    filter: none !important;
  }
  .wasted-wrap { position: relative; display: inline-block; padding-right: 4.5rem; }
  .wasted-wrap > .name-text { opacity: .35; filter: grayscale(1); text-decoration: line-through; }
  .wasted-stamp {
    position: absolute; right: 0; top: 50%;
    transform: translateY(-50%) rotate(-5deg);
    font-family: 'Impact', 'Arial Black', sans-serif;
    font-weight: 900; font-style: italic;
    font-size: .85rem; letter-spacing: .12em;
    color: #c1121f;
    text-shadow: 0 0 4px rgba(0,0,0,.95), 1px 1px 0 #000, -1px 1px 0 #000;
    pointer-events: none;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* Strategy tab */
  .strat-section { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .85rem; margin-bottom: .75rem; }
  .strat-section h4 { font-size: .85rem; color: var(--text); margin-bottom: .35rem; }
  .strat-note { font-size: .72rem; color: var(--muted); margin-bottom: .55rem; line-height: 1.4; }
  .strat-svg-host { display: flex; justify-content: center; }
  .maps-pair { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; width: 100%; max-width: 760px; }
  .srv-host { display: flex; flex-direction: column; align-items: center; }
  .srv-svg { width: 100%; max-width: 360px; height: auto; }
  .srv-host.ours { background: rgba(63,185,80,.04); border: 1px solid rgba(63,185,80,.25); border-radius: 8px; padding: .35rem; }
  .srv-host.theirs { background: rgba(248,81,73,.04); border: 1px solid rgba(248,81,73,.25); border-radius: 8px; padding: .35rem; }
  @media (max-width: 600px) {
    .maps-pair { grid-template-columns: 1fr; }
  }
  .capture-svg { width: 100%; max-width: 720px; height: auto; }
  .unlock-strip { display: grid; grid-template-columns: repeat(3, 1fr); gap: .5rem; margin-bottom: .5rem; }
  .unlock-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .5rem; text-align: center; font-size: .72rem; }
  .unlock-card .when { font-family: 'SF Mono', Menlo, monospace; font-weight: 800; font-size: .9rem; color: var(--accent); }
  .unlock-card .what { color: var(--text); font-weight: 700; margin-top: .15rem; }
  .unlock-card .pts { color: var(--muted); margin-top: .15rem; }
  .lane-pair { display: grid; grid-template-columns: 1fr 1fr; gap: .65rem; }
  @media (max-width: 700px) { .lane-pair { grid-template-columns: 1fr; } }
  .lane-col { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .55rem; }
  .lane-col.attack { border-color: rgba(248,81,73,.4); }
  .lane-col.defend { border-color: rgba(63,185,80,.4); }
  .lane-col h5 { font-size: .82rem; margin-bottom: .35rem; }
  .lane-col.attack h5 { color: var(--opp); }
  .lane-col.defend h5 { color: var(--ally); }
  .lane-sub { font-size: .68rem; color: var(--muted); margin-bottom: .45rem; line-height: 1.35; }
  .stage-card { background: var(--surface); border-left: 3px solid var(--accent); border-radius: 6px; padding: .65rem .75rem; margin-bottom: .55rem; }
  .stage-card.s1 { border-left-color: #79c0ff; }
  .stage-card.s2 { border-left-color: #d29922; }
  .stage-card.s3 { border-left-color: #f85149; }
  .stage-head { display: flex; align-items: center; gap: .55rem; margin-bottom: .4rem; flex-wrap: wrap; }
  .stage-time { font-family: 'SF Mono', Menlo, monospace; font-weight: 800; font-size: .82rem; color: var(--text); background: var(--card); padding: .15rem .5rem; border-radius: 4px; border: 1px solid var(--border); }
  .stage-name { font-weight: 700; font-size: .85rem; color: var(--text); }
  .stage-focus { font-size: .68rem; color: var(--muted); margin-left: auto; }
  .stage-row { display: grid; grid-template-columns: 70px 1fr; gap: .5rem; padding: .25rem 0; font-size: .76rem; align-items: start; border-bottom: 1px dashed var(--border); }
  .stage-row:last-child { border-bottom: 0; }
  .stage-label { color: var(--muted); text-transform: uppercase; font-weight: 700; font-size: .65rem; letter-spacing: .05em; padding-top: .1rem; }
  .stage-text { color: var(--text); line-height: 1.4; }
  .stage-text b { color: var(--accent); }
  .debuff-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .55rem; }
  @media (max-width: 700px) { .debuff-grid { grid-template-columns: 1fr; } }
  .debuff-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .55rem; }
  .debuff-card .top { display: flex; align-items: center; gap: .55rem; margin-bottom: .35rem; }
  .debuff-card img { width: 44px; height: 44px; flex-shrink: 0; image-rendering: -webkit-optimize-contrast; }
  .debuff-card .nm { font-weight: 700; font-size: .82rem; color: var(--text); }
  .debuff-card .ef { font-size: .68rem; color: var(--muted); margin-bottom: .3rem; line-height: 1.35; }
  .debuff-card .use { font-size: .68rem; color: var(--accent); line-height: 1.35; }
  .debuff-note { background: rgba(217,153,34,.08); border: 1px solid rgba(217,153,34,.3); border-radius: 6px; padding: .5rem .65rem; font-size: .72rem; color: var(--text); margin-top: .55rem; line-height: 1.4; }
  .debuff-note b { color: #d29922; }
  .role-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: .5rem; }
  @media (max-width: 800px) { .role-grid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 480px) { .role-grid { grid-template-columns: 1fr; } }
  .role-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .5rem; }
  .role-card .rn { font-weight: 800; font-size: .78rem; color: var(--text); margin-bottom: .25rem; }
  .role-card.scout .rn { color: #79c0ff; }
  .role-card.mm .rn { color: #d29922; }
  .role-card.seal .rn { color: var(--ally); }
  .role-card.strike .rn { color: var(--opp); }
  .role-card .rd { font-size: .68rem; color: var(--muted); line-height: 1.35; }
  .stage-assign { background: var(--card); border: 1px solid var(--border); border-radius: 6px; padding: .5rem .6rem; margin-bottom: .55rem; }
  .stage-assign .lab { font-weight: 700; font-size: .72rem; color: var(--text); margin-bottom: .35rem; }
  .stage-assign .lab .stage-tag { font-family: 'SF Mono', Menlo, monospace; font-size: .65rem; padding: .1rem .4rem; border-radius: 3px; margin-right: .35rem; font-weight: 700; }
  .stage-assign .lab .stage-tag.s1 { background: rgba(121,192,255,.15); color: #79c0ff; border: 1px solid rgba(121,192,255,.35); }
  .stage-assign .lab .stage-tag.s2 { background: rgba(217,153,34,.15); color: #d29922; border: 1px solid rgba(217,153,34,.35); }
  .stage-assign .lab .stage-tag.s3 { background: rgba(248,81,73,.15); color: #f85149; border: 1px solid rgba(248,81,73,.35); }
  .silo-callout { background: rgba(217,153,34,.08); border: 1px solid rgba(217,153,34,.3); border-radius: 6px; padding: .5rem .65rem; font-size: .72rem; color: var(--text); margin-top: .55rem; line-height: 1.4; }
  .silo-callout b { color: #d29922; }
  .strat-legend { display: flex; flex-wrap: wrap; gap: .8rem; font-size: .7rem; color: var(--muted); margin-top: .4rem; justify-content: center; }
  .strat-legend .swatch { display: inline-block; width: 14px; height: 10px; border-radius: 2px; vertical-align: middle; margin-right: .25rem; border: 1px solid; }
  .win-cond { display: grid; grid-template-columns: 24px 1fr; gap: .6rem; font-size: .78rem; padding: .35rem 0; align-items: center; border-bottom: 1px dashed var(--border); }
  .win-cond:last-child { border-bottom: 0; }
  .win-cond .num { background: var(--accent); color: var(--bg); width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: .75rem; }
  .def-anchor { background: rgba(63,185,80,.08); border: 1px solid rgba(63,185,80,.3); border-radius: 6px; padding: .55rem .7rem; font-size: .78rem; margin-bottom: .65rem; color: var(--text); }
  .def-anchor b { color: var(--ally); }
  .tgt-row { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: .55rem .65rem; margin-bottom: .45rem; }
  .tgt-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: .4rem; gap: .5rem; }
  .tgt-name { font-weight: 700; font-size: .82rem; color: var(--text); }
  .tgt-name .tgt-tier { font-size: .65rem; color: var(--muted); margin-left: .4rem; font-weight: 500; text-transform: uppercase; letter-spacing: .04em; }
  .tgt-pts { font-family: 'SF Mono', Menlo, monospace; font-weight: 700; font-size: .8rem; color: var(--accent); white-space: nowrap; }
  .tgt-team { display: flex; flex-wrap: wrap; gap: .4rem; }
  .pl-mini { display: flex; align-items: center; gap: .35rem; background: var(--card); border: 1px solid var(--border); border-radius: 4px; padding: .2rem .45rem; font-size: .72rem; }
  .pl-mini .stag { font-family: 'SF Mono', Menlo, monospace; font-size: .6rem; padding: .05rem .3rem; border-radius: 3px; font-weight: 700; }
  .pl-mini .stag.ally { background: rgba(63,185,80,.12); color: var(--ally); border: 1px solid rgba(63,185,80,.3); }
  .pl-mini .name { font-weight: 600; max-width: 7rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .pl-mini .pwr { font-family: 'SF Mono', Menlo, monospace; color: var(--muted); font-size: .65rem; }
  @media (max-width: 700px) {
    .pl-mini .name { max-width: 5rem; }
  }

  /* Buff comparison */
  .buff-stack { display: flex; flex-direction: column; gap: .35rem; padding: .35rem .5rem; }
  .buff-line { display: grid; grid-template-columns: 70px 1fr 50px; gap: .5rem; align-items: center; font-size: .75rem; }
  .buff-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .buff-fill { height: 100%; border-radius: 4px; }
  .buff-fill.atk { background: linear-gradient(90deg, #ef4444, #dc2626); }
  .buff-fill.hp  { background: linear-gradient(90deg, #10b981, #059669); }
  .buff-fill.def { background: linear-gradient(90deg, #3b82f6, #2563eb); }
  .buff-fill.dmgp { background: linear-gradient(90deg, #f59e0b, #d97706); }
  .buff-fill.dmgm { background: linear-gradient(90deg, #8b5cf6, #7c3aed); }
  .buff-line .v { text-align: right; font-weight: 700; }

  .subnav { display: flex; gap: .25rem; flex-wrap: wrap; margin-bottom: .75rem; }
  .sb { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: .25rem .65rem; font-size: .75rem; color: var(--muted); cursor: pointer; font-weight: 600; }
  .sb.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .sb.unit-army.active { background: var(--army); border-color: var(--army); color: var(--bg); }
  .sb.unit-navy.active { background: var(--navy); border-color: var(--navy); color: #fff; }
  .sb.unit-airforce.active { background: var(--air); border-color: var(--air); color: var(--bg); }

  /* Countdown */
  .timer-row { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: .75rem 1rem; display: flex; align-items: center; gap: 1rem; margin-bottom: .75rem; }
  .timer-clock { font-family: 'SF Mono', Menlo, monospace; font-size: 2rem; font-weight: 800; letter-spacing: .04em; min-width: 130px; }
  .timer-clock.pre  { color: var(--muted); }
  .timer-clock.live { color: var(--ally); }
  .timer-clock.over { color: var(--red); }
  .timer-status { flex: 1; min-width: 0; }
  .timer-phase { font-size: 1rem; font-weight: 700; }
  .timer-next  { font-size: .75rem; color: var(--muted); margin-top: 2px; }
  .timer-next .ne { color: var(--accent); }

  /* Schedule strip */
  .sched-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: .5rem; padding: .5rem; background: var(--card); border: 1px solid var(--border); border-radius: 8px; margin-bottom: .75rem; }
  .sched-strip .step { font-size: .7rem; padding: .35rem .5rem; border-radius: 6px; background: var(--surface); border: 1px solid var(--border); text-align: center; }
  .sched-strip .step.done { opacity: .55; }
  .sched-strip .step.cur { border-color: var(--accent); background: rgba(121,192,255,.08); }
  .sched-strip .step .lab { color: var(--muted); text-transform: uppercase; letter-spacing: .03em; font-size: .6rem; }
  .sched-strip .step .val { font-weight: 700; font-size: .75rem; margin-top: .15rem; }

  /* Overview headline grid */
  .ov-kpis { display: grid; grid-template-columns: repeat(4, 1fr); gap: .5rem; margin-bottom: .75rem; }
  .ov-kpi { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: .55rem; }
  .ov-kpi .lab { font-size: .65rem; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; margin-bottom: .25rem; }
  .ov-kpi .row { display: flex; justify-content: space-between; align-items: center; font-size: .8rem; }
  .ov-kpi .row + .row { margin-top: .25rem; }
  .ov-kpi .row.ally b { color: var(--ally); }
  .ov-kpi .row.opp  b { color: var(--opp);  }
  .ov-kpi b { font-variant-numeric: tabular-nums; font-weight: 700; }

  /* Intro — armory-style particles + fk boats pop */
  .intro-overlay {
    position: fixed; inset: 0; z-index: 9999;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    animation: intro-overlay-out .5s ease 2.4s forwards;
  }
  .intro-overlay.skip { display: none; }
  @keyframes intro-overlay-out {
    to { opacity: 0; visibility: hidden; pointer-events: none; }
  }
  .intro-orb { position: relative; width: 200px; height: 200px; }
  .intro-text {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-weight: 800; letter-spacing: .15em; text-transform: lowercase;
    font-size: 2rem; color: var(--accent); white-space: nowrap;
    text-shadow: 0 0 14px rgba(121,192,255,.55);
    opacity: 0;
    animation: intro-text-flash 1.2s ease 1.4s forwards;
  }
  @keyframes intro-text-flash {
    0%   { opacity: 0; transform: translate(-50%,-50%) scale(.7); filter: blur(6px); }
    25%  { opacity: 1; transform: translate(-50%,-50%) scale(1); filter: blur(0); }
    75%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%,-50%) scale(1.08); filter: blur(3px); }
  }
  .intro-particle {
    position: absolute; top: 50%; left: 50%;
    width: 10px; height: 10px; border-radius: 50%;
    margin: -5px 0 0 -5px;
    box-shadow: 0 0 10px 3px currentColor;
  }
  .intro-particle::after {
    content: ''; position: absolute; inset: 0; border-radius: 50%;
    background: currentColor; filter: blur(3px); opacity: .6;
  }
  @keyframes ip1 {
    0% { opacity: 0; transform: translate(-180px,-110px) scale(.4); }
    15%{ opacity: 1; transform: translate(-90px,50px) scale(.7); }
    35%{ transform: translate(30px,-40px) scale(.6); }
    55%{ transform: translate(-20px,20px) scale(.5); }
    75%{ opacity: 1; transform: translate(0,0) scale(.3); }
    100%{ opacity: 0; transform: translate(0,0) scale(0); }
  }
  @keyframes ip2 {
    0% { opacity: 0; transform: translate(160px,-100px) scale(.3); }
    12%{ opacity: 1; transform: translate(60px,70px) scale(.6); }
    30%{ transform: translate(-50px,-20px) scale(.7); }
    55%{ transform: translate(15px,30px) scale(.5); }
    75%{ opacity: 1; transform: translate(0,0) scale(.3); }
    100%{ opacity: 0; transform: translate(0,0) scale(0); }
  }
  @keyframes ip3 {
    0% { opacity: 0; transform: translate(140px,120px) scale(.5); }
    18%{ opacity: 1; transform: translate(-40px,50px) scale(.6); }
    40%{ transform: translate(50px,-60px) scale(.7); }
    60%{ transform: translate(-10px,-15px) scale(.4); }
    75%{ opacity: 1; transform: translate(0,0) scale(.3); }
    100%{ opacity: 0; transform: translate(0,0) scale(0); }
  }
  @keyframes ip4 {
    0% { opacity: 0; transform: translate(-150px,90px) scale(.3); }
    14%{ opacity: 1; transform: translate(40px,60px) scale(.5); }
    32%{ transform: translate(70px,-50px) scale(.7); }
    55%{ transform: translate(-25px,-10px) scale(.4); }
    75%{ opacity: 1; transform: translate(0,0) scale(.3); }
    100%{ opacity: 0; transform: translate(0,0) scale(0); }
  }
  @keyframes ip5 {
    0% { opacity: 0; transform: translate(60px,-160px) scale(.4); }
    16%{ opacity: 1; transform: translate(-70px,-40px) scale(.6); }
    38%{ transform: translate(40px,60px) scale(.5); }
    58%{ transform: translate(10px,-20px) scale(.4); }
    75%{ opacity: 1; transform: translate(0,0) scale(.3); }
    100%{ opacity: 0; transform: translate(0,0) scale(0); }
  }
  @keyframes ip6 {
    0% { opacity: 0; transform: translate(-70px,-150px) scale(.5); }
    20%{ opacity: 1; transform: translate(80px,-30px) scale(.7); }
    42%{ transform: translate(-30px,70px) scale(.5); }
    60%{ transform: translate(20px,-5px) scale(.4); }
    75%{ opacity: 1; transform: translate(0,0) scale(.3); }
    100%{ opacity: 0; transform: translate(0,0) scale(0); }
  }
  @keyframes ip7 {
    0% { opacity: 0; transform: translate(-170px,0) scale(.3); }
    17%{ opacity: 1; transform: translate(-30px,-70px) scale(.6); }
    36%{ transform: translate(60px,40px) scale(.7); }
    56%{ transform: translate(-15px,5px) scale(.5); }
    75%{ opacity: 1; transform: translate(0,0) scale(.3); }
    100%{ opacity: 0; transform: translate(0,0) scale(0); }
  }
  @keyframes ip8 {
    0% { opacity: 0; transform: translate(120px,70px) scale(.4); }
    13%{ opacity: 1; transform: translate(-60px,-60px) scale(.5); }
    34%{ transform: translate(-20px,80px) scale(.6); }
    54%{ transform: translate(5px,-10px) scale(.4); }
    75%{ opacity: 1; transform: translate(0,0) scale(.3); }
    100%{ opacity: 0; transform: translate(0,0) scale(0); }
  }
  .intro-particle:nth-child(1) { color: var(--accent); animation: ip1 1.5s ease-out both; }
  .intro-particle:nth-child(2) { color: #3fb950;       animation: ip2 1.5s ease-out .05s both; }
  .intro-particle:nth-child(3) { color: #d29922;       animation: ip3 1.5s ease-out .1s both; }
  .intro-particle:nth-child(4) { color: var(--accent); animation: ip4 1.5s ease-out .03s both; }
  .intro-particle:nth-child(5) { color: #3fb950;       animation: ip5 1.5s ease-out .08s both; }
  .intro-particle:nth-child(6) { color: #d29922;       animation: ip6 1.5s ease-out .12s both; }
  .intro-particle:nth-child(7) { color: #a371f7;       animation: ip7 1.5s ease-out .02s both; }
  .intro-particle:nth-child(8) { color: #f0883e;       animation: ip8 1.5s ease-out .07s both; }

  @media (max-width: 720px) {
    .intro-text { font-size: 1.2rem; }
    .timer-clock { font-size: 1.5rem; min-width: 0; }
    .timer-row { gap: .5rem; padding: .5rem; }
    .sched-strip { grid-template-columns: 1fr 1fr; }
    .ov-kpis { grid-template-columns: 1fr 1fr; }
    .scoreboard { grid-template-columns: 1fr; text-align: center; }
    .team-summary.opp { text-align: center; }
    .team-summary.opp .team-stats,
    .team-summary.ally .team-stats { justify-content: center; }
    .team-summary { align-items: center; }
    .servers { grid-template-columns: 1fr; }
    .compare { grid-template-columns: 1fr; }
    .container { padding: .5rem; }
    .header h1 { font-size: .85rem; }
    .meta-pill { display: none; }
    .scard-stats { grid-template-columns: repeat(2, 1fr); }
    .pl-row { grid-template-columns: 30px 28px 1fr auto; }
    .pl-row .av { width: 28px; height: 28px; }
    .march-inline { grid-template-columns: 28px 1fr auto auto; gap: .35rem; }
    .march-inline .pwr { display: none; }
    .march-inline .heroes { flex-shrink: 0; }
    .march-inline .heroes .hav { width: 22px; height: 22px; }
    .bar-row { grid-template-columns: 80px 1fr 50px; }
    .buff-line { grid-template-columns: 60px 1fr 50px; }
  }
</style>
</head>
<body>
<div class="intro-overlay" id="intro-overlay" aria-hidden="true">
  <div class="intro-orb">
    <span class="intro-particle"></span><span class="intro-particle"></span>
    <span class="intro-particle"></span><span class="intro-particle"></span>
    <span class="intro-particle"></span><span class="intro-particle"></span>
    <span class="intro-particle"></span><span class="intro-particle"></span>
    <div class="intro-text">fk boats</div>
  </div>
</div>
<header class="header">
  <a href="/" class="home-btn" title="Home" aria-label="Home">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>
  </a>
  <h1>Storm Duel</h1>
</header>

<div class="container">
  <div id="root">
    <div class="status">Loading data…</div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // Intro overlay gate (once per user)
  (function setupIntro(){
    const overlay = document.getElementById('intro-overlay');
    if (!overlay) return;
    const SEEN_KEY = 'storm-duel.intro.seen.v1';
    try {
      if (localStorage.getItem(SEEN_KEY) === '1') {
        overlay.classList.add('skip');
        return;
      }
      localStorage.setItem(SEEN_KEY, '1');
    } catch(_) {}
    overlay.addEventListener('click', () => overlay.classList.add('skip'));
    setTimeout(() => overlay.classList.add('skip'), 3000);
  })();

  let ALLY_LABEL = 'Our Team';
  let OPP_LABEL = 'Opponents';

  function fmtNum(n) {
    if (n == null) return '-';
    if (Math.abs(n) >= 1e9) return (n/1e9).toFixed(2) + 'B';
    if (Math.abs(n) >= 1e6) return (n/1e6).toFixed(1) + 'M';
    if (Math.abs(n) >= 1e3) return (n/1e3).toFixed(1) + 'k';
    return String(n);
  }
  function fmtDate(ts) {
    if (!ts) return '-';
    const d = new Date(ts*1000);
    return d.toLocaleString(undefined, {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'});
  }
  function el(tag, attrs, ...kids) {
    const e = document.createElement(tag);
    if (attrs) for (const k of Object.keys(attrs)) {
      if (k === 'class') e.className = attrs[k];
      else if (k.startsWith('on')) e.addEventListener(k.substring(2), attrs[k]);
      else if (attrs[k] != null) e.setAttribute(k, attrs[k]);
    }
    for (const k of kids) {
      if (k == null || k === false) continue;
      if (typeof k === 'string' || typeof k === 'number') e.appendChild(document.createTextNode(String(k)));
      else if (Array.isArray(k)) k.forEach(x => x && e.appendChild(typeof x === 'string' ? document.createTextNode(x) : x));
      else e.appendChild(k);
    }
    return e;
  }
  function clearNode(n) { while (n.firstChild) n.removeChild(n.firstChild); }
  function avatarUrl(p) { return p && (p.avatar_url || p.leader_avatar) || null; }
  function avatarImg(p, fallback, cls) {
    const url = avatarUrl(p);
    const txt = (fallback || '?').slice(0,1);
    cls = cls || 'av';
    if (url) {
      const img = el('img', { class: cls, src: url, alt: '', loading:'lazy' });
      img.addEventListener('error', () => {
        const sp = el('span', { class: cls, style:'display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--muted)' }, txt);
        img.replaceWith(sp);
      });
      return img;
    }
    return el('span', { class: cls, style:'display:flex;align-items:center;justify-content:center;font-size:.65rem;color:var(--muted)' }, txt);
  }
  function isWasted(name) { return typeof name === 'string' && name.indexOf('Reef') !== -1; }
  function markWasted(rowEl, name) { if (isWasted(name)) rowEl.classList.add('is-wasted'); return rowEl; }
  function wastedSubNode(name) {
    if (!name) return '—';
    if (!isWasted(name)) return name;
    return el('span', null,
      el('span', { style:'opacity:.4;text-decoration:line-through' }, name),
      ' ',
      el('span', { style:'color:#c1121f;font-weight:900;font-style:italic;font-family:Impact,Arial Black,sans-serif;letter-spacing:.05em' }, 'WASTED')
    );
  }
  function heroIcon(heroId) {
    const h = HEROES_BY_ID[heroId];
    if (h && h.iconSmall) {
      const img = el('img', { class:'hav', src: h.iconSmall, alt:'', loading:'lazy', title: h.displayName });
      img.addEventListener('error', () => {
        const sp = el('span', { class:'hav placeholder', title:'H'+heroId }, 'H'+heroId);
        img.replaceWith(sp);
      });
      return img;
    }
    return el('span', { class:'hav placeholder', title:'H'+heroId }, 'H'+heroId);
  }

  let HEROES_BY_ID = {};

  function renderHeader(meta) { /* meta pills removed */ }

  function renderScoreboard(data) {
    const a = data.ally.totals;
    const o = data.opp.totals;
    const aMP = a.march_power_sum.Army + a.march_power_sum.Navy + a.march_power_sum.AirForce;
    const oMP = o.march_power_sum.Army + o.march_power_sum.Navy + o.march_power_sum.AirForce;
    return el('div', { class:'scoreboard' },
      el('div', { class:'team-summary ally' },
        el('div', { class:'team-name ally' }, ALLY_LABEL),
        el('div', { class:'team-stats' },
          el('span', null, 'Round ', el('b', null, fmtNum(a.round_score_sum))),
          el('span', null, 'Fame ',  el('b', null, fmtNum(a.event_fame_sum))),
          el('span', null, 'Top10 Merit ', el('b', null, fmtNum(a.merit_top10_sum))),
          el('span', null, 'March power ', el('b', null, fmtNum(aMP)))
        )
      ),
      el('div', { class:'vs' }, 'VS'),
      el('div', { class:'team-summary opp' },
        el('div', { class:'team-name opp' }, OPP_LABEL),
        el('div', { class:'team-stats' },
          el('span', null, 'Round ', el('b', null, fmtNum(o.round_score_sum))),
          el('span', null, 'Fame ',  el('b', null, fmtNum(o.event_fame_sum))),
          el('span', null, 'Top10 Merit ', el('b', null, fmtNum(o.merit_top10_sum))),
          el('span', null, 'March power ', el('b', null, fmtNum(oMP)))
        )
      )
    );
  }

  function serverCard(z, side, isLeader) {
    const sq = z.squad || {};
    const f = z.fame || {};
    const m = z.individual_merit;
    const ki = z.kartz_individual;
    const ka = z.kartz_alliances;
    const cb = z.combat_buffs_L3;
    const fSum = (z.formations ? (sumPower(z.formations.Army)+sumPower(z.formations.Navy)+sumPower(z.formations.AirForce)) : 0);
    const wrap = el('div', { class: 'scard ' + side + (isLeader ? ' is-leader' : '') });
    const head = el('div', { class:'scard-head' },
      el('div', { class:'scard-sid' }, 'S'+z.sid),
      el('div', { class:'scard-leader' },
        avatarImg({ avatar_url: sq.leader_avatar }, sq.leader, 'av'),
        el('div', { class:'lname' }, (sq.leader || '—') + (isLeader ? ' ★' : ''))
      ),
      el('div', { class:'scard-arrow' }, '›')
    );
    const body = el('div', { class:'scard-body' },
      el('div', { class:'scard-stats' },
        statBox('Fame Rank', f.rank ? '#'+f.rank : '—', 'event ' + fmtNum(f.event_fame)),
        statBox('Round Score', fmtNum(f.round_score), null),
        statBox('Combat ATK', cb ? cb.L3_pct['All Units ATK'].toFixed(0)+'%' : '—', cb ? cb.combatWLs+' wl' : null),
        statBox('Top Player Merit', m && m.top[0] ? fmtNum(m.top[0].merit) : '—', m && m.top[0] ? wastedSubNode(m.top[0].username) : null),
        statBox('Kartz Best', ki && ki.top[0] ? '#'+ki.top[0].rank : '—', ki && ki.top[0] ? wastedSubNode(ki.top[0].username) : null),
        statBox('Top Alliance', ka && ka.alliances[0] ? ('['+ka.alliances[0].tag+']') : '—', ka && ka.alliances[0] ? '#'+ka.alliances[0].rank : null),
        statBox('March Power', fmtNum(fSum), 'top 30'),
        statBox('Wastelands', cb ? cb.wastelandTotal : '—', cb ? cb.combatWLs+' combat' : null)
      )
    );
    wrap.appendChild(head);
    wrap.appendChild(body);
    head.addEventListener('click', () => wrap.classList.toggle('expanded'));
    return wrap;
  }
  function statBox(lab, val, sub) {
    return el('div', { class:'scard-stat' },
      el('div', { class:'lab' }, lab),
      el('div', { class:'val' }, val == null ? '—' : val),
      sub ? el('div', { class:'sub' }, sub) : null
    );
  }
  function sumPower(arr) {
    return (arr||[]).reduce((s,m) => s + (m.power||0), 0);
  }

  function renderServers(data) {
    const ally = el('div', { class:'server-col ally' },
      el('h3', null, ALLY_LABEL),
      ...data.ally.warzones.map((z, i) => serverCard(z, 'ally', i===0))
    );
    const opp = el('div', { class:'server-col opp' },
      el('h3', null, OPP_LABEL),
      ...data.opp.warzones.map((z, i) => serverCard(z, 'opp', i===0))
    );
    return el('div', { class:'servers' }, ally, opp);
  }

  // ----- TAB: Overview -----
  function pad2(n){ n = Math.floor(n); return n<10 ? '0'+n : ''+n; }
  function fmtCountdown(secs) {
    if (secs < 0) secs = 0;
    const d = Math.floor(secs/86400);
    const h = Math.floor((secs%86400)/3600);
    const m = Math.floor((secs%3600)/60);
    const s = Math.floor(secs%60);
    if (d > 0) return d+'d '+pad2(h)+':'+pad2(m)+':'+pad2(s);
    return pad2(h)+':'+pad2(m)+':'+pad2(s);
  }

  function tabOverview(data) {
    const sched = data.metadata.schedule;
    const a = data.ally.totals, o = data.opp.totals;

    const clock = el('div', { class:'timer-clock pre' }, '--:--:--');
    const phase = el('div', { class:'timer-phase' }, 'loading…');
    const next  = el('div', { class:'timer-next' });
    const status = el('div', { class:'timer-status' }, phase, next);
    const timerRow = el('div', { class:'timer-row' }, clock, status);

    const STEPS = [
      {key:'viewTime',           lab:'Preview',   ts: sched.viewTime},
      {key:'selectAreaTime',     lab:'Selection', ts: sched.selectAreaTime},
      {key:'waitFightBeginTime', lab:'Wait',      ts: sched.waitFightBeginTime},
      {key:'fightBeginTime',     lab:'Fight',     ts: sched.fightBeginTime},
      {key:'fightEndTime',       lab:'End',       ts: sched.fightEndTime}
    ];
    const stripEl = el('div', { class:'sched-strip' },
      ...STEPS.map(s => el('div', { class:'step', 'data-k': s.key },
        el('div', { class:'lab' }, s.lab),
        el('div', { class:'val' }, fmtDate(s.ts))
      ))
    );

    function tick() {
      const now = Math.floor(Date.now()/1000);
      let label, target = sched.fightBeginTime;
      if (now < sched.fightBeginTime) {
        clock.className = 'timer-clock pre';
        clock.textContent = fmtCountdown(sched.fightBeginTime - now);
        label = 'Until Battle Start';
      } else if (now < sched.fightEndTime) {
        clock.className = 'timer-clock live';
        clock.textContent = 'LIVE';
        label = 'Battle in progress';
        target = sched.fightEndTime;
      } else {
        clock.className = 'timer-clock over';
        clock.textContent = 'OVER';
        label = 'Battle ended';
        target = null;
      }
      phase.textContent = label;
      clearNode(next);
      stripEl.querySelectorAll('.step').forEach(stEl => {
        const k = stEl.getAttribute('data-k');
        const ts = sched[k];
        stEl.classList.remove('done', 'cur');
        if (now >= ts) stEl.classList.add('done');
        if (target && ts === target) { stEl.classList.add('cur'); stEl.classList.remove('done'); }
      });
    }
    tick();
    const iv = setInterval(tick, 1000);
    // weak cleanup — when tab/page hidden continue is fine; persistent bound to DOM lifecycle isn't critical here.

    function kpi(lab, aV, oV, fmt) {
      fmt = fmt || fmtNum;
      const aB = el('b', null, fmt(aV));
      const oB = el('b', null, fmt(oV));
      return el('div', { class:'ov-kpi' },
        el('div', { class:'lab' }, lab),
        el('div', { class:'row ally' }, el('span', null, ALLY_LABEL), aB),
        el('div', { class:'row opp'  }, el('span', null, OPP_LABEL),  oB)
      );
    }
    const kpis = el('div', { class:'ov-kpis' },
      kpi('Round Score',   a.round_score_sum,  o.round_score_sum),
      kpi('Event Fame',    a.event_fame_sum,   o.event_fame_sum),
      kpi('Top10 Merit',   a.merit_top10_sum,  o.merit_top10_sum),
      kpi('March Power',
        (a.march_power_sum.Army + a.march_power_sum.Navy + a.march_power_sum.AirForce),
        (o.march_power_sum.Army + o.march_power_sum.Navy + o.march_power_sum.AirForce))
    );

    return el('div', null, timerRow, stripEl, kpis);
  }

  // ----- TAB: Strategy -----
  function svgEl(tag, attrs, ...kids) {
    const ns = 'http://www.w3.org/2000/svg';
    const e = document.createElementNS(ns, tag);
    if (attrs) Object.keys(attrs).forEach(k => e.setAttribute(k, attrs[k]));
    kids.forEach(k => {
      if (k == null || k === false) return;
      if (typeof k === 'string' || typeof k === 'number') e.appendChild(document.createTextNode(String(k)));
      else e.appendChild(k);
    });
    return e;
  }

  function buildServerMap(role, accent) {
    // role: 'OUR SERVER (defend)' or 'ENEMY SERVER (attack)'
    const SZ = 340;
    const svg = svgEl('svg', { viewBox: '0 0 '+SZ+' '+(SZ+38), class: 'srv-svg', xmlns:'http://www.w3.org/2000/svg' });
    // background
    svg.appendChild(svgEl('rect', { x:0, y:0, width:SZ, height:SZ+38, fill:'#0d1117', rx:8, ry:8 }));
    // header label
    svg.appendChild(svgEl('text', { x: SZ/2, y: 18, 'text-anchor':'middle', fill: accent, 'font-size':12, 'font-weight':800, 'letter-spacing':'.08em' }, role));
    // map square
    const M = 16, top = 28;
    const sq = { x: M, y: top, w: SZ-2*M, h: SZ-2*M };
    const cx = sq.x + sq.w/2, cy = sq.y + sq.h/2;
    svg.appendChild(svgEl('rect', { x: sq.x, y: sq.y, width: sq.w, height: sq.h, fill:'#161b22', stroke:'#30363d', 'stroke-width':1.5, rx:4, ry:4 }));
    // diagonals (X) creating 4 triangle quadrants
    svg.appendChild(svgEl('line', { x1: sq.x, y1: sq.y, x2: sq.x+sq.w, y2: sq.y+sq.h, stroke:'#30363d', 'stroke-width':1 }));
    svg.appendChild(svgEl('line', { x1: sq.x+sq.w, y1: sq.y, x2: sq.x, y2: sq.y+sq.h, stroke:'#30363d', 'stroke-width':1 }));
    // shade INACTIVE quadrants (top, right, bottom). Active = LEFT triangle.
    const tri = (pts, fill) => svgEl('polygon', { points: pts, fill, stroke:'none' });
    // top, right, bottom inactive triangles
    svg.appendChild(tri([[cx,cy],[sq.x,sq.y],[sq.x+sq.w,sq.y]].map(p=>p.join(',')).join(' '), 'rgba(120,120,120,.07)'));
    svg.appendChild(tri([[cx,cy],[sq.x+sq.w,sq.y],[sq.x+sq.w,sq.y+sq.h]].map(p=>p.join(',')).join(' '), 'rgba(120,120,120,.07)'));
    svg.appendChild(tri([[cx,cy],[sq.x+sq.w,sq.y+sq.h],[sq.x,sq.y+sq.h]].map(p=>p.join(',')).join(' '), 'rgba(120,120,120,.07)'));
    // active LEFT triangle highlighted
    const accentTint = accent === '#3fb950' ? 'rgba(63,185,80,.12)' : 'rgba(248,81,73,.12)';
    svg.appendChild(tri([[cx,cy],[sq.x,sq.y],[sq.x,sq.y+sq.h]].map(p=>p.join(',')).join(' '), accentTint));
    // "INACTIVE" labels in 3 inactive triangles
    const labelFaint = (x, y) => svg.appendChild(svgEl('text', { x, y, 'text-anchor':'middle', fill:'#444c56', 'font-size':9, 'font-style':'italic' }, 'inactive'));
    labelFaint(cx, sq.y + 28);                     // top
    labelFaint(sq.x + sq.w - 36, cy);              // right
    labelFaint(cx, sq.y + sq.h - 18);              // bottom

    // ACTIVE QUADRANT label
    svg.appendChild(svgEl('text', { x: sq.x + 26, y: cy - 88, fill: accent, 'font-size':9, 'font-weight':800, 'letter-spacing':'.08em' }, 'ACTIVE'));

    // Buildings in left quadrant
    // L1 (pink) — 3, far edge
    const L1pts = [ {x: sq.x + 26, y: cy - 60}, {x: sq.x + 26, y: cy}, {x: sq.x + 26, y: cy + 60} ];
    // L2 (green) — 2, mid
    const L2pts = [ {x: sq.x + 70, y: cy - 38}, {x: sq.x + 70, y: cy + 38} ];
    // L3 (red) — 1, near capital
    const L3pt = { x: sq.x + 110, y: cy };
    // Capital (yellow) at exact center, drawn last so always on top
    const drawBox = (x, y, fill, stroke, lab, sub, t) => {
      const w = 32, h = 22;
      svg.appendChild(svgEl('rect', { x: x-w/2, y: y-h/2, width:w, height:h, rx:4, ry:4, fill, stroke, 'stroke-width':1.5 }));
      svg.appendChild(svgEl('text', { x, y: y+1, 'text-anchor':'middle', fill:'#e6edf3', 'font-size':8, 'font-weight':700 }, lab));
      if (sub) svg.appendChild(svgEl('text', { x, y: y+10, 'text-anchor':'middle', fill:'#8b949e', 'font-size':7 }, sub));
      if (t) svg.appendChild(svgEl('text', { x, y: y-h/2 - 3, 'text-anchor':'middle', fill:'#79c0ff', 'font-size':7, 'font-weight':700 }, t));
    };
    L1pts.forEach(p => drawBox(p.x, p.y, '#3a1f33', '#d75397', 'L1', '10/min', null));
    L2pts.forEach(p => drawBox(p.x, p.y, '#1f3a25', '#3fb950', 'L2', '20/min', null));
    drawBox(L3pt.x, L3pt.y, '#3a2020', '#f85149', 'L3', '40/min', '15m');
    // Capital region: dashed boundary + 4 silos + capital
    const regionR = 50;
    svg.appendChild(svgEl('circle', { cx, cy, r: regionR, fill:'none', stroke:'#d29922', 'stroke-width':1, 'stroke-dasharray':'3,3', opacity:'.4' }));
    // 4 silos in corners of capital region
    const silos = [
      { dx: -34, dy: -34 }, { dx: 34, dy: -34 },
      { dx: -34, dy: 34 },  { dx: 34, dy: 34 }
    ];
    silos.forEach(s => {
      svg.appendChild(svgEl('circle', { cx: cx + s.dx, cy: cy + s.dy, r: 6, fill:'#332b1c', stroke:'#d29922', 'stroke-width':1.5 }));
      svg.appendChild(svgEl('text', { x: cx + s.dx, y: cy + s.dy + 2.5, 'text-anchor':'middle', fill:'#d29922', 'font-size':7, 'font-weight':800 }, 'S'));
    });
    // Capital (always center, yellow circle)
    svg.appendChild(svgEl('circle', { cx, cy, r: 22, fill:'#3a3320', stroke:'#d29922', 'stroke-width':2 }));
    svg.appendChild(svgEl('text', { x: cx, y: cy + 1, 'text-anchor':'middle', fill:'#e6edf3', 'font-size':8, 'font-weight':800 }, 'CAP'));
    svg.appendChild(svgEl('text', { x: cx, y: cy + 10, 'text-anchor':'middle', fill:'#d29922', 'font-size':7, 'font-weight':700 }, '100/min'));
    svg.appendChild(svgEl('text', { x: cx, y: cy - 26, 'text-anchor':'middle', fill:'#79c0ff', 'font-size':7, 'font-weight':700 }, '30m'));

    return svg;
  }

  function buildCaptureFlow() {
    const W = 880, H = 140;
    const svg = svgEl('svg', { viewBox:'0 0 '+W+' '+H, class:'capture-svg', xmlns:'http://www.w3.org/2000/svg' });
    svg.appendChild(svgEl('rect', { x:0, y:0, width:W, height:H, fill:'#0d1117', rx:8, ry:8 }));
    const BW = 130, BH = 70, GAP = 38;
    const steps = [
      { label1:'BESIEGE',  label2:'',         sub:'attack building',   color:'#f85149' },
      { label1:'CAPTURE',  label2:'TIMER',    sub:'hold 60 sec',        color:'#d29922' },
      { label1:'CAPTURED', label2:'',         sub:'ownership claimed',  color:'#3fb950' },
      { label1:'AT PEACE', label2:'',         sub:'120 sec immune',     color:'#388bfd' },
      { label1:'HELD',     label2:'',         sub:'+pts/min ticking',   color:'#79c0ff' }
    ];
    const totalW = steps.length * BW + (steps.length - 1) * GAP;
    const startX = (W - totalW) / 2;
    steps.forEach((s, i) => { s.x = startX + i * (BW + GAP); });
    // arrow def
    const defs = svgEl('defs', null);
    const marker = svgEl('marker', { id:'arr', viewBox:'0 0 10 10', refX:8, refY:5, markerWidth:6, markerHeight:6, orient:'auto' });
    marker.appendChild(svgEl('path', { d:'M0,0 L10,5 L0,10 z', fill:'#8b949e' }));
    defs.appendChild(marker); svg.appendChild(defs);
    // arrows between
    for (let i = 0; i < steps.length - 1; i++) {
      const s = steps[i], n = steps[i+1];
      svg.appendChild(svgEl('line', { x1: s.x + BW, y1: H/2, x2: n.x - 6, y2: H/2, stroke:'#30363d', 'stroke-width':2, 'marker-end':'url(#arr)' }));
    }
    // boxes
    steps.forEach(s => {
      svg.appendChild(svgEl('rect', { x: s.x, y: H/2 - BH/2, width: BW, height: BH, rx: 10, ry: 10, fill:'#161b22', stroke: s.color, 'stroke-width':2 }));
      const cx = s.x + BW/2;
      if (s.label2) {
        svg.appendChild(svgEl('text', { x: cx, y: H/2 - 6, 'text-anchor':'middle', fill: s.color, 'font-size':12, 'font-weight':800 }, s.label1));
        svg.appendChild(svgEl('text', { x: cx, y: H/2 + 8, 'text-anchor':'middle', fill: s.color, 'font-size':12, 'font-weight':800 }, s.label2));
        svg.appendChild(svgEl('text', { x: cx, y: H/2 + 22, 'text-anchor':'middle', fill:'#8b949e', 'font-size':9 }, s.sub));
      } else {
        svg.appendChild(svgEl('text', { x: cx, y: H/2 - 2, 'text-anchor':'middle', fill: s.color, 'font-size':12, 'font-weight':800 }, s.label1));
        svg.appendChild(svgEl('text', { x: cx, y: H/2 + 14, 'text-anchor':'middle', fill:'#8b949e', 'font-size':9 }, s.sub));
      }
    });
    return svg;
  }

  function buildAssignments(data) {
    const ally = data.ally.warzones;
    // Highest-combat-buff server = defensive anchor (lower marches stay home)
    let anchorSid = null, anchorSum = -1;
    for (const z of ally) {
      const cb = z.combat_buffs_L3;
      if (!cb) continue;
      const sum = (cb.L3_pct['All Units ATK']||0) + (cb.L3_pct['All Units DEF']||0) + (cb.L3_pct['All Units HP']||0);
      if (sum > anchorSum) { anchorSum = sum; anchorSid = z.sid; }
    }
    const players = {};
    for (const z of ally) {
      const fs = z.formations || {};
      ['Army','Navy','AirForce'].forEach(u => {
        (fs[u]||[]).forEach(m => {
          if (m.username && m.username.indexOf('Reef') !== -1) return;
          const key = m.username + '|' + z.sid;
          if (!players[key] || (m.power||0) > players[key].power) {
            players[key] = { name: m.username, sid: z.sid, unit: u, power: m.power||0 };
          }
        });
      });
    }
    const ranked = Object.values(players).sort((a,b) => b.power - a.power);
    // Strike Team = top 5 power overall
    const strikeTeam = ranked.slice(0, 5);
    const offensePool = ranked.slice(5).filter(p => p.sid !== anchorSid);
    const defensePool = ranked.slice(5).filter(p => p.sid === anchorSid);
    // For each stage, allocate from pools to current targets
    const take = (pool, n, used) => {
      const out = [];
      for (const p of pool) {
        if (used.has(p.name + '|' + p.sid)) continue;
        out.push(p);
        used.add(p.name + '|' + p.sid);
        if (out.length >= n) break;
      }
      return out;
    };
    const usedO = new Set(), usedD = new Set();
    const stages = [
      {
        id:'s1', time:'0–15m', name:'Stage 1', focus:'L1 + L2 Ruins',
        attack: [
          { type:'Enemy L2 #1', pts:20, slots:3 },
          { type:'Enemy L2 #2', pts:20, slots:3 },
          { type:'Enemy L1 #1', pts:10, slots:1 },
          { type:'Enemy L1 #2', pts:10, slots:1 },
          { type:'Enemy L1 #3', pts:10, slots:1 }
        ],
        defend: [
          { type:'Our L2 #1', pts:20, slots:2 },
          { type:'Our L2 #2', pts:20, slots:2 },
          { type:'Our L1 (3)', pts:30, slots:2 }
        ]
      },
      {
        id:'s2', time:'15–30m', name:'Stage 2', focus:'L3 Ruin opens',
        attack: [
          { type:'Enemy L3', pts:40, slots:4 },
          { type:'Hold Enemy L2s', pts:40, slots:3 }
        ],
        defend: [
          { type:'Our L3', pts:40, slots:3 },
          { type:'Hold Our L2s', pts:40, slots:2 }
        ]
      },
      {
        id:'s3', time:'30m+', name:'Stage 3', focus:'Capital + Silos',
        attack: [
          { type:'Enemy Silos (4)', pts:0, slots:3 },
          { type:'Enemy Capital', pts:100, slots:5 }
        ],
        defend: [
          { type:'Our Silos (4)', pts:0, slots:3 },
          { type:'Our Capital', pts:100, slots:3 }
        ]
      }
    ];
    stages.forEach(s => {
      // reset used per stage so same player can serve across stages
      const usedAttack = new Set(), usedDefend = new Set();
      s.attack.forEach(t => { t.team = take(offensePool, t.slots, usedAttack); });
      s.defend.forEach(t => { t.team = take(defensePool, t.slots, usedDefend); });
    });
    return { stages, strikeTeam, anchorSid, offensePool, defensePool };
  }

        )
      )
    );

    a.stages.forEach(s => {
      const attackCol = el('div', { class:'lane-col attack' },
        el('h5', null, s.name + ' — ATTACK'),
        el('div', { class:'lane-sub' }, s.time + ' · ' + s.focus)
      );
      s.attack.forEach(t => attackCol.appendChild(tgtRow({ ...t, tier: t.pts ? t.pts+'/min' : 'silo' }, 'ally')));
      const defendCol = el('div', { class:'lane-col defend' },
        el('h5', null, s.name + ' — DEFEND'),
        el('div', { class:'lane-sub' }, s.time + ' · anchor S' + (a.anchorSid || '?'))
      );
      s.defend.forEach(t => defendCol.appendChild(tgtRow({ ...t, tier: t.pts ? t.pts+'/min' : 'silo' }, 'ally')));
      assignSection.appendChild(el('div', { class:'stage-assign' },
        el('div', { class:'lab' },
          el('span', { class:'stage-tag ' + s.id }, s.time),
          s.name + ' · ' + s.focus
        ),
        el('div', { class:'lane-pair' }, attackCol, defendCol)
      ));
    });
    wrap.appendChild(assignSection);

    return wrap;
  }

  function setupTabs(panels) {
    const nav = el('div', { class:'tabs' });
    const wrap = el('div', null);
    Object.keys(panels).forEach((name, i) => {
      const btn = el('button', { class: 'tab' + (i===0 ? ' active' : ''), 'data-t': name }, name);
      const p = el('div', { class: 'panel' + (i===0 ? ' active' : ''), id: 'p-'+name }, panels[name]());
      nav.appendChild(btn);
      wrap.appendChild(p);
      btn.addEventListener('click', () => {
        nav.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        wrap.querySelectorAll('.panel').forEach(pn => pn.classList.remove('active'));
        document.getElementById('p-'+name).classList.add('active');
      });
    });
    return el('div', null, nav, wrap);
  }

  async function init() {
    const root = document.getElementById('root');
    try {
      const [r, hr] = await Promise.all([
        fetch('data/storm-duel.json', { cache:'no-cache' }),
        fetch('data/all-heroes.json', { cache:'no-cache' }).catch(() => null)
      ]);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const data = await r.json();
      window.__data = data;
      const allyLead = data.ally.warzones[0]?.sid;
      const oppLead  = data.opp.warzones[0]?.sid;
      if (allyLead) ALLY_LABEL = 'Team ' + allyLead;
      if (oppLead)  OPP_LABEL  = 'Team ' + oppLead;
      try {
        if (hr && hr.ok) {
          const heroes = await hr.json();
          (heroes || []).forEach(h => { HEROES_BY_ID[h.heroId] = h; });
        }
      } catch (_) {}

      renderHeader(data.metadata);
      const frag = document.createDocumentFragment();
      frag.appendChild(renderScoreboard(data));
      frag.appendChild(renderServers(data));
      frag.appendChild(setupTabs({
        'Overview':  () => tabOverview(data),
        'Strategy':  () => tabStrategy(data),
        'Fame':      () => tabFame(data),
        'Buffs':     () => tabBuffs(data),
        'Merit':     () => tabMerit(data),
        'Kartz':     () => tabKartz(data),
        'Marches':   () => tabMarches(data)
      }));
      clearNode(root);
      root.appendChild(frag);
    } catch (e) {
      clearNode(root);
      const err = el('div', { class:'status error' }, 'Load failed: ' + (e.message||String(e)));
      root.appendChild(err);
      console.error(e);
    }
  }

  init();
})();
</script>
</body>
</html>
