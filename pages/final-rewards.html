<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com; style-src 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; img-src 'self' https://raw.githubusercontent.com https://knight-cdn.akamaized.net https://h5.topwargame.com data: https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://www.google.com; connect-src https://raw.githubusercontent.com https://push-worker.27tb8s6fct.workers.dev https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com; object-src 'none'; base-uri 'self'; form-action 'none'; frame-src https://translate.google.com;" />
  <title>Final Rewards – Server 2864</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d1117; --bg2: #161b22; --card: #1c2128; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
      --army: #3fb950; --navy: #388bfd; --air: #d29922;
      --ce: #e3b341; --mm: #bc8cff; --tag: #21262d;
      --shadow: rgba(0,0,0,.45); --success: #3fb950; --danger: #f85149;
    }
    :root[data-theme="light"] {
      --bg: #f6f8fa; --bg2: #ffffff; --card: #ffffff; --border: #d0d7de;
      --text: #1f2328; --muted: #656d76; --accent: #1f75d4;
      --army: #1a7f37; --navy: #0550ae; --air: #9a6700;
      --ce: #7d4e00; --mm: #6e40c9; --tag: #eaeef2;
      --shadow: rgba(140,149,159,.2); --success: #1a7f37; --danger: #cf222e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: .85rem 2rem; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200; box-shadow: 0 1px 0 var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 1.2rem; }
    .header-title { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .header-sub { font-size: .75rem; color: var(--muted); margin-top: 3px; }
    .nav-link {
      font-size: .8rem; color: var(--muted); text-decoration: none; padding: .35rem .8rem;
      border: 1px solid var(--border); border-radius: 7px; transition: all .15s;
    }
    .nav-link:hover { border-color: var(--accent); color: var(--accent); }
    .header-actions { display: flex; gap: .6rem; align-items: center; }
    .hdr-btn {
      background: var(--tag); border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: .38rem .9rem; cursor: pointer; font-size: .8rem;
      display: flex; align-items: center; gap: .4rem; transition: all .15s; white-space: nowrap;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

    main { max-width: 1440px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

    .wrap { max-width: 1440px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .muted { color: var(--muted); }

    /* Signup chips (reused from titan-admin) */
    .su-chip {
      display: flex; align-items: center; gap: .4rem; flex-wrap: wrap;
      padding: .3rem .55rem; border-radius: 6px; font-size: .76rem;
      background: var(--bg2); border: 1px solid var(--border); margin-bottom: 3px;
      cursor: pointer;
    }
    .su-chip .su-name { font-weight: 600; }
    .su-chip .su-pow { color: var(--muted); font-size: .68rem; }

    /* Package grid + cards */
    .pkg-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin: 1rem 0; }
    .pkg-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
    .pkg-icon { width: 88px; height: auto; margin: 0 auto .4rem; display: block; }
    .pkg-name { font-weight: 700; margin-bottom: .25rem; }
    .pkg-count { font-size: .8rem; color: var(--muted); margin-bottom: .5rem; }
    .pkg-count .rem { color: var(--accent); }
    .pkg-chips { display: flex; flex-wrap: wrap; gap: 4px; max-height: 170px; overflow: auto; justify-content: center; }
    .chip-x { background: none; border: none; color: var(--danger); cursor: pointer; font-weight: 700; }

    /* Roster search */
    #rosterSearch {
      width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: .5rem .9rem; font-size: .85rem; outline: none;
      margin-bottom: .75rem;
    }
    #rosterSearch:focus { border-color: var(--accent); }

    /* Editor bar */
    .editor-bar {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: .85rem 1.25rem; margin-bottom: 1rem;
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    }

    /* Countdowns */
    .countdowns { margin-bottom: 1rem; }

    /* Trades panel */
    #tradesPanel { margin-top: 1.5rem; }
    #tradeForm { margin-top: 1rem; }

    /* Roster panel */
    #rosterPanel { margin-top: 1.5rem; }

    .site-footer { text-align: center; padding: 1.5rem 2rem; font-size: .75rem; color: var(--muted); border-top: 1px solid var(--border); }
    .site-footer a { color: var(--accent); text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .wrap { padding: 1rem 1rem 2rem; }
      header { padding: .7rem 1rem; flex-wrap: wrap; gap: .5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="header-title">Final Rewards</div>
      <div class="header-sub">Distribution Planner &ndash; Server 2864</div>
    </div>
    <a href="https://2864tw.com" class="nav-link" title="Home" style="padding:.35rem .6rem;display:inline-flex;align-items:center"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L10 3.5l7 7"/><path d="M5 9v7a1 1 0 001 1h3v-4h2v4h3a1 1 0 001-1V9"/></svg></a>
  </div>
  <div class="header-actions">
    <button class="hdr-btn" onclick="(function(){var t=document.documentElement;var next=t.getAttribute('data-theme')==='dark'?'light':'dark';t.setAttribute('data-theme',next);})()">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="10" y1="16" x2="10" y2="18"/><line x1="2" y1="10" x2="4" y2="10"/><line x1="16" y1="10" x2="18" y2="10"/></svg>
      Theme
    </button>
  </div>
</header>

<main class="wrap">
  <section id="countdowns" class="countdowns"></section>
  <section id="packageCards" class="pkg-grid"></section>
  <section id="editorBar" class="editor-bar" style="display:none"></section>
  <section id="rosterPanel">
    <input id="rosterSearch" placeholder="Search player name…" oninput="renderRoster()" />
    <div id="rosterTableWrap"></div>
  </section>
  <section id="tradesPanel" style="display:none"></section>
  <section id="tradeForm"></section>
</main>

<footer class="site-footer">
  Brought to you by supporters of the fk boats movement<br>
  <a href="https://github.com/texnottexas/landing-page" target="_blank" rel="noopener noreferrer">GitHub</a>
</footer>

<script>
var RAW = 'https://raw.githubusercontent.com/texnottexas/landing-page/main/';
var WORKER = 'https://push-worker.27tb8s6fct.workers.dev';
var ICONS = RAW + 'assets/cq-award-icons/';
var STATE = { config: null, assignments: {}, remaining: {}, trades: [], serverNow: 0, roster: [], metrics: {} };

function shortKey(full) {  // ud-distributions uses sha256:<hex>; roster uses 16-hex
  if (!full) return '';
  var s = String(full).indexOf('sha256:') === 0 ? String(full).slice(7) : String(full);
  return s.slice(0, 16);
}
function fmtNum(n) { n = Number(n) || 0; return n.toLocaleString('en-US'); }

async function loadAll() {
  var token = frToken();  // defined in Task 13; returns '' before then
  var headers = token ? { 'Authorization': 'Bearer ' + token } : {};
  var results = await Promise.all([
    fetch(WORKER + '/finalrewards', { headers: headers }).then(function (r) { return r.json(); }),
    fetch(RAW + 'player-data.json').then(function (r) { return r.json(); }),
    fetch(RAW + 'data/ud-distributions.json').then(function (r) { return r.json(); })
  ]);
  var fr = results[0], roster = results[1], dist = results[2];
  STATE.config = fr.config; STATE.assignments = fr.assignments || {};
  STATE.remaining = fr.remaining || {}; STATE.trades = fr.trades || []; STATE.serverNow = fr.serverNow || Date.now();
  STATE.roster = Array.isArray(roster) ? roster : (roster.players || []);
  STATE.metrics = computeMetrics(dist);          // Task 13 defines computeMetrics
  renderPackages(); renderRoster(); renderCountdowns(); renderTrades(); renderTradeForm();
}
document.addEventListener('DOMContentLoaded', loadAll);

function assignedTo(pkgId) {
  return Object.keys(STATE.assignments)
    .filter(function (sk) { return STATE.assignments[sk].packageId === pkgId; })
    .map(function (sk) { return rosterBySiteKey(sk) || { siteKey: sk, name: sk, alliance: '' }; });
}
function rosterBySiteKey(sk) {
  if (!STATE._rmap) { STATE._rmap = {}; STATE.roster.forEach(function (p) { STATE._rmap[shortKey(p.siteKey)] = p; }); }
  return STATE._rmap[shortKey(sk)];
}
function renderPackages() {
  var el = document.getElementById('packageCards');
  el.innerHTML = STATE.config.packages.map(function (p) {
    var holders = assignedTo(p.id);
    var rem = (STATE.remaining[p.id] != null) ? STATE.remaining[p.id] : p.qty;
    var chips = holders.map(function (h) {
      return '<span class="su-chip" onclick="focusRoster(\'' + shortKey(h.siteKey) + '\')">' +
             '<span class="su-name">' + esc(h.name) + '</span>' +
             (h.alliance ? '<span class="su-pow">' + esc(h.alliance) + '</span>' : '') +
             (EDITOR.on ? ' <button class="chip-x" onclick="event.stopPropagation();unassign(\'' + shortKey(h.siteKey) + '\')">&#215;</button>' : '') +
             '</span>';
    }).join('');
    return '<div class="pkg-card">' +
      '<img class="pkg-icon" src="' + ICONS + p.icon + '" alt="" onerror="this.style.display=\'none\'"/>' +
      '<div class="pkg-name">' + esc(p.name) + '</div>' +
      '<div class="pkg-count"><b>' + (p.qty - rem) + '</b> / ' + p.qty + ' assigned &middot; <span class="rem">' + rem + ' left</span></div>' +
      '<div class="pkg-chips">' + (chips || '<span class="muted">none yet</span>') + '</div>' +
    '</div>';
  }).join('');
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]; }); }

/* ── Task-12 stubs (replaced by Tasks 13 & 14) ── */
var EDITOR = { on: false, siteKey: null };
function computeMetrics() { return {}; }
function renderRoster() {}
function renderCountdowns() {}
function renderTrades() {}
function renderTradeForm() {}
function focusRoster() {}
function unassign() {}
function frToken() { return ''; }
</script>
</body>
</html>
