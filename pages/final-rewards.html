<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline' https://translate.googleapis.com https://translate.google.com https://www.gstatic.com https://translate-pa.googleapis.com; style-src 'unsafe-inline' https://translate.googleapis.com https://www.gstatic.com; img-src 'self' https://raw.githubusercontent.com https://knight-cdn.akamaized.net https://h5.topwargame.com data: https://translate.google.com https://translate.googleapis.com https://www.gstatic.com https://www.google.com; connect-src https://raw.githubusercontent.com https://push-worker.27tb8s6fct.workers.dev https://translate.googleapis.com https://translate-pa.googleapis.com https://translate.google.com; object-src 'none'; base-uri 'self'; form-action 'none'; frame-src https://translate.google.com;" />
  <title>Final Rewards – Server 2864</title>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d1117; --bg2: #161b22; --card: #1c2128; --border: #30363d;
      --text: #e6edf3; --muted: #8b949e; --accent: #79c0ff;
      --army: #3fb950; --navy: #388bfd; --air: #d29922;
      --ce: #e3b341; --mm: #bc8cff; --tag: #21262d;
      --shadow: rgba(0,0,0,.45); --success: #3fb950; --danger: #f85149;
    }
    :root[data-theme="light"] {
      --bg: #f6f8fa; --bg2: #ffffff; --card: #ffffff; --border: #d0d7de;
      --text: #1f2328; --muted: #656d76; --accent: #1f75d4;
      --army: #1a7f37; --navy: #0550ae; --air: #9a6700;
      --ce: #7d4e00; --mm: #6e40c9; --tag: #eaeef2;
      --shadow: rgba(140,149,159,.2); --success: #1a7f37; --danger: #cf222e;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: .85rem 2rem; display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200; box-shadow: 0 1px 0 var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 1.2rem; }
    .header-title { font-size: 1.1rem; font-weight: 700; color: var(--accent); }
    .header-sub { font-size: .75rem; color: var(--muted); margin-top: 3px; }
    .nav-link {
      font-size: .8rem; color: var(--muted); text-decoration: none; padding: .35rem .8rem;
      border: 1px solid var(--border); border-radius: 7px; transition: all .15s;
    }
    .nav-link:hover { border-color: var(--accent); color: var(--accent); }
    .header-actions { display: flex; gap: .6rem; align-items: center; }
    .hdr-btn {
      background: var(--tag); border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: .38rem .9rem; cursor: pointer; font-size: .8rem;
      display: flex; align-items: center; gap: .4rem; transition: all .15s; white-space: nowrap;
    }
    .hdr-btn:hover { border-color: var(--accent); color: var(--accent); }

    main { max-width: 1440px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

    .wrap { max-width: 1440px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .muted { color: var(--muted); }

    /* Signup chips (reused from titan-admin) */
    .su-chip {
      display: flex; align-items: center; gap: .4rem; flex-wrap: wrap;
      padding: .3rem .55rem; border-radius: 6px; font-size: .76rem;
      background: var(--bg2); border: 1px solid var(--border); margin-bottom: 3px;
      cursor: pointer;
    }
    .su-chip .su-name { font-weight: 600; }
    .su-chip .su-pow { color: var(--muted); font-size: .68rem; }

    /* Package grid + cards */
    .pkg-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem; margin: 1rem 0; }
    .pkg-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 1rem; text-align: center; }
    .pkg-icon { width: 88px; height: auto; margin: 0 auto .4rem; display: block; }
    .pkg-name { font-weight: 700; margin-bottom: .25rem; }
    .pkg-count { font-size: .8rem; color: var(--muted); margin-bottom: .5rem; }
    .pkg-count .rem { color: var(--accent); }
    .pkg-chips { display: flex; flex-wrap: wrap; gap: 4px; max-height: 170px; overflow: auto; justify-content: center; }
    .chip-x { background: none; border: none; color: var(--danger); cursor: pointer; font-weight: 700; }

    /* Roster search */
    #rosterSearch {
      width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); padding: .5rem .9rem; font-size: .85rem; outline: none;
      margin-bottom: .75rem;
    }
    #rosterSearch:focus { border-color: var(--accent); }

    /* Editor bar */
    .editor-bar {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: .85rem 1.25rem; margin-bottom: 1rem;
      display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
    }

    /* Countdowns */
    .countdowns{display:flex;gap:1rem;flex-wrap:wrap;margin:.5rem 0}.cd{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.5rem .8rem}.cd-label{display:block;font-size:.72rem;color:var(--muted)}.cd-val{font-size:1.1rem;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}

    /* Trades panel */
    .panel{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.8rem;margin:.8rem 0}
    #tradesPanel { margin-top: 1.5rem; }
    #tradeForm { margin-top: 1rem; }

    /* Roster panel */
    #rosterPanel { margin-top: 1.5rem; }

    .site-footer { text-align: center; padding: 1.5rem 2rem; font-size: .75rem; color: var(--muted); border-top: 1px solid var(--border); }
    .site-footer a { color: var(--accent); text-decoration: none; }
    .site-footer a:hover { text-decoration: underline; }

    .roster{width:100%;border-collapse:collapse}.roster th{cursor:pointer;text-align:left;color:var(--muted);font-size:.78rem;border-bottom:1px solid var(--border);padding:.3rem}.roster td{padding:.3rem;border-bottom:1px solid var(--border);font-size:.82rem}.roster td.num{text-align:right}.roster tr.hl{background:color-mix(in srgb,var(--accent) 12%,var(--bg2))}

    @media (max-width: 640px) {
      .wrap { padding: 1rem 1rem 2rem; }
      header { padding: .7rem 1rem; flex-wrap: wrap; gap: .5rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <div class="header-title">Final Rewards</div>
      <div class="header-sub">Distribution Planner &ndash; Server 2864</div>
    </div>
    <a href="https://2864tw.com" class="nav-link" title="Home" style="padding:.35rem .6rem;display:inline-flex;align-items:center"><svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5L10 3.5l7 7"/><path d="M5 9v7a1 1 0 001 1h3v-4h2v4h3a1 1 0 001-1V9"/></svg></a>
  </div>
  <div class="header-actions">
    <button class="hdr-btn" onclick="verifyUidFlow()">Unlock Editor</button>
    <button class="hdr-btn" onclick="(function(){var t=document.documentElement;var next=t.getAttribute('data-theme')==='dark'?'light':'dark';t.setAttribute('data-theme',next);})()">
      <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="4"/><line x1="10" y1="2" x2="10" y2="4"/><line x1="10" y1="16" x2="10" y2="18"/><line x1="2" y1="10" x2="4" y2="10"/><line x1="16" y1="10" x2="18" y2="10"/></svg>
      Theme
    </button>
  </div>
</header>

<main class="wrap">
  <section id="countdowns" class="countdowns"></section>
  <section id="packageCards" class="pkg-grid"></section>
  <section id="editorBar" class="editor-bar" style="display:none"></section>
  <section id="rosterPanel">
    <input id="rosterSearch" placeholder="Search player name…" oninput="renderRoster()" />
    <div id="rosterTableWrap"></div>
  </section>
  <section id="tradesPanel" style="display:none"></section>
  <section id="tradeForm"></section>
</main>

<footer class="site-footer">
  Brought to you by supporters of the fk boats movement<br>
  <a href="https://github.com/texnottexas/landing-page" target="_blank" rel="noopener noreferrer">GitHub</a>
</footer>

<script>
var RAW = 'https://raw.githubusercontent.com/texnottexas/landing-page/main/';
var WORKER = 'https://push-worker.27tb8s6fct.workers.dev';
var ICONS = RAW + 'assets/cq-award-icons/';
var STATE = { config: null, assignments: {}, remaining: {}, trades: [], serverNow: 0, roster: [], metrics: {} };

function shortKey(full) {  // ud-distributions uses sha256:<hex>; roster uses 16-hex
  if (!full) return '';
  var s = String(full).indexOf('sha256:') === 0 ? String(full).slice(7) : String(full);
  return s.slice(0, 16);
}
function fmtNum(n) { n = Number(n) || 0; return n.toLocaleString('en-US'); }

async function loadAll() {
  var token = frToken();
  var headers = token ? { 'Authorization': 'Bearer ' + token } : {};
  var results = await Promise.all([
    fetch(WORKER + '/finalrewards', { headers: headers }).then(function (r) { return r.json(); }),
    fetch(RAW + 'player-data.json').then(function (r) { return r.json(); }),
    fetch(RAW + 'data/ud-distributions.json').then(function (r) { return r.json(); })
  ]);
  var fr = results[0], roster = results[1], dist = results[2];
  STATE.config = fr.config; STATE.assignments = fr.assignments || {};
  STATE.remaining = fr.remaining || {}; STATE.trades = fr.trades || []; STATE.serverNow = fr.serverNow || Date.now();
  STATE.roster = Array.isArray(roster) ? roster : (roster.players || []);
  STATE.metrics = computeMetrics(dist);
  renderPackages(); renderRoster(); renderCountdowns(); renderTrades(); renderTradeForm();
  // Restore stored editor token
  var stored = (function () { try { return JSON.parse(localStorage.getItem('frToken') || 'null'); } catch (e) { return null; } })();
  if (stored && stored.expires > Date.now()) { EDITOR = { on: !!stored.isEditor, siteKey: stored.siteKey, isEditor: stored.isEditor }; renderEditorBar(); }
}
document.addEventListener('DOMContentLoaded', function () {
  loadAll().catch(function (e) {
    var main = document.querySelector('main');
    if (main) main.insertAdjacentHTML('afterbegin', '<div style="background:var(--danger);color:#fff;border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem">Failed to load page data: ' + esc(String(e.message || e)) + '</div>');
  });
});

function assignedTo(pkgId) {
  return Object.keys(STATE.assignments)
    .filter(function (sk) { return STATE.assignments[sk].packageId === pkgId; })
    .map(function (sk) { return rosterBySiteKey(sk) || { siteKey: sk, name: sk, alliance: '' }; });
}
function rosterBySiteKey(sk) {
  if (!STATE._rmap) { STATE._rmap = {}; STATE.roster.forEach(function (p) { STATE._rmap[shortKey(p.siteKey)] = p; }); }
  return STATE._rmap[shortKey(sk)];
}
function renderPackages() {
  var el = document.getElementById('packageCards');
  el.innerHTML = STATE.config.packages.map(function (p) {
    var holders = assignedTo(p.id);
    var rem = (STATE.remaining[p.id] != null) ? STATE.remaining[p.id] : p.qty;
    var chips = holders.map(function (h) {
      return '<span class="su-chip" onclick="focusRoster(\'' + shortKey(h.siteKey) + '\')">' +
             '<span class="su-name">' + esc(h.name) + '</span>' +
             (h.alliance ? '<span class="su-pow">' + esc(h.alliance) + '</span>' : '') +
             (EDITOR.on ? ' <button class="chip-x" onclick="event.stopPropagation();unassign(\'' + shortKey(h.siteKey) + '\')">&#215;</button>' : '') +
             '</span>';
    }).join('');
    return '<div class="pkg-card">' +
      '<img class="pkg-icon" src="' + ICONS + p.icon + '" alt="" onerror="this.style.display=\'none\'"/>' +
      '<div class="pkg-name">' + esc(p.name) + '</div>' +
      '<div class="pkg-count"><b>' + (p.qty - rem) + '</b> / ' + p.qty + ' assigned &middot; <span class="rem">' + rem + ' left</span></div>' +
      '<div class="pkg-chips">' + (chips || '<span class="muted">none yet</span>') + '</div>' +
    '</div>';
  }).join('');
}
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]; }); }

/* ── EDITOR state ── */
var EDITOR = { on: false, siteKey: null, isEditor: false };

/* ── Step 1: computeMetrics + metricOf ── */
function computeMetrics(dist) {
  var rounds = Object.keys(dist.rounds);
  var m = {}; // shortKey -> {merit, fameCum, power, nc}
  rounds.forEach(function (r) {
    var rd = dist.rounds[r]; if (!rd) return;
    rd.distributions.forEach(function (d) {
      var k = shortKey(d.siteKey);
      if (!m[k]) m[k] = { merit: 0, fameCum: 0, power: 0, nc: 0 };
      m[k].fameCum += (d.fame || 0);                 // SUM across rounds
      if (r === '15') {                              // latest-round snapshots
        m[k].merit = d.merit || 0;
        m[k].power = d.power || 0;
        m[k].nc = d.ncScore || 0;                    // lifetime cumulative NC
      }
    });
  });
  return m;
}
function metricOf(sk, field) { var x = STATE.metrics[shortKey(sk)]; return x ? (x[field] || 0) : 0; }

/* ── Step 2: Roster table ── */
var rosterSort = { field: 'power', dir: 'desc' };
function setSort(f) { if (rosterSort.field === f) rosterSort.dir = rosterSort.dir === 'desc' ? 'asc' : 'desc'; else { rosterSort.field = f; rosterSort.dir = 'desc'; } renderRoster(); }
function currentPkgOf(sk) { var a = STATE.assignments[shortKey(sk)]; return a ? a.packageId : ''; }
function renderRoster() {
  var q = (document.getElementById('rosterSearch').value || '').toLowerCase();
  var rows = STATE.roster.filter(function (p) { return !q || (p.name || '').toLowerCase().indexOf(q) >= 0; });
  rows.sort(function (a, b) {
    var f = rosterSort.field, av, bv;
    if (f === 'name') { av = (a.name || '').toLowerCase(); bv = (b.name || '').toLowerCase(); }
    else if (f === 'pkg') { av = currentPkgOf(a.siteKey); bv = currentPkgOf(b.siteKey); }
    else if (f === 'power') { av = a.power || 0; bv = b.power || 0; }
    else { av = metricOf(a.siteKey, f); bv = metricOf(b.siteKey, f); }
    if (av < bv) return rosterSort.dir === 'desc' ? 1 : -1;
    if (av > bv) return rosterSort.dir === 'desc' ? -1 : 1;
    return 0;
  });
  var body = rows.map(function (p) {
    var sk = shortKey(p.siteKey), cur = currentPkgOf(sk);
    var assignCell = EDITOR.on
      ? '<select onchange="assignPlayer(\'' + sk + '\', this.value)"><option value="">— none —</option>' +
        STATE.config.packages.map(function (p) {
          return '<option value="' + p.id + '"' + (p.id === cur ? ' selected' : '') + '>' + esc(p.name) + '</option>';
        }).join('') + '</select>'
      : (cur ? esc(pkgName(cur)) : '<span class="muted">—</span>');
    return '<tr id="rrow_' + sk + '"><td>' + esc(p.name) + '</td><td class="muted">' + esc(p.alliance || '') + '</td>' +
      '<td class="muted">' + esc(p.profession || '') + '</td>' +
      '<td class="num">' + fmtNum(p.power) + '</td>' +
      '<td class="num">' + fmtNum(metricOf(sk, 'merit')) + '</td>' +
      '<td class="num">' + fmtNum(metricOf(sk, 'fameCum')) + '</td>' +
      '<td class="num">' + fmtNum(metricOf(sk, 'nc')) + '</td>' +
      '<td>' + assignCell + '</td></tr>';
  }).join('');
  document.getElementById('rosterTableWrap').innerHTML =
    '<table class="roster"><thead><tr>' +
    '<th onclick="setSort(\'name\')">Name</th><th>Alliance</th><th>Prof</th>' +
    '<th onclick="setSort(\'power\')">Power</th><th onclick="setSort(\'merit\')">Merit</th>' +
    '<th onclick="setSort(\'fameCum\')">Fame (cum)</th><th onclick="setSort(\'nc\')">NC (cum)</th>' +
    '<th>Package</th></tr></thead><tbody>' + body + '</tbody></table>';
}
function pkgName(id) { var p = STATE.config.packages.find(function (x) { return x.id === id; }); return p ? p.name : id; }
function focusRoster(sk) {
  var row = document.getElementById('rrow_' + shortKey(sk));
  if (row) { row.classList.add('hl'); row.scrollIntoView({ behavior: 'smooth', block: 'center' }); setTimeout(function () { row.classList.remove('hl'); }, 1500); }
}

/* ── Step 3: UID-handshake editor unlock ── */
async function frSha256Hex(s) {
  var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(String(s)));
  return Array.from(new Uint8Array(buf)).map(function (b) { return b.toString(16).padStart(2, '0'); }).join('');
}
function frToken() { try { var t = JSON.parse(localStorage.getItem('frToken') || 'null'); return (t && t.expires > Date.now()) ? t.token : ''; } catch (e) { return ''; } }
function frSetToken(o) { try { localStorage.setItem('frToken', JSON.stringify(o)); } catch (e) {} }

async function verifyUidFlow() {
  var raw = window.prompt('Enter your in-game UID to unlock editor mode:');
  if (!raw) return;
  var digits = String(raw).replace(/\D/g, '');
  if (digits.length < 10 || digits.length > 14) { alert('UID should be 12–13 digits — copy it from your in-game profile.'); return; }
  var hash = await frSha256Hex(digits);
  try {
    var r = await fetch(WORKER + '/finalrewards/handshake', {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ uidHash: hash })
    });
    var d = await r.json();
    if (!d.ok) { alert(d.error === 'not_in_roster' ? 'That UID does not match a roster player.' : 'Verification failed.'); return; }
    frSetToken({ token: d.token, expires: d.expires, siteKey: d.siteKey, isEditor: d.isEditor });
    EDITOR = { on: !!d.isEditor, siteKey: d.siteKey, isEditor: d.isEditor };
    await loadAll();  // reload with editor headers (reveals editor-only trades)
    if (EDITOR.on) renderEditorBar();
    if (!d.isEditor) alert('Verified — but only Tex, Gary, and 8960mr can edit assignments. You can still request a trade.');
  } catch (e) { alert('Worker unreachable: ' + e.message); }
}
function renderEditorBar() {
  var bar = document.getElementById('editorBar');
  if (!EDITOR.on) { bar.style.display = 'none'; document.getElementById('tradesPanel').style.display = 'none'; return; }
  bar.style.display = ''; document.getElementById('tradesPanel').style.display = '';
  var pkgOpts = STATE.config.packages.map(function (p) { return '<option value="' + p.id + '">' + esc(p.name) + '</option>'; }).join('');
  var metricOpts = '<option value="merit">Merit (R15)</option><option value="fameCum">Cumulative Fame</option><option value="power">Power</option><option value="nc">Cumulative NC</option>';
  bar.innerHTML = '<b>Editor mode — ' + esc((rosterBySiteKey(EDITOR.siteKey) || {}).name || EDITOR.siteKey) + '</b> · ' +
    'Top <input id="batchN" type="number" min="1" value="10" style="width:4rem"/> by ' +
    '<select id="batchMetric">' + metricOpts + '</select> → <select id="batchPkg">' + pkgOpts + '</select> ' +
    '<button onclick="batchPreview()">Preview</button> <span id="batchPreviewOut"></span>';
}

/* ── Step 4: assign / unassign / batch ── */
async function frAssignOps(ops) {
  var r = await fetch(WORKER + '/finalrewards/assign', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + frToken() },
    body: JSON.stringify({ ops: ops })
  });
  var d = await r.json();
  if (!d.ok) { alert('Assign rejected: ' + (d.failures ? JSON.stringify(d.failures) : d.error)); return false; }
  STATE.assignments = d.assignments; STATE.remaining = d.remaining; STATE._rmap = null;
  renderPackages(); renderRoster(); return true;
}
function assignPlayer(sk, pkgId) { frAssignOps([{ siteKey: sk, packageId: pkgId || null }]); }
function unassign(sk) { frAssignOps([{ siteKey: sk, packageId: null }]); }

function batchPreview() {
  var n = Math.max(1, parseInt(document.getElementById('batchN').value, 10) || 0);
  var field = document.getElementById('batchMetric').value;
  var pkgId = document.getElementById('batchPkg').value;
  var ranked = STATE.roster.slice().sort(function (a, b) {
    var av = field === 'power' ? (a.power || 0) : metricOf(a.siteKey, field);
    var bv = field === 'power' ? (b.power || 0) : metricOf(b.siteKey, field);
    return bv - av;
  }).slice(0, n);
  var rem = STATE.remaining[pkgId] || 0;
  // account for selected players already on this package (no-op) and moves
  var willMove = ranked.filter(function (p) { var c = currentPkgOf(p.siteKey); return c && c !== pkgId; }).length;
  var netNeeded = ranked.filter(function (p) { return currentPkgOf(p.siteKey) !== pkgId; }).length;
  var fits = netNeeded <= rem;
  var names = ranked.map(function (p) { return esc(p.name); }).join(', ');
  document.getElementById('batchPreviewOut').innerHTML =
    (fits ? '' : '<span style="color:var(--danger)">over capacity (' + netNeeded + ' need slots, ' + rem + ' left) — </span>') +
    'would assign: ' + names + ' (' + willMove + ' moved) ' +
    '<button onclick="batchCommit()" ' + (fits ? '' : 'disabled') + '>Assign</button>';
  STATE._batch = fits ? ranked.map(function (p) { return { siteKey: shortKey(p.siteKey), packageId: pkgId }; }) : null;
}
async function batchCommit() { if (STATE._batch && await frAssignOps(STATE._batch)) { document.getElementById('batchPreviewOut').textContent = 'Done.'; STATE._batch = null; } }

/* ── Task-14: Countdowns + trade-request form + pending-trades panel ── */
function fmtRemaining(ms) {
  if (ms <= 0) return null;
  var s = Math.floor(ms / 1000), d = Math.floor(s / 86400); s -= d * 86400;
  var h = Math.floor(s / 3600); s -= h * 3600; var m = Math.floor(s / 60); s -= m * 60;
  return (d ? d + 'd ' : '') + String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
}
function renderCountdowns() {
  var el = document.getElementById('countdowns');
  var now = Date.now();
  var swap = fmtRemaining(STATE.config.tradeLockAt - now);
  var dist = fmtRemaining(STATE.config.distributeAt - now);
  el.innerHTML =
    '<div class="cd"><span class="cd-label">Time remaining for swap requests</span><span class="cd-val">' + (swap || 'Closed') + '</span></div>' +
    '<div class="cd"><span class="cd-label">Time remaining until rewards distributed</span><span class="cd-val">' + (dist || 'Rewards distributed') + '</span></div>';
}
setInterval(function () { if (STATE.config) renderCountdowns(); }, 1000);
function swapsClosed() { return Date.now() >= STATE.config.tradeLockAt; }
function renderTradeForm() {
  var el = document.getElementById('tradeForm');
  if (swapsClosed()) { el.innerHTML = '<div class="panel"><b>Swap requests are now closed.</b></div>'; return; }
  var tok = frToken(), my = tok ? (JSON.parse(localStorage.getItem('frToken')).siteKey) : null;
  var myPkg = my ? currentPkgOf(my) : '';
  if (!tok) { el.innerHTML = '<div class="panel"><b>Request a trade</b><br><button onclick="verifyUidFlow()">Verify your UID to request a trade</button></div>'; return; }
  if (!myPkg) { el.innerHTML = '<div class="panel"><b>Request a trade</b><br>You are not assigned a package — there is nothing to trade.</div>'; return; }
  var opts = STATE.roster.filter(function (p) { return shortKey(p.siteKey) !== shortKey(my); })
    .map(function (p) { return '<option value="' + shortKey(p.siteKey) + '">' + esc(p.name) + ' (' + esc(p.alliance || '') + ')</option>'; }).join('');
  el.innerHTML = '<div class="panel"><b>Request a trade</b><br>' +
    'Give your <b>' + esc(pkgName(myPkg)) + '</b> to: <select id="tradeTo">' + opts + '</select> ' +
    '<input id="tradeNote" placeholder="optional note" maxlength="200" style="width:14rem"/> ' +
    '<button onclick="submitTrade()">Submit request</button> <span id="tradeOut"></span></div>';
}
async function submitTrade() {
  var to = document.getElementById('tradeTo').value, note = document.getElementById('tradeNote').value;
  var r = await fetch(WORKER + '/finalrewards/trade', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + frToken() },
    body: JSON.stringify({ toSiteKey: to, note: note })
  });
  var d = await r.json();
  document.getElementById('tradeOut').textContent = d.ok ? 'Request submitted — pending editor approval.' : ('Error: ' + d.error);
  if (d.ok) { await loadAll(); }
}
function renderTrades() {
  var el = document.getElementById('tradesPanel');
  if (!EDITOR.on) { el.style.display = 'none'; return; }
  el.style.display = '';
  var pending = STATE.trades.filter(function (t) { return t.status === 'pending'; });
  if (!pending.length) { el.innerHTML = '<div class="panel"><b>Pending Trades</b><br><span class="muted">none</span></div>'; return; }
  el.innerHTML = '<div class="panel"><b>Pending Trades</b>' + pending.map(function (t) {
    var from = (rosterBySiteKey(t.fromSiteKey) || {}).name || t.fromSiteKey;
    var to = (rosterBySiteKey(t.toSiteKey) || {}).name || t.toSiteKey;
    var conflict = currentPkgOf(t.toSiteKey) ? ' <span style="color:var(--danger)">(recipient already holds a package — free it first)</span>' : '';
    return '<div class="trade-row">' + esc(from) + ' → ' + esc(to) + ' : <b>' + esc(pkgName(t.packageId)) + '</b>' +
      (t.note ? ' <span class="muted">"' + esc(t.note) + '"</span>' : '') + conflict +
      ' <button onclick="resolveTradeReq(\'' + t.id + '\',\'accept\')">Accept</button>' +
      ' <button onclick="resolveTradeReq(\'' + t.id + '\',\'reject\')">Reject</button></div>';
  }).join('') + '</div>';
}
async function resolveTradeReq(id, action) {
  var r = await fetch(WORKER + '/finalrewards/trade/resolve', {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + frToken() },
    body: JSON.stringify({ tradeId: id, action: action })
  });
  var d = await r.json();
  if (!d.ok) alert(d.error === 'recipient_has_package' ? 'Recipient already holds a package — unassign them first, then accept.' : ('Could not resolve: ' + d.error));
  await loadAll();
}
</script>
</body>
</html>
