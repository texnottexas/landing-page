<title>Battle Plan — Easy Mode · S2864</title>
<style>
:root{
  --bg:#0d1117; --surface:#161b22; --card:#1c2128; --border:#30363d;
  --text:#e6edf3; --muted:#8b949e; --accent:#79c0ff;
  --red:#f85149; --green:#3fb950; --yellow:#d29922; --navy:#388bfd; --purple:#a371f7; --pink:#f778ba;
  --tier-a:#f85149; --tier-b:#d29922; --tier-c:#3fb950; --tier-d:#8b949e;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;min-height:100vh;}
a{color:var(--accent);text-decoration:none;}
a:hover{text-decoration:underline;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:.65rem 1rem;display:flex;align-items:center;justify-content:space-between;gap:.5rem;position:sticky;top:0;z-index:100;padding-top:calc(.65rem + env(safe-area-inset-top,0px));}
.hdr-left{display:flex;align-items:center;gap:.5rem;min-width:0;flex:1;}
.hdr-title{font-size:.92rem;font-weight:800;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-title .dim{color:var(--muted);font-weight:400;margin-left:.3rem;}
.home-btn,.lang-btn,.full-btn{display:inline-flex;align-items:center;justify-content:center;background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:.4rem .55rem;font-size:.78rem;text-decoration:none;transition:border-color .15s,color .15s;cursor:pointer;font-family:inherit;gap:.3rem;}
.home-btn:hover,.lang-btn:hover,.full-btn:hover{border-color:var(--accent);color:var(--accent);text-decoration:none;}
.full-btn{font-weight:700;}
.mode-btn.caveman{background:linear-gradient(135deg,rgba(210,153,34,.25),rgba(248,81,73,.18));border-color:rgba(210,153,34,.5);color:var(--yellow);}
.mode-btn.caveman:hover{border-color:var(--yellow);color:var(--yellow);}
.lang-btn #langCode{font-size:.7rem;color:var(--muted);}
.notranslate{unicode-bidi:isolate;}
#google_translate_element{position:absolute;left:-9999px;opacity:0;pointer-events:none;}

.wrap{max-width:880px;margin:0 auto;padding:1rem;}
@media (min-width:640px){.wrap{padding:1.5rem;}}

.hero{background:linear-gradient(135deg,rgba(248,81,73,.12),rgba(247,120,186,.08),rgba(121,192,255,.10));border:1px solid var(--border);border-radius:18px;padding:1.4rem 1.4rem 1.5rem;margin-bottom:1.4rem;position:relative;overflow:hidden;}
.hero::after{content:'';position:absolute;top:-30px;right:-30px;width:140px;height:140px;border-radius:50%;background:radial-gradient(circle,rgba(247,120,186,.18),transparent 70%);pointer-events:none;}
.hero h1{font-size:1.8rem;font-weight:900;letter-spacing:-.02em;line-height:1.1;margin-bottom:.4rem;display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;}
.hero h1 .em{background:linear-gradient(90deg,var(--red),var(--pink),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;}
.hero .sub{font-size:.95rem;color:var(--text);font-weight:500;line-height:1.45;}
.hero .sub b{color:var(--yellow);font-weight:800;}
.hero .round-pill{display:inline-flex;align-items:center;gap:.35rem;background:rgba(121,192,255,.14);border:1px solid rgba(121,192,255,.4);color:var(--accent);font-size:.7rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:.25rem .6rem;border-radius:999px;margin-bottom:.55rem;}
@media (max-width:560px){.hero h1{font-size:1.4rem;}.hero .sub{font-size:.85rem;}}

.step{margin-bottom:1.4rem;}
.step-head{display:flex;align-items:center;gap:.7rem;margin-bottom:.85rem;}
.step-num{flex-shrink:0;width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;font-weight:900;background:var(--card);border:2px solid var(--border);box-shadow:0 4px 0 rgba(0,0,0,.3);}
.step.s-a .step-num{background:linear-gradient(135deg,rgba(248,81,73,.85),rgba(248,81,73,.55));border-color:rgba(248,81,73,.7);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}
.step.s-b .step-num{background:linear-gradient(135deg,rgba(210,153,34,.85),rgba(210,153,34,.5));border-color:rgba(210,153,34,.7);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}
.step.s-bonus .step-num{background:linear-gradient(135deg,rgba(63,185,80,.7),rgba(121,192,255,.5));border-color:rgba(63,185,80,.6);color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);}
.step-text{flex:1;min-width:0;}
.step-title{font-size:1.35rem;font-weight:900;line-height:1.15;letter-spacing:-.01em;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap;}
.step.s-a .step-title{color:var(--red);}
.step.s-b .step-title{color:var(--yellow);}
.step.s-bonus .step-title{color:var(--green);}
.step-sub{font-size:.85rem;color:var(--muted);font-weight:500;margin-top:.15rem;line-height:1.4;}
.step-sub b{color:var(--text);font-weight:700;}
@media (max-width:560px){.step-num{width:46px;height:46px;font-size:1.3rem;border-radius:12px;}.step-title{font-size:1.15rem;}}

.fights{display:flex;flex-direction:column;gap:.6rem;}
.fight{display:grid;grid-template-columns:auto auto auto 1fr auto;gap:.85rem;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:.8rem 1rem;transition:transform .15s ease,border-color .15s ease,background .15s ease,opacity .15s ease,padding .15s ease;position:relative;overflow:hidden;}
.fight::before{content:'';position:absolute;left:0;top:0;bottom:0;width:5px;}
.fight.cat-combat::before{background:linear-gradient(180deg,var(--red),var(--yellow));}
.fight.cat-economy::before{background:linear-gradient(180deg,var(--green),var(--accent));}
.fight.cat-utility::before{background:linear-gradient(180deg,var(--purple),var(--accent));}
.fight.cat-special::before{background:linear-gradient(180deg,var(--yellow),var(--green));}
.fight:hover{transform:translateX(4px);border-color:var(--accent);}
.fight.threat{background:linear-gradient(135deg,rgba(248,81,73,.10),var(--card));border-color:rgba(248,81,73,.4);}
.fight.done{opacity:.45;padding:.4rem .85rem;background:var(--surface);}
.fight.done:hover{opacity:.7;transform:translateX(2px);}
.fight.done .f-icon-wrap{width:32px;height:32px;border-radius:8px;}
.fight.done .f-icon-wrap svg{width:18px;height:18px;}
.fight.done .f-buff{font-size:1rem;text-decoration:line-through;text-decoration-thickness:2px;text-decoration-color:var(--green);}
.fight.done .f-meta{display:none;}
.fight.done .f-tag{display:none;}
.fight.done .f-num{font-size:1.1rem;}

.f-check{flex-shrink:0;width:30px;height:30px;border-radius:8px;border:2px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:transparent;transition:all .15s ease;padding:0;font-family:inherit;}
.f-check:hover{border-color:var(--green);background:rgba(63,185,80,.08);}
.f-check.checked{border-color:var(--green);background:var(--green);color:#0d1117;}
.f-check svg{stroke:currentColor;stroke-width:3;}

.f-num{font-size:1.5rem;font-weight:900;color:var(--muted);min-width:2.2rem;text-align:center;line-height:1;}
.fight.threat .f-num{color:var(--red);}
.fight.tier-b .f-num{color:var(--yellow);}
.fight.tier-c .f-num{color:var(--green);}
.fight.tier-d .f-num{color:var(--muted);}

.f-icon-wrap{flex-shrink:0;width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--border);}
.fight.cat-combat .f-icon-wrap{background:radial-gradient(circle,rgba(248,81,73,.18),rgba(248,81,73,.05));border-color:rgba(248,81,73,.4);}
.fight.cat-combat .f-icon-wrap svg{color:var(--red);}
.fight.cat-economy .f-icon-wrap{background:radial-gradient(circle,rgba(63,185,80,.18),rgba(63,185,80,.05));border-color:rgba(63,185,80,.4);}
.fight.cat-economy .f-icon-wrap svg{color:var(--green);}
.fight.cat-utility .f-icon-wrap{background:radial-gradient(circle,rgba(163,113,247,.18),rgba(163,113,247,.05));border-color:rgba(163,113,247,.4);}
.fight.cat-utility .f-icon-wrap svg{color:var(--purple);}
.fight.cat-special .f-icon-wrap{background:radial-gradient(circle,rgba(210,153,34,.18),rgba(210,153,34,.05));border-color:rgba(210,153,34,.4);}
.fight.cat-special .f-icon-wrap svg{color:var(--yellow);}

.f-mid{display:flex;flex-direction:column;gap:.18rem;min-width:0;}
.f-buff{font-size:1.25rem;font-weight:900;letter-spacing:-.01em;line-height:1.1;font-family:'SF Mono',Consolas,monospace;}
.f-meta{font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-top:.15rem;}
.f-buffname{font-weight:700;color:var(--text);}
.f-vs{display:inline-flex;align-items:center;gap:.25rem;}
.f-vs.threat{color:var(--red);font-weight:700;}
.f-vs.easy{color:var(--green);font-weight:700;}
.f-vs.contest{color:var(--yellow);font-weight:700;}
.f-vs svg{flex-shrink:0;}

.f-tag{flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:.2rem;}
.f-pill{font-size:.6rem;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:.2rem .5rem;border-radius:999px;white-space:nowrap;}
.f-pill.threat{background:rgba(248,81,73,.18);color:var(--red);border:1px solid rgba(248,81,73,.4);}
.f-pill.combat{background:rgba(210,153,34,.16);color:var(--yellow);border:1px solid rgba(210,153,34,.4);}
.f-pill.nc{background:rgba(63,185,80,.16);color:var(--green);border:1px solid rgba(63,185,80,.4);}
.f-pill.skip{background:rgba(139,148,158,.12);color:var(--muted);border:1px solid var(--border);}

@media (max-width:560px){
  .fight{grid-template-columns:auto auto auto 1fr;gap:.5rem;padding:.7rem .85rem;}
  .f-num{font-size:1.2rem;min-width:1.6rem;}
  .f-icon-wrap{width:40px;height:40px;border-radius:10px;}
  .f-buff{font-size:1.1rem;}
  .f-tag{display:none;}
  .f-check{width:28px;height:28px;}
}

.step-empty{background:var(--card);border:1px dashed var(--border);border-radius:12px;padding:1rem;text-align:center;color:var(--muted);font-size:.85rem;}

.bonus-divider{display:flex;align-items:center;gap:.6rem;margin:.5rem 0 .55rem;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);}
.bonus-divider::before,.bonus-divider::after{content:'';flex:1;height:1px;background:var(--border);}
.bonus-divider .b{color:var(--green);}
.bonus-divider .d{color:var(--muted);}

.tip{background:rgba(121,192,255,.06);border:1px solid rgba(121,192,255,.3);border-radius:12px;padding:.85rem 1rem;margin-bottom:1.2rem;display:flex;gap:.6rem;align-items:flex-start;font-size:.85rem;line-height:1.5;}
.tip svg{flex-shrink:0;color:var(--accent);margin-top:.15rem;}
.tip b{color:var(--accent);}
.tip .red{color:var(--red);}
.tip .yel{color:var(--yellow);}
.tip .grn{color:var(--green);}

.foot{margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border);font-size:.7rem;color:var(--muted);text-align:center;line-height:1.7;}
.foot a{color:var(--accent);}
.reset-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:.7rem;padding:.2rem .55rem;border-radius:6px;cursor:pointer;font-family:inherit;}
.reset-btn:hover{border-color:var(--accent);color:var(--accent);}

.loading,.error{padding:2rem 1rem;text-align:center;color:var(--muted);font-size:.9rem;}
.error{color:var(--red);}

.lang-modal-overlay{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.7);align-items:center;justify-content:center;padding:1rem;}
.lang-modal-overlay.active{display:flex;}
.lang-modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.1rem;max-width:380px;width:100%;}
.lang-modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.8rem;}
.lang-modal-head h3{font-size:1rem;font-weight:700;}
.lang-modal-close{background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:.15rem .4rem;border-radius:6px;}
.lang-modal-close:hover{background:var(--surface);color:var(--text);}
.lang-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.4rem;}
.lang-option{display:flex;align-items:center;gap:.45rem;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.5rem .6rem;border-radius:8px;font-size:.78rem;cursor:pointer;font-family:inherit;}
.lang-option:hover{border-color:var(--accent);}
.lang-option.active{background:rgba(121,192,255,.1);border-color:var(--accent);color:var(--accent);}
.lang-flag{font-size:1rem;}

.cheer{background:linear-gradient(90deg,rgba(63,185,80,.18),rgba(121,192,255,.12),rgba(247,120,186,.10));border:1px dashed rgba(63,185,80,.4);border-radius:14px;padding:.85rem 1rem;margin:1.6rem 0 1rem;text-align:center;font-size:.95rem;font-weight:800;color:var(--green);letter-spacing:-.005em;}
.cheer .pulse{display:inline-block;animation:pulse 2s ease-in-out infinite;margin-right:.4rem;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
.fkb{margin-top:1.2rem;text-align:center;font-size:.65rem;color:var(--muted);opacity:.6;}
.fkb a{color:inherit;text-decoration:none;}
.fkb a:hover{color:var(--accent);}
</style>

      step2Title:'Next — Grab the power-ups', step2Sub:'Big buffs: attack, health, defense, damage. The good stuff.', step2Empty:'No power-up fights left.',
      cheer:'Done with the hard part — bonus rounds below!',
      step3Title:'Bonus — Extra wins', step3Sub:'Hit these in order if you still have troops left. Wastelands that open new cities first, then everything else.', step3Empty:'No bonus fights this round.',
      divCity:'Open new cities — hit these next', divFiller:'Everything else — only if troops left',
      pillBully:'Bully!', pillPower:'Power-up', pillCity:'Opens new city', pillSkip:'Skip if busy', pillFiller:'Extra',
      vsEasy:' Easy take', vsBully:function(s){return ' Bully S'+s+' — really strong';}, vsMulti:function(n){return ' '+n+'-way fight';}, vsSingle:function(s){return ' vs S'+s;},
      checkTitle:'Tap when this wasteland is done', checkAria:function(s){return 'Mark W-'+s+' done';},
      footFights:function(n){return ' · '+n+' fights · ';}, resetBtn:'Clear my checks',
      loading:'Loading battle plan…', errPrefix:'Could not load battle plan: ',
      noRound:function(r){return 'No data for round '+r;}
    },
    caveman:{
      modeLabel:'Caveman', toggleLabel:'Easy',
      heroPill:function(r,n){return 'ROUND '+r+' · '+n+' LAND';},
      heroH1a:'HIT ', heroEm:'THESE LAND', heroH1b:'. THIS ORDER.',
      heroSubA:'START AT ', heroSubB:'#1', heroSubC:'. GO DOWN. BULLY FIRST. POWER NEXT. EXTRA IF TIME.',
      tipLead:'NUMBER = ORDER. ',
      tipRed:'RED = BULLY', tipYel:'YELLOW = POWER', tipGrn:'GREEN = EXTRA',
      tipMidA:'. ', tipMidB:'. ', tipEnd:'.',
      step1Title:'1. SMASH BULLY', step1Sub:'BIG ENEMY. WIN OR LOSE POINT.', step1Empty:'NO BULLY. GOOD.',
      step2Title:'2. GRAB POWER', step2Sub:'BIG BUFF. ATK. HP. DEF. DMG. GOOD.', step2Empty:'NO POWER LEFT.',
      cheer:'HARD PART DONE. EXTRA BELOW.',
      step3Title:'3. EXTRA WIN', step3Sub:'TROOP LEFT? HIT. NEW CITY FIRST. REST AFTER.', step3Empty:'NO EXTRA.',
      divCity:'OPEN NEW CITY. HIT FIRST.', divFiller:'REST. ONLY IF TROOP LEFT.',
      pillBully:'BULLY', pillPower:'POWER', pillCity:'NEW CITY', pillSkip:'SKIP', pillFiller:'EXTRA',
      vsEasy:' EASY', vsBully:function(s){return ' BIG BULLY S'+s+'.';}, vsMulti:function(n){return ' '+n+'-WAY';}, vsSingle:function(s){return ' VS S'+s;},
      checkTitle:'TAP WHEN DONE', checkAria:function(s){return 'MARK W-'+s+' DONE';},
      footFights:function(n){return ' · '+n+' FIGHT · ';}, resetBtn:'CLEAR CHECK',
      loading:'LOADING…', errPrefix:'BROKE. ',
      noRound:function(r){return 'NO ROUND '+r+'.';}
    }
  };
  function t(){return STR[MODE];}

  // Local-only "done" tracking, scoped per round. Reset by round change.
  var DONE_PREFIX='bp-easy-done-r';
  var doneSet={};
  function loadDone(roundKey){
    try{
      var raw=localStorage.getItem(DONE_PREFIX+roundKey);
      if(!raw){doneSet={};return;}
      var arr=JSON.parse(raw);
      doneSet={};
      if(Array.isArray(arr))arr.forEach(function(s){doneSet[s]=true;});
    }catch(e){doneSet={};}
  }
  function saveDone(roundKey){
    try{
      var arr=Object.keys(doneSet);
      if(arr.length)localStorage.setItem(DONE_PREFIX+roundKey,JSON.stringify(arr));
      else localStorage.removeItem(DONE_PREFIX+roundKey);
    }catch(e){}
  }
  function isDone(seq){return !!doneSet[seq];}
  function setDone(seq,v,roundKey){
    if(v)doneSet[seq]=true;else delete doneSet[seq];
    saveDone(roundKey);
  }

  var LANGUAGES=[
    {code:'en',flag:'🇺🇸',name:'English'},{code:'es',flag:'🇪🇸',name:'Español'},
    {code:'fr',flag:'🇫🇷',name:'Français'},{code:'de',flag:'🇩🇪',name:'Deutsch'},
    {code:'pt',flag:'🇧🇷',name:'Português'},{code:'it',flag:'🇮🇹',name:'Italiano'},
    {code:'ru',flag:'🇷🇺',name:'Русский'},{code:'ja',flag:'🇯🇵',name:'日本語'},
    {code:'ko',flag:'🇰🇷',name:'한국어'},{code:'zh-CN',flag:'🇨🇳',name:'中文'},
    {code:'tr',flag:'🇹🇷',name:'Türkçe'},{code:'vi',flag:'🇻🇳',name:'Tiếng Việt'}
  ];
  function getLangData(c){var b=c.split('-')[0];return LANGUAGES.find(function(l){return l.code===c||l.code===b;})||null;}
  function detectCurrentLang(){var m=document.cookie.match(/googtrans=\/en\/([a-zA-Z-]{2,10})/);return m&&m[1]?m[1]:'en';}
  function updateLangBtn(code){var d=getLangData(code);var f=document.getElementById('langFlag');var c=document.getElementById('langCode');if(d&&f){f.textContent=d.flag;c.textContent='/'+d.code;}else if(f){f.textContent='🌐';c.textContent='/'+code;}document.querySelectorAll('.lang-option').forEach(function(o){o.classList.toggle('active',o.dataset.lang===code);});}
  function applyLangToCombo(code,delay){var a=0;var p=setInterval(function(){var c=document.querySelector('.goog-te-combo');if(c){c.value=code;c.dispatchEvent(new Event('change'));clearInterval(p);updateLangBtn(code);}if(++a>30)clearInterval(p);},delay||200);}
  var langModalEl=document.getElementById('langModal');
  function openLangModal(){langModalEl.classList.add('active');}
  function closeLangModal(){langModalEl.classList.remove('active');}
  function selectLanguage(code){if(code==='en'){sessionStorage.removeItem('pendingLang');document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; SameSite=Lax; Secure';document.cookie='googtrans=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/; domain=.2864tw.com; SameSite=Lax; Secure';closeLangModal();location.reload();return;}sessionStorage.setItem('pendingLang',code);applyLangToCombo(code,200);closeLangModal();}
  (function(){
    var g=document.getElementById('langGrid');
    var det=detectCurrentLang();
    LANGUAGES.forEach(function(l){
      var btn=document.createElement('button');
      btn.className='lang-option'+(l.code===det?' active':'');
      btn.dataset.lang=l.code;btn.type='button';
      btn.appendChild(el('span','lang-flag',l.flag));
      btn.appendChild(el('span','lang-name',l.name));
      btn.addEventListener('click',function(){selectLanguage(l.code);});
      g.appendChild(btn);
    });
    updateLangBtn(det);
  })();
  document.getElementById('langBtn').addEventListener('click',openLangModal);
  document.getElementById('langModalClose').addEventListener('click',closeLangModal);
  langModalEl.addEventListener('click',function(e){if(e.target===langModalEl)closeLangModal();});
  document.addEventListener('keydown',function(e){if(e.key==='Escape'&&langModalEl.classList.contains('active')){closeLangModal();e.stopPropagation();}});
  setTimeout(function(){if(!window._gtLoaded){var b=document.getElementById('langBtn');if(b){b.style.opacity='0.5';b.title='Translation unavailable';}}},15000);
  window.googleTranslateElementInit=function(){
    window._gtLoaded=true;
    new google.translate.TranslateElement({pageLanguage:'en',autoDisplay:false},'google_translate_element');
    var p=sessionStorage.getItem('pendingLang');
    if(p){sessionStorage.removeItem('pendingLang');applyLangToCombo(p,250);}
    else{var lo=localStorage.getItem('langOverride');if(lo&&lo!=='en')applyLangToCombo(lo,250);var d=detectCurrentLang();if(d!=='en')updateLangBtn(d);}
  };
  document.getElementById('homeBtn').appendChild(makeIcon('home',15));

  function categorize(rd){
    var warTargets=rd.warTargets||[];
    var ncUnlocks=rd.declarationNcUnlocks||{};
    var contested=rd.contestedRanked||[];
    var oppBySeq={},oppListBySeq={};
    contested.forEach(function(f){
      var k=String(f.seq);
      if(!oppListBySeq[k])oppListBySeq[k]=[];
      oppListBySeq[k].push(f);
      if(!oppBySeq[k]||(f.opPI||0)>(oppBySeq[k].opPI||0))oppBySeq[k]=f;
    });
    var tA=[],tB=[],tC=[],tD=[];
    warTargets.forEach(function(w){
      var seqStr=String(w.seq);
      var opp=oppBySeq[seqStr];
      var ncs=ncUnlocks[seqStr]||[];
      var hasNc=ncs.length>0;
      var isCombat=!!COMBAT_SPECS[w.specId];
      var threat=opp&&opp.opFame>=FAME_THREAT_THRESHOLD;
      var droppable=(w.specId===4003&&w.level===1);
      var entry={seq:w.seq,level:w.level,specId:w.specId,specName:w.specName,opp:opp,opps:oppListBySeq[seqStr]||[],ncs:ncs,hasNc:hasNc,isCombat:isCombat,threat:threat,droppable:droppable};
      if(threat)tA.push(entry);
      else if(isCombat&&w.level===3)tB.push(entry);
      else if(hasNc)tC.push(entry);
      else tD.push(entry);
    });
    tA.sort(function(a,b){return (b.isCombat?1:0)-(a.isCombat?1:0)||(b.opp?b.opp.opPI||0:0)-(a.opp?a.opp.opPI||0:0)||a.seq-b.seq;});
    tB.sort(function(a,b){return (b.hasNc?1:0)-(a.hasNc?1:0)||(b.opp?1:0)-(a.opp?1:0)||a.seq-b.seq;});
    function ncMaxLvl(arr){if(!arr.length)return 0;var m=0;arr.forEach(function(n){var mt=String(n).match(/L(\d)/);if(mt){var v=parseInt(mt[1],10);if(v>m)m=v;}});return m;}
    tC.sort(function(a,b){return ncMaxLvl(b.ncs)-ncMaxLvl(a.ncs)||a.seq-b.seq;});
    tD.sort(function(a,b){return (a.droppable?1:0)-(b.droppable?1:0)||a.seq-b.seq;});
    return {A:tA,B:tB,C:tC,D:tD};
  }

  function vsLine(e){
    var opps=e.opps||[];
    var L=t();
    if(!opps.length){
      var s=el('span','f-vs easy');
      s.appendChild(makeIcon('star',12));
      s.appendChild(document.createTextNode(L.vsEasy));
      return s;
    }
    if(e.threat){
      var th=el('span','f-vs threat');
      th.appendChild(makeIcon('skull',12));
      th.appendChild(document.createTextNode(L.vsBully(opps[0].opponent)));
      return th;
    }
    var label=opps.length>=2?L.vsMulti(opps.length+1):L.vsSingle(opps[0].opponent);
    var c=el('span','f-vs contest');
    c.appendChild(makeIcon('bolt',12));
    c.appendChild(document.createTextNode(label));
    return c;
  }
  function tagPill(e,tier){
    var L=t();
    if(e.threat)return el('span','f-pill threat',L.pillBully);
    if(tier==='B')return el('span','f-pill combat',L.pillPower);
    if(tier==='C')return el('span','f-pill nc',L.pillCity);
    if(e.droppable)return el('span','f-pill skip',L.pillSkip);
    return el('span','f-pill skip',L.pillFiller);
  }
  function fightCard(e,num,tier,roundKey){
    var card=el('div','fight cat-'+(SPEC_CAT[e.specId]||'special')+' tier-'+tier.toLowerCase());
    if(e.threat)card.classList.add('threat');
    if(isDone(e.seq))card.classList.add('done');

    var L=t();
    var check=document.createElement('button');
    check.type='button';
    check.className='f-check'+(isDone(e.seq)?' checked':'');
    check.setAttribute('aria-label',L.checkAria(e.seq));
    check.title=L.checkTitle;
    check.appendChild(makeIcon('check',18));
    check.addEventListener('click',function(ev){
      ev.stopPropagation();
      var nowDone=!isDone(e.seq);
      setDone(e.seq,nowDone,roundKey);
      card.classList.toggle('done',nowDone);
      check.classList.toggle('checked',nowDone);
    });
    card.appendChild(check);

    card.appendChild(el('div','f-num',String(num)));
    var iw=el('div','f-icon-wrap');
    iw.appendChild(makeIcon(SPEC_ICON[e.specId]||'star',26));
    card.appendChild(iw);
    var mid=el('div','f-mid');
    mid.appendChild(el('div','f-buff','W-'+e.seq));
    var meta=el('div','f-meta');
    meta.appendChild(el('span','f-buffname',(SPEC_NAMES[e.specId]||'Spec '+e.specId)+(e.level?' · Lv'+e.level:'')));
    meta.appendChild(vsLine(e));
    mid.appendChild(meta);
    card.appendChild(mid);
    var tag=el('div','f-tag');
    tag.appendChild(tagPill(e,tier));
    card.appendChild(tag);
    return card;
  }

  function divLabel(text){
    var d=el('div','bonus-divider');
    d.appendChild(el('span',null,text));
    return d;
  }

  function buildHero(rd,roundKey,totalFights){
    var L=t();
    var hero=el('div','hero');
    hero.appendChild(el('div','round-pill',L.heroPill(roundKey,totalFights)));
    var h1=el('h1');
    h1.appendChild(document.createTextNode(L.heroH1a));
    h1.appendChild(el('span','em',L.heroEm));
    h1.appendChild(document.createTextNode(L.heroH1b));
    hero.appendChild(h1);
    var sub=el('div','sub');
    sub.appendChild(document.createTextNode(L.heroSubA));
    sub.appendChild(el('b',null,L.heroSubB));
    sub.appendChild(document.createTextNode(L.heroSubC));
    hero.appendChild(sub);
    return hero;
  }

  function buildTip(){
    var L=t();
    var tip=el('div','tip');
    tip.appendChild(makeIcon('info',16));
    var body=el('div');
    body.appendChild(document.createTextNode(L.tipLead));
    body.appendChild(el('b','red',L.tipRed));
    body.appendChild(document.createTextNode(L.tipMidA));
    body.appendChild(el('b','yel',L.tipYel));
    body.appendChild(document.createTextNode(L.tipMidB));
    body.appendChild(el('b','grn',L.tipGrn));
    body.appendChild(document.createTextNode(L.tipEnd));
    tip.appendChild(body);
    return tip;
  }

  function buildStep(cls,num,title,subtext,fights,counterRef,tier,emptyMsg,roundKey,subBuilder){
    var s=el('div','step '+cls);
    var head=el('div','step-head');
    head.appendChild(el('div','step-num',String(num)));
    var text=el('div','step-text');
    text.appendChild(el('div','step-title',title));
    var sub=el('div','step-sub');
    if(subBuilder)subBuilder(sub);else sub.textContent=subtext;
    text.appendChild(sub);
    head.appendChild(text);
    s.appendChild(head);
    var list=el('div','fights');
    if(fights.length){
      fights.forEach(function(e){list.appendChild(fightCard(e,counterRef.n++,tier,roundKey));});
    }else{
      list.appendChild(el('div','step-empty',emptyMsg));
    }
    s.appendChild(list);
    return s;
  }

  var _lastData=null;
  function render(data){
    _lastData=data;
    var root=document.getElementById('root');
    while(root.firstChild)root.removeChild(root.firstChild);
    var roundKey=String(data.currentRound);
    var rd=data.rounds[roundKey];
    if(!rd){root.appendChild(el('div','error',t().noRound(roundKey)));return;}
    document.getElementById('hdrSub').textContent=' · R'+roundKey;
    loadDone(roundKey);
    var L=t();

    var tiers=categorize(rd);
    var totalFights=tiers.A.length+tiers.B.length+tiers.C.length+tiers.D.length;

    root.appendChild(buildHero(rd,roundKey,totalFights));
    root.appendChild(buildTip());

    var counter={n:1};
    root.appendChild(buildStep('s-a',1,L.step1Title,L.step1Sub,tiers.A,counter,'A',L.step1Empty,roundKey));
    root.appendChild(buildStep('s-b',2,L.step2Title,L.step2Sub,tiers.B,counter,'B',L.step2Empty,roundKey));

    var cheer=el('div','cheer');
    var pulseStar=el('span','pulse');
    pulseStar.appendChild(makeIcon('star',18));
    cheer.appendChild(pulseStar);
    cheer.appendChild(document.createTextNode(L.cheer));
    root.appendChild(cheer);

    // Bonus step: C + D combined with internal divider
    var bonus=el('div','step s-bonus');
    var bHead=el('div','step-head');
    bHead.appendChild(el('div','step-num','3'));
    var bText=el('div','step-text');
    bText.appendChild(el('div','step-title',L.step3Title));
    bText.appendChild(el('div','step-sub',L.step3Sub));
    bHead.appendChild(bText);
    bonus.appendChild(bHead);
    var bList=el('div','fights');
    var hadAny=false;
    if(tiers.C.length){
      bList.appendChild(divLabel(L.divCity));
      tiers.C.forEach(function(e){bList.appendChild(fightCard(e,counter.n++,'C',roundKey));});
      hadAny=true;
    }
    if(tiers.D.length){
      bList.appendChild(divLabel(L.divFiller));
      tiers.D.forEach(function(e){bList.appendChild(fightCard(e,counter.n++,'D',roundKey));});
      hadAny=true;
    }
    if(!hadAny){bList.appendChild(el('div','step-empty',L.step3Empty));}
    bonus.appendChild(bList);
    root.appendChild(bonus);

    var foot=el('div','foot');
    var label=rd.label||('Round '+roundKey);
    foot.appendChild(document.createTextNode(label+L.footFights(totalFights)));
    var resetBtn=document.createElement('button');
    resetBtn.type='button';
    resetBtn.className='reset-btn';
    resetBtn.textContent=L.resetBtn;
    resetBtn.addEventListener('click',function(){
      doneSet={};
      try{localStorage.removeItem(DONE_PREFIX+roundKey);}catch(e){}
      document.querySelectorAll('.fight.done').forEach(function(c){c.classList.remove('done');});
      document.querySelectorAll('.f-check.checked').forEach(function(c){c.classList.remove('checked');});
    });
    foot.appendChild(resetBtn);
    root.appendChild(foot);

    var fk=el('div','fkb');
    var fka=el('a',null,'Brought to you by supporters of the fk boats movement');
    fka.href='https://github.com/texnottexas/landing-page';
    fka.target='_blank';fka.rel='noopener';
    fk.appendChild(fka);
    root.appendChild(fk);
  }

  function showError(msg){
    var root=document.getElementById('root');
    while(root.firstChild)root.removeChild(root.firstChild);
    root.appendChild(el('div','error',t().errPrefix+msg));
  }

  function applyMode(){
    var L=t();
    document.body.classList.toggle('caveman',MODE==='caveman');
    var ml=document.getElementById('modeLabel');if(ml)ml.textContent=L.modeLabel;
    var tg=document.getElementById('modeToggle');if(tg){tg.textContent=L.toggleLabel;tg.classList.toggle('caveman',MODE==='caveman');}
    var loadEl=document.querySelector('#root .loading');if(loadEl)loadEl.textContent=L.loading;
  }
  function setMode(next){
    if(next!==MODE){
      MODE=next;
      try{localStorage.setItem(MODE_KEY,MODE);}catch(e){}
    }
    applyMode();
    if(_lastData)render(_lastData);
  }
  document.getElementById('modeToggle').addEventListener('click',function(){setMode(MODE==='easy'?'caveman':'easy');});
  applyMode();

  fetch('https://raw.githubusercontent.com/texnottexas/landing-page/main/data/ssc-map.json?_t='+Date.now(),{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(render)
    .catch(function(err){showError(err.message);});
})();
</script>
