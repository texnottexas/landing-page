name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "data/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare site files
        run: |
          mkdir _site
          cp pages/index.html pages/push-admin.html pages/armory-report.html pages/roadmap.html pages/battle-report.html pages/decor-index.html pages/bases.html pages/heroes.html pages/treasury.html pages/ssc-map.html pages/easter-wishing.html pages/enigma-viewer.html pages/battle-replay.html pages/ht-chips.html pages/passwords.html pages/storms-eye.html _site/
          cp manifest.json seal-stone-calendar.json player-data.json sw.js feedback-widget.js _site/
          mkdir -p _site/data
          mkdir -p _site/assets && cp assets/rickandroll.mp4 _site/assets/rickandroll.mp4
          mkdir -p _site/assets/cnc-icons && cp assets/cnc-icons/*.png _site/assets/cnc-icons/
          cp data/release-notes.json data/all-heroes.json data/hero-skills.json _site/data/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
