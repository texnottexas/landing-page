name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare site files
        run: |
          mkdir _site
          cp pages/index.html pages/push-admin.html pages/armory-report.html pages/tex-armory.html pages/roadmap.html pages/battle-report.html pages/battle-plan.html pages/battle-plan-easy.html pages/decor-index.html pages/bases.html pages/heroes.html pages/treasury.html pages/ssc-map.html pages/easter-wishing.html pages/enigma-viewer.html pages/battle-replay.html pages/ht-chips.html pages/passwords.html pages/storms-eye.html pages/auction.html pages/heroes-awakening.html pages/storm-duel.html pages/seal-stone-train.html pages/storm-duel-selection.html pages/storm-battle-plan.html pages/r125-review.html pages/r13-intel.html pages/storm-briefing.html _site/
          cp favicon.ico manifest.json seal-stone-calendar.json player-data.json sw.js feedback-widget.js seal-stone-train.js all-bookmarklet.js all-bookmarklet.txt dismantle-bookmarklet.js dismantle-bookmarklet.txt merge-bookmarklet.js merge-bookmarklet.txt _site/
          mkdir -p _site/data
          mkdir -p _site/assets && cp assets/rickandroll.mp4 _site/assets/rickandroll.mp4
          mkdir -p _site/assets/cnc-icons && cp assets/cnc-icons/*.png _site/assets/cnc-icons/
          mkdir -p _site/assets/auction-icons && cp assets/auction-icons/*.png _site/assets/auction-icons/
          mkdir -p _site/assets/march-skin-icons && cp assets/march-skin-icons/*.png _site/assets/march-skin-icons/
          mkdir -p _site/assets/titan-slot-icons && cp assets/titan-slot-icons/*.png _site/assets/titan-slot-icons/
          mkdir -p _site/assets/heroes-awakening && cp assets/heroes-awakening/* _site/assets/heroes-awakening/
          mkdir -p _site/assets/hero-awake-icons && cp assets/hero-awake-icons/*.png _site/assets/hero-awake-icons/
          mkdir -p _site/assets/hero-awake-skills && cp assets/hero-awake-skills/*.png _site/assets/hero-awake-skills/
          mkdir -p _site/assets/hero-awake-bgs && cp assets/hero-awake-bgs/*.png _site/assets/hero-awake-bgs/
          mkdir -p _site/assets/hero-awake-items && cp assets/hero-awake-items/*.png _site/assets/hero-awake-items/
          mkdir -p _site/assets/hero-grand-slam && cp assets/hero-grand-slam/*.png _site/assets/hero-grand-slam/
          mkdir -p _site/assets/storm-duel-icons && cp assets/storm-duel-icons/*.png _site/assets/storm-duel-icons/
          mkdir -p _site/assets/formation-icons && cp assets/formation-icons/*.png _site/assets/formation-icons/
          mkdir -p _site/assets/bookmarklet-guide && cp assets/bookmarklet-guide/*.png _site/assets/bookmarklet-guide/ 2>/dev/null || true
          mkdir -p _site/assets/caveman && cp assets/caveman/*.webp assets/caveman/*.png _site/assets/caveman/ 2>/dev/null || true
          mkdir -p _site/assets/inventory-icons && cp assets/inventory-icons/*.png _site/assets/inventory-icons/ 2>/dev/null || true
          cp data/release-notes.json data/all-heroes.json data/hero-awakening-skills.json data/hero-skills.json data/supportive-skills.json data/hero-talents.json data/auction.json data/march-skins.json data/elemental-enhancements.md data/heroes-awakening.json data/storm-duel.json data/formation-v2.json data/item-table.json data/building-table.json data/army-icon-map.json data/decor-category-map.json data/decoration-levels.json data/decoration-index.json data/decoration-mutual-exclusive.json data/decor-lookups.json data/rune-types.json data/storm-duel-round9.json data/enigma-platforms.json data/enigma-field-conditions.json data/enigma-platform-enhance.json data/storm-battle-plan.json _site/data/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

