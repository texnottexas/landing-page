name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "data/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Prepare site files
        run: |
          mkdir _site
          cp index.html manifest.json seal-stone-calendar.json player-data.json push-admin.html sw.js armory-report.html roadmap.html vegeta.html ducks.html battle-report.html decor-index.html bases.html heroes.html treasury.html ssc-map.html battle-plan.html feedback-widget.js easter-wishing.html enigma-viewer.html battle-replay.html ht-chips.html _site/
          mkdir -p _site/data
          cp data/release-notes.json data/all-heroes.json data/hero-skills.json _site/data/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
