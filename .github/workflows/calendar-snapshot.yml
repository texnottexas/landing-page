name: Snapshot Calendar Events

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Fetch calendar events from worker
        run: |
          mkdir -p data
          curl -sf https://push-worker.27tb8s6fct.workers.dev/calendar-events \
            -o data/custom-events.json || echo "[]" > data/custom-events.json

      - name: Check for changes and commit via API
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git diff --quiet data/custom-events.json && exit 0
          # Get current file SHA (needed for update)
          FILE_SHA=$(gh api repos/${{ github.repository }}/contents/data/custom-events.json --jq '.sha' 2>/dev/null || echo "")
          CONTENT=$(base64 -w 0 data/custom-events.json)
          PAYLOAD=$(jq -n \
            --arg msg "chore: snapshot calendar events from KV" \
            --arg content "$CONTENT" \
            --arg sha "$FILE_SHA" \
            '{message: $msg, content: $content} + (if $sha != "" then {sha: $sha} else {} end)')
          gh api repos/${{ github.repository }}/contents/data/custom-events.json \
            --method PUT --input - <<< "$PAYLOAD"
          echo "Snapshot committed via API"
