<!DOCTYPE html>
<html>
<head>
<title>Loading...</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; media-src 'self'; script-src 'unsafe-inline';">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; background: #000; overflow: hidden; cursor: pointer; }
video {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  min-width: 100%; min-height: 100%;
  width: auto; height: auto;
}
</style>
</head>
<body>
<video src="never.mp4" autoplay loop></video>
<script>
document.addEventListener('click', function() {
  var v = document.querySelector('video');
  if (v) { v.muted = false; v.play(); }
}, { once: true });
</script>
</body>
</html>
